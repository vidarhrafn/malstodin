<!DOCTYPE html>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }

    .selectable-text { user-select: text; -webkit-user-select: text; cursor: text; }
    .selectable-text::selection { background: #dbeafe; }

    @keyframes popupIn {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }

    .popup-anim { animation: popupIn 0.2s ease both; }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40%      { content: '..'; }

    .loading-dots::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; }

    .answer-option {
      border: 2px solid #e5e7eb;

      cursor: pointer;

  <!-- Firebase progress — optional, fails silently if not logged in -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
      authDomain: "malstodin-90f85.firebaseapp.com",
      projectId: "malstodin-90f85",
      storageBucket: "malstodin-90f85.firebasestorage.app",
      messagingSenderId: "190485777754",
      appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const COURSE = 'isat1ic';

    const authReady = new Promise(resolve => {
      const unsub = onAuthStateChanged(auth, user => { unsub(); resolve(user); });
    });

    async function writeProgress(exerciseId, status) {
      try {
        const user = await authReady;
        if (!user) return;
        const ref  = doc(db, 'progress', user.uid, COURSE, exerciseId);
        const data = { status, updated_at: serverTimestamp() };
        if (status === 'opened')    data.opened_at    = serverTimestamp();
        if (status === 'completed') data.completed_at = serverTimestamp();
        await setDoc(ref, data, { merge: true });
      } catch(e) { /* fail silently */ }
    }

    window.writeProgress = writeProgress;
  </script>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ══════════════════════════════════════════
       API
    ══════════════════════════════════════════ */
    async function callOpenAI(messages, max_tokens = 300, temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages, max_tokens, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    const shuffle = arr => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    /* ══════════════════════════════════════════
       GÖGN
    ══════════════════════════════════════════ */
    const READING_TEXT = `Líkamsrækt er hreyfing og æfingar sem styrkja og rækta líkamann. Við ræktum yfirleitt blóm eða grænmeti en við tölum líka um að rækta líkama okkar. Það eru margar leiðir til að stunda líkamsrækt. Sumir fara í ræktina, sem er líkamsræktarstöð með fullt af tækjum. Aðrir kjósa að vera úti og leika sér, njóta náttúrunnar og hreyfa sig á sama tíma.

Það er hægt að gera margt í ræktinni. Þú getur til dæmis lyft lóðum. Að lyfta lóðum hjálpar þér að byggja upp styrk og vöðva. Það er líka hægt að hlaupa á hlaupabretti. Að hlaupa á hlaupabretti er eins og að hlaupa úti en þú ert innandyra og getur stillt hraðann. Þetta er sérstaklega gott þegar veðrið er ekki gott úti.

Það eru margar líkamsræktarstöðvar til á Íslandi en þú þarft að kaupa aðgang til að fá að æfa þar. Yfirleitt kaupir fólk kort fyrir einn eða fleiri mánuði eða árskort. Til að fara í ræktina þarf fyrst að pakka niður í íþróttatösku. Gott er að taka með hlaupaskó, íþróttaföt, handklæði og snyrtivörur en líka sundföt ef þú ætlar að fara í heita pottinn eða gufubað eftir ræktina.

Það eru margar ástæður fyrir því að fólk stundar líkamsrækt. Sumir lyfta lóðum til að verða sterkari, aðrir vilja meira þrek og hlaupa á hlaupabretti og enn aðrir fara í jóga og gera teyguæfingar til að vera liðugri. Sumir vilja hugsa um heilsuna en aðrir fara í ræktina til að líta vel út.

En það þarf ekki að fara í líkamsræktarstöð til að stunda líkamsrækt. Þú getur líka stundað líkamsrækt með því að leika þér úti, hjóla, synda eða dansa. Allt sem fær þig til að hreyfa þig er gott fyrir þig. Farðu í göngutúr með fjölskyldunni, spilaðu fótbolta með vinum þínum eða taktu þátt í dansi. Það eru líka margar leiðir til að vera virkur heima. Þú getur sett á tónlist og dansað, gert teygjuæfingar eða stundað jóga.`;

    const LYKILORD = [
      'líkamsrækt', 'ræktin', 'líkamsræktarstöð', 'lyfta lóðum', 'vöðvar',
      'hlaupabretti', 'þrek', 'teyguæfingar', 'jóga', 'íþróttataska',
      'aðgangskort', 'gufubað', 'styrk', 'liðugur'
    ];

    const NU_GET_EG = [
      'lesið texta um líkamsrækt og skilið orð eins og ræktin, hlaupabretti og lyfta lóðum.',
      'sagt frá því hvernig fólk stundar líkamsrækt og hvers vegna.',
      'skilið muninn á því að fara í ræktina og að hreyfa sig úti.',
      'notað orð eins og styrk, vöðvar, þrek og liðugur í samhengi.',
    ];

    const MC_QUESTIONS_RAW = [
      {
        question: 'Hvernig er hægt að stunda líkamsrækt?',
        options: [
          'Með því að liggja í sófa og horfa á sjónvarp.',
          'Með því að spila tölvuleiki.',
          'Með því að fara í líkamsræktarstöð eða vera úti og hreyfa sig þar.',
        ],
        correct: 2
      },
      {
        question: 'Hvað hjálpar líkamsrækt við samkvæmt textanum?',
        options: [
          'Að horfa á sjónvarpið lengur.',
          'Að halda sér heilbrigðum og sterkum.',
          'Að borða meiri sælgæti.',
          'Að sofa lengur á morgnana.',
        ],
        correct: 1
      },
      {
        question: 'Hvað geturðu gert í ræktinni samkvæmt textanum?',
        options: [
          'Farið í sund.',
          'Hjólað á hjóli.',
          'Lyft lóðum.',
          'Spilað fótbolta.',
        ],
        correct: 2
      }
    ];

    const OPEN_QUESTIONS = [
      'Hverjir eru kostir líkamsræktar fyrir börn og unglinga samkvæmt textanum?',
      'Nefndu dæmi um hvernig þú getur stundað líkamsrækt án þess að fara í ræktina samkvæmt textanum?',

    const DISCUSSION_QUESTIONS = [

      'Af hverju ferð þú í líkamsrækt? Til að vera í góðu formi, vera heilbrigð/ur eða líta vel út?',

    ];

    const TABS = [
      { id: 'lestur',  label: '📖 Lestexti'          },
      { id: 'krossar', label: '✓ Krossaspurningar'   },

      { id: 'umraeda', label: '💬 Tölum saman'        },
    ];

    /* ══════════════════════════════════════════
       SHARED COMPONENTS
    ══════════════════════════════════════════ */
    const TabBar = ({ active, done, onSelect }) => (
      <div className="flex border-b border-gray-200 overflow-x-auto">
        {TABS.map(t => (
          <button key={t.id} onClick={() => onSelect(t.id)}
            className={`flex items-center gap-1.5 px-4 py-3.5 text-sm whitespace-nowrap transition-colors border-b-2
              ${active === t.id
                ? 'border-blue-600 text-blue-700 font-medium bg-blue-50/40'

          </button>

    const FeedbackBadge = ({ score, message }) => {
      const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
      const colors = {

        </div>

    /* ══════════════════════════════════════════
       ÞÝÐINGARPOPUP
    ══════════════════════════════════════════ */
    function ThyðingarPopup({ selectedText, position, language, onClose }) {
      const [translation, setTranslation] = useState('');
      const [loading, setLoading]         = useState(false);

      const handleTranslate = async () => {
        setLoading(true);
        try {
          const result = await callOpenAI([
            { role: 'system', content: 'You are a helpful language learning assistant for Icelandic students.' },
            { role: 'user',   content: `A student learning Icelandic has selected this text and needs help understanding it in ${language}.\n\nSELECTED TEXT (Icelandic): "${selectedText}"\n\nProvide:\n1. Translation to ${language}\n2. Brief explanation if needed (in ${language})\n\nKeep it concise. Respond ONLY in ${language}.` }
          ], 300, 0.3);
          setTranslation(result);
        } catch {
          setTranslation('Villa kom upp. Reyndu aftur.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <>
          <div className="fixed inset-0 z-40" onClick={onClose} />
          <div className="popup-anim fixed z-50 bg-white border-2 border-blue-300 rounded-2xl shadow-xl p-5"
            style={{ left: position.x+'px', top: position.y+'px', transform: 'translateX(-50%)', width: '340px', maxWidth: '90vw' }}>
            <div className="flex items-start justify-between mb-3">
              <div className="flex-1">
                <p className="text-xs text-gray-400 mb-1">Valinn texti:</p>
                <p className="text-sm text-gray-700 italic font-light">„{selectedText}"</p>
              </div>
              <button onClick={onClose} className="text-gray-300 hover:text-gray-600 text-2xl leading-none ml-3">×</button>
            </div>
            {!translation ? (
              <button onClick={handleTranslate} disabled={loading}
                className="w-full py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-colors font-light text-sm">
                {loading ? <span className="loading-dots">Þýði</span> : `🌐 Þýða á ${language}`}
              </button>
            ) : (
              <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 fade-in">
                <p className="text-xs text-blue-400 mb-2">🌐 Þýðing:</p>
                <p className="text-sm text-gray-800 font-light whitespace-pre-wrap">{translation}</p>
              </div>
            )}
          </div>
        </>
      );
    }

    /* ══════════════════════════════════════════
       FLIPI 1 — Lestexti með þýðingu
    ══════════════════════════════════════════ */
    function LestextiTab() {
      const [language,   setLanguage]   = useState('');
      const [langInput,  setLangInput]  = useState('');
      const [confirmed,  setConfirmed]  = useState(false);
      const [popup,      setPopup]      = useState(null);

      const handleConfirm = () => {
        if (langInput.trim()) { setLanguage(langInput.trim()); setConfirmed(true); }
      };

      const handleSelection = () => {
        if (!confirmed) return;
        setTimeout(() => {
          const sel  = window.getSelection();
          const text = sel.toString().trim();
          if (!text || text.length < 2) return;
          const range = sel.getRangeAt(0);
          const rect  = range.getBoundingClientRect();
          const x = Math.min(Math.max(rect.left + rect.width / 2, 180), window.innerWidth - 180);
          const y = rect.bottom + window.scrollY + 12;
          setPopup({ text, x, y });
        }, 80);
      };

      return (
        <div className="fade-in space-y-5">

          {/* Tungumálval */}
          <div className="bg-gray-50 rounded-xl border border-gray-100 p-4">
            {!confirmed ? (
              <div className="flex gap-2 items-center flex-wrap">
                <span className="text-sm text-gray-500 font-light">🌐 Móðurmál:</span>
                <input type="text" value={langInput}
                  onChange={e => setLangInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleConfirm()}
                  placeholder="t.d. English, Polski, 中文…"
                  className="flex-1 min-w-0 px-3 py-1.5 border border-gray-200 rounded-lg text-sm font-light focus:outline-none focus:ring-2 focus:ring-blue-400"
                />
                <button onClick={handleConfirm} disabled={!langInput.trim()}
                  className="px-4 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-light hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                  Staðfesta
                </button>
              </div>
            ) : (
              <div className="flex items-center justify-between">
                <p className="text-sm text-gray-600 font-light">
                  🌐 <span className="font-medium">{language}</span>
                  <span className="text-gray-400 ml-2">— Merktu orð í textanum til að þýða</span>
                </p>
                <button onClick={() => { setConfirmed(false); setLangInput(''); setPopup(null); }}
                  className="text-xs text-blue-500 hover:text-blue-700 font-light">Breyta</button>
              </div>
            )}
          </div>

          {/* Texti */}
          <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
            <img src="media/likamsraekt.png" alt="Líkamsrækt – myndskreyting"
              className="float-left mr-5 mb-3 w-48 rounded-lg border border-gray-100 shadow-sm object-cover" />
            <div className={`selectable-text ${!confirmed ? 'opacity-60' : ''}`}
              onMouseUp={handleSelection} onTouchEnd={handleSelection}>
              {READING_TEXT.split('\n\n').map((p, i) => (
                <p key={i} className="text-gray-700 font-light leading-relaxed mb-3 text-sm">{p}</p>
              ))}
            </div>
            <div className="clear-both" />
            {!confirmed && (
              <p className="text-xs text-gray-400 font-light mt-3 text-center">
                ⬆️ Skráðu móðurmál þitt til að geta þýtt orð í textanum
              </p>
            )}
          </div>

          {/* Lykilorð */}
          <div className="bg-amber-50 rounded-xl border border-amber-100 p-5">
            <p className="text-xs font-medium text-amber-700 uppercase tracking-wide mb-3">Lykilorðaforði</p>
            <div className="flex flex-wrap gap-2">
              {LYKILORD.map(w => (
                <span key={w} className="text-sm bg-white border border-amber-200 text-amber-900 font-light px-3 py-1 rounded-full">{w}</span>
              ))}
            </div>
          </div>

          {/* Nú get ég */}
          <div className="bg-blue-50 rounded-xl border border-blue-100 p-5">
            <p className="text-xs font-medium text-blue-600 uppercase tracking-wide mb-3">Nú get ég…</p>
            <ul className="space-y-2">
              {NU_GET_EG.map((s, i) => (
                <li key={i} className="flex items-start gap-2 text-sm text-blue-800 font-light">
                  <span className="text-blue-400 mt-0.5 flex-shrink-0">✓</span>{s}
                </li>
              ))}
            </ul>
          </div>

          {popup && confirmed && (
            <ThyðingarPopup selectedText={popup.text} position={{ x: popup.x, y: popup.y }}
              language={language}
              onClose={() => { setPopup(null); window.getSelection().removeAllRanges(); }} />
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════
       FLIPI 2 — Krossaspurningar
    ══════════════════════════════════════════ */
    function KrossarTab({ onDone }) {
      const [answers, setAnswers] = useState({});
      const [checked, setChecked] = useState(false);

      const questions = useMemo(() => MC_QUESTIONS_RAW.map(q => {
        const indexed = q.options.map((text, i) => ({ text, origIndex: i }));
        const sh = shuffle(indexed);
        return { question: q.question, options: sh.map(o => o.text), correct: sh.findIndex(o => o.origIndex === q.correct) };
      }), []);

      const check = () => {
        if (Object.keys(answers).length < questions.length) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setChecked(true); onDone();
      };

      const score = checked ? questions.filter((q, i) => answers[i] === q.correct).length : null;

      return (
        <div className="fade-in space-y-5">
          <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
            <p className="text-sm text-blue-800 font-light">Veldu réttan valmöguleika fyrir hverja spurningu.</p>
          </div>

          {questions.map((q, qi) => (
            <div key={qi} className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <p className="font-medium text-gray-800 mb-4 text-sm">{qi + 1}. {q.question}</p>
              <div className="space-y-2">
                {q.options.map((opt, oi) => {
                  const sel = answers[qi] === oi;
                  const isCorrect = oi === q.correct;
                  let cls = 'answer-option p-3 rounded-lg font-light text-sm';
                  if (checked) {
                    cls += ' opt-disabled';
                    if (sel && isCorrect) cls += ' opt-correct';
                    else if (sel)        cls += ' opt-incorrect';
                    else if (isCorrect)  cls += ' opt-correct';
                  } else if (sel) cls += ' opt-selected';
                  return (
                    <div key={oi} className={cls} onClick={() => !checked && setAnswers(a => ({ ...a, [qi]: oi }))}>
                      <div className="flex items-start gap-3">
                        <span className="font-medium text-gray-500 text-xs mt-0.5">{String.fromCharCode(65 + oi)}.</span>
                        <span>{opt}</span>
                        {checked && isCorrect && <span className="ml-auto text-green-600">✓</span>}
                        {checked && sel && !isCorrect && <span className="ml-auto text-red-500">✗</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}

          {!checked ? (
            <button onClick={check}
              className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
              Athuga svör
            </button>
          ) : (
            <div className="bg-white rounded-xl shadow-sm border border-green-100 p-5 text-center fade-in">
              <div className="text-4xl mb-2">{score === questions.length ? '🎉' : score >= 2 ? '👍' : '💪'}</div>
              <p className="text-gray-700 font-light">
                Þú fékkst <strong className="font-medium">{score}</strong> af{' '}
                <strong className="font-medium">{questions.length}</strong> rétt
                {' '}({Math.round(score / questions.length * 100)}%)
              </p>
              <button onClick={() => { setAnswers({}); setChecked(false); }}
                className="text-xs text-blue-500 underline mt-3 font-light block mx-auto">Reyna aftur</button>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════
       FLIPI 3 — Stuttar spurningar
    ══════════════════════════════════════════ */
    function StuttarTab({ onDone }) {
      const [convos,   setConvos]   = useState([[], [], []]);
      const [inputs,   setInputs]   = useState(['', '', '']);
      const [loading,  setLoading]  = useState([false, false, false]);
      const [feedback, setFeedback] = useState([null, null, null]);
      const chatRefs = [useRef(null), useRef(null), useRef(null)];

      const scroll = i => setTimeout(() => {
        if (chatRefs[i].current) chatRefs[i].current.scrollTop = chatRefs[i].current.scrollHeight;
      }, 100);

      const send = async i => {
        const msg = inputs[i].trim();
        if (!msg) return;
        setLoading(l  => { const n=[...l];  n[i]=true;  return n; });
        setConvos(c   => { const n=[...c];  n[i]=[...n[i], {role:'user', text:msg}]; return n; });
        setInputs(inp => { const n=[...inp]; n[i]='';   return n; });
        scroll(i);
        try {
          const result = await callOpenAI([
            { role: 'system', content: 'Þú ert vingjarnlegur og hvetjandi íslenskukennari.' },
            { role: 'user',   content: `Texti: "${READING_TEXT}"\n\nSpurning: "${OPEN_QUESTIONS[i]}"\nSvar: "${msg}"\n\nSvaraðu EINUNGIS:\nSTIG: [0-5]\nENDURGJÖF: [ein til tvær setningar, vinsamlegar og hvetjandi]` }
          ], 200, 0.2);
          const stigMatch = result.match(/STIG:\s*(\d)/);
          const endMatch  = result.match(/ENDURGJÖF:\s*(.+)/s);
          const score     = stigMatch ? parseInt(stigMatch[1]) : 3;
          const text      = endMatch  ? endMatch[1].trim() : result.trim();
          const newFb = [...feedback]; newFb[i] = { score, text }; setFeedback(newFb);
          setConvos(c => { const n=[...c]; n[i]=[...n[i], {role:'assistant', score, text}]; return n; });
          if (newFb.every(f => f !== null)) onDone();
          scroll(i);
        } catch {
          alert('Villa. Reyndu aftur.');
          setConvos(c => { const n=[...c]; n[i]=n[i].slice(0,-1); return n; });
        }
        setLoading(l => { const n=[...l]; n[i]=false; return n; });
      };

      return (
        <div className="fade-in space-y-5">
          <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
            <p className="text-sm text-blue-800 font-light">Svaraðu spurningunum með heilum setningum. AI kennari gefur þér endurgjöf.</p>
          </div>

          {OPEN_QUESTIONS.map((q, i) => (
            <div key={i} className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <p className="font-medium text-gray-800 mb-4 text-sm">{i + 1}. {q}</p>
              <div ref={chatRefs[i]} className="chat-box mb-4 space-y-3 min-h-[40px]">
                {convos[i].map((msg, mi) => (
                  <div key={mi}>
                    {msg.role === 'user' ? (
                      <div className="flex justify-end">
                        <div className="bg-blue-50 rounded-xl rounded-tr-sm px-4 py-3 max-w-[85%]">
                          <p className="text-gray-800 font-light text-sm">{msg.text}</p>
                        </div>
                      </div>
                    ) : (
                      <div className="flex justify-start">
                        <div className="max-w-[90%]">
                          <FeedbackBadge score={msg.score} message={msg.text} />
                        </div>
                      </div>
                    )}
                  </div>
                ))}
                {loading[i] && (
                  <div className="flex justify-start">
                    <div className="bg-gray-100 rounded-lg px-4 py-3">
                      <p className="text-gray-400 text-sm font-light">…</p>
                    </div>
                  </div>
                )}
              </div>
              {!feedback[i] ? (
                <div className="flex gap-2">
                  <textarea value={inputs[i]}
                    onChange={e => setInputs(inp => { const n=[...inp]; n[i]=e.target.value; return n; })}
                    onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(i); } }}
                    disabled={loading[i]} rows={2}
                    placeholder="Skrifaðu svarið þitt hér…"
                    className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50"
                  />
                  <button onClick={() => send(i)}
                    disabled={loading[i] || !inputs[i].trim()}
                    className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end">
                    Fá endurgjöf
                  </button>
                </div>
              ) : (
                <div className="flex items-center gap-2 text-green-600 text-sm font-light">
                  <span>✔</span><span>Lokið</span>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    /* ══════════════════════════════════════════
       FLIPI 4 — Tölum saman (AI spjall)
    ══════════════════════════════════════════ */
    function UmraeðaTab({ onDone }) {
      const [convos,    setConvos]    = useState(DISCUSSION_QUESTIONS.map(q => [{ role: 'assistant', text: q }]));
      const [inputs,    setInputs]    = useState(['', '', '']);
      const [loading,   setLoading]   = useState([false, false, false]);
      const [turnCount, setTurnCount] = useState([0, 0, 0]);
      const [closed,    setClosed]    = useState([false, false, false]);
      const chatRefs = [useRef(null), useRef(null), useRef(null)];

      const scroll = i => setTimeout(() => {
        if (chatRefs[i].current) chatRefs[i].current.scrollTop = chatRefs[i].current.scrollHeight;
      }, 100);

      const send = async i => {
        const msg = inputs[i].trim();
        if (!msg || closed[i]) return;
        const newTurn = turnCount[i] + 1;
        const isLast  = newTurn >= 4;
        setLoading(l  => { const n=[...l];  n[i]=true;     return n; });
        setConvos(c   => { const n=[...c];  n[i]=[...n[i], {role:'user', text:msg}]; return n; });
        setInputs(inp => { const n=[...inp]; n[i]='';       return n; });
        setTurnCount(t => { const n=[...t]; n[i]=newTurn;   return n; });
        scroll(i);
        try {
          const history = convos[i]
            .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.role === 'grammar' ? '' : m.text }))
            .filter(m => m.content);

          const systemPrompt = isLast
            ? `Þú ert vingjarnlegur íslenskukennari. Þetta er síðasta svar þitt. Svaraðu hlýlega (1-2 setningar) og ljúktu samtalinu. Engar spurningar. Á íslensku.`
            : `Þú ert vingjarnlegur íslenskukennari sem ræðir við nemanda um líkamsrækt. Svaraðu stuttlega (1-2 setningar) og spyrðu einnar náttúrulegrar eftirspurningar. Á íslensku.`;

          const [result, grammarResult] = await Promise.all([
            callOpenAI([
              { role: 'system', content: systemPrompt },
              ...history,
              { role: 'user', content: msg }
            ], 150, 0.5),
            callOpenAI([
              { role: 'system', content: `Þú ert íslenskukennari sem gefur MJÖG stuttar málfarsábendingar. Ef villa: "Mundu að..." og lagaðu á hlýlegan hátt með 😊. Ef engin villa: "ENGIN".` },
              { role: 'user', content: msg }
            ], 80, 0.2)
          ]);

          const msgs = [];
          const gc = grammarResult.trim();
          if (gc && gc !== 'ENGIN' && !gc.toUpperCase().startsWith('ENGIN')) {
            msgs.push({ role: 'grammar', text: gc });
          }
          msgs.push({ role: 'assistant', text: result });
          setConvos(c => { const n=[...c]; n[i]=[...n[i], ...msgs]; return n; });

          if (isLast) {
            setClosed(cl => {
              const n = [...cl]; n[i] = true;
              if (n.every(Boolean)) onDone();
              return n;
            });
          }
          scroll(i);
        } catch {
          alert('Villa. Reyndu aftur.');
          setConvos(c => { const n=[...c]; n[i]=n[i].slice(0,-1); return n; });
          setTurnCount(t => { const n=[...t]; n[i]=newTurn-1; return n; });
        }
        setLoading(l => { const n=[...l]; n[i]=false; return n; });
      };

      return (
        <div className="fade-in space-y-5">
          <div className="bg-purple-50 border border-purple-100 rounded-xl p-4">
            <p className="text-sm text-purple-800 font-light">
              Spjallaðu við AI um líkamsrækt – 3 tilsvör í hverju samtali. Fáðu líka málfarsábendingar! 📌
            </p>
          </div>

          {DISCUSSION_QUESTIONS.map((_, i) => (
            <div key={i} className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <div className="flex items-center justify-between mb-3">
                <p className="text-xs text-gray-400 font-light uppercase tracking-wide">Samtal {i + 1}</p>
                {closed[i] && <span className="text-xs text-green-600 font-light flex items-center gap-1"><span>✔</span> Lokið</span>}
              </div>
              <div ref={chatRefs[i]} className="chat-box mb-4 space-y-3">
                {convos[i].map((msg, mi) => (
                  <div key={mi}>
                    {msg.role === 'user' ? (
                      <div className="flex justify-end">
                        <div className="bg-blue-50 rounded-xl rounded-tr-sm px-4 py-3 max-w-[80%]">
                          <p className="text-gray-800 font-light text-sm">{msg.text}</p>
                        </div>
                      </div>
                    ) : msg.role === 'grammar' ? (
                      <div className="flex justify-center">
                        <div className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 max-w-[90%] flex items-start gap-2">
                          <span className="text-amber-500 text-xs mt-0.5 flex-shrink-0">📌</span>
                          <p className="text-amber-800 font-light text-xs">{msg.text}</p>
                        </div>
                      </div>
                    ) : (
                      <div className="flex items-start gap-2">
                        <div className="w-7 h-7 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0 mt-0.5 text-xs">🤖</div>
                        <div className="bg-gray-50 border border-gray-100 rounded-xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                          <p className="text-gray-700 font-light text-sm">{msg.text}</p>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
                {loading[i] && (
                  <div className="flex items-start gap-2">
                    <div className="w-7 h-7 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0 text-xs">🤖</div>
                    <div className="bg-gray-50 border border-gray-100 rounded-xl px-4 py-3">
                      <p className="text-gray-400 text-sm">…</p>
                    </div>
                  </div>
                )}
              </div>
              {!closed[i] && (
                <div className="flex gap-2">
                  <textarea value={inputs[i]}
                    onChange={e => setInputs(inp => { const n=[...inp]; n[i]=e.target.value; return n; })}
                    onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(i); } }}
                    disabled={loading[i]} rows={2}
                    placeholder="Svaraðu hér…"
                    className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50"
                  />
                  <button onClick={() => send(i)}
                    disabled={loading[i] || !inputs[i].trim()}
                    className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end">
                    Senda
                  </button>
                </div>
              )}
            </div>
          ))}

          {closed.every(Boolean) && (
            <div className="bg-green-50 border border-green-200 rounded-xl p-5 text-center fade-in">
              <p className="text-green-700 font-light">🎉 Frábært! Þú kláraðir öll þrjú samtölin.</p>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════
       AÐALFORRITIÐ
    ══════════════════════════════════════════ */
    function App() {
      const [activeTab, setActiveTab] = useState('lestur');
      const [done,      setDone]      = useState(new Set(['lestur']));

      const markDone = id => setDone(prev => new Set([...prev, id]));
      const allDone  = TABS.every(t => done.has(t.id));

      const progressWritten = useRef(false);
      useEffect(() => {
        window.writeProgress && window.writeProgress('lestextar_02', 'opened');
      }, []);
      useEffect(() => {
        if (done.has('krossar') && done.has('stuttar') && !progressWritten.current) {
          progressWritten.current = true;
          window.writeProgress && window.writeProgress('lestextar_02', 'completed');
        }
      }, [done]);

      return (
        <div className="min-h-screen">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-7">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-400 hover:text-gray-600 mb-3 inline-block font-light">
                ← Til baka
              </button>
              <div className="flex items-start justify-between gap-4">
                <div>
                  <p className="text-[10px] font-medium text-blue-400 uppercase tracking-widest mb-1">Kafli 2 · A1–A2</p>
                  <h1 className="text-3xl font-light text-gray-800 mb-1">Líkamsrækt</h1>
                  <p className="text-gray-500 text-sm font-light">Lesskilningur og umræður</p>
                </div>
                <span className="text-4xl">🏋️</span>
              </div>
            </div>
            <div className="max-w-4xl mx-auto bg-white">
              <TabBar active={activeTab} done={done} onSelect={setActiveTab} />
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-7">
              {activeTab === 'lestur'  && <LestextiTab />}
              {activeTab === 'krossar' && <KrossarTab  onDone={() => markDone('krossar')} />}
              {activeTab === 'stuttar' && <StuttarTab  onDone={() => markDone('stuttar')} />}
              {activeTab === 'umraeda' && <UmraeðaTab  onDone={() => markDone('umraeda')} />}
            </div>

            <div className="mt-5 flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-1.5">
                {TABS.map(t => (
                  <div key={t.id} className={`h-1.5 w-10 rounded-full transition-all duration-500
                    ${done.has(t.id) ? 'bg-green-500' : activeTab === t.id ? 'bg-blue-400' : 'bg-gray-200'}`} />
                ))}
                <span className="text-xs text-gray-400 font-light ml-1">{done.size}/{TABS.length}</span>
              </div>
              {allDone && (
                <div className="fade-in flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-2 text-sm font-light">
                  🎉 Kafla 2 lokið!
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
