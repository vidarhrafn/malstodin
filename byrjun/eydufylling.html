<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📝 Eyðufylling – Málstöðin</title>
  <script src="lesson-config.js"></script>
  <script src="lesson-navigation.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .input-blank {
      border-bottom: 2px solid #333;
      padding: 0.25rem 0.5rem;
      min-width: 100px;
      text-align: center;
      font-size: 1.1rem;
    }
    .input-blank:focus {
      outline: none;
      border-bottom-color: #1565c0;
    }
    .correct {
      border-bottom-color: #2e7d32;
      background-color: #e8f5e9;
    }
    .incorrect {
      border-bottom-color: #d32f2f;
      background-color: #ffebee;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    const Eydufylling = () => {
      const [stage, setStage] = useState('intro');
      const [answers, setAnswers] = useState(['', '', '', '', '']);
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [lessonInfo, setLessonInfo] = useState(null);
      const [savedLanguage, setSavedLanguage] = useState('English');

      React.useEffect(() => {
        // Get lesson info
        const info = getLessonInfo('eydufylling');
        setLessonInfo(info);
        
        // Get saved language
        const saved = localStorage.getItem('userLanguage') || 'English';
        setSavedLanguage(saved);
      }, []);

      // Textinn með eyðum
      const text = "Ég _____ Anna. Ég _____ frá Svíþjóð. Ég _____ í Reykjavík. Ég _____ íslensku og ensku. Ég _____ 25 ára.";
      const correctAnswers = ['heiti', 'er', 'bý', 'tala', 'er'];

      const handleSubmit = async () => {
        setLoading(true);
        try {
          const sys = `
Þú ert íslenskukennari sem metur eyðufyllingaræfingar fyrir A1 nemendur.

VERKEFNI:
Notandinn á að fylla í 5 eyður í þessum texta:
"Ég _____ Anna. Ég _____ frá Svíþjóð. Ég _____ í Reykjavík. Ég _____ íslensku og ensku. Ég _____ 25 ára."

SVAR NOTANDA:
${answers.map((a, i) => `${i + 1}. ${a || '(tómt)'}`).join('\n')}

MIKILVÆGT - SAMÞYKKJA ALLA RÉTTA ÍSLENSKU:
Mat þitt á að byggjast á: "Er þetta málfræðilega rétt íslenska?"

Eyða 1: "Ég _____ Anna"
- Rétt: heiti, er, heitir (ef persónan heitir Anna), o.fl.
- "Ég er Anna" = I am Anna (FULLKOMLEGA RÉTT!)
- "Ég heiti Anna" = My name is Anna (FULLKOMLEGA RÉTT!)

Eyða 2: "Ég _____ frá Svíþjóð"
- Rétt: er, kem, kom, o.fl.
- Öll þessi orð eru rétt íslenska!

Eyða 3: "Ég _____ í Reykjavík"
- Rétt: bý, er, búa (ef þú ert að tala í fleirtölu), o.fl.
- Öll þessi orð eru rétt íslenska!

Eyða 4: "Ég _____ íslensku og ensku"
- Rétt: tala, skil, læri, kann, o.fl.
- "Ég skil íslensku" = I understand Icelandic (RÉTT!)
- "Ég tala íslensku" = I speak Icelandic (RÉTT!)

Eyða 5: "Ég _____ 25 ára"
- Rétt: er
- Þetta er eina réttu svarið

SKILAÐU JSON:
{
  "items": [
    {"i": 0, "correct": boolean, "expected": null, "feedback": "Hrós eða mjúk leiðrétting"},
    ...
  ],
  "score_pct": number,
  "explain_overall": "Heildarendurgjöf"
}

REGLUR:
- Ef setningin er málfræðilega rétt → correct: true, hrósaðu!
- Ef beygingin er rétt en orðið passar ekki í samhenginu → samt correct: true, en gefðu mild ábending
- Ef tómt → correct: false, "Þú gleymdir að fylla þetta út"
- Ef alveg röng málfræði (t.d. "ég eru") → correct: false, útskýrðu
- ALDREI slá á fingur nemanda fyrir málfræðilega rétt íslensku!
- Vertu MJÖG hvetjandi

MIKILVÆGT: Svarið þitt má BARA vera JSON. Ekkert annað. Ekki texti fyrir framan eða aftan.
`.trim();

          const response = await callOpenAI({
            model: 'gpt-4o-mini',
            temperature: 0.3,
            max_tokens: 800,
            messages: [
              { role: 'system', content: sys },
              { role: 'user', content: 'Vinsamlegast mettu svörin mín. SKILAÐU BARA JSON, EKKERT ANNAÐ.' }
            ]
          });

          // Clean response - remove markdown, extra text, etc.
          let cleanResponse = response
            .replace(/```json\n?/g, '')
            .replace(/```\n?/g, '')
            .replace(/^[^{]*/g, '')  // Remove everything before first {
            .replace(/[^}]*$/g, '')  // Remove everything after last }
            .trim();

          console.log('Clean response:', cleanResponse);
          
          const data = JSON.parse(cleanResponse);
          setResults(data);
          setStage('results');
        } catch (e) {
          console.error('Error:', e);
          alert('Úps, eitthvað fór úrskeiðis. Reyndu aftur.');
        } finally {
          setLoading(false);
        }
      };

      const reset = () => {
        setStage('intro');
        setAnswers(['', '', '', '', '']);
        setResults(null);
      };

      return (
        <div className="min-h-screen pb-12">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button 
                onClick={() => window.history.back()} 
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light"
              >
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">Eyðufylling</h1>
              <p className="text-gray-500 text-sm font-light">Grunnmálfræðiæfing · A1</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">
            {/* Language Info */}
            <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
              <div className="flex items-center justify-between">
                <p className="text-sm text-gray-600 font-light">
                  🌍 Móðurmál: <strong>{savedLanguage}</strong>
                </p>
                <a 
                  href="byrjun.html" 
                  className="text-sm text-blue-600 hover:underline font-light"
                >
                  Breyta
                </a>
              </div>
            </div>

            {stage === 'intro' && (
              <div className="bg-white rounded-lg shadow-sm p-8">
                <div className="text-center mb-8">
                  <div className="text-6xl mb-4">📝</div>
                  <h2 className="text-2xl font-light text-gray-800 mb-4">Fylltu í eyðurnar</h2>
                  <p className="text-gray-600 font-light leading-relaxed max-w-xl mx-auto mb-6">
                    Lestu textann og fylltu í eyðurnar með réttum orðum. Notaðu rétta beygingu!
                  </p>
                </div>

                <div className="bg-gray-50 rounded-lg p-8 mb-8 text-center">
                  <p className="text-xl leading-relaxed text-gray-800">
                    Ég{' '}
                    <input
                      type="text"
                      className="input-blank"
                      value={answers[0]}
                      onChange={(e) => setAnswers([e.target.value, answers[1], answers[2], answers[3], answers[4]])}
                      placeholder="?"
                    />
                    {' '}Anna. Ég{' '}
                    <input
                      type="text"
                      className="input-blank"
                      value={answers[1]}
                      onChange={(e) => setAnswers([answers[0], e.target.value, answers[2], answers[3], answers[4]])}
                      placeholder="?"
                    />
                    {' '}frá Svíþjóð. Ég{' '}
                    <input
                      type="text"
                      className="input-blank"
                      value={answers[2]}
                      onChange={(e) => setAnswers([answers[0], answers[1], e.target.value, answers[3], answers[4]])}
                      placeholder="?"
                    />
                    {' '}í Reykjavík. Ég{' '}
                    <input
                      type="text"
                      className="input-blank"
                      value={answers[3]}
                      onChange={(e) => setAnswers([answers[0], answers[1], answers[2], e.target.value, answers[4]])}
                      placeholder="?"
                    />
                    {' '}íslensku og ensku. Ég{' '}
                    <input
                      type="text"
                      className="input-blank"
                      value={answers[4]}
                      onChange={(e) => setAnswers([answers[0], answers[1], answers[2], answers[3], e.target.value])}
                      placeholder="?"
                    />
                    {' '}25 ára.
                  </p>
                </div>

                <div className="text-center">
                  <button
                    onClick={handleSubmit}
                    disabled={loading || answers.every(a => !a.trim())}
                    className="bg-gray-800 text-white px-8 py-3 rounded-md hover:bg-gray-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-lg"
                  >
                    {loading ? 'Athuga...' : 'Athuga svörin'}
                  </button>
                </div>
              </div>
            )}

            {stage === 'results' && results && (
              <div className="bg-white rounded-lg shadow-sm p-8">
                <div className="text-center mb-8">
                  <div className="text-6xl mb-4">
                    {results.score_pct >= 80 ? '🎉' : results.score_pct >= 60 ? '👍' : '💪'}
                  </div>
                  <h2 className="text-2xl font-light text-gray-800 mb-2">
                    Þú fékkst {results.score_pct}%
                  </h2>
                  <p className="text-gray-600 font-light">{results.explain_overall}</p>
                </div>

                <div className="space-y-4 mb-8">
                  {results.items.map((item, idx) => (
                    <div
                      key={idx}
                      className={`p-4 rounded-lg border-2 ${
                        item.correct
                          ? 'bg-green-50 border-green-200'
                          : 'bg-red-50 border-red-200'
                      }`}
                    >
                      <div className="flex items-start gap-3">
                        <span className="text-2xl">
                          {item.correct ? '✅' : '❌'}
                        </span>
                        <div className="flex-1">
                          <p className="font-normal text-gray-800 mb-1">
                            Eyða {idx + 1}: <span className="font-mono">{answers[idx] || '(tómt)'}</span>
                          </p>
                          {!item.correct && (
                            <p className="text-sm text-gray-600 mb-1">
                              Rétt svar: <span className="font-mono font-semibold">{item.expected}</span>
                            </p>
                          )}
                          <p className="text-sm text-gray-600 font-light">{item.feedback}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="text-center">
                  <button
                    onClick={reset}
                    className="bg-gray-800 text-white px-8 py-3 rounded-md hover:bg-gray-700 transition-colors font-light"
                  >
                    Prófa aftur
                  </button>
                </div>
              </div>
            )}

            {/* Navigation Buttons */}
            {lessonInfo && (
              <div className="flex justify-between gap-4 mt-8 mb-6">
                {lessonInfo.prev ? (
                  <a 
                    href={lessonInfo.prev.url}
                    className="flex-1 px-6 py-3 bg-white border-2 border-gray-200 rounded-lg text-gray-700 hover:border-blue-500 hover:text-blue-600 transition-all text-center font-light"
                  >
                    ← {lessonInfo.prev.name}
                  </a>
                ) : (
                  <a 
                    href="byrjun.html"
                    className="flex-1 px-6 py-3 bg-white border-2 border-gray-200 rounded-lg text-gray-700 hover:border-blue-500 hover:text-blue-600 transition-all text-center font-light"
                  >
                    ← Til baka
                  </a>
                )}
                
                {lessonInfo.next ? (
                  <a 
                    href={lessonInfo.next.url}
                    className="flex-1 px-6 py-3 bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition-all text-center font-light"
                  >
                    {lessonInfo.next.name} →
                  </a>
                ) : (
                  <a 
                    href="byrjun.html"
                    className="flex-1 px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg hover:from-green-600 hover:to-green-700 transition-all text-center font-light"
                  >
                    🎉 Klárað!
                  </a>
                )}
              </div>
            )}

            {/* Progress Bar */}
            {lessonInfo && (
              <div className="bg-white rounded-lg shadow-sm p-6 mb-6 border border-gray-200">
                <div className="flex justify-between items-center mb-3">
                  <span className="text-sm text-gray-600 font-light">
                    Skref {lessonInfo.index + 1} af {lessonInfo.total}
                  </span>
                  <span className="text-lg text-blue-600 font-medium">
                    {Math.round(((lessonInfo.index + 1) / lessonInfo.total) * 100)}%
                  </span>
                </div>
                <div className="w-full h-2 bg-gray-200 rounded-full overflow-hidden mb-4">
                  <div 
                    className="h-full bg-gradient-to-r from-blue-500 to-blue-600 rounded-full transition-all duration-500"
                    style={{ width: `${((lessonInfo.index + 1) / lessonInfo.total) * 100}%` }}
                  ></div>
                </div>
                <div className="flex gap-2 mb-3">
                  {LESSON_CONFIG.lessons.map((lesson, i) => (
                    <div 
                      key={lesson.id}
                      className={`flex-1 h-3 rounded-full transition-all ${
                        i < lessonInfo.index ? 'bg-green-500' :
                        i === lessonInfo.index ? 'bg-blue-500' :
                        'bg-gray-200'
                      }`}
                    ></div>
                  ))}
                </div>
                <div className="flex flex-wrap gap-2 text-xs text-gray-500">
                  {LESSON_CONFIG.lessons.map((lesson, i) => (
                    <React.Fragment key={lesson.id}>
                      <span className={`${
                        i < lessonInfo.index ? 'text-green-600 font-medium' :
                        i === lessonInfo.index ? 'text-blue-600 font-semibold' :
                        'text-gray-400'
                      }`}>
                        {lesson.icon} {lesson.name}
                      </span>
                      {i < LESSON_CONFIG.lessons.length - 1 && <span className="text-gray-300">→</span>}
                    </React.Fragment>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Eydufylling />);
  </script>
</body>
</html>
