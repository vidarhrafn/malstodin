<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leiguíbúðir – Kaupmannahöfn</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 1.2s ease infinite; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const AREAS = ['Alle', 'København K', 'Vesterbro', 'Nørrebro', 'Frederiksberg', 'Christianshavn'];

const AREA_DK = {
  'København K': 'Kaupmannahöfn K',
  'Vesterbro': 'Vesturbrú',
  'Nørrebro': 'Norðurbrú',
  'Frederiksberg': 'Frederiksberg',
  'Christianshavn': 'Christianshavn',
};

function SkeletonCard() {
  return (
    <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5 pulse">
      <div className="h-4 bg-gray-200 rounded w-2/3 mb-3"></div>
      <div className="h-3 bg-gray-100 rounded w-1/3 mb-4"></div>
      <div className="flex gap-3">
        <div className="h-6 bg-gray-100 rounded-full w-20"></div>
        <div className="h-6 bg-gray-100 rounded-full w-16"></div>
        <div className="h-6 bg-gray-100 rounded-full w-24"></div>
      </div>
    </div>
  );
}

function PriceBadge({ price }) {
  const color = price < 12000
    ? 'bg-green-50 text-green-700 border-green-200'
    : price < 18000
    ? 'bg-blue-50 text-blue-700 border-blue-200'
    : price < 23000
    ? 'bg-amber-50 text-amber-700 border-amber-200'
    : 'bg-red-50 text-red-700 border-red-200';
  return (
    <span className={`text-sm font-medium px-3 py-1 rounded-full border ${color}`}>
      {price.toLocaleString('da-DK')} kr.
    </span>
  );
}

function ListingCard({ listing }) {
  const areaIs = AREA_DK[listing.area] || listing.area;
  const isNew = listing.date && (listing.date.includes('timer') || listing.date.includes('I går') || listing.date.includes('dag siden'));

  return (
    <div className={`bg-white rounded-xl border shadow-sm p-5 fade-in hover:shadow-md transition-shadow
      ${isNew ? 'border-green-200' : 'border-gray-100'}`}>
      <div className="flex items-start justify-between gap-3 mb-2">
        <div className="flex-1">
          <a
            href={listing.url}
            target="_blank"
            rel="noopener noreferrer"
            className="text-sm font-medium text-gray-800 hover:text-blue-600 transition-colors"
          >
            {listing.rooms} herbergi · {listing.size} m² · {listing.street}
          </a>
          <div className="text-xs text-gray-500 font-light mt-0.5">{areaIs}</div>
        </div>
        {isNew && (
          <span className="text-xs px-2 py-0.5 rounded-full bg-green-50 text-green-700 border border-green-200 font-medium flex-shrink-0">
            Nýtt
          </span>
        )}
      </div>

      <div className="flex items-center gap-2 flex-wrap mt-3">
        <PriceBadge price={listing.price} />
        <span className="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 border border-gray-200 font-light">
          {listing.size} m²
        </span>
        <span className="text-xs px-2.5 py-1 rounded-full bg-purple-50 text-purple-700 border border-purple-200 font-light">
          Möblerat
        </span>
        {listing.date && (
          <span className="text-xs text-gray-400 font-light ml-auto">{listing.date}</span>
        )}
      </div>
    </div>
  );
}

function App() {
  const [listings, setListings] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [lastFetched, setLastFetched] = useState('');
  const [areaFilter, setAreaFilter] = useState('Alle');
  const [maxPrice, setMaxPrice] = useState(25000);
  const [minSize, setMinSize] = useState(0);
  const [sortBy, setSortBy] = useState('newest');

  async function fetchListings() {
    setLoading(true);
    setError('');
    try {
      const resp = await fetch('/.netlify/functions/boligportal');
      const data = await resp.json();
      if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);
      setListings(data.listings || []);
      setLastFetched(new Date().toLocaleString('is-IS', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }));
    } catch (err) {
      setError(err.message || 'Villa við að sækja gögn');
    }
    setLoading(false);
  }

  useEffect(() => { fetchListings(); }, []);

  const filtered = listings
    .filter(l => areaFilter === 'Alle' || l.area === areaFilter)
    .filter(l => l.price <= maxPrice)
    .filter(l => l.size >= minSize)
    .sort((a, b) => {
      if (sortBy === 'price_asc') return a.price - b.price;
      if (sortBy === 'price_desc') return b.price - a.price;
      if (sortBy === 'size') return b.size - a.size;
      // newest: timer/dag first
      const aNew = a.date && (a.date.includes('timer') || a.date.includes('I går')) ? 0 : 1;
      const bNew = b.date && (b.date.includes('timer') || b.date.includes('I går')) ? 0 : 1;
      return aNew - bNew;
    });

  const avgPrice = filtered.length
    ? Math.round(filtered.reduce((s, l) => s + l.price, 0) / filtered.length)
    : 0;

  return (
    <div>
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-1">Leiguíbúðir – Kaupmannahöfn</h1>
          <p className="text-gray-500 text-sm font-light">2–3 herbergi · Möblerat · Ágúst 2026–2027</p>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-6 py-8">

        {/* Filters */}
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5 mb-6">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5">

            {/* Area filter */}
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-2">Hverfi</label>
              <div className="flex flex-wrap gap-1.5">
                {AREAS.map(a => (
                  <button
                    key={a}
                    onClick={() => setAreaFilter(a)}
                    className={`text-xs px-2.5 py-1 rounded-full border transition-colors font-light
                      ${areaFilter === a
                        ? 'bg-gray-800 text-white border-gray-800'
                        : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300'}`}
                  >
                    {a === 'Alle' ? 'Öll' : AREA_DK[a] || a}
                  </button>
                ))}
              </div>
            </div>

            {/* Max price */}
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-2">
                Hámarksleiga: <span className="text-blue-600">{maxPrice.toLocaleString('da-DK')} kr.</span>
              </label>
              <input
                type="range"
                min="8000"
                max="30000"
                step="500"
                value={maxPrice}
                onChange={e => setMaxPrice(parseInt(e.target.value))}
                className="w-full accent-blue-600"
              />
              <div className="flex justify-between text-xs text-gray-400 font-light mt-1">
                <span>8.000</span><span>30.000</span>
              </div>
            </div>

            {/* Sort */}
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-2">Röðun</label>
              <select
                value={sortBy}
                onChange={e => setSortBy(e.target.value)}
                className="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 font-light text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="newest">Nýjast fyrst</option>
                <option value="price_asc">Verð — lægst fyrst</option>
                <option value="price_desc">Verð — hæst fyrst</option>
                <option value="size">Stærst fyrst</option>
              </select>
            </div>
          </div>
        </div>

        {/* Stats bar */}
        <div className="flex items-center justify-between flex-wrap gap-3 mb-5">
          <div className="flex items-center gap-4">
            <span className="text-sm text-gray-600 font-light">
              <span className="font-medium text-gray-800">{filtered.length}</span> íbúðir fundnar
            </span>
            {avgPrice > 0 && (
              <span className="text-sm text-gray-500 font-light">
                Meðalleiga: <span className="font-medium">{avgPrice.toLocaleString('da-DK')} kr.</span>
              </span>
            )}
            {lastFetched && (
              <span className="text-xs text-gray-400 font-light">Uppfært: {lastFetched}</span>
            )}
          </div>
          <button
            onClick={fetchListings}
            disabled={loading}
            className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm"
          >
            {loading
              ? <><span className="inline-block spin text-base">↻</span> Sæki...</>
              : <>↻ Uppfæra</>
            }
          </button>
        </div>

        {/* Error */}
        {error && (
          <div className="bg-red-50 border border-red-200 rounded-xl p-4 mb-5 fade-in">
            <p className="text-sm font-medium text-red-700 mb-1">Villa</p>
            <p className="text-xs text-red-600 font-light">{error}</p>
          </div>
        )}

        {/* Skeletons */}
        {loading && (
          <div className="flex flex-col gap-3">
            {[1,2,3,4,5].map(i => <SkeletonCard key={i} />)}
          </div>
        )}

        {/* Listings */}
        {!loading && filtered.length > 0 && (
          <div className="flex flex-col gap-3">
            {filtered.map(l => <ListingCard key={l.id} listing={l} />)}
          </div>
        )}

        {/* Empty */}
        {!loading && filtered.length === 0 && !error && (
          <div className="text-center py-20">
            <div className="text-4xl mb-4">🏠</div>
            <p className="text-gray-500 font-light">Engar íbúðir fundust með þessum síum.</p>
            <button onClick={() => { setAreaFilter('Alle'); setMaxPrice(25000); }}
              className="mt-4 text-sm text-blue-600 hover:underline font-light">
              Hreinsa síur
            </button>
          </div>
        )}

        {/* Boligportal link */}
        {!loading && (
          <div className="mt-8 text-center">
            <a
              href="https://www.boligportal.dk/lejligheder/k%C3%B8benhavn/2-3-v%C3%A6relser/?furnished=1"
              target="_blank"
              rel="noopener noreferrer"
              className="text-sm text-gray-500 hover:text-blue-600 font-light underline underline-offset-2"
            >
              Skoða allt á Boligportal.dk →
            </a>
          </div>
        )}

      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
