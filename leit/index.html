<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI í tungumálakennslu – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 1.2s ease infinite; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STORAGE_KEY = 'malstod_ai_feed_v1';
const SEEN_KEY = 'malstod_ai_seen_v1';
const SAVED_KEY = 'malstod_ai_saved_v1';

const TYPE_CONFIG = {
  article: { label: 'Grein',   bg: 'bg-blue-50',   text: 'text-blue-700',   border: 'border-blue-200' },
  blog:    { label: 'Blogg',   bg: 'bg-green-50',  text: 'text-green-700',  border: 'border-green-200' },
  podcast: { label: 'Podcast', bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200' },
  news:    { label: 'Frétt',   bg: 'bg-amber-50',  text: 'text-amber-700',  border: 'border-amber-200' },
  video:   { label: 'Myndband',bg: 'bg-red-50',    text: 'text-red-700',    border: 'border-red-200' },
};

function getTypeConfig(type) {
  return TYPE_CONFIG[type] || TYPE_CONFIG.news;
}

function TypeBadge({ type }) {
  const c = getTypeConfig(type);
  return (
    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.bg} ${c.text} border ${c.border}`}>
      {c.label}
    </span>
  );
}

function HotBadge() {
  return (
    <span className="text-xs px-2 py-0.5 rounded-full font-medium bg-orange-50 text-orange-700 border border-orange-200">
      🔥 Trending
    </span>
  );
}

function SkeletonCard() {
  return (
    <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5 pulse">
      <div className="h-4 bg-gray-200 rounded w-3/4 mb-3"></div>
      <div className="h-3 bg-gray-100 rounded w-1/2 mb-2"></div>
      <div className="h-3 bg-gray-100 rounded w-full mb-1"></div>
      <div className="h-3 bg-gray-100 rounded w-5/6"></div>
    </div>
  );
}

function FeedCard({ item, isSeen, isSaved, onMarkSeen, onToggleSave }) {
  return (
    <div className={`bg-white rounded-xl border shadow-sm p-5 fade-in transition-opacity
      ${item.hot ? 'border-orange-300' : 'border-gray-100'}
      ${isSeen ? 'opacity-40' : 'opacity-100'}`}>

      <div className="flex items-start justify-between gap-3 mb-2">
        <a
          href={item.url}
          target="_blank"
          rel="noopener noreferrer"
          className="text-sm font-medium text-gray-800 leading-snug hover:text-blue-600 transition-colors flex-1"
        >
          {item.title}
        </a>
        <div className="flex items-center gap-1 flex-shrink-0">
          <button
            onClick={() => window.open('https://notebooklm.google.com/', '_blank')}
            title="Opna í NotebookLM (afritaðu hlekk)"
            className="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-green-600 hover:bg-green-50 transition-colors text-base"
            onClick={() => { navigator.clipboard?.writeText(item.url); window.open('https://notebooklm.google.com/', '_blank'); }}
          >
            📓
          </button>
          <button
            onClick={() => onToggleSave(item)}
            title={isSaved ? 'Fjarlægja úr lista' : 'Vista til að lesa seinna'}
            className={`w-7 h-7 flex items-center justify-center rounded-lg transition-colors text-base
              ${isSaved ? 'text-blue-600 bg-blue-50' : 'text-gray-400 hover:text-blue-600 hover:bg-blue-50'}`}
          >
            {isSaved ? '🔖' : '📑'}
          </button>
          {!isSeen && (
            <button
              onClick={() => onMarkSeen(item.url)}
              title="Merkja sem séð"
              className="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors text-base"
            >
              ✓
            </button>
          )}
        </div>
      </div>

      <div className="flex items-center gap-2 flex-wrap mb-2">
        <TypeBadge type={item.type} />
        {item.hot && <HotBadge />}
        {item.lang === 'is' && (
          <span className="text-xs px-2 py-0.5 rounded-full font-medium bg-gray-100 text-gray-600 border border-gray-200">
            IS
          </span>
        )}
        {item.source && (
          <span className="text-xs text-gray-500 font-light">{item.source}</span>
        )}
        {item.date && (
          <span className="text-xs text-gray-400 font-light">{item.date}</span>
        )}
      </div>

      {item.description && (
        <p className="text-xs text-gray-500 font-light leading-relaxed">{item.description}</p>
      )}
    </div>
  );
}

function SavedList({ saved, onRemove }) {
  if (!saved.length) return null;
  return (
    <div className="mt-8">
      <h2 className="text-sm font-medium text-gray-600 mb-3 flex items-center gap-2">
        <span>📑</span> Lesa seinna
      </h2>
      <div className="bg-white rounded-xl border border-gray-100 shadow-sm divide-y divide-gray-50">
        {saved.map((item) => {
          const c = getTypeConfig(item.type);
          return (
            <div key={item.url} className="flex items-center justify-between gap-3 px-5 py-3">
              <div className="flex-1 min-w-0">
                <a
                  href={item.url}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="text-sm text-gray-800 font-light hover:text-blue-600 transition-colors block truncate"
                >
                  {item.title}
                </a>
                <div className="flex items-center gap-2 mt-1">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.bg} ${c.text} border ${c.border}`}>
                    {c.label}
                  </span>
                  {item.source && <span className="text-xs text-gray-400 font-light">{item.source}</span>}
                </div>
              </div>
              <div className="flex items-center gap-1 flex-shrink-0">
                <button
                  onClick={() => { navigator.clipboard?.writeText(item.url); window.open('https://notebooklm.google.com/', '_blank'); }}
                  title="Opna í NotebookLM"
                  className="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-green-600 hover:bg-green-50 transition-colors text-base"
                >
                  📓
                </button>
                <button
                  onClick={() => onRemove(item.url)}
                  title="Fjarlægja"
                  className="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors text-sm"
                >
                  ✕
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [items, setItems] = useState([]);
  const [seenUrls, setSeenUrls] = useState(new Set());
  const [saved, setSaved] = useState([]);
  const [filter, setFilter] = useState('all');
  const [showSeen, setShowSeen] = useState(true);
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState('');
  const [error, setError] = useState('');
  const [lastUpdated, setLastUpdated] = useState('');

  useEffect(() => {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        const d = JSON.parse(stored);
        setItems(d.items || []);
        setLastUpdated(d.lastUpdated || '');
      }
    } catch (e) {}
    try {
      const s = localStorage.getItem(SEEN_KEY);
      if (s) setSeenUrls(new Set(JSON.parse(s)));
    } catch (e) {}
    try {
      const sv = localStorage.getItem(SAVED_KEY);
      if (sv) setSaved(JSON.parse(sv));
    } catch (e) {}
  }, []);

  function persist(newItems, newSeen, newSaved) {
    try {
      if (newItems !== undefined) {
        const ts = new Date().toLocaleString('is-IS', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ items: newItems, lastUpdated: ts }));
        setLastUpdated(ts);
      }
      if (newSeen !== undefined) localStorage.setItem(SEEN_KEY, JSON.stringify([...newSeen]));
      if (newSaved !== undefined) localStorage.setItem(SAVED_KEY, JSON.stringify(newSaved));
    } catch (e) {}
  }

  async function runSearch() {
    setLoading(true);
    setError('');
    setStatus('Sæki nýjasta efni...');

    try {
      const resp = await fetch('/.netlify/functions/perplexity', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: 'AI language learning CALL', seenUrls: [...seenUrls].slice(-20) })
      });

      const data = await resp.json();

      if (!resp.ok || data.error) {
        throw new Error(data.error || `HTTP ${resp.status}`);
      }

      const newItems = data.items || [];
      const newSeen = new Set([...seenUrls, ...newItems.map(i => i.url)]);

      setItems(newItems);
      setSeenUrls(newSeen);
      persist(newItems, newSeen, undefined);
      const removed = data.removed || 0;
      const removedText = removed > 0 ? ` (${removed} óvirk hlekk fjarlægð)` : '';
      setStatus(`${newItems.length} niðurstöður fundnar${removedText}`);

    } catch (err) {
      setError(err.message || 'Óþekkt villa');
      setStatus('');
    }

    setLoading(false);
  }

  function markSeen(url) {
    const next = new Set([...seenUrls, url]);
    setSeenUrls(next);
    persist(undefined, next, undefined);
  }

  function toggleSave(item) {
    const idx = saved.findIndex(s => s.url === item.url);
    const next = idx === -1 ? [...saved, item] : saved.filter(s => s.url !== item.url);
    setSaved(next);
    persist(undefined, undefined, next);
  }

  function removeSaved(url) {
    const next = saved.filter(s => s.url !== url);
    setSaved(next);
    persist(undefined, undefined, next);
  }

  const filtered = items.filter(i => {
    if (filter !== 'all' && i.type !== filter) return false;
    if (!showSeen && seenUrls.has(i.url)) return false;
    return true;
  });

  const hotItems = filtered.filter(i => i.hot);
  const normalItems = filtered.filter(i => !i.hot);

  const FILTERS = [
    { key: 'all', label: 'Allt' },
    { key: 'article', label: 'Greinar' },
    { key: 'blog', label: 'Blogg' },
    { key: 'podcast', label: 'Podcast' },
    { key: 'news', label: 'Fréttir' },
    { key: 'video', label: 'Myndbönd' },
  ];

  return (
    <div>
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button
            onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light"
          >
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-1">AI í tungumálakennslu</h1>
          <p className="text-gray-500 text-sm font-light">
            Nýjustu greinar, blogg, podcöst og fréttir um gervigreind í tungumálakennslu
          </p>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-6 py-8">

        {/* Toolbar */}
        <div className="flex items-center justify-between flex-wrap gap-3 mb-5">
          <div className="flex items-center gap-2 flex-wrap">
            {FILTERS.map(f => (
              <button
                key={f.key}
                onClick={() => setFilter(f.key)}
                className={`text-xs px-3 py-1.5 rounded-full border transition-colors font-light
                  ${filter === f.key
                    ? 'bg-gray-800 text-white border-gray-800'
                    : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300'}`}
              >
                {f.label}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <button
              onClick={() => setShowSeen(s => !s)}
              className="text-xs text-gray-500 hover:text-gray-700 font-light underline underline-offset-2"
            >
              {showSeen ? 'Fela séð efni' : 'Sýna séð efni'}
            </button>
            <button
              onClick={runSearch}
              disabled={loading}
              className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm"
            >
              {loading
                ? <><span className="inline-block spin">↻</span> Leitar...</>
                : <>↻ Leita að nýju</>
              }
            </button>
          </div>
        </div>

        {/* Status */}
        {(status || lastUpdated) && !error && (
          <div className="text-xs text-gray-500 font-light mb-4 flex items-center gap-3">
            {lastUpdated && <span>Síðast uppfært: {lastUpdated}</span>}
            {status && <span className="text-green-600">{status}</span>}
          </div>
        )}

        {/* Error */}
        {error && (
          <div className="bg-red-50 border border-red-200 rounded-xl p-4 mb-5 fade-in">
            <p className="text-sm font-medium text-red-700 mb-1">Villa við leit</p>
            <p className="text-xs text-red-600 font-light">{error}</p>
          </div>
        )}

        {/* Skeletons */}
        {loading && (
          <div className="flex flex-col gap-3">
            {[1,2,3,4].map(i => <SkeletonCard key={i} />)}
          </div>
        )}

        {/* Results */}
        {!loading && items.length > 0 && (
          <div>
            {hotItems.length > 0 && (
              <div className="mb-5">
                <h2 className="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3">
                  🔥 Mikið í umræðunni
                </h2>
                <div className="flex flex-col gap-3">
                  {hotItems.map(item => (
                    <FeedCard
                      key={item.url}
                      item={item}
                      isSeen={seenUrls.has(item.url)}
                      isSaved={saved.some(s => s.url === item.url)}
                      onMarkSeen={markSeen}
                      onToggleSave={toggleSave}
                    />
                  ))}
                </div>
              </div>
            )}

            {normalItems.length > 0 && (
              <div>
                {hotItems.length > 0 && (
                  <h2 className="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3 mt-6">
                    Nýtt efni
                  </h2>
                )}
                <div className="flex flex-col gap-3">
                  {normalItems.map(item => (
                    <FeedCard
                      key={item.url}
                      item={item}
                      isSeen={seenUrls.has(item.url)}
                      isSaved={saved.some(s => s.url === item.url)}
                      onMarkSeen={markSeen}
                      onToggleSave={toggleSave}
                    />
                  ))}
                </div>
              </div>
            )}

            {filtered.length === 0 && (
              <div className="text-center py-16 text-gray-400 font-light">
                Engar niðurstöður með völdum síum.
              </div>
            )}
          </div>
        )}

        {/* Empty state */}
        {!loading && items.length === 0 && !error && (
          <div className="text-center py-20">
            <div className="text-4xl mb-4">🔍</div>
            <p className="text-gray-500 font-light mb-6">
              Ýttu á "Leita að nýju" til að sækja nýjasta efni um AI í tungumálakennslu.
            </p>
            <button
              onClick={runSearch}
              className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
            >
              Byrja leit
            </button>
          </div>
        )}

        {/* Saved list */}
        <SavedList saved={saved} onRemove={removeSaved} />

      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
