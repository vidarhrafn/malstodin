/* ===== Saumsregla: finndu lengsta gilt orð sem liggur yfir saum [L|R] ===== */

/* Skot á index k → fjarlægja, leita yfir saum, keðjuverkun */

    const chars = arr.map(b => b.ch);
    const span = findSpanningWord(chars, seamL, seamR);
    if (!span) break;
    const [i, j] = span;
    const word = chars.slice(i, j + 1).join('');

    gained += wordScore(word) * combo;

      mult: combo
    });

    cleared,
