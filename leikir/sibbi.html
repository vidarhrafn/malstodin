<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>🎨 Teiknileikur – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes wordPop {
      0% { opacity: 0; transform: scale(0.7); }
      70% { transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    .word-pop { animation: wordPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
    .timer-pulse { animation: timerPulse 0.8s ease infinite; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// *** BREYTA ÞESSARI LÍNU FYRIR HVERN KENNARA ***
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIWZ_KvPXvkJWrxv4NG7uzJofd4u1q5aH4tk6xUDVcB6Bqqr273ihEw7CEsMN_rye-xgNyiZHlDy95/pub?gid=0&single=true&output=tsv';

// Sjálfgefin orðalisti ef ekki næst í Sheets
const FALLBACK_WORDS = [
  'hundur','köttur','fiskur','fugl','hús','bíll','reiðhjól','bátur',
  'sól','stjarna','tungl','ský','tré','blóm','gras','steinn',
  'bók','blýantur','stóll','borð','rúm','hurð','gluggi',
  'hattur','skór','buxur','skyrta','kjóll',
  'epli','banani','appelsína','brauð','mjólk','kaffi',
  'bolti','tölva','sími','sjónvarp','úr','lykill',
  'töska','diskur','glas','hnífur','gaffall','skeið'
];

// --- Hjálparfall: sækja orð úr Netlify function ---
async function fetchWords() {
  try {
    const r = await fetch('/.netlify/functions/get-words', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetUrl: SHEET_URL })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.words && data.words.length > 0) return data.words;
    return FALLBACK_WORDS;
  } catch (e) {
    console.warn('Gat ekki sótt orð úr Sheets, nota sjálfgefin orð:', e.message);
    return FALLBACK_WORDS;
  }
}

// --- Aðalforritið ---
function App() {
  const [screen, setScreen] = useState('ready'); // ready | playing | done | success
  const [words, setWords] = useState(FALLBACK_WORDS);
  const [usedWords, setUsedWords] = useState([]);
  const [currentWord, setCurrentWord] = useState('');
  const [timeLeft, setTimeLeft] = useState(60);
  const [usingSheets, setUsingSheets] = useState(false);
  const [loadingWords, setLoadingWords] = useState(true);
  const timerRef = useRef(null);

  // Sækja orð við upphaf
  useEffect(() => {
    fetchWords().then(fetched => {
      const isSheets = JSON.stringify(fetched) !== JSON.stringify(FALLBACK_WORDS);
      setWords(fetched);
      setUsingSheets(isSheets);
      setLoadingWords(false);
    });
  }, []);

  const getNextWord = useCallback((currentUsed, wordList) => {
    let pool = currentUsed.length >= wordList.length
      ? wordList
      : wordList.filter(w => !currentUsed.includes(w));
    return pool[Math.floor(Math.random() * pool.length)];
  }, []);

  const stopTimer = useCallback(() => {
    if (timerRef.current) {
      clearInterval(timerRef.current);
      timerRef.current = null;
    }
  }, []);

  const startTimer = useCallback(() => {
    stopTimer();
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          stopTimer();
          setScreen('done');
          return 0;
        }
        return t - 1;
      });
    }, 1000);
  }, [stopTimer]);

  const startGame = useCallback(() => {
    const newUsed = usedWords.length >= words.length ? [] : usedWords;
    const word = getNextWord(newUsed, words);
    setCurrentWord(word);
    setUsedWords([...newUsed, word]);
    setTimeLeft(60);
    setScreen('playing');
    startTimer();
  }, [words, usedWords, getNextWord, startTimer]);

  const handleSuccess = useCallback(() => {
    stopTimer();
    setScreen('success');
  }, [stopTimer]);

  const handleNext = useCallback(() => {
    stopTimer();
    startGame();
  }, [stopTimer, startGame]);

  const handleBack = useCallback(() => {
    stopTimer();
    setScreen('ready');
    setUsedWords([]);
  }, [stopTimer]);

  useEffect(() => () => stopTimer(), [stopTimer]);

  // Litir á tíma
  const timerColor = timeLeft <= 10
    ? 'text-red-500'
    : timeLeft <= 20
    ? 'text-orange-500'
    : 'text-green-600';

  const timerAnimate = timeLeft <= 10 ? 'timer-pulse' : '';

  return (
    <div className="min-h-screen flex flex-col">
      {/* Header */}
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-2xl mx-auto px-6 py-6">
          <button
            onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light"
          >
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-1">🎨 Teiknileikur</h1>
          <div className="flex items-center gap-2">
            <p className="text-gray-500 text-sm font-light">
              Teiknaðu orðið – félagi þinn giskar!
            </p>
            {!loadingWords && (
              <span className={`text-xs px-2 py-0.5 rounded-full font-light ${
                usingSheets
                  ? 'bg-green-50 text-green-700 border border-green-200'
                  : 'bg-gray-100 text-gray-500 border border-gray-200'
              }`}>
                {usingSheets ? `✓ ${words.length} orð úr töflu` : `${words.length} orð (sjálfgefin)`}
              </span>
            )}
          </div>
        </div>
      </header>

      {/* Aðalsvæði */}
      <main className="flex-1 flex items-center justify-center px-6 py-8">
        <div className="w-full max-w-sm">

          {/* Tilbúið */}
          {screen === 'ready' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center fade-in">
              <div className="text-6xl mb-6">🎨</div>
              {loadingWords ? (
                <p className="text-gray-400 font-light text-sm mb-6">Sæki orðalista...</p>
              ) : (
                <p className="text-gray-500 font-light mb-6 leading-relaxed">
                  Ýttu á hnappinn til að fá orð.<br/>
                  Teiknaðu – félagi giskar!
                </p>
              )}
              <button
                onClick={startGame}
                disabled={loadingWords}
                className="w-full px-6 py-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-lg"
              >
                Fá orð
              </button>
            </div>
          )}

          {/* Í leik */}
          {screen === 'playing' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center fade-in">
              <div className="word-pop">
                <p className="text-5xl font-semibold text-gray-900 mb-2 tracking-tight">
                  {currentWord}
                </p>
              </div>
              <p className="text-xs text-gray-400 font-light mb-8">Teiknaðu þetta!</p>

              <div className={`text-7xl font-bold mb-8 ${timerColor} ${timerAnimate}`}
                   style={{ fontVariantNumeric: 'tabular-nums' }}>
                {timeLeft}
              </div>

              <div className="flex flex-col gap-3">
                <button
                  onClick={handleSuccess}
                  className="w-full px-6 py-4 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-lg"
                >
                  ✓ Félagi giskaði rétt!
                </button>
                <button
                  onClick={handleNext}
                  className="w-full px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light"
                >
                  → Næsta orð
                </button>
                <button
                  onClick={handleBack}
                  className="w-full px-6 py-2 text-gray-400 hover:text-gray-600 transition-colors font-light text-sm"
                >
                  Hætta
                </button>
              </div>
            </div>
          )}

          {/* Tíminn rann út */}
          {screen === 'done' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center fade-in">
              <div className="text-5xl mb-4">⏰</div>
              <p className="text-xl font-light text-gray-700 mb-2">Tíminn er búinn!</p>
              <p className="text-sm text-gray-400 font-light mb-8">
                Orðið var: <span className="font-medium text-gray-600">{currentWord}</span>
              </p>
              <div className="flex flex-col gap-3">
                <button
                  onClick={handleNext}
                  className="w-full px-6 py-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-lg"
                >
                  Fá nýtt orð
                </button>
                <button
                  onClick={handleBack}
                  className="w-full px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light"
                >
                  Til baka
                </button>
              </div>
            </div>
          )}

          {/* Vel gert! */}
          {screen === 'success' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center fade-in">
              <div className="text-5xl mb-4">🎉</div>
              <p className="text-xl font-light text-green-700 mb-1">Vel gert!</p>
              <p className="text-sm text-gray-400 font-light mb-8">
                Orðið var: <span className="font-medium text-gray-600">{currentWord}</span>
              </p>
              <div className="flex flex-col gap-3">
                <button
                  onClick={handleNext}
                  className="w-full px-6 py-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-lg"
                >
                  Næsta orð
                </button>
                <button
                  onClick={handleBack}
                  className="w-full px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light"
                >
                  Til baka
                </button>
              </div>
            </div>
          )}

          {/* Framvinduteljari */}
          {screen !== 'ready' && (
            <p className="text-center text-xs text-gray-400 font-light mt-4">
              {usedWords.length}/{words.length} orð notuð
            </p>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
