    :root {

      --track-dark: #93c5fd;
      --blue: #2563eb;
      --green: #16a34a;
      --rose: #e11d48;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(to bottom, #f8f7f4, #e8e6e1);
      min-height: 100vh;
    }
    .font-lightish { font-weight: 300; }
    .game-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(229,231,235,0.95);
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
      border-radius: 1.25rem;
    }
    .letter-node {
      cursor: pointer;
      transition: transform 420ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease, filter 160ms ease;
      filter: drop-shadow(0 5px 8px rgba(15,23,42,.14));
    }
    .letter-node:hover { filter: drop-shadow(0 8px 12px rgba(37,99,235,.24)); }
    .letter-node circle.main { transition: fill 160ms ease, stroke 160ms ease, transform 160ms ease; }
    .letter-node:hover circle.main { transform: scale(1.08); transform-origin: center; }
    .letter-node text { pointer-events: none; user-select: none; }
    .track-line {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .shot-line {
      stroke: #2563eb;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 10 12;
      animation: dash 260ms linear infinite, fadeShot 360ms ease forwards;
      filter: drop-shadow(0 0 7px rgba(37,99,235,.55));
    }
    .shot-dot {
      fill: #2563eb;
      animation: pulseDot 360ms ease forwards;
    }
    @keyframes dash { to { stroke-dashoffset: -22; } }
    @keyframes fadeShot { 0% { opacity: .15; } 30% { opacity: .95; } 100% { opacity: 0; } }
    @keyframes pulseDot { 0% { r: 4; opacity: .2; } 45% { r: 11; opacity: .95; } 100% { r: 18; opacity: 0; } }
    .soft-grid {
      background-image: radial-gradient(rgba(37,99,235,.12) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .45rem;
      border-radius: .85rem; padding: .65rem .9rem; font-weight: 500;
      transition: transform 130ms ease, opacity 130ms ease, box-shadow 130ms ease, background 130ms ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: #2563eb; color: white; box-shadow: 0 7px 18px rgba(37,99,235,.25); }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-green { background: #16a34a; color: white; box-shadow: 0 7px 18px rgba(22,163,74,.22); }
    .btn-green:hover { background: #15803d; }
    .btn-light { background: white; color: #334155; border: 1px solid #e5e7eb; }
    .btn-light:hover { background: #f8fafc; }
    .btn-danger { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .btn-danger:hover { background: #ffe4e6; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    .pill { border-radius: 999px; padding: .18rem .55rem; font-size: .75rem; border: 1px solid #e5e7eb; background: white; }
    .win-pop { animation: popIn 260ms cubic-bezier(.2,.9,.3,1.15); }
    @keyframes popIn { from { transform: scale(.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    details summary { cursor: pointer; }

    const DISTRACTORS = Array.from("arstulinðkemfgáóæhíúbdopvýjyöéþx");
    const TRACK_D = "M 68 92 C 185 28, 356 45, 460 118 C 566 192, 430 245, 276 190 C 112 132, 72 326, 220 386 C 390 455, 486 292, 620 275 C 778 256, 870 370, 744 466 C 628 555, 450 488, 340 438";

    function normaliseWord(value) {
      return (value || "").toLocaleLowerCase("is-IS").replace(/\s+/g, "").trim();
    }

    function upperIS(value) {
      return (value || "").toLocaleUpperCase("is-IS");
    }

    function scoreWord(word) {
      return Array.from(normaliseWord(word)).reduce((sum, ch) => sum + (STAFGILDI[ch] || 0), 0);
    }

    function makeLetters(chain) {
      return Array.from(normaliseWord(chain)).map((ch, idx) => ({
        id: `${Date.now()}-${Math.random().toString(36).slice(2)}-${idx}`,
        ch
      }));
    }

    function chainText(letters) {
      return letters.map(l => l.ch).join("");
    }

    function weightedDistractor(index) {
      // Algengir stafir koma oftar, en sjaldgæfir birtast stundum til að gera borð skemmtilegri.
      const common = Array.from("arstulinðkemfgáó");
      if (index % 7 === 0) return DISTRACTORS[(index * 5 + 3) % DISTRACTORS.length];
      return common[(index * 11 + 2) % common.length];
    }

    function makeSolvableChain(targetWord, noise = 4) {
      const chars = Array.from(normaliseWord(targetWord));
      const out = [];
      let added = 0;
      chars.forEach((ch, i) => {
        if (added < noise && (i === 0 || i % 2 === 1)) {
          out.push(weightedDistractor(i + added));
          added++;
        }
        out.push(ch);
        if (added < noise && i % 3 === 2) {
          out.push(weightedDistractor(i + added + 9));
          added++;
        }
      });
      while (added < noise) {
        out.splice(Math.min(out.length, 1 + added * 2), 0, weightedDistractor(added + 17));
        added++;
      }
      return out.join("");
    }

    function App() {
      const wordMap = useMemo(() => new Map(WORD_ENTRIES.map(e => [normaliseWord(e.word), e])), []);
      const wordSet = useMemo(() => new Set(WORD_ENTRIES.map(e => normaliseWord(e.word))), []);
      const themes = useMemo(() => ["öll", ...Array.from(new Set(WORD_ENTRIES.map(e => e.theme))).sort((a,b) => a.localeCompare(b, "is"))], []);

      const [levelIndex, setLevelIndex] = useState(0);
      const [customLevel, setCustomLevel] = useState(null);
      const currentLevel = customLevel || LEVELS[levelIndex];

      const [letters, setLetters] = useState(() => makeLetters(currentLevel.chain));
      const [history, setHistory] = useState([]);
      const [totalScore, setTotalScore] = useState(0);
      const [foundWords, setFoundWords] = useState([]);
      const [hintOpen, setHintOpen] = useState(false);
      const [shot, setShot] = useState(null);
      const [isMoving, setIsMoving] = useState(true);
      const [drift, setDrift] = useState(0);
      const [teacherTheme, setTeacherTheme] = useState("skóli");
      const [teacherNoise, setTeacherNoise] = useState(4);
      const [teacherMessage, setTeacherMessage] = useState("");
      const [lastAction, setLastAction] = useState("Smelltu á staf til að skjóta hann burt.");

      const pathRef = useRef(null);
      const [positions, setPositions] = useState([]);

      useEffect(() => {
        setLetters(makeLetters(currentLevel.chain));
        setHistory([]);
        setHintOpen(false);
        setShot(null);
        setLastAction("Nýtt borð. Finndu íslenskt orð með því að fjarlægja truflandi stafi.");
      }, [currentLevel.title, currentLevel.chain]);

      useEffect(() => {
        if (!isMoving) return;
        const timer = setInterval(() => setDrift(d => d + 0.035), 90);
        return () => clearInterval(timer);
      }, [isMoving]);

      useLayoutEffect(() => {
        const path = pathRef.current;
        if (!path || letters.length === 0) {
          setPositions([]);
          return;
        }
        const total = path.getTotalLength();
        const n = letters.length;
        const maxSpan = total * 0.74;
        const spacing = n <= 1 ? 0 : Math.min(58, maxSpan / Math.max(n - 1, 1));
        const driftLen = Math.sin(drift) * 18;
        const start = total * 0.105 + driftLen;
        const pts = letters.map((_, i) => {
          const p = path.getPointAtLength(Math.max(0, Math.min(total, start + i * spacing)));
          return { x: p.x, y: p.y };
        });
        setPositions(pts);
      }, [letters, drift]);

      const currentWord = chainText(letters);
      const normalizedCurrent = normaliseWord(currentWord);
      const validNow = normalizedCurrent.length >= 3 && wordSet.has(normalizedCurrent);
      const currentEntry = wordMap.get(normalizedCurrent);
      const currentScore = scoreWord(normalizedCurrent);
      const targetBest = (currentLevel.targets || []).slice().sort((a,b) => scoreWord(b) - scoreWord(a))[0];

      function shootLetter(index) {
        if (shot || letters.length <= 1) return;
        const target = positions[index] || CENTER;
        setShot({ from: CENTER, to: target, key: `${Date.now()}-${index}` });
        const before = letters;
        const removed = letters[index];
        setLastAction(`Skotið á ${upperIS(removed.ch)}.`);
        setTimeout(() => {
          setHistory(h => [...h, before]);
          setLetters(prev => prev.filter((_, i) => i !== index));
        }, 170);
        setTimeout(() => setShot(null), 390);
      }

      function undo() {
        setHistory(h => {
          if (!h.length) return h;
          const previous = h[h.length - 1];
          setLetters(previous);
          setLastAction("Síðasta skot var afturkallað.");
          return h.slice(0, -1);
        });
      }

      function resetLevel() {
        setLetters(makeLetters(currentLevel.chain));
        setHistory([]);
        setHintOpen(false);
        setLastAction("Borðið var endurræst.");
      }

      function finishLevel() {
        if (!validNow) return;
        const word = normalizedCurrent;
        const entry = wordMap.get(word);
        const score = scoreWord(word);
        setTotalScore(s => s + score);
        setFoundWords(list => [{ word, score, entry, level: currentLevel.title }, ...list].slice(0, 12));
        setLastAction(`Þú kláraðir borðið með orðinu ${upperIS(word)} og fékkst ${score} stig.`);
        if (customLevel) {
          setTeacherMessage(`Æfiborð klárað með orðinu ${upperIS(word)}.`);
          resetLevel();
          return;
        }
        if (levelIndex < LEVELS.length - 1) {
          setLevelIndex(i => i + 1);
        } else {
          setLevelIndex(0);
        }
      }

      function nextLevel() {
        if (customLevel) {
          setCustomLevel(null);
          return;
        }
        setLevelIndex(i => (i + 1) % LEVELS.length);
      }

      function buildTeacherLevel() {
        const pool = WORD_ENTRIES.filter(e => teacherTheme === "öll" || e.theme === teacherTheme);
        const candidates = pool.filter(e => normaliseWord(e.word).length >= 4);
        if (!candidates.length) return;
        const pick = candidates[(Date.now() + candidates.length + teacherNoise) % candidates.length];
        const chain = makeSolvableChain(pick.word, Number(teacherNoise));
        setCustomLevel({
          title: `Kennaraborð: ${upperIS(pick.word)}`,
          theme: pick.theme,
          chain,
          targets: [pick.word],
          hint: `Markorðið er ${upperIS(pick.word)}. Það er ${pick.pos} úr þemanu „${pick.theme}“ (${pick.level}).`,
          note: "Þetta borð var búið til með því að velja fyrst markorð og flétta truflandi stöfum inn í það."
        });
        setTeacherMessage(`Búið til borð úr orðinu ${upperIS(pick.word)}.`);
      }

      return (
        <main className="max-w-7xl mx-auto px-4 py-6 md:py-10">
          <header className="mb-6 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
            <div>
              <div className="inline-flex items-center gap-2 pill text-blue-700 border-blue-100 bg-blue-50 mb-3">
                <span>✦</span><span>Íslenskur orðaleikur í anda Zuma</span>
              </div>
              <h1 className="text-3xl md:text-5xl font-lightish tracking-tight text-slate-800">Stafalækur</h1>
              <p className="text-slate-600 mt-2 max-w-2xl leading-relaxed">
                Skjóttu burt truflandi stafi. Keðjan lokast saman. Þegar stafirnir sem eftir standa mynda gilt íslenskt orð geturðu klárað borðið.
              </p>
            </div>
            <div className="game-card px-4 py-3 flex items-center gap-4">
              <div>
                <div className="text-xs text-slate-500 uppercase tracking-wide">Heildarstig</div>
                <div className="text-3xl font-lightish text-blue-700">{totalScore}</div>
              </div>
              <div className="h-10 w-px bg-slate-200" />
              <div>
                <div className="text-xs text-slate-500 uppercase tracking-wide">Orð fundin</div>
                <div className="text-3xl font-lightish text-green-700">{foundWords.length}</div>
              </div>
            </div>
          </header>

          <section className="grid grid-cols-1 lg:grid-cols-[1fr_390px] gap-6 items-start">
            <div className="game-card overflow-hidden">
              <div className="px-5 py-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div>
                  <h2 className="text-xl font-lightish text-slate-800">
                    {customLevel ? "Æfiborð" : `Borð ${levelIndex + 1}/${LEVELS.length}`}: {currentLevel.title}
                  </h2>
                  <p className="text-sm text-slate-500">Þema: {currentLevel.theme} · Stafir eftir: {letters.length}</p>
                </div>
                <div className="flex flex-wrap gap-2">
                  <span className="pill">Rólegt púsl</span>
                  <span className="pill">Enginn tímamælir</span>
                  <span className="pill">Beygingarmyndir gildar</span>
                </div>
              </div>

              <div className="relative soft-grid bg-slate-50/80">
                <svg viewBox="0 0 960 560" className="w-full h-auto block" aria-label="Braut með bókstöfum">
                  <defs>
                    <linearGradient id="trackGrad" x1="0" x2="1" y1="0" y2="1">
                      <stop offset="0%" stopColor="#bfdbfe" />
                      <stop offset="100%" stopColor="#ddd6fe" />
                    </linearGradient>
                    <radialGradient id="orbGrad" cx="35%" cy="30%" r="70%">
                      <stop offset="0%" stopColor="#ffffff" />
                      <stop offset="100%" stopColor="#dbeafe" />
                    </radialGradient>
                  </defs>

                  <path d={TRACK_D} className="track-line" stroke="rgba(30,64,175,.12)" strokeWidth="44" />
                  <path d={TRACK_D} className="track-line" stroke="url(#trackGrad)" strokeWidth="28" />
                  <path ref={pathRef} d={TRACK_D} className="track-line" stroke="rgba(255,255,255,.72)" strokeWidth="4" />

                  <g transform={`translate(${CENTER.x},${CENTER.y})`}>
                    <circle r="56" fill="white" stroke="#dbeafe" strokeWidth="3" filter="drop-shadow(0 10px 18px rgba(15,23,42,.12))" />
                    <circle r="35" fill="#eff6ff" stroke="#bfdbfe" />
                    <text y="-2" textAnchor="middle" dominantBaseline="middle" fontSize="22" fontWeight="700" fill="#2563eb">Mímir</text>
                    <text y="22" textAnchor="middle" dominantBaseline="middle" fontSize="11" fill="#64748b">smelltu á staf</text>
                  </g>

                  {shot && (
                    <g key={shot.key}>
                      <line className="shot-line" x1={shot.from.x} y1={shot.from.y} x2={shot.to.x} y2={shot.to.y} />
                      <circle className="shot-dot" cx={shot.to.x} cy={shot.to.y} r="4" />
                    </g>
                  )}

                  {letters.map((letter, index) => {
                    const p = positions[index] || { x: 0, y: 0 };
                    const val = STAFGILDI[letter.ch] || 0;
                    const selected = validNow;
                    return (
                      <g key={letter.id} className="letter-node" transform={`translate(${p.x},${p.y})`} onClick={() => shootLetter(index)} role="button" aria-label={`Skjóta stafnum ${upperIS(letter.ch)}`}>
                        <circle className="main" r="28" fill={selected ? "#dcfce7" : "url(#orbGrad)"} stroke={selected ? "#16a34a" : "#93c5fd"} strokeWidth="2" />
                        <text y="3" textAnchor="middle" dominantBaseline="middle" fontSize="28" fontWeight="700" fill="#1e3a8a">{upperIS(letter.ch)}</text>
                        <circle cx="20" cy="20" r="10" fill="white" stroke="#dbeafe" />
                        <text x="20" y="21" textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill="#64748b">{val}</text>
                      </g>
                    );
                  })}
                </svg>
              </div>

              <div className="px-5 py-4 border-t border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div className="text-sm text-slate-600">{lastAction}</div>
                <div className="flex flex-wrap gap-2">
                  <button className="btn btn-light" onClick={() => setIsMoving(m => !m)}>{isMoving ? "Stöðva mjúka hreyfingu" : "Kveikja á hreyfingu"}</button>
                  <button className="btn btn-light" onClick={undo} disabled={!history.length}>Afturkalla</button>
                  <button className="btn btn-danger" onClick={resetLevel}>Endurræsa</button>
                </div>
              </div>
            </div>

            <aside className="space-y-5">
              <div className="game-card p-5">
                <div className="text-xs uppercase tracking-wide text-slate-500 mb-1">Núverandi keðja</div>
                <div className="rounded-xl border border-slate-100 bg-slate-50 px-4 py-3">
                  <div className="text-3xl md:text-4xl tracking-[.18em] font-lightish text-slate-800 break-all">{upperIS(currentWord)}</div>
                  <div className="text-sm text-slate-500 mt-2">Krafla-stig ef þetta er lausn: <strong>{currentScore}</strong></div>
                </div>

                {validNow ? (
                  <div className="win-pop mt-4 rounded-xl border border-green-200 bg-green-50 p-4">
                    <div className="font-medium text-green-800">✓ Gilt íslenskt orð: {upperIS(normalizedCurrent)}</div>
                    {currentEntry && (
                      <p className="text-sm text-green-800/85 mt-1">
                        Grunnmynd: <strong>{currentEntry.lemma}</strong> · {currentEntry.pos} · {currentEntry.level} · {currentEntry.theme}
                      </p>
                    )}
                    <p className="text-sm text-green-900/75 mt-2">Þú getur klárað borðið núna eða haldið áfram að eyða stöfum til að leita að annarri lausn.</p>
                    <button className="btn btn-green w-full mt-3" onClick={finishLevel}>Klára borð og fá {currentScore} stig</button>
                  </div>
                ) : (
                  <div className="mt-4 rounded-xl border border-amber-200 bg-amber-50 p-4 text-sm text-amber-900">
                    Þetta er ekki gilt orð í innbyggða orðalistanum. Haltu áfram að fjarlægja truflandi stafi.
                  </div>
                )}

                <div className="mt-4 flex flex-wrap gap-2">
                  <button className="btn btn-primary flex-1" onClick={() => setHintOpen(h => !h)}>{hintOpen ? "Fela vísbendingu" : "Sýna vísbendingu"}</button>
                  <button className="btn btn-light" onClick={nextLevel}>{customLevel ? "Tilbúin borð" : "Næsta borð"}</button>
                </div>

                {hintOpen && (
                  <div className="mt-4 rounded-xl bg-blue-50 border border-blue-100 p-4 text-sm text-blue-950">
                    <p><strong>Vísbending:</strong> {currentLevel.hint}</p>
                    <p className="mt-2"><strong>Eitt mögulegt markorð:</strong> {upperIS(targetBest || currentLevel.targets?.[0] || "")}</p>
                    <p className="mt-2 text-blue-900/80">{currentLevel.note}</p>
                  </div>
                )}
              </div>

              <div className="game-card p-5">
                <h3 className="text-lg font-lightish text-slate-800 mb-3">Fundin orð</h3>
                {foundWords.length === 0 ? (
                  <p className="text-sm text-slate-500">Engin orð komin enn. Kláraðu fyrsta borðið til að sjá orðasafnið þitt.</p>
                ) : (
                  <div className="space-y-2 max-h-56 overflow-auto pr-1">
                    {foundWords.map((item, idx) => (
                      <div key={`${item.word}-${idx}`} className="rounded-xl border border-slate-100 bg-white px-3 py-2 flex items-center justify-between gap-3">
                        <div>
                          <div className="font-medium text-slate-800">{upperIS(item.word)}</div>
                          <div className="text-xs text-slate-500">{item.entry?.lemma || item.word} · {item.entry?.pos || "orð"}</div>
                        </div>
                        <div className="text-blue-700 font-semibold">{item.score}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="game-card p-5">
                <h3 className="text-lg font-lightish text-slate-800 mb-2">Kennarastillingar</h3>
                <p className="text-sm text-slate-600 mb-4">Veldu þema og smíðaðu leysanlegt æfiborð úr markorði. Þetta sýnir hvernig hægt væri að tengja leikinn við kaflaorðaforða.</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <label className="text-sm">
                    <span className="block text-slate-500 mb-1">Þema</span>
                    <select className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2" value={teacherTheme} onChange={e => setTeacherTheme(e.target.value)}>
                      {themes.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </label>
                  <label className="text-sm">
                    <span className="block text-slate-500 mb-1">Truflandi stafir</span>
                    <select className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2" value={teacherNoise} onChange={e => setTeacherNoise(e.target.value)}>
                      {[2,3,4,5,6,7].map(n => <option key={n} value={n}>{n}</option>)}
                    </select>
                  </label>
                </div>
                <button className="btn btn-primary w-full mt-3" onClick={buildTeacherLevel}>Búa til æfiborð</button>
                {teacherMessage && <p className="text-sm text-green-700 mt-3">{teacherMessage}</p>}
              </div>

              <div className="game-card p-5">
                <details>
                  <summary className="text-lg font-lightish text-slate-800">Hönnunarákvarðanir</summary>
                  <div className="mt-3 text-sm text-slate-600 leading-relaxed space-y-3">
                    <p><strong>Orðastaðfesting:</strong> Frumgerðin notar innbyggðan orðmyndalista með grunnmynd, orðflokki, stigi og þema. Þetta er áreiðanlegt í lítilli kennsluútgáfu, en takmarkað. Í fullri útgáfu ætti að skipta listanum út fyrir BÍN eða stóran JSON-lista af íslenskum orðmyndum.</p>
                    <p><strong>Braut:</strong> Ég valdi hlykkjótta „orðalækjar“-braut frekar en lokaðan hring. Hún er rólegri, læsileg og minnir á að stafirnir flæði í lesröð. Mjúk hreyfing gefur Zuma-tilfinningu án tímpressu.</p>
                    <p><strong>Kennslugildi:</strong> Borðin fela beygingarmyndir, orðfjölskyldur og þemu. Nemandi sér grunnmynd og orðflokk þegar hann finnur gilt orð. Kennari getur smíðað æfiborð úr þemaorðum.</p>
                    <p><strong>Stig:</strong> Stig eru nákvæmlega summa Krafla-stafagilda í orðinu. Þannig gefa lengri orð og sjaldgæfari stafir meira án þess að flækja reglurnar.</p>
                  </div>
                </details>
              </div>
            </aside>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
