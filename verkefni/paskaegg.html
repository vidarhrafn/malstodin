// ── Shuffle ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Hópatildeiling: einn af hverju stigi, extra úr fjölmennasta ──────────────
//
// Reiknirit:
// 1. Stokka hvern bekk fyrir sig
// 2. Finna hve marga hópa þarf (= stærsti bekkurinn)
// 3. Fylla hópa með round-robin yfir bekki
// 4. Þegar listi bekkjar klárast → endurræsa hann (stokkaðan aftur)
//    en merkja viðkomandi sem "tvítekin" svo sjáist í útliti
//
function makeGroups(mættPerBekkur) {
  // mættPerBekkur: [{ id, heiti, litir, nemendur:[] }]
  // Búa til stokkaðar raðir
  const queues = mættPerBekkur.map(b => ({
    ...b,
    queue: shuffle([...b.nemendur]),
    extra: []   // þeir sem koma inn í annað sinn
  }));

  const totalMætt = queues.reduce((s, b) => s + b.nemendur.length, 0);
  const fjoldiHopa = Math.ceil(totalMætt / queues.length);

  const groups = Array.from({ length: fjoldiHopa }, () => []);

  // Round 1: einn af hverjum bekk í hvern hóp
  queues.forEach(b => {
    b.queue.forEach((nafn, i) => {
      if (i < fjoldiHopa) groups[i].push({ nafn, litir: b.litir, heiti: b.heiti, extra: false });
    });
    // Það sem er umfram fjoldiHopa fer í extra pool
    b.overflow = b.queue.slice(fjoldiHopa);
  });

  // Round 2: dreifa umframnemendum (4. stig o.fl.) jafnt yfir hópana
  const overflow = [];
  queues.forEach(b => {
    b.overflow.forEach(nafn => overflow.push({ nafn, litir: b.litir, heiti: b.heiti, extra: true }));
  });
  shuffle(overflow).forEach((nem, i) => {
    groups[i % fjoldiHopa].push(nem);
  });

  return groups.filter(g => g.length > 0);
}

// ── NemandaKort í mætingarlista ──────────────────────────────────────────────
function NemandaKort({ nafn, mættur, litir, onClick }) {
  const btnCls = 'w-full text-left px-3 py-2 rounded-lg border transition-all duration-150 flex items-center gap-2.5 '
    + (!mættur ? 'bg-red-50 border-red-200' : litir.bg + ' ' + litir.border);
  const dotCls = 'w-1.5 h-1.5 rounded-full flex-shrink-0 ' + (!mættur ? 'bg-red-300' : litir.dot);
  const nameCls = 'text-sm font-light flex-1 ' + (!mættur ? 'line-through text-red-400' : litir.text);
  return (
    <button onClick={onClick} className={btnCls}>
      <span className={dotCls} />
      <span className={nameCls}>{nafn}</span>
      {!mættur && <span className="text-xs text-red-400 font-light">fjarverandi</span>}
    </button>
  );
}

// ── Meðlimur í hópakorti ─────────────────────────────────────────────────────
function HópaМeðlimur({ nem }) {
  const rowCls = 'flex items-center gap-2 px-2.5 py-1.5 rounded-lg border '
    + nem.litir.bg + ' ' + nem.litir.border
    + (nem.extra ? ' ring-1 ring-orange-300' : '');
  return (
    <div className={rowCls}>
      <span className={'w-1.5 h-1.5 rounded-full flex-shrink-0 ' + nem.litir.dot} />
      <span className={'text-sm font-light flex-1 ' + nem.litir.text}>{nem.nafn}</span>
      <span className={'text-xs font-light opacity-60 ' + nem.litir.text}>{nem.heiti}</span>
      {nem.extra && <span className="text-xs text-orange-500" title="Tveir af sama stigi">+</span>}
    </div>
  );
}

function HópaKort({ hópur, nr, delay }) {
  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 pop-in"
         style={{ animationDelay: delay + 'ms' }}>
      <div className="flex items-center gap-2 mb-3">
        <span className="w-7 h-7 rounded-full bg-blue-600 text-white text-sm flex items-center justify-center font-medium">{nr}</span>
        <span className="text-xs text-gray-400 font-light">{hópur.length} meðlimir</span>
      </div>
      <div className="space-y-1.5">
        {hópur.map((nem, i) => <HópaМeðlimur key={i} nem={nem} />)}
      </div>
    </div>
  );
}

// ── Mætingarlisti fyrir einn bekk ────────────────────────────────────────────
function BekkirListi({ bekkirnir, fjarverandi, onToggle }) {
  return (
    <div className="space-y-4">
      {bekkirnir.map(b => {
        const fjarCount = b.nemendur.filter(n => fjarverandi[b.id + ':' + n]).length;
        return (
          <div key={b.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className={'flex items-center justify-between px-4 py-2.5 border-b ' + b.litir.bg + ' ' + b.litir.border}>
              <div className="flex items-center gap-2">
                <span className={'w-2 h-2 rounded-full ' + b.litir.dot} />
                <span className={'font-medium text-sm ' + b.litir.text}>{b.heiti}</span>
              </div>
              <span className={'text-xs font-light ' + b.litir.text + ' opacity-70'}>
                {fjarCount > 0 ? fjarCount + ' fjarverandi · ' : ''}{b.nemendur.length - fjarCount} mætt
              </span>
            </div>
            <div className="p-3 grid grid-cols-1 sm:grid-cols-2 gap-1.5">
              {b.nemendur.map(nafn => {
                const key = b.id + ':' + nafn;
                return (
                  <NemandaKort key={nafn} nafn={nafn} mættur={!fjarverandi[key]}
                    litir={b.litir} onClick={() => onToggle(key)} />
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Aðalforrit ───────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('lista');
  const [fjarverandi, setFjarverandi] = useState({});
  const [hópar, setHópar] = useState(null);

  const toggle = useCallback((key) => {
    setFjarverandi(prev => ({ ...prev, [key]: !prev[key] }));
    setHópar(null);
  }, []);

  const hrista = () => {
    const mættPerBekkur = BEKKIRNIR.map(b => ({
      ...b,
      nemendur: b.nemendur.filter(n => !fjarverandi[b.id + ':' + n])
    })).filter(b => b.nemendur.length > 0);
    const g = makeGroups(mættPerBekkur);
    setHópar(g);
    setView('hopar');
  };

  const totalMætt = BEKKIRNIR.reduce((s, b) =>
    s + b.nemendur.filter(n => !fjarverandi[b.id + ':' + n]).length, 0);
  const totalFjar = BEKKIRNIR.reduce((s, b) =>
    s + b.nemendur.filter(n => fjarverandi[b.id + ':' + n]).length, 0);

  return (
    <div className="min-h-screen">
      <header className="bg-white shadow-sm border-b border-gray-200 no-print">
        <div className="max-w-4xl mx-auto px-6 py-6">
          <h1 className="text-2xl font-light text-gray-800 mb-1">Hópaskipting</h1>
          <p className="text-gray-500 text-sm font-light">Hakaðu við fjarverandi – kerfið setur einn af hverju stigi í hvern hóp</p>
        </div>
      </header>

      <div className="max-w-4xl mx-auto px-6 py-6">
        {/* Aðaltakkastika */}
        <div className="flex flex-wrap items-center gap-3 mb-5 no-print">
          <button onClick={() => setView('lista')}
            className={'px-4 py-2 rounded-lg text-sm font-light transition-colors '
              + (view === 'lista' ? 'bg-blue-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50')}>
            ✓ Mætingarlisti
          </button>
          <button onClick={() => setView('hopar')} disabled={!hópar}
            className={'px-4 py-2 rounded-lg text-sm font-light transition-colors disabled:opacity-40 disabled:cursor-not-allowed '
              + (view === 'hopar' && hópar ? 'bg-blue-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50')}>
            {'👥 Hóparnir' + (hópar ? ' (' + hópar.length + ')' : '')}
          </button>

          <div className="flex-1" />

          <span className="text-sm font-light text-gray-500">
            {totalFjar > 0 && <span><span className="font-medium text-red-600">{totalFjar}</span> fjarverandi · </span>}
            <span className="font-medium text-gray-700">{totalMætt}</span> mætt
          </span>

          <button onClick={hrista} disabled={totalMætt < 2}
            className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm flex items-center gap-2">
            🎲 Hrista hópa
          </button>
        </div>

        {/* Mætingarlisti */}
        {view === 'lista' && (
          <div className="fade-in">
            <BekkirListi bekkirnir={BEKKIRNIR} fjarverandi={fjarverandi} onToggle={toggle} />
          </div>
        )}

        {/* Hóparnir */}
        {view === 'hopar' && hópar && (
          <div className="fade-in">
            <div className="flex items-center justify-between mb-4 no-print">
              <div>
                <p className="text-sm text-gray-500 font-light">
                  <span className="font-medium text-gray-700">{totalMætt}</span> nemendur í{' '}
                  <span className="font-medium text-gray-700">{hópar.length}</span> hópum
                </p>
                <p className="text-xs text-gray-400 font-light mt-0.5">
                  + táknar tvo nemendur af sama stigi í hóp
                </p>
              </div>
              <div className="flex gap-2">
                <button onClick={hrista}
                  className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                  🔄 Hrista aftur
                </button>
                <button onClick={() => window.print()}
                  className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                  🖨️ Prenta
                </button>
              </div>
            </div>

            {/* Stiga­lykill */}
            <div className="flex flex-wrap gap-2 mb-5 no-print">
              {BEKKIRNIR.map(b => (
                <span key={b.id} className={'flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-light border ' + b.litir.bg + ' ' + b.litir.text + ' ' + b.litir.border}>
                  <span className={'w-1.5 h-1.5 rounded-full ' + b.litir.dot} />
                  {b.heiti}
                </span>
              ))}
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {hópar.map((h, i) => <HópaKort key={i} hópur={h} nr={i + 1} delay={i * 50} />)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
