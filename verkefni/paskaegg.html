<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hópaskipting – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.88); }
      70%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
    .pop-in { animation: popIn 0.32s ease both; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .pop-in { animation: none !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Gögnin ──────────────────────────────────────────────────────────────────

  {
    id: "stig1",
    heiti: "1. stig",
    litir: { bg: "bg-sky-100", text: "text-sky-800", dot: "bg-sky-500", border: "border-sky-200", tab: "bg-sky-500" },
    nemendur: [
      "Alejandro Vinicio Zurita Bravo","Anthrina Margret M. Baldoza","Bernadeta Iva Ramane",
      "Christabel Boadi","Cong Duc Hoang","Dominiks Panovs","Fahima Jafari","Le Hai Thanh",
      "Mohamed Abdirashid Mohamud","Oleksandra Udovychenko","Paulina Razvanaviciute",
      "Phuc Hung Luong","Quynh Anh Le","Sarwar Babakir","Thi Bich Ngoc Pham",
      "Victoria Jurian","Vitalii Dubovyk"
    ]
  },
  {
    id: "stig2a",
    heiti: "2. stig – hópur 1",
    litir: { bg: "bg-blue-100", text: "text-blue-800", dot: "bg-blue-500", border: "border-blue-200", tab: "bg-blue-500" },
    nemendur: [
      "Abuubakar Isse","Alma Hodi","Amir Ziyad Sharif Safadi","Crishil Atasha Sison Zoilon",
      "Daria Melnyk","Duc Anh Tran","Fabiana Patricia Mendoza Izquier","Filipp Filippov",
      "Gabriel Evaristo Goncalves","Ivan Kvachan","Marian Kamila Hernandez Perez",
      "Mykola Opanasenko","Oscar Jose Gonzalez Bolivar","Roman Korshak",
      "Santiago Daniel Da Silva Walls","Semen Filippov","Valeria Cristina Marin Vielma",
      "Yen Nhi Tang","Yevhenii Mashkovskyi"
    ]
  },
  {
    id: "stig2b",
    heiti: "2. stig – hópur 2",
    litir: { bg: "bg-indigo-100", text: "text-indigo-800", dot: "bg-indigo-500", border: "border-indigo-200", tab: "bg-indigo-500" },
    nemendur: [
      "Anh Tuan Duong","Anh Duc Nguyen","Dinh Hai Anh Ngo","Dmytro Diadenys",
      "Elías Alonso Ramírez Bastidas","Jón Þórir Matthíasson","Juan Luis Lopez Figuera",
      "Marwa Khaled Al Hamada Al Faraj","Phatcharapong Wohanluek","Shekofa Barati",
      "Thuan Tien Nguyen","Tymofii Aheiev","Viktoriia Bilous","Vitalii Rusakov",
      "Yasmin Yancarlet González Albarrán","Yorgleidys W. Ramirez Pulido"
    ]
  },
  {
    id: "stig3",
    heiti: "3. stig",
    litir: { bg: "bg-violet-100", text: "text-violet-800", dot: "bg-violet-500", border: "border-violet-200", tab: "bg-violet-500" },
    nemendur: [
      "Abdul Khaliq Naseri","Aden Mohamud Ahmed","Ahmad Seyar Jamali","Ayah Alhammadah",
      "Bao Gia Trinh","Israe Qandyl","Malak Khaled Al Hamada Al Faraj","Mariuss Janitens",
      "Mikolaj Gminski","Minh Quang Nguyen","Nga Thuy Pham","Paulina Batarunaite",
      "Rami Charaf Din Nassr","Renato Egoavil Taboada","Shakib ahmed Ismail",
      "Valentina Del Carmen I. Garcia","Wasim Omran","Yelyzaveta Bilous"
    ]
  },
  {
    id: "stig4",
    heiti: "4. stig",
    litir: { bg: "bg-purple-100", text: "text-purple-800", dot: "bg-purple-500", border: "border-purple-200", tab: "bg-purple-500" },
    nemendur: [
      "Afrika Dalila Mathison Ortiz","Ahmed Aloudah","Aisha Nuur Abdulle","Anh Tuan Ho",
      "Anh Phuong Ta","Aron Nguyen Sigurðsson","Bao Gia Vu Nguyen","Carlanis Milanes Cruz",
      "Carlenis Milanes Cruz","Duong Ðang Nguyen","Fabiola Nasser Rabah",
      "Francis Izekor Ogbeiwi","Francisca Naa Amponsah Foli Sackey","Iliya Modanloo",
      "Khadija Nuur Abdulle","Lan Hoang Vu","Luisana A. Alfonzo Quintero",
      "Nasimmiguel Dareb Nasser","Nour B F Allahham","Sanela Knjisa","Sara A. A. Almassri",
      "Trang Huyen Nguyen","Valeria B. Rodrigues Sanchez","Wisamismael Dareb Nasser",
      "Yara Valentina Habib Dib"
    ]
  }
];

// ── Shuffle ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeGroups(mættNemendur) {
  const shuffled = shuffle(mættNemendur);
  const groups = [];
  for (let i = 0; i < shuffled.length; i += 5) {
    groups.push(shuffled.slice(i, i + 5));
  }
  return groups;
}

// ── Einstaklingur í lista ────────────────────────────────────────────────────
function NemandaKort({ nafn, mættur, litir, onClick }) {
  const btnClass = 'w-full text-left px-3 py-2 rounded-lg border transition-all duration-150 flex items-center gap-2.5 '
    + (!mættur ? 'bg-red-50 border-red-200' : litir.bg + ' ' + litir.border);
  const dotClass = 'w-1.5 h-1.5 rounded-full flex-shrink-0 ' + (!mættur ? 'bg-red-300' : litir.dot);
  const nameClass = 'text-sm font-light flex-1 ' + (!mættur ? 'line-through text-red-400' : litir.text);
  return (
    <button onClick={onClick} className={btnClass}>
      <span className={dotClass} />
      <span className={nameClass}>{nafn}</span>
      {!mættur && <span className="text-xs text-red-400 font-light">fjarverandi</span>}
    </button>
  );
}

// ── Hópur í niðurstöðu ───────────────────────────────────────────────────────
function HópaKort({ nemendur, nr, litir, delay }) {
  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 pop-in"
         style={{ animationDelay: delay + 'ms' }}>
      <div className="flex items-center gap-2 mb-3">
        <span className="w-7 h-7 rounded-full bg-blue-600 text-white text-sm flex items-center justify-center font-medium">{nr}</span>
        <span className="text-xs text-gray-400 font-light">{nemendur.length} meðlimir</span>
      </div>
      <div className="space-y-1.5">
        {nemendur.map((nafn, i) => (
          <div key={i} className={'flex items-center gap-2 px-2.5 py-1.5 rounded-lg border ' + litir.bg + ' ' + litir.border}>
            <span className={'w-1.5 h-1.5 rounded-full flex-shrink-0 ' + litir.dot} />
            <span className={'text-sm font-light ' + litir.text}>{nafn}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Einn bekkur ──────────────────────────────────────────────────────────────
function Bekkur({ bekkur }) {
  const [fjarverandi, setFjarverandi] = useState({});
  const [hópar, setHópar] = useState(null);
  const [sýnaHópa, setSýnaHópa] = useState(false);

  const toggle = useCallback((nafn) => {
    setFjarverandi(prev => ({ ...prev, [nafn]: !prev[nafn] }));
    setHópar(null);
    setSýnaHópa(false);
  }, []);

  const mættNemendur = bekkur.nemendur.filter(n => !fjarverandi[n]);
  const fjarCount = bekkur.nemendur.length - mættNemendur.length;

  const hrista = () => {
    const g = makeGroups(mættNemendur);
    setHópar(g);
    setSýnaHópa(true);
  };

  const { litir } = bekkur;

  return (
    <div className="fade-in">
      {/* Takkastika */}
      <div className="flex flex-wrap items-center gap-3 mb-4 no-print">
        <div className="flex items-center gap-2">
          {fjarCount > 0
            ? <span className="text-sm font-light"><span className="font-medium text-red-600">{fjarCount}</span> fjarverandi · <span className="font-medium text-gray-700">{mættNemendur.length}</span> mætt</span>
            : <span className="text-sm font-light text-gray-500"><span className="font-medium text-gray-700">{mættNemendur.length}</span> mætt</span>
          }
        </div>
        <div className="flex-1" />
        {sýnaHópa && hópar && (
          <button onClick={() => setSýnaHópa(false)}
            className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
            ← Mætingarlisti
          </button>
        )}
        {!sýnaHópa && (
          <button onClick={hrista} disabled={mættNemendur.length < 2}
            className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm flex items-center gap-2">
            🎲 Hrista hópa
          </button>
        )}
        {sýnaHópa && hópar && (
          <button onClick={hrista}
            className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
            🔄 Hrista aftur
          </button>
        )}
        {sýnaHópa && hópar && (
          <button onClick={() => window.print()}
            className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
            🖨️ Prenta
          </button>
        )}
      </div>

      {/* Mætingarlisti */}
      {!sýnaHópa && (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
          {bekkur.nemendur.map(nafn => (
            <NemandaKort key={nafn} nafn={nafn} mættur={!fjarverandi[nafn]} litir={litir} onClick={() => toggle(nafn)} />
          ))}
        </div>
      )}

      {/* Hóparnir */}
      {sýnaHópa && hópar && (
        <div className="fade-in">
          <p className="text-sm text-gray-400 font-light mb-4">
            {mættNemendur.length} nemendur í {hópar.length} hópum
          </p>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {hópar.map((h, i) => (
              <HópaKort key={i} nemendur={h} nr={i + 1} litir={litir} delay={i * 55} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Aðalforrit ───────────────────────────────────────────────────────────────
function App() {
  const [virkur, setVirkur] = useState(BEKKIRNIR[0].id);
  const bekkur = BEKKIRNIR.find(b => b.id === virkur);

  return (
    <div className="min-h-screen">
      <header className="bg-white shadow-sm border-b border-gray-200 no-print">
        <div className="max-w-4xl mx-auto px-6 py-6">
          <h1 className="text-2xl font-light text-gray-800 mb-1">Hópaskipting</h1>
          <p className="text-gray-500 text-sm font-light">Hakaðu við fjarverandi nemendur og hrista saman hópa</p>
        </div>
      </header>

      {/* Flipar */}
      <div className="bg-white border-b border-gray-200 no-print">
        <div className="max-w-4xl mx-auto px-6">
          <div className="flex gap-1 overflow-x-auto py-1">
            {BEKKIRNIR.map(b => {
              const active = b.id === virkur;
              const cls = 'flex-shrink-0 px-4 py-2.5 text-sm font-light rounded-t-lg transition-colors border-b-2 '
                + (active
                  ? b.litir.text + ' border-current bg-gray-50'
                  : 'text-gray-500 border-transparent hover:text-gray-700 hover:bg-gray-50');
              return (
                <button key={b.id} onClick={() => setVirkur(b.id)} className={cls}>
                  <span className={'inline-block w-2 h-2 rounded-full mr-2 ' + b.litir.dot} />
                  {b.heiti}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Innihald */}
      <div className="max-w-4xl mx-auto px-6 py-6">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className={'w-3 h-3 rounded-full ' + bekkur.litir.dot} />
            <h2 className={'text-lg font-medium ' + bekkur.litir.text}>{bekkur.heiti}</h2>
            <span className={'text-xs font-light ' + bekkur.litir.text + ' opacity-60'}>
              – {bekkur.nemendur.length} nemendur
            </span>
          </div>
          <Bekkur key={bekkur.id} bekkur={bekkur} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
