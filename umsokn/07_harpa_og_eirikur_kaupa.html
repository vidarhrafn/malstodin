<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🛒 Harpa og Eiríkur kaupa í matinn – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .answer-option {
      border: 2px solid #e0e0e0;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.disabled) { border-color: #2196f3; background: #e3f2fd; }
    .answer-option.selected { border-color: #2196f3; background: #e3f2fd; }
    .answer-option.correct { border-color: #4caf50; background: #e8f5e9; }
    .answer-option.incorrect { border-color: #f44336; background: #ffebee; }
    .answer-option.disabled { cursor: default; }
    .chat-container { max-height: 500px; overflow-y: auto; }
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .chat-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
    .portrait {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    const READING_TEXT = `Harpa og Eiríkur ætla að koma Ingibjörgu mömmu Hörpu á óvart. Ingibjörg eldar yfirleitt en í kvöld ætla Harpa og Eiríkur að elda uppáhalds mat mömmu Hörpu. Það er kjúklingur í ofni, en Harpa er grænmetisæta og þess vegna ætla þau að hafa tvíréttað. Kjúkling í ofni, og kjúklingabaunarétt með grænmeti. Meðlætið verður hrísgrjón, sósa og salat. Þau ætla að fara í búðina og kaupa það sem vantar í kvöldmatinn og fleira. Þau fara í Bónus og kaupa þar heilan kjúkling, hrísgrjón, sósu, papriku, lauk, hvítlauk, blómkál og kókosmjólk. Svo kaupa þau líka mjólk, ost, brauð, flatkökur, núðlusúpur og jógúrt. Þegar þau eru að labba út úr búðinni fatta þau að þau gleymdu að kaupa kjúklingabaunir og eitthvað að drekka með matnum. Harpa drífur sig aftur inn í búðina og finnur kjúklingabaunirnar og svo kaupa þau sódavatn með sítrónubragði. Á meðan setur Eiríkur vörurnar í poka. Þegar þau koma heim byrja þau strax að elda. Þau ætla að hafa matinn tilbúinn þegar Ingibjörg kemur heim úr vinnunni.`;

    const MULTIPLE_CHOICE = [
      {
        question: "Hvað er uppáhaldsmatur mömmu Hörpu?",
        options: ["Kjúklingur í ofni", "Hrísgrjón", "Kjúklingabaunir", "Grænmeti"],
        correct: 0
      },
      {
        question: "Hverjir fara í búðina?",
        options: ["Harpa og Ingibjörg", "Eiríkur og Ingibjörg", "Harpa og Eiríkur", "Ingibjörg og Eiríkur"],
        correct: 2
      },
      {
        question: "Hvað gleymdu þau að kaupa í búðinni?",
        options: ["Kjúkling", "Hrísgrjón", "Kjúklingabaunir", "Sósu"],
        correct: 2
      }
    ];

    const SHORT_OPEN_QUESTIONS = [
      "Hver er grænmetisæta?",
      "Hvað er meðlætið í matnum?",
      "Hvað gerir Eiríkur á meðan Harpa fer aftur inn í búðina að kaupa kjúklingabaunir?"
    ];

    const DISCUSSION_QUESTIONS = [
      "Hvað finnst þér um að koma fólki á óvart?",
      "Hvað finnst þér um að vera grænmetisæta?",
      "Hvað finnst þér um að elda?"
    ];

    const HarpaOgEirikurKaupa = () => {
      const [stage, setStage] = useState('reading');
      const [mcAnswers, setMcAnswers] = useState([]);
      const [showMcFeedback, setShowMcFeedback] = useState(false);

      const [shortAnswers, setShortAnswers] = useState(['', '', '']);
      const [shortFeedback, setShortFeedback] = useState([null, null, null]);
      const [shortLoading, setShortLoading] = useState([false, false, false]);

      const [conversations, setConversations] = useState([[], [], []]);
      const [currentInputs, setCurrentInputs] = useState(['', '', '']);
      const [loadingStates, setLoadingStates] = useState([false, false, false]);
      const [messageCount, setMessageCount] = useState([0, 0, 0]);

      const chatRefs = [useRef(null), useRef(null), useRef(null)];

      const handleMcAnswer = (questionIndex, optionIndex) => {
        if (showMcFeedback) return;
        const newAnswers = [...mcAnswers];
        newAnswers[questionIndex] = optionIndex;
        setMcAnswers(newAnswers);
      };

      const checkMcAnswers = () => {
        if (mcAnswers.length < MULTIPLE_CHOICE.length) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setShowMcFeedback(true);
      };

      const handleShortAnswerChange = (index, value) => {
        const newAnswers = [...shortAnswers];
        newAnswers[index] = value;
        setShortAnswers(newAnswers);
      };

      const getShortFeedback = async (questionIndex) => {
        const question = SHORT_OPEN_QUESTIONS[questionIndex];
        const answer = shortAnswers[questionIndex];
        if (!answer.trim() || answer.trim().length < 3) { alert('Vinsamlegast skrifaðu svar'); return; }
        const newLoading = [...shortLoading]; newLoading[questionIndex] = true; setShortLoading(newLoading);
        try {
          const sys = `Þú ert vingjarnlegur íslenskukennari sem er að fara yfir stutt svör nemanda (A1-A2 stig).
TEXTINN: "${READING_TEXT}"
SPURNINGIN: "${question}"
SVAR NEMANDANS: "${answer}"
Gefðu hvetjandi endurgjöf (2-3 setningar á íslensku). Byrjaðu með jákvæðu. SKILAÐU BARA TEXTANUM.`.trim();
          const response = await callOpenAI({ model: 'gpt-4o-mini', temperature: 0.5, max_tokens: 150, messages: [{ role: 'system', content: sys }, { role: 'user', content: 'Gefðu endurgjöf' }] });
          const newFeedback = [...shortFeedback]; newFeedback[questionIndex] = response.trim(); setShortFeedback(newFeedback);
        } catch(e) { console.error(e); alert('Villa. Reyndu aftur.'); }
        finally { const newLoading = [...shortLoading]; newLoading[questionIndex] = false; setShortLoading(newLoading); }
      };

      const scrollToBottom = (index) => {
        setTimeout(() => { if (chatRefs[index].current) chatRefs[index].current.scrollTop = chatRefs[index].current.scrollHeight; }, 100);
      };

      const sendMessage = async (questionIndex) => {
        const message = currentInputs[questionIndex].trim();
        if (!message) return;
        const newConversations = [...conversations];
        newConversations[questionIndex] = [...newConversations[questionIndex], { role: 'user', content: message }];
        setConversations(newConversations);
        const newMessageCount = [...messageCount]; newMessageCount[questionIndex]++; setMessageCount(newMessageCount);
        const newInputs = [...currentInputs]; newInputs[questionIndex] = ''; setCurrentInputs(newInputs);
        const newLoading = [...loadingStates]; newLoading[questionIndex] = true; setLoadingStates(newLoading);
        scrollToBottom(questionIndex);
        try {
          const question = DISCUSSION_QUESTIONS[questionIndex];
          const isFirstMessage = newConversations[questionIndex].filter(m => m.role === 'user').length === 1;
          const shouldClose = newMessageCount[questionIndex] >= 3;
          const systemPrompt = `Þú ert vingjarnlegur íslenskukennari. UPPRUNALEGA SPURNINGIN: "${question}"
${isFirstMessage ? 'Gefðu hvetjandi endurgjöf og spyrðu follow-up.' : shouldClose ? 'Kláraðu samtalið á eðlilegan hátt með "Takk fyrir spjallið!" EKKI spyrja fleiri spurninga.' : 'Haltu áfram samtali.'}
Vertu stuttorður (2-4 setningar), einföld íslenska.
SVARAÐU MEÐ JSON: {"grammar": "málfarsathugasemd eða null", "response": "svarið"}`;
          const messages = [{ role: 'system', content: systemPrompt }, ...newConversations[questionIndex].filter(m => m.role === 'user' || m.role === 'assistant')];
          const response = await callOpenAI({ model: 'gpt-4o-mini', temperature: 0.7, max_tokens: 300, messages });
          let clean = response.trim().replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          const parsed = JSON.parse(clean);
          let cur = [...newConversations];
          if (parsed.grammar) { cur[questionIndex] = [...cur[questionIndex], { role: 'grammar', content: parsed.grammar }]; setConversations(cur); await new Promise(r => setTimeout(r, 400)); }
          const upd = [...cur]; upd[questionIndex] = [...upd[questionIndex], { role: 'assistant', content: parsed.response }]; setConversations(upd);
          scrollToBottom(questionIndex);
        } catch(e) { console.error(e); alert('Villa. Reyndu aftur.'); }
        finally { const newLoading = [...loadingStates]; newLoading[questionIndex] = false; setLoadingStates(newLoading); }
      };

      const handleKeyPress = (e, index) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(index); } };
      const allShortAnswered = shortFeedback.every(f => f !== null);

      return (
        <div className="min-h-screen pb-12">

          {/* HEADER – sama stíll og hlustunaræfingar */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block font-light">
                ← Til baka
              </button>
              <div className="flex items-center gap-4">
                <div className="flex-1">
                  <h1 className="text-3xl font-light text-gray-800">🛒 Harpa og Eiríkur kaupa í matinn</h1>
                  <p className="text-gray-500 text-sm font-light mb-3">Lesskilningur og umræða · A1–A2 · Kafli 7</p>
                  <div className="flex items-center gap-5">
                    <div className="flex flex-col items-center gap-1.5">
                      <img src="media/harpa.png" alt="Harpa" className="portrait" />
                      <span className="text-xs font-light text-gray-600">Harpa</span>
                    </div>
                    <div className="flex flex-col items-center gap-1.5">
                      <img src="media/eirikur.png" alt="Eiríkur" className="portrait" />
                      <span className="text-xs font-light text-gray-600">Eiríkur</span>
                    </div>
                  </div>
                </div>
                <img src="media/bud.png" alt="Í búðinni"
                  className="rounded-2xl h-auto flex-shrink-0" style={{ width: '15%' }} />
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">

            {/* LESTEXTI + KROSSASPURNINGAR */}
            {stage === 'reading' && (
              <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                  <h2 className="text-xl font-light text-gray-700 mb-6">📖 Lestu textann</h2>
                  <p className="text-gray-700 leading-relaxed font-light">{READING_TEXT}</p>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                  <h2 className="text-xl font-light text-gray-700 mb-6">🔵 Krossaspurningar</h2>
                  <div className="space-y-6">
                    {MULTIPLE_CHOICE.map((q, qi) => (
                      <div key={qi} className="border border-gray-100 rounded-xl p-5">
                        <p className="font-light text-gray-800 mb-4">{qi + 1}. {q.question}</p>
                        <div className="space-y-2">
                          {q.options.map((option, oi) => {
                            const sel = mcAnswers[qi] === oi;
                            const isCorrect = oi === q.correct;
                            return (
                              <div key={oi} onClick={() => handleMcAnswer(qi, oi)}
                                className={`answer-option p-3 rounded-lg text-sm font-light
                                  ${sel && !showMcFeedback ? 'selected' : ''}
                                  ${showMcFeedback && isCorrect ? 'correct' : ''}
                                  ${showMcFeedback && sel && !isCorrect ? 'incorrect' : ''}
                                  ${showMcFeedback ? 'disabled' : ''}`}>
                                <div className="flex items-center gap-3">
                                  <div className={`w-4 h-4 rounded-full border-2 flex-shrink-0
                                    ${sel && !showMcFeedback ? 'border-blue-500 bg-blue-500' :
                                      showMcFeedback && isCorrect ? 'border-green-500 bg-green-500' :
                                      showMcFeedback && sel ? 'border-red-500 bg-red-500' : 'border-gray-300'}`} />
                                  <span>{option}</span>
                                  {showMcFeedback && isCorrect && <span className="ml-auto text-green-600">✓</span>}
                                  {showMcFeedback && sel && !isCorrect && <span className="ml-auto text-red-600">✗</span>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>

                  {!showMcFeedback ? (
                    <button onClick={checkMcAnswers}
                      className="mt-6 px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                      Athuga svör
                    </button>
                  ) : (
                    <div className="mt-6">
                      <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                        <p className="text-green-800 font-light text-sm">
                          {mcAnswers.every((a, i) => a === MULTIPLE_CHOICE[i].correct) ? '🎉 Frábært! Öll svörin eru rétt!' : `💪 Þú fékkst ${mcAnswers.filter((a, i) => a === MULTIPLE_CHOICE[i].correct).length} af ${MULTIPLE_CHOICE.length} rétt.`}
                        </p>
                      </div>
                      <button onClick={() => setStage('short')}
                        className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                        Halda áfram →
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* STUTTAR SPURNINGAR */}
            {stage === 'short' && (
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <h2 className="text-xl font-light text-gray-700 mb-6">📝 Stuttar spurningar</h2>
                <div className="space-y-6">
                  {SHORT_OPEN_QUESTIONS.map((question, idx) => (
                    <div key={idx} className="border border-gray-100 rounded-xl p-5">
                      <p className="font-light text-gray-800 mb-3">{idx + 1}. {question}</p>
                      <textarea value={shortAnswers[idx]}
                        onChange={e => handleShortAnswerChange(idx, e.target.value)}
                        disabled={shortFeedback[idx] !== null}
                        rows={2}
                        placeholder="Skrifaðu svarið þitt hér..."
                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                          focus:outline-none focus:border-green-400 font-light resize-none
                          disabled:bg-gray-50 text-sm mb-3" />
                      {shortFeedback[idx] === null ? (
                        <button onClick={() => getShortFeedback(idx)}
                          disabled={shortLoading[idx] || shortAnswers[idx].trim().length < 3}
                          className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                            disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                          {shortLoading[idx] ? 'Athuga...' : 'Fá endurgjöf'}
                        </button>
                      ) : (
                        <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                          <p className="text-green-800 font-light text-sm">✨ {shortFeedback[idx]}</p>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                {allShortAnswered && (
                  <button onClick={() => setStage('discussion')}
                    className="mt-6 px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                    Halda áfram í umræðuspurningar →
                  </button>
                )}
              </div>
            )}

            {/* UMRÆÐUSPURNINGAR */}
            {stage === 'discussion' && (
              <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                  <h2 className="text-xl font-light text-gray-700">💬 Umræðuspurningar</h2>
                  <p className="text-gray-500 text-sm font-light mt-1">Svaraðu og haltu samtali áfram!</p>
                </div>

                {DISCUSSION_QUESTIONS.map((question, idx) => (
                  <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <p className="font-light text-gray-800 mb-4">{idx + 1}. {question}</p>
                    <div ref={chatRefs[idx]} className="chat-container mb-4 space-y-3">
                      {conversations[idx].map((msg, mi) => (
                        <div key={mi}>
                          {msg.role === 'user' && (
                            <div className="flex justify-end">
                              <div className="bg-blue-50 rounded-xl px-4 py-3 max-w-[80%]">
                                <p className="text-gray-800 font-light text-sm">{msg.content}</p>
                              </div>
                            </div>
                          )}
                          {msg.role === 'grammar' && (
                            <div className="flex justify-center">
                              <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 max-w-[85%]">
                                <p className="text-xs text-amber-800 font-light">📚 Málfar: {msg.content}</p>
                              </div>
                            </div>
                          )}
                          {msg.role === 'assistant' && (
                            <div className="flex justify-start">
                              <div className="bg-green-50 border border-green-200 rounded-xl px-4 py-3 max-w-[80%]">
                                <p className="text-gray-800 font-light text-sm">{msg.content}</p>
                              </div>
                            </div>
                          )}
                        </div>
                      ))}
                      {loadingStates[idx] && (
                        <div className="flex justify-start">
                          <div className="bg-gray-100 rounded-xl px-4 py-3">
                            <p className="text-gray-400 font-light text-sm">Bíð...</p>
                          </div>
                        </div>
                      )}
                    </div>
                    <div className="flex gap-2">
                      <textarea value={currentInputs[idx]}
                        onChange={e => { const n=[...currentInputs]; n[idx]=e.target.value; setCurrentInputs(n); }}
                        onKeyPress={e => handleKeyPress(e, idx)}
                        disabled={loadingStates[idx]}
                        rows={2}
                        placeholder={conversations[idx].length === 0 ? "Skrifaðu svarið þitt hér..." : "Haltu áfram að spjalla..."}
                        className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg
                          focus:outline-none focus:border-green-400 font-light resize-none
                          disabled:bg-gray-50 text-sm" />
                      <button onClick={() => sendMessage(idx)}
                        disabled={loadingStates[idx] || !currentInputs[idx].trim()}
                        className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                          disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end">
                        {conversations[idx].length === 0 ? 'Senda' : 'Senda'}
                      </button>
                    </div>
                  </div>
                ))}

                <div className="text-center pb-4">
                  <button onClick={() => window.history.back()}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                      hover:bg-gray-50 transition-colors font-light text-sm">
                    ← Til baka
                  </button>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HarpaOgEirikurKaupa />);
  </script>
</body>
</html>
