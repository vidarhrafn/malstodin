<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🃏 Flashcort – Mat og innkaup</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }

    .card-container {
      perspective: 1000px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-back {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      transform: rotateY(180deg);
    }
    .lang-btn {
      transition: all 0.2s;
      cursor: pointer;
    }
    .lang-btn.selected {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    // --- Orðalisti ---
    const CARDS = [
      { is: "deig (hk)",          hint: "baka eða gera pizzu eða brauð" },
      { is: "rifinn ostur (kk)",   hint: "ostur sem er skorinn í litla bita" },
      { is: "álegg (hk)",          hint: "matur sem fer ofan á pizzu eða brauð" },
      { is: "að fletja",           hint: "að þrýsta deigi út með höndunum eða kökukefli" },
      { is: "að aðstoða",          hint: "að hjálpa einhverjum" },
      { is: "grænmetisæta (kvk)",  hint: "maður sem borðar ekki kjöt" },
      { is: "meðlæti (hk)",        hint: "matur sem fylgir með aðalréttinum, t.d. hrísgrjón" },
      { is: "innkaupalisti (kk)",  hint: "listi yfir það sem þarf að kaupa í búð" },
      { is: "óreganó (hk)",        hint: "krydd sem oft er notað á pizzu" },
      { is: "að gleyma",           hint: "að muna ekki eftir einhverju" },
      { is: "að labba",            hint: "að ganga hægt og rólega" },
      { is: "kókosmjólk (kvk)",    hint: "mjólk úr kókoshnetu, notuð í matargerð" },
    ];

    const LANGUAGES = [
      { code: "en", label: "English",    flag: "🇬🇧" },
      { code: "es", label: "Español",    flag: "🇪🇸" },
      { code: "pl", label: "Polski",     flag: "🇵🇱" },
      { code: "ar", label: "العربية",    flag: "🇸🇦" },
      { code: "vi", label: "Tiếng Việt", flag: "🇻🇳" },
    ];

    // --- Azure TTS ---
    async function playAudio(text, onEnd) {
      try {
        const r = await fetch('/.netlify/functions/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text_to_speak: text }),
        });
        const data = await r.json();
        if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(); return; }
        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
        audio.onended = () => onEnd && onEnd();
        audio.onerror = () => onEnd && onEnd();
        await audio.play().catch(() => onEnd && onEnd());
        return audio;
      } catch (e) {
        console.error(e);
        onEnd && onEnd();
      }
    }

    // --- OpenAI þýðing ---
    async function fetchTranslation(word, targetLang) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          temperature: 0.1,
          max_tokens: 60,
          messages: [
            {
              role: 'system',
              content: `Þýðu þetta íslenska orð yfir á ${targetLang}. Gefðu EINUNGIS þýðinguna, ekkert annað. Ef orðið er sögn (byrjar á "að") skaltu þýða sögnina einni í ${targetLang}. Ef orðið hefur kynsskírteini (kk/kvk/hk) skaltu sleppa því í þýðingunni.`
            },
            { role: 'user', content: word }
          ]
        }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content.trim();
    }

    // --- Shuffle ---
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // --- Aðalforritið ---
    const App = () => {
      const [lang, setLang] = useState(null);
      const [cards, setCards] = useState(() => shuffle(CARDS));
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [speaking, setSpeaking] = useState(false);
      const [translation, setTranslation] = useState(null);
      const [translating, setTranslating] = useState(false);
      const [seen, setSeen] = useState(new Set());
      const [learned, setLearned] = useState(new Set());
      const [done, setDone] = useState(false);

      const current = cards[idx];

      const handleSpeak = useCallback(async (e) => {
        e.stopPropagation();
        if (speaking) return;
        setSpeaking(true);
        // Hreinsum (kk/kvk/hk) og "að" úr TTS texta
        const clean = current.is
          .replace(/\s*\((kk|kvk|hk)\)\s*/g, '')
          .trim();
        await playAudio(clean, () => setSpeaking(false));
      }, [speaking, current]);

      const handleFlip = useCallback(async () => {
        if (!flipped) {
          setFlipped(true);
          setSeen(prev => new Set([...prev, idx]));
          // Sækja þýðingu þegar kort er snúið
          if (lang && !translation) {
            setTranslating(true);
            try {
              const t = await fetchTranslation(current.is, lang.label);
              setTranslation(t);
            } catch (e) {
              setTranslation('—');
            } finally {
              setTranslating(false);
            }
          }
        } else {
          setFlipped(false);
        }
      }, [flipped, lang, translation, current, idx]);

      const goNext = useCallback(() => {
        if (idx + 1 >= cards.length) {
          setDone(true);
        } else {
          setIdx(idx + 1);
          setFlipped(false);
          setTranslation(null);
        }
      }, [idx, cards.length]);

      const goPrev = useCallback(() => {
        if (idx > 0) {
          setIdx(idx - 1);
          setFlipped(false);
          setTranslation(null);
        }
      }, [idx]);

      const restart = useCallback(() => {
        setCards(shuffle(CARDS));
        setIdx(0);
        setFlipped(false);
        setTranslation(null);
        setSeen(new Set());
        setLearned(new Set());
        setDone(false);
      }, []);

      // --- Móðurmálsval ---
      const [customLang, setCustomLang] = useState('');

      if (!lang) {
        return (
          <div className="min-h-screen flex flex-col">
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => window.history.back()}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🃏 Flashcort – Mat og innkaup</h1>
                <p className="text-gray-500 text-sm font-light">Orðaforðaæfing · A1–A2</p>
              </div>
            </header>
            <main className="max-w-xl mx-auto px-6 mt-10 w-full fade-in">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <div className="text-center mb-8">
                  <div className="text-5xl mb-4">🌍</div>
                  <h2 className="text-2xl font-light text-gray-800 mb-2">Veldu móðurmál þitt</h2>
                  <p className="text-gray-500 font-light text-sm">Þú munt fá þýðingar á þínu eigin máli</p>
                </div>

                {/* Fimm fljótlegar takkar – lárétt */}
                <div className="flex flex-wrap gap-2 mb-6 justify-center">
                  {LANGUAGES.map(l => (
                    <button
                      key={l.code}
                      onClick={() => setLang(l)}
                      className="flex items-center gap-2 px-4 py-2.5 rounded-lg border-2 border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-all font-light text-gray-700 text-sm"
                    >
                      <span className="text-xl">{l.flag}</span>
                      <span>{l.label}</span>
                    </button>
                  ))}
                </div>

                {/* Annað tungumál – alltaf sýnilegt */}
                <div className="border-t border-gray-100 pt-5">
                  <p className="text-sm text-gray-500 font-light mb-3">Annað tungumál:</p>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={customLang}
                      onChange={e => setCustomLang(e.target.value)}
                      onKeyDown={e => {
                        if (e.key === 'Enter' && customLang.trim()) {
                          setLang({ code: 'custom', label: customLang.trim(), flag: '🌐' });
                        }
                      }}
                      placeholder="Skrifaðu tungumálið þitt..."
                      className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light"
                    />
                    <button
                      onClick={() => {
                        if (customLang.trim()) setLang({ code: 'custom', label: customLang.trim(), flag: '🌐' });
                      }}
                      disabled={!customLang.trim()}
                      className="px-5 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light"
                    >
                      Velja
                    </button>
                  </div>
                </div>

                <div className="mt-5 text-center">
                  <button
                    onClick={() => setLang({ code: 'none', label: null, flag: '🏳️' })}
                    className="text-sm text-gray-400 hover:text-gray-600 font-light underline"
                  >
                    Nota bara íslensku
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }

      // --- Lokasíða ---
      if (done) {
        return (
          <div className="min-h-screen flex flex-col">
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => window.history.back()}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🃏 Flashcort – Mat og innkaup</h1>
                <p className="text-gray-500 text-sm font-light">Orðaforðaæfing · A1–A2</p>
              </div>
            </header>
            <main className="max-w-xl mx-auto px-6 mt-10 w-full fade-in text-center">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10">
                <div className="text-6xl mb-4">🎉</div>
                <h2 className="text-2xl font-light text-gray-800 mb-3">Vel gert!</h2>
                <p className="text-gray-500 font-light mb-2">
                  Þú fórst í gegnum öll {CARDS.length} orðin.
                </p>
                <p className="text-gray-400 font-light text-sm mb-8">
                  {learned.size} af {CARDS.length} orðum merkt sem lærð
                </p>
                <div className="flex gap-3 justify-center flex-wrap">
                  <button
                    onClick={restart}
                    className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
                  >
                    🔄 Byrja aftur
                  </button>
                  <button
                    onClick={() => { setLang(null); restart(); }}
                    className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm"
                  >
                    Skipta um tungumál
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }

      // --- Flashcort ---
      const progress = ((idx) / cards.length) * 100;

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <div className="flex items-start justify-between">
                <div>
                  <h1 className="text-3xl font-light text-gray-800 mb-2">🃏 Flashcort – Mat og innkaup</h1>
                  <p className="text-gray-500 text-sm font-light">Orðaforðaæfing · A1–A2</p>
                </div>
                {lang.flag !== '🏳️' && (
                  <button
                    onClick={() => setLang(null)}
                    className="text-sm text-gray-400 hover:text-gray-600 font-light flex items-center gap-1 mt-1"
                    title="Skipta um tungumál"
                  >
                    <span>{lang.flag}</span>
                    <span className="underline">skipta</span>
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-xl mx-auto px-6 mt-8 w-full pb-16">
            {/* Framvindustika */}
            <div className="mb-6">
              <div className="flex justify-between text-xs text-gray-400 font-light mb-2">
                <span>Kort {idx + 1} af {cards.length}</span>
                <span>{seen.size} snúin</span>
              </div>
              <div className="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden">
                <div
                  className="h-full bg-blue-500 rounded-full transition-all duration-300"
                  style={{ width: `${((idx + 1) / cards.length) * 100}%` }}
                />
              </div>
            </div>

            {/* Leiðbeiningar */}
            <div className="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 mb-6 text-sm text-blue-700 font-light">
              Smelltu á kortið til að sjá skýringuna
              {lang.label && ' og þýðinguna'}
              . Smelltu á 🔊 til að heyra framburðinn.
            </div>

            {/* Kortið */}
            <div className="card-container mb-6" style={{ minHeight: 260 }}>
              <div
                className={`card-inner cursor-pointer ${flipped ? 'flipped' : ''}`}
                onClick={handleFlip}
                style={{ minHeight: 260 }}
              >
                {/* Framhlið */}
                <div className="card-face bg-white rounded-xl shadow-sm border border-gray-100 p-8 flex flex-col items-center justify-center"
                  style={{ minHeight: 260 }}>
                  <div className="text-4xl mb-5">📖</div>
                  <p className="text-2xl font-light text-gray-800 text-center mb-6 leading-snug">
                    {current.is}
                  </p>
                  {/* TTS hnappur */}
                  <button
                    onClick={handleSpeak}
                    className={`inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm border transition-all
                      ${speaking
                        ? 'bg-green-50 text-green-700 border-green-200'
                        : 'bg-gray-100 text-gray-600 border-gray-200 hover:bg-gray-200'}`}
                  >
                    <span className="opacity-70">🎧</span>
                    <span className="font-light">Hlustaðu</span>
                    <span className={`text-green-600 ${speaking ? 'animate-pulse' : ''}`}>🔊</span>
                  </button>
                  <p className="text-xs text-gray-400 font-light mt-4">Smelltu til að snúa</p>
                </div>

                {/* Bakhlið */}
                <div className="card-face card-back bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl shadow-sm border border-blue-200 p-8 flex flex-col items-center justify-center"
                  style={{ minHeight: 260 }}>
                  <div className="text-4xl mb-4">💡</div>
                  <p className="text-lg font-light text-gray-700 text-center mb-4 leading-relaxed">
                    {current.hint}
                  </p>
                  {lang.label && (
                    <div className="mt-2 px-4 py-2 bg-white/70 rounded-lg border border-blue-200 text-center min-w-[120px]">
                      {translating ? (
                        <span className="text-gray-400 text-sm font-light animate-pulse">Þýði...</span>
                      ) : translation ? (
                        <span className="text-blue-700 font-medium text-lg">{translation}</span>
                      ) : null}
                    </div>
                  )}
                  <p className="text-xs text-gray-500 font-light mt-4">Smelltu til að snúa aftur</p>
                </div>
              </div>
            </div>

            {/* Fletting */}
            <div className="flex gap-3 justify-center mb-5">
              <button
                onClick={goPrev}
                disabled={idx === 0}
                className="px-5 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-all font-light"
              >
                ← Til baka
              </button>
              <button
                onClick={goNext}
                className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
              >
                {idx + 1 >= cards.length ? 'Klára 🎉' : 'Næsta →'}
              </button>
            </div>

            {/* Hakbox – „Ég kann þetta orð" */}
            <div
              onClick={() => setLearned(prev => {
                const next = new Set(prev);
                next.has(idx) ? next.delete(idx) : next.add(idx);
                return next;
              })}
              className={`flex items-center gap-3 justify-center cursor-pointer px-5 py-3 rounded-xl border-2 transition-all select-none
                ${learned.has(idx)
                  ? 'bg-green-50 border-green-300 text-green-700'
                  : 'bg-white border-gray-200 text-gray-400 hover:border-green-300 hover:text-green-600'}`}
            >
              <div className={`w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition-all
                ${learned.has(idx) ? 'bg-green-500 border-green-500' : 'border-gray-300'}`}>
                {learned.has(idx) && (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </div>
              <span className="font-light text-sm">
                {learned.has(idx) ? 'Ég kann þetta orð ✓' : 'Ég kann þetta orð'}
              </span>
            </div>

            {/* Smátexti */}
            <p className="text-center text-xs text-gray-400 font-light mt-4">
              {learned.size} af {cards.length} orðum lærð
            </p>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
