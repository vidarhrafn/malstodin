<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧩 Orðagáta – Matur og innkaup</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease both; }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop 0.3s ease both; }

    .letter-box {
      width: 42px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.25rem;
      font-weight: 400;
      transition: all 0.15s;
      border: 2px solid;
      user-select: none;
    }
    .letter-box.empty    { border-color: #d1d5db; background: #f9fafb; color: transparent; }
    .letter-box.filled   { border-color: #93c5fd; background: #eff6ff; color: #1e40af; }
    .letter-box.correct  { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .letter-box.wrong    { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Orðalisti ---
    const WORDS = [
      {
        word: "deig",
        clue: "Blanda af hveiti og vatni til að búa til pizzubotn eða brauð."
      },
      {
        word: "grænmetisæta",
        clue: "Þessi manneskja borðar ekki kjöt."
      },
      {
        word: "innkaupalisti",
        clue: "Þetta er listi yfir það sem þarf að kaupa í búð."
      },
      {
        word: "óreganó",
        clue: "Þetta er krydd sem er oft notað á pizzu."
      },
      {
        word: "meðlæti",
        clue: "Þetta fylgir með aðalréttinum, til dæmis hrísgrjón eða salat."
      },
      {
        word: "kókosmjólk",
        clue: "Þetta er vökvi sem kemur úr kókoshnetu."
      },
      {
        word: "álegg",
        clue: "Þetta er matur sem fer ofan á pizzu eða brauð."
      },
    ];

    // --- Azure TTS ---
    async function playAudio(text, onEnd) {
      try {
        const r = await fetch('/.netlify/functions/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text_to_speak: text }),
        });
        const data = await r.json();
        if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(); return; }
        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
        audio.onended = () => onEnd && onEnd();
        audio.onerror = () => onEnd && onEnd();
        await audio.play().catch(() => onEnd && onEnd());
        return audio;
      } catch (e) {
        console.error(e);
        onEnd && onEnd();
      }
    }

    // Normalize – hunsa séríslenska stafi við samanburð
    function normalize(s) {
      return s.toLowerCase()
        .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i')
        .replace(/ó/g,'o').replace(/ú/g,'u').replace(/ý/g,'y')
        .replace(/ð/g,'d').replace(/þ/g,'th').replace(/æ/g,'ae')
        .replace(/ö/g,'o');
    }

    // Stafir í orði → birgðir
    function letterCounts(word) {
      const counts = {};
      for (const ch of word.toLowerCase()) {
        counts[ch] = (counts[ch] || 0) + 1;
      }
      return counts;
    }

    const App = () => {
      const [idx, setIdx]           = useState(0);
      const [input, setInput]       = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [correct, setCorrect]   = useState(false);
      const [attempts, setAttempts] = useState(0);
      const [revealed, setRevealed] = useState(false);
      const [speaking, setSpeaking] = useState(false);
      const [shakeKey, setShakeKey] = useState(0);
      const [popKey, setPopKey]     = useState(0);
      const [scores, setScores]     = useState([]); // {word, got} per orð
      const [done, setDone]         = useState(false);
      const inputRef = useRef(null);

      const current = WORDS[idx];
      const target  = current.word.toLowerCase();

      // Einbeittu á input og spila vísbendingu þegar orð breytist
      useEffect(() => {
        setInput('');
        setSubmitted(false);
        setCorrect(false);
        setAttempts(0);
        setRevealed(false);
        setTimeout(() => {
          inputRef.current?.focus();
          // Spila vísbendingu sjálfkrafa eftir stuttan tíma
          setSpeaking(true);
          playAudio(WORDS[idx].clue, () => setSpeaking(false));
        }, 400);
      }, [idx]);

      const handleSpeak = useCallback(async (e) => {
        e?.stopPropagation();
        if (speaking) return;
        setSpeaking(true);
        await playAudio(current.clue, () => setSpeaking(false));
      }, [speaking, current]);

      // Reikna lit hverrar stafar í innslægi
      const letterStatuses = useMemo(() => {
        if (!submitted) return input.toLowerCase().split('').map(() => 'filled');
        const guess = input.toLowerCase();
        const statuses = Array(guess.length).fill('wrong');
        const targetCounts = letterCounts(target);
        // Fyrst: nákvæmlega réttir
        for (let i = 0; i < Math.min(guess.length, target.length); i++) {
          if (guess[i] === target[i]) {
            statuses[i] = 'correct';
            targetCounts[guess[i]]--;
          }
        }
        return statuses;
      }, [submitted, input, target]);

      const checkAnswer = useCallback(() => {
        if (!input.trim()) return;
        const isCorrect = normalize(input.trim()) === normalize(target);
        setSubmitted(true);
        setCorrect(isCorrect);
        setAttempts(a => a + 1);
        if (isCorrect) {
          setPopKey(k => k + 1);
        } else {
          setShakeKey(k => k + 1);
        }
      }, [input, target]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !submitted) checkAnswer();
        if (e.key === 'Enter' && submitted && correct) goNext();
      };

      const retry = () => {
        setInput('');
        setSubmitted(false);
        setCorrect(false);
        setTimeout(() => inputRef.current?.focus(), 50);
      };

      const reveal = () => {
        setRevealed(true);
        setSubmitted(true);
        setCorrect(false);
      };

      const goNext = () => {
        const got = correct;
        setScores(prev => [...prev, { word: current.word, got }]);
        if (idx + 1 >= WORDS.length) {
          setDone(true);
        } else {
          setIdx(i => i + 1);
        }
      };

      // Birta stafi – sýna innsláttar stafi eða auð
      const displayWord = () => {
        if (revealed) return target.split('');
        if (submitted) return input.toLowerCase().padEnd(target.length, ' ').slice(0, target.length).split('');
        return input.toLowerCase().split('').slice(0, target.length);
      };

      const boxes = displayWord();

      // --- Lokasíða ---
      if (done) {
        const total = scores.length;
        const got   = scores.filter(s => s.got).length;
        return (
          <div className="min-h-screen flex flex-col">
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => window.history.back()}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🧩 Orðagáta – Mat og innkaup</h1>
                <p className="text-gray-500 text-sm font-light">Orðaforðaæfing · A1–A2</p>
              </div>
            </header>
            <main className="max-w-xl mx-auto px-6 mt-10 w-full fade-in">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
                <div className="text-6xl mb-4">{got === total ? '🎉' : got >= total / 2 ? '💪' : '📚'}</div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Vel gert!</h2>
                <p className="text-gray-500 font-light mb-6">
                  Þú gissaðir rétt á <strong className="text-blue-600">{got}</strong> af <strong>{total}</strong> orðum.
                </p>
                <div className="space-y-2 mb-8 text-left">
                  {scores.map((s, i) => (
                    <div key={i} className={`flex items-center justify-between px-4 py-2 rounded-lg text-sm font-light
                      ${s.got ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                      <span>{s.word}</span>
                      <span>{s.got ? '✓' : '✗'}</span>
                    </div>
                  ))}
                </div>
                <button
                  onClick={() => { setIdx(0); setScores([]); setDone(false); }}
                  className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
                >
                  🔄 Reyna aftur
                </button>
              </div>
            </main>
          </div>
        );
      }

      // --- Aðalspil ---
      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🧩 Orðagáta – Mat og innkaup</h1>
              <p className="text-gray-500 text-sm font-light">Orðaforðaæfing · A1–A2</p>
            </div>
          </header>

          <main className="max-w-xl mx-auto px-6 mt-8 w-full pb-16">
            {/* Framvindustika */}
            <div className="mb-6">
              <div className="flex justify-between text-xs text-gray-400 font-light mb-2">
                <span>Orð {idx + 1} af {WORDS.length}</span>
                <span>{scores.filter(s => s.got).length} rétt</span>
              </div>
              <div className="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden">
                <div
                  className="h-full bg-blue-500 rounded-full transition-all duration-500"
                  style={{ width: `${((idx) / WORDS.length) * 100}%` }}
                />
              </div>
            </div>

            {/* Gátukort */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 fade-in">

              {/* Hljóðtakki – vísbending bara í hljóði */}
              <div className="mb-8 text-center">
                <button
                  onClick={handleSpeak}
                  className={`inline-flex items-center gap-3 px-6 py-4 rounded-2xl border-2 transition-all text-base
                    ${speaking
                      ? 'bg-green-50 text-green-700 border-green-300'
                      : 'bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100 hover:border-gray-300'}`}
                >
                  <span className="text-2xl">🎧</span>
                  <span className="font-light">{speaking ? 'Hlustar...' : 'Hlusta á vísbendingu'}</span>
                  <span className={`text-green-600 text-xl ${speaking ? 'animate-pulse' : ''}`}>🔊</span>
                </button>

                {/* Vísbendingin birtist eftir 3 rangar tilraunir */}
                {attempts >= 3 && !correct && (
                  <div className="mt-4 bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-amber-700 font-light text-sm fade-in">
                    💡 {current.clue}
                  </div>
                )}

                {/* Stafafjöldi */}
                <p className="text-xs text-gray-400 font-light mt-4">
                  {target.length} stafir
                  {attempts > 0 && !correct && !revealed && (
                    <span className="ml-2 text-amber-500">· {attempts} {attempts === 1 ? 'tilraun' : 'tilraunir'}</span>
                  )}
                </p>
              </div>

              {/* Stafakassar */}
              <div
                key={`boxes-${shakeKey}-${popKey}`}
                className={`flex flex-wrap gap-2 mb-6 justify-center ${
                  submitted && !correct && !revealed ? 'shake' : ''
                } ${correct ? 'pop' : ''}`}
              >
                {Array.from({ length: target.length }).map((_, i) => {
                  const ch = boxes[i];
                  let status = 'empty';
                  if (revealed) {
                    status = 'correct';
                  } else if (submitted && ch && ch !== ' ') {
                    status = letterStatuses[i] || 'wrong';
                  } else if (!submitted && ch) {
                    status = 'filled';
                  }
                  return (
                    <div key={i} className={`letter-box ${status}`}>
                      {revealed ? target[i] : (ch && ch !== ' ' ? ch : '')}
                    </div>
                  );
                })}
              </div>

              {/* Innsláttarsvæði */}
              {!correct && !revealed && (
                <div className="space-y-3">
                  <input
                    ref={inputRef}
                    type="text"
                    value={input}
                    onChange={e => { setInput(e.target.value); setSubmitted(false); }}
                    onKeyDown={handleKeyDown}
                    disabled={submitted && !correct}
                    placeholder="Skrifaðu orðið hér..."
                    className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-lg disabled:bg-gray-50"
                    autoComplete="off"
                    autoCorrect="off"
                    spellCheck={false}
                  />
                  <div className="flex gap-3">
                    {!submitted ? (
                      <button
                        onClick={checkAnswer}
                        disabled={!input.trim()}
                        className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light"
                      >
                        Athuga
                      </button>
                    ) : (
                      <button
                        onClick={retry}
                        className="flex-1 py-3 bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-colors font-light"
                      >
                        Reyna aftur
                      </button>
                    )}
                    {attempts >= 2 && !revealed && (
                      <button
                        onClick={reveal}
                        className="px-4 py-3 border-2 border-gray-200 text-gray-500 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm"
                      >
                        Gefast upp
                      </button>
                    )}
                  </div>

                  {/* Endurgjöf – rangt */}
                  {submitted && !correct && (
                    <div className="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700 font-light fade-in">
                      Ekki alveg – reyndu aftur! 💪
                    </div>
                  )}
                </div>
              )}

              {/* Endurgjöf – rétt */}
              {correct && (
                <div className="space-y-4 fade-in">
                  <div className="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-green-700 font-light">
                    ✓ Frábært! <strong>{target}</strong> er rétt!
                  </div>
                  <button
                    onClick={goNext}
                    className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
                  >
                    {idx + 1 >= WORDS.length ? 'Sjá niðurstöður 🎉' : 'Næsta orð →'}
                  </button>
                </div>
              )}

              {/* Endurgjöf – gefið upp */}
              {revealed && (
                <div className="space-y-4 fade-in">
                  <div className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-amber-700 font-light">
                    💡 Orðið var <strong>{target}</strong>. Ekki hægt að vinna alltaf!
                  </div>
                  <button
                    onClick={goNext}
                    className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
                  >
                    {idx + 1 >= WORDS.length ? 'Sjá niðurstöður 🎉' : 'Næsta orð →'}
                  </button>
                </div>
              )}
            </div>

            {/* Smátexti */}
            <p className="text-center text-xs text-gray-400 font-light mt-5">
              Smelltu á 🔊 til að heyra vísbendinguna lesna upp
            </p>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
