<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Hlustun 7: Í Bónus – ÍSAT1ÍA</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .answer-option {
      border: 2px solid #e0e0e0;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.disabled) { border-color: #2196f3; background: #e3f2fd; }
    .answer-option.selected  { border-color: #2196f3; background: #e3f2fd; }
    .answer-option.correct   { border-color: #4caf50; background: #e8f5e9; }
    .answer-option.incorrect { border-color: #f44336; background: #ffebee; }
    .answer-option.disabled  { cursor: default; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-content {
      background: white; border-radius: 1rem; max-width: 48rem; width: 100%;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }
    function extractFirstJSON(text) {
      const clean = text.replace(/```json\s*/g, '').replace(/```/g, '').trim();
      const s = clean.indexOf('{'); const e = clean.lastIndexOf('}');
      if (s < 0 || e < 0 || e <= s) throw new Error('No JSON found');
      return JSON.parse(clean.slice(s, e + 1));
    }

    // --- Gögn ---
    const LISTENING_TEXT = `Anna og Bjarki eru í Bónus. Þau ætla að kaupa í matinn. Sigurður er heima með Lilju og kötturinn Mási er sofandi í sófanum.

Anna tekur fram símann sinn og les innkaupalista:
„Við þurfum pizzadeig og rifinn ost. Líka eitthvað að drekka."

Bjarki tekur deigið og spyr:
„Hvað álegg eigum við að hafa?"

„Við gerum tvær pizzur. Eina með pepperóní og sveppum og eina með skinku, sveppum og ólífum."

Þau ganga um búðina. Anna tekur ferska sveppi í grænmetisdeildinni. Bjarki finnur drykki fyrir þau.

„Það vantar krydd!" segir Bjarki.

„Rétt! Við þurfum óreganó."

Þau finna kryddin. Svo ganga þau að kassanum.

„Við gleymdum sósunni!" segir Anna skyndilega.

Bjarki drífur sig aftur inn í búð. Hann finnur pizzusósuna og kemur aftur.

„Nú er allt komið held ég!" segir hann.

Þau borga og fara heim með pokana.

Heima segir Anna:
„Þessi matur verður mjög ljúffengur! Pabbi þinn elskar pizzu."

Lilja kemur í eldhúsið:
„Hvað ertu að elda mamma?"

„Pizzu."

„Á ég að aðstoða og fletja deigið?"

„Já takk, endilega!"`;

    const VOCAB = [
      { w: "deig (hk)",          hint: "blanda af hveiti og vatni til að baka eða gera pizzu" },
      { w: "rifinn ostur (kk)",   hint: "ostur sem er skorinn í litla bita" },
      { w: "álegg (hk)",          hint: "matur sem fer ofan á pizzu eða brauð" },
      { w: "að fletja",           hint: "að þrýsta deigi út með höndunum eða kökukefli" },
      { w: "að aðstoða",          hint: "að hjálpa einhverjum" },
    ];

    const MULTIPLE_CHOICE = [
      { question: 'Hvar eru Anna og Bjarki?', options: ['Í Hagkaup','Í Bónus','Í Krambúðinni','Á veitingastað'], correct: 1 },
      { question: 'Hvað eru þau að kaupa?', options: ['Kjöt og kartöflur','Brauð og mjólk','Pizzadeig og ost','Ís og súkkulaði'], correct: 2 },
      { question: 'Hvað er á pizzunni með pepperóní?', options: ['Pepperóní og sveppir','Pepperóní og skinka','Bara pepperóní','Pepperóní og ólífur'], correct: 0 },
      { question: 'Hvað gleymdu þau að kaupa?', options: ['Ostinn','Deigið','Pizzusósuna','Drykkinn'], correct: 2 },
      { question: 'Hvað vill Lilja gera?', options: ['Borða pizzu','Fara út','Aðstoða og fletja deigið','Horfa á sjónvarp'], correct: 2 },
    ];

    const OPEN_QUESTIONS = [
      { question: 'Hvað les Anna á símanum sínum?',        expectedContent: ['innkaupalista','pizzadeig','rifinn ost','drykkur'] },
      { question: 'Hvaða tvær pizzur ætla þau að gera?',   expectedContent: ['pepperóní','sveppir','skinku','ólífur'] },
      { question: 'Hvað finnur Anna í grænmetisdeildinni?', expectedContent: ['ferska','sveppi','sveppina'] },
      { question: 'Hvaða krydd vantar þau?',               expectedContent: ['óreganó'] },
    ];

    const TRUE_FALSE = [
      { statement: 'Sigurður er í Bónus með Önnu og Bjarka.', correct: false },
      { statement: 'Þau ætla að gera tvær pizzur.',           correct: true  },
      { statement: 'Bjarki finnur pizzusósuna.',              correct: true  },
      { statement: 'Lilja vill ekki hjálpa við að elda.',     correct: false },
      { statement: 'Mási kötturinn er sofandi í sófanum.',    correct: true  },
    ];

    const MATCHING = [
      { left: 'Anna',     right: 'Les innkaupalista á símanum' },
      { left: 'Bjarki',   right: 'Fer aftur inn í búð að sækja sósuna' },
      { left: 'Lilja',    right: 'Vill aðstoða og fletja deigið' },
      { left: 'Sigurður', right: 'Er heima og bíður eftir pizzunni' },
    ];

    const TABS = [
      { label: 'Rétt/Rangt' },
      { label: 'Krossar' },
      { label: 'Paraðu' },
      { label: 'Opnar' },
      { label: 'Þýðing' },
    ];

    // --- Aðalíhlutur ---
    const HlustunBonus = () => {
      const audioRef = useRef(null);
      const [isPlaying,    setIsPlaying]    = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [currentTime,  setCurrentTime]  = useState(0);
      const [duration,     setDuration]     = useState(0);
      const [showTextModal, setShowTextModal] = useState(false);
      const [activeTab,    setActiveTab]    = useState(0);
      const [doneTabs,     setDoneTabs]     = useState([false,false,false,false,false]);

      const markDone = (i) => setDoneTabs(prev => { const n=[...prev]; n[i]=true; return n; });
      const allDone  = doneTabs.every(Boolean);

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate]);

      const togglePlay = () => {
        if (!audioRef.current) return;
        isPlaying ? audioRef.current.pause() : audioRef.current.play();
      };

      // --- Þýðing state ---
      const [translationAnswer,  setTranslationAnswer]  = useState('');
      const [translationFeedback,setTranslationFeedback] = useState(null);
      const [translationLoading, setTranslationLoading]  = useState(false);

      const checkTranslation = async () => {
        if (translationAnswer.trim().length < 2) { alert('Vinsamlegast skrifaðu þýðingu!'); return; }
        setTranslationLoading(true);
        try {
          const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.
ÍSLENSKA ORÐIÐ: "deig (hk)"
SVAR NEMANDA: "${translationAnswer}"
SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{"correct":boolean,"detected_language":"nafn tungumálsins","feedback_is":"Endurgjöf á íslensku","feedback_native":"Endurgjöf á greinda tungumálinu","correct_translation":"Góð þýðing ef rangt, annars null"}`;
          const resp = await callOpenAI({ model:'gpt-4o', temperature:0.3, max_tokens:300,
            messages:[{role:'system',content:sys},{role:'user',content:'Meta þýðingu'}] });
          setTranslationFeedback(extractFirstJSON(resp));
        } catch(e) { alert('Villa við að meta þýðingu. Reyndu aftur.'); }
        finally { setTranslationLoading(false); }
      };

      // --- Krossar state ---
      const [mcAnswers, setMcAnswers] = useState([]);
      const [mcChecked, setMcChecked] = useState(false);
      const handleMcAnswer = (qi, oi) => { if (mcChecked) return; const a=[...mcAnswers]; a[qi]=oi; setMcAnswers(a); };
      const checkMcAnswers = () => {
        if (!MULTIPLE_CHOICE.every((_,i) => Number.isInteger(mcAnswers[i]))) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setMcChecked(true);
      };

      // --- Opnar state ---
      const [openAnswers, setOpenAnswers] = useState(Array(OPEN_QUESTIONS.length).fill(''));
      const [openFeedback,setOpenFeedback] = useState(Array(OPEN_QUESTIONS.length).fill(null));
      const [openLoading, setOpenLoading]  = useState(Array(OPEN_QUESTIONS.length).fill(false));
      const handleOpenAnswer = (i,v) => { const a=[...openAnswers]; a[i]=v; setOpenAnswers(a); };
      const checkOpenAnswer = async (index) => {
        if (openAnswers[index].trim().length < 3) { alert('Vinsamlegast skrifaðu svar!'); return; }
        const nl=[...openLoading]; nl[index]=true; setOpenLoading(nl);
        try {
          const q = OPEN_QUESTIONS[index];
          const sys = `Þú ert íslenskukennari sem metur svör nemenda við opnum spurningum.
SPURNINGIN: "${q.question}"
SVAR NEMANDA: "${openAnswers[index]}"
LYKILATRIÐI: ${q.expectedContent.join(', ')}
SKILAÐU JSON (BARA JSON): {"correct":boolean,"feedback":"Stutt og hvetjandi endurgjöf á íslensku"}`;
          const resp = await callOpenAI({ model:'gpt-4o-mini', temperature:0.3, max_tokens:200,
            messages:[{role:'system',content:sys},{role:'user',content:'Meta svar'}] });
          const nf=[...openFeedback]; nf[index]=extractFirstJSON(resp); setOpenFeedback(nf);
        } catch(e) { alert('Villa við að meta svar. Reyndu aftur.'); }
        finally { const nl2=[...openLoading]; nl2[index]=false; setOpenLoading(nl2); }
      };

      // --- Rétt/Rangt state ---
      const [tfAnswers, setTfAnswers] = useState([]);
      const [tfChecked, setTfChecked] = useState(false);
      const handleTfAnswer = (i,v) => { if (tfChecked) return; const a=[...tfAnswers]; a[i]=v; setTfAnswers(a); };
      const checkTfAnswers = () => {
        if (!TRUE_FALSE.every((_,i) => typeof tfAnswers[i]==='boolean')) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setTfChecked(true);
      };

      // --- Paraðu state ---
      const [matchingAnswers, setMatchingAnswers] = useState(Array(MATCHING.length).fill(''));
      const [matchingChecked, setMatchingChecked] = useState(false);
      const rightOptions = useMemo(() => [...MATCHING.map(m=>m.right)].sort(()=>Math.random()-0.5), []);
      const handleMatchingAnswer = (i,v) => { if (matchingChecked) return; const a=[...matchingAnswers]; a[i]=v; setMatchingAnswers(a); };
      const checkMatching = () => {
        if (!matchingAnswers.every(v=>!!v)) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setMatchingChecked(true);
      };

      // Næsti flipi
      const goNext = () => {
        markDone(activeTab);
        if (activeTab < TABS.length - 1) setActiveTab(activeTab + 1);
      };

      // Athuga hvort núverandi flipi sé lokin
      const isCurrentDone = () => {
        if (activeTab === 0) return tfChecked;
        if (activeTab === 1) return mcChecked;
        if (activeTab === 2) return matchingChecked;
        if (activeTab === 3) return openFeedback.every(f => f !== null);
        if (activeTab === 4) return translationFeedback !== null;
        return false;
      };

      return (
        <div className="min-h-screen pb-24">

          {/* Haus */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">Hlustun 7: Í Bónus</h1>
              <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
            </div>
          </header>

          {/* Sticky hljóðspilari */}
          <div className="sticky-player">
            <div className="max-w-4xl mx-auto px-6 py-4">
              <div className="bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg p-4 border-2 border-blue-200">
                <div className="flex items-center gap-3">
                  <button onClick={togglePlay}
                    className="bg-blue-500 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors flex-shrink-0">
                    {isPlaying
                      ? <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                      : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
                  </button>
                  <button onClick={() => { if (audioRef.current) audioRef.current.currentTime -= 10; }}
                    className="bg-white text-gray-600 w-9 h-9 rounded-full flex items-center justify-center hover:bg-gray-100 text-xs flex-shrink-0">⏮️</button>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between mb-1">
                      <p className="text-sm font-light text-gray-700">🎧 Hlusta á textann</p>
                      <span className="text-xs text-gray-500 font-mono">
                        {Math.floor(currentTime/60)}:{String(Math.floor(currentTime%60)).padStart(2,'0')} / {Math.floor(duration/60)}:{String(Math.floor(duration%60)).padStart(2,'0')}
                      </span>
                    </div>
                    <div className="w-full h-2 bg-white/60 rounded-full cursor-pointer relative overflow-hidden"
                      onClick={(e) => { if (!audioRef.current) return; const r=e.currentTarget.getBoundingClientRect(); audioRef.current.currentTime=(e.clientX-r.left)/r.width*duration; }}>
                      <div className="absolute top-0 left-0 h-full bg-blue-500 transition-all" style={{width:`${(currentTime/duration)*100||0}%`}}/>
                    </div>
                    <audio ref={audioRef} src="/isat1ia/media/hlustun7_bonus.mp3" preload="metadata"
                      onEnded={()=>setIsPlaying(false)} onPlay={()=>setIsPlaying(true)} onPause={()=>setIsPlaying(false)}
                      onTimeUpdate={()=>setCurrentTime(audioRef.current?.currentTime||0)}
                      onLoadedMetadata={()=>setDuration(audioRef.current?.duration||0)}/>
                  </div>
                  <button onClick={() => { if (audioRef.current) audioRef.current.currentTime += 10; }}
                    className="bg-white text-gray-600 w-9 h-9 rounded-full flex items-center justify-center hover:bg-gray-100 text-xs flex-shrink-0">⏭️</button>
                  <div className="flex gap-1">
                    {[0.75,1,1.25].map(r => (
                      <button key={r} onClick={()=>setPlaybackRate(r)}
                        className={`px-2 py-1 rounded text-xs font-light transition-colors ${playbackRate===r?'bg-blue-500 text-white':'bg-white text-gray-600 hover:bg-gray-100'}`}>
                        {r}×
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Lykilorð */}
          <div className="max-w-4xl mx-auto px-6 mt-6">
            <section className="bg-yellow-50 border-2 border-yellow-200 rounded-xl p-6 mb-6">
              <h2 className="text-lg font-light text-gray-800 mb-3">📘 Lykilorð</h2>
              <div className="grid md:grid-cols-2 gap-3">
                {VOCAB.map((it,i) => (
                  <div key={i} className="rounded-lg border border-yellow-200 bg-white/70 p-3">
                    <div className="font-normal text-sm text-gray-900">{it.w}</div>
                    <div className="text-xs text-gray-600 font-light">{it.hint}</div>
                  </div>
                ))}
              </div>
            </section>
          </div>

          {/* Flipainnihald */}
          <main className="max-w-4xl mx-auto px-6">

            {/* --- Flipi 4: Þýðing --- */}
            {activeTab === 4 && (
              <section className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 fade-in">
                <h2 className="text-2xl font-light text-gray-800 mb-6">Þýðing</h2>
                <div className="border-2 border-gray-100 rounded-lg p-5">
                  <p className="font-normal text-gray-800 mb-4">Hvað þýðir <strong>„deig"</strong> á þínu móðurmáli?</p>
                  <textarea value={translationAnswer} onChange={e=>setTranslationAnswer(e.target.value)}
                    disabled={translationFeedback!==null}
                    className="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50"
                    rows="3" placeholder="Skrifaðu þýðinguna hér..."/>
                  {!translationFeedback ? (
                    <div className="flex gap-3 mt-3">
                      <button onClick={checkTranslation} disabled={translationLoading}
                        className="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-colors font-light text-sm">
                        {translationLoading ? 'Athuga...' : 'Athuga þýðingu'}
                      </button>
                      <button onClick={()=>{setTranslationAnswer('');setTranslationFeedback(null);}}
                        className="px-4 py-2 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light text-sm">
                        Endurstilla
                      </button>
                    </div>
                  ) : (
                    <div className={`mt-3 p-4 rounded-lg fade-in ${translationFeedback.correct?'bg-green-50 border-2 border-green-200':'bg-yellow-50 border-2 border-yellow-200'}`}>
                      <p className={`font-light mb-1 ${translationFeedback.correct?'text-green-800':'text-yellow-800'}`}>
                        {translationFeedback.correct?'✓':'💡'} {translationFeedback.feedback_is}
                      </p>
                      <p className={`text-sm font-light ${translationFeedback.correct?'text-green-700':'text-yellow-700'}`}>{translationFeedback.feedback_native}</p>
                      {translationFeedback.correct_translation && (
                        <p className="text-sm text-gray-600 mt-2 font-light"><strong>Dæmi:</strong> {translationFeedback.correct_translation}</p>
                      )}
                      <button onClick={()=>{setTranslationAnswer('');setTranslationFeedback(null);}}
                        className="mt-3 px-4 py-2 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light text-sm">
                        Reyna aftur
                      </button>
                    </div>
                  )}
                </div>
              </section>
            )}

            {/* --- Flipi 1: Krossaspurningar --- */}
            {activeTab === 1 && (
              <section className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 fade-in">
                <h2 className="text-2xl font-light text-gray-800 mb-6">Krossaspurningar</h2>
                <div className="space-y-5">
                  {MULTIPLE_CHOICE.map((q,qi) => (
                    <div key={qi} className="border-2 border-gray-100 rounded-lg p-4">
                      <p className="font-normal text-gray-800 mb-3">{q.question}</p>
                      <div className="space-y-2">
                        {q.options.map((opt,oi) => {
                          const isSel = mcAnswers[qi]===oi;
                          const isCorr = oi===q.correct;
                          return (
                            <div key={oi} onClick={()=>handleMcAnswer(qi,oi)}
                              className={`answer-option p-3 rounded-lg ${isSel&&!mcChecked?'selected':''} ${mcChecked&&isCorr?'correct':''} ${mcChecked&&isSel&&!isCorr?'incorrect':''} ${mcChecked?'disabled':''}`}>
                              <div className="flex items-center gap-3">
                                <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0
                                  ${isSel&&!mcChecked?'border-blue-500 bg-blue-500':mcChecked&&isCorr?'border-green-500 bg-green-500':mcChecked&&isSel&&!isCorr?'border-red-500 bg-red-500':'border-gray-300'}`}>
                                  {(isSel||mcChecked&&isCorr)&&<div className="w-1.5 h-1.5 bg-white rounded-full"/>}
                                </div>
                                <span className="font-light flex-1">{opt}</span>
                                {mcChecked&&isCorr&&<span className="text-green-600">✓</span>}
                                {mcChecked&&isSel&&!isCorr&&<span className="text-red-600">✗</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                {!mcChecked ? (
                  <div className="mt-6 flex gap-3">
                    <button onClick={checkMcAnswers} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-light">Athuga svör</button>
                    <button onClick={()=>{setMcAnswers([]);setMcChecked(false);}} className="px-5 py-2 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light">Endurstilla</button>
                  </div>
                ) : (
                  <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4 fade-in">
                    <p className="text-green-800 font-light">✓ Þú fékkst {mcAnswers.filter((a,i)=>a===MULTIPLE_CHOICE[i].correct).length} af {MULTIPLE_CHOICE.length} rétt!</p>
                  </div>
                )}
              </section>
            )}

            {/* --- Flipi 3: Opnar spurningar --- */}
            {activeTab === 3 && (
              <section className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 fade-in">
                <h2 className="text-2xl font-light text-gray-800 mb-2">Opnar spurningar</h2>
                <p className="text-gray-500 font-light text-sm mb-6">Svaraðu með þínum eigin orðum.</p>
                <div className="space-y-5">
                  {OPEN_QUESTIONS.map((q,i) => (
                    <div key={i} className="border-2 border-gray-100 rounded-lg p-4">
                      <p className="font-normal text-gray-800 mb-3">{i+1}. {q.question}</p>
                      <textarea value={openAnswers[i]} onChange={e=>handleOpenAnswer(i,e.target.value)}
                        disabled={openFeedback[i]!==null}
                        className="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50"
                        rows="3" placeholder="Skrifaðu svarið þitt hér..."/>
                      {!openFeedback[i] ? (
                        <div className="flex gap-3 mt-3">
                          <button onClick={()=>checkOpenAnswer(i)} disabled={openLoading[i]}
                            className="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-colors font-light text-sm">
                            {openLoading[i]?'Athuga...':'Athuga svar'}
                          </button>
                          <button onClick={()=>{const a=[...openAnswers];a[i]='';setOpenAnswers(a);}}
                            className="px-4 py-2 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light text-sm">Hreinsa</button>
                        </div>
                      ) : (
                        <div className={`mt-3 p-3 rounded-lg fade-in ${openFeedback[i].correct?'bg-green-50 border-2 border-green-200':'bg-yellow-50 border-2 border-yellow-200'}`}>
                          <p className={`text-sm font-light ${openFeedback[i].correct?'text-green-800':'text-yellow-800'}`}>
                            {openFeedback[i].correct?'✓':'💡'} {openFeedback[i].feedback}
                          </p>
                          <button onClick={()=>{const nf=[...openFeedback];nf[i]=null;setOpenFeedback(nf);const na=[...openAnswers];na[i]='';setOpenAnswers(na);}}
                            className="mt-2 px-3 py-1.5 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light text-xs">Reyna aftur</button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </section>
            )}

            {/* --- Flipi 0: Rétt eða rangt --- */}
            {activeTab === 0 && (
              <section className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 fade-in">
                <h2 className="text-2xl font-light text-gray-800 mb-6">Rétt eða rangt?</h2>
                <div className="space-y-4">
                  {TRUE_FALSE.map((item,i) => (
                    <div key={i} className="border-2 border-gray-100 rounded-lg p-4">
                      <p className="font-light text-gray-800 mb-3">{item.statement}</p>
                      <div className="flex gap-3">
                        {[true,false].map(ans => {
                          const isSel = tfAnswers[i]===ans;
                          const isCorr = ans===item.correct;
                          return (
                            <div key={String(ans)} onClick={()=>handleTfAnswer(i,ans)}
                              className={`answer-option flex-1 p-3 rounded-lg ${isSel&&!tfChecked?'selected':''} ${tfChecked&&isCorr?'correct':''} ${tfChecked&&isSel&&!isCorr?'incorrect':''} ${tfChecked?'disabled':''}`}>
                              <div className="flex items-center justify-center gap-2">
                                <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center
                                  ${isSel&&!tfChecked?'border-blue-500 bg-blue-500':tfChecked&&isCorr?'border-green-500 bg-green-500':tfChecked&&isSel&&!isCorr?'border-red-500 bg-red-500':'border-gray-300'}`}>
                                  {(isSel||tfChecked&&isCorr)&&<div className="w-1.5 h-1.5 bg-white rounded-full"/>}
                                </div>
                                <span className="font-light text-sm">{ans?'Rétt':'Rangt'}</span>
                                {tfChecked&&isCorr&&<span className="text-green-600 text-sm">✓</span>}
                                {tfChecked&&isSel&&!isCorr&&<span className="text-red-600 text-sm">✗</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                {!tfChecked ? (
                  <div className="mt-6 flex gap-3">
                    <button onClick={checkTfAnswers} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-light">Athuga svör</button>
                    <button onClick={()=>{setTfAnswers([]);setTfChecked(false);}} className="px-5 py-2 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light">Endurstilla</button>
                  </div>
                ) : (
                  <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4 fade-in">
                    <p className="text-green-800 font-light">✓ Þú fékkst {tfAnswers.filter((a,i)=>a===TRUE_FALSE[i].correct).length} af {TRUE_FALSE.length} rétt!</p>
                  </div>
                )}
              </section>
            )}

            {/* --- Flipi 2: Paraðu saman --- */}
            {activeTab === 2 && (
              <section className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 fade-in">
                <h2 className="text-2xl font-light text-gray-800 mb-6">Paraðu saman</h2>
                <div className="space-y-4">
                  {MATCHING.map((item,i) => (
                    <div key={i} className="border-2 border-gray-100 rounded-lg p-4">
                      <div className="flex items-center gap-4">
                        <div className="flex-1"><span className="font-normal text-gray-800">{item.left}</span></div>
                        <div className="text-gray-400">→</div>
                        <div className="flex-1">
                          <select value={matchingAnswers[i]} onChange={e=>handleMatchingAnswer(i,e.target.value)} disabled={matchingChecked}
                            className={`w-full p-2 border-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light text-sm
                              ${matchingChecked?(matchingAnswers[i]===item.right?'border-green-500 bg-green-50':'border-red-500 bg-red-50'):'border-gray-300'}`}>
                            <option value="">Veldu...</option>
                            {rightOptions.map((opt,j)=><option key={j} value={opt}>{opt}</option>)}
                          </select>
                        </div>
                        {matchingChecked&&<div className="w-6 flex-shrink-0">{matchingAnswers[i]===item.right?<span className="text-green-600">✓</span>:<span className="text-red-600">✗</span>}</div>}
                      </div>
                      {matchingChecked&&matchingAnswers[i]!==item.right&&(
                        <p className="text-xs text-red-600 mt-2">Rétt svar: {item.right}</p>
                      )}
                    </div>
                  ))}
                </div>
                {!matchingChecked ? (
                  <div className="mt-6 flex gap-3">
                    <button onClick={checkMatching} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-light">Athuga svör</button>
                    <button onClick={()=>{setMatchingAnswers(Array(MATCHING.length).fill(''));setMatchingChecked(false);}} className="px-5 py-2 border-2 border-gray-200 rounded-lg hover:bg-gray-50 font-light">Endurstilla</button>
                  </div>
                ) : (
                  <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4 fade-in">
                    <p className="text-green-800 font-light">✓ Þú fékkst {matchingAnswers.filter((v,i)=>v===MATCHING[i].right).length} af {MATCHING.length} rétt!</p>
                  </div>
                )}
              </section>
            )}

            {/* Næsti takki / Lokakassi */}
            {isCurrentDone() && (
              <div className="mt-4 fade-in">
                {activeTab < TABS.length - 1 ? (
                  <button onClick={goNext}
                    className="w-full py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors font-light text-lg">
                    Næsti liður →
                  </button>
                ) : (
                  <div className="bg-green-50 border-2 border-green-200 rounded-xl p-8 text-center">
                    <div className="text-5xl mb-3">🎉</div>
                    <h3 className="text-xl font-light text-gray-800 mb-2">Vel gert!</h3>
                    <p className="text-gray-600 font-light mb-5">Þú hefur lokið öllum verkefnum.</p>
                    <button onClick={()=>setShowTextModal(true)}
                      className="bg-green-600 text-white px-8 py-3 rounded-xl hover:bg-green-700 transition-colors font-light">
                      📖 Lesa textann
                    </button>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Fast framvindusika neðst */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-4 py-3 flex gap-2">
              {TABS.map((tab,i) => (
                <button key={i} onClick={()=>setActiveTab(i)}
                  className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                    ${doneTabs[i] ? 'bg-blue-600 text-white' : i===activeTab ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-500'}`}>
                  {doneTabs[i] ? '✓ ' : ''}{tab.label}
                </button>
              ))}
            </div>
          </div>

          {/* Modal – textinn */}
          {showTextModal && (
            <div className="modal-overlay" onClick={()=>setShowTextModal(false)}>
              <div className="modal-content" onClick={e=>e.stopPropagation()}>
                <div className="sticky top-0 bg-white border-b-2 border-gray-200 p-5 flex items-center justify-between">
                  <h2 className="text-xl font-light text-gray-800">📖 Hlustunartextinn</h2>
                  <button onClick={()=>setShowTextModal(false)} className="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
                </div>
                <div className="p-8">
                  {LISTENING_TEXT.split('\n\n').map((p,i) => (
                    <p key={i} className="mb-4 text-gray-700 font-light leading-relaxed">{p}</p>
                  ))}
                  <div className="text-center mt-6">
                    <button onClick={()=>setShowTextModal(false)}
                      className="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors font-light">Loka</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HlustunBonus />);
  </script>
</body>
</html>
