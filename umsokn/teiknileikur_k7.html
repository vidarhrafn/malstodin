<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎨 Teiknileikur – Mat og innkaup</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const WORDS = [
      { word: 'pizza',      difficulty: 'easy' },
      { word: 'blómkál',    difficulty: 'easy' },
      { word: 'laukur',     difficulty: 'easy' },
      { word: 'paprika',    difficulty: 'easy' },
      { word: 'kjúklingur', difficulty: 'medium' },
      { word: 'brauð',      difficulty: 'easy' },
      { word: 'ostur',      difficulty: 'easy' },
      { word: 'sveppir',    difficulty: 'medium' },
      { word: 'ólífur',     difficulty: 'medium' },
      { word: 'hrísgrjón',  difficulty: 'medium' },
    ];

    const getDifficultyColor = (d) => ({
      easy:   'bg-green-100 text-green-800 border-green-300',
      medium: 'bg-yellow-100 text-yellow-800 border-yellow-300',
      hard:   'bg-red-100 text-red-800 border-red-300',
    }[d] || 'bg-gray-100 text-gray-800 border-gray-300');

    const getDifficultyText = (d) => ({
      easy: 'Auðvelt', medium: 'Miðlungs', hard: 'Erfitt'
    }[d] || '');

    const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

    const PictionaryGame = () => {
      const [usedWords, setUsedWords]     = useState([]);
      const [currentWord, setCurrentWord] = useState(null);
      const [timeLeft, setTimeLeft]       = useState(60);
      const [isRunning, setIsRunning]     = useState(false);
      const [gameFinished, setGameFinished] = useState(false);

      useEffect(() => {
        let interval;
        if (isRunning && timeLeft > 0) {
          interval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (timeLeft === 0) {
          setIsRunning(false);
        }
        return () => clearInterval(interval);
      }, [isRunning, timeLeft]);

      const getRandomWord = () => {
        const available = WORDS.filter(w => !usedWords.includes(w.word));
        if (available.length === 0) { setGameFinished(true); return null; }
        return available[Math.floor(Math.random() * available.length)];
      };

      const startNewWord = () => {
        const word = getRandomWord();
        if (word) { setCurrentWord(word); setTimeLeft(60); setIsRunning(true); }
      };

      const stopTimer = () => {
        setIsRunning(false);
        setCurrentWord(null);
        setTimeLeft(60);
      };

      const nextWord = () => {
        if (currentWord) setUsedWords(prev => [...prev, currentWord.word]);
        const word = getRandomWord();
        if (word) { setCurrentWord(word); setTimeLeft(60); setIsRunning(true); }
      };

      const resetGame = () => {
        setUsedWords([]); setCurrentWord(null);
        setTimeLeft(60); setIsRunning(false); setGameFinished(false);
      };

      return (
        <div className="min-h-screen pb-12">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎨 Teiknileikur</h1>
              <p className="text-gray-500 text-sm font-light">Pictionary á íslensku · A1–A2</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">

            <div className="bg-blue-50 border border-blue-200 rounded-lg p-5 mb-6">
              <h2 className="text-base font-normal text-gray-800 mb-2">📝 Leiðbeiningar</h2>
              <ul className="space-y-1 text-gray-700 font-light text-sm">
                <li>• Smelltu á „Birta orð" til að byrja</li>
                <li>• Einn nemandi teiknar orðið á töflu eða blað</li>
                <li>• Aðrir giska – þú hefur 60 sekúndur</li>
                <li>• Smelltu á „Næsta orð" þegar rétt er giskað</li>
              </ul>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">

              <div className="mb-6 text-center">
                <p className="text-gray-400 font-light text-sm">
                  Orð notuð: <span className="text-gray-600">{usedWords.length}</span> / {WORDS.length}
                </p>
              </div>

              {/* Leikur lokið */}
              {gameFinished && (
                <div className="text-center py-12">
                  <div className="text-6xl mb-4">🎉</div>
                  <h2 className="text-2xl font-light text-gray-800 mb-4">Leikur lokið!</h2>
                  <p className="text-gray-500 font-light mb-8">Þið kláruðuð öll {WORDS.length} orðin!</p>
                  <button onClick={resetGame}
                    className="bg-blue-600 text-white px-8 py-4 rounded-lg text-lg font-light hover:bg-blue-700 transition-colors">
                    🔄 Byrja aftur
                  </button>
                </div>
              )}

              {/* Engin orð valin */}
              {!gameFinished && !currentWord && (
                <div className="text-center py-12">
                  <div className="text-6xl mb-8">🎨</div>
                  <button onClick={startNewWord}
                    className="bg-green-600 text-white px-10 py-4 rounded-xl text-xl font-light hover:bg-green-700 transition-colors shadow-sm">
                    📝 Birta orð
                  </button>
                </div>
              )}

              {/* Orð valið */}
              {!gameFinished && currentWord && (
                <div className="text-center">
                  <div className="mb-5">
                    <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-light border-2 ${getDifficultyColor(currentWord.difficulty)}`}>
                      {getDifficultyText(currentWord.difficulty)}
                    </span>
                  </div>

                  <div className="bg-gradient-to-br from-purple-50 to-blue-50 border-4 border-purple-200 rounded-2xl p-12 mb-8">
                    <p className="text-6xl font-light text-gray-800">
                      {currentWord.word}
                    </p>
                  </div>

                  <div className="mb-8">
                    <span className={`text-5xl font-light ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-gray-700'}`}>
                      {formatTime(timeLeft)}
                    </span>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <button onClick={stopTimer}
                      className="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg text-base font-light hover:bg-gray-300 transition-colors">
                      ⏹ Stoppa
                    </button>
                    <button onClick={nextWord}
                      className="bg-green-600 text-white px-8 py-3 rounded-lg text-base font-light hover:bg-green-700 transition-colors">
                      ➡️ Næsta orð
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* Notuð orð */}
            {usedWords.length > 0 && !gameFinished && (
              <div className="mt-6 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 className="text-sm font-normal text-gray-600 mb-3">✅ Orð sem hafa verið notuð:</h3>
                <div className="flex flex-wrap gap-2">
                  {usedWords.map((word, i) => (
                    <span key={i} className="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm font-light">
                      {word}
                    </span>
                  ))}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<PictionaryGame />);
  </script>
</body>
</html>
