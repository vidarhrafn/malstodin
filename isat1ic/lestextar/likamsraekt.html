<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Lestexti 2: Líkamsrækt – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected   { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct    { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect  { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled   { cursor: default; }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .tab-btn.active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }
    .chat-container {
      max-height: 500px;
      overflow-y: auto;
    }
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .chat-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.READING_TEXT = "Líkamsrækt er hreyfing og æfingar sem styrkja og rækta líkamann. Við ræktum yfirleitt blóm eða grænmeti en við tölum líka um að rækta líkama okkar. Það eru margar leiðir til að stunda líkamsrækt. Sumir fara í ræktina, sem er líkamsræktarstöð með fullt af tækjum. Aðrir kjósa að vera úti og leika sér, njóta náttúrunnar og hreyfa sig á sama tíma.\n\nÞað er hægt að gera margt í ræktinni. Þú getur til dæmis lyft lóðum. Að lyfta lóðum hjálpar þér að byggja upp styrk og vöðva. Það er líka hægt að hlaupa á hlaupabretti. Að hlaupa á hlaupabretti er eins og að hlaupa úti en þú ert innandyra og getur stillt hraðann. Þetta er sérstaklega gott þegar veðrið er ekki gott úti.\n\nÞað eru margar líkamsræktarstöðvar til á Íslandi en þú þarft að kaupa aðgang til að fá að æfa þar. Yfirleitt kaupir fólk kort fyrir einn eða fleiri mánuði eða árskort. Til að fara í ræktina þarf fyrst að pakka niður í íþróttatösku. Gott er að taka með hlaupaskó, íþróttaföt, handklæði og snyrtivörur en líka sundföt ef þú ætlar að fara í heita pottinn eða gufubað eftir ræktina.\n\nÞað eru margar ástæður fyrir því að fólk stundar líkamsrækt. Sumir lyfta lóðum til að verða sterkari, aðrir vilja meira þrek og hlaupa á hlaupabretti og enn aðrir fara í jóga og gera teyguæfingar til að vera liðugri. Sumir vilja hugsa um heilsuna en aðrir fara í ræktina til að líta vel út.\n\nEn það þarf ekki að fara í líkamsræktarstöð til að stunda líkamsrækt. Þú getur líka stundað líkamsrækt með því að leika þér úti, hjóla, synda eða dansa. Allt sem fær þig til að hreyfa þig er gott fyrir þig. Farðu í göngutúr með fjölskyldunni, spilaðu fótbolta með vinum þínum eða taktu þátt í dansi. Það eru líka margar leiðir til að vera virkur heima. Þú getur sett á tónlist og dansað, gert teygjuæfingar eða stundað jóga.";

    window.buildShortFeedbackPrompt = function(readingText, question, answer) {
      return "Þú ert vingjarnlegur íslenskukennari sem er að fara yfir stutt svör nemanda (A1-A2 stig).\n\n" +
        "TEXTINN SEM NEMANDINN LAS:\n\"" + readingText + "\"\n\n" +
        "SPURNINGIN:\n\"" + question + "\"\n\n" +
        "SVAR NEMANDANS:\n\"" + answer + "\"\n\n" +
        "VERKEFNI:\n" +
        "Gefðu hvetjandi endurgjöf (2-3 setningar á íslensku):\n" +
        "1. Byrjaðu með jákvæðu (t.d. \"Gott!\", \"Frábært!\")\n" +
        "2. Ef svarið er rétt eða nálægt því - hrósaðu og staðfestu\n" +
        "3. Ef svarið er rangt eða ónákvæmt - leiðréttu á mjúkan hátt og útskýrðu rétta svarið út frá textanum\n\n" +
        "REGLUR:\n" +
        "- Alltaf jákvæður og hvetjandi tónn\n" +
        "- Einföld íslenska (A1-A2)\n" +
        "- Vísa alltaf í textann\n" +
        "- 2-3 setningar\n\n" +
        "SKILAÐU BARA TEXTANUM, ekkert JSON eða annað.";
    };

    window.buildDiscussionPrompt = function(readingText, question, isLastExchange) {
      var base = "Þú ert vingjarnlegur íslenskukennari sem ræðir við A1-A2 nemanda um líkamsrækt.\n\n" +
        "TEXTINN SEM NEMANDINN LAS:\n\"" + readingText + "\"\n\n" +
        "UPPRUNALEGA SPURNINGIN:\n\"" + question + "\"\n\n";

      if (isLastExchange) {
        base += "MIKILVÆGT: Þetta er SÍÐASTA svar þitt í þessu spjalli. EKKI spyrja fleiri spurninga.\n\n";
      }

      base += "VERKEFNI:\n";
      if (isLastExchange) {
        base += "1. Gefðu hvetjandi og jákvæða endurgjöf á svari nemandans\n" +
          "2. Commentaðu á efnið - hvað finnst þér áhugavert?\n" +
          "3. Lokaðu með: \"Frábært! Gott spjall.\"\n" +
          "4. EKKI spyrja fleiri spurninga\n\n";
      } else {
        base += "1. Lestu svar nemandans og commentaðu á efnið - hvað er áhugavert?\n" +
          "2. Gefðu hvetjandi, jákvæða endurgjöf\n" +
          "3. Spyrðu einfalda follow-up spurningu sem tengist svari nemandans\n\n";
      }

      base += "REGLUR:\n" +
        "- Vertu ALLTAF jákvæður og hvetjandi\n" +
        "- Haltu því stuttu (2-4 setningar)\n" +
        "- Notaðu einfalda íslensku (A1-A2 stig)\n" +
        "- Notaðu bara íslensku\n" +
        "- ALDREI gefa einkunn\n";

      if (isLastExchange) {
        base += "- EKKI spyrja fleiri spurninga\n\n";
      } else {
        base += "- Spyrðu follow-up spurningu\n\n";
      }

      base += "SVARAÐU ALLTAF MEÐ JSON (EKKERT ANNAÐ - BARA HREIN JSON):\n" +
        "{\n" +
        "  \"grammar\": \"Málfarsendurgjöf BARA ef það eru GRÓFAR villur. Vertu mjög mild (1 setning). Ef ekkert athugavert: null\",\n" +
        "  \"response\": \"Aðal svarið þitt hér\"\n" +
        "}\n\n" +
        "ALDREI nota markdown - BARA hrein JSON!";

      return base;
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || 'HTTP ' + r.status);
      return data.content;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const READING_TEXT = window.READING_TEXT;

    const MULTIPLE_CHOICE_RAW = [
      {
        question: 'Hvernig er hægt að stunda líkamsrækt?',
        options: [
          'Með því að liggja í sófa og horfa á sjónvarp.',
          'Með því að spila tölvuleiki.',
          'Með því að fara í líkamsræktarstöð eða vera úti og hreyfa sig þar.',
        ],
        correct: 2
      },
      {
        question: 'Hvað hjálpar líkamsrækt við samkvæmt textanum?',
        options: [
          'Að horfa á sjónvarpið lengur.',
          'Að halda sér heilbrigðum og sterkum.',
          'Að borða meiri sælgæti.',
          'Að sofa lengur á morgnana.',
        ],
        correct: 1
      },
      {
        question: 'Hvað geturðu gert í ræktinni samkvæmt textanum?',
        options: [
          'Farið í sund.',
          'Hjólað á hjóli.',
          'Lyft lóðum.',
          'Spilað fótbolta.',
        ],
        correct: 2
      }
    ];

    const SHORT_OPEN_QUESTIONS = [
      'Hverjir eru kostir líkamsræktar fyrir börn og unglinga samkvæmt textanum?',
      'Nefndu dæmi um hvernig þú getur stundað líkamsrækt án þess að fara í ræktina samkvæmt textanum?',
      'Hvers vegna er mikilvægt að vera í formi samkvæmt textanum?',
    ];

    const DISCUSSION_QUESTIONS = [
      'Hefur þú farið í ræktina? Hvernig fannst þér?',
      'Af hverju ferð þú í líkamsrækt? Til að vera í góðu formi, vera heilbrigð/ur eða líta vel út?',
      'Hvers konar hreyfing finnst þér skemmtilegust?',
    ];

    const MAX_EXCHANGES_PER_QUESTION = 3;

    const TABS = [
      { id: 'krossar', label: 'Krossaspurningar', icon: '✓' },
      { id: 'stuttar', label: 'Stuttar spurningar', icon: '📝' },
      { id: 'umraeda', label: 'Tölum saman', icon: '💬' },
    ];

    const Likamsraekt = () => {
      // Text collapse
      const [showText, setShowText] = useState(true);

      // Tabs
      const [activeTab, setActiveTab] = useState('krossar');

      // MC
      const [mcAnswers, setMcAnswers] = useState({});
      const [showMcFeedback, setShowMcFeedback] = useState(false);

      // Shuffle MC options
      const mcQuestions = useMemo(() => {
        return MULTIPLE_CHOICE_RAW.map(q => {
          const indexed = q.options.map((text, i) => ({ text, origIndex: i }));
          const shuffled = shuffle(indexed);
          const newCorrect = shuffled.findIndex(o => o.origIndex === q.correct);
          return {
            question: q.question,
            options: shuffled.map(o => o.text),
            correct: newCorrect,
          };
        });
      }, []);

      // Short answers
      const [shortAnswers, setShortAnswers] = useState(['', '', '']);
      const [shortFeedback, setShortFeedback] = useState([null, null, null]);
      const [shortLoading, setShortLoading] = useState([false, false, false]);

      // Discussion
      const [conversations, setConversations] = useState([[], [], []]);
      const [currentInputs, setCurrentInputs] = useState(['', '', '']);
      const [loadingStates, setLoadingStates] = useState([false, false, false]);
      const [conversationClosed, setConversationClosed] = useState([false, false, false]);
      const [showContinuePrompt, setShowContinuePrompt] = useState([false, false, false]);
      const chatRefs = [useRef(null), useRef(null), useRef(null)];

      // Completion checks
      const isMcComplete = showMcFeedback;
      const isShortComplete = shortFeedback.every(f => f !== null);
      const isDiscussionComplete = conversations.every(c => c.filter(m => m.role === 'user').length >= 1);

      // --- MC ---
      const handleMcAnswer = (qi, oi) => {
        if (showMcFeedback) return;
        setMcAnswers(prev => ({ ...prev, [qi]: oi }));
      };

      const checkMcAnswers = () => {
        if (Object.keys(mcAnswers).length < mcQuestions.length) {
          alert('Vinsamlegast svaraðu öllum spurningum!');
          return;
        }
        setShowMcFeedback(true);
      };

      const resetMc = () => {
        setMcAnswers({});
        setShowMcFeedback(false);
      };

      // --- Short ---
      const handleShortChange = (i, v) => {
        const a = [...shortAnswers]; a[i] = v; setShortAnswers(a);
      };

      const getShortFeedback = async (i) => {
        const answer = shortAnswers[i];
        if (!answer.trim() || answer.trim().length < 3) {
          alert('Vinsamlegast skrifaðu svar (að minnsta kosti nokkur orð)');
          return;
        }
        const nl = [...shortLoading]; nl[i] = true; setShortLoading(nl);
        try {
          const sys = window.buildShortFeedbackPrompt(READING_TEXT, SHORT_OPEN_QUESTIONS[i], answer);
          const response = await callOpenAI({
            model: 'gpt-4o-mini',
            temperature: 0.5,
            max_tokens: 150,
            messages: [
              { role: 'system', content: sys },
              { role: 'user', content: 'Gefðu endurgjöf' },
            ],
          });
          const nf = [...shortFeedback]; nf[i] = response.trim(); setShortFeedback(nf);
        } catch (e) {
          console.error('Short feedback error:', e);
          alert('Villa við að fá endurgjöf. Reyndu aftur.');
        } finally {
          const nl2 = [...shortLoading]; nl2[i] = false; setShortLoading(nl2);
        }
      };

      const resetShortAnswer = (i) => {
        const nf = [...shortFeedback]; nf[i] = null; setShortFeedback(nf);
        const na = [...shortAnswers]; na[i] = ''; setShortAnswers(na);
      };

      // --- Discussion ---
      const scrollToBottom = (i) => {
        setTimeout(() => {
          if (chatRefs[i].current) chatRefs[i].current.scrollTop = chatRefs[i].current.scrollHeight;
        }, 100);
      };

      const handleInputChange = (i, v) => {
        const ni = [...currentInputs]; ni[i] = v; setCurrentInputs(ni);
      };

      const countExchanges = (conv) => conv.filter(m => m.role === 'assistant').length;

      const closeConversation = (i) => {
        const nc = [...conversationClosed]; nc[i] = true; setConversationClosed(nc);
      };

      const continueConversation = (i) => {
        const np = [...showContinuePrompt]; np[i] = false; setShowContinuePrompt(np);
      };

      const parseJSON = (text) => {
        let cleaned = text.trim()
          .replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
        const jsonStart = cleaned.indexOf('{');
        if (jsonStart > 0) cleaned = cleaned.substring(jsonStart);
        try { return JSON.parse(cleaned); }
        catch (e) { return { grammar: null, response: 'Frábært! Þú svarar mjög vel.' }; }
      };

      const sendMessage = async (qi) => {
        const message = currentInputs[qi].trim();
        if (!message || conversationClosed[qi]) return;

        const newConvs = [...conversations];
        newConvs[qi] = [...newConvs[qi], { role: 'user', content: message }];
        setConversations(newConvs);

        const ni = [...currentInputs]; ni[qi] = ''; setCurrentInputs(ni);
        const nl = [...loadingStates]; nl[qi] = true; setLoadingStates(nl);
        scrollToBottom(qi);

        try {
          const exchangeCount = countExchanges(newConvs[qi]);
          const isLast = exchangeCount >= MAX_EXCHANGES_PER_QUESTION - 1;
          const sys = window.buildDiscussionPrompt(READING_TEXT, DISCUSSION_QUESTIONS[qi], isLast);

          const apiMessages = [
            { role: 'system', content: sys },
            ...newConvs[qi]
              .filter(m => m.role === 'user' || m.role === 'assistant')
              .map(m => ({ role: m.role, content: m.content })),
          ];

          const response = await callOpenAI({
            model: 'gpt-4o-mini',
            temperature: 0.7,
            max_tokens: 300,
            messages: apiMessages,
            response_format: { type: 'json_object' },
          });

          const parsed = parseJSON(response);
          let currentConvs = [...newConvs];

          if (parsed.grammar) {
            currentConvs[qi] = [...currentConvs[qi], { role: 'grammar', content: parsed.grammar }];
            setConversations(currentConvs);
            scrollToBottom(qi);
            await new Promise(r => setTimeout(r, 400));
          }

          const updatedConvs = [...currentConvs];
          updatedConvs[qi] = [...updatedConvs[qi], { role: 'assistant', content: parsed.response }];
          setConversations(updatedConvs);
          scrollToBottom(qi);

          if (isLast) {
            const np = [...showContinuePrompt]; np[qi] = true; setShowContinuePrompt(np);
          }
        } catch (e) {
          console.error('Chat error:', e);
          alert('Villa við að senda skilaboð. Reyndu aftur.');
          const rb = [...conversations];
          rb[qi] = newConvs[qi].slice(0, -1);
          setConversations(rb);
        } finally {
          const nl2 = [...loadingStates]; nl2[qi] = false; setLoadingStates(nl2);
        }
      };

      const handleKeyPress = (e, qi) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(qi); }
      };

      // --- Render ---
      const mcScore = showMcFeedback
        ? Object.entries(mcAnswers).filter(([qi, a]) => a === mcQuestions[parseInt(qi)].correct).length
        : 0;

      return (
        <div className="min-h-screen pb-20">
          {/* Header */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">📖 Lestexti 2: Líkamsrækt</h1>
              <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">
            {/* Leiðbeiningabox */}
            <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-6">
              <p className="text-sm text-blue-900 font-light leading-relaxed">
                📖 Lestu textann hægt og rólega<br/>
                ✏️ Svaraðu krossaspurningunum<br/>
                📝 Svaraðu stuttum spurningum með heilum setningum<br/>
                💬 Ræddu spurningarnar með AI
              </p>
            </div>

            {/* Textinn – samfellanlegur */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 mb-6">
              <button
                onClick={() => setShowText(!showText)}
                className="w-full px-8 py-4 flex items-center justify-between text-left"
              >
                <h2 className="text-lg font-medium text-gray-800">📖 Textinn</h2>
                <span className="text-gray-400 text-xl">{showText ? '▲' : '▼'}</span>
              </button>
              {showText && (
                <div className="px-8 pb-8 fade-in">
                  {READING_TEXT.split('\n\n').map((para, i) => (
                    <p key={i} className="text-gray-700 leading-relaxed mb-4 font-light">{para}</p>
                  ))}
                </div>
              )}
            </div>

            {/* Flipar */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              {/* Tab bar */}
              <div className="flex border-b border-gray-200 sticky top-0 z-40 bg-white">
                {TABS.map(tab => {
                  const done = tab.id === 'krossar' ? isMcComplete
                    : tab.id === 'stuttar' ? isShortComplete
                    : isDiscussionComplete;
                  return (
                    <button key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`tab-btn flex-1 py-3 px-2 text-sm font-light text-center
                        ${activeTab === tab.id ? 'active' : 'text-gray-500'}`}
                    >
                      {done ? '✓ ' : `${tab.icon} `}{tab.label}
                    </button>
                  );
                })}
              </div>

              <div className="p-8 fade-in" key={activeTab}>
                {/* ===== KROSSASPURNINGAR ===== */}
                {activeTab === 'krossar' && (
                  <div>
                    <h2 className="text-2xl font-light text-gray-800 mb-6">Fjölvalsspurningar</h2>
                    <div className="space-y-8">
                      {mcQuestions.map((q, qIndex) => (
                        <div key={qIndex} className="border-2 border-gray-100 rounded-lg p-6">
                          <p className="font-normal text-gray-800 mb-4">{qIndex + 1}. {q.question}</p>
                          <div className="space-y-3">
                            {q.options.map((option, oIndex) => {
                              const isSelected = mcAnswers[qIndex] === oIndex;
                              const isCorrect = oIndex === q.correct;
                              const showCorrect = showMcFeedback && isCorrect;
                              const showIncorrect = showMcFeedback && isSelected && !isCorrect;

                              return (
                                <div key={oIndex}
                                  onClick={() => handleMcAnswer(qIndex, oIndex)}
                                  className={`answer-option p-4 rounded-lg
                                    ${isSelected && !showMcFeedback ? 'opt-selected' : ''}
                                    ${showCorrect ? 'opt-correct' : ''}
                                    ${showIncorrect ? 'opt-incorrect' : ''}
                                    ${showMcFeedback ? 'opt-disabled' : ''}`}
                                >
                                  <div className="flex items-start gap-3">
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mt-0.5 flex-shrink-0
                                      ${isSelected && !showMcFeedback ? 'border-blue-500 bg-blue-500' :
                                        showCorrect ? 'border-green-500 bg-green-500' :
                                        showIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}
                                    >
                                      {(isSelected || showCorrect) && (
                                        <div className="w-2 h-2 bg-white rounded-full"></div>
                                      )}
                                    </div>
                                    <span className="font-light flex-1">{option}</span>
                                    {showCorrect && <span className="text-green-600 text-xl">✓</span>}
                                    {showIncorrect && <span className="text-red-600 text-xl">✗</span>}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>

                    {!showMcFeedback ? (
                      <div className="text-center mt-8">
                        <button onClick={checkMcAnswers}
                          className="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 transition-colors font-light text-lg">
                          Athuga svör
                        </button>
                      </div>
                    ) : (
                      <div className="mt-8">
                        <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-6 mb-4">
                          <div className="flex items-start gap-3">
                            <span className="text-3xl">{mcScore === mcQuestions.length ? '🎉' : '💪'}</span>
                            <div>
                              <h3 className="font-normal text-gray-800 mb-1">
                                {mcScore === mcQuestions.length ? 'Frábært! Öll svörin eru rétt!' : 'Góð tilraun! Skoðaðu svörin hér að ofan.'}
                              </h3>
                              <p className="text-sm text-gray-600 font-light">
                                Þú fékkst {mcScore} af {mcQuestions.length} rétt.
                              </p>
                            </div>
                          </div>
                        </div>
                        <div className="text-center">
                          <button onClick={resetMc}
                            className="text-sm text-blue-600 underline font-light hover:text-blue-800">
                            Reyna aftur
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* ===== STUTTAR SPURNINGAR ===== */}
                {activeTab === 'stuttar' && (
                  <div>
                    <h2 className="text-2xl font-light text-gray-800 mb-2">Stuttar spurningar</h2>
                    <p className="text-gray-600 font-light mb-6">Svaraðu með þínum eigin orðum (1–2 setningar).</p>
                    <div className="space-y-8">
                      {SHORT_OPEN_QUESTIONS.map((question, i) => (
                        <div key={i} className="border-2 border-gray-100 rounded-lg p-6">
                          <p className="font-normal text-gray-800 mb-3">{i + 1}. {question}</p>
                          <textarea
                            value={shortAnswers[i]}
                            onChange={e => handleShortChange(i, e.target.value)}
                            disabled={shortFeedback[i] !== null}
                            className="w-full p-4 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none font-light text-base mb-4 disabled:bg-gray-50"
                            rows="3"
                            placeholder="Skrifaðu svarið þitt hér..."
                          />
                          {!shortFeedback[i] ? (
                            <button
                              onClick={() => getShortFeedback(i)}
                              disabled={shortLoading[i] || shortAnswers[i].trim().length < 3}
                              className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
                              {shortLoading[i] ? 'Bíð...' : 'Fá endurgjöf'}
                            </button>
                          ) : (
                            <div>
                              <div className="bg-green-50 border-2 border-green-200 rounded-lg p-4">
                                <div className="flex items-start gap-3">
                                  <span className="text-2xl">✨</span>
                                  <p className="text-gray-800 font-light leading-relaxed flex-1">{shortFeedback[i]}</p>
                                </div>
                              </div>
                              <button onClick={() => resetShortAnswer(i)}
                                className="text-xs text-blue-600 underline mt-2 font-light hover:text-blue-800">
                                Reyna aftur
                              </button>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ===== TÖLUM SAMAN ===== */}
                {activeTab === 'umraeda' && (
                  <div>
                    <h2 className="text-2xl font-light text-gray-800 mb-2">Tölum saman!</h2>
                    <p className="text-gray-600 font-light mb-6">
                      Svaraðu spurningunum og haltu samtali áfram við kennarann.
                    </p>

                    <div className="space-y-6">
                      {DISCUSSION_QUESTIONS.map((question, qi) => (
                        <div key={qi} className="border-2 border-gray-100 rounded-lg p-6">
                          <p className="font-normal text-gray-800 mb-4">{qi + 1}. {question}</p>

                          <div ref={chatRefs[qi]} className="chat-container mb-4 space-y-3">
                            {conversations[qi].map((msg, mi) => (
                              <div key={mi}>
                                {msg.role === 'user' ? (
                                  <div className="flex justify-end">
                                    <div className="bg-blue-50 rounded-lg p-4 max-w-[80%]">
                                      <p className="text-gray-800 font-light">{msg.content}</p>
                                    </div>
                                  </div>
                                ) : msg.role === 'grammar' ? (
                                  <div className="flex justify-center">
                                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 max-w-[85%]">
                                      <div className="flex items-start gap-2">
                                        <span className="text-lg">📚</span>
                                        <p className="text-sm text-gray-700 font-light">
                                          <span className="font-normal">Málfar:</span> {msg.content}
                                        </p>
                                      </div>
                                    </div>
                                  </div>
                                ) : (
                                  <div className="flex justify-start">
                                    <div className="bg-green-50 border border-green-200 rounded-lg p-4 max-w-[80%]">
                                      <div className="flex items-start gap-2">
                                        <span className="text-xl">✨</span>
                                        <p className="text-gray-800 font-light">{msg.content}</p>
                                      </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            ))}
                            {loadingStates[qi] && (
                              <div className="flex justify-start">
                                <div className="bg-gray-100 rounded-lg p-4">
                                  <p className="text-gray-500 font-light">Bíð...</p>
                                </div>
                              </div>
                            )}
                          </div>

                          {showContinuePrompt[qi] && !conversationClosed[qi] ? (
                            <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-6">
                              <p className="text-gray-700 font-light mb-4 text-center">
                                Viltu spjalla meira eða segja þetta gott?
                              </p>
                              <div className="flex gap-3 justify-center">
                                <button onClick={() => continueConversation(qi)}
                                  className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-light">
                                  Spjalla meira
                                </button>
                                <button onClick={() => closeConversation(qi)}
                                  className="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700 transition-colors font-light">
                                  Þetta er gott
                                </button>
                              </div>
                            </div>
                          ) : !conversationClosed[qi] ? (
                            <div className="flex gap-2">
                              <textarea
                                value={currentInputs[qi]}
                                onChange={e => handleInputChange(qi, e.target.value)}
                                onKeyPress={e => handleKeyPress(e, qi)}
                                disabled={loadingStates[qi]}
                                className="flex-1 p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none font-light text-base disabled:bg-gray-50"
                                rows="2"
                                placeholder={conversations[qi].length === 0 ? 'Skrifaðu svarið þitt hér...' : 'Haltu áfram að spjalla...'}
                              />
                              <button onClick={() => sendMessage(qi)}
                                disabled={loadingStates[qi] || !currentInputs[qi].trim()}
                                className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light self-end">
                                Senda
                              </button>
                            </div>
                          ) : (
                            <div className="bg-green-50 border-2 border-green-200 rounded-lg p-4">
                              <p className="text-green-800 font-light text-center">✓ Spjalli lokið</p>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Framvinda neðst */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
              {TABS.map(tab => {
                const done = tab.id === 'krossar' ? isMcComplete
                  : tab.id === 'stuttar' ? isShortComplete
                  : isDiscussionComplete;
                return (
                  <button key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 py-2 rounded-lg text-sm font-light transition-colors
                      ${done ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}
                  >
                    {done ? `✓ ${tab.label}` : tab.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Likamsraekt />);
  </script>
</body>
</html>
