<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Aukahlustun: Að spila á hljóðfæri – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }

    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled  { cursor: default; }

    .tab-btn { transition: all 0.2s; position: relative; padding: 12px 16px; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .tab-btn.active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }

    .text-panel {
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }
    .text-panel.open   { max-height: 800px; opacity: 1; }
    .text-panel.closed { max-height: 0;     opacity: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── API ─────────────────────────────────────────────────────────────────
    async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    // ── Gögn ────────────────────────────────────────────────────────────────
    const READING_TEXT = [
      { type: 'para', text: 'Margt fólk hefur áhuga á tónlist og vill læra að spila á hljóðfæri eða syngja. Sumir spila á gítar, píanó eða fiðlu, en aðrir velja trommur eða flautu. Það tekur tíma að læra, en það er mjög gaman.' },
      { type: 'para', text: 'Þegar maður byrjar að spila á hljóðfæri þarf maður að æfa sig reglulega. Margir æfa sig nokkrum sinnum í viku, kannski hálftíma eða klukkutíma í einu. Þegar maður æfir sig oft, verður maður betri og betri.' },
      { type: 'para', text: 'Það er gott að vera þolinmóður og ekki gefast upp þó að það gangi hægt í byrjun. Sumir læra í tónlistarskóla eða taka einkatíma, en aðrir læra sjálfir með myndböndum á netinu. Það þarf ekki alltaf að eiga dýrt hljóðfæri — stundum er hægt að kaupa notað eða fá lánað.' },
      { type: 'para', text: 'Að spila á hljóðfæri getur verið bæði róandi og spennandi. Fólk getur spilað eitt eða með öðrum, til dæmis í hljómsveit. Það er líka skemmtilegt að spila á tónleikum eða fyrir fjölskylduna heima.' },
      { type: 'para', text: 'Tónlist tengir fólk saman og hjálpar mörgum að tjá sig og vera skapandi. Ég spila sjálfur á gítar og finnst það frábært áhugamál. Það hjálpar mér að slaka á eftir langan dag og gleðja aðra. Það er yndislegt þegar maður getur spilað uppáhaldslagið sitt og sungið með.' },
    ];

    const MC_ORIGINAL = [
      {
        question: 'Hvað þarf maður að gera til að verða betri í að spila á hljóðfæri?',
        options: [
          'Kaupa nýtt hljóðfæri á hverju ári.',
          'Æfa sig reglulega og vera þolinmóður.',
          'Hlusta á tónlist allan daginn.',
          'Fara oft á tónleika.',
        ],
        correct: 1,
      },
      {
        question: 'Hvar læra sumir að spila á hljóðfæri samkvæmt textanum?',
        options: [
          'Í bókasafni eða íþróttahúsi.',
          'Í tónlistarskóla eða með myndböndum á netinu.',
          'Í vinnunni eða í sundlauginni.',
          'Heima með fjölskyldunni.',
        ],
        correct: 1,
      },
      {
        question: 'Hvers vegna finnst mörgum gott að spila á hljóðfæri?',
        options: [
          'Það hjálpar þeim að sofa betur.',
          'Það hjálpar þeim að slaka á og vera skapandi.',
          'Það hjálpar þeim að verða sterkari.',
          'Það hjálpar þeim að borða hollt.',
        ],
        correct: 1,
      },
    ];

    const SHORT_QS = [
      'Hvað þarf maður til að byrja að spila á hljóðfæri?',
      'Hvernig getur fólk lært að spila – nefndu tvær leiðir.',
      'Af hverju þarf að æfa sig reglulega?',
      'Hvernig hjálpar tónlist fólki samkvæmt textanum?',
      'Hvað spilar sögumaðurinn á?',
    ];

    const DISC_QS = [
      'Spilarðu á einhvert hljóðfæri? Ef já – hvaða og hvenær lærðirðu? Ef nei – viltu læra á eitthvað?',
      'Hvernig gæti tónlist hjálpað þér í daglegu lífi?',
    ];

    // ── Hjálparföll ─────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Íhlutir ─────────────────────────────────────────────────────────────
    const FeedbackBadge = ({ score, message }) => {
      const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
      const cls = {
        green: 'bg-green-50 border-green-200 text-green-700',
        amber: 'bg-amber-50 border-amber-200 text-amber-700',
        red:   'bg-red-50 border-red-200 text-red-700',
      }[color];
      return (
        <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
          <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
          <p className="text-sm font-light">{message}</p>
        </div>
      );
    };

    // ── TextPanel ────────────────────────────────────────────────────────────
    const TextPanel = ({ open, onToggle }) => (
      <div className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
        <div className="max-w-4xl mx-auto px-6">
          <button onClick={onToggle}
            className="w-full flex items-center justify-between py-4 text-left group">
            <span className="flex items-center gap-2 text-gray-700 font-light group-hover:text-blue-600 transition-colors">
              <span className="text-lg">📖</span>
              <span>Textinn – <em className="font-light text-gray-500">Að spila á hljóðfæri</em></span>
            </span>
            <span className={`text-gray-400 transition-transform duration-300 ${open ? 'rotate-180' : ''}`}>▼</span>
          </button>
          <div className={`text-panel ${open ? 'open' : 'closed'}`}>
            <div className="pb-6 space-y-3">
              {READING_TEXT.map((block, i) =>
                block.type === 'heading'
                  ? <h3 key={i} className="text-base font-medium text-gray-800 mt-4">{block.text}</h3>
                  : <p key={i} className="text-gray-700 leading-relaxed font-light text-sm">{block.text}</p>
              )}
            </div>
          </div>
        </div>
      </div>
    );

    // ── Flipar ──────────────────────────────────────────────────────────────
    const TABS = [
      { id: 'mc',    label: 'Krossaspurningar', emoji: '✓' },
      { id: 'short', label: 'Stuttar spurningar', emoji: '📝' },
      { id: 'disc',  label: 'Umræðuspurningar', emoji: '💬' },
    ];

    // ── TabBar ───────────────────────────────────────────────────────────────
    const TabBar = ({ active, done, onSelect }) => (
      <div className="bg-white border-b border-gray-200 sticky top-[57px] z-10">
        <div className="max-w-4xl mx-auto px-6 flex">
          {TABS.map(t => (
            <button key={t.id} onClick={() => onSelect(t.id)}
              className={`tab-btn flex-1 text-sm font-light text-gray-600 ${active === t.id ? 'active' : ''}`}>
              {done[t.id] ? `✓ ${t.label}` : `${t.emoji} ${t.label}`}
            </button>
          ))}
        </div>
      </div>
    );

    // ════════════════════════════════════════════════════════════════════════
    const App = () => {
      const [textOpen, setTextOpen]   = useState(true);
      const [activeTab, setActiveTab] = useState('mc');
      const [tabDone, setTabDone]     = useState({ mc: false, short: false, disc: false });

      // MC
      const mcQ = useMemo(() => MC_ORIGINAL.map(q => {
        const correctText = q.options[q.correct];
        const opts = shuffle(q.options);
        return { question: q.question, options: opts, correct: opts.indexOf(correctText) };
      }), []);
      const [mcAns, setMcAns]   = useState({});
      const [mcDone, setMcDone] = useState(false);

      // Stuttar spurningar
      const [shortAns, setShortAns]         = useState(Array(SHORT_QS.length).fill(''));
      const [shortFb,  setShortFb]          = useState(Array(SHORT_QS.length).fill(null));
      const [shortLoading, setShortLoading] = useState(Array(SHORT_QS.length).fill(false));

      // Umræðuspurningar
      const [discAns, setDiscAns] = useState(Array(DISC_QS.length).fill(''));

      // ── MC ──────────────────────────────────────────────────────────────
      const checkMC = () => {
        if (Object.keys(mcAns).length < mcQ.length) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setMcDone(true);
        setTabDone(prev => ({ ...prev, mc: true }));
      };

      // ── Stuttar spurningar ──────────────────────────────────────────────
      const getShortFb = async (i) => {
        if (!shortAns[i].trim()) return;
        setShortLoading(prev => { const a = [...prev]; a[i] = true; return a; });
        try {
          const READING_FLAT = READING_TEXT.map(b => b.text).join('\n');
          const result = await callOpenAI([
            {
              role: 'system',
              content: `Þú ert íslensku kennari. Nemandinn las texta um að spila á hljóðfæri og svarar stuttri spurningu.
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]

Mettu svarið miðað við innihald og samræmi við textann.
Textinn: "${READING_FLAT}"
Spurningin: "${SHORT_QS[i]}"`,
            },
            { role: 'user', content: shortAns[i] },
          ], 120, 0.2);

          const stigMatch     = result.match(/STIG:\s*(\d)/);
          const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
          const score = stigMatch ? parseInt(stigMatch[1]) : 0;
          const msg   = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();

          setShortFb(prev => { const a = [...prev]; a[i] = { score, msg }; return a; });
        } catch (e) {
          alert('Villa kom upp. Reyndu aftur.');
          console.error(e);
        } finally {
          setShortLoading(prev => { const a = [...prev]; a[i] = false; return a; });
        }
      };

      const allShortDone = shortFb.every(f => f !== null);

      React.useEffect(() => {
        if (allShortDone) setTabDone(prev => ({ ...prev, short: true }));
      }, [allShortDone]);

      // ── Render ──────────────────────────────────────────────────────────
      const mcCorrect = Object.entries(mcAns).filter(([i, v]) => v === mcQ[i]?.correct).length;

      return (
        <div className="min-h-screen">

          {/* ── HEADER ── */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">
                📖 Aukahlustun: Að spila á hljóðfæri
              </h1>
              <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
            </div>
          </header>

          {/* ── TEXTAPANELL (sticky) ── */}
          <TextPanel open={textOpen} onToggle={() => setTextOpen(o => !o)} />

          {/* ── FLIPASLÁR (sticky, rétt undir textapaneli) ── */}
          <TabBar active={activeTab} done={tabDone} onSelect={setActiveTab} />

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">

            {/* ── Leiðbeiningabox ── */}
            <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4">
              <p className="text-sm font-light text-blue-800 space-y-1">
                <span className="block">📖 Lestu textann hægt og rólega</span>
                <span className="block">✏️ Svaraðu krossaspurningunum</span>
                <span className="block">📝 Svaraðu stuttum spurningum með heilum setningum</span>
                <span className="block">💬 Ræddu spurningarnar með félaga</span>
              </p>
            </div>

            {/* ── Flipaefni ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-6 fade-in" key={activeTab}>

                {/* ══ KROSSASPURNINGAR ══ */}
                {activeTab === 'mc' && (
                  <div className="space-y-6">
                    <p className="text-sm text-gray-500 font-light">Veldu rétt svar við hverri spurningu.</p>

                    {mcQ.map((q, qi) => {
                      const selected = mcAns[qi];
                      return (
                        <div key={qi} className="rounded-xl border-2 border-gray-100 p-5">
                          <p className="font-light text-gray-800 mb-4 text-base">
                            {qi + 1}. {q.question}
                          </p>
                          <div className="space-y-2">
                            {q.options.map((opt, oi) => {
                              const isSelected = selected === oi;
                              const isCorrect  = oi === q.correct;
                              let cls = 'answer-option p-3 rounded-lg flex items-center gap-3';
                              if (mcDone) {
                                cls += ' opt-disabled';
                                if (isCorrect) cls += ' opt-correct';
                                else if (isSelected) cls += ' opt-incorrect';
                              } else if (isSelected) {
                                cls += ' opt-selected';
                              }
                              return (
                                <div key={oi} className={cls}
                                  onClick={() => !mcDone && setMcAns(prev => ({ ...prev, [qi]: oi }))}>
                                  <span className={`w-4 h-4 rounded-full border-2 flex-shrink-0 transition-colors
                                    ${mcDone && isCorrect ? 'border-green-500 bg-green-500'
                                      : mcDone && isSelected ? 'border-red-500 bg-red-500'
                                      : isSelected ? 'border-blue-500 bg-blue-500'
                                      : 'border-gray-300'}`} />
                                  <span className="text-sm font-light text-gray-800">{opt}</span>
                                  {mcDone && isCorrect && <span className="ml-auto text-green-600 text-sm">✓</span>}
                                  {mcDone && isSelected && !isCorrect && <span className="ml-auto text-red-500 text-sm">✗</span>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}

                    {!mcDone ? (
                      <button onClick={checkMC}
                        disabled={Object.keys(mcAns).length < mcQ.length}
                        className="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
                        Athuga svör
                      </button>
                    ) : (
                      <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 text-center fade-in">
                        <div className="text-3xl mb-2">
                          {mcCorrect === mcQ.length ? '🎉' : mcCorrect >= 2 ? '👍' : '💪'}
                        </div>
                        <p className="font-light text-gray-800 mb-1">
                          Þú fékkst <strong>{mcCorrect}</strong> af <strong>{mcQ.length}</strong> rétt.
                        </p>
                        <p className="text-sm text-gray-500 font-light mb-4">
                          {mcCorrect === mcQ.length ? 'Frábært! Þú skilur textann mjög vel.'
                            : mcCorrect >= 2 ? 'Vel gert! Haltu áfram.'
                            : 'Haltu áfram að æfa – þú ert að læra!'}
                        </p>
                        <button onClick={() => setActiveTab('short')}
                          className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                          Næsti liður →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ══ STUTTAR SPURNINGAR ══ */}
                {activeTab === 'short' && (
                  <div className="space-y-6">
                    <p className="text-sm text-gray-500 font-light">Svaraðu spurningunum með heilum setningum.</p>

                    {SHORT_QS.map((q, i) => (
                      <div key={i} className="rounded-xl border-2 border-gray-100 p-5">
                        <p className="font-light text-gray-800 mb-3 text-base">
                          {i + 1}. {q}
                        </p>
                        <textarea
                          value={shortAns[i]}
                          onChange={e => {
                            const a = [...shortAns]; a[i] = e.target.value; setShortAns(a);
                          }}
                          disabled={shortFb[i] !== null}
                          rows={3}
                          placeholder="Skrifaðu svar hér..."
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50 mb-3"
                        />
                        {shortFb[i] === null ? (
                          <button
                            onClick={() => getShortFb(i)}
                            disabled={shortLoading[i] || shortAns[i].trim().length < 3}
                            className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLoading[i] ? 'Bíð...' : 'Fá endurgjöf'}
                          </button>
                        ) : (
                          <FeedbackBadge score={shortFb[i].score} message={shortFb[i].msg} />
                        )}
                      </div>
                    ))}

                    {allShortDone && (
                      <div className="text-center fade-in">
                        <button onClick={() => setActiveTab('disc')}
                          className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                          Næsti liður →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ══ UMRÆÐUSPURNINGAR ══ */}
                {activeTab === 'disc' && (
                  <div className="space-y-6">
                    <p className="text-sm text-gray-500 font-light">
                      Ræddu þessar spurningar með félaga. Skráðu helstu hugmyndirnar hér.
                    </p>

                    {DISC_QS.map((q, i) => (
                      <div key={i} className="rounded-xl border-2 border-gray-100 p-5">
                        <p className="font-light text-gray-800 mb-3 text-base">
                          {i + 1}. {q}
                        </p>
                        <textarea
                          value={discAns[i]}
                          onChange={e => {
                            const a = [...discAns]; a[i] = e.target.value; setDiscAns(a);
                          }}
                          rows={3}
                          placeholder="Skrifaðu hugmyndirnar hér..."
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none"
                        />
                      </div>
                    ))}

                    <div className="text-center">
                      <button
                        onClick={() => setTabDone(prev => ({ ...prev, disc: true }))}
                        className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                        Ljúka verkefni ✓
                      </button>
                    </div>

                    {tabDone.disc && (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
                        <div className="text-4xl mb-3">🎉</div>
                        <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
                        <p className="text-green-700 font-light text-sm">
                          Þú hefur lokið öllum verkefnum í þessum lestexta.
                        </p>
                      </div>
                    )}
                  </div>
                )}

              </div>
            </div>
          </main>

          {/* ── Framvinduraking – fast neðst ── */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
              {TABS.map(t => (
                <button key={t.id}
                  onClick={() => setActiveTab(t.id)}
                  className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                    ${tabDone[t.id] ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                  {tabDone[t.id] ? `✓ ${t.label}` : t.label}
                </button>
              ))}
            </div>
          </div>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
