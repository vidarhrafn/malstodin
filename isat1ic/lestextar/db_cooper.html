<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── API ──────────────────────────────────────────────────────────────────────

async function callOpenAI(messages, maxTokens = 200, model = 'gpt-4o-mini', temperature = 0.2) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens: maxTokens, model, temperature }),
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

// ── DATA ─────────────────────────────────────────────────────────────────────

const READING_TEXT = [
  { type: 'para', text: 'Þann 24. nóvember 1971 fór maður um borð í flugvél sem flaug frá Portland í Oregon til Seattle í Washington. Hann sagðist heita Dan Cooper og var í jakkafötum, með bindi og sólgleraugu. Stuttu eftir flugtak rétti hann flugfreyjunni miða. Á miðanum stóð: „Ég er með sprengju í töskunni. Ég vil að þú setjist við hliðina á mér." Cooper sýndi henni töskuna – þar voru vírar og eitthvað sem líktist sprengju. Hann vildi fá 200.000 dollara í seðlum, fjórar fallhlífar og eldsneyti á flugvélina. Þegar vélin lenti í Seattle fékk hann peningana og fallhlífarnar, og leyfði farþegunum að fara. Hann hélt eftir flugstjóranum, tveimur flugmönnum og ungu flugfreyjunni Tinu Mucklow.' },
  { type: 'para', text: 'Tina sagði síðar: „Cooper var allan tímann rólegur og kurteis og hótaði ekki neinum." Hann bað Tinu að sýna sér hvernig ætti að opna afturstigann á vélinni og síðan sendi hann hana í stjórnklefann. Þegar vélin var komin yfir skóg í Washington-ríki, opnaði Cooper stigann og stökk út með peningana og eina fallhlíf. Lögreglan leitaði að honum en fann hann aldrei. Enginn veit hver hann var eða hvort hann lifði fallið af. Peningarnir fundust aldrei og málið hefur ekki verið leyst. Eftir þetta var flugvélum breytt og þær gerðar öruggari. Margir hafa reynt að komast að því hver D.B. Cooper var – en það er enn ein stærsta ráðgáta í sögu flugsins.' },

const MC_ITEMS = [
  {
    q: 'Hvað sagði Dan Cooper á miðanum sem hann rétti flugfreyjunni?',

const SHORT_ITEMS = [
  { q: 'Hvað vildi Dan Cooper fá eftir að hann sýndi flugfreyjunni sprengjuna?',    model: 'Hann vildi fá 200.000 dollara, fjórar fallhlífar og eldsneyti.' },

// ── HELPERS ──────────────────────────────────────────────────────────────────

const FeedbackBadge = ({ score, message }) => {
  const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
  const colors = {
    green: 'bg-green-50 border-green-200 text-green-700',
    amber: 'bg-amber-50 border-amber-200 text-amber-700',
    red:   'bg-red-50 border-red-200 text-red-700',
  };
  return (
    <div className={`mt-3 p-3 rounded-lg border fade-in ${colors[color]}`}>
      <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
      <p className="text-sm font-light">{message}</p>
    </div>
  );
};

// ── TABS ─────────────────────────────────────────────────────────────────────

const MCTab = ({ onDone }) => {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  const shuffled = useMemo(() =>
    MC_ITEMS.map(item => {
      const opts = item.options.map((text, i) => ({ text, isCorrect: i === item.correct }));
      return opts.sort(() => Math.random() - 0.5);
    }), []);

  const checkAll = () => {
    setChecked(true);
    const score = MC_ITEMS.filter((_, qi) => {
      const sel = answers[qi];
      return sel !== undefined && shuffled[qi][sel]?.isCorrect;
    }).length;
    onDone(score);
  };

  return (
    <div className="fade-in space-y-4">
      {MC_ITEMS.map((item, qi) => (
        <div key={qi} className="bg-white rounded-xl border border-gray-200 p-4">
          <p className="font-medium text-gray-800 mb-3">{qi + 1}. {item.q}</p>
          {shuffled[qi].map((opt, oi) => {
            const isSelected = answers[qi] === oi;
            let cls = 'w-full text-left px-4 py-3 rounded-lg border-2 mb-2 text-sm font-light transition-all ';
            if (!checked) {
              cls += isSelected ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300';
            } else {
              if (opt.isCorrect) cls += 'border-green-500 bg-green-50 font-medium';
              else if (isSelected) cls += 'border-red-400 bg-red-50';
              else cls += 'border-gray-100 text-gray-400';
            }
            return (
              <button key={oi} disabled={checked}
                onClick={() => setAnswers({ ...answers, [qi]: oi })}
                className={cls}>
                {checked && opt.isCorrect ? '✓ ' : ''}{opt.text}
              </button>
            );
          })}
        </div>
      ))}
      {!checked && (
        <button onClick={checkAll}
          disabled={Object.keys(answers).length < MC_ITEMS.length}
          className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-colors font-light">
          Athuga svör →
        </button>
      )}
      {checked && (
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center fade-in">
          <p className="text-blue-800 font-medium">
            {MC_ITEMS.filter((_, qi) => shuffled[qi][answers[qi]]?.isCorrect).length} / {MC_ITEMS.length} rétt
          </p>
        </div>
      )}
    </div>
  );
};

const ShortTab = ({ onDone }) => {
  const [answers,  setAnswers]  = useState(SHORT_ITEMS.map(() => ''));
  const [feedback, setFeedback] = useState(SHORT_ITEMS.map(() => null));
  const [loading,  setLoading]  = useState(SHORT_ITEMS.map(() => false));

  const doneCount = feedback.filter(f => f !== null).length;

  const check = async (i) => {
    const ans = answers[i].trim();
    if (!ans) return;
    const newL = [...loading]; newL[i] = true; setLoading(newL);
    try {
      const prompt = `Þú ert íslenskukennari. Nemandi svaraði þessari spurningu:

SPURNING: "${SHORT_ITEMS[i].q}"
FYRIRMYNDARSVAR: "${SHORT_ITEMS[i].model}"
SVAR NEMANDA: "${ans}"
TEXTI: "${CONTEXT}"

Máttu gefa svigar hvað varðar stafsetningu og málfræði (A1-A2 nemandi).
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]`;
      const result = await callOpenAI([{ role: 'user', content: prompt }], 120, 'gpt-4o-mini', 0.2);
      const stigMatch = result.match(/STIG:\s*(\d)/);
      const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
      const score = stigMatch ? parseInt(stigMatch[1]) : 0;
      const msg = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();
      const newF = [...feedback]; newF[i] = { score, msg }; setFeedback(newF);
      if (doneCount + 1 === SHORT_ITEMS.length) onDone(5);
    } catch (e) { console.error(e); }
    const newL2 = [...loading]; newL2[i] = false; setLoading(newL2);
  };

  return (
    <div className="fade-in space-y-4">
      {SHORT_ITEMS.map((item, i) => (
        <div key={i} className="bg-white rounded-xl border border-gray-200 p-4">
          <p className="font-medium text-gray-800 mb-3">{i + 1}. {item.q}</p>
          <textarea value={answers[i]}
            onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
            disabled={!!feedback[i]}
            rows={2} placeholder="Skrifaðu svar hér..."
            className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none text-sm disabled:bg-gray-50" />
          {!feedback[i] && (
            <button onClick={() => check(i)}
              disabled={loading[i] || !answers[i].trim()}
              className="mt-2 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-colors font-light text-sm">
              {loading[i] ? 'Mat í gangi...' : 'Athuga →'}
            </button>
          )}
          {feedback[i] && <FeedbackBadge score={feedback[i].score} message={feedback[i].msg} />}
        </div>
      ))}
    </div>
  );
};

Þetta er A1-A2 nemandi. Máttu gefa svigar hvað varðar stafsetningu og málfræði. Einbeittu þér að því hvort svarið sé skynsamlegt og tengt spurningunni.

      const stigMatch = result.match(/STIG:\s*(\d)/);

              disabled={loading[i] || !answers[i].trim()}
              className="mt-2 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-colors font-light text-sm">

          const sel  = window.getSelection();
          const text = sel.toString().trim();
          if (!text || text.length < 2) return;
          const range = sel.getRangeAt(0);
          const rect  = range.getBoundingClientRect();
          const popupWidth = 340;
          const margin = 16;
          const halfWidth = popupWidth / 2;
          const x = Math.min(
            Math.max(rect.left + rect.width / 2, halfWidth + margin),
            window.innerWidth - halfWidth - margin

            ? Math.max(margin, rect.top - estimatedPopupHeight - 12)

          setPopup({ text, x, y });

  useEffect(() => {
    const exerciseDone = tabDone.mc && tabDone.short;
    if (exerciseDone && !progressWritten.current) {
      progressWritten.current = true;
      window.writeProgress && window.writeProgress('lestextar_11', 'completed');
    }
  }, [tabDone]);

  const markDone = (id) => setTabDone(prev => ({ ...prev, [id]: true }));

  return (
    <div>
      {/* HAUS */}
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-2">📖 D.B. Cooper</h1>
          <p className="text-gray-500 text-sm font-light">Lesskilningur · A2–B1</p>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-6 mt-6 pb-20">

        {/* LEIÐBEININGABOX */}
        <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-4">
          <div className="space-y-1 text-sm font-light text-blue-800">
            <p>📖 Lestu textann hægt og rólega</p>
            <p>✏️ Svaraðu krossaspurningunum</p>
            <p>📝 Svaraðu stuttum spurningum með heilum setningum</p>
            <p>💬 Ræddu spurningarnar</p>
          </div>
        </div>

        {/* TEXTAPANEL – sticky */}
        <div className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm mb-4 rounded-xl">
          <div className="max-w-4xl mx-auto px-6">
            <button onClick={() => setTextOpen(!textOpen)}
              className="w-full flex items-center justify-between py-4 text-left group">
              <span className="flex items-center gap-2 text-gray-700 font-light group-hover:text-blue-600 transition-colors">
                <span className="text-lg">✈️</span>
                <span>Textinn – <em className="font-light text-gray-500">D.B. Cooper</em></span>
              </span>
              <span className={`text-gray-400 transition-transform duration-300 ${textOpen ? 'rotate-180' : ''}`}>▼</span>
            </button>
            <div className={`text-panel ${textOpen ? 'open' : 'closed'}`}>
              <div className="pb-6 space-y-4">
                {/* Tungumálval */}
                <div className="bg-gray-50 rounded-xl border border-gray-100 p-4 mb-4">
                  {!confirmed ? (
                    <div className="flex gap-2 items-center flex-wrap">
                      <span className="text-sm text-gray-500 font-light">🌐 Móðurmál:</span>
                      <input
                        type="text"
                        value={langInput}
                        onChange={e => setLangInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && langInput.trim() && (setLanguage(langInput.trim()), setConfirmed(true))}
                        placeholder="t.d. English, Polski, 中文…"
                        className="flex-1 min-w-0 px-3 py-1.5 border border-gray-200 rounded-lg text-sm
                          font-light focus:outline-none focus:ring-2 focus:ring-blue-400"
                      />
                      <button
                        onClick={() => { if (langInput.trim()) { setLanguage(langInput.trim()); setConfirmed(true); } }}
                        disabled={!langInput.trim()}
                        className="px-4 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-light
                          hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                        Staðfesta
                      </button>
                    </div>
                  ) : (
                    <div className="flex items-center justify-between">
                      <p className="text-sm text-gray-600 font-light">
                        🌐 <span className="font-medium">{language}</span>
                        <span className="text-gray-400 ml-2">— Merktu orð í textanum til að þýða</span>
                      </p>
                      <button onClick={() => { setConfirmed(false); setLangInput(''); setPopup(null); }}
                        className="text-xs text-blue-500 hover:text-blue-700 font-light">Breyta</button>
                    </div>
                  )}
                </div>
                {/* Texti með mynd */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in" style={{ overflow: 'hidden' }}>
                  <img
                    src="../media/texti11.png"
                    alt="Myndskreyting"
                    className="rounded-xl border border-gray-100 shadow-sm object-cover"
                    style={{ float: 'left', width: '38%', maxHeight: '190px', marginRight: '1.25rem', marginBottom: '0.5rem' }}
                  />
                  <div
                    className={`selectable-text ${!confirmed ? 'opacity-60' : ''}`}
                    onMouseUp={handleSelection}
                    onTouchEnd={handleSelection}>
                    {READING_TEXT.map((block, i) => (
                      <p key={i} className="text-gray-700 leading-relaxed font-light text-sm">{block.text}</p>
                    ))}
                  </div>
                  {!confirmed && (
                    <p className="text-xs text-gray-400 font-light mt-3 text-center">
                      ⬆️ Skráðu móðurmál þitt til að geta þýtt orð í textanum
                    </p>
                  )}
                </div>
                {popup && confirmed && (
                  <ThyðingarPopup
                    selectedText={popup.text}
                    position={{ x: popup.x, y: popup.y }}
                    language={language}
                    onClose={() => { setPopup(null); window.getSelection().removeAllRanges(); }}
                  />
                )}
              </div>
            </div>
          </div>
        </div>

        {/* FLIPASLÁ */}
        <div style={{ position: 'sticky', top: 57, zIndex: 10, background: 'white' }} className="rounded-t-xl shadow-sm border border-gray-100">
          <div className="flex border-b border-gray-200 px-2 pt-2">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`tab-btn px-4 py-2.5 text-sm font-light transition-all relative mr-1
                  ${activeTab === tab.id
                    ? 'active text-blue-700 border-b-2 border-blue-600 -mb-px bg-white'
                    : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-t-lg'}`}>
                {tabDone[tab.id] ? '✓ ' : `${tab.icon} `}{tab.label}
              </button>
            ))}
          </div>

          {/* FLIPAEFNI */}
          <div className="p-5">
            {activeTab === 'mc'      && <MCTab      key="mc"      onDone={() => markDone('mc')} />}
            {activeTab === 'short'   && <ShortTab   key="short"   onDone={() => markDone('short')} />}
            {activeTab === 'discuss' && <DiscussTab key="discuss" onDone={() => markDone('discuss')} />}
          </div>
        </div>
      </main>

      {/* FRAMVINDUREIT */}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
        <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                ${tabDone[tab.id]
                  ? 'bg-blue-600 text-white'
                  : activeTab === tab.id
                    ? 'bg-blue-50 text-blue-700 border border-blue-200'
                    : 'bg-gray-100 text-gray-500'}`}>
              {tabDone[tab.id] ? '✓ ' : ''}{tab.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
