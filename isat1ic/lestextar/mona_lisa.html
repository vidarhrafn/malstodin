<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Lestexti: Mona Lisa – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }

    /* Tabs */
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.tab-active):hover { background: #f3f4f6; }
    .tab-btn.tab-active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.tab-active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }

    /* Answer options */
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
      text-align: left;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected   { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct    { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .answer-option.opt-incorrect  { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .answer-option.opt-disabled   { cursor: default; }

    /* Fade */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COURSE = 'isat1ic';

  async function writeProgress(exerciseId, status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, exerciseId);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) {
      // Fail silently
    }
  }

  window.writeProgress = writeProgress;
</script>

<script type="text/babel">
  const { useState, useRef, useEffect, useMemo } = React;

  /* ── API ─────────────────────────────────────────────────────────── */
  async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }

  /* ── Gögn ────────────────────────────────────────────────────────── */
  const READING_TEXT = `Mona Lisa er án efa eitt þekktasta málverk í heimi. Það er afrakstur snillingsins Leonardo da Vinci, ítalsks listamanns sem uppi var á endurreisnartímanum. Málverkið sýnir konu að nafni Lisa del Giocondo, sem var gift kaupmanni í Flórens á Ítalíu. Þessi dularfulla mynd hefur heillað listunnendur og fræðimenn um allan heim í meira en fimm aldir.

Það eru margar ástæður fyrir því að Mona Lisa er svona fræg. Eitt af því sem gerir málverkið einstakt er bros hennar. Það er erfitt að segja til um hvað hún er að hugsa eða hvaða tilfinningar búa að baki brosinu. Sumir segja að hún sé glöð, á meðan aðrir telja að hún sé sorgmædd eða jafnvel leyndardómsfull. Þessi óvissa um tilfinningar hennar hefur gert málverkið enn áhugaverðara og enn meira heillandi.

Leonardo da Vinci var meistari í að nota sérstaka tækni í málverkum sínum. Hann notaði tækni sem kallast „sfumato," sem er ítalskt orð sem þýðir „að gufa upp" eða „að reykja." Þessi tækni felur í sér að mála mjög þunn lög af málningu ofan á hvert annað til að skapa mjúk og óskýr mörk. Þetta gefur andlitinu á Monu Lisu mjúkt og raunverulegt útlit, eins og hún sé lifandi.

Málverkið er ekki mjög stórt, en það er samt mjög áhrifamikið. Það er 77 sentímetrar á hæð og 53 sentímetrar á breidd. Leonardo málaði það með olíu á tréplötu. Hann byrjaði að vinna að því um árið 1503 og hélt áfram að bæta við það í mörg ár. Það er sagt að hann hafi aldrei talið það fullklárað.

Í dag er Mona Lisa til sýnis í Louvre safninu í París, Frakklandi. Það hefur verið þar síðan árið 1797. Safnið er eitt af stærstu og frægustu listasöfnum í heimi. Þúsundir manna koma á hverjum degi til að sjá Monu Lisu. Vegna mikilla vinsælda getur verið mjög þröngt og erfitt að komast nálægt málverkinu.

Árið 1911 gerðist ótrúlegur atburður. Monu Lisu var stolið af Louvre safninu. Þjófurinn var ítalskur maður að nafni Vincenzo Peruggia. Hann var fyrrverandi starfsmaður safnsins og vildi að málverkið færi aftur til Ítalíu.

Árið 1913 fannst Mona Lisa aftur á Ítalíu. Vincenzo Peruggia reyndi að selja það til listasala í Flórens. Listasalinn varð strax tortrygginn og tilkynnti málið til lögreglunnar. Peruggia var handtekinn og málverkið fór aftur til Louvre safnsins. Eftir þjófnaðinn varð Mona Lisa enn frægari og vinsælli en áður.`;

  const MC_QUESTIONS = [
    {
      q: 'Hvar er Mona Lisa til sýnis í dag?',
      opts: ['Í einkasafni á Ítalíu', 'Í Louvre safninu í París', 'Í listasafni í Flórens', 'Í Vatíkaninu í Róm'],
      correct: 1,
    },
    {
      q: 'Hver var Vincenzo Peruggia?',
      opts: ['Listamaðurinn sem málaði Mona Lisa', 'Kaupmaðurinn sem var giftur konu á málverkinu', 'Ítalskur maður sem stal Mona Lisa', 'Forstjóri Louvre árið 1911'],
      correct: 2,
    },
    {
      q: 'Hvaða tækni notaði Leonardo da Vinci til að mála Mona Lisa?',
      opts: ['Pointillisma', 'Kúbisma', 'Sfumato', 'Raunsæi'],
      correct: 2,
    },
  ];

  const SHORT_QUESTIONS = [
    { q: 'Hver málaði Mona Lisa samkvæmt textanum?', key: ['Leonardo da Vinci', 'Leonardo', 'da Vinci'] },
    { q: 'Hvað er Mona Lisa há og breið samkvæmt textanum?', key: ['77', '53', 'sentímetrar', 'sentímetra'] },
    { q: 'Hvenær var Mona Lisa stolið frá Louvre safninu samkvæmt textanum?', key: ['1911'] },
  ];

  const DISCUSSION_QUESTIONS = [
    'Hefur þú einhvern tíma upplifað eitthvað sem var mjög fjölmennt og vinsælt, eins og að sjá Monu Lísu? Hvernig var sú upplifun?',
    'Mona Lisa er fræg fyrir leyndardómsfullt bros sitt. Er eitthvað leyndardómsfullt við þig eða einhvern sem þú þekkir?',
    'Monu Lisu var stolið og fannst svo aftur. Hefur þú einhvern tíma týnt einhverju mikilvægu og fundið það aftur? Hvernig leið þér?',
  ];

  const TABS = [
    { id: 'krossar', label: 'Krossaspurningar', icon: '✓' },
    { id: 'stuttar', label: 'Stuttar spurningar', icon: '📝' },
    { id: 'umraeda', label: 'Tölum saman', icon: '💬' },
  ];

  /* ── FeedbackBadge ───────────────────────────────────────────────── */
  const FeedbackBadge = ({ score, message, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
    const cls = {
      green: 'bg-green-50 border-green-200 text-green-700',
      amber: 'bg-amber-50 border-amber-200 text-amber-700',
      red:   'bg-red-50 border-red-200 text-red-700',
    }[color];
    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {onRetry && (
          <button onClick={onRetry} className="text-xs underline mt-2 opacity-70 block">
            Reyna aftur
          </button>
        )}
      </div>
    );
  };

  /* ── Krossaspurningar ────────────────────────────────────────────── */
  const KrossarTab = ({ onComplete }) => {
    const shuffled = useMemo(() => MC_QUESTIONS.map(q => {
      const opts = q.opts.map((text, i) => ({ text, orig: i }));
      for (let i = opts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }
      return { q: q.q, opts, correct: q.correct };
    }), []);

    const [answers, setAnswers] = useState({});
    const [checked, setChecked] = useState(false);
    const allPicked = shuffled.every((_, i) => answers[i] !== undefined);

    const handleCheck = () => {
      setChecked(true);
      const score = shuffled.filter((q, i) => answers[i] !== undefined && shuffled[i].opts[answers[i]].orig === q.correct).length;
      onComplete(Math.round(score / shuffled.length * 5));
    };

    return (
      <div className="fade-in space-y-4">
        <p className="text-gray-600 font-light text-sm">Merktu við eitt svar (A–D).</p>
        {shuffled.map((q, qi) => (
          <div key={qi} className="bg-blue-50 border border-blue-100 rounded-xl p-5">
            <p className="font-medium text-gray-800 mb-4 text-sm">{qi + 1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, si) => {
                const sel = answers[qi] === si;
                const isCorrect = opt.orig === q.correct;
                let cls = 'answer-option w-full px-4 py-2.5 rounded-lg text-sm font-light flex items-center gap-3';
                if (!checked) { if (sel) cls += ' opt-selected'; }
                else {
                  cls += ' opt-disabled';
                  if (isCorrect) cls += ' opt-correct';
                  else if (sel) cls += ' opt-incorrect';
                }
                return (
                  <button key={si} onClick={() => { if (!checked) setAnswers(p => ({ ...p, [qi]: si })); }}
                    className={cls}>
                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${
                      checked && isCorrect ? 'border-green-500 bg-green-500' :
                      checked && sel ? 'border-red-500 bg-red-500' :
                      sel ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}`}>
                      {(sel || (checked && isCorrect)) && <div className="w-2 h-2 bg-white rounded-full" />}
                    </div>
                    <span>{String.fromCharCode(65 + si)}. {opt.text}</span>
                    {checked && isCorrect && <span className="ml-auto">✓</span>}
                    {checked && sel && !isCorrect && <span className="ml-auto">✗</span>}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
        <div className="flex gap-3 pt-2">
          <button onClick={handleCheck}
            disabled={!allPicked || checked}
            className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
            Athuga svör
          </button>
          {checked && (
            <button onClick={() => { setAnswers({}); setChecked(false); }}
              className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                hover:bg-gray-50 transition-colors font-light text-sm">
              Endurstilla
            </button>
          )}
        </div>
      </div>
    );
  };

  /* ── Stuttar spurningar ──────────────────────────────────────────── */
  const StuttarTab = ({ onComplete }) => {
    const [answers,  setAnswers]  = useState(SHORT_QUESTIONS.map(() => ''));
    const [feedback, setFeedback] = useState(SHORT_QUESTIONS.map(() => null));
    const [loading,  setLoading]  = useState(SHORT_QUESTIONS.map(() => false));

    const checkAnswer = async (i) => {
      const ans = answers[i].trim();
      if (!ans) return;
      setLoading(p => { const n = [...p]; n[i] = true; return n; });
      try {
        const sys = `Þú ert kennari í íslensku sem A2 máli. Nemandinn er að læra íslensku sem annað mál.
Spurning: "${SHORT_QUESTIONS[i].q}"
Lykilatriði: ${SHORT_QUESTIONS[i].key.join(', ')}
Mettu svarið. Vera sveigjanlegur með orðalag en nákvæm með staðreyndir.
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og á íslensku]`;
        const result = await callOpenAI(
          [{ role: 'system', content: sys }, { role: 'user', content: ans }],
          80, 0.2
        );
        const stigMatch     = result.match(/STIG:\s*(\d)/);
        const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
        const score = stigMatch ? parseInt(stigMatch[1]) : 0;
        const msg   = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();
        const newFb = feedback.map((f, idx) => idx === i ? { score, msg } : f);
        setFeedback(newFb);
        if (newFb.every(f => f !== null)) {
          const total = newFb.reduce((a, f) => a + (f?.score ?? 0), 0);
          onComplete(Math.round(total / SHORT_QUESTIONS.length));
        }
      } catch {
        setFeedback(p => { const n = [...p]; n[i] = { score: 0, msg: 'Gat ekki tengst. Reyndu aftur.' }; return n; });
      }
      setLoading(p => { const n = [...p]; n[i] = false; return n; });
    };

    const reset = (i) => {
      setAnswers(p => { const n = [...p]; n[i] = ''; return n; });
      setFeedback(p => { const n = [...p]; n[i] = null; return n; });
    };

    return (
      <div className="fade-in space-y-4">
        <p className="text-gray-600 font-light text-sm">Svaraðu með þínum eigin orðum (1–2 setningar).</p>
        {SHORT_QUESTIONS.map((q, i) => (
          <div key={i} className="bg-blue-50 border border-blue-100 rounded-xl p-5">
            <p className="font-medium text-gray-800 mb-3 text-sm">{i + 1}. {q.q}</p>
            <textarea
              value={answers[i]}
              onChange={e => setAnswers(p => { const n = [...p]; n[i] = e.target.value; return n; })}
              disabled={feedback[i] !== null || loading[i]}
              rows={3}
              placeholder="Skrifaðu svarið þitt hér..."
              className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                focus:outline-none focus:border-blue-400 font-light resize-none
                disabled:bg-gray-50 text-sm mb-3" />
            {feedback[i] === null && (
              <button onClick={() => checkAnswer(i)}
                disabled={!answers[i].trim() || loading[i]}
                className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                  disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                {loading[i] ? 'Athuga...' : 'Athuga svar'}
              </button>
            )}
            {feedback[i] && (
              <FeedbackBadge
                score={feedback[i].score}
                message={feedback[i].msg}
                onRetry={feedback[i].score < 4 ? () => reset(i) : null}
              />
            )}
          </div>
        ))}
      </div>
    );
  };

  /* ── Tölum saman ────────────────────────────────────────────── */
  const UmraeduSpurning = ({ question, index }) => {
    const [messages, setMessages] = useState([]);
    const [input,    setInput]    = useState('');
    const [loading,  setLoading]  = useState(false);
    const chatRef = useRef(null);

    useEffect(() => {
      if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }, [messages]);

    const send = async () => {
      const text = input.trim();
      if (!text || loading) return;
      const newMessages = [...messages, { role: 'user', content: text }];
      setMessages(newMessages);
      setInput('');
      setLoading(true);
      try {
        const result = await callOpenAI([
          {
            role: 'system',
            content: `Þú ert vingjarnlegur íslenskukennarinn. Nemandinn er að læra íslensku sem A2 tungumál.
Spurningin sem við ræðum er: "${question}"
Svaraðu ALLTAF á íslensku. Vertu hvetjandi og styddu nemandann.
Ef nemandinn skrifar á öðru máli, svaraðu á íslensku en getur bætt við þýðingu í sviga.
Kommentaðu á svarið (1–2 setningar) og spyrðu einnar follow-up spurningar.
Haltu svörum stuttum og einföldum (A2 stig).`,
          },
          ...newMessages.map(m => ({ role: m.role, content: m.content })),
        ], 250, 0.5);
        setMessages([...newMessages, { role: 'assistant', content: result }]);
      } catch {
        setMessages([...newMessages, { role: 'assistant', content: 'Gat ekki tengst. Reyndu aftur.' }]);
      }
      setLoading(false);
    };

    return (
      <div className="bg-blue-50 border border-blue-100 rounded-xl p-5">
        <p className="font-medium text-gray-800 mb-4 text-sm">{index + 1}. {question}</p>
        {messages.length > 0 && (
          <div ref={chatRef} className="mb-4 space-y-3 max-h-60 overflow-y-auto pr-1">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-xs px-4 py-2 rounded-xl text-sm font-light leading-relaxed ${
                  m.role === 'user'
                    ? 'bg-blue-600 text-white'
                    : 'bg-white text-gray-800 shadow-sm border border-gray-100'}`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-white border border-gray-100 rounded-xl px-4 py-3 shadow-sm">
                  <div className="flex gap-1">
                    {[0, 1, 2].map(i => (
                      <div key={i} className="w-2 h-2 bg-gray-300 rounded-full animate-bounce"
                        style={{ animationDelay: `${i * 0.15}s` }} />
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
        <div className="flex gap-2">
          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            rows={2}
            placeholder="Skrifaðu svar þitt hér..."
            disabled={loading}
            className="flex-1 px-4 py-2 border-2 border-gray-200 rounded-lg
              focus:outline-none focus:border-blue-400 font-light resize-none
              disabled:bg-gray-50 text-sm" />
          <button onClick={send} disabled={!input.trim() || loading}
            className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end">
            Senda
          </button>
        </div>
      </div>
    );
  };

  const UmraeduTab = ({ onComplete }) => {
    useEffect(() => { onComplete(5); }, []);
    return (
      <div className="fade-in space-y-4">
        <p className="text-gray-600 font-light text-sm">
          Svaraðu spurningunum á íslensku. Kennarinn hjálpar þér!
        </p>
        {DISCUSSION_QUESTIONS.map((q, i) => (
          <UmraeduSpurning key={i} question={q} index={i} />
        ))}
      </div>
    );
  };

  /* ── Aðalforrit ──────────────────────────────────────────────────── */
  const App = () => {
    const [showText,   setShowText]   = useState(true);
    const [activeTab,  setActiveTab]  = useState('krossar');
    const [completed,  setCompleted]  = useState({ krossar: false, stuttar: false, umraeda: false });

    const markDone = (tab) => setCompleted(prev => ({ ...prev, [tab]: true }));
    const allDone  = Object.values(completed).every(Boolean);
    const progressWritten = React.useRef(false);
    useEffect(() => {
      window.writeProgress && window.writeProgress('lestextar_mona_lisa', 'opened');
    }, []);
    useEffect(() => {
      const exerciseDone = completed.krossar && completed.stuttar;
      if (exerciseDone && !progressWritten.current) {
        progressWritten.current = true;
        window.writeProgress && window.writeProgress('lestextar_mona_lisa', 'completed');
      }
    }, [completed]);

    return (
      <div className="min-h-screen">

        {/* ── HEADER ─────────────────────────────────────────────── */}
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <button onClick={() => window.history.back()}
              className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
              ← Til baka
            </button>
            <h1 className="text-3xl font-light text-gray-800 mb-2">📖 Mona Lisa</h1>
            <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
          </div>
        </header>

        {/* ── MAIN ───────────────────────────────────────────────── */}
        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">

          {/* Leiðbeiningabox */}
          <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4">
            <ul className="space-y-1 text-sm font-light text-blue-900">
              <li>📖 Lestu textann hægt og rólega</li>
              <li>✏️ Svaraðu krossaspurningunum</li>
              <li>📝 Svaraðu stuttum spurningum með heilum setningum</li>
              <li>💬 Ræddu spurningarnar með AI</li>
            </ul>
          </div>

          {/* Textabox */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <button onClick={() => setShowText(v => !v)}
              className="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-gray-50 transition-colors">
              <span className="font-medium text-gray-700 flex items-center gap-2">
                📖 Lesefnið – <em className="font-light text-gray-500">Mona Lisa</em>
              </span>
              <span className={`text-gray-400 transition-transform duration-300 ${showText ? 'rotate-180' : ''}`}>▼</span>
            </button>
            {showText && (
              <div className="px-6 pb-6 border-t border-gray-100 fade-in">
                {READING_TEXT.split('\n\n').map((p, i) => (
                  <p key={i} className="mt-4 text-gray-700 font-light leading-relaxed text-sm">{p}</p>
                ))}
              </div>
            )}
          </div>

          {/* Flipaspjald */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

            {/* Tab bar – sticky */}
            <div className="bg-white border-b border-gray-200 sticky top-0 z-40 overflow-x-auto"
              style={{ scrollbarWidth: 'none' }}>
              <div className="flex">
                {TABS.map(tab => (
                  <button key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`tab-btn flex items-center gap-1.5 px-5 py-3.5 text-sm font-light
                      text-gray-500 whitespace-nowrap border-b-2 border-transparent
                      ${activeTab === tab.id ? 'tab-active' : ''}`}>
                    <span>{tab.icon}</span>
                    <span>{tab.label}</span>
                    {completed[tab.id] && (
                      <span className="w-4 h-4 rounded-full bg-green-500 text-white text-xs
                        flex items-center justify-center ml-0.5">✓</span>
                    )}
                  </button>
                ))}
              </div>
            </div>

            <div className="p-6 fade-in" key={activeTab}>
              {activeTab === 'krossar' && (
                <KrossarTab onComplete={() => markDone('krossar')} />
              )}
              {activeTab === 'stuttar' && (
                <StuttarTab onComplete={() => markDone('stuttar')} />
              )}
              {activeTab === 'umraeda' && (
                <UmraeduTab onComplete={() => markDone('umraeda')} />
              )}
            </div>
          </div>

          {allDone && (
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 text-center fade-in">
              <div className="text-3xl mb-2">🎉</div>
              <p className="text-blue-800 font-light">Vel gert! Þú hefur lokið öllum verkefnum.</p>
            </div>
          )}

        </main>

        {/* ── FRAMVINDURAKI (fixed bottom) ───────────────────────── */}
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                  ${completed[tab.id]
                    ? 'bg-blue-600 text-white'
                    : activeTab === tab.id
                      ? 'bg-gray-200 text-gray-700'
                      : 'bg-gray-100 text-gray-500'}`}>
                {completed[tab.id] ? '✓ ' : ''}{tab.label}
              </button>
            ))}
          </div>
        </div>

      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
