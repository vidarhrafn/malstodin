<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Lestexti: 17. júní – Þjóðhátíðardagur Íslands – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected   { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct    { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect  { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled   { cursor: default; }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .tab-btn.active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }
    .text-panel { overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; }
    .text-panel.open   { max-height: 900px; opacity: 1; }
    .text-panel.closed { max-height: 0;     opacity: 0; }
    .chat-container { max-height: 400px; overflow-y: auto; }
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .chat-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o-mini', temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    const READING_TEXT = [
      { type: 'para', text: '17. júní er þjóðhátíðardagur Íslands. Þá fagnar fólk því að Ísland varð sjálfstætt ríki árið 1944. Dagurinn er líka fæðingardagur Jóns Sigurðssonar. Hann var mikilvægur maður í sögu Íslands. Jón vildi að Ísland fengi að stjórna sér sjálft, og barðist fyrir því að Ísland fengi sjálfstæði frá Danmörku.' },
      { type: 'para', text: 'Þetta er mikil fjölskylduhátíð. Margir klæða sig upp í þjóðbúning eða upphlut. Fánar blakta alls staðar og fólk hittist í miðbænum. Það eru skrúðgöngur með lúðrasveitum sem spila íslenska tónlist. Í skrúðgöngunni ganga líka börn, fullorðnir og fólk í þjóðbúningum.' },
      { type: 'para', text: 'Forseti Íslands heldur ræðu, og oft tala líka aðrir sem vinna fyrir borg eða bæ. Eftir ræður eru tónlistaratriði — bæði lúðrasveitir og hljómsveitir eða söngvarar koma fram. Það eru líka leiktæki fyrir börn og andlitsmálning. Fólk borðar oft ís eða pylsu á hátíðinni. Það kostar ekki neitt að fara á 17. júní. Allir geta tekið þátt. Þetta er dagur þar sem fjölskyldur og vinir koma saman og fagna sjálfstæði Íslands. Margir segja að þetta sé einn skemmtilegasti dagur ársins!' },
    ];

    const MULTIPLE_CHOICE_RAW = [
      {
        question: 'Hvers vegna er 17. júní mikilvægur dagur á Íslandi samkvæmt textanum?',
        options: [
          'Því það er dagurinn sem Íslendingar borða mest af ís.',
          'Því það er dagurinn sem Ísland varð sjálfstætt ríki og afmælisdagur Jóns Sigurðssonar.',
          'Því það er dagurinn sem allir klæðast þjóðbúningum.',
          'Því það er dagurinn sem forsetinn heldur ræðu.'
        ],
        correct: 1
      },
      {
        question: 'Hvað er eitt af því sem fólk gerir á 17. júní samkvæmt textanum?',
        options: [
          'Fólk fer á ströndina og syndir.',
          'Fólk hittist í miðbænum, horfir á skrúðgöngur og hlustar á tónlist.',
          'Fólk fer í bíó og horfir á nýjustu myndirnar.',
          'Fólk fer í heimsókn til ættingja sinna í öðrum löndum.'
        ],
        correct: 1
      },
      {
        question: 'Hvað er eitthvað sem börn geta gert á 17. júní samkvæmt textanum?',
        options: [
          'Þau geta spilað tölvuleiki allan daginn.',
          'Þau geta farið í leiktæki og fengið andlitsmálningu.',
          'Þau geta horft á sjónvarpið allan daginn.',
          'Þau geta lesið bækur í rólegheitum.'
        ],
        correct: 1
      }
    ];

    const SHORT_QUESTIONS = [
      'Hver var Jón Sigurðsson og hvers vegna er hann mikilvægur fyrir Ísland samkvæmt textanum?',
      'Hvaða fötum klæðist fólk oft á 17. júní samkvæmt textanum?',
      'Hvað borða margir á 17. júní samkvæmt textanum?'
    ];

    const DISCUSSION_QUESTIONS = [
      'Hefur þú fagnað 17. júní áður? Hvað er það skemmtilegasta sem þú hefur gert á þeim degi, og hvers vegna fannst þér það skemmtilegt?',
      'Í textanum er sagt að Jón Sigurðsson hafi barist fyrir sjálfstæði Íslands. Er eitthvað sem þú hefur barist fyrir sem er mikilvægt fyrir þig? Hvernig leið þér þegar þú barðist fyrir því?',
      'Hvernig heldur þú að Ísland verði á 100 ára afmæli lýðveldisins árið 2044? Heldurðu að það verði einhverjar breytingar á hátíðahöldunum?',
      'Hvenær er þjóðhátíðardagur í þínu landi? Er honum fagnað á sama hátt og á Íslandi? Hvað er líkt og hvað er ólíkt?'
    ];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const FeedbackBadge = ({ score, message }) => {
      const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
      const colors = {
        green: 'bg-green-50 border-green-200 text-green-700',
        amber: 'bg-amber-50 border-amber-200 text-amber-700',
        red:   'bg-red-50 border-red-200 text-red-700',
      };
      return (
        <div className={`mt-3 p-3 rounded-lg border fade-in ${colors[color]}`}>
          <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
          <p className="text-sm font-light">{message}</p>
        </div>
      );
    };

    const TextPanel = ({ open, onToggle }) => (
      <div className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
        <div className="max-w-4xl mx-auto px-6">
          <button onClick={onToggle}
            className="w-full flex items-center justify-between py-4 text-left group">
            <span className="flex items-center gap-2 text-gray-700 font-light group-hover:text-blue-600 transition-colors">
              <span className="text-lg">📖</span>
              <span>Textinn – <em className="font-light text-gray-500">17. júní – Þjóðhátíðardagur Íslands</em></span>
            </span>
            <span className={`text-gray-400 transition-transform duration-300 ${open ? 'rotate-180' : ''}`}>▼</span>
          </button>
          <div className={`text-panel ${open ? 'open' : 'closed'}`}>
            <div className="pb-6 space-y-3">
              {READING_TEXT.map((block, i) => (
                <p key={i} className="text-gray-700 leading-relaxed font-light text-sm">{block.text}</p>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    const App = () => {
      const [textOpen, setTextOpen] = useState(true);
      const [activeTab, setActiveTab] = useState(0);
      const [tabsDone, setTabsDone] = useState([false, false, false]);

      const markDone = (i) => setTabsDone(prev => {
        const n = [...prev]; n[i] = true; return n;
      });

      const mcShuffled = useMemo(() => MULTIPLE_CHOICE_RAW.map(q => {
        const indexed = q.options.map((opt, i) => ({ opt, orig: i }));
        const shuffled = shuffle(indexed);
        return {
          question: q.question,
          options: shuffled.map(s => s.opt),
          correct: shuffled.findIndex(s => s.orig === q.correct)
        };
      }), []);
      const [mcAnswers, setMcAnswers] = useState([]);
      const [mcChecked, setMcChecked] = useState(false);

      const [shortAnswers, setShortAnswers] = useState(['', '', '']);
      const [shortFeedback, setShortFeedback] = useState([null, null, null]);
      const [shortLoading, setShortLoading] = useState([false, false, false]);

      const [convs, setConvs] = useState([[], [], [], []]);
      const [inputs, setInputs] = useState(['', '', '', '']);
      const [chatLoading, setChatLoading] = useState([false, false, false, false]);
      const chatRefs = [useRef(null), useRef(null), useRef(null), useRef(null)];

      const scrollChat = (i) => setTimeout(() => {
        if (chatRefs[i].current) chatRefs[i].current.scrollTop = chatRefs[i].current.scrollHeight;
      }, 100);

      const handleMcSelect = (qi, oi) => {
        if (mcChecked) return;
        const n = [...mcAnswers]; n[qi] = oi; setMcAnswers(n);
      };

      const checkMc = () => {
        if (mcAnswers.length < mcShuffled.length || mcAnswers.some(a => a === undefined)) {
          alert('Vinsamlegast svaraðu öllum spurningum!'); return;
        }
        setMcChecked(true);
        markDone(0);
      };

      const getShortFeedback = async (idx) => {
        const answer = shortAnswers[idx].trim();
        if (answer.length < 3) { alert('Skrifaðu svar (a.m.k. nokkur orð)'); return; }
        const newL = [...shortLoading]; newL[idx] = true; setShortLoading(newL);
        try {
          const textStr = READING_TEXT.map(b => b.text).join('\n\n');
          const sys = `Þú ert íslenskukennari sem metur stutt svör nemanda (A1-A2 stig).

TEXTINN: "${textStr}"
SPURNINGIN: "${SHORT_QUESTIONS[idx]}"
SVAR NEMANDANS: "${answer}"

Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku, vísar í textann]`;
          const result = await callOpenAI(
            [{ role: 'system', content: sys }, { role: 'user', content: 'Mettu svarið.' }],
            120, 'gpt-4o-mini', 0.3
          );
          const stigM = result.match(/STIG:\s*(\d)/);
          const endM  = result.match(/ENDURGJÖF:\s*(.+)/);
          const score = stigM ? parseInt(stigM[1]) : 3;
          const msg   = endM  ? endM[1].trim() : result.trim();
          const newF = [...shortFeedback]; newF[idx] = { score, msg }; setShortFeedback(newF);
        } catch(e) {
          console.error(e); alert('Villa. Reyndu aftur.');
        } finally {
          const newL = [...shortLoading]; newL[idx] = false; setShortLoading(newL);
        }
      };

      const allShortDone = shortFeedback.every(f => f !== null);
      useEffect(() => { if (allShortDone && !tabsDone[1]) markDone(1); }, [allShortDone]);

      const sendMessage = async (qi) => {
        const msg = inputs[qi].trim();
        if (!msg) return;
        const newConvs = [...convs];
        newConvs[qi] = [...newConvs[qi], { role: 'user', content: msg }];
        setConvs(newConvs);
        const newIn = [...inputs]; newIn[qi] = ''; setInputs(newIn);
        const newL = [...chatLoading]; newL[qi] = true; setChatLoading(newL);
        scrollChat(qi);
        try {
          const textStr = READING_TEXT.map(b => b.text).join('\n\n');
          const isFirst = newConvs[qi].length === 1;
          const sys = `Þú ert vingjarnlegur íslenskukennari sem ræðir við A1-A2 nemanda um 17. júní – þjóðhátíðardag Íslands.

TEXTINN: "${textStr}"
SPURNINGIN: "${DISCUSSION_QUESTIONS[qi]}"

VERKEFNI: ${isFirst
  ? 'Gefðu hvetjandi endurgjöf á fyrsta svari nemandans og spyrðu einnar einföldrar follow-up spurningar.'
  : 'Haltu áfram samtali. Svaraðu náttúrulega og vertu hvetjandi.'}

REGLUR:
- Jákvæður og hvetjandi tónn
- 2-3 setningar
- Einföld íslenska (A1-A2)
- Einungis íslenska

SVARAÐU MEÐ JSON:
{ "grammar": "Málfarsendurgjöf EINUNGIS ef grófar villur (null ef ekkert)", "response": "Aðal svarið" }`;

          const messages = [
            { role: 'system', content: sys },
            ...newConvs[qi].filter(m => m.role === 'user' || m.role === 'assistant')
          ];
          const result = await callOpenAI(messages, 300, 'gpt-4o', 0.7);
          const clean = result.replace(/```json\s*/g, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(clean);

          let cur = [...newConvs];
          if (parsed.grammar) {
            cur[qi] = [...cur[qi], { role: 'grammar', content: parsed.grammar }];
            setConvs([...cur]);
            scrollChat(qi);
            await new Promise(r => setTimeout(r, 400));
          }
          cur[qi] = [...cur[qi], { role: 'assistant', content: parsed.response }];
          setConvs([...cur]);
          scrollChat(qi);
          if (!tabsDone[2]) markDone(2);
        } catch(e) {
          console.error(e); alert('Villa. Reyndu aftur.');
          const rb = [...convs]; rb[qi] = newConvs[qi].slice(0, -1); setConvs(rb);
        } finally {
          const newL = [...chatLoading]; newL[qi] = false; setChatLoading(newL);
        }
      };

      const handleKey = (e, qi) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(qi); }
      };

      const TABS = [
        { label: 'Krossaspurningar', emoji: '✏️' },
        { label: 'Stuttar spurningar', emoji: '📝' },
        { label: 'Tölum saman', emoji: '💬' },
      ];

      return (
        <div className="min-h-screen pb-24">

          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎉 17. júní – Þjóðhátíðardagur Íslands</h1>
              <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
            </div>
          </header>

          <TextPanel open={textOpen} onToggle={() => setTextOpen(o => !o)} />

          <div className="bg-white border-b border-gray-200 sticky top-[57px] z-10">
            <div className="max-w-4xl mx-auto px-6 flex">
              {TABS.map((tab, i) => (
                <button key={i} onClick={() => setActiveTab(i)}
                  className={`tab-btn px-5 py-3 text-sm font-light text-gray-600 ${activeTab === i ? 'active' : ''}`}>
                  {tabsDone[i] ? '✓ ' : `${tab.emoji} `}{tab.label}
                </button>
              ))}
            </div>
          </div>

          <main className="max-w-4xl mx-auto px-6 mt-6 pb-20">

            <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-6">
              <ul className="text-sm font-light text-blue-900 space-y-1">
                <li>📖 Lestu textann hægt og rólega</li>
                <li>✏️ Svaraðu krossaspurningunum</li>
                <li>📝 Svaraðu stuttum spurningum með heilum setningum</li>
                <li>💬 Ræddu spurningarnar með AI</li>
              </ul>
            </div>

            {/* Tab 0: Krossaspurningar */}
            {activeTab === 0 && (
              <div className="fade-in space-y-6">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                  <h2 className="text-xl font-light text-gray-800 mb-6">Krossaspurningar</h2>
                  <div className="space-y-8">
                    {mcShuffled.map((q, qi) => (
                      <div key={qi} className="border border-gray-100 rounded-xl p-5">
                        <p className="font-light text-gray-800 mb-4">{qi + 1}. {q.question}</p>
                        <div className="space-y-3">
                          {q.options.map((opt, oi) => {
                            const isSelected = mcAnswers[qi] === oi;
                            const isCorrect  = oi === q.correct;
                            return (
                              <div key={oi}
                                onClick={() => handleMcSelect(qi, oi)}
                                className={`answer-option p-4 rounded-lg
                                  ${!mcChecked && isSelected ? 'opt-selected' : ''}
                                  ${mcChecked && isCorrect ? 'opt-correct' : ''}
                                  ${mcChecked && isSelected && !isCorrect ? 'opt-incorrect' : ''}
                                  ${mcChecked ? 'opt-disabled' : ''}`}>
                                <div className="flex items-start gap-3">
                                  <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mt-0.5 flex-shrink-0
                                    ${!mcChecked && isSelected ? 'border-blue-500 bg-blue-500' :
                                      mcChecked && isCorrect   ? 'border-green-500 bg-green-500' :
                                      mcChecked && isSelected  ? 'border-red-500 bg-red-500' :
                                      'border-gray-300'}`}>
                                    {(isSelected || (mcChecked && isCorrect)) && (
                                      <div className="w-2 h-2 bg-white rounded-full"></div>
                                    )}
                                  </div>
                                  <span className="font-light flex-1 text-sm">{opt}</span>
                                  {mcChecked && isCorrect && <span className="text-green-600">✓</span>}
                                  {mcChecked && isSelected && !isCorrect && <span className="text-red-600">✗</span>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  {!mcChecked ? (
                    <div className="mt-8 text-center">
                      <button onClick={checkMc}
                        className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                        Athuga svör
                      </button>
                    </div>
                  ) : (
                    <div className="mt-6 fade-in">
                      <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 mb-4">
                        <p className="text-blue-800 font-light text-sm">
                          {mcAnswers.filter((a, i) => a === mcShuffled[i].correct).length === mcShuffled.length
                            ? '🎉 Frábært! Öll svörin eru rétt!'
                            : `💪 Þú fékkst ${mcAnswers.filter((a, i) => a === mcShuffled[i].correct).length} af ${mcShuffled.length} rétt.`}
                        </p>
                      </div>
                      <div className="text-center">
                        <button onClick={() => setActiveTab(1)}
                          className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                          Halda áfram →
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Tab 1: Stuttar spurningar */}
            {activeTab === 1 && (
              <div className="fade-in">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                  <h2 className="text-xl font-light text-gray-800 mb-2">Stuttar spurningar</h2>
                  <p className="text-gray-500 text-sm font-light mb-6">Svaraðu með heilum setningum út frá textanum.</p>
                  <div className="space-y-8">
                    {SHORT_QUESTIONS.map((q, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-5">
                        <p className="font-light text-gray-800 mb-4">{idx + 1}. {q}</p>
                        <textarea
                          value={shortAnswers[idx]}
                          onChange={e => { const n = [...shortAnswers]; n[idx] = e.target.value; setShortAnswers(n); }}
                          disabled={shortFeedback[idx] !== null}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm"
                          rows="3"
                          placeholder="Skrifaðu svarið þitt hér..."
                        />
                        {!shortFeedback[idx] ? (
                          <button
                            onClick={() => getShortFeedback(idx)}
                            disabled={shortLoading[idx] || shortAnswers[idx].trim().length < 3}
                            className="mt-3 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLoading[idx] ? 'Bíð...' : 'Fá endurgjöf'}
                          </button>
                        ) : (
                          <FeedbackBadge score={shortFeedback[idx].score} message={shortFeedback[idx].msg} />
                        )}
                      </div>
                    ))}
                  </div>
                  {allShortDone && (
                    <div className="mt-6 text-center fade-in">
                      <button onClick={() => setActiveTab(2)}
                        className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                        Halda áfram →
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Tab 2: Tölum saman */}
            {activeTab === 2 && (
              <div className="fade-in space-y-6">
                {DISCUSSION_QUESTIONS.map((q, qi) => (
                  <div key={qi} className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <p className="font-light text-gray-800 mb-4">{qi + 1}. {q}</p>
                    <div ref={chatRefs[qi]} className="chat-container mb-4 space-y-3">
                      {convs[qi].map((msg, mi) => (
                        <div key={mi}>
                          {msg.role === 'user' ? (
                            <div className="flex justify-end">
                              <div className="bg-blue-50 rounded-xl p-3 max-w-[80%]">
                                <p className="text-gray-800 font-light text-sm">{msg.content}</p>
                              </div>
                            </div>
                          ) : msg.role === 'grammar' ? (
                            <div className="flex justify-center">
                              <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 max-w-[85%]">
                                <p className="text-xs text-amber-800 font-light">📚 Málfar: {msg.content}</p>
                              </div>
                            </div>
                          ) : (
                            <div className="flex justify-start">
                              <div className="bg-green-50 border border-green-200 rounded-xl p-3 max-w-[80%]">
                                <p className="text-gray-800 font-light text-sm">{msg.content}</p>
                              </div>
                            </div>
                          )}
                        </div>
                      ))}
                      {chatLoading[qi] && (
                        <div className="flex justify-start">
                          <div className="bg-gray-100 rounded-xl p-3">
                            <p className="text-gray-500 font-light text-sm">Bíð...</p>
                          </div>
                        </div>
                      )}
                    </div>
                    <div className="flex gap-2">
                      <textarea
                        value={inputs[qi]}
                        onChange={e => { const n = [...inputs]; n[qi] = e.target.value; setInputs(n); }}
                        onKeyPress={e => handleKey(e, qi)}
                        disabled={chatLoading[qi]}
                        className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm"
                        rows="2"
                        placeholder={convs[qi].length === 0 ? 'Skrifaðu svarið þitt hér...' : 'Haltu áfram að spjalla...'}
                      />
                      <button
                        onClick={() => sendMessage(qi)}
                        disabled={chatLoading[qi] || !inputs[qi].trim()}
                        className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end">
                        Senda
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </main>

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
              {TABS.map((tab, i) => (
                <button key={i} onClick={() => setActiveTab(i)}
                  className={`flex-1 py-2 rounded-lg text-sm font-light transition-colors
                    ${tabsDone[i] ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                  {tabsDone[i] ? '✓ ' : ''}{tab.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
