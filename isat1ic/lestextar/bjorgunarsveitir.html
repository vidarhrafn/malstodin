  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COURSE = 'isat1ic';

  async function writeProgress(exerciseId, status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, exerciseId);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) {
      // Fail silently
    }
  }

  window.writeProgress = writeProgress;
</script>

<script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // ── API ─────────────────────────────────────────────────────────────────

    async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o-mini', temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    // ── Gögn ────────────────────────────────────────────────────────────────

    const READING_TEXT = `Á Íslandi eru margar björgunarsveitir. Í þeim eru sjálfboðaliðar. Það þýðir að fólkið fær ekki borgað fyrir að vinna þar. Þetta fólk vill hjálpa öðrum og æfir sig oft.

Björgunarsveitirnar æfa sig til að vera tilbúnar þegar þær þurfa að fara í útköll. Útkall er þegar fólk er í hættu, til dæmis uppi á fjöllum eða úti á sjó. Þá þarf að bjarga fólkinu.

Björgunarsveitirnar nota tæki eins og jeppa, vélsleða og stundum þyrlur. Þær þurfa stundum að klifra í klettum eða ís eða leita að fólki sem er týnt í snjónum. Þær nota líka alls konar búnað eins og hjálma, höfuðljós og talstöðvar.

Það getur verið hættulegt að vera í björgunarsveit og allir þurfa að vera vel undirbúnir, því oft er mjög kalt, dimmt eða vont veður.

Það er mikil samvinna í björgunarsveitunum. Allir vinna saman og hjálpa hvert öðru. Fólk lærir líka skyndihjálp, svo það geti hjálpað ef einhver hefur slasað sig.

Það er gott að vita að björgunarsveitirnar eru til á Íslandi. Þær hjálpa fólki sem lendir í vandræðum – bæði ferðamönnum sem eru að ferðast um landið og líka fólki sem býr hér.`;

    const MULTIPLE_CHOICE = [
      {
        question: 'Hvað þýðir það að björgunarsveitarmenn séu sjálfboðaliðar?',
        options: [
          'Þeir fá borgað fyrir vinnuna sína.',
          'Þeir vinna bara á sumrin.',
          'Þeir fá ekki borgað fyrir vinnuna sína.',
          'Þeir vinna bara á skrifstofu.'
        ],
        correct: 2
      },
      {
        question: 'Hvaða dæmi er gefið um aðstæður þar sem björgunarsveitir fara í útköll?',
        options: [
          'Þegar fólk er að versla í búð.',
          'Þegar fólk er í hættu uppi á fjöllum.',
          'Þegar fólk er að horfa á sjónvarpið.',
          'Þegar fólk er að spila fótbolta.'
        ],
        correct: 1
      },
      {
        question: 'Hvers vegna er mikilvægt að björgunarsveitarmenn læri skyndihjálp?',
        options: [
          'Til að geta hjálpað fólki sem hefur slasað sig.',
          'Til að geta ekið betur á jeppum.',
          'Til að geta klifrað betur í ís.',
          'Til að geta fundið týnt fólk hraðar.'
        ],
        correct: 0
      }
    ];

    const SHORT_QUESTIONS = [
      {
        question: 'Hvaða farartæki nota björgunarsveitirnar við störf sín?',
        expectedContent: 'Textinn nefnir jeppa, vélsleða og þyrlur sem farartæki björgunarsveitanna.'
      },
      {
        question: 'Nefndu dæmi um búnað sem björgunarsveitirnar nota þegar þær eru að störfum.',
        expectedContent: 'Textinn nefnir hjálma, höfuðljós og talstöðvar sem búnað.'
      },
      {
        question: 'Af hverju þarf björgunarsveitarfólk að vera vel undirbúið?',
        expectedContent: 'Vegna þess að oft er mjög kalt, dimmt eða vont veður og starfið getur verið hættulegt.'
      }
    ];

    const DISCUSSION_QUESTIONS = [
      'Fólk í björgunarsveitum er sjálfboðaliðar. Vinnur þú eitthvað án þess að fá borgað? Hvað gerir þú? Langar þig að vera sjálfboðaliði? Af hverju?/Af hverju ekki?',
      'Björgunarsveitirnar æfa sig mikið. Hverju finnst þér mikilvægt að æfa þig í, og hvernig heldurðu að það hjálpi þér?',
      'Veðrið á Íslandi getur verið hættulegt. Hvernig er veðrið í þínu landi? Er það stundum hættulegt? Hvernig? Er eitthvað annað hættulegt í þínu landi?'
    ];

    const TABS = [
      { id: 'krossar', label: 'Krossaspurningar', icon: '✓' },
      { id: 'stuttar', label: 'Stuttar spurningar', icon: '📝' },
      { id: 'umraeda', label: 'Umræða', icon: '💬' }
    ];

    // ── Shuffle ─────────────────────────────────────────────────────────────

    const shuffle = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    // ── Íhlutir ─────────────────────────────────────────────────────────────

    const FeedbackBadge = ({ score, message }) => {
      const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
      const colors = {
        green: 'bg-green-50 border-green-200 text-green-700',
        amber: 'bg-amber-50 border-amber-200 text-amber-700',
        red: 'bg-red-50 border-red-200 text-red-700',
      };
      return (
        <div className={`mt-3 p-3 rounded-lg border ${colors[color]}`}>
          <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
          <p className="text-sm font-light">{message}</p>
        </div>
      );
    };

    // ── Krossaspurningar ────────────────────────────────────────────────────

    const KrossaTab = ({ onComplete }) => {
      const [selected, setSelected] = useState(Array(MULTIPLE_CHOICE.length).fill(null));
      const [showFeedback, setShowFeedback] = useState(false);

      const shuffledOptions = useMemo(() =>
        MULTIPLE_CHOICE.map(q => {
          const indices = q.options.map((_, i) => i);
          const shuffled = shuffle(indices);
          return { shuffled, correctIndex: shuffled.indexOf(q.correct) };
        }), []);

      const check = () => {
        setShowFeedback(true);
        const score = selected.reduce((sum, sel, i) =>
          sum + (sel === shuffledOptions[i].correctIndex ? 1 : 0), 0);
        onComplete(score === MULTIPLE_CHOICE.length);
      };

      const allAnswered = selected.every(s => s !== null);

      return (
        <div className="space-y-6 fade-in">
          {MULTIPLE_CHOICE.map((q, qi) => (
            <div key={qi} className="space-y-3">
              <p className="font-medium text-gray-800 text-sm">{qi + 1}. {q.question}</p>
              <div className="space-y-2">
                {shuffledOptions[qi].shuffled.map((origIdx, oi) => {
                  const isSelected = selected[qi] === oi;
                  const isCorrect = oi === shuffledOptions[qi].correctIndex;
                  let cls = 'answer-option rounded-lg p-3 flex items-center gap-3';
                  if (showFeedback) {
                    cls += ' opt-disabled';
                    if (isCorrect) cls += ' opt-correct';
                    else if (isSelected && !isCorrect) cls += ' opt-incorrect';
                  } else if (isSelected) {
                    cls += ' opt-selected';
                  }
                  return (
                    <div key={oi} className={cls}
                      onClick={() => !showFeedback && setSelected(s => { const n = [...s]; n[qi] = oi; return n; })}>
                      <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0
                        ${showFeedback && isCorrect ? 'border-green-500 bg-green-500' :
                          showFeedback && isSelected && !isCorrect ? 'border-red-500 bg-red-500' :
                          isSelected ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}`}>
                        {showFeedback && isCorrect && <span className="text-white text-xs">✓</span>}
                        {showFeedback && isSelected && !isCorrect && <span className="text-white text-xs">✗</span>}
                        {!showFeedback && isSelected && <div className="w-2 h-2 bg-white rounded-full" />}
                      </div>
                      <span className="text-sm font-light text-gray-700">{q.options[origIdx]}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {!showFeedback && (
            <button onClick={check} disabled={!allAnswered}
              className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
              Athuga svör
            </button>
          )}
          {showFeedback && (
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center fade-in">
              <p className="text-blue-800 font-light text-sm">
                {selected.reduce((s, sel, i) => s + (sel === shuffledOptions[i].correctIndex ? 1 : 0), 0)} af {MULTIPLE_CHOICE.length} rétt!
              </p>
            </div>
          )}
        </div>
      );
    };

    // ── Stuttar spurningar ──────────────────────────────────────────────────

    const StuttarTab = ({ onComplete }) => {
      const [answers, setAnswers] = useState(Array(SHORT_QUESTIONS.length).fill(''));
      const [feedback, setFeedback] = useState(Array(SHORT_QUESTIONS.length).fill(null));
      const [loading, setLoading] = useState(Array(SHORT_QUESTIONS.length).fill(false));

      useEffect(() => {
        if (feedback.every(f => f !== null)) onComplete(true);
      }, [feedback]);

      const checkAnswer = async (i) => {
        const ans = answers[i].trim();
        if (!ans) return;
        const newLoading = [...loading]; newLoading[i] = true; setLoading(newLoading);

        try {
          const result = await callOpenAI([
            {
              role: 'system',
              content: `Þú ert íslenskukennari á A1-A2 stigi. Mettu svar nemandans við spurningunni.

SPURNING: "${SHORT_QUESTIONS[i].question}"
RÉTT SVAR BYGGIST Á: ${SHORT_QUESTIONS[i].expectedContent}
SVAR NEMANDA: "${ans}"

Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]

Vertu sveigjanleg/ur með stafsetningu og málfræði. Ef efnislega rétt, gefðu há stig.`
            }
          ], 120, 'gpt-4o-mini', 0.2);

          const stigMatch = result.match(/STIG:\s*(\d)/);
          const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
          const score = stigMatch ? parseInt(stigMatch[1]) : 0;
          const msg = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();

          const newFeedback = [...feedback];
          newFeedback[i] = { score, msg };
          setFeedback(newFeedback);
        } catch (e) {
          console.error(e);
        }
        const newLoading2 = [...loading]; newLoading2[i] = false; setLoading(newLoading2);
      };

      return (
        <div className="space-y-6 fade-in">
          <p className="text-gray-600 font-light text-sm">Svaraðu með þínum eigin orðum (1–2 setningar).</p>
          {SHORT_QUESTIONS.map((q, i) => (
            <div key={i} className="border-2 border-gray-100 rounded-lg p-5">
              <p className="font-medium text-gray-800 text-sm mb-3">{i + 1}. {q.question}</p>
              {!feedback[i] ? (
                <div>
                  <textarea value={answers[i]}
                    onChange={e => { const n = [...answers]; n[i] = e.target.value; setAnswers(n); }}
                    placeholder="Skrifaðu svarið þitt hér..."
                    rows={2}
                    className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                      focus:outline-none focus:border-blue-400 font-light resize-none text-sm" />
                  <button onClick={() => checkAnswer(i)}
                    disabled={!answers[i].trim() || loading[i]}
                    className="mt-2 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                      disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                    {loading[i] ? 'Athuga...' : 'Athuga svar'}
                  </button>
                </div>
              ) : (
                <div>
                  <p className="text-sm text-gray-600 font-light italic mb-2">„{answers[i]}"</p>
                  <FeedbackBadge score={feedback[i].score} message={feedback[i].msg} />
                  <button onClick={() => {
                    const nf = [...feedback]; nf[i] = null; setFeedback(nf);
                    const na = [...answers]; na[i] = ''; setAnswers(na);
                  }} className="mt-3 px-4 py-2 rounded-lg border-2 border-gray-200 hover:bg-gray-50 font-light text-xs">
                    Reyna aftur
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    };

    // ── Umræða ──────────────────────────────────────────────────────────────

    const MAX_EXCHANGES = 4;

    const UmraedaSpurning = ({ question, index, onDone }) => {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [exchangeCount, setExchangeCount] = useState(0);
      const [ended, setEnded] = useState(false);
      const [showContinue, setShowContinue] = useState(false);
      const chatRef = useRef(null);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [messages, showContinue]);

      const send = async () => {
        const text = input.trim();
        if (!text || loading || ended) return;
        const newMessages = [...messages, { role: 'user', content: text }];
        setMessages(newMessages);
        setInput('');
        setLoading(true);

        const newCount = exchangeCount + 1;
        setExchangeCount(newCount);
        const isLastExchange = newCount >= MAX_EXCHANGES;

        try {
          const systemPrompt = `Þú ert vingjarnlegur íslenskukennari á A1-A2 stigi. Nemandinn er að lesa texta um björgunarsveitir á Íslandi.

TEXTINN SEM NEMANDINN LAS:
"${READING_TEXT}"

UPPRUNALEGA SPURNINGIN:
"${question}"

${isLastExchange ? 'MIKILVÆGT: Þetta er SÍÐASTA svar þitt í þessu spjalli. EKKI spyrja fleiri spurninga.' : ''}

VERKEFNI:
${isLastExchange ? `1. Gefðu hvetjandi og jákvæða endurgjöf á svari nemandans
2. Commentaðu á efnið – hvað finnst þér áhugavert?
3. Lokaðu með: "Frábært! Gott spjall."
4. EKKI spyrja fleiri spurninga` :
`1. Lestu svar nemandans og commentaðu á efnið – hvað er áhugavert?
2. Gefðu hvetjandi, jákvæða endurgjöf
3. Spyrðu einfalda follow-up spurningu sem tengist svari nemandans`}

REGLUR:
- Vertu ALLTAF jákvæður og hvetjandi
- Haltu því stuttu (2-4 setningar)
- Notaðu einfalda íslensku (A1-A2 stig)
- Notaðu bara íslensku
- ALDREI gefa einkunn
${isLastExchange ? '- EKKI spyrja fleiri spurninga' : '- Spyrðu follow-up spurningu'}

SVARAÐU ALLTAF MEÐ JSON (EKKERT ANNAÐ – BARA HREIN JSON):
{
  "grammar": "Málfarsendurgjöf BARA ef það eru GRÓFAR villur. Vertu mjög mild (1 setning). Ef ekkert athugavert: null",
  "response": "Aðal svarið þitt hér"
}

ALDREI nota markdown eða \`\`\`json\`\`\` – BARA hrein JSON!`;

          const history = newMessages
            .filter(m => m.role === 'user' || m.role === 'assistant')
            .map(m => ({
              role: m.role,
              content: m.role === 'assistant' ? m.content : m.content
            }));

          const result = await callOpenAI(
            [{ role: 'system', content: systemPrompt }, ...history],
            300, 'gpt-4o', 0.7
          );

          let cleanResult = result.trim()
            .replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
          const jsonStart = cleanResult.indexOf('{');
          if (jsonStart > 0) cleanResult = cleanResult.substring(jsonStart);

          let parsed;
          try {
            parsed = JSON.parse(cleanResult);
          } catch (e) {
            console.error('JSON parse villa:', e, 'Svar:', cleanResult);
            parsed = { grammar: null, response: cleanResult || 'Frábært! Þú svarar mjög vel.' };
          }

          const assistantMessages = [];
          if (parsed.grammar) {
            assistantMessages.push({ role: 'grammar', content: parsed.grammar });
          }
          assistantMessages.push({ role: 'assistant', content: parsed.response });

          setMessages([...newMessages, ...assistantMessages]);

          if (isLastExchange) {
            setShowContinue(true);
          }
        } catch (e) {
          console.error(e);
          setMessages([...newMessages, { role: 'assistant', content: 'Villa kom upp. Reyndu aftur.' }]);
        }
        setLoading(false);
      };

      const handleContinue = () => {
        setShowContinue(false);
        setExchangeCount(prev => prev - 1);
      };

      const handleEnd = () => {
        setEnded(true);
        setShowContinue(false);
        onDone();
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="bg-blue-50 px-4 py-3 border-b border-blue-100">
            <p className="font-medium text-blue-800 text-sm">{index + 1}. {question}</p>
          </div>

          <div ref={chatRef} className="chat-scroll p-4 space-y-3" style={{ minHeight: 120, maxHeight: 400, overflowY: 'auto' }}>
            {messages.map((m, i) => (
              m.role === 'grammar' ? (
                <div key={i} className="flex justify-start fade-in">
                  <div className="max-w-xs px-3 py-2 rounded-xl text-xs font-light
                    bg-yellow-50 text-yellow-800 border border-yellow-200 italic">
                    💡 {m.content}
                  </div>
                </div>
              ) : (
                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                  <div className={`max-w-xs px-4 py-2 rounded-xl text-sm font-light
                    ${m.role === 'user'
                      ? 'bg-blue-100 text-blue-900'
                      : 'bg-gray-100 text-gray-800'}`}>
                    {m.content}
                  </div>
                </div>
              )
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-gray-100 text-gray-500 px-4 py-2 rounded-xl text-sm font-light animate-pulse">
                  Kennarinn skrifar...
                </div>
              </div>
            )}
            {showContinue && (
              <div className="flex flex-col items-center gap-2 pt-2 fade-in">
                <p className="text-xs text-gray-500 font-light">Viltu spjalla meira eða segja þetta gott?</p>
                <div className="flex gap-2">
                  <button onClick={handleContinue}
                    className="px-4 py-2 border-2 border-blue-200 text-blue-600 rounded-lg
                      hover:bg-blue-50 transition-colors font-light text-xs">
                    Spjalla meira
                  </button>
                  <button onClick={handleEnd}
                    className="px-4 py-2 bg-blue-600 text-white rounded-lg
                      hover:bg-blue-700 transition-colors font-light text-xs">
                    Þetta er gott ✓
                  </button>
                </div>
              </div>
            )}
            {ended && (
              <div className="text-center pt-2 fade-in">
                <p className="text-green-700 text-xs font-light">✓ Umræðu lokið</p>
              </div>
            )}
          </div>

          {!ended && !showContinue && (
            <div className="border-t border-gray-100 p-3 flex gap-2">
              <input value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && !e.shiftKey && send()}
                placeholder="Skrifaðu svarið þitt..."
                disabled={loading}
                className="flex-1 px-4 py-2 border-2 border-gray-200 rounded-lg
                  focus:outline-none focus:border-blue-400 font-light text-sm
                  disabled:bg-gray-50" />
              <button onClick={send} disabled={!input.trim() || loading}
                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                  disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                Senda
              </button>
            </div>
          )}
        </div>
      );
    };

    const UmraedaTab = ({ onComplete }) => {
      const [done, setDone] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));

      useEffect(() => {
        if (done.every(d => d)) onComplete(true);
      }, [done]);

      const markDone = (i) => {
        const n = [...done]; n[i] = true; setDone(n);
      };

      return (
        <div className="space-y-4 fade-in">
          <p className="text-gray-600 font-light text-sm">Spjallaðu við AI-kennarann um textann. Svaraðu á íslensku.</p>
          {DISCUSSION_QUESTIONS.map((q, i) => (
            <UmraedaSpurning key={i} question={q} index={i} onDone={() => markDone(i)} />
          ))}
        </div>
      );
    };

    // ── App ─────────────────────────────────────────────────────────────────

    const App = () => {
      const [activeTab, setActiveTab] = useState('krossar');
      const [showText, setShowText] = useState(true);
      const [tabDone, setTabDone] = useState({ krossar: false, stuttar: false, umraeda: false });
      const progressWritten = React.useRef(false);
      useEffect(() => {
        window.writeProgress && window.writeProgress('lestextar_bjorgunarsveitir', 'opened');
      }, []);
      useEffect(() => {
        const exerciseDone = tabDone.krossar && tabDone.stuttar;
        if (exerciseDone && !progressWritten.current) {
          progressWritten.current = true;
          window.writeProgress && window.writeProgress('lestextar_bjorgunarsveitir', 'completed');
        }
      }, [tabDone]);

      const markTabDone = (tabId) => {
        setTabDone(prev => ({ ...prev, [tabId]: true }));
      };

      const doneCount = Object.values(tabDone).filter(Boolean).length;

      return (
        <div>
          {/* Header */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">📖 Björgunarsveitir á Íslandi</h1>
              <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">
            {/* Leiðbeiningabox */}
            <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4">
              <ul className="space-y-1 text-gray-700 font-light text-sm">
                <li>📖 Lestu textann hægt og rólega</li>
                <li>✏️ Svaraðu krossaspurningunum</li>
                <li>📝 Svaraðu stuttum spurningum með heilum setningum</li>
                <li>💬 Ræddu spurningarnar með AI</li>
              </ul>
            </div>

            {/* Texti */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100">
              <button onClick={() => setShowText(!showText)}
                className="w-full px-6 py-4 flex items-center justify-between text-left">
                <h2 className="text-lg font-medium text-gray-800">📖 Textinn</h2>
                <span className="text-gray-400 text-sm font-light">{showText ? '▲ Fela' : '▼ Sýna'}</span>
              </button>
              {showText && (
                <div className="px-6 pb-6 fade-in">
                  <div className="bg-gray-50 rounded-lg p-5 text-gray-700 font-light text-sm leading-relaxed whitespace-pre-line">
                    {READING_TEXT}
                  </div>
                </div>
              )}
            </div>

            {/* Flipar */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="flex border-b border-gray-200">
                {TABS.map(tab => (
                  <button key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 px-3 py-3 text-sm font-light transition-all tab-btn
                      ${activeTab === tab.id ? 'active' : 'text-gray-500'}`}>
                    {tabDone[tab.id] ? '✓ ' : `${tab.icon} `}{tab.label}
                  </button>
                ))}
              </div>

              <div className="p-6">
                {activeTab === 'krossar' && <KrossaTab onComplete={() => markTabDone('krossar')} />}
                {activeTab === 'stuttar' && <StuttarTab onComplete={() => markTabDone('stuttar')} />}
                {activeTab === 'umraeda' && <UmraedaTab onComplete={() => markTabDone('umraeda')} />}
              </div>
            </div>

            {/* Lokakassi */}
            {doneCount === TABS.length && (
              <div className="bg-blue-50 border border-blue-200 rounded-xl p-6 text-center fade-in">
                <div className="text-4xl mb-3">🎉</div>
                <h3 className="text-xl font-light text-blue-800 mb-2">Vel gert!</h3>
                <p className="text-blue-700 font-light text-sm">Þú hefur lokið öllum verkefnum.</p>
              </div>
            )}
          </main>

          {/* Framvindusika */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
              {TABS.map(tab => (
                <button key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex-1 py-2 rounded-lg text-sm font-light transition-colors
                    ${tabDone[tab.id]
                      ? 'bg-blue-600 text-white'
                      : activeTab === tab.id
                        ? 'bg-blue-100 text-blue-700'
                        : 'bg-gray-100 text-gray-500'}`}>
                  {tabDone[tab.id] ? '✓ ' : ''}{tab.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
