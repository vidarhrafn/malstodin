<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎧 Hlustun 1: Áhugamál hjá okkur – A1-A2</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .tab-btn {
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }
    .tab-btn:hover:not(.tab-active) {
      background: #f3f4f6;
    }
    .tab-active {
      border-bottom: 3px solid #3b82f6;
      color: #2563eb;
      background: white;
    }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) {
      border-color: #93c5fd;
      background: #eff6ff;
    }
    .opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .opt-correct   { border-color: #22c55e; background: #f0fdf4; }
    .opt-incorrect { border-color: #ef4444; background: #fef2f2; }
    .opt-disabled  { cursor: default; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // ── Gögn ────────────────────────────────────────────────────────────────

    const VOCAB = [
      { w: 'markvörður (kk)', hint: 'maður sem verndar markið í fótbolta' },
      { w: 'vöðvi (kk)',      hint: 'hluti líkamans sem hjálpar þér að hreyfa þig' },
      { w: 'lúðrasveit (kvk)',hint: 'hópur af fólki sem spilar á blásturshljóðfæri saman' },
      { w: 'þjálfari (kk)',   hint: 'maður sem hjálpar þér að verða betri í íþrótt' },
      { w: 'einbeita sig',    hint: 'að hugsa aðeins um eitt' },
      { w: 'stressa sig',     hint: 'að vera kvíðinn eða ótryggur' },
    ];

    const TRANSLATION_WORDS = [
      { word: 'markvörður', label: 'markvörður (kk)' },
      { word: 'vöðvi',      label: 'vöðvi (kk)' },
    ];

    const TRUE_FALSE = [
      { s: 'Hólmfríður vill fara í ræktina til að hlaupa á hlaupabretti.', correct: false },
      { s: 'Þjálfarinn sagði Hólmfríði að lyfta lóðum.',                   correct: true  },
      { s: 'Hólmfríður er eini markvörðurinn í liðinu.',                   correct: true  },
      { s: 'Hólmfríður hlustar á Björk til að róa sig.',                   correct: false },
      { s: 'Leikurinn og tónleikarnir eru á sama degi.',                   correct: false },
    ];

    const MC = [
      {
        q: 'Hvenær fer Alex í ræktina?',
        opts: ['Klukkan sjö', 'Klukkan hálf átta', 'Klukkan átta', 'Klukkan hálf sjö'],
        correct: 1,
      },
      {
        q: 'Hvers vegna vill Hólmfríður lyfta lóðum?',
        opts: [
          'Hún vill líta vel út',
          'Alex bað hana um það',
          'Þjálfarinn sagði að markvörður þurfi sterka vöðva',
          'Hún er að æfa fyrir líkamsræktarkeppni',
        ],
        correct: 2,
      },
      {
        q: 'Hvað gerir Hólmfríður til að róa sig fyrir leik?',
        opts: ['Hún fer í sund', 'Hún hlustar á tónlist', 'Hún les bók', 'Hún fer snemma að sofa'],
        correct: 1,
      },
      {
        q: 'Hvenær eru tónleikarnir með lúðrasveitinni?',
        opts: ['Á laugardag', 'Á föstudeg', 'Á sunnudag', 'Á mánudag'],
        correct: 2,
      },
    ];

    const SHORT_QS = [
      {
        q: 'Af hverju vill Hólmfríður koma með Alex í ræktina?',
        keywords: ['þjálfari', 'lyfta', 'lóðum', 'markvörður', 'vöðva', 'sterka'],
      },
      {
        q: 'Hvaða tvö áhugamál stundar Hólmfríður?',
        keywords: ['fótbolti', 'tónlist', 'lúðrasveit', 'fótbolta'],
      },
      {
        q: 'Hvernig notar Hólmfríður tónlist?',
        keywords: ['róa', 'einbeita', 'laufey', 'tónlist'],
      },
    ];

    // ── OpenAI ───────────────────────────────────────────────────────────────

    function callOpenAI(messages, max_tokens, temperature) {
      return fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messages,
          max_tokens: max_tokens || 120,
          model: 'gpt-4o-mini',
          temperature: temperature || 0.2,
        }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          return data.content;
        });
    }

    // ── Endurnotanlegir íhlutir ───────────────────────────────────────────────

    const FeedbackBadge = function(props) {
      var score = props.score; var msg = props.msg; var correct = props.correct;
      var color = correct === null ? 'blue' : correct ? 'green' : 'amber';
      var cls = {
        blue:  'bg-blue-50 border-blue-200 text-blue-800',
        green: 'bg-green-50 border-green-200 text-green-800',
        amber: 'bg-amber-50 border-amber-200 text-amber-800',
      }[color];
      return (
        <div className={'mt-3 p-3 rounded-lg border fade-in ' + cls}>
          {score !== undefined && <div className="font-medium text-sm mb-1">Stig: {score}/5</div>}
          <p className="text-sm font-light">{msg}</p>
        </div>
      );
    };

    // ── Aðalforrit ───────────────────────────────────────────────────────────

    const HlustunAhugamal = function() {
      const audioRef = useRef(null);
      const [isPlaying, setIsPlaying]     = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [showLykilord, setShowLykilord] = useState(true);
      const [activeTab, setActiveTab]     = useState('thydingar');

      // Þýðingar
      const [transInputs, setTransInputs]     = useState({});
      const [transFeedback, setTransFeedback] = useState({});
      const [transLoading, setTransLoading]   = useState({});

      // Rétt/Rangt
      const [tfAnswers, setTfAnswers] = useState([]);
      const [tfChecked, setTfChecked] = useState(false);

      // Krossaspurningar
      const [mcAnswers, setMcAnswers] = useState([]);
      const [mcChecked, setMcChecked] = useState(false);

      // Stuttar spurningar
      const [shortAnswers,  setShortAnswers]  = useState(['', '', '']);
      const [shortFeedback, setShortFeedback] = useState([null, null, null]);
      const [shortLoading,  setShortLoading]  = useState([false, false, false]);

      // Texti læstur
      const [showText, setShowText] = useState(false);

      // ── Hljóð ──

      useEffect(function() {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate]);

      function togglePlay() {
        if (!audioRef.current) return;
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play();
      }

      // ── Lokið? ──

      var isTransDone = TRANSLATION_WORDS.length > 0 &&
        TRANSLATION_WORDS.every(function(_, i) { return transFeedback[i] !== undefined; });
      var isTFDone    = tfChecked;
      var isMCDone    = mcChecked;
      var isShortDone = shortFeedback.every(function(f) { return f !== null; });
      var allDone     = isTransDone && isTFDone && isMCDone && isShortDone;

      // ── Þýðingar ──

      function checkTranslation(i) {
        var ans = (transInputs[i] || '').trim();
        if (!ans) return;
        setTransLoading(function(prev) { var n = Object.assign({}, prev); n[i] = true; return n; });
        callOpenAI([{
          role: 'user',
          content: 'Nemandi á íslenskuskeið þýddi íslenska orðið "' + TRANSLATION_WORDS[i].word +
            '" og skrifaði: "' + ans + '". Er þetta rétt þýðing? ' +
            'Svaraðu EINUNGIS á þessu formi:\nSTIG: [0-5]\nENDURGJÖF: [ein stutt setning á íslensku]',
        }], 80, 0.2)
          .then(function(result) {
            var sm = result.match(/STIG:\s*(\d)/);
            var em = result.match(/ENDURGJÖF:\s*(.+)/);
            var score = sm ? parseInt(sm[1]) : 3;
            var msg   = em ? em[1].trim() : result.trim();
            setTransFeedback(function(prev) {
              var n = Object.assign({}, prev);
              n[i] = { score: score, msg: msg, correct: score >= 3 };
              return n;
            });
          })
          .catch(function() {
            setTransFeedback(function(prev) {
              var n = Object.assign({}, prev);
              n[i] = { score: 0, msg: 'Villa kom upp. Reyndu aftur.', correct: false };
              return n;
            });
          })
          .finally(function() {
            setTransLoading(function(prev) { var n = Object.assign({}, prev); n[i] = false; return n; });
          });
      }

      // ── Stuttar spurningar ──

      function checkShort(i) {
        var ans = shortAnswers[i].trim();
        if (!ans) return;
        var newLoading = shortLoading.slice();
        newLoading[i] = true;
        setShortLoading(newLoading);

        var HLUSTUN_TEXT = 'Hólmfríður: Alex, ertu að fara í ræktina?\nAlex: Já, klukkan hálf átta. Af hverju?\nHólmfríður: Má ég koma með? Þjálfarinn minn sagði að ég ætti að byrja að lyfta lóðum. Hann sagði að markverðir þurfi sterka vöðva.\nAlex: Já, það er rétt. Komdu með, ég get sýnt þér hvað á að gera.\nHólmfríður: Flott! Við erum líka að æfa mikið núna. Það er leikur á laugardaginn.\nAlex: Geggjað. Átt þú að vera í marki?\nHólmfríður: Já. Ég er eini markvörðurinn í liðinu.\nAlex: Ertu ekki stressuð fyrir leiki?\nHólmfríður: Smá. En ég hlusta á tónlist til að róa mig. Laufey er með svo fallega rödd.\nAlex: Laufey?\nHólmfríður: Já hún hjálpar mér að einbeita mér. Heyrðu, og svo er ég með tónleika á sunnudaginn með lúðrasveitinni.\nAlex: Brjálað að gera! Bæði leikur og tónleikar sömu helgina?\nHólmfríður: Já, en sem betur fer er það sitt hvorn daginn.\nAlex: Þú ert alltaf að gera eitthvað.\nHólmfríður: Já. Þess vegna þarf ég sterka vöðva. Komdu. Drífum okkur í ræktina!';

        callOpenAI([{
          role: 'user',
          content: 'Nemandi á A1-A2 íslenskuskeið hlaustaði á þennan texta:\n\n' + HLUSTUN_TEXT +
            '\n\nSpurning: ' + SHORT_QS[i].q +
            '\nSvar nemanda: "' + ans + '"' +
            '\n\nMetur svarið. Svaraðu EINUNGIS:\nSTIG: [0-5]\nENDURGJÖF: [ein hvetjandi setning á einfaldri íslensku]',
        }], 100, 0.2)
          .then(function(result) {
            var sm = result.match(/STIG:\s*(\d)/);
            var em = result.match(/ENDURGJÖF:\s*(.+)/);
            var score = sm ? parseInt(sm[1]) : 3;
            var msg   = em ? em[1].trim() : result.trim();
            var newFb = shortFeedback.slice();
            newFb[i]  = { score: score, msg: msg, correct: score >= 3 };
            setShortFeedback(newFb);
          })
          .catch(function() {
            var newFb = shortFeedback.slice();
            newFb[i]  = { score: 0, msg: 'Villa. Reyndu aftur.', correct: false };
            setShortFeedback(newFb);
          })
          .finally(function() {
            var newL = shortLoading.slice();
            newL[i]  = false;
            setShortLoading(newL);
          });
      }

      // ── TABS ──

      var TABS = [
        { id: 'thydingar', label: 'Þýðingar',        icon: '🔵', done: isTransDone },
        { id: 'tf',        label: 'Rétt/Rangt',       icon: '✅', done: isTFDone    },
        { id: 'krossar',   label: 'Krossaspurningar', icon: '🔵', done: isMCDone    },
        { id: 'stuttar',   label: 'Stuttar spurningar',icon: '📝', done: isShortDone },
      ];

      // ── RENDER ────────────────────────────────────────────────────────────

      return (
        <div className="min-h-screen pb-16">

          {/* ── Header ── */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={function() { window.history.back(); }}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <div className="flex items-start justify-between">
                <div>
                  <h1 className="text-3xl font-light text-gray-800 mb-1">
                    🎧 Hlustun 1: Áhugamál
                  </h1>
                  <p className="text-gray-500 text-sm font-light">
                    Hlustunarverkefni · A1–A2
                  </p>
                </div>
                <div className="flex gap-2 flex-wrap justify-end mt-1">
                  <span className="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700 font-light">Alex</span>
                  <span className="text-xs px-2 py-1 rounded-full bg-purple-100 text-purple-700 font-light">Hólmfríður</span>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4">

            {/* ── Leiðbeiningar ── */}
            <div className="bg-green-50 border border-green-200 rounded-xl p-4 border-l-4 border-l-green-500">
              <ul className="text-sm text-green-800 font-light space-y-1">
                <li>🎧 Hlustaðu á samtalið 2–3 sinnum</li>
                <li>📖 Lestu lykilorðin hér að neðan fyrst</li>
                <li>✏️ Svaraðu öllum fjórum flokkum spurninga</li>
                <li>🔓 Þegar allt er lokið opnast textinn</li>
              </ul>
            </div>

            {/* ── Lykilorð ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100">
              <button
                onClick={function() { setShowLykilord(!showLykilord); }}
                className="w-full flex items-center justify-between px-5 py-4 text-left">
                <span className="font-light text-gray-700">📘 Lykilorð</span>
                <span className="text-gray-400 text-sm">{showLykilord ? '▲ Fela' : '▼ Sýna'}</span>
              </button>
              {showLykilord && (
                <div className="px-5 pb-5 fade-in">
                  <p className="text-xs text-gray-500 font-light mb-3">Lestu yfir þessi orð áður en þú hlustar.</p>
                  <div className="grid md:grid-cols-2 gap-2">
                    {VOCAB.map(function(it, i) {
                      return (
                        <div key={i} className="rounded-lg border border-yellow-200 bg-yellow-50 p-3">
                          <div className="font-medium text-gray-900 text-sm">{it.w}</div>
                          <div className="text-xs text-gray-600 font-light mt-0.5">{it.hint}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>

            {/* ── Sticky hljóðspilari ── */}
            <div className="sticky-player rounded-xl overflow-hidden">
              <div className="bg-gradient-to-r from-green-50 to-green-100 border border-green-200 px-5 py-4">
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay}
                    className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm"
                    aria-label={isPlaying ? 'Pása' : 'Spila'}>
                    {isPlaying
                      ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                      : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    }
                  </button>
                  <div className="flex-1">
                    <p className="text-sm font-light text-gray-700 mb-1">🎧 Hlusta á samtalið</p>
                    <audio ref={audioRef} src="media/hlustun1_ahugamal.mp3" preload="none"
                      onEnded={function() { setIsPlaying(false); }}
                      onPlay={function()  { setIsPlaying(true);  }}
                      onPause={function() { setIsPlaying(false); }} />
                  </div>
                  <div className="flex gap-1.5">
                    {[0.75, 1, 1.25].map(function(rate) {
                      return (
                        <button key={rate} onClick={function() { setPlaybackRate(rate); }}
                          className={'px-2.5 py-1 rounded-md text-xs font-light transition-colors ' +
                            (playbackRate === rate ? 'bg-green-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200')}>
                          {rate}×
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>

            {/* ── Flipar ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

              {/* Tab navigation */}
              <div className="flex border-b border-gray-200 overflow-x-auto">
                {TABS.map(function(tab) {
                  return (
                    <button key={tab.id}
                      onClick={function() { setActiveTab(tab.id); }}
                      className={'tab-btn flex-1 min-w-0 px-3 py-3 text-xs font-light text-gray-600 flex items-center justify-center gap-1.5 whitespace-nowrap ' +
                        (activeTab === tab.id ? 'tab-active' : '')}>
                      <span>{tab.icon}</span>
                      <span className="hidden sm:inline">{tab.label}</span>
                      {tab.done && <span className="text-green-500">✓</span>}
                    </button>
                  );
                })}
              </div>

              {/* ── Tab: Þýðingar ── */}
              {activeTab === 'thydingar' && (
                <div className="p-6 fade-in">
                  <h2 className="text-lg font-light text-gray-800 mb-1">🔵 Þýðing</h2>
                  <p className="text-sm text-gray-500 font-light mb-5">Hvað þýða þessi orð á þínu móðurmáli?</p>
                  <div className="space-y-6">
                    {TRANSLATION_WORDS.map(function(item, i) {
                      return (
                        <div key={i} className="border border-gray-100 rounded-lg p-4 bg-gray-50">
                          <p className="text-sm font-light text-gray-700 mb-3">
                            Hvað þýðir <strong className="text-gray-900">{item.label}</strong> á þínu móðurmáli?
                          </p>
                          {!transFeedback[i] ? (
                            <div className="flex gap-2">
                              <input
                                type="text"
                                value={transInputs[i] || ''}
                                onChange={function(e) {
                                  setTransInputs(function(prev) {
                                    var n = Object.assign({}, prev);
                                    n[i] = e.target.value;
                                    return n;
                                  });
                                }}
                                onKeyDown={function(e) { if (e.key === 'Enter') checkTranslation(i); }}
                                placeholder={'Þýðing á ' + item.word + '...'}
                                disabled={transLoading[i]}
                                className="flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light text-sm disabled:bg-gray-50"
                              />
                              <button onClick={function() { checkTranslation(i); }}
                                disabled={transLoading[i] || !(transInputs[i] && transInputs[i].trim())}
                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                                {transLoading[i] ? '...' : 'Athuga'}
                              </button>
                            </div>
                          ) : (
                            <div>
                              <FeedbackBadge
                                score={transFeedback[i].score}
                                msg={transFeedback[i].msg}
                                correct={transFeedback[i].correct} />
                              <button onClick={function() {
                                  setTransFeedback(function(prev) {
                                    var n = Object.assign({}, prev);
                                    delete n[i];
                                    return n;
                                  });
                                  setTransInputs(function(prev) {
                                    var n = Object.assign({}, prev);
                                    n[i] = '';
                                    return n;
                                  });
                                }}
                                className="mt-2 text-xs text-gray-400 hover:text-gray-600 font-light underline">
                                Reyna aftur
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  {isTransDone && (
                    <div className="mt-4 text-center">
                      <button onClick={function() { setActiveTab('tf'); }}
                        className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                        Áfram í Rétt/Rangt →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* ── Tab: Rétt/Rangt ── */}
              {activeTab === 'tf' && (
                <div className="p-6 fade-in">
                  <h2 className="text-lg font-light text-gray-800 mb-1">✅ Rétt eða rangt?</h2>
                  <p className="text-sm text-gray-500 font-light mb-5">Merktu við rétt eða rangt fyrir hverja fullyrðingu.</p>
                  <div className="space-y-3">
                    {TRUE_FALSE.map(function(item, i) {
                      return (
                        <div key={i} className="border border-gray-200 rounded-lg p-4">
                          <p className="text-sm font-light text-gray-800 mb-3">{i + 1}. {item.s}</p>
                          <div className="flex gap-3">
                            {[true, false].map(function(val) {
                              var isSel     = tfAnswers[i] === val;
                              var isCorrect = val === item.correct;
                              var showOk    = tfChecked && isCorrect;
                              var showBad   = tfChecked && isSel && !isCorrect;
                              return (
                                <div key={val ? 'r' : 'w'}
                                  onClick={function() {
                                    if (tfChecked) return;
                                    var n = tfAnswers.slice();
                                    n[i] = val;
                                    setTfAnswers(n);
                                  }}
                                  className={'answer-option flex-1 px-4 py-2 rounded-lg text-sm text-center ' +
                                    (showOk ? 'opt-correct' : showBad ? 'opt-incorrect' : isSel && !tfChecked ? 'opt-selected' : '') +
                                    (tfChecked ? ' opt-disabled' : '')}>
                                  {val ? 'Rétt' : 'Rangt'}
                                  {showOk  && ' ✓'}
                                  {showBad && ' ✗'}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {!tfChecked ? (
                    <div className="mt-5 flex gap-3">
                      <button onClick={function() { setTfChecked(true); }}
                        disabled={tfAnswers.length < TRUE_FALSE.length}
                        className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                        Athuga svör
                      </button>
                      <button onClick={function() { setTfAnswers([]); setTfChecked(false); }}
                        className="px-5 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    </div>
                  ) : (
                    <div className="mt-4 bg-green-50 border border-green-200 rounded-lg p-4 fade-in">
                      <p className="text-green-800 font-light text-sm">
                        ✓ Þú fékkst {tfAnswers.filter(function(a, i) { return a === TRUE_FALSE[i].correct; }).length} af {TRUE_FALSE.length} rétt!
                      </p>
                      <div className="flex gap-3 mt-3">
                        <button onClick={function() { setTfAnswers([]); setTfChecked(false); }}
                          className="text-xs text-gray-500 hover:text-gray-700 font-light underline">
                          Reyna aftur
                        </button>
                        <button onClick={function() { setActiveTab('krossar'); }}
                          className="px-4 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                          Áfram í Krossaspurningar →
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ── Tab: Krossaspurningar ── */}
              {activeTab === 'krossar' && (
                <div className="p-6 fade-in">
                  <h2 className="text-lg font-light text-gray-800 mb-1">🔵 Krossaspurningar</h2>
                  <p className="text-sm text-gray-500 font-light mb-5">Merktu við eitt svar (A–D).</p>
                  <div className="space-y-5">
                    {MC.map(function(q, qi) {
                      return (
                        <div key={qi} className="border border-gray-200 rounded-lg p-4 bg-blue-50">
                          <p className="font-light text-gray-800 text-sm mb-3">{qi + 1}. {q.q}</p>
                          <div className="space-y-2">
                            {q.opts.map(function(opt, oi) {
                              var isSel  = mcAnswers[qi] === oi;
                              var isOk   = oi === q.correct;
                              var showOk = mcChecked && isOk;
                              var showBad= mcChecked && isSel && !isOk;
                              return (
                                <div key={oi}
                                  onClick={function() {
                                    if (mcChecked) return;
                                    var n = mcAnswers.slice();
                                    n[qi] = oi;
                                    setMcAnswers(n);
                                  }}
                                  className={'answer-option rounded-lg p-3 text-sm flex items-center gap-2 ' +
                                    (showOk ? 'opt-correct' : showBad ? 'opt-incorrect' : isSel && !mcChecked ? 'opt-selected' : '') +
                                    (mcChecked ? ' opt-disabled' : '')}>
                                  <span className="font-medium w-5 text-gray-500 flex-shrink-0">{String.fromCharCode(65 + oi)}.</span>
                                  <span className="font-light">{opt}</span>
                                  {showOk  && <span className="ml-auto text-green-600">✓</span>}
                                  {showBad && <span className="ml-auto text-red-500">✗</span>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {!mcChecked ? (
                    <div className="mt-5 flex gap-3">
                      <button onClick={function() { setMcChecked(true); }}
                        disabled={mcAnswers.length < MC.length}
                        className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                        Athuga svör
                      </button>
                      <button onClick={function() { setMcAnswers([]); setMcChecked(false); }}
                        className="px-5 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    </div>
                  ) : (
                    <div className="mt-4 bg-green-50 border border-green-200 rounded-lg p-4 fade-in">
                      <p className="text-green-800 font-light text-sm">
                        ✓ Þú fékkst {mcAnswers.filter(function(a, i) { return a === MC[i].correct; }).length} af {MC.length} rétt!
                      </p>
                      <div className="flex gap-3 mt-3">
                        <button onClick={function() { setMcAnswers([]); setMcChecked(false); }}
                          className="text-xs text-gray-500 hover:text-gray-700 font-light underline">
                          Reyna aftur
                        </button>
                        <button onClick={function() { setActiveTab('stuttar'); }}
                          className="px-4 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                          Áfram í Stuttar spurningar →
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ── Tab: Stuttar spurningar ── */}
              {activeTab === 'stuttar' && (
                <div className="p-6 fade-in">
                  <h2 className="text-lg font-light text-gray-800 mb-1">📝 Stuttar spurningar</h2>
                  <p className="text-sm text-gray-500 font-light mb-5">Svaraðu með heilum setningum.</p>
                  <div className="space-y-5">
                    {SHORT_QS.map(function(q, i) {
                      return (
                        <div key={i} className="border border-gray-200 rounded-lg p-4">
                          <p className="font-light text-gray-800 text-sm mb-3">{i + 1}. {q.q}</p>
                          {!shortFeedback[i] ? (
                            <div className="space-y-2">
                              <textarea
                                value={shortAnswers[i]}
                                onChange={function(e) {
                                  var n = shortAnswers.slice();
                                  n[i] = e.target.value;
                                  setShortAnswers(n);
                                }}
                                rows="2"
                                placeholder="Skrifaðu svarið þitt hér..."
                                disabled={shortLoading[i]}
                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50"
                              />
                              <button onClick={function() { checkShort(i); }}
                                disabled={shortLoading[i] || !shortAnswers[i].trim()}
                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                                {shortLoading[i] ? 'Athuga...' : 'Athuga svar'}
                              </button>
                            </div>
                          ) : (
                            <div>
                              <FeedbackBadge
                                score={shortFeedback[i].score}
                                msg={shortFeedback[i].msg}
                                correct={shortFeedback[i].correct} />
                              <button onClick={function() {
                                  var nf = shortFeedback.slice(); nf[i] = null; setShortFeedback(nf);
                                  var na = shortAnswers.slice(); na[i] = ''; setShortAnswers(na);
                                }}
                                className="mt-2 text-xs text-gray-400 hover:text-gray-600 font-light underline">
                                Reyna aftur
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

            </div>

            {/* ── Framvindustika ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <p className="text-xs text-gray-500 font-light mb-3">Framvinda</p>
              <div className="grid grid-cols-4 gap-2">
                {[
                  { label: 'Þýðingar', done: isTransDone, tab: 'thydingar' },
                  { label: 'Rétt/Rangt', done: isTFDone, tab: 'tf' },
                  { label: 'Krossar', done: isMCDone, tab: 'krossar' },
                  { label: 'Stuttar', done: isShortDone, tab: 'stuttar' },
                ].map(function(item) {
                  return (
                    <button key={item.tab}
                      onClick={function() { setActiveTab(item.tab); }}
                      className={'rounded-lg py-2 px-2 text-center text-xs font-light transition-colors border ' +
                        (item.done
                          ? 'bg-green-50 border-green-200 text-green-700'
                          : 'bg-gray-50 border-gray-200 text-gray-500 hover:bg-gray-100')}>
                      {item.done ? '✓ ' : ''}{item.label}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* ── Texti læstur upp þegar allt er lokið ── */}
            {allDone && (
              <div className="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-xl p-6 fade-in text-center">
                <div className="text-4xl mb-3">🎉</div>
                <h2 className="text-xl font-light text-gray-800 mb-2">Vel gert!</h2>
                <p className="text-gray-600 font-light text-sm mb-4">
                  Þú hefur lokið öllum verkefnum. Nú getur þú lesið samtalið.
                </p>
                <button onClick={function() { setShowText(!showText); }}
                  className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                  {showText ? '▲ Fela samtalið' : '📖 Lesa samtalið'}
                </button>
                {showText && (
                  <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                    <h3 className="font-light text-gray-700 mb-4 text-sm">💬 Áhugamál hjá okkur</h3>
                    {[
                      ['Hólmfríður', 'Alex, ertu að fara í ræktina?'],
                      ['Alex', 'Já, klukkan hálf átta. Af hverju?'],
                      ['Hólmfríður', 'Má ég koma með? Þjálfarinn minn sagði að ég ætti að byrja að lyfta lóðum. Hann sagði að markverðir þurfi sterka vöðva.'],
                      ['Alex', 'Já, það er rétt. Komdu með, ég get sýnt þér hvað á að gera.'],
                      ['Hólmfríður', 'Flott! Við erum líka að æfa mikið núna. Það er leikur á laugardaginn.'],
                      ['Alex', 'Geggjað. Átt þú að vera í marki?'],
                      ['Hólmfríður', 'Já. Ég er eini markvörðurinn í liðinu.'],
                      ['Alex', 'Ertu ekki stressuð fyrir leiki?'],
                      ['Hólmfríður', 'Smá. En ég hlusta á tónlist til að róa mig. Laufey er með svo fallega rödd.'],
                      ['Alex', 'Laufey?'],
                      ['Hólmfríður', 'Já hún hjálpar mér að einbeita mér. Heyrðu, og svo er ég með tónleika á sunnudaginn með lúðrasveitinni.'],
                      ['Alex', 'Brjálað að gera! Bæði leikur og tónleikar sömu helgina?'],
                      ['Hólmfríður', 'Já, en sem betur fer er það sitt hvorn daginn.'],
                      ['Alex', 'Þú ert alltaf að gera eitthvað.'],
                      ['Hólmfríður', 'Já. Þess vegna þarf ég sterka vöðva. Komdu. Drífum okkur í ræktina!'],
                    ].map(function(line, i) {
                      var isAlex = line[0] === 'Alex';
                      return (
                        <div key={i} className={'flex gap-2 mb-2 ' + (isAlex ? 'flex-row-reverse' : '')}>
                          <div className={'flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium ' +
                            (isAlex ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700')}>
                            {line[0][0]}
                          </div>
                          <div className={'max-w-xs px-3 py-2 rounded-xl text-sm font-light ' +
                            (isAlex ? 'bg-blue-50 text-gray-800' : 'bg-purple-50 text-gray-800')}>
                            <span className="block text-xs text-gray-400 mb-0.5">{line[0]}</span>
                            {line[1]}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HlustunAhugamal />);
  </script>
</body>
</html>
