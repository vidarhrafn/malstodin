<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Hlustun: Jól á Íslandi (2) – ÍSAT1ÍC</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(to bottom, #f8faf8 0%, #e1e8e1 100%); min-height: 100vh; }
    .sticky-player { position: sticky; top: 0; z-index: 50; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal-content { background: white; border-radius: 1rem; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o', temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    const LISTENING_TEXT = `Það er desember og jólafrí er að hefjast hjá fjölskyldunni í Álftamýri. Skólarnir eru lokaðir og Alex fær meiri vinnu í Hagkaup en venjulega. Hólmfríður er spennt og telur niður dagana til jóla.

Fjölskyldan fer saman að kaupa jólatré. Bao og Alex bera tréð inn og Hólmfríður setur skraut á það. „Stjarnan á toppnum er fallegust" segir hún.

Bryndís og Bao baka saman smákökur á laugardegi og hlusta á jólalög. Síðan þarf Bryndís að fara að vinna. Það er mikið að gera í kirkjunni um jólin. Hún þarf að halda messur og gera margt um hátíðirnar.

Á aðfangadagskvöld fer öll fjölskyldan ásamt pabba og mömmu Bryndísar í Háteigskirkju til að sjá Bryndísi halda jólamessu. Eftir messuna fara þau heim og borða jólamatinn saman. Fjölskyldan borðar hamborgarahrygg með brúnuðum kartöflum, rauðkáli og sósu. Eftir matinn opna þau gjafir undir jólatrénu. Alex fær nýja peysu, Klara fær bók um listasöfn í Evrópu og Hólmfríður fær flotta úlpu. „Þetta eru frábær jól!" segir Hólmfríður.`;

    const VOCAB = [
      { w: "jólafrí (hk.)", hint: "frí frá skóla og vinnu yfir jólin" },
      { w: "telja niður (so.)", hint: "telja dagana til þess að eitthvað gerist" },
      { w: "jólatré (hk.)", hint: "tré sem fólk skreytir heima á jólum" },
      { w: "skraut (hk.)", hint: "fallegar hlutir sem maður setur á tré eða vegg" },
      { w: "smákökur (kvk. ft.)", hint: "litlar kökur sem fólk bakar" },
      { w: "messa (kvk.)", hint: "guðsþjónusta í kirkju" },
      { w: "hátíð (kvk.)", hint: "sérstakur dagur eða tími sem fólk fagnar" },
      { w: "aðfangadagskvöld (hk.)", hint: "kvöldið 24. desember" },
      { w: "jólamessu (kvk.)", hint: "sérstök guðsþjónusta á jólum" },
      { w: "hamborgarahryggur (kk.)", hint: "svínakjöt sem margir borða á jólum" },
      { w: "brúnaðar kartöflur (kvk. ft.)", hint: "kartöflur steiktar í sykri og smjöri" },
      { w: "rauðkál (hk.)", hint: "fjólublátt kál sem borðað er með jólamat" },
      { w: "úlpa (kvk.)", hint: "hlýr ytri jakki" }
    ];

    const TRANSLATIONS = [
      { word: 'smákökur' },
      { word: 'hátíð' }
    ];

    const MULTIPLE_CHOICE = [
      { question: 'Hvað gerir Alex yfir jólafrí?', options: ['Hann fær frí frá vinnu', 'Hann fær meiri vinnu í Hagkaup', 'Hann fer til útlanda', 'Hann byrjar í nýju starfi'], correct: 1 },
      { question: 'Hvers vegna þarf Bryndís að fara frá bakstrinum?', options: ['Hún þarf að kaupa gjafir', 'Hún þarf að vinna í kirkjunni', 'Hún þarf að sækja börnin', 'Hún þarf að fara í búð'], correct: 1 },
      { question: 'Hvað gerir fjölskyldan áður en hún borðar á aðfangadagskvöld?', options: ['Þau fara í bíó', 'Þau fara í Háteigskirkju í jólamessu', 'Þau opna gjafir', 'Þau baka smákökur'], correct: 1 },
      { question: 'Hvað borðar fjölskyldan á aðfangadagskvöld?', options: ['Skötu og kartöflur', 'Hangikjöt og laufabrauð', 'Hamborgarahrygg með brúnuðum kartöflum', 'Pizzu og salat'], correct: 2 },
      { question: 'Hvað fær Klara í jólagjöf?', options: ['Nýja peysu', 'Flotta úlpu', 'Bók um listasöfn í Evrópu', 'Fótbolta'], correct: 2 }
    ];

    const OPEN_QUESTIONS = [
      { question: 'Hvernig undirbýr fjölskyldan jólin?', expectedContent: ['jólatré', 'skraut', 'smákökur', 'bakar', 'jólalög', 'kaupa', 'bera'] },
      { question: 'Hvers vegna er mikið að gera hjá Bryndísi yfir jólin?', expectedContent: ['prestur', 'kirkju', 'messur', 'halda', 'vinna', 'hátíð'] },
      { question: 'Hvað gerir fjölskyldan á aðfangadagskvöld?', expectedContent: ['kirkju', 'Háteigskirkju', 'messu', 'jólamessu', 'borðar', 'hamborgarahrygg', 'gjafir', 'opna'] }
    ];

    const TRUE_FALSE = [
      { statement: 'Alex fær frí frá vinnu yfir jólin.', correct: false },
      { statement: 'Hólmfríður setur skraut á jólatréð.', correct: true },
      { statement: 'Bryndís heldur jólamessu í Dómkirkjunni.', correct: false },
      { statement: 'Fjölskyldan fer í kirkju á aðfangadagskvöld.', correct: true },
      { statement: 'Hólmfríður fær bók um dýr í jólagjöf.', correct: false }
    ];

    const MATCHING = [
      { left: 'Hólmfríður', right: 'Setur skraut á jólatréð' },
      { left: 'Bryndís', right: 'Heldur jólamessu í Háteigskirkju' },
      { left: 'Alex', right: 'Fær nýja peysu í jólagjöf' },
      { left: 'Klara', right: 'Fær bók um listasöfn í Evrópu' }
    ];

    const HlustunApp = () => {
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const audioRef = useRef(null);
      const [translationAnswers, setTranslationAnswers] = useState(TRANSLATIONS.map(() => ''));
      const [translationFeedback, setTranslationFeedback] = useState(TRANSLATIONS.map(() => null));
      const [translationLoading, setTranslationLoading] = useState(TRANSLATIONS.map(() => false));
      const [mcAnswers, setMcAnswers] = useState([]);
      const [mcChecked, setMcChecked] = useState(false);
      const shuffledMC = useMemo(() => {
        return MULTIPLE_CHOICE.map(q => {
          const indexed = q.options.map((opt, i) => ({ text: opt, origIdx: i }));
          for (let i = indexed.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indexed[i], indexed[j]] = [indexed[j], indexed[i]]; }
          return { ...q, shuffled: indexed };
        });
      }, []);
      const [openAnswers, setOpenAnswers] = useState(OPEN_QUESTIONS.map(() => ''));
      const [openFeedback, setOpenFeedback] = useState(OPEN_QUESTIONS.map(() => null));
      const [openLoading, setOpenLoading] = useState(OPEN_QUESTIONS.map(() => false));
      const [tfAnswers, setTfAnswers] = useState(TRUE_FALSE.map(() => null));
      const [tfChecked, setTfChecked] = useState(false);
      const [matchAnswers, setMatchAnswers] = useState({});
      const [matchChecked, setMatchChecked] = useState(false);
      const shuffledRight = useMemo(() => {
        const items = MATCHING.map((m, i) => ({ text: m.right, origIdx: i }));
        for (let i = items.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [items[i], items[j]] = [items[j], items[i]]; }
        return items;
      }, []);
      const [showModal, setShowModal] = useState(false);
      const [completedSections, setCompletedSections] = useState({ translation: false, mc: false, open: false, tf: false, matching: false });
      const totalSections = 5;
      const completedCount = Object.values(completedSections).filter(Boolean).length;

      const togglePlay = () => { if (!audioRef.current) return; if (isPlaying) audioRef.current.pause(); else audioRef.current.play(); setIsPlaying(!isPlaying); };
      const changeRate = (rate) => { setPlaybackRate(rate); if (audioRef.current) audioRef.current.playbackRate = rate; };
      useEffect(() => {
        const audio = audioRef.current; if (!audio) return;
        const onTime = () => setCurrentTime(audio.currentTime);
        const onMeta = () => setDuration(audio.duration);
        const onEnd = () => setIsPlaying(false);
        audio.addEventListener('timeupdate', onTime); audio.addEventListener('loadedmetadata', onMeta); audio.addEventListener('ended', onEnd);
        return () => { audio.removeEventListener('timeupdate', onTime); audio.removeEventListener('loadedmetadata', onMeta); audio.removeEventListener('ended', onEnd); };
      }, []);
      const formatTime = (s) => { if (!s || isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; };

      const checkTranslation = async (index) => {
        const nl = [...translationLoading]; nl[index] = true; setTranslationLoading(nl);
        try {
          const result = await callOpenAI([
            { role: 'system', content: 'You evaluate translations of Icelandic words. Respond in JSON: {"correct": true/false, "feedback_is": "feedback in Icelandic (A2)", "feedback_native": "feedback in student language"}. Be generous.' },
            { role: 'user', content: `Icelandic word: "${TRANSLATIONS[index].word}"\nStudent: "${translationAnswers[index]}"` }
          ]);
          const parsed = JSON.parse(result.replace(/```json|```/g, '').trim());
          const nf = [...translationFeedback]; nf[index] = parsed; setTranslationFeedback(nf);
          if (translationFeedback.every((f, i) => i === index ? parsed.correct : f?.correct)) setCompletedSections(p => ({ ...p, translation: true }));
        } catch { const nf = [...translationFeedback]; nf[index] = { correct: false, feedback_is: 'Villa. Reyndu aftur.', feedback_native: 'Error.' }; setTranslationFeedback(nf); }
        const nl2 = [...translationLoading]; nl2[index] = false; setTranslationLoading(nl2);
      };
      const checkMC = () => { setMcChecked(true); if (shuffledMC.every((q, i) => q.shuffled[mcAnswers[i]]?.origIdx === q.correct)) setCompletedSections(p => ({ ...p, mc: true })); };
      const checkOpen = async (index) => {
        const nl = [...openLoading]; nl[index] = true; setOpenLoading(nl);
        try {
          const result = await callOpenAI([
            { role: 'system', content: `You evaluate listening comprehension answers in Icelandic (A2). Text: "${LISTENING_TEXT}". JSON: {"correct": true/false, "feedback_is": "...", "feedback_native": "..."}. Accept understanding with grammar mistakes.` },
            { role: 'user', content: `Q: "${OPEN_QUESTIONS[index].question}"\nKeys: ${OPEN_QUESTIONS[index].expectedContent.join(', ')}\nAnswer: "${openAnswers[index]}"` }
          ]);
          const parsed = JSON.parse(result.replace(/```json|```/g, '').trim());
          const nf = [...openFeedback]; nf[index] = parsed; setOpenFeedback(nf);
          if (openFeedback.every((f, i) => i === index ? parsed.correct : f?.correct)) setCompletedSections(p => ({ ...p, open: true }));
        } catch { const nf = [...openFeedback]; nf[index] = { correct: false, feedback_is: 'Villa. Reyndu aftur.', feedback_native: 'Error.' }; setOpenFeedback(nf); }
        const nl2 = [...openLoading]; nl2[index] = false; setOpenLoading(nl2);
      };
      const checkTF = () => { setTfChecked(true); if (TRUE_FALSE.every((q, i) => tfAnswers[i] === q.correct)) setCompletedSections(p => ({ ...p, tf: true })); };
      const checkMatch = () => { setMatchChecked(true); if (MATCHING.every((_, i) => matchAnswers[i] !== undefined && shuffledRight[matchAnswers[i]].origIdx === i)) setCompletedSections(p => ({ ...p, matching: true })); };

      return (
        <div className="min-h-screen">
          <audio ref={audioRef} src="media/hlustun4b_jol.mp3" preload="metadata" />
          <header className="bg-white shadow-sm">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">← Til baka</button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎄 Hlustun: Jól á Íslandi (2)</h1>
              <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A2</p>
            </div>
          </header>

          <div className="sticky-player">
            <div className="max-w-4xl mx-auto px-6 py-4">
              <div className="bg-gradient-to-r from-green-50 to-red-50 rounded-lg p-4 border-2 border-green-200">
                <div className="flex items-center gap-4 mb-3">
                  <button onClick={togglePlay} className="bg-green-700 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-green-800 transition-colors flex-shrink-0">
                    {isPlaying ? <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> : <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
                  </button>
                  <button onClick={() => { if (audioRef.current) audioRef.current.currentTime -= 10; }} className="bg-white text-gray-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-sm">⏮️</button>
                  <div className="flex-1">
                    <div className="flex items-center justify-between mb-1">
                      <p className="text-sm font-normal text-gray-800">🎧 Hlusta á textann</p>
                      <span className="text-xs text-gray-600 font-mono">{formatTime(currentTime)} / {formatTime(duration)}</span>
                    </div>
                    <input type="range" min="0" max={duration || 0} value={currentTime} onChange={(e) => { if (audioRef.current) audioRef.current.currentTime = e.target.value; }} className="w-full h-2 bg-green-200 rounded-lg appearance-none cursor-pointer accent-green-700" />
                  </div>
                </div>
                <div className="flex items-center gap-2 justify-end">
                  <span className="text-xs text-gray-600">Hraði:</span>
                  {[0.75, 1, 1.25].map(rate => (
                    <button key={rate} onClick={() => changeRate(rate)} className={`text-xs px-3 py-1 rounded-full transition-colors ${playbackRate === rate ? 'bg-green-700 text-white' : 'bg-white text-gray-700 hover:bg-green-100'}`}>{rate}×</button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-4xl mx-auto px-6 mt-6 mb-4">
            <div className="bg-white rounded-lg shadow-sm p-4">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm text-gray-600 font-light">Framvinda</span>
                <span className="text-sm font-normal text-green-700">{completedCount}/{totalSections} kláruð</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2"><div className="bg-green-700 h-2 rounded-full transition-all duration-500" style={{ width: `${(completedCount/totalSections)*100}%` }} /></div>
              {completedCount === totalSections && <button onClick={() => setShowModal(true)} className="mt-3 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 font-normal transition-colors w-full">🎉 Sjá textann!</button>}
            </div>
          </div>

          <main className="max-w-4xl mx-auto px-6 pb-12 space-y-8">
            <section className="bg-white rounded-lg shadow-md p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-4">📖 Lykilorð</h2>
              <p className="text-sm text-gray-500 mb-4 font-light">Lestu orðin áður en þú hlustar.</p>
              <div className="grid md:grid-cols-2 gap-3">
                {VOCAB.map((item, i) => (<div key={i} className="rounded-lg border-2 border-green-100 bg-white/70 p-3"><div className="font-normal text-gray-900">{item.w}</div><div className="text-sm text-gray-600 font-light">{item.hint}</div></div>))}
              </div>
            </section>

            <section className="bg-white rounded-lg shadow-md p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">1️⃣ Þýðing</h2>
              <div className="space-y-6">
                {TRANSLATIONS.map((item, index) => (
                  <div key={index} className="border-2 border-gray-200 rounded-lg p-6">
                    <p className="text-lg font-normal text-gray-800 mb-4">Þýddu orðið á þitt móðurmál: <span className="font-semibold text-green-700">{item.word}</span></p>
                    <textarea value={translationAnswers[index]} onChange={(e) => { const a = [...translationAnswers]; a[index] = e.target.value; setTranslationAnswers(a); }} placeholder="Skrifaðu þýðinguna hér..." className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 font-light mb-3" rows="2" disabled={translationFeedback[index]?.correct} />
                    {!translationFeedback[index] && <button onClick={() => checkTranslation(index)} disabled={!translationAnswers[index].trim() || translationLoading[index]} className="bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800 disabled:bg-gray-300 disabled:cursor-not-allowed font-normal transition-colors">{translationLoading[index] ? 'Athuga...' : 'Athuga þýðingu'}</button>}
                    {translationFeedback[index] && (
                      <div className={`mt-4 p-4 rounded-lg border-2 ${translationFeedback[index].correct ? 'bg-green-50 border-green-200 text-green-800' : 'bg-yellow-50 border-yellow-200 text-yellow-800'}`}>
                        <p className="font-normal mb-2">📚 {translationFeedback[index].feedback_is}</p>
                        <p className="text-sm font-light italic">{translationFeedback[index].feedback_native}</p>
                        {translationFeedback[index].correct ? <span className="text-green-600 mt-2 inline-block">✅ Rétt!</span> : <button onClick={() => { const f = [...translationFeedback]; f[index] = null; setTranslationFeedback(f); }} className="mt-2 bg-yellow-600 text-white px-4 py-1 rounded-lg hover:bg-yellow-700 text-sm">Reyna aftur</button>}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </section>

            <section className="bg-white rounded-lg shadow-md p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">2️⃣ Krossaspurningar</h2>
              <div className="space-y-6">
                {shuffledMC.map((q, qi) => (
                  <div key={qi} className="border-2 border-gray-200 rounded-lg p-6">
                    <p className="text-lg font-normal text-gray-800 mb-4">{qi+1}. {q.question}</p>
                    <div className="space-y-2">
                      {q.shuffled.map((opt, oi) => {
                        const selected = mcAnswers[qi] === oi;
                        const isCorrect = opt.origIdx === q.correct;
                        let cls = 'border-2 rounded-lg p-3 cursor-pointer transition-colors ';
                        if (mcChecked) { cls += isCorrect ? 'border-green-500 bg-green-50' : selected && !isCorrect ? 'border-red-500 bg-red-50' : 'border-gray-200'; }
                        else { cls += selected ? 'border-green-500 bg-green-50' : 'border-gray-200 hover:border-green-300'; }
                        return (<div key={oi} className={cls} onClick={() => { if (!mcChecked) { const a = [...mcAnswers]; a[qi] = oi; setMcAnswers(a); } }}><label className="flex items-center gap-3 cursor-pointer"><input type="radio" name={`mc-${qi}`} checked={selected} readOnly className="accent-green-700" /><span className="font-light">{opt.text}</span></label></div>);
                      })}
                    </div>
                  </div>
                ))}
              </div>
              {!mcChecked ? <button onClick={checkMC} disabled={mcAnswers.length < MULTIPLE_CHOICE.length || mcAnswers.includes(undefined)} className="mt-6 bg-green-700 text-white px-8 py-3 rounded-lg hover:bg-green-800 disabled:bg-gray-300 font-normal transition-colors">Athuga svör</button>
              : <div className={`mt-6 p-4 rounded-lg border-2 ${completedSections.mc ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>{completedSections.mc ? '✅ Allt rétt!' : '⚠️ Sumt rangt — skoðaðu grænu svörin.'}</div>}
            </section>

            <section className="bg-white rounded-lg shadow-md p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">3️⃣ Opnar spurningar</h2>
              <p className="text-sm text-gray-500 mb-4 font-light">Svaraðu á íslensku (1–2 setningar).</p>
              <div className="space-y-6">
                {OPEN_QUESTIONS.map((q, index) => (
                  <div key={index} className="border-2 border-gray-200 rounded-lg p-6">
                    <p className="text-lg font-normal text-gray-800 mb-4">{index+1}. {q.question}</p>
                    <textarea value={openAnswers[index]} onChange={(e) => { const a = [...openAnswers]; a[index] = e.target.value; setOpenAnswers(a); }} placeholder="Skrifaðu svarið hér..." className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 font-light mb-3" rows="3" disabled={openFeedback[index]?.correct} />
                    {!openFeedback[index] && <button onClick={() => checkOpen(index)} disabled={!openAnswers[index].trim() || openLoading[index]} className="bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800 disabled:bg-gray-300 disabled:cursor-not-allowed font-normal transition-colors">{openLoading[index] ? 'Athuga...' : 'Athuga svar'}</button>}
                    {openFeedback[index] && (
                      <div className={`mt-4 p-4 rounded-lg border-2 ${openFeedback[index].correct ? 'bg-green-50 border-green-200 text-green-800' : 'bg-yellow-50 border-yellow-200 text-yellow-800'}`}>
                        <p className="font-normal mb-2">📚 {openFeedback[index].feedback_is}</p>
                        <p className="text-sm font-light italic">{openFeedback[index].feedback_native}</p>
                        {openFeedback[index].correct ? <span className="text-green-600 mt-2 inline-block">✅ Rétt!</span> : <button onClick={() => { const f = [...openFeedback]; f[index] = null; setOpenFeedback(f); }} className="mt-2 bg-yellow-600 text-white px-4 py-1 rounded-lg hover:bg-yellow-700 text-sm">Reyna aftur</button>}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </section>

            <section className="bg-white rounded-lg shadow-md p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">4️⃣ Rétt eða rangt?</h2>
              <div className="space-y-4">
                {TRUE_FALSE.map((q, i) => {
                  let cls = 'border-2 rounded-lg p-4 ';
                  if (tfChecked) cls += tfAnswers[i] === q.correct ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50';
                  else cls += 'border-gray-200';
                  return (
                    <div key={i} className={cls}>
                      <p className="font-normal text-gray-800 mb-3">{i+1}. {q.statement}</p>
                      <div className="flex gap-4">
                        {[true, false].map(val => (<label key={String(val)} className="flex items-center gap-2 cursor-pointer"><input type="radio" name={`tf-${i}`} checked={tfAnswers[i] === val} onChange={() => { if (!tfChecked) { const a = [...tfAnswers]; a[i] = val; setTfAnswers(a); } }} className="accent-green-700" /><span className="font-light">{val ? 'Rétt' : 'Rangt'}</span></label>))}
                      </div>
                      {tfChecked && tfAnswers[i] !== q.correct && <p className="text-sm text-red-600 mt-2">Rétt svar: {q.correct ? 'Rétt' : 'Rangt'}</p>}
                    </div>
                  );
                })}
              </div>
              {!tfChecked ? <button onClick={checkTF} disabled={tfAnswers.includes(null)} className="mt-6 bg-green-700 text-white px-8 py-3 rounded-lg hover:bg-green-800 disabled:bg-gray-300 font-normal transition-colors">Athuga svör</button>
              : <div className={`mt-6 p-4 rounded-lg border-2 ${completedSections.tf ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>{completedSections.tf ? '✅ Allt rétt!' : '⚠️ Sumt rangt — skoðaðu svörin.'}</div>}
            </section>

            <section className="bg-white rounded-lg shadow-md p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">5️⃣ Paraðu saman</h2>
              <div className="space-y-4">
                {MATCHING.map((m, i) => {
                  const selected = matchAnswers[i];
                  let cls = 'border-2 rounded-lg p-4 ';
                  if (matchChecked) cls += (selected !== undefined && shuffledRight[selected].origIdx === i) ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50';
                  else cls += 'border-gray-200';
                  return (
                    <div key={i} className={cls}>
                      <p className="font-semibold text-gray-800 mb-2">{m.left}</p>
                      <select value={selected ?? ''} onChange={(e) => { if (!matchChecked) { const a = { ...matchAnswers }; a[i] = e.target.value === '' ? undefined : parseInt(e.target.value); setMatchAnswers(a); } }} className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg font-light focus:ring-2 focus:ring-green-500 focus:outline-none">
                        <option value="">— Veldu —</option>
                        {shuffledRight.map((r, ri) => (<option key={ri} value={ri}>{r.text}</option>))}
                      </select>
                      {matchChecked && selected !== undefined && shuffledRight[selected].origIdx !== i && <p className="text-sm text-red-600 mt-2">Rétt: {MATCHING[i].right}</p>}
                    </div>
                  );
                })}
              </div>
              {!matchChecked ? <button onClick={checkMatch} disabled={Object.keys(matchAnswers).length < MATCHING.length || Object.values(matchAnswers).some(v => v === undefined)} className="mt-6 bg-green-700 text-white px-8 py-3 rounded-lg hover:bg-green-800 disabled:bg-gray-300 font-normal transition-colors">Athuga svör</button>
              : <div className={`mt-6 p-4 rounded-lg border-2 ${completedSections.matching ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>{completedSections.matching ? '✅ Allt rétt!' : '⚠️ Sumt rangt — skoðaðu svörin.'}</div>}
            </section>
          </main>

          {showModal && (
            <div className="modal-overlay" onClick={() => setShowModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="p-8">
                  <div className="flex items-center justify-between mb-6">
                    <h2 className="text-2xl font-light text-gray-800">🎄 Hlustunartextinn</h2>
                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
                  </div>
                  <div className="prose max-w-none">
                    {LISTENING_TEXT.split('\n\n').map((p, i) => (<p key={i} className="text-gray-700 font-light leading-relaxed mb-4">{p}</p>))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<HlustunApp />);
  </script>
</body>
</html>
