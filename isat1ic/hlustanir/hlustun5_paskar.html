// ── API ───────────────────────────────────────────────────────────────────────

async function callOpenAI(messages, maxTokens = 300, model = 'gpt-4o-mini', temperature = 0.2) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens: maxTokens, model, temperature }),
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

async function evaluateAnswer(question, answer, expected) {
  const prompt = `Þú ert íslenskulæri. Mettu svar nemanda á kvarðanum 0–5.
Spurning: "${question}"
Svar nemanda: "${answer}"
Lykilhugtök (ekki þarf öll): ${expected.join(', ')}
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]`;
  const result = await callOpenAI([{ role: 'user', content: prompt }]);
  const stigMatch = result.match(/STIG:\s*(\d)/);
  const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
  return {
    stig: stigMatch ? parseInt(stigMatch[1]) : 0,
    endurgjof: endurgjofMatch ? endurgjofMatch[1].trim() : result.trim(),
  };
}

async function evalTranslation(word, answer) {
  const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.
ÍSLENSKA ORÐIÐ: "${word}"
SVAR NEMANDA: "${answer}"
SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": true/false,
  "detected_language": "nafn tungumálsins (t.d. enska, pólska, spænska)",
  "feedback_is": "Endurgjöf á íslensku (ein setning)",
  "feedback_native": "Sama endurgjöf á greinda tungumálinu",
  "correct_translation": "Góð þýðing á greinda tungumálinu ef rangt, annars null"
}`;
  const raw = await callOpenAI(
    [{ role: 'system', content: sys }, { role: 'user', content: answer }],
    200, 'gpt-4o', 0.2
  );
  const clean = raw.replace(/```json\s*/g, '').replace(/```/g, '').trim();
  return JSON.parse(clean);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const formatTime = (sec) => {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
};

const AudioPlayer = () => {
  const audioRef = useRef(null);
  const [isPlaying,    setIsPlaying]    = useState(false);
  const [playbackRate, setPlaybackRate] = useState(1);
  const [currentTime,  setCurrentTime]  = useState(0);
  const [duration,     setDuration]     = useState(0);

  useEffect(() => {
    if (audioRef.current) audioRef.current.playbackRate = playbackRate;
  }, [playbackRate]);

  const togglePlay = () => {
    if (!audioRef.current) return;
    if (isPlaying) audioRef.current.pause();
    else audioRef.current.play();
  };
  const handleSeek = (e) => {
    const t = parseFloat(e.target.value);
    if (audioRef.current) { audioRef.current.currentTime = t; setCurrentTime(t); }
  };

  return (
    <div className="sticky-player">
      <div className="max-w-4xl mx-auto px-6 py-4">
        <div className="flex items-center gap-4">
          <button onClick={togglePlay}
            className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm"
            aria-label={isPlaying ? 'Pása' : 'Spila'}>
            {isPlaying
              ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
          </button>
          <div className="flex-1">
            <p className="text-sm font-light text-gray-700 mb-2">🎧 Hlustaðu á samtalið</p>
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-500 font-light w-8 text-right">{formatTime(currentTime)}</span>
              <input type="range" min="0" max={duration || 0} value={currentTime}
                onChange={handleSeek} className="progress-bar flex-1" />
              <span className="text-xs text-gray-500 font-light w-8">{formatTime(duration)}</span>
            </div>
          </div>
          <div className="flex gap-1.5">
            {[0.75, 1, 1.25].map(rate => (
              <button key={rate} onClick={() => setPlaybackRate(rate)}
                className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors
                  ${playbackRate === rate ? 'bg-green-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
                {rate}×
              </button>
            ))}
          </div>
        </div>
        <audio ref={audioRef} src="media/hlustun5_paskar.mp3" preload="metadata"
          onPlay={() => setIsPlaying(true)}
          onPause={() => setIsPlaying(false)}
          onEnded={() => setIsPlaying(false)}
          onTimeUpdate={() => { if (audioRef.current) setCurrentTime(audioRef.current.currentTime); }}
          onLoadedMetadata={() => { if (audioRef.current) setDuration(audioRef.current.duration); }} />
      </div>
    </div>
  );
};

    if (!answers[i].trim()) return;
    setLoading(l => l.map((v, j) => j === i ? true : v));

          <textarea
            value={answers[i]}
            onChange={e => setAnswers(a => a.map((v, j) => j === i ? e.target.value : v))}
            disabled={!!results[i]}
            rows={3}
            placeholder="Skrifaðu svar hér..."
            className="w-full border-2 border-gray-200 rounded-lg px-4 py-3 text-sm font-light focus:border-green-400 focus:outline-none resize-none disabled:bg-gray-50"
          />
          {!results[i] && (
            <button disabled={loading[i] || !answers[i].trim()}
              onClick={() => submit(i)}
              className="mt-2 px-5 py-2 bg-green-600 text-white rounded-lg font-light text-sm hover:bg-green-700 disabled:opacity-40 transition-colors">
              {loading[i] ? 'Hinkraðu...' : 'Senda svar'}
            </button>
          )}
          {results[i] && (
            <>
              <FeedbackBadge score={results[i].stig} message={results[i].endurgjof} />
              {results[i].stig < 4 && (
                <button onClick={() => resetOne(i)}
                  className="mt-2 text-xs underline text-gray-500 hover:text-gray-700">
                  Reyna aftur
                </button>
              )}
            </>
          )}
        </div>
      ))}
    </div>
  );
};

const TranslationsSection = ({ onDone }) => {
  const [answers,  setAnswers]  = useState({});
  const [feedback, setFeedback] = useState({});
  const [loading,  setLoading]  = useState({});
  const allDone = TRANSLATION_WORDS.every((_, i) => !!feedback[i]);

  useEffect(() => { if (allDone) onDone(); }, [allDone]);

  const submit = async (i) => {
    if (!answers[i]?.trim()) return;
    setLoading(p => ({ ...p, [i]: true }));
    try {
      const res = await evalTranslation(TRANSLATION_WORDS[i], answers[i]);
      setFeedback(p => ({ ...p, [i]: res }));
    } catch {
      setFeedback(p => ({ ...p, [i]: { correct: false, feedback_is: 'Villa kom upp.', feedback_native: '', correct_translation: '' } }));
    }
    setLoading(p => ({ ...p, [i]: false }));
  };

  const reset = (i) => {
    setAnswers(p => { const n = { ...p }; delete n[i]; return n; });
    setFeedback(p => { const n = { ...p }; delete n[i]; return n; });
  };

  return (
    <div className="fade-in space-y-6">
      <p className="text-gray-500 text-sm font-light">Þýddu orðin á þitt eigið tungumál.</p>
      {TRANSLATION_WORDS.map((word, i) => (
        <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
          <p className="text-xl font-medium text-green-700 mb-3">{word}</p>
          <input type="text"
            value={answers[i] || ''}
            onChange={e => setAnswers(p => ({ ...p, [i]: e.target.value }))}
            onKeyDown={e => e.key === 'Enter' && submit(i)}
            placeholder="Þýddu á þitt mál..."
            disabled={!!feedback[i]}
            className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light disabled:bg-gray-50 text-sm"
          />
          {!feedback[i] && (
            <button onClick={() => submit(i)}
              disabled={loading[i] || !answers[i]?.trim()}
              className="mt-2 bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-light hover:bg-green-700 transition-colors disabled:opacity-40">
              {loading[i] ? 'Athuga...' : 'Senda þýðingu'}
            </button>
          )}
          {feedback[i] && (
            <div className={`mt-3 p-4 rounded-lg border-2 fade-in ${
              feedback[i].correct
                ? 'bg-green-50 border-green-200 text-green-800'
                : 'bg-amber-50 border-amber-200 text-amber-800'}`}>
              <p className="font-medium text-sm mb-1">{feedback[i].correct ? '✅ Rétt!' : '🔄 Ekki alveg rétt'}</p>
              <p className="text-sm font-light">{feedback[i].feedback_is}</p>
              {feedback[i].feedback_native && (
                <p className="text-xs italic mt-1 opacity-75">{feedback[i].feedback_native}</p>
              )}
              {!feedback[i].correct && feedback[i].correct_translation && (
                <p className="text-xs mt-2 font-medium">✓ {feedback[i].correct_translation}</p>
              )}
              {!feedback[i].correct && (
                <button onClick={() => reset(i)}
                  className="text-xs underline mt-2 block opacity-70">Reyna aftur</button>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
};

// ── AÐALFORRITIÐ ──────────────────────────────────────────────────────────────

const TABS = [
  { id: 'tf',      label: '✅ Rétt/Rangt'        },
  { id: 'kross',   label: '🔵 Krossaspurningar'   },
  { id: 'stuttar', label: '📝 Stuttar spurningar'  },
  { id: 'thyd',    label: '🌍 Þýðingar'           },
];

const App = () => {
  const [activeTab,    setActiveTab]    = useState('tf');
  const [doneTabs,     setDoneTabs]     = useState({});
  const [showKeywords, setShowKeywords] = useState(true);
  const [showText,     setShowText]     = useState(false);

  const markDone = (id) => setDoneTabs(d => ({ ...d, [id]: true }));
  const allDone  = TABS.every(t => doneTabs[t.id]);
  const progressWritten = React.useRef(false);
  useEffect(() => {
    window.writeProgress && window.writeProgress('hlustun5_paskar', 'opened');
  }, []);
  useEffect(() => {
    if (allDone && !progressWritten.current) {
      progressWritten.current = true;
      window.writeProgress && window.writeProgress('hlustun5_paskar', 'completed');
    }
  }, [allDone]);

  return (
    <>
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Hlustun 5: Páskar</h1>
          <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
        </div>
      </header>

      <AudioPlayer />

      <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">

        <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
          <p className="text-sm font-light text-green-800">
            <span className="block">📘 Lestu lykilorðin hér að neðan fyrst</span>
            <span className="block">🎧 Hlustaðu á samtalið 2–3 sinnum</span>
            <span className="block">✏️ Svaraðu öllum flokkum spurninga</span>
            <span className="block">🔓 Þegar allt er lokið opnast textinn</span>
          </p>
        </div>

        <div className="bg-white rounded-xl border border-gray-100 shadow-sm">
          <button onClick={() => setShowKeywords(s => !s)}
            className="w-full flex items-center justify-between px-5 py-4 text-left">
            <span className="text-sm font-medium text-gray-700">📘 Lykilorð</span>
            <span className="text-gray-400 transition-transform duration-300"
              style={{ display: 'inline-block', transform: showKeywords ? 'rotate(180deg)' : 'rotate(0deg)' }}>▼</span>
          </button>
          {showKeywords && (
            <div className="px-5 pb-5 grid grid-cols-1 gap-2 sm:grid-cols-2 fade-in">
              {KEYWORDS.map((k, i) => (
                <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                  <div className="text-sm font-medium text-gray-800">
                    {k.word} <span className="text-gray-500 font-light">({k.kyn})</span>
                  </div>
                  <div className="text-xs text-gray-600 font-light mt-0.5">{k.hint}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="flex border-b border-gray-100">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`tab-btn flex-1 py-3 px-2 text-xs font-light text-gray-600 ${activeTab === tab.id ? 'active' : ''}`}>
                {doneTabs[tab.id] ? '✓ ' : ''}{tab.label.replace(/^[^ ]+ /, '')}
              </button>
            ))}
          </div>
          <div className="p-5">
            {activeTab === 'tf'      && <TrueFalseSection      onDone={() => markDone('tf')}      />}
            {activeTab === 'kross'   && <MultipleChoiceSection  onDone={() => markDone('kross')}   />}
            {activeTab === 'stuttar' && <OpenQuestionsSection   onDone={() => markDone('stuttar')} />}
            {activeTab === 'thyd'    && <TranslationsSection    onDone={() => markDone('thyd')}    />}
          </div>
        </div>

        {allDone && (
          <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
            <div className="text-4xl mb-3">🎉</div>
            <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
            <p className="text-green-700 font-light text-sm mb-4">
              Þú hefur lokið öllum verkefnum. Nú getur þú lesið textann.
            </p>
            <button onClick={() => setShowText(s => !s)}
              className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
              {showText ? '▲ Fela textann' : '📖 Lesa textann'}
            </button>
            {showText && (
              <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                <h3 className="font-light text-gray-700 mb-4 text-sm">📖 Páskar</h3>
                {LISTENING_TEXT.trim().split('\n\n').map((para, i) => (
                  <p key={i} className="text-gray-700 leading-relaxed font-light text-sm mb-3">{para}</p>
                ))}
              </div>
            )}
          </div>
        )}

      </main>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
        <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                ${doneTabs[tab.id]
                  ? 'bg-green-600 text-white'
                  : activeTab === tab.id
                  ? 'bg-green-50 text-green-700 border border-green-200'
                  : 'bg-gray-100 text-gray-500'}`}>
              {doneTabs[tab.id] ? '✓' : ''} {tab.label.replace(/^[^ ]+ /, '')}
            </button>
          ))}
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
