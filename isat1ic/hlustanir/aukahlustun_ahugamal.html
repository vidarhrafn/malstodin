<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Aukahlustun: Áhugamál – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }

    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }

    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled  { cursor: default; }

    .tab-btn { transition: all 0.2s; position: relative; padding: 12px 8px; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .tab-btn.active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COURSE = 'isat1ic';

  async function writeProgress(exerciseId, status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, exerciseId);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) {
      // Fail silently — never interrupt exercise
    }
  }

  window.writeProgress = writeProgress;
</script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // ── API ─────────────────────────────────────────────────────────────────
    async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    async function callOpenAIgpt4o(messages, maxTokens = 200, temperature = 0.2) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o', temperature }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    // ── Gögn ────────────────────────────────────────────────────────────────
    const LISTENING_TEXT = `Ég hef alltaf haft mörg áhugamál. Ég elska að synda og fer oft í sundlaugina eftir skóla eða vinnu. Eftir sund fer ég venjulega í heita pottinn og tala við vini. Það er notalegt að sitja í heitu vatni þegar kalt er úti.

Ég spila líka stundum fótbolta með vinum mínum á kvöldin. Við hittumst á leikvelli nálægt húsinu mínu. Mér finnst skemmtilegt að hlaupa og reyna að skora mörk, þó við spilum bara til að hafa gaman. Ég horfi líka oft á fótbolta í sjónvarpinu um helgar og styð mitt lið.

Á kvöldin, þegar ég vil slaka á, hlusta ég oft á tónlist eða les. Ég hef líka byrjað að hlusta á hljóðbækur. Það er mjög þægilegt – ég get hlustað á bók á meðan ég elda eða geng úti með hundinn. Ég hef nýlega hlustað á hljóðbók sem var bæði fyndin og sorgleg. Ég lærði mörg ný orð og naut þess að hlusta á góða rödd lesa söguna.

Mér finnst áhugamál mjög mikilvæg. Þau gera lífið skemmtilegra og hjálpa mér að vera í góðu skapi. Ég reyni að gera eitthvað sem mér finnst gaman á hverjum degi.`;

    const VOCAB = [
      { w: 'áhugamál (hk)',    hint: 'eitthvað sem þér finnst gaman að gera í frítíma' },
      { w: 'sundlaug (kvk)',   hint: 'staður þar sem fólk syndir' },
      { w: 'heitur pottur (kk)', hint: 'pottur með heitu vatni þar sem fólk slakar á' },
      { w: 'leikvöllur (kk)', hint: 'svæði þar sem fólk spilar og leikur sér' },
      { w: 'hljóðbók (kvk)',  hint: 'bók sem einhver les upp og þú hlustar á' },
      { w: 'notalegt',        hint: 'þægilegt og gott' },
      { w: 'slaka á (sögn)',  hint: 'hvílast, gera eitthvað rólegra' },
      { w: 'skap (hk)',       hint: 'hvernig þér líður, tilfinning' },
    ];

    const TF_ITEMS = [
      { statement: 'Viðmælandinn fer oft í sund eftir skóla eða vinnu.', correct: true },
      { statement: 'Honum finnst kalt í heita pottinum.', correct: false },
      { statement: 'Hann spilar stundum fótbolta með vinum sínum.', correct: true },
      { statement: 'Hann vinnur sem fótboltaþjálfari.', correct: false },
      { statement: 'Hann hlustar stundum á hljóðbók þegar hann eldar.', correct: true },
      { statement: 'Hljóðbókin sem hann hlustaði á var bæði fyndin og sorgleg.', correct: true },
      { statement: 'Hann segir að áhugamál séu mikilvæg.', correct: true },
    ];

    const MC_ORIGINAL = [
      {
        question: 'Hvar hittir hann vini sína til að spila fótbolta?',
        options: ['Í sundlauginni', 'Á leikvelli nálægt húsinu', 'Í íþróttasal'],
        correct: 1,
      },
      {
        question: 'Hvað gerir hann eftir sund?',
        options: ['Fer strax heim', 'Fer í heita pottinn', 'Fer að synda aftur'],
        correct: 1,
      },
      {
        question: 'Hvað gerir hann stundum á kvöldin?',
        options: ['Syngur og dansar', 'Les eða hlustar á tónlist', 'Fer í ræktina'],
        correct: 1,
      },
      {
        question: 'Hvað segir hann að áhugamál geri?',
        options: ['Þau gera lífið skemmtilegra', 'Þau eru tímaeyðsla', 'Þau eru bara fyrir börn'],
        correct: 0,
      },
    ];

    const SHORT_QS = [
      'Hvaða áhugamál hefur viðmælandinn?',
      'Hvað gerir hann oft á kvöldin?',
      'Hvað finnst honum gott við hljóðbækur?',
      'Hvað finnst honum áhugamál gera fyrir fólk?',
    ];

    const TRANSL_WORDS = [
      { word: 'áhugamál', display: 'áhugamál (hk)' },
      { word: 'hljóðbók',  display: 'hljóðbók (kvk)' },
    ];

    // ── Hjálparföll ─────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Íhlutir ─────────────────────────────────────────────────────────────
    const FeedbackBadge = ({ score, message, onRetry }) => {
      const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
      const cls = {
        green: 'bg-green-50 border-green-200 text-green-700',
        amber: 'bg-amber-50 border-amber-200 text-amber-700',
        red:   'bg-red-50 border-red-200 text-red-700',
      }[color];
      return (
        <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
          <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
          <p className="text-sm font-light">{message}</p>
          {onRetry && (
            <button onClick={onRetry} className="text-xs underline mt-2 opacity-70">Reyna aftur</button>
          )}
        </div>
      );
    };

    // ════════════════════════════════════════════════════════════════════════
    const App = () => {
      const audioRef = useRef(null);
      const [isPlaying,    setIsPlaying]    = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [currentTime,  setCurrentTime]  = useState(0);
      const [duration,     setDuration]     = useState(0);
      const [vocabOpen,    setVocabOpen]    = useState(true);

      const [activeTab, setActiveTab] = useState('tf');
      const [tabDone,   setTabDone]   = useState({ tf: false, mc: false, short: false, transl: false });

      const allDone = Object.values(tabDone).every(Boolean);
      const progressWritten = React.useRef(false);
      useEffect(() => {
        window.writeProgress && window.writeProgress('aukahlustun_ahugamal', 'opened');
      }, []);
      useEffect(() => {
        if (allDone && !progressWritten.current) {
          progressWritten.current = true;
          window.writeProgress && window.writeProgress('aukahlustun_ahugamal', 'completed');
        }
      }, [allDone]);
      const [showText, setShowText] = useState(false);

      // ── Rétt/Rangt ──────────────────────────────────────────────────────
      const [tfAns,     setTfAns]     = useState({});
      const [tfChecked, setTfChecked] = useState(false);

      const checkTF = () => {
        if (Object.keys(tfAns).length < TF_ITEMS.length) { alert('Vinsamlegast svaraðu öllum setningum!'); return; }
        setTfChecked(true);
        setTabDone(prev => ({ ...prev, tf: true }));
      };
      const resetTF = () => { setTfAns({}); setTfChecked(false); setTabDone(prev => ({ ...prev, tf: false })); };

      // ── Krossaspurningar ────────────────────────────────────────────────
      const mcQ = useMemo(() => MC_ORIGINAL.map(q => {
        const correctText = q.options[q.correct];
        const opts = shuffle(q.options);
        return { question: q.question, options: opts, correct: opts.indexOf(correctText) };
      }), []);
      const [mcAns,     setMcAns]     = useState({});
      const [mcChecked, setMcChecked] = useState(false);

      const checkMC = () => {
        if (Object.keys(mcAns).length < mcQ.length) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setMcChecked(true);
        setTabDone(prev => ({ ...prev, mc: true }));
      };
      const resetMC = () => { setMcAns({}); setMcChecked(false); setTabDone(prev => ({ ...prev, mc: false })); };

      // ── Stuttar spurningar ──────────────────────────────────────────────
      const [shortAns,     setShortAns]     = useState(Array(SHORT_QS.length).fill(''));
      const [shortFb,      setShortFb]      = useState(Array(SHORT_QS.length).fill(null));
      const [shortLoading, setShortLoading] = useState(Array(SHORT_QS.length).fill(false));

      const getShortFb = async (i) => {
        if (!shortAns[i].trim()) return;
        setShortLoading(prev => { const a=[...prev]; a[i]=true; return a; });
        try {
          const result = await callOpenAI([
            {
              role: 'system',
              content: `Þú ert íslensku kennari (A1–A2). Nemandinn hlustaði á texta og svarar stuttri spurningu.
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]

Textinn: "${LISTENING_TEXT}"
Spurningin: "${SHORT_QS[i]}"`,
            },
            { role: 'user', content: shortAns[i] },
          ], 100, 0.2);

          const stigMatch     = result.match(/STIG:\s*(\d)/);
          const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
          const score = stigMatch ? parseInt(stigMatch[1]) : 0;
          const msg   = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();

          setShortFb(prev => { const a=[...prev]; a[i]={ score, msg }; return a; });
        } catch (e) {
          alert('Villa kom upp. Reyndu aftur.');
          console.error(e);
        } finally {
          setShortLoading(prev => { const a=[...prev]; a[i]=false; return a; });
        }
      };

      const retryShort = (i) => {
        setShortFb(prev => { const a=[...prev]; a[i]=null; return a; });
        setShortAns(prev => { const a=[...prev]; a[i]=''; return a; });
      };

      const allShortDone = shortFb.every(f => f !== null);
      useEffect(() => {
        if (allShortDone) setTabDone(prev => ({ ...prev, short: true }));
      }, [allShortDone]);

      // ── Þýðingar ────────────────────────────────────────────────────────
      const [translAns,     setTranslAns]     = useState(Array(TRANSL_WORDS.length).fill(''));
      const [translFb,      setTranslFb]      = useState(Array(TRANSL_WORDS.length).fill(null));
      const [translLoading, setTranslLoading] = useState(Array(TRANSL_WORDS.length).fill(false));

      const checkTransl = async (i) => {
        const ans = translAns[i].trim();
        if (!ans) { alert('Vinsamlegast skrifaðu þýðingu.'); return; }
        setTranslLoading(prev => { const a=[...prev]; a[i]=true; return a; });
        try {
          const result = await callOpenAIgpt4o([
            {
              role: 'system',
              content: `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${TRANSL_WORDS[i].word}"
SVAR NEMANDA: "${ans}"

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "detected_language": "nafn tungumálsins (t.d. enska, pólska, spænska)",
  "feedback_is": "Endurgjöf á íslensku",
  "feedback_native": "Endurgjöf á greinda tungumálinu",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}`,
            },
            { role: 'user', content: ans },
          ], 200, 0.2);

          let parsed = null;
          try {
            const clean = result.replace(/```json\s*/g, '').replace(/```/g, '').trim();
            parsed = JSON.parse(clean);
          } catch {}

          let score, msg;
          if (parsed) {
            score = parsed.correct ? 5 : 0;
            msg   = parsed.feedback_is || '';
            if (parsed.feedback_native) msg += ` — ${parsed.feedback_native}`;
            if (!parsed.correct && parsed.correct_translation) msg += ` (${parsed.correct_translation})`;
          } else {
            // Fallback til STIG/ENDURGJÖF
            const stigMatch     = result.match(/STIG:\s*(\d)/);
            const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
            score = stigMatch ? parseInt(stigMatch[1]) : 3;
            msg   = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();
          }

          setTranslFb(prev => { const a=[...prev]; a[i]={ score, msg }; return a; });
        } catch (e) {
          alert('Villa kom upp. Reyndu aftur.');
          console.error(e);
        } finally {
          setTranslLoading(prev => { const a=[...prev]; a[i]=false; return a; });
        }
      };

      const retryTransl = (i) => {
        setTranslFb(prev  => { const a=[...prev]; a[i]=null; return a; });
        setTranslAns(prev => { const a=[...prev]; a[i]='';   return a; });
      };

      const allTranslDone = translFb.every(f => f !== null);
      useEffect(() => {
        if (allTranslDone) setTabDone(prev => ({ ...prev, transl: true }));
      }, [allTranslDone]);

      // ── Hljóðspilari ────────────────────────────────────────────────────
      const togglePlay = () => {
        if (!audioRef.current) return;
        isPlaying ? audioRef.current.pause() : audioRef.current.play();
      };
      const changeRate = (rate) => {
        setPlaybackRate(rate);
        if (audioRef.current) audioRef.current.playbackRate = rate;
      };

      // ── MC niðurstaða ───────────────────────────────────────────────────
      const mcCorrect = Object.entries(mcAns).filter(([i, v]) => v === mcQ[+i]?.correct).length;
      const tfCorrect = Object.entries(tfAns).filter(([i, v]) => v === TF_ITEMS[+i].correct).length;

      const TABS = [
        { id: 'tf',    label: 'Rétt/Rangt',       emoji: '✅' },
        { id: 'mc',    label: 'Krossaspurningar',  emoji: '🔵' },
        { id: 'short', label: 'Stuttar spurningar', emoji: '📝' },
        { id: 'transl',label: 'Þýðingar',          emoji: '🔵' },
      ];

      return (
        <>
          {/* ── HEADER ── */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Aukahlustun: Áhugamál</h1>
              <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
            </div>
          </header>

          {/* ── HLJÓÐSPILARI – sticky ── */}
          <div className="sticky-player">
            <div className="max-w-4xl mx-auto px-6 py-3">
              <audio ref={audioRef} src="media/ahugamal.mp3" preload="metadata"
                onPlay={() => setIsPlaying(true)}
                onPause={() => setIsPlaying(false)}
                onEnded={() => setIsPlaying(false)}
                onTimeUpdate={() => setCurrentTime(audioRef.current?.currentTime || 0)}
                onLoadedMetadata={() => setDuration(audioRef.current?.duration || 0)} />
              <div className="flex items-center gap-3 mb-2">
                <button onClick={togglePlay}
                  className="bg-green-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0">
                  {isPlaying
                    ? <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    : <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  }
                </button>
                <span className="text-xs font-light text-gray-500 w-10 text-right flex-shrink-0">
                  {Math.floor(currentTime/60)}:{String(Math.floor(currentTime%60)).padStart(2,'0')}
                </span>
                <input type="range" min="0" max={duration || 100} step="0.1"
                  value={currentTime}
                  onChange={e => {
                    const t = parseFloat(e.target.value);
                    setCurrentTime(t);
                    if (audioRef.current) audioRef.current.currentTime = t;
                  }}
                  className="flex-1 h-1.5 rounded-full accent-green-600 cursor-pointer" />
                <span className="text-xs font-light text-gray-500 w-10 flex-shrink-0">
                  {duration ? `${Math.floor(duration/60)}:${String(Math.floor(duration%60)).padStart(2,'0')}` : '--:--'}
                </span>
                <div className="flex gap-1 flex-shrink-0">
                  {[0.75, 1, 1.25].map(r => (
                    <button key={r} onClick={() => changeRate(r)}
                      className={`px-2 py-1 rounded-md text-xs font-light transition-colors
                        ${playbackRate === r ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                      {r}×
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">

            {/* ── Leiðbeiningabox ── */}
            <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
              <p className="text-sm font-light text-green-800 space-y-1">
                <span className="block">📘 Lestu lykilorðin hér að neðan fyrst</span>
                <span className="block">🎧 Hlustaðu á samtalið 2–3 sinnum</span>
                <span className="block">✏️ Svaraðu öllum flokkum spurninga</span>
                <span className="block">🔓 Þegar allt er lokið opnast textinn</span>
              </p>
            </div>

            {/* ── Lykilorð (fellanlegur) ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <button
                onClick={() => setVocabOpen(o => !o)}
                className="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-gray-50 transition-colors">
                <span className="font-medium text-gray-800 text-sm">📘 Lykilorð</span>
                <span className="text-gray-400 text-sm">{vocabOpen ? '▲ Fela' : '▼ Sýna'}</span>
              </button>
              {vocabOpen && (
                <div className="px-6 pb-6 grid sm:grid-cols-2 gap-3 fade-in">
                  {VOCAB.map((it, i) => (
                    <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                      <div className="font-medium text-sm text-gray-900">{it.w}</div>
                      <div className="text-xs text-gray-600 font-light mt-0.5">{it.hint}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── Spjald með flipum ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

              {/* Flipaslár – sticky, z-40, neðan spilara (z-50) */}
              <div className="sticky top-[64px] z-40 bg-white border-b border-gray-200 flex">
                {TABS.map(t => (
                  <button key={t.id}
                    onClick={() => setActiveTab(t.id)}
                    className={`tab-btn flex-1 text-xs font-light text-gray-600 ${activeTab === t.id ? 'active' : ''}`}>
                    {tabDone[t.id] ? `✓ ${t.label}` : `${t.emoji} ${t.label}`}
                  </button>
                ))}
              </div>

              <div className="p-6 fade-in" key={activeTab}>

                {/* ══ RÉTT / RANGT ══ */}
                {activeTab === 'tf' && (
                  <div className="space-y-4">
                    <p className="text-sm text-gray-500 font-light">Er setningin rétt eða rangt samkvæmt textanum?</p>
                    {TF_ITEMS.map((item, i) => {
                      const sel = tfAns[i];
                      return (
                        <div key={i} className="rounded-xl border-2 border-gray-100 p-4">
                          <p className="font-light text-gray-800 text-sm mb-3">{i+1}. {item.statement}</p>
                          <div className="flex gap-3">
                            {[true, false].map(val => {
                              const isSel    = sel === val;
                              const isCorr   = val === item.correct;
                              let cls = 'answer-option flex-1 p-2.5 rounded-lg flex items-center justify-center gap-2 text-sm font-light';
                              if (tfChecked) {
                                cls += ' opt-disabled';
                                if (isCorr) cls += ' opt-correct';
                                else if (isSel) cls += ' opt-incorrect';
                              } else if (isSel) cls += ' opt-selected';
                              return (
                                <div key={String(val)} className={cls}
                                  onClick={() => !tfChecked && setTfAns(prev => ({ ...prev, [i]: val }))}>
                                  <span className={`w-3.5 h-3.5 rounded-full border-2 flex-shrink-0 transition-colors
                                    ${tfChecked && isCorr ? 'border-green-500 bg-green-500'
                                      : tfChecked && isSel ? 'border-red-500 bg-red-500'
                                      : isSel ? 'border-blue-500 bg-blue-500'
                                      : 'border-gray-300'}`} />
                                  {val ? 'Rétt' : 'Rangt'}
                                  {tfChecked && isCorr && <span className="text-green-600 ml-auto">✓</span>}
                                  {tfChecked && isSel && !isCorr && <span className="text-red-500 ml-auto">✗</span>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}

                    {!tfChecked ? (
                      <div className="flex gap-3">
                        <button onClick={checkTF}
                          disabled={Object.keys(tfAns).length < TF_ITEMS.length}
                          className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                          Athuga svör
                        </button>
                        <button onClick={resetTF}
                          className="px-5 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                          Endurstilla
                        </button>
                      </div>
                    ) : (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-4 fade-in">
                        <p className="text-green-800 font-light text-sm mb-2">
                          Þú fékkst <strong>{tfCorrect}</strong> af <strong>{TF_ITEMS.length}</strong> rétt.
                        </p>
                        <div className="flex gap-3">
                          <button onClick={() => setActiveTab('mc')}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                            Næsti liður →
                          </button>
                          <button onClick={resetTF}
                            className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                            Reyna aftur
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* ══ KROSSASPURNINGAR ══ */}
                {activeTab === 'mc' && (
                  <div className="space-y-5">
                    <p className="text-sm text-gray-500 font-light">Veldu rétt svar.</p>
                    {mcQ.map((q, qi) => {
                      const sel = mcAns[qi];
                      return (
                        <div key={qi} className="rounded-xl border-2 border-gray-100 p-4">
                          <p className="font-light text-gray-800 text-sm mb-3">{qi+1}. {q.question}</p>
                          <div className="space-y-2">
                            {q.options.map((opt, oi) => {
                              const isSel  = sel === oi;
                              const isCorr = oi === q.correct;
                              let cls = 'answer-option p-3 rounded-lg flex items-center gap-3';
                              if (mcChecked) {
                                cls += ' opt-disabled';
                                if (isCorr) cls += ' opt-correct';
                                else if (isSel) cls += ' opt-incorrect';
                              } else if (isSel) cls += ' opt-selected';
                              return (
                                <div key={oi} className={cls}
                                  onClick={() => !mcChecked && setMcAns(prev => ({ ...prev, [qi]: oi }))}>
                                  <span className={`w-4 h-4 rounded-full border-2 flex-shrink-0 transition-colors
                                    ${mcChecked && isCorr ? 'border-green-500 bg-green-500'
                                      : mcChecked && isSel ? 'border-red-500 bg-red-500'
                                      : isSel ? 'border-blue-500 bg-blue-500'
                                      : 'border-gray-300'}`} />
                                  <span className="text-sm font-light text-gray-800">{opt}</span>
                                  {mcChecked && isCorr && <span className="ml-auto text-green-600 text-sm">✓</span>}
                                  {mcChecked && isSel && !isCorr && <span className="ml-auto text-red-500 text-sm">✗</span>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}

                    {!mcChecked ? (
                      <div className="flex gap-3">
                        <button onClick={checkMC}
                          disabled={Object.keys(mcAns).length < mcQ.length}
                          className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                          Athuga svör
                        </button>
                        <button onClick={resetMC}
                          className="px-5 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                          Endurstilla
                        </button>
                      </div>
                    ) : (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-4 fade-in">
                        <p className="text-green-800 font-light text-sm mb-2">
                          Þú fékkst <strong>{mcCorrect}</strong> af <strong>{mcQ.length}</strong> rétt.
                        </p>
                        <div className="flex gap-3">
                          <button onClick={() => setActiveTab('short')}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                            Næsti liður →
                          </button>
                          <button onClick={resetMC}
                            className="px-4 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                            Reyna aftur
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* ══ STUTTAR SPURNINGAR ══ */}
                {activeTab === 'short' && (
                  <div className="space-y-5">
                    <p className="text-sm text-gray-500 font-light">Svaraðu með 1–2 setningum.</p>
                    {SHORT_QS.map((q, i) => (
                      <div key={i} className="rounded-xl border-2 border-gray-100 p-4">
                        <p className="font-light text-gray-800 text-sm mb-3">{i+1}. {q}</p>
                        <textarea
                          value={shortAns[i]}
                          onChange={e => { const a=[...shortAns]; a[i]=e.target.value; setShortAns(a); }}
                          disabled={shortFb[i] !== null}
                          rows={3}
                          placeholder="Skrifaðu svar hér..."
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light text-sm resize-none disabled:bg-gray-50 mb-3"
                        />
                        {shortFb[i] === null ? (
                          <button onClick={() => getShortFb(i)}
                            disabled={shortLoading[i] || shortAns[i].trim().length < 3}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLoading[i] ? 'Bíð...' : 'Fá endurgjöf'}
                          </button>
                        ) : (
                          <FeedbackBadge score={shortFb[i].score} message={shortFb[i].msg} onRetry={() => retryShort(i)} />
                        )}
                      </div>
                    ))}
                    {allShortDone && (
                      <div className="text-center fade-in">
                        <button onClick={() => setActiveTab('transl')}
                          className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                          Næsti liður →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ══ ÞÝÐINGAR ══ */}
                {activeTab === 'transl' && (
                  <div className="space-y-5">
                    <p className="text-sm text-gray-500 font-light">Þýddu orðin á þitt móðurmál.</p>
                    {TRANSL_WORDS.map((item, i) => (
                      <div key={i} className="rounded-xl border-2 border-gray-100 p-4">
                        <p className="font-light text-gray-800 text-sm mb-3">
                          Hvað þýðir <strong>{item.display}</strong> á þínu móðurmáli?
                        </p>
                        <input
                          type="text"
                          value={translAns[i]}
                          onChange={e => { const a=[...translAns]; a[i]=e.target.value; setTranslAns(a); }}
                          disabled={translFb[i] !== null}
                          placeholder="Skrifaðu þýðinguna hér..."
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 font-light text-sm disabled:bg-gray-50 mb-3"
                        />
                        {translFb[i] === null ? (
                          <button onClick={() => checkTransl(i)}
                            disabled={translLoading[i] || !translAns[i].trim()}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {translLoading[i] ? 'Bíð...' : 'Athuga svar'}
                          </button>
                        ) : (
                          <FeedbackBadge score={translFb[i].score} message={translFb[i].msg} onRetry={() => retryTransl(i)} />
                        )}
                      </div>
                    ))}
                  </div>
                )}

              </div>
            </div>

            {/* ── Lokakassi þegar allt er lokið ── */}
            {allDone && (
              <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
                <div className="text-4xl mb-3">🎉</div>
                <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
                <p className="text-green-700 font-light text-sm mb-4">Þú hefur lokið öllum verkefnum.</p>
                <button onClick={() => setShowText(s => !s)}
                  className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                  {showText ? '▲ Fela textann' : '▼ Sýna textann'}
                </button>
                {showText && (
                  <div className="mt-6 text-left bg-white border border-green-200 rounded-xl p-6 fade-in">
                    {LISTENING_TEXT.split('\n\n').map((para, i) => (
                      <p key={i} className="text-gray-700 font-light leading-relaxed text-sm mb-3 last:mb-0">{para}</p>
                    ))}
                  </div>
                )}
              </div>
            )}

          </main>

          {/* ── Framvinduraking – fast neðst ── */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
              {TABS.map(t => (
                <button key={t.id}
                  onClick={() => setActiveTab(t.id)}
                  className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                    ${tabDone[t.id] ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                  {tabDone[t.id] ? `✓ ${t.label}` : t.label}
                </button>
              ))}
            </div>
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
