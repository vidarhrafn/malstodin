<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Hlustun 8: 17. júní – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #d1d5db;
      outline: none;
      cursor: pointer;
    }
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #16a34a;
      cursor: pointer;
    }
    .progress-bar::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #16a34a;
      cursor: pointer;
      border: none;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }
    .modal-content {
      background: white;
      border-radius: 1rem;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.active-tab):hover { background: #f3f4f6; }
    .tab-btn.active-tab { background: white; color: #16a34a; font-weight: 500; }
    .tab-btn.active-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #16a34a;
      border-radius: 2px 2px 0 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // ========== AI FUNCTIONS ==========
    async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o', temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    async function evaluateTranslation(icelandicWord, userTranslation) {
      const sysMsg = `You evaluate translations of Icelandic words. The student translated the Icelandic word "${icelandicWord}".
Respond ONLY with valid JSON (no markdown, no backticks):
{
  "detected_language": "the language the student wrote in",
  "correct": true/false,
  "feedback_is": "short feedback in Icelandic (1 sentence)",
  "feedback_native": "same feedback in the student's detected language",
  "correct_translation": "if wrong, give the correct translation in the student's language; if correct, empty string",
  "score": 0-5
}`;
      const raw = await callOpenAI([
        { role: 'system', content: sysMsg },
        { role: 'user', content: userTranslation }
      ], 300, 'gpt-4o', 0.2);
      return JSON.parse(raw);
    }

    async function evaluateOpenAnswer(question, answer, listeningText) {
      const sysMsg = `You evaluate short answers about an Icelandic listening exercise. The text is:
"${listeningText}"

The question is: "${question}"

Evaluate the student's answer. They may answer in any language. Be encouraging but accurate.
Respond ONLY with valid JSON (no markdown, no backticks):
{
  "detected_language": "the language the student wrote in",
  "correct": true/false,
  "feedback_is": "feedback in Icelandic (1-2 sentences)",
  "feedback_native": "same feedback in the student's detected language",
  "score": 0-5,
  "suggested_answer_is": "a good answer in simple Icelandic"
}`;
      const raw = await callOpenAI([
        { role: 'system', content: sysMsg },
        { role: 'user', content: answer }
      ], 400, 'gpt-4o-mini', 0.3);
      return JSON.parse(raw);
    }

    // ========== DATA ==========
    const LISTENING_TEXT = `17. júní er þjóðhátíðardagur Íslands og stór dagur hjá fjölskyldunni í Álftamýri. Hólmfríður spilar í lúðrasveit og æfir í margar vikur fyrir 17. júní. „Við spilum íslensk lög og göngum í skrúðgöngu í miðbænum. Ég er alltaf spennt!" segir hún.

Um morguninn vaknar fjölskyldan snemma. Bryndís klæðir sig í þjóðbúning og Bao fer í skyrtu og jakka. „Ég á ekki þjóðbúning, en mér finnst gaman að klæða mig fallega á þessum degi," segir Bao.

Fjölskyldan fer saman í miðbæinn til að horfa á skrúðgönguna. Fyrir skrúðgönguna hlusta þau á ræðu forseta Íslands. Fánar blakta alls staðar og tónlistin hljómar á götunum. Þau sjá Hólmfríði ganga með lúðrasveitinni og eru mjög stolt.

Eftir þetta eru þau orðin svöng. Hólmfríður er búin að spila í lúðrasveitinni og hún og Bryndís fá sér ís en Bao, Alex og Klara fá sér pylsur. Alex og Klara hitta vini sína og Bao og Bryndís labba um bæinn með Hólmfríði og hlusta á tónlist og spjalla við fólk.

Um kvöldið fara svo Hólmfríður, Alex og Klara saman á tónleikana á Arnarhóli. Iceguys eru að spila og það er mikið fjör.`;

    const KEYWORDS = [
      { w: "þjóðhátíðardagur (kk)", hint: "dagur þar sem fólk fagnar sjálfstæði landsins" },
      { w: "sjálfstæði (hk)", hint: "þegar land stjórnar sér sjálft" },
      { w: "skrúðganga (kvk)", hint: "þegar fólk gengur saman um götur borgarinnar" },
      { w: "lúðrasveit (kvk)", hint: "hópur sem spilar á blásturshljóðfæri" },
      { w: "þjóðbúningur (kk)", hint: "hefðbundin íslensk klæðnaður" },
      { w: "fáni (kk)", hint: "flagg; tákn lands eða félags" },
      { w: "ræða (kvk)", hint: "tal sem einhver heldur fyrir fólki" },
      { w: "forseti (kk)", hint: "þjóðhöfðingi Íslands" },
      { w: "hátíð (kvk)", hint: "stór viðburður þar sem fólk kemur saman og fagnar" },
      { w: "stolt (hk/lo)", hint: "þegar maður er ánægður með sig eða aðra" },
      { w: "tónleikar (kk.ft)", hint: "viðburður þar sem tónlistarmenn spila fyrir fólki" },
      { w: "fjör (hk)", hint: "þegar stemning er góð og fólki líður vel" }
    ];

    const TRANSLATION_WORDS = [
      { word: 'þjóðhátíðardagur' },
      { word: 'skrúðganga' }
    ];

    const TRUE_FALSE = [
      { statement: 'Hólmfríður spilar í lúðrasveit.', correct: true },
      { statement: 'Bao klæðir sig í þjóðbúning á 17. júní.', correct: false },
      { statement: 'Fjölskyldan fer í miðbæinn til að horfa á skrúðgönguna.', correct: true },
      { statement: 'Forseti Íslands syngur lag á hátíðinni.', correct: false },
      { statement: 'Hólmfríður og Bryndís fá sér ís eftir skrúðgönguna.', correct: true },
      { statement: 'Systkinin fara á tónleika á Arnarhóli um kvöldið.', correct: true }
    ];

    const MULTIPLE_CHOICE = [
      {
        question: 'Hvað gerir Hólmfríður á 17. júní?',
        options: ['Hún syngur í kór', 'Hún spilar í lúðrasveit', 'Hún hleypur í kapphlaupi', 'Hún dansar'],
        correct: 1
      },
      {
        question: 'Hvað klæðist Bryndís á 17. júní?',
        options: ['Íþróttafötum', 'Þjóðbúningi', 'Vinnufötum', 'Jakka og buxum'],
        correct: 1
      },
      {
        question: 'Hvað klæðist Bao á 17. júní?',
        options: ['Þjóðbúningi', 'Stuttermabol', 'Upphlut', 'Skyrtu og jakka'],
        correct: 3
      },
      {
        question: 'Hvað gerir forseti Íslands á hátíðinni?',
        options: ['Hann spilar í lúðrasveit', 'Hann borðar ís', 'Hann heldur ræðu', 'Hann gengur í skrúðgöngu'],
        correct: 2
      },
      {
        question: 'Hvað gera systkinin saman um kvöldið?',
        options: ['Horfa á bíómynd heima', 'Fara í leiktæki', 'Fara á tónleika', 'Lesa góða bók'],
        correct: 2
      }
    ];

    const OPEN_QUESTIONS = [
      {
        question: 'Hvað gerir Hólmfríður til að undirbúa sig fyrir 17. júní?',
        expectedContent: ['æfir', 'lúðrasveit', 'vikur', 'spilar', 'lög']
      },
      {
        question: 'Hvað gerir fjölskyldan eftir skrúðgönguna?',
        expectedContent: ['svöng', 'ís', 'pylsur', 'hitta', 'vini', 'labba', 'tónlist']
      },
      {
        question: 'Hvers vegna er Bao stolt á 17. júní?',
        expectedContent: ['Hólmfríður', 'lúðrasveit', 'skrúðganga', 'spilar']
      }
    ];

    // ========== UTILITY ==========
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ========== FEEDBACK BADGE ==========
    function FeedbackBadge({ score }) {
      if (score === null || score === undefined) return null;
      const s = Number(score);
      const color = s >= 4 ? 'bg-green-100 text-green-800 border-green-300'
                  : s >= 2 ? 'bg-yellow-100 text-yellow-800 border-yellow-300'
                  : 'bg-red-100 text-red-800 border-red-300';
      return (
        <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-semibold border ${color} ml-2`}>
          STIG: {s}/5
        </span>
      );
    }

    // ========== AUDIO PLAYER ==========
    function AudioPlayer() {
      const audioRef = useRef(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);

      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play();
      };

      const handleSeek = (e) => {
        const newTime = parseFloat(e.target.value);
        if (audioRef.current) {
          audioRef.current.currentTime = newTime;
          setCurrentTime(newTime);
        }
      };

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate]);

      const formatTime = (sec) => {
        if (!sec || isNaN(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      };

      return (
        <div className="sticky-player">
          <div className="max-w-4xl mx-auto px-6 py-4">
            <div className="flex items-center gap-4">
              <button onClick={togglePlay}
                className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm"
                aria-label={isPlaying ? 'Pása' : 'Spila'}>
                {isPlaying
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                }
              </button>
              <div className="flex-1">
                <p className="text-sm font-light text-gray-700 mb-2">🎧 Hlustaðu á hlustunartextann</p>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-500 font-light w-8 text-right">{formatTime(currentTime)}</span>
                  <input type="range" min="0" max={duration || 0} value={currentTime}
                    onChange={handleSeek}
                    className="progress-bar flex-1" />
                  <span className="text-xs text-gray-500 font-light w-8">{formatTime(duration)}</span>
                </div>
                <audio ref={audioRef} src="../media/hlustun8_17juni.mp3" preload="metadata"
                  onPlay={() => setIsPlaying(true)}
                  onPause={() => setIsPlaying(false)}
                  onEnded={() => setIsPlaying(false)}
                  onTimeUpdate={() => { if (audioRef.current) setCurrentTime(audioRef.current.currentTime); }}
                  onLoadedMetadata={() => { if (audioRef.current) setDuration(audioRef.current.duration); }} />
              </div>
              <div className="flex gap-1.5">
                {[0.75, 1, 1.25].map(rate => (
                  <button key={rate} onClick={() => setPlaybackRate(rate)}
                    className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors
                      ${playbackRate === rate
                        ? 'bg-green-600 text-white'
                        : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
                    {rate}×
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========== MAIN APP ==========
    function App() {
      const TABS = ['Rétt/Rangt', 'Krossaspurningar', 'Stuttar spurningar', 'Þýðingar'];
      const [activeTab, setActiveTab] = useState(0);
      const [showModal, setShowModal] = useState(false);
      const [showKeywords, setShowKeywords] = useState(true);

      // True/False state
      const [tfAnswers, setTfAnswers] = useState({});
      const [tfChecked, setTfChecked] = useState(false);

      // Multiple Choice state
      const [mcAnswers, setMcAnswers] = useState({});
      const [mcChecked, setMcChecked] = useState(false);
      const shuffledMC = useMemo(() => MULTIPLE_CHOICE.map(q => {
        const opts = q.options.map((text, i) => ({ text, originalIndex: i }));
        return { ...q, options: shuffle(opts), correctOriginalIndex: q.correct };
      }), []);

      // Open Questions state
      const [openAnswers, setOpenAnswers] = useState({});
      const [openFeedback, setOpenFeedback] = useState({});
      const [openLoading, setOpenLoading] = useState({});

      // Translation state
      const [transAnswers, setTransAnswers] = useState({});
      const [transFeedback, setTransFeedback] = useState({});
      const [transLoading, setTransLoading] = useState({});

      // Progress tracking
      const tfScore = tfChecked ? TRUE_FALSE.filter((q, i) => tfAnswers[i] === q.correct).length : 0;
      const mcScore = mcChecked ? MULTIPLE_CHOICE.filter((q, i) => {
        const sel = mcAnswers[i];
        if (sel === undefined) return false;
        return shuffledMC[i].options[sel].originalIndex === q.correct;
      }).length : 0;
      const openDone = Object.keys(openFeedback).length;
      const transDone = Object.keys(transFeedback).length;

      const totalSections = 4;
      const completedSections = (tfChecked ? 1 : 0) + (mcChecked ? 1 : 0) + (openDone === OPEN_QUESTIONS.length ? 1 : 0) + (transDone === TRANSLATION_WORDS.length ? 1 : 0);
      const allDone = completedSections === totalSections;

      useEffect(() => {
        if (allDone && !showModal) setShowModal(true);
      }, [allDone]);

      const checkTF = () => setTfChecked(true);
      const checkMC = () => setMcChecked(true);

      const submitOpen = async (index) => {
        if (!openAnswers[index]?.trim()) return;
        setOpenLoading(p => ({ ...p, [index]: true }));
        try {
          const result = await evaluateOpenAnswer(OPEN_QUESTIONS[index].question, openAnswers[index], LISTENING_TEXT);
          setOpenFeedback(p => ({ ...p, [index]: result }));
        } catch (e) {
          setOpenFeedback(p => ({ ...p, [index]: { feedback_is: 'Villa kom upp. Reyndu aftur.', feedback_native: 'An error occurred. Please try again.', score: 0 } }));
        }
        setOpenLoading(p => ({ ...p, [index]: false }));
      };

      const submitTranslation = async (index) => {
        if (!transAnswers[index]?.trim()) return;
        setTransLoading(p => ({ ...p, [index]: true }));
        try {
          const result = await evaluateTranslation(TRANSLATION_WORDS[index].word, transAnswers[index]);
          setTransFeedback(p => ({ ...p, [index]: result }));
        } catch (e) {
          setTransFeedback(p => ({ ...p, [index]: { feedback_is: 'Villa kom upp.', feedback_native: 'An error occurred.', correct: false, score: 0 } }));
        }
        setTransLoading(p => ({ ...p, [index]: false }));
      };

      const resetTranslation = (index) => {
        setTransAnswers(p => { const n = { ...p }; delete n[index]; return n; });
        setTransFeedback(p => { const n = { ...p }; delete n[index]; return n; });
      };

      const resetOpen = (index) => {
        setOpenAnswers(p => { const n = { ...p }; delete n[index]; return n; });
        setOpenFeedback(p => { const n = { ...p }; delete n[index]; return n; });
      };

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <div className="flex items-start justify-between">
                <div>
                  <button onClick={() => window.history.back()}
                    className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                    ← Til baka
                  </button>
                  <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Hlustun 8: 17. júní</h1>
                  <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
                </div>
                <div className="flex flex-wrap gap-1 mt-2">
                  {['Hólmfríður','Bao','Bryndís','Alex','Klara'].map(n => (
                    <span key={n} className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">{n}</span>
                  ))}
                </div>
              </div>
            </div>
          </header>

          <AudioPlayer />

          <div className="max-w-4xl mx-auto px-6 py-6">

            {/* Leiðbeiningabox */}
            <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4 mb-6 fade-in">
              <p className="text-sm text-green-800 font-light">📘 Lestu lykilorðin hér að neðan fyrst</p>
              <p className="text-sm text-green-800 font-light">🎧 Hlustaðu á samtalið 2–3 sinnum</p>
              <p className="text-sm text-green-800 font-light">✏️ Svaraðu öllum flokkum spurninga</p>
              <p className="text-sm text-green-800 font-light">🔓 Þegar allt er lokið opnast textinn</p>
            </div>

            {/* Keywords */}
            <section className="mb-8 fade-in">
              <button
                onClick={() => setShowKeywords(!showKeywords)}
                className="w-full bg-white rounded-lg shadow-md p-4 flex items-center justify-between hover:shadow-lg transition-shadow"
              >
                <h2 className="text-xl font-light text-gray-800">📝 Lykilorð</h2>
                <span className="text-gray-400 text-xl">{showKeywords ? '▲' : '▼'}</span>
              </button>
              {showKeywords && (
                <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {KEYWORDS.map((kw, i) => (
                    <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                      <span className="font-semibold text-yellow-900">{kw.w}</span>
                      <span className="text-yellow-700 text-sm ml-2">— {kw.hint}</span>
                    </div>
                  ))}
                </div>
              )}
            </section>

            {/* Tabs */}
            <div className="sticky bg-white rounded-t-lg shadow-sm border border-gray-100 overflow-x-auto" style={{top: '0', zIndex: 40}}>
              <div className="flex">
                {TABS.map((tab, i) => {
                  const done = [tfChecked, mcChecked, openDone === OPEN_QUESTIONS.length, transDone === TRANSLATION_WORDS.length][i];
                  return (
                    <button key={i} onClick={() => setActiveTab(i)}
                      className={`tab-btn flex-1 px-3 py-3 text-sm whitespace-nowrap border-b border-gray-100 ${activeTab === i ? 'active-tab' : 'text-gray-500'}`}>
                      {done ? '✓ ' : ''}{tab}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Tab Content */}
            <div className="fade-in bg-white rounded-b-lg shadow-sm border border-t-0 border-gray-100 mb-6">
              {/* ===== RÉTT/RANGT ===== */}
              {activeTab === 0 && (
                <section className="p-6 sm:p-8">
                  <h2 className="text-2xl font-light text-gray-800 mb-6">✅ Rétt eða rangt?</h2>
                  <div className="space-y-4">
                    {TRUE_FALSE.map((q, i) => (
                      <div key={i} className={`border-2 rounded-lg p-4 transition-colors ${
                        tfChecked
                          ? tfAnswers[i] === q.correct
                            ? 'border-green-400 bg-green-50'
                            : tfAnswers[i] !== undefined
                              ? 'border-red-400 bg-red-50'
                              : 'border-gray-200'
                          : 'border-gray-200'
                      }`}>
                        <p className="font-normal text-gray-800 mb-3">{q.statement}</p>
                        <div className="flex gap-3">
                          <button
                            onClick={() => !tfChecked && setTfAnswers(p => ({ ...p, [i]: true }))}
                            className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                              tfAnswers[i] === true
                                ? 'bg-green-600 text-white'
                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                            }`}
                          >
                            Rétt
                          </button>
                          <button
                            onClick={() => !tfChecked && setTfAnswers(p => ({ ...p, [i]: false }))}
                            className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                              tfAnswers[i] === false
                                ? 'bg-red-600 text-white'
                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                            }`}
                          >
                            Rangt
                          </button>
                        </div>
                        {tfChecked && tfAnswers[i] !== undefined && tfAnswers[i] !== q.correct && (
                          <p className="mt-2 text-sm text-red-600 font-medium">
                            Rétt svar: {q.correct ? 'Rétt' : 'Rangt'}
                          </p>
                        )}
                      </div>
                    ))}
                  </div>
                  {!tfChecked && (
                    <button
                      onClick={checkTF}
                      className="mt-6 w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition-colors"
                    >
                      Athuga svör
                    </button>
                  )}
                  {tfChecked && (
                    <div className="mt-6 text-center p-4 bg-green-50 rounded-lg">
                      <p className="text-green-800 font-semibold text-lg">{tfScore} af {TRUE_FALSE.length} rétt!</p>
                    </div>
                  )}
                </section>
              )}

              {/* ===== KROSSASPURNINGAR ===== */}
              {activeTab === 1 && (
                <section className="p-6 sm:p-8">
                  <h2 className="text-2xl font-light text-gray-800 mb-6">❓ Krossaspurningar</h2>
                  <div className="space-y-6">
                    {shuffledMC.map((q, qIndex) => (
                      <div key={qIndex} className="border-2 border-gray-200 rounded-lg p-5">
                        <p className="text-lg font-normal text-gray-800 mb-4">{q.question}</p>
                        <div className="space-y-2">
                          {q.options.map((option, optIndex) => {
                            const isSelected = mcAnswers[qIndex] === optIndex;
                            const isCorrect = option.originalIndex === q.correctOriginalIndex;
                            const showResult = mcChecked;

                            let cls = "w-full text-left px-4 py-3 rounded-lg border-2 transition-all font-light ";
                            if (!showResult) {
                              cls += isSelected
                                ? 'border-green-500 bg-green-50 text-green-800'
                                : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50';
                            } else if (isCorrect) {
                              cls += 'border-green-500 bg-green-50 text-green-800';
                            } else if (isSelected && !isCorrect) {
                              cls += 'border-red-400 bg-red-50 text-red-800';
                            } else {
                              cls += 'border-gray-200 text-gray-500';
                            }

                            return (
                              <button
                                key={optIndex}
                                onClick={() => !mcChecked && setMcAnswers(p => ({ ...p, [qIndex]: optIndex }))}
                                className={cls}
                              >
                                {option.text}
                                {showResult && isCorrect && ' ✓'}
                                {showResult && isSelected && !isCorrect && ' ✗'}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  {!mcChecked && (
                    <button
                      onClick={checkMC}
                      className="mt-6 w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition-colors"
                    >
                      Athuga svör
                    </button>
                  )}
                  {mcChecked && (
                    <div className="mt-6 text-center p-4 bg-green-50 rounded-lg">
                      <p className="text-green-800 font-semibold text-lg">{mcScore} af {MULTIPLE_CHOICE.length} rétt!</p>
                    </div>
                  )}
                </section>
              )}

              {/* ===== STUTTAR SPURNINGAR ===== */}
              {activeTab === 2 && (
                <section className="p-6 sm:p-8">
                  <h2 className="text-2xl font-light text-gray-800 mb-6">💬 Stuttar spurningar</h2>
                  <p className="text-gray-500 text-sm mb-6">Svaraðu með eigin orðum. Þú mátt svara á hvaða tungumáli sem er.</p>
                  <div className="space-y-6">
                    {OPEN_QUESTIONS.map((q, i) => (
                      <div key={i} className="border-2 border-gray-200 rounded-lg p-5">
                        <p className="text-lg font-normal text-gray-800 mb-3">{q.question}</p>
                        <textarea
                          value={openAnswers[i] || ''}
                          onChange={(e) => setOpenAnswers(p => ({ ...p, [i]: e.target.value }))}
                          placeholder="Skrifaðu svarið hér..."
                          className="w-full border-2 border-gray-200 rounded-lg p-3 text-sm resize-none focus:border-green-500 focus:outline-none"
                          rows={2}
                          disabled={!!openFeedback[i]}
                        />
                        {!openFeedback[i] && (
                          <button
                            onClick={() => submitOpen(i)}
                            disabled={openLoading[i] || !openAnswers[i]?.trim()}
                            className="mt-2 bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition-colors disabled:opacity-50"
                          >
                            {openLoading[i] ? 'Athuga...' : 'Senda svar'}
                          </button>
                        )}
                        {openFeedback[i] && (
                          <div className={`mt-3 p-4 rounded-lg border-2 ${
                            openFeedback[i].score >= 3
                              ? 'bg-green-50 border-green-200'
                              : 'bg-yellow-50 border-yellow-200'
                          }`}>
                            <div className="flex items-center mb-2">
                              <p className="font-medium text-gray-800">ENDURGJÖF</p>
                              <FeedbackBadge score={openFeedback[i].score} />
                            </div>
                            <p className="text-sm mb-1">📚 {openFeedback[i].feedback_is}</p>
                            <p className="text-sm italic text-gray-600">{openFeedback[i].feedback_native}</p>
                            {openFeedback[i].suggested_answer_is && (
                              <p className="mt-2 text-sm text-green-800">
                                <span className="font-semibold">Gott svar:</span> {openFeedback[i].suggested_answer_is}
                              </p>
                            )}
                            {openFeedback[i].score < 4 && (
                              <button
                                onClick={() => resetOpen(i)}
                                className="mt-3 bg-yellow-600 text-white px-4 py-2 rounded-lg hover:bg-yellow-700 font-normal text-sm transition-colors"
                              >
                                Reyna aftur
                              </button>
                            )}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </section>
              )}

              {/* ===== ÞÝÐINGAR ===== */}
              {activeTab === 3 && (
                <section className="p-6 sm:p-8">
                  <h2 className="text-2xl font-light text-gray-800 mb-6">🌍 Þýðingar</h2>
                  <p className="text-gray-500 text-sm mb-6">Þýddu orðin á þitt eigið tungumál.</p>
                  <div className="space-y-6">
                    {TRANSLATION_WORDS.map((tw, i) => (
                      <div key={i} className="border-2 border-gray-200 rounded-lg p-5">
                        <p className="text-xl font-semibold text-green-700 mb-3">{tw.word}</p>
                        <input
                          type="text"
                          value={transAnswers[i] || ''}
                          onChange={(e) => setTransAnswers(p => ({ ...p, [i]: e.target.value }))}
                          placeholder="Þýddu á þitt mál..."
                          className="w-full border-2 border-gray-200 rounded-lg p-3 text-sm focus:border-green-500 focus:outline-none"
                          disabled={!!transFeedback[i]}
                          onKeyDown={(e) => e.key === 'Enter' && submitTranslation(i)}
                        />
                        {!transFeedback[i] && (
                          <button
                            onClick={() => submitTranslation(i)}
                            disabled={transLoading[i] || !transAnswers[i]?.trim()}
                            className="mt-2 bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition-colors disabled:opacity-50"
                          >
                            {transLoading[i] ? 'Athuga...' : 'Senda þýðingu'}
                          </button>
                        )}
                        {transFeedback[i] && (
                          <div className={`mt-3 p-4 rounded-lg border-2 ${
                            transFeedback[i].correct
                              ? 'bg-green-50 border-green-200 text-green-800'
                              : 'bg-yellow-50 border-yellow-200 text-yellow-800'
                          }`}>
                            <div className="flex items-center mb-2">
                              <p className="font-medium">{transFeedback[i].correct ? '✅ Rétt!' : '🔄 Ekki alveg rétt'}</p>
                              <FeedbackBadge score={transFeedback[i].score} />
                            </div>
                            <p className="text-sm mb-1">📚 {transFeedback[i].feedback_is}</p>
                            <p className="text-sm italic">{transFeedback[i].feedback_native}</p>
                            {!transFeedback[i].correct && transFeedback[i].correct_translation && (
                              <p className="mt-2 text-sm">
                                <span className="font-semibold">Betri þýðing:</span> {transFeedback[i].correct_translation}
                              </p>
                            )}
                            {!transFeedback[i].correct && (
                              <button
                                onClick={() => resetTranslation(i)}
                                className="mt-3 bg-yellow-600 text-white px-4 py-2 rounded-lg hover:bg-yellow-700 font-normal text-sm transition-colors"
                              >
                                Reyna aftur
                              </button>
                            )}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </section>
              )}
            </div>

            {/* Progress bar */}
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2 px-4 z-40">
              <div className="max-w-3xl mx-auto flex items-center gap-3">
                <span className="text-xs text-gray-500 whitespace-nowrap">{completedSections}/{totalSections} kláruð</span>
                <div className="flex-1 bg-gray-200 rounded-full h-2">
                  <div
                    className="bg-green-600 h-2 rounded-full transition-all duration-500"
                    style={{ width: `${(completedSections / totalSections) * 100}%` }}
                  />
                </div>
                {allDone && (
                  <button
                    onClick={() => setShowModal(true)}
                    className="text-xs bg-green-600 text-white px-3 py-1 rounded-full hover:bg-green-700"
                  >
                    Sjá texta
                  </button>
                )}
              </div>
            </div>

            <div className="h-16" /> {/* Spacer for fixed progress bar */}
          </div>

          {/* Modal with full text */}
          {showModal && (
            <div className="modal-overlay" onClick={() => setShowModal(false)}>
              <div className="modal-content p-8" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-light text-gray-800">📖 Hlustunartexti</h2>
                  <button
                    onClick={() => setShowModal(false)}
                    className="text-gray-400 hover:text-gray-600 text-2xl"
                  >
                    ✕
                  </button>
                </div>
                <div className="prose prose-lg max-w-none">
                  {LISTENING_TEXT.split('\n\n').map((para, i) => (
                    <p key={i} className="text-gray-700 leading-relaxed mb-4 font-light">{para}</p>
                  ))}
                </div>
                <div className="mt-8 p-4 bg-green-50 rounded-lg">
                  <h3 className="font-semibold text-green-800 mb-2">📊 Niðurstöður</h3>
                  <p className="text-sm text-green-700">Rétt/Rangt: {tfScore}/{TRUE_FALSE.length}</p>
                  <p className="text-sm text-green-700">Krossaspurningar: {mcScore}/{MULTIPLE_CHOICE.length}</p>
                  <p className="text-sm text-green-700">Stuttar spurningar: {openDone}/{OPEN_QUESTIONS.length} svarað</p>
                  <p className="text-sm text-green-700">Þýðingar: {transDone}/{TRANSLATION_WORDS.length} svarað</p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
