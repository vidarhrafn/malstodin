<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COURSE = 'isat1ic';

  async function writeProgress(exerciseId, status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, exerciseId);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) {
      // Fail silently — never interrupt exercise
    }
  }

  window.writeProgress = writeProgress;
</script>

<script type="text/babel">
  const { useState, useRef, useEffect, useMemo } = React;

  /* ── API ─────────────────────────────────────────────────────────── */
  async function callOpenAI(messages, maxTokens = 120, temperature = 0.2, model = 'gpt-4o-mini') {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, max_tokens: maxTokens, model, temperature }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }

  /* ── Gögn ────────────────────────────────────────────────────────── */
  const VOCAB = [
    { w: 'heimsreisa', kyn: 'kvk', hint: 'ferðalag um heiminn' },
    { w: 'málverk',    kyn: 'hk',  hint: 'mynd sem listamaður málar' },
    { w: 'listasafn',  kyn: 'hk',  hint: 'safn þar sem listaverk eru sýnd' },
    { w: 'dularfullur',kyn: 'lo',  hint: 'leyndardómsfullur, erfitt að skilja' },
    { w: 'að stela',   kyn: 'so',  hint: 'að taka eitthvað sem er ekki þitt' },
    { w: 'þjófur',     kyn: 'kk',  hint: 'maður sem stelur' },
    { w: 'handtekinn', kyn: 'lo',  hint: 'þegar lögreglan tekur mann fasta' },
    { w: 'tapas',      kyn: 'hk ft', hint: 'margir smáir réttir frá Spáni' },
    { w: 'ævintýri',   kyn: 'hk',  hint: 'spennandi upplifun' },
  ];

  const TRUE_FALSE = [
    { statement: 'Klara ætlar að fara til London.',          correct: false },
    { statement: 'Bao hefur séð Monu Lísu.',                 correct: true  },
    { statement: 'Þjófurinn var franskur.',                  correct: false },
    { statement: 'Klara ætlar að vera fimm daga í París.',   correct: false },
    { statement: 'Klara ætlar að borða tapas á Spáni.',      correct: true  },
  ];

  const MULTIPLE_CHOICE = [
    { q: 'Hvað er Klara að skipuleggja?',
      opts: ['Afmælisveislu','Heimsreisu','Brúðkaupsferðalag','Sumarbústaðaferð'], correct: 1 },
    { q: 'Hvar er Mona Lisa til sýnis?',
      opts: ['Í British Museum í London','Í Louvre safninu í París','Í Prado safninu í Madrid','Í Listasafni Íslands'], correct: 1 },
    { q: 'Hvað segir Bao um bros Monu Lísu?',
      opts: ['Það er sorglegt','Það er dularfullt','Það er hlægilegt','Það er reitt'], correct: 1 },
    { q: 'Hvað gerði þjófurinn með málverkið?',
      opts: ['Hann brenndi það','Hann faldi það í tvö ár','Hann gaf það syni sínum','Hann sendi það til Bandaríkjanna'], correct: 1 },
    { q: 'Hvað ætlar Klara að gera á Spáni?',
      opts: ['Fara á listasafn','Læra spænsku','Borða smárétti','Heimsækja vini'], correct: 2 },
  ];

  const SHORT_QUESTIONS = [
    { q: 'Hvers vegna hlakkar Klara til að fara til Parísar?',
      key: ['Mona Lisa','Monu Lísu','Louvre','listasafn','málverk'] },
    { q: 'Hvað gerðist árið 1911 og hvernig fannst málverkið aftur?',
      key: ['stolið','þjófur','ítalskur','faldi','tvö ár','selja','handtekinn'] },
    { q: 'Hvað ætlar Klara að gera í París fyrir utan að fara á Louvre?',
      key: ['Eiffelturninn','Champs-Élysées','ganga','sjá'] },
  ];

  const TRANSLATIONS = [
    { word: 'dularfullur' },
    { word: 'ógleymanlegar minningar' },
  ];

  // Samtalslínur fyrir lokakassa
  const LINES = [
    { who: 'Bryndís', text: '„Hvað ertu að skoða?"' },
    { who: 'Klara',   text: '„Ég er að skoða Louvre safnið í París. Ég hlakka svo mikið til að sjá Monu Lísu!"' },
    { who: 'Bao',     text: '„Mona Lisa! Það er frægasta málverk í heimi. Ég sá það þegar ég var ungur. Brosið á henni er svo dularfullt."' },
    { who: 'Klara',   text: '„Vissuð þið að málverkinu var stolið árið 1911? Þjófurinn var ítalskur maður og hann faldi málverkið í tvö ár."' },
    { who: 'Hólmfríður', text: '„Nei, það vissi ég ekki! Hvernig fannst það aftur?"' },
    { who: 'Klara',   text: '„Þjófurinn reyndi að selja það og var handtekinn. Málverkið fór aftur til Louvre."' },
    { who: 'Bryndís', text: '„Hversu lengi ætlar þú að vera í París?"' },
    { who: 'Klara',   text: '„Þrjá daga. Ég ætla líka að sjá Eiffelturninn og ganga um Champs-Élysées. Síðan fer ég til Spánar að borða tapas — margir smáir réttir en ekki einn stór aðalréttur."' },
    { who: 'Bao',     text: '„Það hljómar eins og ævintýri. Þetta verða ógleymanlegar minningar."' },
  ];

  const WHO_COLORS = {
    Klara:       { bg: 'bg-blue-50',   ring: 'bg-blue-100 text-blue-700' },
    Bao:         { bg: 'bg-amber-50',  ring: 'bg-amber-100 text-amber-700' },
    Bryndís:     { bg: 'bg-purple-50', ring: 'bg-purple-100 text-purple-700' },
    Hólmfríður:  { bg: 'bg-teal-50',   ring: 'bg-teal-100 text-teal-700' },
  };

  const TABS = [
    { id: 'tf',    label: 'Rétt/Rangt',        icon: '✅' },
    { id: 'mc',    label: 'Krossaspurningar',   icon: '🔵' },
    { id: 'short', label: 'Stuttar spurningar', icon: '📝' },
    { id: 'trans', label: 'Þýðingar',           icon: '🌍' },
  ];

  /* ── Íhlutir ─────────────────────────────────────────────────────── */
  const FeedbackBadge = ({ score, message, feedbackNative, correctTranslation, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
    const cls = {
      green: 'bg-green-50 border-green-200 text-green-700',
      amber: 'bg-amber-50 border-amber-200 text-amber-700',
      red:   'bg-red-50 border-red-200 text-red-700',
    }[color];
    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {feedbackNative && <p className="text-xs italic mt-1 opacity-80">{feedbackNative}</p>}
        {correctTranslation && <p className="text-xs mt-1 font-medium">✓ {correctTranslation}</p>}
        {onRetry && (
          <button onClick={onRetry} className="text-xs underline mt-2 opacity-70 block">
            Reyna aftur
          </button>
        )}
      </div>
    );
  };

  /* ── Aðalforrit ──────────────────────────────────────────────────── */
  const App = () => {
    const audioRef = useRef(null);
    const [isPlaying,    setIsPlaying]    = useState(false);
    const [playbackRate, setPlaybackRate] = useState(1);
    const [currentTime,  setCurrentTime]  = useState(0);
    const [duration,     setDuration]     = useState(0);

    const [showVocab,  setShowVocab]  = useState(true);
    const [activeTab,  setActiveTab]  = useState('tf');
    const [showText,   setShowText]   = useState(false);

    useEffect(() => {
      if (audioRef.current) audioRef.current.playbackRate = playbackRate;
    }, [playbackRate]);

    const formatTime = (sec) => {
      if (!sec || isNaN(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    };

    const togglePlay = () => {
      if (!audioRef.current) return;
      if (isPlaying) audioRef.current.pause();
      else audioRef.current.play();
    };

    const handleSeek = (e) => {
      const t = parseFloat(e.target.value);
      if (audioRef.current) { audioRef.current.currentTime = t; setCurrentTime(t); }
    };

    /* ── Rétt/Rangt ─────────────────────────────────────────────── */
    const [tfAnswers, setTfAnswers] = useState({});
    const [tfChecked, setTfChecked] = useState(false);
    const tfAllPicked = TRUE_FALSE.every((_, i) => tfAnswers[i] !== undefined);
    const checkTF = () => { if (tfAllPicked) setTfChecked(true); };
    const resetTF = () => { setTfAnswers({}); setTfChecked(false); };

    /* ── Krossaspurningar ────────────────────────────────────────── */
    const shuffledMC = useMemo(() => MULTIPLE_CHOICE.map(q => {
      const opts = q.opts.map((text, i) => ({ text, orig: i }));
      for (let i = opts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }
      return { q: q.q, opts, correct: q.correct };
    }), []);
    const [mcAnswers, setMcAnswers] = useState({});
    const [mcChecked, setMcChecked] = useState(false);
    const mcAllPicked = shuffledMC.every((_, i) => mcAnswers[i] !== undefined);
    const checkMC = () => { if (mcAllPicked) setMcChecked(true); };
    const resetMC = () => { setMcAnswers({}); setMcChecked(false); };

    /* ── Stuttar spurningar ──────────────────────────────────────── */
    const [shortAnswers,  setShortAnswers]  = useState(SHORT_QUESTIONS.map(() => ''));
    const [shortFeedback, setShortFeedback] = useState(SHORT_QUESTIONS.map(() => null));
    const [shortLoading,  setShortLoading]  = useState(SHORT_QUESTIONS.map(() => false));

    const checkShort = async (idx) => {
      const ans = shortAnswers[idx].trim();
      if (!ans) return;
      setShortLoading(p => { const n = [...p]; n[idx] = true; return n; });
      try {
        const { q, key } = SHORT_QUESTIONS[idx];
        const sys = `Þú ert íslenskukennari. Nemandinn svarar A2-stigs hlustunarspurningu.
Spurning: "${q}"
Lykilatriði í réttu svari: ${key.join(', ')}
Gefðu stig 0–5 eftir því hvað nemandinn nær vel yfir efnið. Hunsa smávægilegar málfræðivillur.
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]`;
        const result = await callOpenAI(
          [{ role: 'system', content: sys }, { role: 'user', content: ans }],
          80, 0.2
        );
        const stigMatch    = result.match(/STIG:\s*(\d)/);
        const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
        const score = stigMatch ? parseInt(stigMatch[1]) : 0;
        const msg   = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();
        setShortFeedback(p => { const n = [...p]; n[idx] = { score, msg }; return n; });
      } catch (e) { console.error(e); }
      finally { setShortLoading(p => { const n = [...p]; n[idx] = false; return n; }); }
    };

    const resetShort = (idx) => {
      setShortAnswers(p => { const n = [...p]; n[idx] = ''; return n; });
      setShortFeedback(p => { const n = [...p]; n[idx] = null; return n; });
    };

    /* ── Þýðingar ────────────────────────────────────────────────── */
    const [transAnswers,  setTransAnswers]  = useState(TRANSLATIONS.map(() => ''));
    const [transFeedback, setTransFeedback] = useState(TRANSLATIONS.map(() => null));
    const [transLoading,  setTransLoading]  = useState(TRANSLATIONS.map(() => false));

    const checkTrans = async (idx) => {
      const ans = transAnswers[idx].trim();
      if (!ans) return;
      setTransLoading(p => { const n = [...p]; n[idx] = true; return n; });
      try {
        const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${TRANSLATIONS[idx].word}"
SVAR NEMANDA: "${ans}"

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "detected_language": "nafn tungumálsins (t.d. enska, pólska, spænska)",
  "feedback_is": "Endurgjöf á íslensku",
  "feedback_native": "Endurgjöf á greinda tungumálinu",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}`;
        const result = await callOpenAI(
          [{ role: 'system', content: sys }, { role: 'user', content: ans }],
          200, 0.2, 'gpt-4o'
        );
        let parsed = null;
        try {
          const clean = result.replace(/```json\s*/g, '').replace(/```/g, '').trim();
          parsed = JSON.parse(clean);
        } catch {}
        if (parsed) {
          const score = parsed.correct ? 5 : 1;
          setTransFeedback(p => { const n = [...p]; n[idx] = { ...parsed, score }; return n; });
        }
      } catch (e) { console.error(e); }
      finally { setTransLoading(p => { const n = [...p]; n[idx] = false; return n; }); }
    };

    const resetTrans = (idx) => {
      setTransAnswers(p => { const n = [...p]; n[idx] = ''; return n; });
      setTransFeedback(p => { const n = [...p]; n[idx] = null; return n; });
    };

    /* ── Framvinda ───────────────────────────────────────────────── */
    const tabDone = {
      tf:    tfChecked,
      mc:    mcChecked,
      short: shortFeedback.every(f => f !== null),
      trans: transFeedback.every(f => f !== null),
    };
    const allDone = Object.values(tabDone).every(Boolean);
    const progressWritten = React.useRef(false);
    useEffect(() => {
      window.writeProgress && window.writeProgress('hlustun12_mona_lisa', 'opened');
    }, []);
    useEffect(() => {
      if (allDone && !progressWritten.current) {
        progressWritten.current = true;
        window.writeProgress && window.writeProgress('hlustun12_mona_lisa', 'completed');
      }
    }, [allDone]);

    /* ── Render ──────────────────────────────────────────────────── */
    return (
      <div style={{ minHeight: '100vh' }}>

        {/* ── HEADER ─────────────────────────────────────────────── */}
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <div className="flex items-start justify-between">
              <div>
                <button onClick={() => window.history.back()}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Hlustun: Mona Lisa</h1>
                <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A2</p>
              </div>
              <div className="flex gap-1 mt-2 flex-wrap justify-end">
                {['Klara','Bao','Bryndís','Hólmfríður'].map(name => (
                  <span key={name}
                    className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
                      ${WHO_COLORS[name].ring}`}>
                    {name}
                  </span>
                ))}
              </div>
            </div>
          </div>
        </header>

        {/* ── STICKY PLAYER ──────────────────────────────────────── */}
        <div className="sticky-player">
          <div className="max-w-4xl mx-auto px-6 py-4">
            <div className="flex items-center gap-4">
              <button onClick={togglePlay}
                className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center
                  justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm"
                aria-label={isPlaying ? 'Pása' : 'Spila'}>
                {isPlaying
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <rect x="6" y="4" width="4" height="16"/>
                      <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                }
              </button>

              <div className="flex-1">
                <p className="text-sm font-light text-gray-700 mb-2">🎧 Hlusta á samtalið</p>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-500 font-light w-8 text-right">
                    {formatTime(currentTime)}
                  </span>
                  <input type="range" min="0" max={duration || 0} value={currentTime}
                    step="0.1" onChange={handleSeek} className="progress-bar flex-1" />
                  <span className="text-xs text-gray-500 font-light w-8">
                    {formatTime(duration)}
                  </span>
                </div>
                <audio ref={audioRef} src="media/hlustun_mona_lisa.mp3" preload="metadata"
                  onPlay={() => setIsPlaying(true)}
                  onPause={() => setIsPlaying(false)}
                  onEnded={() => setIsPlaying(false)}
                  onTimeUpdate={() => setCurrentTime(audioRef.current?.currentTime || 0)}
                  onLoadedMetadata={() => setDuration(audioRef.current?.duration || 0)} />
              </div>

              <div className="flex gap-1.5">
                {[0.75, 1, 1.25].map(r => (
                  <button key={r} onClick={() => setPlaybackRate(r)}
                    className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors
                      ${playbackRate === r
                        ? 'bg-green-600 text-white'
                        : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
                    {r}×
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* ── MAIN ───────────────────────────────────────────────── */}
        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-24">

          {/* Leiðbeiningabox */}
          <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
            <ul className="space-y-1 text-sm font-light text-green-900">
              <li>📘 Lestu lykilorðin hér að neðan fyrst</li>
              <li>🎧 Hlustaðu á samtalið 2–3 sinnum</li>
              <li>✏️ Svaraðu öllum flokkum spurninga</li>
              <li>🔓 Þegar allt er lokið opnast textinn</li>
            </ul>
          </div>

          {/* Lykilorð */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <button onClick={() => setShowVocab(v => !v)}
              className="w-full flex items-center justify-between px-5 py-4 text-left hover:bg-gray-50 transition-colors">
              <span className="font-medium text-gray-700">📘 Lykilorð</span>
              <span className="text-gray-400 text-sm">{showVocab ? '▲ Fela' : '▼ Sýna'}</span>
            </button>
            <div className="vocab-panel" style={{ maxHeight: showVocab ? '600px' : '0', opacity: showVocab ? 1 : 0 }}>
              <div className="px-5 pb-5">
                <p className="text-sm font-light text-gray-500 mb-3">Lestu yfir orðin áður en þú hlustar.</p>
                <div className="grid gap-2" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))' }}>
                  {VOCAB.map((item, i) => (
                    <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                      <div className="font-medium text-sm">
                        {item.w} <span className="text-gray-500 font-light">({item.kyn})</span>
                      </div>
                      <div className="text-xs text-gray-600 font-light mt-0.5">{item.hint}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Flipaspjald */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

            {/* Tab bar – sticky under player */}
            <div className="bg-white border-b border-gray-200 sticky top-[73px] z-40 overflow-x-auto"
              style={{ scrollbarWidth: 'none' }}>
              <div className="flex">
                {TABS.map(tab => (
                  <button key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`tab-btn flex items-center gap-1.5 px-4 py-3.5 text-sm font-light text-gray-500 whitespace-nowrap border-b-2 border-transparent
                      ${activeTab === tab.id ? 'tab-active' : ''}`}>
                    <span>{tab.icon}</span>
                    <span>{tab.label}</span>
                    {tabDone[tab.id] && (
                      <span className="w-4 h-4 rounded-full bg-green-500 text-white text-xs
                        flex items-center justify-center ml-0.5">✓</span>
                    )}
                  </button>
                ))}
              </div>
            </div>

            <div className="p-6 fade-in" key={activeTab}>

              {/* ── RÉTT/RANGT ─────────────────────────────────── */}
              {activeTab === 'tf' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-4">✅ Rétt eða rangt?</h2>
                  <div className="space-y-3">
                    {TRUE_FALSE.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-light text-gray-800 mb-3">{item.statement}</p>
                        <div className="flex gap-2">
                          {[true, false].map(val => {
                            const sel = tfAnswers[idx] === val;
                            const label = val ? 'Rétt ✓' : 'Rangt ✗';
                            let cls = 'answer-option';
                            if (!tfChecked) {
                              if (sel) cls += ' opt-selected';
                            } else {
                              cls += ' opt-disabled';
                              if (item.correct === val) cls += ' opt-correct';
                              else if (sel) cls += ' opt-incorrect';
                            }
                            return (
                              <button key={String(val)} onClick={() => {
                                if (!tfChecked) setTfAnswers(p => ({ ...p, [idx]: val }));
                              }}
                                className={`${cls} flex-1 py-2 rounded-lg text-sm font-light text-center`}>
                                {label}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={checkTF}
                      disabled={!tfAllPicked || tfChecked}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
                        disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                      Athuga svör
                    </button>
                    {tfChecked && (
                      <button onClick={resetTF}
                        className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                          hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* ── KROSSASPURNINGAR ───────────────────────────── */}
              {activeTab === 'mc' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-4">🔵 Krossaspurningar</h2>
                  <div className="space-y-4">
                    {shuffledMC.map((q, qi) => (
                      <div key={qi} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-medium text-gray-800 mb-3">{q.q}</p>
                        <div className="space-y-2">
                          {q.opts.map((opt, si) => {
                            const sel = mcAnswers[qi] === si;
                            const isCorrect = opt.orig === q.correct;
                            let cls = 'answer-option w-full px-4 py-2.5 rounded-lg text-sm font-light';
                            if (!mcChecked) {
                              if (sel) cls += ' opt-selected';
                            } else {
                              cls += ' opt-disabled';
                              if (isCorrect) cls += ' opt-correct';
                              else if (sel) cls += ' opt-incorrect';
                            }
                            return (
                              <button key={si} onClick={() => {
                                if (!mcChecked) setMcAnswers(p => ({ ...p, [qi]: si }));
                              }} className={cls}>
                                {opt.text}
                                {mcChecked && isCorrect && ' ✓'}
                                {mcChecked && sel && !isCorrect && ' ✗'}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={checkMC}
                      disabled={!mcAllPicked || mcChecked}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
                        disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                      Athuga svör
                    </button>
                    {mcChecked && (
                      <button onClick={resetMC}
                        className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                          hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* ── STUTTAR SPURNINGAR ─────────────────────────── */}
              {activeTab === 'short' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-4">📝 Stuttar spurningar</h2>
                  <div className="space-y-4">
                    {SHORT_QUESTIONS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-medium text-gray-800 mb-3">{item.q}</p>
                        <textarea
                          value={shortAnswers[idx]}
                          onChange={e => setShortAnswers(p => { const n = [...p]; n[idx] = e.target.value; return n; })}
                          disabled={shortFeedback[idx] !== null}
                          placeholder="Skrifaðu svarið þitt hér..."
                          rows={3}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                            focus:outline-none focus:border-green-400 font-light resize-none
                            disabled:bg-gray-50 text-sm mb-3" />
                        {shortFeedback[idx] === null && (
                          <button onClick={() => checkShort(idx)}
                            disabled={!shortAnswers[idx].trim() || shortLoading[idx]}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLoading[idx] ? 'Athuga...' : 'Athuga svar'}
                          </button>
                        )}
                        {shortFeedback[idx] && (
                          <FeedbackBadge
                            score={shortFeedback[idx].score}
                            message={shortFeedback[idx].msg}
                            onRetry={shortFeedback[idx].score < 4 ? () => resetShort(idx) : null}
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── ÞÝÐINGAR ───────────────────────────────────── */}
              {activeTab === 'trans' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">🌍 Þýðingar</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">
                    Þýddu orðin á þitt eigið móðurmál.
                  </p>
                  <div className="space-y-4">
                    {TRANSLATIONS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm text-gray-700 mb-3">
                          Þýddu á þitt móðurmál:{' '}
                          <strong className="text-gray-900">{item.word}</strong>
                        </p>
                        <textarea
                          value={transAnswers[idx]}
                          onChange={e => setTransAnswers(p => { const n = [...p]; n[idx] = e.target.value; return n; })}
                          disabled={transFeedback[idx] !== null}
                          placeholder="Skrifaðu þýðinguna hér..."
                          rows={2}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                            focus:outline-none focus:border-green-400 font-light resize-none
                            disabled:bg-gray-50 text-sm mb-3" />
                        {transFeedback[idx] === null && (
                          <button onClick={() => checkTrans(idx)}
                            disabled={!transAnswers[idx].trim() || transLoading[idx]}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {transLoading[idx] ? 'Athuga...' : 'Athuga þýðingu'}
                          </button>
                        )}
                        {transFeedback[idx] && (
                          <FeedbackBadge
                            score={transFeedback[idx].score}
                            message={transFeedback[idx].feedback_is}
                            feedbackNative={transFeedback[idx].feedback_native}
                            correctTranslation={transFeedback[idx].correct_translation}
                            onRetry={!transFeedback[idx].correct ? () => resetTrans(idx) : null}
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

            </div>
          </div>

          {/* Lokakassi */}
          {allDone && (
            <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
              <p className="text-green-700 font-light text-sm mb-4">
                Þú hefur lokið öllum verkefnum. Nú getur þú lesið samtalið.
              </p>
              <button onClick={() => setShowText(v => !v)}
                className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                  transition-colors font-light text-sm">
                {showText ? '▲ Fela samtalið' : '📖 Lesa samtalið'}
              </button>

              {showText && (
                <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                  <h3 className="font-light text-gray-700 mb-4 text-sm">💬 Samtal um Monu Lísu</h3>
                  {LINES.map((line, i) => {
                    const c = WHO_COLORS[line.who] || { bg: 'bg-gray-50', ring: 'bg-gray-100 text-gray-700' };
                    return (
                      <div key={i} className="flex gap-2 mb-3">
                        <div className={`flex-shrink-0 w-7 h-7 rounded-full flex items-center
                          justify-center text-xs font-medium ${c.ring}`}>
                          {line.who[0]}
                        </div>
                        <div className={`max-w-sm px-3 py-2 rounded-xl text-sm font-light ${c.bg} text-gray-800`}>
                          <span className="block text-xs text-gray-400 mb-0.5">{line.who}</span>
                          {line.text}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

        </main>

        {/* ── FRAMVINDURAKI (fixed bottom) ───────────────────────── */}
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                  ${tabDone[tab.id]
                    ? 'bg-green-600 text-white'
                    : activeTab === tab.id
                      ? 'bg-gray-200 text-gray-700'
                      : 'bg-gray-100 text-gray-500'}`}>
                {tabDone[tab.id] ? '✓ ' : ''}{tab.label}
              </button>
            ))}
          </div>
        </div>

      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
