<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎧 Hlustun 10: Fallhlífarstökkið – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

    }

      from { opacity: 0; transform: translateY(10px); }

      -webkit-appearance: none;

      width: 100%;

      cursor: pointer;

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;

      cursor: pointer;

    .progress-bar::-moz-range-thumb {

      background: #16a34a;

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;

// ── API ──────────────────────────────────────────────────────────────────────

async function callOpenAI(messages, maxTokens = 120, model = 'gpt-4o-mini', temperature = 0.2) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens: maxTokens, model, temperature }),
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

// ── DATA ─────────────────────────────────────────────────────────────────────

const LISTENING_TEXT = [
  ['Bryndís', 'Klara, hvenær ferðu í heimsreisuna þína?'],
  ['Klara',   'Í maí! Ég er enn að vinna á leikskólanum og safna peningum. En ég er búin að skipuleggja alla ferðina.'],
  ['Bryndís', 'Frábært. Hvert ætlarðu?'],
  ['Klara',   'Fyrst fer ég til Evrópu. Ég ætla að skoða listasöfn og aðra menningu þar. Svo fer ég til Asíu og þar ætla ég að læra köfun.'],
  ['Bryndís', 'Hljómar vel. En hvað er þetta sem ég heyri um fallhlífarstökk?'],
  ['Klara',   'Já! Ég ætla í fallhlífarstökk í Sevilla á Spáni. Við stökkum úr flugvél í um þúsund metra hæð.'],
  ['Bryndís', 'Þúsund metra? Og hvað ef fallhlífin opnast ekki?'],
  ['Klara',   'Mamma! Það er alltaf varafallhlíf líka. Þetta er öruggt. Svo stökkur leiðbeinandinn með mér.'],
  ['Bryndís', 'Ég skil. En ég er svo hrædd um þig.'],
  ['Klara',   'Þetta er í lagi! Ég lofa að hringja í þig á hverjum degi.'],
  ['Bryndís', 'Jæja… Þá get ég sætt mig við það. Lofaðu mér að fara varlega!'],
  ['Klara',   'Ég lofa, mamma!'],
];

const VOCAB = [
  { word: 'heimsreisa',    gender: 'kvk.', meaning: 'ferðalag um heiminn' },
  { word: 'fallhlíf',      gender: 'kvk.', meaning: 'búnaður sem hægir á falli úr flugvél' },
  { word: 'varafallhlíf',  gender: 'kvk.', meaning: 'önnur fallhlíf, til öryggis' },
  { word: 'að stökkva',    gender: 'sögn', meaning: 'hoppa úr flugvél' },
  { word: 'hæð',           gender: 'kvk.', meaning: 'fjarlægð frá jörðu upp' },
  { word: 'leiðbeinandi',  gender: 'kk.',  meaning: 'kennari sem aðstoðar og leiðbeinir' },
  { word: 'hrædd',         gender: 'lo.',  meaning: 'upplifir ótta' },
  { word: 'varlega',       gender: 'ao.',  meaning: 'passar vel upp á sig, á öruggan hátt' },
  { word: 'köfun',         gender: 'kvk.', meaning: 'ferðast undir yfirborð sjávar með búnaði' },
];

const TRUE_FALSE = [
  { s: 'Klara er að vinna á leikskóla.',         c: true  },
  { s: 'Klara ætlar fyrst til Asíu.',             c: false },
  { s: 'Fallhlífarstökkið er í Sevilla á Spáni.', c: true  },
  { s: 'Klara stekkur úr 500 metra hæð.',         c: false },
  { s: 'Klara ætlar líka í köfun.',               c: true  },
  { s: 'Bryndís er ánægð og hræðist ekkert.',     c: false },
];

const MC_ITEMS = [
  { q: 'Hvenær fer Klara í heimsreisuna?',
    options: ['Um vetur', 'Um sumar', 'Að vori', 'Strax'], correct: 2 },
  { q: 'Hvar ætlar Klara í fallhlífarstökk?',
    options: ['Í París', 'Í Asíu', 'Í Sevilla', 'Á Íslandi'], correct: 2 },
  { q: 'Af hverju er varafallhlífin mikilvæg?',
    options: ['Hún er stærri', 'Hún er til öryggis', 'Leiðbeinandinn þarf hana', 'Hún er léttari'], correct: 1 },
  { q: 'Hvað lofa Klara mömmu sinni?',
    options: ['Að fara varlega', 'Að sleppa fallhlífarstökkinu', 'Að taka mynd af Mona Lísu', 'Að koma heim fljótt'], correct: 0 },
];

const SHORT_ITEMS = [
  { q: 'Hvað ætlar Klara að gera í Asíu?',        model: 'Hún ætlar að læra köfun.' },
  { q: 'Af hverju er Bryndís hrædd?',              model: 'Hún er hrædd vegna fallhlífarstökksins.' },
];

const TRANSL_WORDS = ['fallhlíf', 'varafallhlíf', 'að fara varlega'];

const CONTEXT = LISTENING_TEXT.map(l => `${l[0]}: ${l[1]}`).join('\n');

// ── HELPERS ──────────────────────────────────────────────────────────────────

const FeedbackBadge = ({ score, message, feedbackNative, correctTranslation }) => {
  const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
  const colors = {
    green: 'bg-green-50 border-green-200 text-green-700',
    amber: 'bg-amber-50 border-amber-200 text-amber-700',
    red:   'bg-red-50 border-red-200 text-red-700',
  };
  return (
    <div className={`mt-3 p-3 rounded-lg border fade-in ${colors[color]}`}>
      <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
      <p className="text-sm font-light">{message}</p>
      {feedbackNative && <p className="text-xs italic mt-1 opacity-80">{feedbackNative}</p>}
      {correctTranslation && <p className="text-xs mt-1 font-medium">✓ {correctTranslation}</p>}
    </div>
  );
};

const formatTime = (sec) => {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
};

// ── TABS ─────────────────────────────────────────────────────────────────────

const TrueFalseTab = ({ onDone }) => {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  const checkAll = () => {
    setChecked(true);
    const score = TRUE_FALSE.filter((item, i) => answers[i] === (item.c ? 'rétt' : 'rangt')).length;
    onDone(score);
  };

  return (
    <div className="fade-in space-y-3">
      {TRUE_FALSE.map((item, i) => {
        const chosen = answers[i];
        const correct = item.c ? 'rétt' : 'rangt';
        const ok = chosen === correct;
        return (
          <div key={i} className="bg-white rounded-xl border border-gray-200 p-4">
            <p className="text-gray-800 font-light mb-3">{item.s}</p>
            <div className="flex gap-3">
              {['rétt', 'rangt'].map(val => {
                const isCorrectVal = val === correct;
                const isSelected = chosen === val;
                let cls = 'flex-1 py-2 rounded-lg border-2 text-sm font-light transition-all ';
                if (!checked) {
                  cls += isSelected ? 'border-green-500 bg-green-50 text-green-800' : 'border-gray-200 hover:border-gray-300';
                } else {
                  if (isCorrectVal) cls += 'border-green-500 bg-green-50 text-green-800 font-medium';
                  else if (isSelected) cls += 'border-red-400 bg-red-50 text-red-700';
                  else cls += 'border-gray-200 text-gray-400';
                }
                return (
                  <button key={val} disabled={checked}
                    onClick={() => setAnswers({ ...answers, [i]: val })}
                    className={cls}>
                    {checked && isCorrectVal ? '✓ ' : checked && isSelected && !isCorrectVal ? '✗ ' : ''}
                    {val === 'rétt' ? 'Rétt' : 'Rangt'}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
      {!checked && (
        <button onClick={checkAll}
          disabled={Object.keys(answers).length < TRUE_FALSE.length}
          className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 transition-colors font-light">
          Athuga svör →
        </button>
      )}
    </div>
  );
};

const MCTab = ({ onDone }) => {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState({});

  const shuffled = useMemo(() =>
    MC_ITEMS.map(item => {
      const opts = item.options.map((text, i) => ({ text, isCorrect: i === item.correct }));
      return opts.sort(() => Math.random() - 0.5);
    }), []);

  const checkAll = () => {
    const newChecked = {};
    MC_ITEMS.forEach((_, i) => { newChecked[i] = true; });
    setChecked(newChecked);
    const score = MC_ITEMS.filter((_, qi) => {
      const sel = answers[qi];
      return sel !== undefined && shuffled[qi][sel]?.isCorrect;
    }).length;
    onDone(score);
  };

  return (
    <div className="fade-in space-y-4">
      {MC_ITEMS.map((item, qi) => (
        <div key={qi} className="bg-white rounded-xl border border-gray-200 p-4">
          <p className="font-medium text-gray-800 mb-3">{qi + 1}. {item.q}</p>
          {shuffled[qi].map((opt, oi) => {
            const isSelected = answers[qi] === oi;
            const isDone = checked[qi];
            let cls = 'w-full text-left px-4 py-3 rounded-lg border-2 mb-2 text-sm font-light transition-all ';
            if (!isDone) {
              cls += isSelected ? 'border-green-500 bg-green-50' : 'border-gray-200 hover:border-gray-300';
            } else {
              if (opt.isCorrect) cls += 'border-green-500 bg-green-50 font-medium';
              else if (isSelected) cls += 'border-red-400 bg-red-50';
              else cls += 'border-gray-100 text-gray-400';
            }
            return (
              <button key={oi} disabled={isDone}
                onClick={() => setAnswers({ ...answers, [qi]: oi })}
                className={cls}>
                {isDone && opt.isCorrect ? '✓ ' : ''}{opt.text}
              </button>
            );
          })}
        </div>
      ))}
      {!Object.keys(checked).length && (
        <button onClick={checkAll}
          disabled={Object.keys(answers).length < MC_ITEMS.length}
          className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 transition-colors font-light">
          Athuga svör →
        </button>
      )}
    </div>
  );
};

const ShortTab = ({ onDone }) => {
  const [answers, setAnswers] = useState(SHORT_ITEMS.map(() => ''));
  const [feedback, setFeedback] = useState(SHORT_ITEMS.map(() => null));
  const [loading, setLoading]   = useState(SHORT_ITEMS.map(() => false));
  const doneCount = feedback.filter(f => f !== null).length;

  useEffect(() => {
    if (doneCount === SHORT_ITEMS.length) {
      const total = feedback.reduce((acc, f) => acc + (f?.score || 0), 0);
      onDone(Math.round(total / SHORT_ITEMS.length));
    }
  }, [doneCount]);

  const check = async (i) => {
    const ans = answers[i].trim();
    if (!ans) return;
    const newL = [...loading]; newL[i] = true; setLoading(newL);
    try {
      const prompt = `Þú ert íslenskukennari. Nemandi svaraði þessari spurningu:

SPURNING: "${SHORT_ITEMS[i].q}"
FYRIRMYNDARSVAR: "${SHORT_ITEMS[i].model}"
SVAR NEMANDA: "${ans}"
SAMTALIÐ: "${CONTEXT}"

Máttu gefa svigar hvað varðar stafsetningu og málfræði (A1-A2 nemandi).
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]`;
      const result = await callOpenAI([{ role: 'user', content: prompt }], 120, 'gpt-4o-mini', 0.2);
      const stigMatch = result.match(/STIG:\s*(\d)/);
      const endurgjofMatch = result.match(/ENDURGJÖF:\s*(.+)/);
      const score = stigMatch ? parseInt(stigMatch[1]) : 0;
      const msg = endurgjofMatch ? endurgjofMatch[1].trim() : result.trim();
      const newF = [...feedback]; newF[i] = { score, msg }; setFeedback(newF);
    } catch (e) { console.error(e); }
    const newL2 = [...loading]; newL2[i] = false; setLoading(newL2);
  };

  return (
    <div className="fade-in space-y-4">
      {SHORT_ITEMS.map((item, i) => (
        <div key={i} className="bg-white rounded-xl border border-gray-200 p-4">
          <p className="font-medium text-gray-800 mb-3">{i + 1}. {item.q}</p>
          <textarea value={answers[i]}
            onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
            disabled={!!feedback[i]}
            rows={2} placeholder="Skrifaðu svar hér..."
            className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light resize-none text-sm disabled:bg-gray-50" />
          {!feedback[i] && (
            <button onClick={() => check(i)}
              disabled={loading[i] || !answers[i].trim()}
              className="mt-2 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 transition-colors font-light text-sm">
              {loading[i] ? 'Mat í gangi...' : 'Athuga →'}
            </button>
          )}
          {feedback[i] && <FeedbackBadge score={feedback[i].score} message={feedback[i].msg} />}
        </div>
      ))}
    </div>
  );
};

const TranslTab = ({ onDone }) => {
  const [answers,  setAnswers]  = useState(TRANSL_WORDS.map(() => ''));
  const [feedback, setFeedback] = useState(TRANSL_WORDS.map(() => null));
  const [loading,  setLoading]  = useState(TRANSL_WORDS.map(() => false));
  const doneCount = feedback.filter(f => f !== null).length;

  useEffect(() => {
    if (doneCount === TRANSL_WORDS.length) onDone(5);
  }, [doneCount]);

  const check = async (i) => {
    const ans = answers[i].trim();
    if (!ans) return;
    const newL = [...loading]; newL[i] = true; setLoading(newL);
    try {
      const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${TRANSL_WORDS[i]}"
SVAR NEMANDA: "${ans}"

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": true/false,
  "detected_language": "nafn tungumálsins á ensku",
  "feedback_is": "Endurgjöf á íslensku (1 setning)",
  "feedback_native": "Same feedback in the detected language",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}`;
      const result = await callOpenAI(
        [{ role: 'system', content: sys }, { role: 'user', content: ans }],
        200, 'gpt-4o', 0.1
      );
      const clean = result.replace(/```json\s*/g, '').replace(/```/g, '').trim();
      const parsed = JSON.parse(clean);
      const newF = [...feedback];
      newF[i] = {
        score: parsed.correct ? 5 : 2,
        msg: parsed.feedback_is,
        feedbackNative: parsed.detected_language !== 'Icelandic' ? parsed.feedback_native : null,
        correctTranslation: parsed.correct_translation,
      };
      setFeedback(newF);
    } catch (e) { console.error(e); }
    const newL2 = [...loading]; newL2[i] = false; setLoading(newL2);
  };

  return (
    <div className="fade-in space-y-4">
      {TRANSL_WORDS.map((word, i) => (
        <div key={i} className="bg-white rounded-xl border border-gray-200 p-4">
          <p className="font-medium text-gray-800 mb-1">{word}</p>
          <p className="text-xs text-gray-500 font-light mb-3">Hvernig þýðir þú þetta orð?</p>
          <input type="text" value={answers[i]}
            onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
            disabled={!!feedback[i]}
            placeholder="Þýðingin hér..."
            className="w-full px-4 py-2.5 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light text-sm disabled:bg-gray-50" />
          {!feedback[i] && (
            <button onClick={() => check(i)}
              disabled={loading[i] || !answers[i].trim()}
              className="mt-2 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 transition-colors font-light text-sm">
              {loading[i] ? 'Mat í gangi...' : 'Athuga →'}
            </button>
          )}
          {feedback[i] && (
            <FeedbackBadge
              score={feedback[i].score}
              message={feedback[i].msg}
              feedbackNative={feedback[i].feedbackNative}
              correctTranslation={feedback[i].correctTranslation}
            />
          )}
        </div>
      ))}
    </div>
  );
};

// ── APP ──────────────────────────────────────────────────────────────────────

const TABS = [
  { id: 'tf',    label: 'Rétt/Rangt',      icon: '✅' },
  { id: 'mc',    label: 'Krossaspurningar', icon: '🔵' },
  { id: 'short', label: 'Stuttar spurningar',    icon: '📝' },
  { id: 'transl',label: 'Þýðingar',         icon: '🔵' },
];

const App = () => {
  const audioRef = useRef(null);
  const [isPlaying,    setIsPlaying]    = useState(false);
  const [playbackRate, setPlaybackRate] = useState(1);
  const [currentTime,  setCurrentTime]  = useState(0);
  const [duration,     setDuration]     = useState(0);
  const [showVocab,    setShowVocab]    = useState(true);
  const [activeTab,    setActiveTab]    = useState('tf');
  const [tabDone,      setTabDone]      = useState({ tf: false, mc: false, short: false, transl: false });
  const [showTranscript, setShowTranscript] = useState(false);

  const allDone = Object.values(tabDone).every(Boolean);

  useEffect(() => {
    if (audioRef.current) audioRef.current.playbackRate = playbackRate;
  }, [playbackRate]);

  const togglePlay = () => {
    if (!audioRef.current) return;
    if (isPlaying) audioRef.current.pause();
    else audioRef.current.play();
  };

  const markDone = (id) => setTabDone(prev => ({ ...prev, [id]: true }));

  return (
    <div>
      {/* HAUS */}
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <div className="flex justify-between items-start">
            <div>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Hlustun 10: Fallhlífarstökkið</h1>
              <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
            </div>
            <div className="flex gap-1 flex-wrap justify-end">
              <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Bryndís</span>
              <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Klara</span>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">

        {/* LEIÐBEININGABOX */}
        <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
          <div className="space-y-1 text-sm font-light text-green-800">
            <p>📘 Lestu lykilorðin hér að neðan fyrst</p>
            <p>🎧 Hlustaðu á samtalið 2–3 sinnum</p>
            <p>✏️ Svaraðu öllum flokkum spurninga</p>
            <p>🔓 Þegar allt er lokið opnast textinn</p>
          </div>
        </div>

        {/* LYKILORÐ */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <button onClick={() => setShowVocab(!showVocab)}
            className="flex items-center gap-2 text-sm font-medium text-gray-700 w-full text-left">
            <span>{showVocab ? '▲' : '▼'}</span>
            <span>📘 Lykilorð</span>
            <span className="text-gray-400 font-light ml-auto">{showVocab ? 'Fela' : 'Sýna'}</span>
          </button>
          {showVocab && (
            <div className="mt-4 grid grid-cols-2 gap-2 fade-in">
              {VOCAB.map((v, i) => (
                <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                  <div className="font-medium text-sm">{v.word} <span className="text-gray-500 font-light">({v.gender})</span></div>
                  <div className="text-xs text-gray-600 font-light">{v.meaning}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* HLJÓÐSPILARI */}
        <div style={{ position: 'sticky', top: 0, zIndex: 50, background: 'white', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.08)' }}>
          <div className="max-w-4xl mx-auto px-6 py-4">
            <audio ref={audioRef} src="media/hlustun10_fallhlifarstokk.mp3" preload="metadata"
              onPlay={() => setIsPlaying(true)}
              onPause={() => setIsPlaying(false)}
              onEnded={() => setIsPlaying(false)}
              onTimeUpdate={() => audioRef.current && setCurrentTime(audioRef.current.currentTime)}
              onLoadedMetadata={() => audioRef.current && setDuration(audioRef.current.duration)} />
            <div className="flex items-center gap-4">
              <button onClick={togglePlay}
                className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm">
                {isPlaying
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
              </button>
              <div className="flex-1">
                <p className="text-sm font-light text-gray-700 mb-2">🎧 Hlusta á samtalið</p>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-500 font-light w-8 text-right">{formatTime(currentTime)}</span>
                  <input type="range" min="0" max={duration || 0} value={currentTime}
                    onChange={e => {
                      const t = parseFloat(e.target.value);
                      if (audioRef.current) { audioRef.current.currentTime = t; setCurrentTime(t); }
                    }}
                    className="progress-bar flex-1" />
                  <span className="text-xs text-gray-500 font-light w-8">{formatTime(duration)}</span>
                </div>
              </div>
              <div className="flex gap-1.5">
                {[0.75, 1, 1.25].map(rate => (
                  <button key={rate} onClick={() => setPlaybackRate(rate)}
                    className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors
                      ${playbackRate === rate ? 'bg-green-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
                    {rate}×
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* FLIPASLÁ */}
        <div style={{ position: 'sticky', top: 72, zIndex: 40, background: 'white' }}>
          <div className="max-w-4xl mx-auto">
            <div className="bg-white rounded-t-xl shadow-sm border border-gray-100">
              <div className="flex border-b border-gray-200 px-2 pt-2">
                {TABS.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`tab-btn px-4 py-2.5 text-sm font-light transition-all relative mr-1
                      ${activeTab === tab.id
                        ? 'active text-green-700 border-b-2 border-green-600 -mb-px bg-white'
                        : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-t-lg'}`}>
                    {tabDone[tab.id] ? '✓ ' : `${tab.icon} `}{tab.label}
                  </button>
                ))}
              </div>

              {/* FLIPAEFNI */}
              <div className="p-5">
                {activeTab === 'tf'    && <TrueFalseTab key="tf"    onDone={() => markDone('tf')} />}
                {activeTab === 'mc'    && <MCTab        key="mc"    onDone={() => markDone('mc')} />}
                {activeTab === 'short' && <ShortTab     key="short" onDone={() => markDone('short')} />}
                {activeTab === 'transl'&& <TranslTab    key="transl"onDone={() => markDone('transl')} />}
              </div>
            </div>
          </div>
        </div>

        {/* LOKAKASSI */}
        {allDone && (
          <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in mt-4">
            <div className="text-4xl mb-3">🎉</div>
            <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
            <p className="text-green-700 font-light text-sm mb-4">Þú hefur lokið öllum verkefnum. Nú getur þú lesið samtalið.</p>
            <button onClick={() => setShowTranscript(!showTranscript)}
              className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
              {showTranscript ? '▲ Fela samtalið' : '📖 Lesa samtalið'}
            </button>
            {showTranscript && (
              <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                <h3 className="font-light text-gray-700 mb-4 text-sm">💬 Bryndís og Klara</h3>
                {LISTENING_TEXT.map((line, i) => {
                  const isKlara = line[0] === 'Klara';
                  return (
                    <div key={i} className={`flex gap-2 mb-2 ${isKlara ? 'flex-row-reverse' : ''}`}>
                      <div className={`flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium
                        ${isKlara ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700'}`}>
                        {line[0][0]}
                      </div>
                      <div className={`max-w-xs px-3 py-2 rounded-xl text-sm font-light
                        ${isKlara ? 'bg-amber-50 text-gray-800' : 'bg-green-50 text-gray-800'}`}>
                        <span className="block text-xs text-gray-400 mb-0.5">{line[0]}</span>
                        {line[1]}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </main>

      {/* FRAMVINDUREIT */}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
        <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                ${tabDone[tab.id]
                  ? 'bg-green-600 text-white'
                  : activeTab === tab.id
                    ? 'bg-green-50 text-green-700 border border-green-200'
                    : 'bg-gray-100 text-gray-500'}`}>
              {tabDone[tab.id] ? '✓ ' : ''}{tab.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
