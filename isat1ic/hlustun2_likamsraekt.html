<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎧 Hlustun 2: Líkamsrækt – A2</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }
    .answer-option { border: 2px solid #e5e7eb; transition: all 0.2s; cursor: pointer; }
    .answer-option:hover:not(.disabled) { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.selected { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.correct { border-color: #16a34a; background: #f0fdf4; }
    .answer-option.incorrect { border-color: #dc2626; background: #fef2f2; }
    .answer-option.disabled { cursor: default; }
    .tab-btn { transition: all 0.2s; border-bottom: 3px solid transparent; }
    .tab-btn:hover:not(.tab-active) { background: #f9fafb; }
    .tab-btn.tab-active { border-bottom: 3px solid #3b82f6; color: #2563eb; background: white; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    const LISTENING_TEXT = `Alex er nýbyrjaður í Kvennó og stendur úti á gangi og bíður eftir næsta tíma. Hann sér strák sem hann kannast við.

Alex: Hæ, sá ég þig ekki í ræktinni í gær? Í World Class?

Þorsteinn: Jú, einmitt! Ég æfi þar oft. Ertu líka að æfa þar?

Alex: Já, ég fer nokkrum sinnum í viku. Ég er að reyna að fá meira þrek. Ég er svo oft þreyttur eftir skólann.

Þorsteinn: Já, ég skil þig. Ég er meira að lyfta lóðum til að byggja upp vöðva.

Alex: Já ok. Ég fer líka á hlaupabretti stundum. Finnst þér gott að æfa í World Class?

Þorsteinn: Já, það eru fín tæki og stór líkamsræktarstöð. Ég keypti mér árskort. En þú?

Alex: Ég keypti þriggja mánaða kort meðan ég er að ákveða hvort ég fíli þetta.

Þorsteinn: Nákvæmlega. Og hvernig ertu að fíla þig?

Alex: Bara vel. Ég þarf að muna að teygja eftir æfingar til að fá ekki harðsperrur.

Þorsteinn: Já, það er vel þreytt! Ég þarf að fara í tíma. Sjáumst í ræktinni.`;

    const VOCAB = [
      { w: "líkamsræktarstöð (kvk)", hint: "staður með tækjum til að æfa, t.d. World Class" },
      { w: "þrek (hk)", hint: "að geta haldið áfram að hreyfa sig lengi án þess að verða þreyttur" },
      { w: "vöðvi (kk)", hint: "hluti af líkamanum sem verður sterkari þegar þú æfir" },
      { w: "kort (hk)", hint: "það sem þú kaupir til að fá að fara í ræktina" },
      { w: "að teygja", hint: "að teygja líkamann fyrir eða eftir æfingu" },
      { w: "að fíla", hint: "að finnast eitthvað skemmtilegt eða gott" },
      { w: "harðsperrur (kvk)", hint: "þegar vöðvar eru sárir og stífir eftir æfingu" }
    ];

    const TRUE_FALSE = [
      { statement: 'Alex og Þorsteinn hittast í líkamsræktarstöðinni.', correct: false },
      { statement: 'Alex er að reyna að fá meira þrek.', correct: true },
      { statement: 'Þorsteinn er mest að hlaupa á hlaupabretti.', correct: false },
      { statement: 'Alex keypti árskort í World Class.', correct: false },
      { statement: 'Alex þarf að muna að teygja eftir æfingar.', correct: true }
    ];

    const MULTIPLE_CHOICE = [
      {
        question: 'Hvar hittast Alex og Þorsteinn fyrst?',
        options: ['Í World Class', 'Úti á gangi í Kvennó', 'Í matsalnum', 'Í tíma'],
        correct: 1
      },
      {
        question: 'Hvað er Þorsteinn mest að gera í ræktinni?',
        options: ['Að hlaupa á hlaupabretti', 'Að synda', 'Að lyfta lóðum', 'Að teygja'],
        correct: 2
      },
      {
        question: 'Hvers konar kort keypti Alex?',
        options: ['Árskort', 'Mánaðarkort', 'Þriggja mánaða kort', 'Vikukort'],
        correct: 2
      },
      {
        question: 'Af hverju þarf Alex að teygja eftir æfingar?',
        options: ['Til að fá betra þrek', 'Til að fá ekki harðsperrur', 'Til að byggja upp vöðva', 'Til að verða ekki þreyttur'],
        correct: 1
      }
    ];

    const OPEN_QUESTIONS = [
      { question: 'Hvernig líður Alex oft eftir skólann?', expectedContent: ['þreyttur'] },
      { question: 'Í hvaða líkamsræktarstöð æfa Alex og Þorsteinn?', expectedContent: ['world class', 'world', 'class'] },
      { question: 'Hvað er Alex að ákveða með þriggja mánaða kortinu?', expectedContent: ['hvort', 'fíli', 'fíla', 'ákveða'] },
      { question: 'Hvað segir Þorsteinn að lokum áður en hann fer í tíma?', expectedContent: ['sjáumst', 'ræktinni', 'sjáumst í ræktinni'] }
    ];

    const MATCHING = [
      { left: 'Líkamsrækt', right: 'Að æfa líkamann' },
      { left: 'Þrek', right: 'Að geta haldið áfram lengi án þess að verða þreyttur' },
      { left: 'Harðsperrur', right: 'Þegar vöðvar eru sárir eftir æfingu' },
      { left: 'Hlaupabretti', right: 'Tæki í ræktinni til að hlaupa á' }
    ];

    const TABS = [
      { id: 'rettrangt', label: 'Rétt/Rangt', icon: '✓' },
      { id: 'krossar', label: 'Krossaspurningar', icon: '☑' },
      { id: 'opnar', label: 'Stuttar spurningar', icon: '📝' },
      { id: 'para', label: 'Paraðu saman', icon: '🔗' },
    ];

    // ── AudioPlayer ────────────────────────────────────────────────
    const AudioPlayer = () => {
      const [playbackRate, setPlaybackRate] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const audioRef = useRef(null);

      const togglePlay = () => {
        if (!audioRef.current) return;
        isPlaying ? audioRef.current.pause() : audioRef.current.play();
      };
      const changeRate = (r) => {
        setPlaybackRate(r);
        if (audioRef.current) audioRef.current.playbackRate = r;
      };
      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate]);

      return (
        <div className="bg-gradient-to-r from-blue-50 to-blue-100 rounded-xl p-4 border border-blue-200 flex items-center gap-4">
          <button onClick={togglePlay}
            className="bg-blue-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-blue-700 transition-colors flex-shrink-0 shadow-sm"
            aria-label={isPlaying ? 'Pása' : 'Spila'}>
            {isPlaying
              ? <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
          </button>
          <div className="flex-1">
            <p className="text-sm font-light text-blue-800">🎧 Hlusta á samtalið</p>
            <audio ref={audioRef} src="media/hlustun2_likamsraekt.mp3" preload="none"
              onEnded={() => setIsPlaying(false)}
              onPlay={() => setIsPlaying(true)}
              onPause={() => setIsPlaying(false)} />
          </div>
          <div className="flex gap-1">
            {[0.75, 1, 1.25].map(r => (
              <button key={r} onClick={() => changeRate(r)}
                className={`px-3 py-1 rounded-lg text-xs font-light transition-colors ${playbackRate === r ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-100'}`}>
                {r}×
              </button>
            ))}
          </div>
        </div>
      );
    };

    // ── Tab: Rétt/Rangt ───────────────────────────────────────────
    const RettRangt = ({ onComplete }) => {
      const [answers, setAnswers] = useState([]);
      const [checked, setChecked] = useState(false);

      const score = answers.filter((a, i) => a === TRUE_FALSE[i].correct).length;

      useEffect(() => {
        if (checked) onComplete(score);
      }, [checked]);

      const handleAnswer = (i, val) => {
        if (checked) return;
        const n = [...answers]; n[i] = val; setAnswers(n);
      };
      const reset = () => { setAnswers([]); setChecked(false); };

      return (
        <div className="fade-in space-y-4">
          <p className="text-sm text-gray-500 font-light mb-4">Er setningin rétt eða röng samkvæmt samtalinu?</p>
          {TRUE_FALSE.map((item, i) => (
            <div key={i} className="border border-gray-100 rounded-xl p-4 bg-white shadow-sm">
              <p className="font-light text-gray-800 mb-3">{item.statement}</p>
              <div className="flex gap-3">
                {[true, false].map(val => {
                  const sel = answers[i] === val;
                  const showCorrect = checked && val === item.correct;
                  const showWrong = checked && sel && val !== item.correct;
                  return (
                    <div key={String(val)} onClick={() => handleAnswer(i, val)}
                      className={`answer-option flex-1 p-2 rounded-lg text-center text-sm
                        ${sel && !checked ? 'selected' : ''}
                        ${showCorrect ? 'correct' : ''}
                        ${showWrong ? 'incorrect' : ''}
                        ${checked ? 'disabled' : ''}`}>
                      <span className="font-light">{val ? 'Rétt ✓' : 'Rangt ✗'}</span>
                    </div>
                  );
                })}
              </div>
              {checked && answers[i] !== item.correct && (
                <p className="text-xs text-green-700 mt-2 font-light">
                  ✓ Rétt svar: {item.correct ? 'Rétt' : 'Rangt'}
                </p>
              )}
            </div>
          ))}
          {!checked ? (
            <div className="flex gap-3 pt-2">
              <button onClick={() => setChecked(true)}
                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                Athuga svör
              </button>
              <button onClick={reset}
                className="px-6 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 font-light text-sm">
                Endurstilla
              </button>
            </div>
          ) : (
            <div className="bg-green-50 border border-green-200 rounded-xl p-4">
              <p className="text-green-700 font-light">✓ Þú fékkst <strong>{score}</strong> af {TRUE_FALSE.length} rétt!</p>
              <button onClick={reset} className="mt-2 text-sm text-gray-500 hover:text-gray-700 font-light underline">Reyna aftur</button>
            </div>
          )}
        </div>
      );
    };

    // ── Tab: Krossaspurningar ─────────────────────────────────────
    const Krossar = ({ onComplete }) => {
      const [answers, setAnswers] = useState([]);
      const [checked, setChecked] = useState(false);

      const score = answers.filter((a, i) => a === MULTIPLE_CHOICE[i].correct).length;

      useEffect(() => {
        if (checked) onComplete(score);
      }, [checked]);

      const reset = () => { setAnswers([]); setChecked(false); };

      return (
        <div className="fade-in space-y-5">
          <p className="text-sm text-gray-500 font-light">Merktu við eitt svar (A–D).</p>
          {MULTIPLE_CHOICE.map((q, qi) => (
            <div key={qi} className="border border-gray-100 rounded-xl p-5 bg-white shadow-sm">
              <p className="font-light text-gray-800 mb-3">{qi + 1}. {q.question}</p>
              <div className="space-y-2">
                {q.options.map((opt, oi) => {
                  const sel = answers[qi] === oi;
                  const showCorrect = checked && oi === q.correct;
                  const showWrong = checked && sel && oi !== q.correct;
                  return (
                    <div key={oi} onClick={() => { if (!checked) { const n=[...answers]; n[qi]=oi; setAnswers(n); } }}
                      className={`answer-option p-3 rounded-lg flex items-center gap-3
                        ${sel && !checked ? 'selected' : ''}
                        ${showCorrect ? 'correct' : ''}
                        ${showWrong ? 'incorrect' : ''}
                        ${checked ? 'disabled' : ''}`}>
                      <div className={`w-4 h-4 rounded-full border-2 flex-shrink-0 flex items-center justify-center
                        ${sel && !checked ? 'border-blue-500 bg-blue-500' : showCorrect ? 'border-green-600 bg-green-600' : showWrong ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                        {(sel || showCorrect) && <div className="w-1.5 h-1.5 bg-white rounded-full" />}
                      </div>
                      <span className="font-light text-sm">{String.fromCharCode(65+oi)}. {opt}</span>
                      {showCorrect && <span className="ml-auto text-green-600 text-sm">✓</span>}
                      {showWrong && <span className="ml-auto text-red-500 text-sm">✗</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {!checked ? (
            <div className="flex gap-3 pt-2">
              <button onClick={() => setChecked(true)}
                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                Athuga svör
              </button>
              <button onClick={reset}
                className="px-6 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 font-light text-sm">
                Endurstilla
              </button>
            </div>
          ) : (
            <div className="bg-green-50 border border-green-200 rounded-xl p-4">
              <p className="text-green-700 font-light">✓ Þú fékkst <strong>{score}</strong> af {MULTIPLE_CHOICE.length} rétt!</p>
              <button onClick={reset} className="mt-2 text-sm text-gray-500 hover:text-gray-700 font-light underline">Reyna aftur</button>
            </div>
          )}
        </div>
      );
    };

    // ── Tab: Stuttar spurningar ───────────────────────────────────
    const Opnar = ({ onComplete }) => {
      const [answers, setAnswers] = useState(Array(OPEN_QUESTIONS.length).fill(''));
      const [feedback, setFeedback] = useState(Array(OPEN_QUESTIONS.length).fill(null));

      const allDone = feedback.every(f => f !== null);
      useEffect(() => {
        if (allDone) onComplete(feedback.filter(f => f?.correct).length);
      }, [allDone]);

      const check = (i) => {
        const ua = answers[i].trim().toLowerCase();
        if (!ua) { alert('Vinsamlegast skrifaðu eitthvað.'); return; }
        const q = OPEN_QUESTIONS[i];
        const found = q.expectedContent.filter(k => ua.includes(k));
        const n = [...feedback];
        if (found.length >= Math.ceil(q.expectedContent.length / 2)) {
          n[i] = { correct: true, feedback: `Mjög gott!` };
        } else if (found.length > 0) {
          n[i] = { correct: true, feedback: `Gott! Þú gætir líka nefnt: ${q.expectedContent.filter(k => !found.includes(k)).join(', ')}` };
        } else {
          n[i] = { correct: false, feedback: `Reyndu aftur. Hugsaðu um: ${q.expectedContent.slice(0, 2).join(', ')}` };
        }
        setFeedback(n);
      };

      const retryOne = (i) => {
        const nf = [...feedback]; nf[i] = null; setFeedback(nf);
        const na = [...answers]; na[i] = ''; setAnswers(na);
      };

      return (
        <div className="fade-in space-y-5">
          <p className="text-sm text-gray-500 font-light">Svaraðu með þínum eigin orðum (1–2 setningar).</p>
          {OPEN_QUESTIONS.map((q, i) => (
            <div key={i} className="border border-gray-100 rounded-xl p-5 bg-white shadow-sm">
              <p className="font-light text-gray-800 mb-3">{i + 1}. {q.question}</p>
              {!feedback[i] ? (
                <div className="space-y-3">
                  <textarea value={answers[i]} onChange={e => { const n=[...answers]; n[i]=e.target.value; setAnswers(n); }}
                    rows={2} placeholder="Skrifaðu svarið þitt hér..."
                    className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none text-sm" />
                  <button onClick={() => check(i)}
                    className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                    Athuga svar
                  </button>
                </div>
              ) : (
                <div className={`rounded-xl p-4 border ${feedback[i].correct ? 'bg-green-50 border-green-200' : 'bg-amber-50 border-amber-200'}`}>
                  <p className={`text-sm font-light ${feedback[i].correct ? 'text-green-700' : 'text-amber-700'}`}>
                    {feedback[i].correct ? '✓' : '💡'} {feedback[i].feedback}
                  </p>
                  <button onClick={() => retryOne(i)}
                    className="mt-2 text-xs text-gray-400 hover:text-gray-600 underline font-light">
                    Reyna aftur
                  </button>
                </div>
              )}
            </div>
          ))}
          {allDone && (
            <div className="bg-green-50 border border-green-200 rounded-xl p-4">
              <p className="text-green-700 font-light">✓ Öllum spurningum svarað!</p>
            </div>
          )}
        </div>
      );
    };

    // ── Tab: Paraðu saman ─────────────────────────────────────────
    const Para = ({ onComplete }) => {
      const [answers, setAnswers] = useState(Array(MATCHING.length).fill(''));
      const [checked, setChecked] = useState(false);

      const shuffled = useMemo(() => {
        const arr = MATCHING.map(m => m.right);
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }, []);

      const score = answers.filter((v, i) => v === MATCHING[i].right).length;
      useEffect(() => { if (checked) onComplete(score); }, [checked]);

      const reset = () => { setAnswers(Array(MATCHING.length).fill('')); setChecked(false); };

      return (
        <div className="fade-in space-y-4">
          <p className="text-sm text-gray-500 font-light">Tengdu orðið við rétta skýringu.</p>
          {MATCHING.map((item, i) => (
            <div key={i} className="border border-gray-100 rounded-xl p-4 bg-white shadow-sm">
              <div className="flex items-center gap-3">
                <div className="w-32 flex-shrink-0">
                  <span className="font-light text-gray-800 text-sm">{item.left}</span>
                </div>
                <div className="text-gray-300 flex-shrink-0">→</div>
                <div className="flex-1">
                  <select value={answers[i]} onChange={e => { if (!checked) { const n=[...answers]; n[i]=e.target.value; setAnswers(n); } }}
                    disabled={checked}
                    className={`w-full px-3 py-2 border-2 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm
                      ${checked ? (answers[i]===item.right ? 'border-green-500 bg-green-50' : 'border-red-400 bg-red-50') : 'border-gray-200'}`}>
                    <option value="">Veldu...</option>
                    {shuffled.map((opt, j) => <option key={j} value={opt}>{opt}</option>)}
                  </select>
                </div>
                {checked && (
                  <div className="w-6 flex-shrink-0 text-center">
                    {answers[i] === item.right ? <span className="text-green-600">✓</span> : <span className="text-red-500">✗</span>}
                  </div>
                )}
              </div>
              {checked && answers[i] !== item.right && (
                <p className="text-xs text-green-700 mt-2 ml-36 font-light">✓ Rétt: {item.right}</p>
              )}
            </div>
          ))}
          {!checked ? (
            <div className="flex gap-3 pt-2">
              <button onClick={() => setChecked(true)}
                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                Athuga svör
              </button>
              <button onClick={reset}
                className="px-6 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 font-light text-sm">
                Endurstilla
              </button>
            </div>
          ) : (
            <div className="bg-green-50 border border-green-200 rounded-xl p-4">
              <p className="text-green-700 font-light">✓ Þú fékkst <strong>{score}</strong> af {MATCHING.length} rétt!</p>
              <button onClick={reset} className="mt-2 text-sm text-gray-500 hover:text-gray-700 font-light underline">Reyna aftur</button>
            </div>
          )}
        </div>
      );
    };

    // ── Aðalforritið ──────────────────────────────────────────────
    const HlustunLikamsraekt = () => {
      const [activeTab, setActiveTab] = useState('rettrangt');
      const [showText, setShowText] = useState(false);
      const [completed, setCompleted] = useState({
        rettrangt: null,
        krossar: null,
        opnar: null,
        para: null,
      });

      const handleComplete = (tabId, score) => {
        setCompleted(prev => ({ ...prev, [tabId]: score }));
      };

      const allDone = Object.values(completed).every(v => v !== null);
      const totalScore = Object.values(completed).reduce((a, b) => a + (b || 0), 0);
      const maxScore = TRUE_FALSE.length + MULTIPLE_CHOICE.length + OPEN_QUESTIONS.length + MATCHING.length;

      const tabIcons = { rettrangt: '✓', krossar: '☑', opnar: '📝', para: '🔗' };
      const tabLabels = { rettrangt: 'Rétt/Rangt', krossar: 'Krossaspurningar', opnar: 'Stuttar', para: 'Paraðu' };

      return (
        <div className="min-h-screen pb-16">
          {/* Header */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-400 hover:text-gray-600 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-1">Hlustun 2: Líkamsrækt</h1>
              <p className="text-gray-400 text-sm font-light">Hlustunarverkefni · A2</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-5">
            {/* Leiðbeiningar */}
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-5">
              <h2 className="font-light text-blue-800 mb-2">📋 Leiðbeiningar</h2>
              <ul className="text-sm text-blue-700 font-light space-y-1">
                <li>• Lestu lykilorðin hér að neðan fyrst</li>
                <li>• Hlustaðu á samtalið 2–3 sinnum áður en þú svarar</li>
                <li>• Þú getur farið á milli flipa eins og þér líkar</li>
              </ul>
            </div>

            {/* Lykilorð */}
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-5">
              <h2 className="font-light text-amber-800 mb-3">📘 Lykilorð</h2>
              <div className="grid sm:grid-cols-2 gap-2">
                {VOCAB.map((it, i) => (
                  <div key={i} className="bg-white/70 rounded-lg border border-amber-100 px-3 py-2">
                    <div className="font-light text-sm text-gray-900">{it.w}</div>
                    <div className="text-xs text-gray-500 font-light">{it.hint}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Hljóðspilari */}
            <AudioPlayer />

            {/* Textahnappurinn */}
            <div>
              <button onClick={() => setShowText(s => !s)}
                className="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 font-light transition-colors">
                <span>{showText ? '▲' : '▼'}</span>
                <span>📖 {showText ? 'Fela textann' : 'Sýna textann'}</span>
              </button>
              {showText && (
                <div className="mt-3 bg-white border border-gray-100 rounded-xl p-6 shadow-sm fade-in">
                  {LISTENING_TEXT.split('\n\n').map((p, i) => (
                    <p key={i} className="mb-3 text-gray-700 font-light leading-relaxed text-sm last:mb-0">{p}</p>
                  ))}
                </div>
              )}
            </div>

            {/* Flipakerfi */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              {/* Flipabar */}
              <div className="flex border-b border-gray-100 overflow-x-auto">
                {Object.keys(tabLabels).map(id => (
                  <button key={id} onClick={() => setActiveTab(id)}
                    className={`tab-btn flex-1 min-w-max px-4 py-3 text-sm font-light text-gray-600 flex items-center justify-center gap-2 whitespace-nowrap
                      ${activeTab === id ? 'tab-active font-normal' : ''}`}>
                    <span>{tabIcons[id]}</span>
                    <span>{tabLabels[id]}</span>
                    {completed[id] !== null && (
                      <span className="w-4 h-4 rounded-full bg-green-500 text-white text-xs flex items-center justify-center flex-shrink-0">✓</span>
                    )}
                  </button>
                ))}
              </div>

              {/* Flipainnihald */}
              <div className="p-6">
                {activeTab === 'rettrangt' && <RettRangt onComplete={s => handleComplete('rettrangt', s)} />}
                {activeTab === 'krossar' && <Krossar onComplete={s => handleComplete('krossar', s)} />}
                {activeTab === 'opnar' && <Opnar onComplete={s => handleComplete('opnar', s)} />}
                {activeTab === 'para' && <Para onComplete={s => handleComplete('para', s)} />}
              </div>
            </div>

            {/* Framvindustika */}
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <h3 className="text-sm font-light text-gray-500 mb-3">Framvinda</h3>
              <div className="flex gap-2">
                {Object.keys(tabLabels).map(id => (
                  <div key={id} className="flex-1">
                    <div className={`h-2 rounded-full transition-all duration-500
                      ${completed[id] !== null ? 'bg-green-500' : id === activeTab ? 'bg-blue-300' : 'bg-gray-200'}`} />
                    <p className="text-xs text-gray-400 font-light mt-1 text-center truncate">{tabLabels[id]}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Lokaniðurstaða */}
            {allDone && (
              <div className="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-xl p-8 text-center fade-in">
                <div className="text-5xl mb-3">🎉</div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Vel gert!</h2>
                <p className="text-gray-500 font-light mb-1">Þú kláraðir hlustunarverkefnið um líkamsrækt.</p>
                <p className="text-green-700 font-light text-sm">Heildarniðurstaða: {totalScore} af {maxScore} rétt</p>
              </div>
            )}
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HlustunLikamsraekt />);
  </script>
</body>
</html>
