<!DOCTYPE html>
<html lang="is">
<head>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    try {
      const snap = await getDoc(doc(db, 'user_access', user.uid));
      if (!snap.exists()) { window.location.href = 'login.html'; return; }
      const courseData = snap.data()['isat1ic'];
      if (!courseData || !courseData.activated_at) { window.location.href = 'login.html'; return; }
      if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) { window.location.href = 'login.html'; return; }
    } catch { window.location.href = 'login.html'; }
  });
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 Páskarnir á Íslandi - Interactive Reading (B1→A2)</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    
    .selectable-text {
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
      line-height: 1.8;
      -webkit-touch-callout: none;
    }
    
    .selectable-text::selection {
      background: #e3f2fd;
      color: #000;
    }
    
    .translation-popup {
      position: fixed;
      background: white;
      border: 3px solid #2196f3;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      z-index: 1000;
      max-width: 90vw;
      width: 400px;
      animation: slideUp 0.3s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .loading-dots::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const useState = React.useState;
    const useRef = React.useRef;

    const TEXT = ' Páskarnir eru spennandi tími á Íslandi. Þetta er tími þar sem við fáum frí frá skólanum og vinnu og við getum verið með fjölskyldunni okkar. Páskarnir eru kristin trúarhátíð. Þá minnumst við þess að Jesús var krossfestur á föstudaginn langa, sem er mjög sorglegur dagur í kristinni trú. Það er dagur þar sem fólk hugsar um fórnir og þjáningar. En páskarnir eru líka um von og nýtt líf, því á páskadag reis Jesús upp frá dauðum.\n\nÁður en páskarnir koma er dymbilvika, vikan á undan páskum. Á skírdag, fimmtudag í dymbilviku, borða margir góðan mat og margir hugsa um síðustu kvöldmáltíðina sem Jesú átti með lærisveinum sínum. Næsta dag er föstudagurinn langi. Þá minnumst við þess þegar Jesús var krossfestur. Á Íslandi er allt lokað á föstudaginn langa og flestir eru heima hjá sér að verja tíma með fjölskyldunni. Næsta sunnudag er svo páskadagur en þá reis Jesús upp frá dauðum. Mánudagurinn eftir páskadag er kallaður annar í páskum. Þá er frí í skóla og vinnu.\n\nEitt af því sem börn eru spenntust fyrir er páskaeggið! Páskaegg eru stór súkkulaðiegg full af nammi. Inni í egginu er líka lítill miði með málshætti eða spakmæli. Einn málsháttur er til dæmis "Morgunstund gefur gull í mund" en það þýðir að sá sem vaknar snemma á auðveldara með að eignast peninga. Það er alltaf spennandi að sjá hvað stendur á miðanum!\n\nFyrir marga er ferming líka mikilvægur hluti af páskunum. Ferming er þegar unglingar staðfesta trú sína í kristinni trú. Þeir læra um trú sína í fermingarfræðslu og halda svo stóra veislu með fjölskyldu og vinum. Þeir fá líka gjafir, oft peninga eða hluti sem þeir óska sér. Það er líka til borgaraleg ferming. Það er ekki trúarleg athöfn, heldur námskeið þar sem unglingar læra um lífið, siðferði og mannréttindi. Þeir læra um mikilvæg málefni eins og jafnrétti, umhverfisvernd og heimsspeki. Eftir námskeiðið er haldin veisla og þeir fá líka gjafir. Ferming er mikilvægur áfangi í lífi margra unglinga.\n\nPáskarnir eru tími til að vera saman, borða góðan mat og njóta frísins. Margar fjölskyldur fara í ferðalög um páskana, annað hvort innanlands eða utan. Aðrir kjósa að vera heima og njóta samverunnar. Hvort sem þú fagnar páskunum sem trúarhátíð eða bara sem tíma til að vera með fjölskyldunni, þá eru páskarnir alltaf sérstakir. Gleðilega páska!';

    const InteractiveReading = function() {
      const state1 = useState('');
      const userLanguageInput = state1[0];
      const setUserLanguageInput = state1[1];
      
      const state2 = useState('');
      const confirmedLanguage = state2[0];
      const setConfirmedLanguage = state2[1];
      
      const state3 = useState(false);
      const showPopup = state3[0];
      const setShowPopup = state3[1];
      
      const state4 = useState({ x: 0, y: 0 });
      const popupPosition = state4[0];
      const setPopupPosition = state4[1];
      
      const state5 = useState('');
      const selectedText = state5[0];
      const setSelectedText = state5[1];
      
      const state6 = useState('');
      const translation = state6[0];
      const setTranslation = state6[1];
      
      const state7 = useState(false);
      const isLoading = state7[0];
      const setIsLoading = state7[1];
      
      const textRef = useRef(null);

      const handleConfirmLanguage = function() {
        if (userLanguageInput.trim()) {
          setConfirmedLanguage(userLanguageInput.trim());
        }
      };

      const calculatePopupPosition = function(rect) {
        const popupWidth = 400;
        const popupHeight = 200; // Áætluð hæð
        const padding = 20;
        
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const scrollY = window.scrollY;
        
        // Reikna lárétta staðsetningu
        let x = rect.left + (rect.width / 2);
        
        // Passa að popup fari ekki út fyrir hægri brún
        if (x + (popupWidth / 2) > viewportWidth - padding) {
          x = viewportWidth - (popupWidth / 2) - padding;
        }
        
        // Passa að popup fari ekki út fyrir vinstri brún
        if (x - (popupWidth / 2) < padding) {
          x = (popupWidth / 2) + padding;
        }
        
        // Reikna lóðrétta staðsetningu
        let y = rect.bottom + scrollY + 10;
        
        // Ef popup fer út fyrir neðri brún, setja það fyrir ofan textann
        if (rect.bottom + popupHeight > viewportHeight + scrollY) {
          y = rect.top + scrollY - popupHeight - 10;
        }
        
        return { x: x, y: y };
      };

      const handleTextSelection = function() {
        setTimeout(function() {
          const selection = window.getSelection();
          const text = selection.toString().trim();
          
          if (text.length > 0 && confirmedLanguage) {
            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            
            setSelectedText(text);
            const newPos = calculatePopupPosition(rect);
            setPopupPosition(newPos);
            setShowPopup(true);
            setTranslation('');
          }
        }, 100);
      };

      const translateText = function() {
        setIsLoading(true);
        
        const systemPrompt = 'You are a helpful language learning assistant for Icelandic students.';
        const userPrompt = 'A student learning Icelandic (A2-B1 level) has selected this text and needs help understanding it in ' + confirmedLanguage + '.\n\nSELECTED TEXT (Icelandic):\n"' + selectedText + '"\n\nPlease provide:\n1. Translation to ' + confirmedLanguage + '\n2. A brief, simple explanation if needed (in ' + confirmedLanguage + ')\n\nKeep it concise and helpful for a language learner. If it is a single word, give the translation. If it is a phrase or sentence, translate it and optionally add a short note if there is cultural context.\n\nRespond ONLY in ' + confirmedLanguage + ' (not English, not Icelandic).';

        fetch('/.netlify/functions/openai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            max_tokens: 300,
            temperature: 0.3
          })
        })
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(function(data) {
          if (data.error) {
            throw new Error(data.error);
          }
          const aiResponse = data.content;
          setTranslation(aiResponse);
          setIsLoading(false);
        })
        .catch(function(error) {
          console.error('Translation error:', error);
          setTranslation('Úps! Villa kom upp. Reyndu aftur.');
          setIsLoading(false);
        });
      };

      const closePopup = function() {
        setShowPopup(false);
        setSelectedText('');
        setTranslation('');
        window.getSelection().removeAllRanges();
      };

      return (
        React.createElement('div', { className: 'min-h-screen pb-12' },
          React.createElement('header', { className: 'bg-white shadow-sm border-b border-gray-200' },
            React.createElement('div', { className: 'max-w-4xl mx-auto px-6 py-8' },
              React.createElement('h1', { className: 'text-3xl font-light text-gray-800 mb-2' }, '📖 Páskarnir á Íslandi'),
              React.createElement('p', { className: 'text-gray-500 text-sm font-light' }, 'Interactive Reading · B1 → A2')
            )
          ),

          React.createElement('main', { className: 'max-w-4xl mx-auto px-6 mt-8 space-y-8' },
            React.createElement('div', { className: 'bg-white rounded-lg shadow-sm p-6' },
              React.createElement('h2', { className: 'text-xl font-normal text-gray-800 mb-4' }, '🌐 Móðurmál'),
              
              !confirmedLanguage ? (
                React.createElement('div', { className: 'space-y-4' },
                  React.createElement('input', {
                    type: 'text',
                    value: userLanguageInput,
                    onChange: function(e) { setUserLanguageInput(e.target.value); },
                    onKeyPress: function(e) { if (e.key === 'Enter') { handleConfirmLanguage(); } },
                    placeholder: 'T.d. English, Polski, Tiếng Việt, 中文, Español...',
                    className: 'w-full p-4 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light text-lg'
                  }),
                  React.createElement('button', {
                    onClick: handleConfirmLanguage,
                    disabled: !userLanguageInput.trim(),
                    className: 'bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition-colors font-light disabled:bg-gray-400 disabled:cursor-not-allowed'
                  }, '✓ Staðfesta tungumál'),
                  React.createElement('p', { className: 'text-sm text-gray-600 font-light' },
                    'Skrifaðu nafn tungumálsins þíns og smelltu á "Staðfesta"'
                  )
                )
              ) : (
                React.createElement('div', { className: 'bg-green-50 border-2 border-green-200 rounded-lg p-4' },
                  React.createElement('p', { className: 'text-green-800 font-light mb-3' },
                    '✓ Valið móðurmál: ',
                    React.createElement('strong', null, confirmedLanguage)
                  ),
                  React.createElement('button', {
                    onClick: function() { setConfirmedLanguage(''); setUserLanguageInput(''); },
                    className: 'text-sm text-blue-600 hover:text-blue-800 font-light'
                  }, '↻ Breyta tungumáli')
                )
              )
            ),

            React.createElement('div', { className: 'bg-blue-50 border-2 border-blue-200 rounded-lg p-6' },
              React.createElement('h2', { className: 'text-xl font-normal text-gray-800 mb-3' }, '💡 Hvernig virkar þetta?'),
              React.createElement('ul', { className: 'space-y-2 text-gray-700 font-light' },
                React.createElement('li', null, '1️⃣ Veldu og staðfestu móðurmál þitt hér að ofan'),
                React.createElement('li', null, '2️⃣ Lestu textann að neðan'),
                React.createElement('li', null, '3️⃣ ', React.createElement('strong', null, 'Merktu'), ' orð eða setningu sem þú skilur ekki'),
                React.createElement('li', null, '4️⃣ Smelltu á ', React.createElement('strong', null, '"Þýða"'), ' hnappinn'),
                React.createElement('li', null, '5️⃣ Fáðu þýðingu á þínu máli! 🎉')
              )
            ),

            React.createElement('div', { className: 'bg-white rounded-lg shadow-sm p-8' },
              React.createElement('div', {
                ref: textRef,
                className: 'selectable-text text-gray-800 font-light text-lg leading-relaxed space-y-4' + (!confirmedLanguage ? ' opacity-40 pointer-events-none' : ''),
                onMouseUp: handleTextSelection,
                onTouchEnd: handleTextSelection
              },
                TEXT.split('\n\n').map(function(paragraph, i) {
                  return React.createElement('p', { key: i }, paragraph);
                })
              ),
              !confirmedLanguage && (
                React.createElement('div', { className: 'mt-4 text-center text-gray-500 font-light' },
                  '⬆️ Veldu móðurmál þitt fyrst'
                )
              )
            ),

            React.createElement('div', { className: 'bg-gradient-to-r from-green-50 to-green-100 border-2 border-green-200 rounded-lg p-8 text-center' },
              React.createElement('div', { className: 'text-6xl mb-4' }, '🎉'),
              React.createElement('h2', { className: 'text-2xl font-light text-gray-800 mb-3' }, 'Vel gert!'),
              React.createElement('p', { className: 'text-gray-600 font-light' },
                'Þú getur lesið B1 texta með hjálp AI þýðinganna!'
              )
            )
          ),

          showPopup && (
            React.createElement(React.Fragment, null,
              React.createElement('div', {
                className: 'fixed inset-0 bg-black bg-opacity-20 z-50',
                onClick: closePopup
              }),
              React.createElement('div', {
                className: 'translation-popup',
                style: {
                  left: popupPosition.x + 'px',
                  top: popupPosition.y + 'px',
                  transform: 'translateX(-50%)'
                }
              },
                React.createElement('div', { className: 'flex items-start justify-between mb-3' },
                  React.createElement('div', { className: 'flex-1' },
                    React.createElement('div', { className: 'text-xs text-gray-500 mb-1' }, 'Valið texti:'),
                    React.createElement('div', { className: 'font-normal text-gray-800 text-sm mb-3 italic' },
                      '"' + selectedText + '"'
                    )
                  ),
                  React.createElement('button', {
                    onClick: closePopup,
                    className: 'text-gray-400 hover:text-gray-600 text-2xl leading-none ml-2'
                  }, '×')
                ),

                !translation ? (
                  React.createElement('button', {
                    onClick: translateText,
                    disabled: isLoading,
                    className: 'w-full bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition-colors font-light disabled:bg-gray-400'
                  },
                    isLoading ? (
                      React.createElement('span', { className: 'loading-dots' }, 'Þýði')
                    ) : (
                      '🌐 Þýða á ' + confirmedLanguage
                    )
                  )
                ) : (
                  React.createElement('div', { className: 'bg-blue-50 border-2 border-blue-200 rounded-lg p-4' },
                    React.createElement('div', { className: 'text-xs text-gray-500 mb-2' }, '🌐 Þýðing:'),
                    React.createElement('div', { className: 'font-light text-gray-800 whitespace-pre-wrap' },
                      translation
                    )
                  )
                )
              )
            )
          )
        )
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InteractiveReading));
  </script>
</body>
</html>
