<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 Spjall 1: Áhugamál – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .chat-bubble-user {
      background: #dbeafe;
      border-radius: 1rem 0 1rem 1rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .speaking-pulse { animation: pulse 1s ease infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const KEYWORDS = [
      'áhugamál', 'lyfta lóðum', 'vöðvar', 'þrek', 'tónlist',
      'einbeita sér', 'róa sig', 'markvörður', 'lúðrasveit', 'líkamsrækt',
    ];

    const MAX_PER_TOPIC = 5;

    const TOPIC_TITLES = [
      '1. Íþróttir og áhugamál',
      '2. Tónlist',
      '3. Líkamsrækt',
    ];

    const TOPIC_INTROS = [
      'Hæ! Við erum að læra um áhugamál í íslensku. Hvaða íþróttir eða áhugamál hefur þú?',
      'Flott! Nú vil ég spyrja þig um tónlist. Hlustar þú á tónlist? Hvernig tónlist líkar þér?',
      'Áhugavert! Og hvað með líkamsrækt – ferðu í ræktina eða stundar þú aðra líkamsrækt?',
    ];

    function buildSystemPrompt(topicIndex, exchangeCount) {
      var isLast = exchangeCount >= MAX_PER_TOPIC - 1;

      var followups = [
        [
          'Hvaða útbúnað þarftu til að stunda þetta?',
          'Kostar eitthvað að stunda þetta?',
          'Hversu oft stundar þú þetta?',
        ],
        [
          'Áttu einhvern uppáhalds listamann eða hljómsveit?',
          'Hlustar þú á tónlist þegar þú ert að gera eitthvað annað?',
          'Kemur fyrir að þú viljir ekki hlusta á tónlist? Hvenær?',
        ],
        [],
      ];

      var gymFollowups = [
        'Ferðu ein/einn eða með vinum?',
        'Hvaða æfingar líkar þér best – lyfta lóðum, hlaupa eða eitthvað annað?',
        'Hversu lengi ert þú venjulega í ræktinni?',
      ];

      var noGymFollowups = [
        'Hvaða líkamsrækt stundar þú þá – hjólreiðar, sund, dans eða að ganga?',
        'Hreyfir þú þig reglulega?',
        'Myndir þú vilja fara í ræktina einhvern tímann?',
      ];

      var followupSection = '';
      if (topicIndex < 2) {
        followupSection = 'Ef nemandinn gefur stutt svar, spyrðu einnar af þessum undirspurningum:\n' +
          followups[topicIndex].map(function(f) { return '- ' + f; }).join('\n');
      } else {
        followupSection =
          'Ef nemandinn fer í ræktina, spyrðu einnar af þessum:\n' +
          gymFollowups.map(function(f) { return '- ' + f; }).join('\n') +
          '\n\nEf nemandinn fer EKKI í ræktina, spyrðu einnar af þessum:\n' +
          noGymFollowups.map(function(f) { return '- ' + f; }).join('\n');
      }

      var lastNote = isLast
        ? '\n\nMIKILVÆGT: Þetta er síðasta svar þitt í þessum hluta. Ljúktu á hlýlegan hátt og EKKI spyrja fleiri spurninga.'
        : '';

      return (
        'Þú ert íslenskukennari sem er að spjalla við nemanda um áhugamál. ' +
        'Talaðu óformlega og hvetjandi – eins og vinur.\n\n' +
        'LYKILORÐ sem þú reynir að hvetja nemandann til að nota:\n' +
        KEYWORDS.join(', ') + '\n\n' +
        followupSection + '\n\n' +
        'REGLUR:\n' +
        '1. AÐEINS EIN spurning í hvert skipti\n' +
        '2. Hrósaðu stutt eftir svar (t.d. „Flott!", „Geggjað!", „Áhugavert!")\n' +
        '3. Ef nemandinn gerir málfræðivillu, leiðréttu hana beint í svarinu, ' +
        't.d.: „Já! (Við segjum \'í ræktina\' ekki \'í ræktinni\'). Ferðu..."\n' +
        '4. Svaraðu ALLTAF á íslensku – einföld A1-A2 setningar\n' +
        '5. ALDREI nota markdown, lista eða sérstaka stafi í svari\n' +
        '6. Haltu svari stuttu – 1-2 setningar\n' +
        lastNote
      );
    }

    async function callOpenAI(messages, maxTokens = 120, temperature = 0.5) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages,
          max_tokens: maxTokens,
          model: 'gpt-4o-mini',
          temperature,
        }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    // Skilar audio hlut svo hægt sé að stoppa
    function speakText(text, onEnd) {
      var audioRef = { current: null };
      fetch('/.netlify/functions/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text_to_speak: text }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.audio_base64) { onEnd && onEnd(); return; }
          var audio = new Audio('data:audio/mp3;base64,' + data.audio_base64);
          audioRef.current = audio;
          audio.onended = function() { onEnd && onEnd(); };
          audio.onerror = function() { onEnd && onEnd(); };
          audio.play().catch(function() { onEnd && onEnd(); });
        })
        .catch(function() { onEnd && onEnd(); });
      return audioRef;
    }

    var SpeakerIcon = function(props) {
      var speaking = props.speaking;
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={'w-4 h-4 ' + (speaking ? 'text-red-500 speaking-pulse' : 'text-green-600')}>
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
      );
    };

    const SpjallAhugamal = function() {
      var inputRef  = useRef(null);
      var chatRef   = useRef(null);
      var audioRef  = useRef(null); // heldur utan um núverandi audio hlut

      var [topicIndex,     setTopicIndex]     = useState(0);
      var [userMessages,   setUserMessages]   = useState([[], [], []]);
      var [fullConvs,      setFullConvs]      = useState([[], [], []]);
      var [exchangeCounts, setExchangeCounts] = useState([0, 0, 0]);
      var [topicDone,      setTopicDone]      = useState([false, false, false]);
      var [allDone,        setAllDone]        = useState(false);

      // Hvaða spjallbóla er að spila (index í aiMessages lista)
      var [speakingMsgId,  setSpeakingMsgId]  = useState(null);
      // AI skilaboð per þema – hvert með { id, content }
      var [aiMessages,     setAiMessages]     = useState([[], [], []]);
      var nextMsgId = useRef(0);

      var [userInput,   setUserInput]   = useState('');
      var [isLoading,   setIsLoading]   = useState(false);
      var [isRecording, setIsRecording] = useState(false);
      var [recognition, setRecognition] = useState(null);

      // Spila kynningarspurningu þegar þema byrjar
      useEffect(function() {
        var conv = fullConvs[topicIndex];
        if (conv.length === 0) {
          var intro = TOPIC_INTROS[topicIndex];
          var msgId = nextMsgId.current++;

          // Uppfæra fullConvs
          var newFull = fullConvs.slice();
          newFull[topicIndex] = [{ role: 'assistant', content: intro }];
          setFullConvs(newFull);

          // Bæta við AI skilaboð
          var newAi = aiMessages.slice();
          newAi[topicIndex] = [{ id: msgId, content: intro }];
          setAiMessages(newAi);

          // Spila sjálfkrafa
          setSpeakingMsgId(msgId);
          var ref = speakText(intro, function() { setSpeakingMsgId(null); });
          audioRef.current = ref;
        }
      }, [topicIndex]);

      // Speech recognition
      useEffect(function() {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
          var r = new SR();
          r.lang = 'is-IS';
          r.continuous = false;
          r.interimResults = false;
          r.onresult = function(e) {
            setUserInput(e.results[0][0].transcript);
            setIsRecording(false);
          };
          r.onerror = function() { setIsRecording(false); };
          r.onend   = function() { setIsRecording(false); };
          setRecognition(r);
        }
      }, []);

      // Scroll til botns
      useEffect(function() {
        setTimeout(function() {
          if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }, 80);
      }, [userMessages, aiMessages, isLoading]);

      function stopAudio() {
        if (audioRef.current && audioRef.current.current) {
          audioRef.current.current.pause();
          audioRef.current.current.currentTime = 0;
        }
        setSpeakingMsgId(null);
      }

      function toggleSpeak(msgId, text) {
        // Ef þetta skilaboð er að spila – stoppa
        if (speakingMsgId === msgId) {
          stopAudio();
          return;
        }
        // Stoppa annað sem kann að vera að spila
        stopAudio();
        // Byrja að spila þetta
        setSpeakingMsgId(msgId);
        var ref = speakText(text, function() { setSpeakingMsgId(null); });
        audioRef.current = ref;
      }

      function toggleRecording() {
        if (!recognition) return;
        if (isRecording) { recognition.stop(); setIsRecording(false); }
        else             { recognition.start(); setIsRecording(true); }
      }

      const sendMessage = async () => {
        const msg = userInput.trim();
        if (!msg || isLoading) return;

        stopAudio();
        setUserInput('');
        setIsLoading(true);

        const newUserMsgs = userMessages.slice();
        newUserMsgs[topicIndex] = userMessages[topicIndex].concat([msg]);
        setUserMessages(newUserMsgs);

        const currentFull = fullConvs[topicIndex];
        const newFull = currentFull.concat([{ role: 'user', content: msg }]);

        const newCount = exchangeCounts[topicIndex] + 1;
        const newCounts = exchangeCounts.slice();
        newCounts[topicIndex] = newCount;
        setExchangeCounts(newCounts);

        try {
          const allMessages = [{ role: 'system', content: buildSystemPrompt(topicIndex, newCount) }, ...newFull];
          const reply = await callOpenAI(allMessages, 120, 0.5);

          const updatedFull = newFull.concat([{ role: 'assistant', content: reply }]);
          const updatedConvs = fullConvs.slice();
          updatedConvs[topicIndex] = updatedFull;
          setFullConvs(updatedConvs);

          const msgId = nextMsgId.current++;
          const newAi = aiMessages.slice();
          newAi[topicIndex] = aiMessages[topicIndex].concat([{ id: msgId, content: reply }]);
          setAiMessages(newAi);

          setIsLoading(false);

          setSpeakingMsgId(msgId);
          const ref = speakText(reply, function() {
            setSpeakingMsgId(null);
            if (newCount >= MAX_PER_TOPIC) {
              const newDone = topicDone.slice();
              newDone[topicIndex] = true;
              setTopicDone(newDone);
            }
          });
          audioRef.current = ref;
        } catch {
          setIsLoading(false);
        }
      };

      function goNext() {
        stopAudio();
        if (topicIndex < 2) {
          setTopicIndex(topicIndex + 1);
          setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 200);
        } else {
          setAllDone(true);
        }
      }

      var currentUserMsgs = userMessages[topicIndex];
      var currentAiMsgs   = aiMessages[topicIndex];
      var currentDone     = topicDone[topicIndex];
      var exchangeLeft    = MAX_PER_TOPIC - exchangeCounts[topicIndex];

      // ── Lokasíða ──────────────────────────────────────────────────────────

      if (allDone) {
        return (
          <div className="min-h-screen pb-16">
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={function() { window.history.back(); }}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800">💬 Spjall 1: Áhugamál</h1>
                <p className="text-gray-500 text-sm font-light mt-1">Samtalsæfing · A1–A2</p>
              </div>
            </header>
            <main className="max-w-2xl mx-auto px-6 mt-10">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center fade-in">
                <div className="text-5xl mb-4">🎉</div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Frábært!</h2>
                <p className="text-gray-500 font-light mb-6">Þú kláraðir öll þrjú samtölin um áhugamál.</p>
                <div className="flex gap-3 justify-center flex-wrap">
                  <button onClick={function() {
                      stopAudio();
                      setTopicIndex(0);
                      setUserMessages([[], [], []]);
                      setFullConvs([[], [], []]);
                      setAiMessages([[], [], []]);
                      setExchangeCounts([0, 0, 0]);
                      setTopicDone([false, false, false]);
                      setAllDone(false);
                    }}
                    className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                    🔄 Byrja aftur
                  </button>
                  <button onClick={function() { window.history.back(); }}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                    ← Til baka
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }

      // ── Aðalsíða ──────────────────────────────────────────────────────────

      return (
        <div className="min-h-screen pb-16">

          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={function() { window.history.back(); }}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800">💬 Spjall: Áhugamál</h1>
              <p className="text-gray-500 text-sm font-light mt-1">Samtalsæfing · A1–A2</p>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-6 mt-5 space-y-4 pb-20">

            {/* ── Leiðbeiningar ── */}
            <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4">
              <ul className="text-sm text-blue-800 font-light space-y-1">
                <li>💬 Spjallaðu um efnið með AI-kennaranum</li>
                <li>🔄 Ef þú færð rangt: prófaðu að laga setninguna</li>
                <li>✅ Þegar þú hefur lokið öllum efnisþáttum ertu búin/n</li>
              </ul>
            </div>

            {/* ── Sticky þemaslá ── */}
            <div className="sticky-player rounded-xl overflow-hidden">
              <div className="bg-white border border-gray-200 px-5 py-3 flex items-center justify-between">
                <span className="text-sm text-gray-600 font-light">{TOPIC_TITLES[topicIndex]}</span>
                <div className="flex items-center gap-3">
                  {!currentDone && (
                    <span className="text-xs text-gray-400 font-light">
                      {exchangeLeft > 0 ? exchangeLeft + ' tilsvör eftir' : 'Síðasta svar'}
                    </span>
                  )}
                  {/* Þemahnappar */}
                  <div className="flex gap-1.5">
                    {TOPIC_TITLES.map(function(t, i) {
                      return (
                        <button key={i}
                          onClick={function() {
                            if (!speakingMsgId && !isLoading && (topicDone[i] || i <= topicIndex)) {
                              stopAudio();
                              setTopicIndex(i);
                            }
                          }}
                          title={t}
                          className={'w-7 h-7 rounded-full text-xs font-light flex items-center justify-center transition-colors border ' +
                            (i === topicIndex
                              ? 'bg-green-600 text-white border-green-600'
                              : topicDone[i]
                                ? 'bg-green-100 text-green-700 border-green-300'
                                : i < topicIndex
                                  ? 'bg-gray-100 text-gray-500 border-gray-300 hover:bg-gray-200'
                                  : 'bg-gray-50 text-gray-300 border-gray-200 cursor-not-allowed')}>
                          {topicDone[i] ? '✓' : (i + 1)}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>

            {/* ── Spjallgluggi ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div ref={chatRef}
                className="px-4 py-4 space-y-4 overflow-y-auto"
                style={{ minHeight: '320px', maxHeight: '440px' }}>

                {/* Tómt ástand */}
                {currentAiMsgs.length === 0 && !isLoading && (
                  <div className="flex items-center justify-center h-full py-12">
                    <p className="text-sm text-gray-400 font-light text-center px-6">
                      🎧 Bíddu eftir spurningu...
                    </p>
                  </div>
                )}

                {/* Raðað: AI og user skilaboð í réttri röð */}
                {(function() {
                  // Sameinum AI og user skilaboð í eina röð
                  var items = [];
                  var aiList   = currentAiMsgs;
                  var userList = currentUserMsgs;
                  var ai = 0; var u = 0;
                  // Fyrst kemur alltaf AI (kynning), svo víxl user/ai
                  while (ai < aiList.length || u < userList.length) {
                    if (ai < aiList.length) {
                      items.push({ type: 'ai', data: aiList[ai] });
                      ai++;
                    }
                    if (u < userList.length) {
                      items.push({ type: 'user', data: userList[u] });
                      u++;
                    }
                  }
                  return items.map(function(item, idx) {
                    if (item.type === 'ai') {
                      var isSpeaking = speakingMsgId === item.data.id;
                      return (
                        <div key={'ai-' + item.data.id} className="flex items-start gap-2 fade-in">
                          <button
                            onClick={function() { toggleSpeak(item.data.id, item.data.content); }}
                            className={'mt-1 p-2.5 rounded-full transition-colors flex-shrink-0 ' +
                              (isSpeaking
                                ? 'bg-red-100 hover:bg-red-200'
                                : 'bg-green-100 hover:bg-green-200')}
                            title={isSpeaking ? 'Stoppa' : 'Hlusta'}>
                            <SpeakerIcon speaking={isSpeaking} />
                          </button>
                          <div className="bg-gray-100 px-3 py-2.5 rounded-2xl text-sm font-light text-gray-800 leading-relaxed max-w-xs">
                            {isSpeaking
                              ? <span className="text-green-600 text-xs">🔊 Í gangi...</span>
                              : <span className="text-gray-400 text-xs italic">Smelltu á hátalarann til að hlusta</span>
                            }
                          </div>
                        </div>
                      );
                    } else {
                      return (
                        <div key={'user-' + idx} className="flex gap-2 flex-row-reverse fade-in">
                          <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-xs font-medium flex-shrink-0 mt-1">
                            Þú
                          </div>
                          <div className="max-w-xs px-3 py-2.5 text-sm font-light leading-relaxed chat-bubble-user text-gray-800">
                            {item.data}
                          </div>
                        </div>
                      );
                    }
                  });
                })()}

                {/* Loading */}
                {isLoading && (
                  <div className="flex justify-start fade-in">
                    <div className="bg-gray-100 px-4 py-3 rounded-2xl">
                      <div className="flex gap-1">
                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></div>
                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></div>
                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></div>
                      </div>
                    </div>
                  </div>
                )}

                {currentDone && !isLoading && (
                  <div className="text-center py-2 fade-in">
                    <span className="text-xs text-gray-400 font-light bg-gray-100 px-3 py-1 rounded-full">
                      ✓ Þessum hluta er lokið
                    </span>
                  </div>
                )}
              </div>

              {/* Input */}
              <div className="border-t border-gray-100 p-3">
                {!currentDone ? (
                  <div className="flex gap-2 items-end">
                    <textarea
                      ref={inputRef}
                      value={userInput}
                      onChange={function(e) { setUserInput(e.target.value); }}
                      onKeyDown={function(e) {
                        if (e.key === 'Enter' && !e.shiftKey) {
                          e.preventDefault();
                          sendMessage();
                        }
                      }}
                      placeholder={isRecording ? '🔴 Hlustar...' : 'Skrifaðu svar þitt á íslensku...'}
                      disabled={isLoading}
                      rows="2"
                      className="flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light text-sm resize-none disabled:bg-gray-50"
                    />
                    {(window.SpeechRecognition || window.webkitSpeechRecognition) && (
                      <button onClick={toggleRecording}
                        disabled={isLoading}
                        className={'w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 transition-colors border-2 ' +
                          (isRecording
                            ? 'bg-red-500 text-white border-red-500'
                            : 'bg-purple-50 text-purple-600 border-purple-200 hover:bg-purple-100 disabled:opacity-40 disabled:cursor-not-allowed')}>
                        🎤
                      </button>
                    )}
                    <button onClick={sendMessage}
                      disabled={isLoading || !userInput.trim()}
                      className="w-10 h-10 bg-green-600 text-white rounded-lg flex items-center justify-center flex-shrink-0 hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                      </svg>
                    </button>
                  </div>
                ) : (
                  <div className="text-center py-1">
                    <button onClick={goNext}
                      disabled={isLoading}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
                      {topicIndex < 2 ? 'Áfram í næsta þema →' : '🎉 Ljúka æfingunni'}
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* ── Lykilorðaforði ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <p className="text-xs text-gray-500 font-light mb-2">📘 Lykilorð til að nota:</p>
              <div className="flex flex-wrap gap-1.5">
                {KEYWORDS.map(function(kw) {
                  return (
                    <span key={kw}
                      className="text-xs px-2.5 py-1 bg-green-50 text-green-700 border border-green-100 rounded-full font-light">
                      {kw}
                    </span>
                  );
                })}
              </div>
            </div>

          </main>

          {/* ── Framvinduraking – fest neðst ── */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-2xl mx-auto px-6 py-3 flex gap-2">
              {TOPIC_TITLES.map(function(title, i) {
                const label = title.replace(/^\d+\.\s*/, '');
                const canNav = topicDone[i] || i <= topicIndex;
                return (
                  <button key={i}
                    onClick={function() {
                      if (canNav && !isLoading) { stopAudio(); setTopicIndex(i); }
                    }}
                    className={'flex-1 py-2 rounded-lg text-sm font-light transition-colors ' +
                      (topicDone[i]
                        ? 'bg-blue-600 text-white'
                        : i === topicIndex
                          ? 'bg-blue-100 text-blue-700'
                          : 'bg-gray-100 text-gray-400 cursor-not-allowed')}>
                    {topicDone[i] ? '✓ ' : ''}{label}
                  </button>
                );
              })}
            </div>
          </div>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<SpjallAhugamal />);
  </script>
</body>
</html>
