<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 Spjall: Áhugamál – A1-A2</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-img {
      position: sticky;
      top: 0;
      z-index: 40;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .chat-bubble-ai {
      background: #f3f4f6;
      border-radius: 0 1rem 1rem 1rem;
    }
    .chat-bubble-user {
      background: #dbeafe;
      border-radius: 1rem 0 1rem 1rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .typing-dot { animation: pulse 1.2s ease infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── Lykilorð til að nota ────────────────────────────────────────────────
    var KEYWORDS = [
      'áhugamál', 'lyfta lóðum', 'vöðvar', 'þrek', 'tónlist',
      'einbeita sig', 'róa sig', 'markvörður', 'lúðrasveit', 'líkamsrækt',
    ];

    var MAX_PER_TOPIC = 5; // hámark tilsvör per meginspurningu

    // ── System prompt ────────────────────────────────────────────────────────
    function buildSystemPrompt(topicIndex, exchangeCount) {
      var isLast = exchangeCount >= MAX_PER_TOPIC - 1;

      var topics = [
        {
          main: 'Spyrðu nemandann: „Hvaða íþróttir eða áhugamál hefur þú?"',
          followups: [
            'Hvaða útbúnað þarftu til að stunda þetta?',
            'Kostar eitthvað að stunda þetta?',
            'Hversu oft stundar þú þetta?',
          ],
        },
        {
          main: 'Spyrðu nemandann: „Hlustar þú á tónlist? Hvernig tónlist líkar þér?"',
          followups: [
            'Áttu einhvern uppáhalds listamann eða hljómsveit?',
            'Hlustar þú á tónlist þegar þú ert að gera eitthvað annað?',
            'Kemur fyrir að þú viljir ekki hlusta á tónlist? Hvenær?',
          ],
        },
        {
          main: 'Spyrðu nemandann: „Ferðu í ræktina eða stundar þú aðra líkamsrækt?"',
          followups_gym: [
            'Ferðu ein/einn eða með vinum?',
            'Hvaða æfingar líkar þér best – lyfta lóðum, hlaupa eða eitthvað annað?',
            'Hversu lengi ert þú venjulega í ræktinni?',
          ],
          followups_nogym: [
            'Hvaða líkamsrækt stundar þú þá? (hjólreiðar, sund, dans, ganga?)',
            'Hreyfir þú þig reglulega?',
            'Myndir þú vilja fara í ræktina einhvern tímann?',
          ],
        },
      ];

      var topic = topics[topicIndex] || topics[0];
      var followupText = '';
      if (topic.followups) {
        followupText = 'Ef nemandinn gefur stutt eða einfalt svar, spyrðu einnar af þessum undirspurningum:\n' +
          topic.followups.map(function(f) { return '- ' + f; }).join('\n');
      } else {
        followupText = 'Ef nemandinn fer í ræktina, spyrðu einnar af þessum:\n' +
          topic.followups_gym.map(function(f) { return '- ' + f; }).join('\n') +
          '\n\nEf nemandinn fer EKKI í ræktina, beindu samtalinu:\n' +
          topic.followups_nogym.map(function(f) { return '- ' + f; }).join('\n');
      }

      var lastMsg = isLast
        ? '\n\nMIKILVÆGT: Þetta er SÍÐASTA svar þitt í þessum hluta. Ljúktu samtalinu á þennan hluta á hlýlegan hátt og EKKI spyrja fleiri spurninga.'
        : '';

      return 'Þú ert Alex, 18 ára íslenskur nemandi. Þú ert að spjalla við nýjan félaga/félaga um áhugamál. Talaðu óformlega og unglingslega – eins og vinur, ekki kennari.\n\n' +
        'NÚVERANDI UMRÆÐUEFNI:\n' + topic.main + '\n\n' +
        followupText + '\n\n' +
        'LYKILORÐ sem þú reynir að nota eða hvetja nemandann til að nota:\n' +
        KEYWORDS.join(', ') + '\n\n' +
        'REGLUR:\n' +
        '1. AÐEINS EIN spurning í hvert skipti\n' +
        '2. Hrósaðu stutt og náttúrulega eftir svar (t.d. „Æi flott!", „Geggjað!", „Já, ég skil.")\n' +
        '3. Ef nemandinn gerir málfræðivillu, leiðréttu hana BEINT í svarinu, t.d.: „Já! (Við segjum \'í ræktina\' ekki \'í ræktinni\'). Ferðu..."\n' +
        '4. Haltu tóninum léttum og unglingslega\n' +
        '5. Svaraðu ALLTAF á íslensku\n' +
        '6. ALDREI nota markdown eða lista í svari\n' +
        lastMsg;
    }

    // ── API ──────────────────────────────────────────────────────────────────

    function callOpenAI(messages, systemPrompt) {
      var allMessages = [{ role: 'system', content: systemPrompt }].concat(messages);
      return fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: allMessages,
          max_tokens: 150,
          model: 'gpt-4o-mini',
          temperature: 0.5,
        }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          return data.content;
        });
    }

    function playAudio(text, onEnd) {
      return fetch('/.netlify/functions/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text_to_speak: text }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.audio_base64) { onEnd && onEnd(); return; }
          var audio = new Audio('data:audio/mp3;base64,' + data.audio_base64);
          audio.onended = function() { onEnd && onEnd(); };
          audio.onerror = function() { onEnd && onEnd(); };
          audio.play().catch(function() { onEnd && onEnd(); });
          return audio;
        })
        .catch(function() { onEnd && onEnd(); });
    }

    // ── Aðalforrit ───────────────────────────────────────────────────────────

    var TOPIC_TITLES = [
      '1. Íþróttir og áhugamál',
      '2. Tónlist',
      '3. Líkamsrækt',
    ];

    var TOPIC_INTROS = [
      'Hæ! Ég er Alex. Við erum að læra um áhugamál í íslensku. Hvaða íþróttir eða áhugamál hefur þú?',
      'Flott! Nú vil ég spyrja þig um tónlist. Hlustar þú á tónlist? Hvernig tónlist líkar þér?',
      'Áhugavert! Og hvað með líkamsrækt – ferðu í ræktina eða stundar þú aðra líkamsrækt?',
    ];

    const SpjallAhugamal = function() {
      var chatRef    = useRef(null);
      var inputRef   = useRef(null);

      // Spjallstaða
      var [topicIndex,    setTopicIndex]    = useState(0);
      var [conversations, setConversations] = useState([[], [], []]);
      var [exchangeCounts,setExchangeCounts]= useState([0, 0, 0]);
      var [topicDone,     setTopicDone]     = useState([false, false, false]);
      var [allDone,       setAllDone]       = useState(false);

      // Input
      var [userInput,  setUserInput]  = useState('');
      var [isLoading,  setIsLoading]  = useState(false);
      var [isRecording,setIsRecording]= useState(false);
      var [recognition,setRecognition]= useState(null);

      // TTS
      var [speaking, setSpeaking] = useState(false);
      var [lastAiMsg, setLastAiMsg] = useState('');

      // Byrja topic með kynningarspurningu
      useEffect(function() {
        var conv = conversations[topicIndex];
        if (conv.length === 0) {
          var intro = TOPIC_INTROS[topicIndex];
          var newConvs = conversations.slice();
          newConvs[topicIndex] = [{ role: 'assistant', content: intro }];
          setConversations(newConvs);
          setLastAiMsg(intro);
        }
      }, [topicIndex]);

      // Speech recognition
      useEffect(function() {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
          var r = new SR();
          r.lang = 'is-IS';
          r.continuous = false;
          r.interimResults = false;
          r.onresult = function(e) {
            var t = e.results[0][0].transcript;
            setUserInput(t);
            setIsRecording(false);
          };
          r.onerror = function() { setIsRecording(false); };
          r.onend   = function() { setIsRecording(false); };
          setRecognition(r);
        }
      }, []);

      // Scroll til botns
      useEffect(function() {
        setTimeout(function() {
          if (chatRef.current) {
            chatRef.current.scrollTop = chatRef.current.scrollHeight;
          }
        }, 80);
      }, [conversations, isLoading]);

      function toggleRecording() {
        if (!recognition) return;
        if (isRecording) {
          recognition.stop();
          setIsRecording(false);
        } else {
          recognition.start();
          setIsRecording(true);
        }
      }

      function speakLast() {
        if (!lastAiMsg || speaking) return;
        setSpeaking(true);
        playAudio(lastAiMsg, function() { setSpeaking(false); });
      }

      function sendMessage() {
        var msg = userInput.trim();
        if (!msg || isLoading) return;
        setUserInput('');
        setIsLoading(true);

        var currentConv = conversations[topicIndex];
        var newConv = currentConv.concat([{ role: 'user', content: msg }]);
        var newConvs = conversations.slice();
        newConvs[topicIndex] = newConv;
        setConversations(newConvs);

        var newCount = exchangeCounts[topicIndex] + 1;
        var newCounts = exchangeCounts.slice();
        newCounts[topicIndex] = newCount;
        setExchangeCounts(newCounts);

        var sysPrompt = buildSystemPrompt(topicIndex, newCount);

        callOpenAI(newConv, sysPrompt)
          .then(function(reply) {
            var updatedConv = newConv.concat([{ role: 'assistant', content: reply }]);
            var updatedConvs = newConvs.slice();
            updatedConvs[topicIndex] = updatedConv;
            setConversations(updatedConvs);
            setLastAiMsg(reply);

            if (newCount >= MAX_PER_TOPIC) {
              var newDone = topicDone.slice();
              newDone[topicIndex] = true;
              setTopicDone(newDone);
            }
          })
          .catch(function() {
            var errConv = newConv.concat([{ role: 'assistant', content: 'Villa kom upp. Reyndu aftur.' }]);
            var errConvs = newConvs.slice();
            errConvs[topicIndex] = errConv;
            setConversations(errConvs);
          })
          .finally(function() {
            setIsLoading(false);
          });
      }

      function goNextTopic() {
        if (topicIndex < 2) {
          setTopicIndex(topicIndex + 1);
          if (inputRef.current) inputRef.current.focus();
        } else {
          setAllDone(true);
        }
      }

      var currentConv  = conversations[topicIndex];
      var currentDone  = topicDone[topicIndex];
      var exchangeLeft = MAX_PER_TOPIC - exchangeCounts[topicIndex];

      // ── RENDER ─────────────────────────────────────────────────────────────

      if (allDone) {
        return (
          <div className="min-h-screen pb-16">
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-6">
                <button onClick={function() { window.history.back(); }}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-1">💬 Spjall: Áhugamál</h1>
                <p className="text-gray-500 text-sm font-light">Samtalsæfing · A1–A2</p>
              </div>
            </header>
            <main className="max-w-2xl mx-auto px-6 mt-10 fade-in">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center">
                <div className="text-5xl mb-4">🎉</div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Frábært!</h2>
                <p className="text-gray-500 font-light mb-6">Þú kláraðir öll þrjú samtölin um áhugamál!</p>
                <div className="flex gap-3 justify-center flex-wrap">
                  <button onClick={function() {
                      setTopicIndex(0);
                      setConversations([[], [], []]);
                      setExchangeCounts([0, 0, 0]);
                      setTopicDone([false, false, false]);
                      setAllDone(false);
                      setLastAiMsg('');
                    }}
                    className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                    🔄 Byrja aftur
                  </button>
                  <button onClick={function() { window.history.back(); }}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                    ← Til baka
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-16">

          {/* ── Header ── */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={function() { window.history.back(); }}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-1">💬 Spjall: Áhugamál</h1>
              <p className="text-gray-500 text-sm font-light">Samtalsæfing · A1–A2</p>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-6 mt-5 space-y-4">

            {/* ── Leiðbeiningar ── */}
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
              <p className="text-sm text-blue-800 font-light">
                💬 Spjallaðu við <strong>Alex</strong> um áhugamál þín. Reyndu að nota orðin: <span className="italic">{KEYWORDS.slice(0,5).join(', ')}</span> og fleiri.
              </p>
            </div>

            {/* ── Sticky mynd / persóna ── */}
            <div className="sticky-img rounded-xl overflow-hidden border border-gray-200">
              <div className="bg-gradient-to-r from-blue-600 to-blue-700 px-5 py-3 flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white text-lg font-medium flex-shrink-0">
                  A
                </div>
                <div>
                  <p className="text-white font-light text-sm">Alex Tran</p>
                  <p className="text-blue-200 text-xs font-light">18 ára · Framhaldsskólinn</p>
                </div>
                <div className="ml-auto">
                  <button onClick={speakLast} disabled={!lastAiMsg || speaking}
                    className={'inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs border transition-all ' +
                      (speaking
                        ? 'bg-green-600 text-white border-green-500'
                        : 'bg-white/10 text-white border-white/30 hover:bg-white/20 disabled:opacity-40 disabled:cursor-not-allowed')}>
                    <span>{speaking ? '🔊' : '🎧'}</span>
                    <span className="font-light">{speaking ? 'Í gangi...' : 'Hlusta'}</span>
                    {speaking && <span className="animate-pulse">●</span>}
                  </button>
                </div>
              </div>
            </div>

            {/* ── Þemavalin ── */}
            <div className="flex gap-2">
              {TOPIC_TITLES.map(function(title, i) {
                return (
                  <button key={i}
                    onClick={function() { if (topicDone[i] || i <= topicIndex) setTopicIndex(i); }}
                    className={'flex-1 py-2 px-2 rounded-lg text-xs font-light border transition-colors text-center ' +
                      (i === topicIndex
                        ? 'bg-blue-600 text-white border-blue-600'
                        : topicDone[i]
                          ? 'bg-green-50 text-green-700 border-green-200'
                          : i < topicIndex
                            ? 'bg-gray-100 text-gray-500 border-gray-200 cursor-pointer hover:bg-gray-200'
                            : 'bg-gray-50 text-gray-400 border-gray-200 cursor-not-allowed opacity-50')}>
                    {topicDone[i] ? '✓ ' : ''}{title}
                  </button>
                );
              })}
            </div>

            {/* ── Spjallgluggi ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="px-4 py-2 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                <span className="text-xs text-gray-500 font-light">{TOPIC_TITLES[topicIndex]}</span>
                {!currentDone && (
                  <span className="text-xs text-gray-400 font-light">
                    {exchangeLeft} tilsvör eftir
                  </span>
                )}
              </div>

              {/* Skilaboð */}
              <div ref={chatRef}
                className="px-4 py-4 space-y-3 overflow-y-auto"
                style={{ minHeight: '360px', maxHeight: '460px' }}>
                {currentConv.map(function(msg, i) {
                  var isAI = msg.role === 'assistant';
                  return (
                    <div key={i} className={'flex gap-2 fade-in ' + (isAI ? '' : 'flex-row-reverse')}>
                      {isAI && (
                        <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-medium flex-shrink-0 mt-1">
                          A
                        </div>
                      )}
                      <div className={'max-w-xs px-3 py-2.5 text-sm font-light leading-relaxed ' +
                        (isAI ? 'chat-bubble-ai text-gray-800' : 'chat-bubble-user text-gray-800')}>
                        {msg.content}
                      </div>
                    </div>
                  );
                })}

                {/* Typing indicator */}
                {isLoading && (
                  <div className="flex gap-2 fade-in">
                    <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-medium flex-shrink-0">
                      A
                    </div>
                    <div className="chat-bubble-ai px-4 py-3 flex gap-1 items-center">
                      <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
                      <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
                      <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
                    </div>
                  </div>
                )}

                {/* Topic done message */}
                {currentDone && !isLoading && (
                  <div className="text-center py-3 fade-in">
                    <span className="text-xs text-gray-400 font-light bg-gray-100 px-3 py-1 rounded-full">
                      ✓ Þessum hluta er lokið
                    </span>
                  </div>
                )}
              </div>

              {/* Input */}
              <div className="border-t border-gray-100 p-3">
                {!currentDone ? (
                  <div className="flex gap-2 items-end">
                    <textarea
                      ref={inputRef}
                      value={userInput}
                      onChange={function(e) { setUserInput(e.target.value); }}
                      onKeyDown={function(e) {
                        if (e.key === 'Enter' && !e.shiftKey) {
                          e.preventDefault();
                          sendMessage();
                        }
                      }}
                      placeholder="Skrifaðu svar þitt..."
                      disabled={isLoading}
                      rows="2"
                      className="flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50"
                    />
                    {/* Röddupptaka */}
                    {(window.SpeechRecognition || window.webkitSpeechRecognition) && (
                      <button onClick={toggleRecording} disabled={isLoading}
                        className={'w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 transition-colors border-2 ' +
                          (isRecording
                            ? 'bg-red-500 text-white border-red-500 animate-pulse'
                            : 'bg-purple-50 text-purple-600 border-purple-200 hover:bg-purple-100 disabled:opacity-40')}>
                        🎤
                      </button>
                    )}
                    <button onClick={sendMessage}
                      disabled={isLoading || !userInput.trim()}
                      className="w-10 h-10 bg-blue-600 text-white rounded-lg flex items-center justify-center flex-shrink-0 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                      </svg>
                    </button>
                  </div>
                ) : (
                  <div className="text-center py-1">
                    <button onClick={goNextTopic}
                      className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                      {topicIndex < 2 ? 'Áfram í næsta þema →' : '🎉 Ljúka æfingunni'}
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* ── Lykilorð ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <p className="text-xs text-gray-500 font-light mb-2">📘 Lykilorð til að nota:</p>
              <div className="flex flex-wrap gap-1.5">
                {KEYWORDS.map(function(kw) {
                  return (
                    <span key={kw}
                      className="text-xs px-2.5 py-1 bg-blue-50 text-blue-700 border border-blue-100 rounded-full font-light">
                      {kw}
                    </span>
                  );
                })}
              </div>
            </div>

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<SpjallAhugamal />);
  </script>
</body>
</html>
