<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 Spjall: Áhugamál – A1-A2</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .chat-bubble-user {
      background: #dbeafe;
      border-radius: 1rem 0 1rem 1rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }
    @keyframes soundwave {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1); }
    }
    .wave-bar {
      width: 3px;
      height: 20px;
      background: #16a34a;
      border-radius: 2px;
      animation: soundwave 0.8s ease infinite;
    }
    .wave-bar:nth-child(2) { animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { animation-delay: 0.3s;  }
    .wave-bar:nth-child(4) { animation-delay: 0.45s; }
    .wave-bar:nth-child(5) { animation-delay: 0.6s;  }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    var KEYWORDS = [
      'áhugamál', 'lyfta lóðum', 'vöðvar', 'þrek', 'tónlist',
      'einbeita sig', 'róa sig', 'markvörður', 'lúðrasveit', 'líkamsrækt',
    ];

    var MAX_PER_TOPIC = 5;

    var TOPIC_TITLES = [
      '1. Íþróttir og áhugamál',
      '2. Tónlist',
      '3. Líkamsrækt',
    ];

    var TOPIC_INTROS = [
      'Hæ! Við erum að læra um áhugamál í íslensku. Hvaða íþróttir eða áhugamál hefur þú?',
      'Flott! Nú vil ég spyrja þig um tónlist. Hlustar þú á tónlist? Hvernig tónlist líkar þér?',
      'Áhugavert! Og hvað með líkamsrækt – ferðu í ræktina eða stundar þú aðra líkamsrækt?',
    ];

    function buildSystemPrompt(topicIndex, exchangeCount) {
      var isLast = exchangeCount >= MAX_PER_TOPIC - 1;

      var followups = [
        [
          'Hvaða útbúnað þarftu til að stunda þetta?',
          'Kostar eitthvað að stunda þetta?',
          'Hversu oft stundar þú þetta?',
        ],
        [
          'Áttu einhvern uppáhalds listamann eða hljómsveit?',
          'Hlustar þú á tónlist þegar þú ert að gera eitthvað annað?',
          'Kemur fyrir að þú viljir ekki hlusta á tónlist? Hvenær?',
        ],
        [],
      ];

      var gymFollowups = [
        'Ferðu ein/einn eða með vinum?',
        'Hvaða æfingar líkar þér best – lyfta lóðum, hlaupa eða eitthvað annað?',
        'Hversu lengi ert þú venjulega í ræktinni?',
      ];

      var noGymFollowups = [
        'Hvaða líkamsrækt stundar þú þá – hjólreiðar, sund, dans eða að ganga?',
        'Hreyfir þú þig reglulega?',
        'Myndir þú vilja fara í ræktina einhvern tímann?',
      ];

      var followupSection = '';
      if (topicIndex < 2) {
        followupSection = 'Ef nemandinn gefur stutt svar, spyrðu einnar af þessum undirspurningum:\n' +
          followups[topicIndex].map(function(f) { return '- ' + f; }).join('\n');
      } else {
        followupSection =
          'Ef nemandinn fer í ræktina, spyrðu einnar af þessum:\n' +
          gymFollowups.map(function(f) { return '- ' + f; }).join('\n') +
          '\n\nEf nemandinn fer EKKI í ræktina, spyrðu einnar af þessum:\n' +
          noGymFollowups.map(function(f) { return '- ' + f; }).join('\n');
      }

      var lastNote = isLast
        ? '\n\nMIKILVÆGT: Þetta er síðasta svar þitt í þessum hluta. Ljúktu á hlýlegan hátt og EKKI spyrja fleiri spurninga.'
        : '';

      return (
        'Þú ert íslenskukennari sem er að spjalla við nemanda um áhugamál. ' +
        'Talaðu óformlega og hvetjandi – eins og vinur.\n\n' +
        'LYKILORÐ sem þú reynir að hvetja nemandann til að nota:\n' +
        KEYWORDS.join(', ') + '\n\n' +
        followupSection + '\n\n' +
        'REGLUR:\n' +
        '1. AÐEINS EIN spurning í hvert skipti\n' +
        '2. Hrósaðu stutt eftir svar (t.d. „Flott!", „Geggjað!", „Áhugavert!")\n' +
        '3. Ef nemandinn gerir málfræðivillu, leiðréttu hana beint í svarinu, ' +
        't.d.: „Já! (Við segjum \'í ræktina\' ekki \'í ræktinni\'). Ferðu..."\n' +
        '4. Svaraðu ALLTAF á íslensku – einföld A1-A2 setningar\n' +
        '5. ALDREI nota markdown, lista eða sérstaka stafi í svari\n' +
        '6. Haltu svari stuttu – 1-2 setningar\n' +
        lastNote
      );
    }

    function callOpenAI(messages, systemPrompt) {
      var all = [{ role: 'system', content: systemPrompt }].concat(messages);
      return fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: all,
          max_tokens: 120,
          model: 'gpt-4o-mini',
          temperature: 0.5,
        }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          return data.content;
        });
    }

    function speakText(text, onEnd) {
      fetch('/.netlify/functions/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text_to_speak: text }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.audio_base64) { onEnd && onEnd(); return; }
          var audio = new Audio('data:audio/mp3;base64,' + data.audio_base64);
          audio.onended = function() { onEnd && onEnd(); };
          audio.onerror = function() { onEnd && onEnd(); };
          audio.play().catch(function() { onEnd && onEnd(); });
        })
        .catch(function() { onEnd && onEnd(); });
    }

    const SpjallAhugamal = function() {
      var inputRef = useRef(null);
      var chatRef  = useRef(null);

      var [topicIndex,     setTopicIndex]     = useState(0);
      var [userMessages,   setUserMessages]   = useState([[], [], []]);
      var [fullConvs,      setFullConvs]      = useState([[], [], []]);
      var [exchangeCounts, setExchangeCounts] = useState([0, 0, 0]);
      var [topicDone,      setTopicDone]      = useState([false, false, false]);
      var [allDone,        setAllDone]        = useState(false);

      var [userInput,   setUserInput]   = useState('');
      var [isLoading,   setIsLoading]   = useState(false);
      var [isSpeaking,  setIsSpeaking]  = useState(false);
      var [isRecording, setIsRecording] = useState(false);
      var [recognition, setRecognition] = useState(null);

      // Spila kynningarspurningu þegar þema byrjar
      useEffect(function() {
        var conv = fullConvs[topicIndex];
        if (conv.length === 0) {
          var intro = TOPIC_INTROS[topicIndex];
          var newFull = fullConvs.slice();
          newFull[topicIndex] = [{ role: 'assistant', content: intro }];
          setFullConvs(newFull);
          setIsSpeaking(true);
          speakText(intro, function() { setIsSpeaking(false); });
        }
      }, [topicIndex]);

      // Speech recognition
      useEffect(function() {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
          var r = new SR();
          r.lang = 'is-IS';
          r.continuous = false;
          r.interimResults = false;
          r.onresult = function(e) {
            setUserInput(e.results[0][0].transcript);
            setIsRecording(false);
          };
          r.onerror = function() { setIsRecording(false); };
          r.onend   = function() { setIsRecording(false); };
          setRecognition(r);
        }
      }, []);

      // Scroll til botns
      useEffect(function() {
        setTimeout(function() {
          if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }, 80);
      }, [userMessages, isLoading, isSpeaking]);

      function toggleRecording() {
        if (!recognition) return;
        if (isRecording) { recognition.stop(); setIsRecording(false); }
        else             { recognition.start(); setIsRecording(true); }
      }

      function sendMessage() {
        var msg = userInput.trim();
        if (!msg || isLoading || isSpeaking) return;
        setUserInput('');
        setIsLoading(true);

        var newUserMsgs = userMessages.slice();
        newUserMsgs[topicIndex] = userMessages[topicIndex].concat([msg]);
        setUserMessages(newUserMsgs);

        var currentFull = fullConvs[topicIndex];
        var newFull     = currentFull.concat([{ role: 'user', content: msg }]);

        var newCount  = exchangeCounts[topicIndex] + 1;
        var newCounts = exchangeCounts.slice();
        newCounts[topicIndex] = newCount;
        setExchangeCounts(newCounts);

        callOpenAI(newFull, buildSystemPrompt(topicIndex, newCount))
          .then(function(reply) {
            var updatedFull = newFull.concat([{ role: 'assistant', content: reply }]);
            var updatedConvs = fullConvs.slice();
            updatedConvs[topicIndex] = updatedFull;
            setFullConvs(updatedConvs);
            setIsLoading(false);
            setIsSpeaking(true);
            speakText(reply, function() {
              setIsSpeaking(false);
              if (newCount >= MAX_PER_TOPIC) {
                var newDone = topicDone.slice();
                newDone[topicIndex] = true;
                setTopicDone(newDone);
              }
            });
          })
          .catch(function() { setIsLoading(false); });
      }

      function goNext() {
        if (topicIndex < 2) {
          setTopicIndex(topicIndex + 1);
          setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 200);
        } else {
          setAllDone(true);
        }
      }

      var currentUserMsgs = userMessages[topicIndex];
      var currentDone     = topicDone[topicIndex];
      var exchangeLeft    = MAX_PER_TOPIC - exchangeCounts[topicIndex];

      // ── Lokasíða ──────────────────────────────────────────────────────────

      if (allDone) {
        return (
          <div className="min-h-screen pb-16">
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-6">
                <button onClick={function() { window.history.back(); }}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800">💬 Spjall: Áhugamál</h1>
                <p className="text-gray-500 text-sm font-light mt-1">Samtalsæfing · A1–A2</p>
              </div>
            </header>
            <main className="max-w-2xl mx-auto px-6 mt-10">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center fade-in">
                <div className="text-5xl mb-4">🎉</div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Frábært!</h2>
                <p className="text-gray-500 font-light mb-6">Þú kláraðir öll þrjú samtölin um áhugamál.</p>
                <div className="flex gap-3 justify-center flex-wrap">
                  <button onClick={function() {
                      setTopicIndex(0);
                      setUserMessages([[], [], []]);
                      setFullConvs([[], [], []]);
                      setExchangeCounts([0, 0, 0]);
                      setTopicDone([false, false, false]);
                      setAllDone(false);
                    }}
                    className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                    🔄 Byrja aftur
                  </button>
                  <button onClick={function() { window.history.back(); }}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                    ← Til baka
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }

      // ── Aðalsíða ──────────────────────────────────────────────────────────

      return (
        <div className="min-h-screen pb-16">

          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={function() { window.history.back(); }}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800">💬 Spjall: Áhugamál</h1>
              <p className="text-gray-500 text-sm font-light mt-1">Samtalsæfing · A1–A2</p>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-6 mt-5 space-y-4">

            {/* ── Leiðbeiningar ── */}
            <div className="bg-green-50 border border-green-200 rounded-xl p-4 border-l-4 border-l-green-500">
              <ul className="text-sm text-green-800 font-light space-y-1">
                <li>🎧 Hlustaðu vel á spurninguna – engin texti birtist</li>
                <li>✏️ Svaraðu á íslensku í textareitinn</li>
                <li>📘 Notaðu lykilorðin hér að neðan</li>
              </ul>
            </div>

            {/* ── Sticky hljóðstaða ── */}
            <div className="sticky-player rounded-xl overflow-hidden">
              <div className={'px-5 py-4 border transition-all ' +
                (isSpeaking
                  ? 'bg-gradient-to-r from-green-50 to-green-100 border-green-300'
                  : isLoading
                    ? 'bg-gradient-to-r from-amber-50 to-amber-100 border-amber-200'
                    : 'bg-gradient-to-r from-gray-50 to-gray-100 border-gray-200')}>
                <div className="flex items-center gap-4">
                  <div className={'w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0 ' +
                    (isSpeaking ? 'bg-green-600' : isLoading ? 'bg-amber-400' : 'bg-gray-300')}>
                    {isSpeaking ? (
                      <div className="flex items-end gap-0.5 h-5">
                        <div className="wave-bar"></div>
                        <div className="wave-bar"></div>
                        <div className="wave-bar"></div>
                        <div className="wave-bar"></div>
                        <div className="wave-bar"></div>
                      </div>
                    ) : (
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="white" fill="none" strokeWidth="2"/>
                        <line x1="12" y1="19" x2="12" y2="23" stroke="white" strokeWidth="2"/>
                        <line x1="8" y1="23" x2="16" y2="23" stroke="white" strokeWidth="2"/>
                      </svg>
                    )}
                  </div>

                  <div className="flex-1">
                    {isSpeaking ? (
                      <p className="text-sm font-light text-green-800">🔊 Hlustaðu...</p>
                    ) : isLoading ? (
                      <p className="text-sm font-light text-amber-700">⏳ Þjálfarinn er að hugsa...</p>
                    ) : currentDone ? (
                      <p className="text-sm font-light text-gray-500">✓ Þessum hluta er lokið</p>
                    ) : (
                      <p className="text-sm font-light text-gray-400">Bíddu eftir spurningu eða skrifaðu svar</p>
                    )}
                  </div>

                  {/* Þemahnappar */}
                  <div className="flex gap-1.5">
                    {TOPIC_TITLES.map(function(t, i) {
                      return (
                        <button key={i}
                          onClick={function() {
                            if (!isSpeaking && !isLoading && (topicDone[i] || i <= topicIndex)) {
                              setTopicIndex(i);
                            }
                          }}
                          title={t}
                          className={'w-7 h-7 rounded-full text-xs font-light flex items-center justify-center transition-colors border ' +
                            (i === topicIndex
                              ? 'bg-green-600 text-white border-green-600'
                              : topicDone[i]
                                ? 'bg-green-100 text-green-700 border-green-300'
                                : i < topicIndex
                                  ? 'bg-gray-100 text-gray-500 border-gray-300 hover:bg-gray-200'
                                  : 'bg-gray-50 text-gray-300 border-gray-200 cursor-not-allowed')}>
                          {topicDone[i] ? '✓' : (i + 1)}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>

            {/* ── Þemaflokkur ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 px-4 py-2.5 flex items-center justify-between">
              <span className="text-sm text-gray-600 font-light">{TOPIC_TITLES[topicIndex]}</span>
              {!currentDone && (
                <span className="text-xs text-gray-400 font-light">
                  {exchangeLeft > 0 ? exchangeLeft + ' tilsvör eftir' : 'Síðasta svar'}
                </span>
              )}
            </div>

            {/* ── Spjallgluggi – aðeins notendaskilaboð ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div ref={chatRef}
                className="px-4 py-4 space-y-3 overflow-y-auto"
                style={{ minHeight: '280px', maxHeight: '400px' }}>

                {currentUserMsgs.length === 0 && !isSpeaking && !isLoading && (
                  <div className="flex items-center justify-center h-full py-12">
                    <p className="text-sm text-gray-400 font-light text-center px-6">
                      🎧 Hlustaðu á spurninguna og svaraðu hér að neðan
                    </p>
                  </div>
                )}

                {currentUserMsgs.map(function(msg, i) {
                  return (
                    <div key={i} className="flex gap-2 flex-row-reverse fade-in">
                      <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-xs font-medium flex-shrink-0 mt-1">
                        Þú
                      </div>
                      <div className="max-w-xs px-3 py-2.5 text-sm font-light leading-relaxed chat-bubble-user text-gray-800">
                        {msg}
                      </div>
                    </div>
                  );
                })}

                {(isLoading || isSpeaking) && (
                  <div className="flex justify-center py-2 fade-in">
                    <span className={'text-xs font-light px-3 py-1.5 rounded-full ' +
                      (isSpeaking ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700')}>
                      {isSpeaking ? '🔊 Hlustaðu...' : '⏳ Þjálfarinn er að hugsa...'}
                    </span>
                  </div>
                )}

                {currentDone && !isLoading && !isSpeaking && (
                  <div className="text-center py-2 fade-in">
                    <span className="text-xs text-gray-400 font-light bg-gray-100 px-3 py-1 rounded-full">
                      ✓ Þessum hluta er lokið
                    </span>
                  </div>
                )}
              </div>

              {/* Input */}
              <div className="border-t border-gray-100 p-3">
                {!currentDone ? (
                  <div className="flex gap-2 items-end">
                    <textarea
                      ref={inputRef}
                      value={userInput}
                      onChange={function(e) { setUserInput(e.target.value); }}
                      onKeyDown={function(e) {
                        if (e.key === 'Enter' && !e.shiftKey) {
                          e.preventDefault();
                          sendMessage();
                        }
                      }}
                      placeholder="Skrifaðu svar þitt á íslensku..."
                      disabled={isLoading || isSpeaking}
                      rows="2"
                      className="flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light text-sm resize-none disabled:bg-gray-50 disabled:text-gray-400"
                    />
                    {(window.SpeechRecognition || window.webkitSpeechRecognition) && (
                      <button onClick={toggleRecording}
                        disabled={isLoading || isSpeaking}
                        className={'w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 transition-colors border-2 ' +
                          (isRecording
                            ? 'bg-red-500 text-white border-red-500 animate-pulse'
                            : 'bg-purple-50 text-purple-600 border-purple-200 hover:bg-purple-100 disabled:opacity-40 disabled:cursor-not-allowed')}>
                        🎤
                      </button>
                    )}
                    <button onClick={sendMessage}
                      disabled={isLoading || isSpeaking || !userInput.trim()}
                      className="w-10 h-10 bg-green-600 text-white rounded-lg flex items-center justify-center flex-shrink-0 hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                      </svg>
                    </button>
                  </div>
                ) : (
                  <div className="text-center py-1">
                    <button onClick={goNext}
                      disabled={isSpeaking || isLoading}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
                      {topicIndex < 2 ? 'Áfram í næsta þema →' : '🎉 Ljúka æfingunni'}
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* ── Lykilorðaforði ── */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <p className="text-xs text-gray-500 font-light mb-2">📘 Lykilorð til að nota:</p>
              <div className="flex flex-wrap gap-1.5">
                {KEYWORDS.map(function(kw) {
                  return (
                    <span key={kw}
                      className="text-xs px-2.5 py-1 bg-green-50 text-green-700 border border-green-100 rounded-full font-light">
                      {kw}
                    </span>
                  );
                })}
              </div>
            </div>

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<SpjallAhugamal />);
  </script>
</body>
</html>
