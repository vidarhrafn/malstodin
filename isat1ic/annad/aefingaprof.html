function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function SectionHeader({ number, title, subtitle }) {
  return (
    <div className="mb-6">
      <div className="flex items-center gap-3 mb-1">
        <span className="w-7 h-7 rounded-full bg-blue-600 text-white text-sm
          flex items-center justify-center font-medium">{number}</span>
        <h2 className="text-lg font-medium text-gray-800">{title}</h2>
      </div>
      {subtitle && <p className="text-sm text-gray-500 font-light ml-10">{subtitle}</p>}
    </div>
  );
}

function FeedbackBadge({ score, max }) {
  if (score === null || score === undefined) return null;
  const pct = max > 0 ? (score / max) * 100 : 0;
  let bg = "bg-red-50 border-red-200 text-red-700";
  let emoji = "😔";
  if (pct >= 90)      { bg = "bg-green-50 border-green-200 text-green-700"; emoji = "🎉"; }
  else if (pct >= 70) { bg = "bg-green-50 border-green-200 text-green-700"; emoji = "😊"; }
  else if (pct >= 50) { bg = "bg-amber-50 border-amber-200 text-amber-700"; emoji = "🙂"; }
  else if (pct >= 30) { bg = "bg-amber-50 border-amber-200 text-amber-700"; emoji = "💪"; }
  return (
    <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-full border-2 font-medium ${bg} pop`}>
      <span className="text-xl">{emoji}</span>
      <span className="font-light">{score} / {max} stig</span>
    </div>
  );
}

// ======== MATCHING EXERCISE ========
function MatchingExercise({ data, onScore, rightLabel, type }) {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  const shuffledOptions = useMemo(() => shuffle(data.options), []);
  const letters = data.options.map(o => o.letter);

  const correctCount = () =>
    data.items.filter(i => answers[i.id] === i.correct).length;

  const check = () => {
    const score = Math.round((correctCount() / data.items.length) * data.maxPoints);
    setChecked(true);
    onScore(data.title, score);
  };

  const reset = () => { setAnswers({}); setChecked(false); onScore(data.title, null); };

  const score = checked
    ? Math.round((correctCount() / data.items.length) * data.maxPoints)
    : null;

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-7 fade-in">
      <SectionHeader
        number={data.title.split(".")[0]}
        title={data.title.replace(/^\d+\.\s*/, "")}
        subtitle={`${data.maxPoints} stig${data.instructions ? " · " + data.instructions : ""}`}
      />

      <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-5">
        <p className="text-sm font-medium text-blue-900 mb-2">{rightLabel}:</p>
        <ul className="space-y-1.5">
          {shuffledOptions.map(opt => (
            <li key={opt.letter} className="flex items-start gap-2 text-gray-800 font-light">
              <span className="font-medium text-blue-700 min-w-[1.25rem]">{opt.letter})</span>
              <span>{opt.text}</span>
            </li>
          ))}
        </ul>
      </div>

      <div className="space-y-2">
        {data.items.map(item => {
          const isCorrect = checked && answers[item.id] === item.correct;
          const isWrong   = checked && answers[item.id] && answers[item.id] !== item.correct;
          const cls = isCorrect
            ? "answer-option opt-correct opt-disabled"
            : isWrong
            ? "answer-option opt-incorrect opt-disabled"
            : "answer-option";
          return (
            <div key={item.id}
              className={`flex items-center gap-3 p-2.5 rounded-lg ${cls}`}>
              <span className="font-medium text-gray-700 w-6 font-light">{item.id}.</span>
              <span className="flex-1 font-light">
                {type === "sentence" ? item.start : item.word}
              </span>
              <select
                className="inp border-2 border-gray-300 rounded-lg px-3 py-1.5 font-light
                  focus:border-blue-500 focus:outline-none"
                value={answers[item.id] || ""}
                onChange={e => setAnswers({ ...answers, [item.id]: e.target.value })}
                disabled={checked}
              >
                <option value="">—</option>
                {letters.map(l => <option key={l} value={l}>{l}</option>)}
              </select>
              {checked && (
                <span className="text-xl min-w-[1.5rem]">
                  {isCorrect ? "✓" : isWrong ? "✗" : "⚪"}
                </span>
              )}
            </div>
          );
        })}
      </div>

      {checked && (
        <div className="mt-5 p-4 bg-green-50 border border-green-200 rounded-lg fade-in">
          <p className="font-medium text-green-800 mb-2 text-sm">Rétt svör:</p>
          <ul className="text-sm space-y-1 text-gray-700 font-light">
            {data.items.map(item => (
              <li key={item.id}>
                <span className="font-medium">{item.id}.</span>{" "}
                {type === "sentence" ? item.start : item.word}{" "}→{" "}
                <span className="font-medium text-green-700">{item.correct})</span>{" "}
                {data.options.find(o => o.letter === item.correct)?.text}
              </li>
            ))}
          </ul>
        </div>
      )}

      <div className="flex flex-wrap items-center gap-3 mt-5">
        {!checked ? (
          <button onClick={check}
            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              transition-colors font-light">
            Athuga svör
          </button>
        ) : (
          <button onClick={reset}
            className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg
              hover:bg-gray-50 transition-colors font-light text-sm">
            Reyna aftur
          </button>
        )}
        <FeedbackBadge score={score} max={data.maxPoints} />
      </div>
    </div>
  );
}

// ======== FILL IN THE BLANK ========
function FillExercise({ data, onScore }) {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  const normalize = s => (s || "").trim().toLowerCase();

  const correctCount = () =>
    data.sentences.filter(s => normalize(answers[s.id]) === normalize(s.answer)).length;

  const check = () => {
    const score = Math.round((correctCount() / data.sentences.length) * data.maxPoints);
    setChecked(true);
    onScore(data.title, score);
  };

  const reset = () => { setAnswers({}); setChecked(false); onScore(data.title, null); };

  const score = checked
    ? Math.round((correctCount() / data.sentences.length) * data.maxPoints)
    : null;

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-7 fade-in">
      <SectionHeader
        number={data.title.split(".")[0]}
        title={data.title.replace(/^\d+\.\s*/, "")}
        subtitle={`${data.maxPoints} stig`}
      />

      <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-5">
        <p className="text-sm font-medium text-blue-900 mb-1">Orð til að nota:</p>
        <p className="text-gray-800 font-light italic">{data.words.join(", ")}</p>
      </div>

      <div className="space-y-3">
        {data.sentences.map(s => {
          const userAns = answers[s.id] || "";
          const isCorrect = checked && normalize(userAns) === normalize(s.answer);
          const isWrong   = checked && userAns && !isCorrect;
          const cls = isCorrect
            ? "answer-option opt-correct opt-disabled"
            : isWrong
            ? "answer-option opt-incorrect opt-disabled"
            : "answer-option";
          return (
            <div key={s.id} className={`p-3 rounded-lg ${cls}`}>
              <div className="flex flex-wrap items-baseline gap-1">
                <span className="font-medium text-gray-700">
                  {String.fromCharCode(96 + s.id)})
                </span>
                <span className="font-light">{s.before}</span>
                <input
                  type="text"
                  value={userAns}
                  onChange={e => setAnswers({ ...answers, [s.id]: e.target.value })}
                  disabled={checked}
                  className="border-b-2 border-gray-400 focus:border-blue-500 outline-none
                    px-2 py-0.5 font-light min-w-[8rem] disabled:bg-transparent"
                  placeholder="..."
                />
                <span className="font-light">{s.after}</span>
                {checked && (
                  <span className="text-base ml-1">{isCorrect ? "✓" : isWrong ? "✗" : "⚪"}</span>
                )}
              </div>
              {checked && !isCorrect && (
                <p className="text-sm text-green-700 mt-1.5 font-light">
                  Rétt svar: <span className="font-medium">{s.answer}</span>
                </p>
              )}
            </div>
          );
        })}
      </div>

      <div className="flex flex-wrap items-center gap-3 mt-5">
        {!checked ? (
          <button onClick={check}
            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              transition-colors font-light">
            Athuga svör
          </button>
        ) : (
          <button onClick={reset}
            className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg
              hover:bg-gray-50 transition-colors font-light text-sm">
            Reyna aftur
          </button>
        )}
        <FeedbackBadge score={score} max={data.maxPoints} />
      </div>
    </div>
  );
}

    data.statements.filter(s => answers[s.id] === s.correct).length;

  const check = () => {
    const score = Math.round((correctCount() / data.statements.length) * data.maxPoints);
    setChecked(true);
    onScore(data.title, score);
  };

  const reset = () => { setAnswers({}); setChecked(false); onScore(data.title, null); };

  const score = checked
    ? Math.round((correctCount() / data.statements.length) * data.maxPoints)
    : null;

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-7 fade-in">
      <SectionHeader
        number={data.title.split(".")[0]}
        title={data.title.replace(/^\d+\.\s*/, "")}
        subtitle={`${data.maxPoints} stig · Merktu við rétt eða rangt`}
      />

      <div className="space-y-2">
        {data.statements.map(s => {
          const userAns = answers[s.id];
          const isCorrect = checked && userAns === s.correct;
          const isWrong   = checked && userAns !== undefined && userAns !== s.correct;
          const cls = isCorrect
            ? "answer-option opt-correct opt-disabled"
            : isWrong
            ? "answer-option opt-incorrect opt-disabled"
            : "answer-option";
          return (
            <div key={s.id} className={`p-3 rounded-lg ${cls}`}>
              <div className="flex items-start gap-3">
                <span className="font-medium text-gray-700 min-w-[1.5rem] font-light">{s.id}.</span>
                <span className="flex-1 font-light">{s.text}</span>
                <div className="flex gap-2 shrink-0">
                  <button
                    onClick={() => !checked && setAnswers({ ...answers, [s.id]: true })}
                    disabled={checked}
                    className={`px-3 py-1 rounded-lg border-2 font-light text-sm transition
                      ${userAns === true
                        ? "bg-blue-600 text-white border-blue-600"
                        : "bg-white text-gray-700 border-gray-300 hover:border-blue-400"}
                      ${checked ? "cursor-default" : ""}`}
                  >Rétt</button>
                  <button
                    onClick={() => !checked && setAnswers({ ...answers, [s.id]: false })}
                    disabled={checked}
                    className={`px-3 py-1 rounded-lg border-2 font-light text-sm transition
                      ${userAns === false
                        ? "bg-blue-600 text-white border-blue-600"
                        : "bg-white text-gray-700 border-gray-300 hover:border-blue-400"}
                      ${checked ? "cursor-default" : ""}`}
                  >Rangt</button>
                </div>
                {checked && (
                  <span className="text-base ml-1">{isCorrect ? "✓" : isWrong ? "✗" : "⚪"}</span>
                )}
              </div>
              {checked && !isCorrect && (
                <p className="text-sm text-green-700 mt-1.5 ml-8 font-light">
                  Rétt svar: <span className="font-medium">{s.correct ? "Rétt" : "Rangt"}</span>
                </p>
              )}
            </div>
          );
        })}
      </div>

      <div className="flex flex-wrap items-center gap-3 mt-5">
        {!checked ? (
          <button onClick={check}
            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              transition-colors font-light">
            Athuga svör
          </button>
        ) : (
          <button onClick={reset}
            className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg
              hover:bg-gray-50 transition-colors font-light text-sm">
            Reyna aftur
          </button>
        )}
        <FeedbackBadge score={score} max={data.maxPoints} />
      </div>
    </div>
  );
}

// ======== READING COMPREHENSION ========
function ReadingExercise({ data, onScore }) {
  const [answers, setAnswers] = useState({});
  const [shown, setShown]     = useState({});

  const allShown = Object.keys(shown).length === data.questions.length;

  const revealAll = () => {
    const all = {};
    data.questions.forEach(q => { all[q.id] = true; });
    setShown(all);
    onScore(data.title, data.maxPoints);
  };

  const reset = () => { setShown({}); setAnswers({}); onScore(data.title, null); };

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-7 fade-in">
      <SectionHeader
        number={data.title.split(".")[0]}
        title={data.title.replace(/^\d+\.\s*/, "")}
        subtitle={`${data.maxPoints} stig · Svaraðu með eigin orðum`}
      />

      {/* Reading text */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 mb-5">
        <h4 className="text-lg font-medium text-blue-900 mb-3">{data.subtitle}</h4>
        {data.paragraphs.map((p, i) => (
          <p key={i} className="text-gray-800 font-light leading-relaxed mb-3 last:mb-0">{p}</p>
        ))}
      </div>

      {/* Note */}
      <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-5">
        <p className="text-sm font-light text-blue-900">
          <strong className="font-medium">Athugið:</strong> Þetta eru opnar spurningar. Berðu saman
          svarið þitt við dæmisvarið — svarið þitt má vera öðruvísi orðað en á að innihalda sömu
          lykilupplýsingar.
        </p>
      </div>

      <p className="font-medium text-gray-800 mb-3">Spurningar:</p>
      <div className="space-y-4">
        {data.questions.map(q => (
          <div key={q.id} className="answer-option p-4 rounded-lg">
            <p className="font-light text-gray-900 mb-2">
              <span className="font-medium text-blue-600">{String.fromCharCode(96 + q.id)})</span>{" "}
              {q.q}
            </p>
            <textarea
              value={answers[q.id] || ""}
              onChange={e => setAnswers({ ...answers, [q.id]: e.target.value })}
              rows={2}
              className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                focus:outline-none focus:border-blue-400 font-light resize-none"
              placeholder="Skrifaðu svarið þitt hér..."
            />
            {shown[q.id] ? (
              <div className="mt-2 p-3 bg-green-50 border border-green-200 rounded-lg fade-in">
                <p className="text-xs font-medium text-green-800 uppercase tracking-wide mb-1">
                  Dæmisvar
                </p>
                <p className="text-gray-800 font-light">{q.example}</p>
              </div>
            ) : (
              <button
                onClick={() => setShown({ ...shown, [q.id]: true })}
                className="mt-2 text-sm bg-amber-50 hover:bg-amber-100 text-amber-900
                  font-light px-3 py-1.5 rounded-lg border border-amber-300 transition">
                💡 Sýna dæmisvar
              </button>
            )}
          </div>
        ))}
      </div>

      <div className="flex flex-wrap items-center gap-3 mt-5">
        {!allShown ? (
          <button onClick={revealAll}
            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              transition-colors font-light">
            Sýna öll dæmisvör
          </button>
        ) : (
          <button onClick={reset}
            className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg
              hover:bg-gray-50 transition-colors font-light text-sm">
            Reyna aftur
          </button>
        )}
      </div>
    </div>
  );
}

// ======== MULTIPLE CHOICE ========
function MultipleChoiceExercise({ data, onScore }) {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  const shuffledQuestions = useMemo(() =>
    data.questions.map(q => ({ ...q, options: shuffle(q.options) }))
  , []);

  const correctCount = () =>
    data.questions.filter(q => answers[q.id] === q.correct).length;

  const check = () => {
    const score = Math.round((correctCount() / data.questions.length) * data.maxPoints);
    setChecked(true);
    onScore(data.title, score);
  };

  const reset = () => { setAnswers({}); setChecked(false); onScore(data.title, null); };

  const score = checked
    ? Math.round((correctCount() / data.questions.length) * data.maxPoints)
    : null;

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-7 fade-in">
      <SectionHeader
        number={data.title.split(".")[0]}
        title={data.title.replace(/^\d+\.\s*/, "")}
        subtitle={`${data.maxPoints} stig · Veldu rétt svar`}
      />

      <div className="space-y-4">
        {shuffledQuestions.map(q => {
          const userAns   = answers[q.id];
          const isCorrect = checked && userAns === q.correct;
          const isWrong   = checked && userAns && userAns !== q.correct;
          const wrapCls = isCorrect
            ? "answer-option opt-correct opt-disabled"
            : isWrong
            ? "answer-option opt-incorrect opt-disabled"
            : "answer-option";
          return (
            <div key={q.id} className={`p-4 rounded-lg ${wrapCls}`}>
              <p className="font-light text-gray-900 mb-2">
                <span className="font-medium text-blue-600">{q.id}.</span> {q.q}
              </p>
              <div className="space-y-1.5">
                {q.options.map(opt => {
                  const isThisCorrect = checked && opt.letter === q.correct;
                  const isThisChosen  = userAns === opt.letter;
                  const optCls = checked
                    ? isThisCorrect
                      ? "opt-correct opt-disabled"
                      : isThisChosen
                      ? "opt-incorrect opt-disabled"
                      : "opt-disabled"
                    : isThisChosen
                    ? "opt-selected"
                    : "";
                  return (
                    <label key={opt.letter}
                      className={`flex items-center gap-2.5 p-2 rounded-lg answer-option
                        ${optCls} ${checked ? "" : "cursor-pointer"}`}
                      onClick={() => !checked && setAnswers({ ...answers, [q.id]: opt.letter })}
                    >
                      <span className="font-medium text-gray-700 min-w-[1.5rem] font-light">
                        {opt.letter}.
                      </span>
                      <span className="font-light">{opt.text}</span>
                      {checked && isThisCorrect && <span className="ml-auto">✓</span>}
                      {checked && isThisChosen && !isThisCorrect && <span className="ml-auto">✗</span>}
                    </label>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex flex-wrap items-center gap-3 mt-5">
        {!checked ? (
          <button onClick={check}
            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              transition-colors font-light">
            Athuga svör
          </button>
        ) : (
          <button onClick={reset}
            className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg
              hover:bg-gray-50 transition-colors font-light text-sm">
            Reyna aftur
          </button>
        )}
        <FeedbackBadge score={score} max={data.maxPoints} />
      </div>
    </div>
  );
}

// ======== MAIN APP ========
const TABS = [
  { id: "vocab",   label: "Orðaforði",     icon: "🔤" },
  { id: "match",   label: "Pörun",         icon: "🔗" },
  { id: "fill",    label: "Eyður",         icon: "✏️" },
  { id: "tf",      label: "Rétt/Rangt",    icon: "✓"  },
  { id: "reading", label: "Lesskilningur", icon: "📖" },
  { id: "mc",      label: "Fjölval",       icon: "⭕" },
];

const SECTION_TITLES = [EX1, EX2, EX3, EX4, EX5, EX6, EX7, EX8].map(e => e.title);
const MAX_TOTAL = 100;

function App() {
  const [activeTab, setActiveTab] = useState("vocab");
  const [scores, setScores]       = useState({});

  const setScore = (title, score) => {
    setScores(prev => {
      const next = { ...prev };
      if (score === null) delete next[title];
      else next[title] = score;
      return next;
    });
  };

  const totalScore      = Object.values(scores).reduce((a, b) => a + b, 0);
  const pct             = Math.min(100, Math.round((totalScore / MAX_TOTAL) * 100));
  const sectionsCompleted = Object.keys(scores).length;

  // Which tabs are "done" (all their exercises scored)
  const tabDone = {
    vocab:   scores[EX1.title] !== undefined && scores[EX2.title] !== undefined,
    match:   scores[EX3.title] !== undefined && scores[EX4.title] !== undefined,
    fill:    scores[EX5.title] !== undefined,
    tf:      scores[EX6.title] !== undefined,
    reading: scores[EX7.title] !== undefined,
    mc:      scores[EX8.title] !== undefined,
  };

  return (
    <div>
      {/* Header */}
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-2">
            📝 Æfingapróf: Út og suður
          </h1>
          <p className="text-gray-500 text-sm font-light">
            Kaflar 1–7: Áhugamál · Líkamsrækt · Björgunarsveitir · Jól · Páskar · Sumardagurinn fyrsti · Dívalí
          </p>
        </div>
      </header>

      {/* Instruction box */}
      <div className="max-w-4xl mx-auto px-6 pt-6">
        <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-2">
          <p className="text-sm font-light text-blue-900">
            ✏️ Farðu í gegnum alla flipana · Fáðu endurgjöf strax · Æfðu þig fyrir lokaprófið
          </p>
        </div>
      </div>

      {/* Tabs */}
      <div className="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
        <div className="max-w-4xl mx-auto px-2 py-0 flex overflow-x-auto">
          {TABS.map(t => (
            <button
              key={t.id}
              onClick={() => setActiveTab(t.id)}
              className={`tab-btn shrink-0 px-3 md:px-5 py-3 text-sm md:text-base font-light
                text-gray-600 whitespace-nowrap
                ${activeTab === t.id ? "tab-active" : ""}`}
            >
              <span className="mr-1">{t.icon}</span>
              {t.label}
              {tabDone[t.id] && <span className="ml-1 text-blue-600">✓</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Main content */}
      <main className="max-w-4xl mx-auto px-4 py-6 space-y-5 pb-28">
        {activeTab === "vocab" && (
          <>
            <MatchingExercise data={EX1} onScore={setScore} rightLabel="Skýringar" type="word" />
            <MatchingExercise data={EX2} onScore={setScore} rightLabel="Orð B" type="word" />
          </>
        )}
        {activeTab === "match" && (
          <>
            <MatchingExercise data={EX3} onScore={setScore} rightLabel="Endingar setninga" type="sentence" />
            <MatchingExercise data={EX4} onScore={setScore} rightLabel="Dálkur B" type="word" />
          </>
        )}
        {activeTab === "fill"    && <FillExercise           data={EX5} onScore={setScore} />}
        {activeTab === "tf"      && <TrueFalseExercise      data={EX6} onScore={setScore} />}
        {activeTab === "reading" && <ReadingExercise        data={EX7} onScore={setScore} />}
        {activeTab === "mc"      && <MultipleChoiceExercise data={EX8} onScore={setScore} />}
      </main>

      {/* Fixed progress footer */}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
        <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
          {TABS.map(t => (
            <button key={t.id}
              onClick={() => setActiveTab(t.id)}
              className={`flex-1 py-2 rounded-lg text-sm font-light transition-colors
                ${tabDone[t.id]
                  ? "bg-blue-600 text-white"
                  : activeTab === t.id
                  ? "bg-blue-50 text-blue-600 border border-blue-200"
                  : "bg-gray-100 text-gray-500"}`}>
              {tabDone[t.id] ? "✓ " : ""}{t.label}
            </button>
          ))}
        </div>
        {/* Score row */}
        <div className="max-w-4xl mx-auto px-6 pb-3 flex items-center justify-between gap-4">
          <div className="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
            <div
              className="h-full bg-blue-600 transition-all duration-500 rounded-full"
              style={{ width: `${pct}%` }}
            />
          </div>
          <span className="text-sm font-light text-gray-600 whitespace-nowrap">
            <span className="font-medium text-blue-700">{totalScore}</span> / {MAX_TOTAL} stig
          </span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
