<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Orðagáta – kaflar 7–9</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .speaking { animation: pulse-green 1s ease infinite; }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled  { cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const CHAPTERS = [
      {
        id: 'dival',
        label: 'Dívalí',
        emoji: '🪔',
        color: 'amber',
        words: [
          { word: 'hátíð (kvk)',          audio: 'media/ordagata7-9_divali01.mp3', hint: 'sérstakur dagur eða tími sem fólk fagnar, t.d. jól eða Eid' },
          { word: 'kerti (hk)',            audio: 'media/ordagata7-9_divali02.mp3', hint: 'hlutur úr vaxi sem gefur ljós þegar þú kveikir eld á honum' },
          { word: 'flugeldur (kk)',        audio: 'media/ordagata7-9_divali03.mp3', hint: 'hlutur sem þú skýtur upp í loft og gerir lit og hljóð' },
          { word: 'sælgæti (hk)',          audio: 'media/ordagata7-9_divali04.mp3', hint: 'eitthvað sætt sem maður borðar, annað orð yfir nammi' },
          { word: 'matarboð (hk)',         audio: 'media/ordagata7-9_divali05.mp3', hint: 'þegar fólk kemur saman til að borða' },
          { word: 'hefðbundinn (lo)',      audio: 'media/ordagata7-9_divali06.mp3', hint: 'gamall og þekktur, eins og fólk hefur gert í langan tíma' },
          { word: 'sigur (kk)',            audio: 'media/ordagata7-9_divali07.mp3', hint: 'þegar þú vinnur eða nærð markmiðinu þínu' },
          { word: 'upphaf (hk)',           audio: 'media/ordagata7-9_divali08.mp3', hint: 'þegar eitthvað byrjar' },
          { word: 'skreyta (so)',          audio: 'media/ordagata7-9_divali09.mp3', hint: 'setja fallega hluti á eitthvað til að það líti vel út' },
          { word: 'eldhúsáhöld (hk.ft)',   audio: 'media/ordagata7-9_divali10.mp3', hint: 'hlutir sem þú notar til að elda mat, til dæmis pottur og panna' },
          { word: 'sari (kk)',             audio: 'media/ordagata7-9_divali11.mp3', hint: 'hefðbundinn klæðnaður sem konur nota á Indlandi' },
          { word: 'tungl (hk)',            audio: 'media/ordagata7-9_divali12.mp3', hint: 'við sjáum þetta á nóttunni á himninum' },
          { word: 'litríkur (lo)',         audio: 'media/ordagata7-9_divali13.mp3', hint: 'með mörgum fallegum litum' },
        ]
      },
      {
        id: 'juni',
        label: '17. júní',
        emoji: '🇮🇸',
        color: 'blue',
        words: [
          { word: 'þjóðhátíðardagur (kk)', audio: 'media/ordagata7-9_juni01.mp3', hint: 'sérstakur frídagur þar sem fólk fagnar landinu sínu' },
          { word: 'sjálfstæði (hk)',        audio: 'media/ordagata7-9_juni02.mp3', hint: 'þegar land stjórnar sér sjálft og annað land ræður ekki yfir því' },
          { word: 'þjóðbúningur (kk)',      audio: 'media/ordagata7-9_juni03.mp3', hint: 'hefðbundinn klæðnaður fyrir land eða þjóð' },
          { word: 'fáni (kk)',              audio: 'media/ordagata7-9_juni04.mp3', hint: 'merki lands. Stundum hengt upp í stöng. Litir Íslands eru blár, rauður og hvítur.' },
          { word: 'skrúðganga (kvk)',       audio: 'media/ordagata7-9_juni05.mp3', hint: 'þegar margir ganga saman á götu til að fagna einhverju. Oft með fána og tónlist.' },
          { word: 'lúðrasveit (kvk)',       audio: 'media/ordagata7-9_juni06.mp3', hint: 'hópur tónlistarmanna sem spila á blásturshljóðfæri' },
          { word: 'ræða (kvk)',             audio: 'media/ordagata7-9_juni07.mp3', hint: 'ein manneskja talar við margar og segir eitthvað ákveðið' },
          { word: 'andlitsmálning (kvk)',   audio: 'media/ordagata7-9_juni08.mp3', hint: 'þegar þú málar skemmtilegar myndir framan í þig' },
          { word: 'leiktæki (hk.ft)',       audio: 'media/ordagata7-9_juni09.mp3', hint: 'hlutir sem börn leika sér á, til dæmis rennibraut' },
          { word: 'pylsa (kvk)',            audio: 'media/ordagata7-9_juni10.mp3', hint: 'matur sem er oft borðaður í brauði með til dæmis tómatsósu og sinnepi' },
          { word: 'hljómsveit (kvk)',       audio: 'media/ordagata7-9_juni11.mp3', hint: 'hópur tónlistarmanna sem spila saman' },
          { word: 'berjast (so)',           audio: 'media/ordagata7-9_juni12.mp3', hint: 'reyna mikið að gera eitthvað' },
        ]
      },
      {
        id: 'vinna',
        label: 'Sumarvinna',
        emoji: '💼',
        color: 'green',
        words: [
          { word: 'sumarvinna (kvk)',      audio: 'media/ordagata7-9_vinna01.mp3', hint: 'starf sem einhver fær yfir sumarið' },
          { word: 'atvinnuviðtal (hk)',    audio: 'media/ordagata7-9_vinna02.mp3', hint: 'þegar þú hittir vinnuveitanda til að fá vinnu' },
          { word: 'ferilskrá (kvk)',       audio: 'media/ordagata7-9_vinna03.mp3', hint: 'skjal þar sem þú skrifar um menntun þína og reynslu' },
          { word: 'umsókn (kvk)',          audio: 'media/ordagata7-9_vinna04.mp3', hint: 'þegar þú biður um eitthvað, til dæmis vinnu. Oft skrifað.' },
          { word: 'stundvís (lo)',         audio: 'media/ordagata7-9_vinna05.mp3', hint: 'kemur alltaf á réttum tíma, er aldrei of seinn' },
          { word: 'kurteis (lo)',          audio: 'media/ordagata7-9_vinna06.mp3', hint: 'talar við aðra á góðan og fallegan hátt' },
          { word: 'laun (hk.ft)',          audio: 'media/ordagata7-9_vinna07.mp3', hint: 'peningar sem þú færð fyrir vinnu' },
          { word: 'tímaskrá (kvk)',        audio: 'media/ordagata7-9_vinna08.mp3', hint: 'skrá þar sem vinnustundir eru skráðar' },
          { word: 'viðskiptavinur (kk)',   audio: 'media/ordagata7-9_vinna09.mp3', hint: 'manneskja sem kaupir eitthvað í búð' },
          { word: 'kvittun (kvk)',         audio: 'media/ordagata7-9_vinna10.mp3', hint: 'pappír sem sýnir hvað þú borgaðir og hvenær' },
          { word: 'skiptimiði (kk)',       audio: 'media/ordagata7-9_vinna11.mp3', hint: 'miði sem þú færð þegar þú vilt kannski skila vöru' },
          { word: 'strikamerki (hk)',      audio: 'media/ordagata7-9_vinna12.mp3', hint: 'svart og hvítt merki á vöru sem sýnir upplýsingar' },
          { word: 'skanni (kk)',           audio: 'media/ordagata7-9_vinna13.mp3', hint: 'tæki sem les strikamerki og segir til dæmis hvað eitthvað kostar' },
          { word: 'hilla (kvk)',           audio: 'media/ordagata7-9_vinna14.mp3', hint: 'staður þar sem vörur eru geymdar í búð eða bækur heima' },
          { word: 'verðmiði (kk)',         audio: 'media/ordagata7-9_vinna15.mp3', hint: 'lítill miði á vöru sem sýnir hvað hún kostar' },
          { word: 'leiðbeinandi (kk)',     audio: 'media/ordagata7-9_vinna16.mp3', hint: 'maður sem kennir öðrum hvað á að gera á nýrri vinnu' },
          { word: 'yfirmaður (kk)',        audio: 'media/ordagata7-9_vinna17.mp3', hint: 'sá sem er yfir öðru starfsfólki á vinnustað' },
          { word: 'vakt (kvk)',            audio: 'media/ordagata7-9_vinna18.mp3', hint: 'tímabil þar sem þú vinnur, til dæmis bara um morgun eða yfir nótt' },
          { word: 'geymsla (kvk)',         audio: 'media/ordagata7-9_vinna19.mp3', hint: 'herbergi þar sem hlutir eru geymdir' },
          { word: 'auglýsing (kvk)',       audio: 'media/ordagata7-9_vinna20.mp3', hint: 'skilaboð sem segja þér að eitthvað er til sölu eða í boði' },
          { word: 'tilboð (hk)',           audio: 'media/ordagata7-9_vinna21.mp3', hint: 'þegar vara kostar minna en venjulega' },
        ]
      },
    ];

    const ALL_WORDS = CHAPTERS.flatMap(c => c.words);

    const CHAPTER_COLORS = {
      amber: { filter: 'border-amber-300 bg-amber-50 text-amber-800', active: 'bg-amber-500 text-white border-amber-500' },
      blue:  { filter: 'border-blue-300 bg-blue-50 text-blue-800',   active: 'bg-blue-600 text-white border-blue-600' },
      green: { filter: 'border-green-300 bg-green-50 text-green-800', active: 'bg-green-600 text-white border-green-600' },
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getOptions(correct, pool) {
      const others = pool.filter(w => w.word !== correct.word);
      const wrong = shuffle(others).slice(0, 3).map(w => w.word);
      return shuffle([correct.word, ...wrong]);
    }

    const App = () => {
      const [chapterFilter, setChapterFilter] = useState('all');
      const [gameStarted,   setGameStarted]   = useState(false);
      const [queue,         setQueue]         = useState([]);
      const [current,       setCurrent]       = useState(0);
      const [selected,      setSelected]      = useState(null);
      const [revealed,      setRevealed]      = useState(false);
      const [score,         setScore]         = useState({ correct: 0, total: 0 });
      const [speaking,      setSpeaking]      = useState(false);
      const [done,          setDone]          = useState(false);
      const audioRef = useRef(null);

      const pool = chapterFilter === 'all'
        ? ALL_WORDS
        : CHAPTERS.find(c => c.id === chapterFilter)?.words ?? ALL_WORDS;

      const startGame = useCallback(() => {
        const shuffled = shuffle(pool).map(item => ({
          ...item,
          options: getOptions(item, pool.length >= 4 ? pool : ALL_WORDS),
        }));
        setQueue(shuffled);
        setCurrent(0);
        setSelected(null);
        setRevealed(false);
        setScore({ correct: 0, total: 0 });
        setDone(false);
        setGameStarted(true);
      }, [chapterFilter, pool]);

      const card = queue[current];

      const playHint = useCallback(() => {
        if (!card) return;
        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        setSpeaking(true);
        const audio = new Audio(card.audio);
        audioRef.current = audio;
        audio.onended = () => setSpeaking(false);
        audio.onerror = () => setSpeaking(false);
        audio.play().catch(() => setSpeaking(false));
      }, [card]);

      useEffect(() => {
        if (gameStarted && card && !revealed) {
          playHint();
        }
        return () => {
          if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        };
      }, [current, gameStarted]);

      const handleAnswer = (opt) => {
        if (revealed) return;
        setSelected(opt);
        setRevealed(true);
        const correct = opt === card.word;
        setScore(prev => ({
          correct: prev.correct + (correct ? 1 : 0),
          total: prev.total + 1,
        }));
      };

      const next = () => {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        if (current + 1 >= queue.length) {
          setDone(true);
        } else {
          setCurrent(c => c + 1);
          setSelected(null);
          setRevealed(false);
        }
      };

      const pct = queue.length > 0 ? Math.round((current / queue.length) * 100) : 0;
      const isCorrect = selected === card?.word;

      // ── Forsíða ───────────────────────────────────────────────────────────
      if (!gameStarted) return (
        <>
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
              <p className="text-gray-500 text-sm font-light">Dívalí · 17. júní · Sumarvinna · A1–A2</p>
            </div>
          </header>
          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4">
            <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
              <p className="text-sm font-light text-green-800">
                <span className="block">🎧 Hlustaðu á lýsinguna og veldu rétta orðið</span>
                <span className="block">🔄 Þú getur hlustað aftur á lýsinguna hvenær sem er</span>
              </p>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
              <h2 className="text-base font-medium text-gray-800 mb-4">Veldu kafla</h2>
              <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
                {[
                  { id: 'all',   label: '📚 Allir kaflar', count: ALL_WORDS.length },
                  { id: 'dival', label: '🪔 Dívalí',       count: CHAPTERS[0].words.length },
                  { id: 'juni',  label: '🇮🇸 17. júní',     count: CHAPTERS[1].words.length },
                  { id: 'vinna', label: '💼 Sumarvinna',   count: CHAPTERS[2].words.length },
                ].map(opt => (
                  <button key={opt.id} onClick={() => setChapterFilter(opt.id)}
                    className={`p-4 rounded-xl border-2 text-left transition-all
                      ${chapterFilter === opt.id
                        ? 'border-green-500 bg-green-50'
                        : 'border-gray-200 hover:border-green-300 hover:bg-green-50'}`}>
                    <div className="text-sm font-medium text-gray-800">{opt.label}</div>
                    <div className="text-xs text-gray-500 font-light mt-1">{opt.count} orð</div>
                  </button>
                ))}
              </div>
              <button onClick={startGame}
                className="mt-6 w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-base">
                Byrja leikinn 🎮
              </button>
            </div>
          </main>
        </>
      );

      // ── Lokasíða ──────────────────────────────────────────────────────────
      if (done) {
        const pctCorrect = Math.round((score.correct / score.total) * 100);
        return (
          <>
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => setGameStarted(false)}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
                <p className="text-gray-500 text-sm font-light">Niðurstaða</p>
              </div>
            </header>
            <main className="max-w-4xl mx-auto px-6 mt-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center fade-in">
                <div className="text-5xl mb-4">
                  {pctCorrect >= 80 ? '🎉' : pctCorrect >= 50 ? '👍' : '💪'}
                </div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Vel gert!</h2>
                <p className="text-gray-600 font-light mb-1">
                  Þú fékkst <strong>{score.correct}</strong> af <strong>{score.total}</strong> rétt
                </p>
                <p className="text-3xl font-light text-green-600 mb-8">{pctCorrect}%</p>
                <div className="w-full bg-gray-100 rounded-full h-3 mb-8">
                  <div className="bg-green-500 h-3 rounded-full transition-all duration-700"
                    style={{ width: `${pctCorrect}%` }} />
                </div>
                <p className="text-gray-500 font-light text-sm mb-6">
                  {pctCorrect >= 80 ? 'Frábært! Þú þekkir þessi orð mjög vel.' :
                   pctCorrect >= 50 ? 'Góð byrjun! Haltu áfram að æfa.' :
                   'Haltu áfram – æfing skapar meistar!'}
                </p>
                <div className="flex gap-3 justify-center flex-wrap">
                  <button onClick={startGame}
                    className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                    Reyna aftur 🔄
                  </button>
                  <button onClick={() => setGameStarted(false)}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light">
                    Velja kafla
                  </button>
                </div>
              </div>
            </main>
          </>
        );
      }

      // ── Leikurinn ─────────────────────────────────────────────────────────
      return (
        <>
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => { if (audioRef.current) audioRef.current.pause(); setGameStarted(false); }}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
              <p className="text-gray-500 text-sm font-light">
                Orð {current + 1} af {queue.length} · {score.correct} rétt
              </p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 pb-6 space-y-4">

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <div className="flex items-center gap-3">
                <div className="flex-1 bg-gray-100 rounded-full h-2">
                  <div className="bg-green-500 h-2 rounded-full transition-all duration-500"
                    style={{ width: `${pct}%` }} />
                </div>
                <span className="text-xs text-gray-400 font-light whitespace-nowrap">
                  {current}/{queue.length}
                </span>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in" key={current}>
              <div className="flex flex-col items-center text-center mb-6">
                <button
                  onClick={playHint}
                  disabled={speaking}
                  className={`w-20 h-20 rounded-full flex items-center justify-center transition-all text-white mb-3
                    ${speaking ? 'bg-green-500 speaking' : 'bg-green-600 hover:bg-green-700'}`}>
                  {speaking
                    ? <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    : <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  }
                </button>
                <p className="text-xs text-gray-400 font-light uppercase tracking-wide">
                  {speaking ? 'Hlustaðu...' : 'Ýttu til að hlusta aftur'}
                </p>

                {revealed && (
                  <div className="mt-4 bg-gray-50 border border-gray-200 rounded-xl px-5 py-3 fade-in">
                    <p className="text-xs text-gray-400 font-light mb-1 uppercase tracking-wide">Lýsingin</p>
                    <p className="text-gray-700 font-light leading-relaxed text-sm">{card.hint}</p>
                  </div>
                )}
              </div>

              <p className="text-sm text-gray-500 font-light mb-3">Hvaða orð er þetta?</p>

              <div className="grid grid-cols-2 gap-3">
                {card.options.map((opt, i) => {
                  const isCorr = opt === card.word;
                  const isSel  = opt === selected;
                  let cls = 'answer-option p-4 rounded-xl text-center font-light text-gray-800';
                  if (revealed) {
                    cls += ' opt-disabled';
                    if (isCorr) cls += ' opt-correct';
                    else if (isSel) cls += ' opt-incorrect';
                  } else if (isSel) {
                    cls += ' opt-selected';
                  }
                  return (
                    <div key={i} className={cls} onClick={() => handleAnswer(opt)}>
                      <div className="flex items-center justify-between gap-2">
                        <span className="text-sm">{opt}</span>
                        {revealed && isCorr && <span className="text-green-600">✓</span>}
                        {revealed && isSel && !isCorr && <span className="text-red-500">✗</span>}
                      </div>
                    </div>
                  );
                })}
              </div>

              {revealed && (
                <div className={`mt-4 p-4 rounded-xl border fade-in flex items-center justify-between gap-4
                  ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                  <p className={`font-medium text-sm ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                    {isCorrect ? '🎉 Rétt!' : `✗ Rangt – rétta svarið er: ${card.word}`}
                  </p>
                  <button onClick={next}
                    className="flex-shrink-0 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                    {current + 1 >= queue.length ? 'Sjá niðurstöður →' : 'Næsta →'}
                  </button>
                </div>
              )}
            </div>

          </main>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
