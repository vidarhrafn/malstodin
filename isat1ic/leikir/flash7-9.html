<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🃏 Flash kort – kaflar 7–9</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes flip {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); }
    }
    .flip { animation: flip 0.35s ease both; }
    .card-area { perspective: 1000px; }
    @keyframes learnedPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .learned-pulse { animation: learnedPulse 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const CHAPTERS = [
      {
        id: 'dival',
        label: 'Dívalí',
        emoji: '🪔',
        color: 'amber',
        words: [
          { w: 'hátíð (kvk)',          hint: 'sérstakur dagur eða tími sem fólk fagnar' },
          { w: 'kerti (hk)',            hint: 'hlutur úr vaxi sem gefur ljós þegar þú kveikir á honum' },
          { w: 'flugeldur (kk)',        hint: 'hlutur sem skýtur upp á loftið og gerir lit og hljóð' },
          { w: 'sælgæti (hk)',          hint: 'eitthvað sætt sem maður borðar, t.d. nammi eða kökur' },
          { w: 'matarboð (hk)',         hint: 'þegar fólk kemur saman til að borða mat' },
          { w: 'hefðbundinn (lo)',      hint: 'gamall og þekktur, eins og fólk hefur gert í langan tíma' },
          { w: 'hindúi (kk)',           hint: 'maður sem trúir á hindúatrú' },
          { w: 'sigur (kk)',            hint: 'þegar þú vinnur eða nærð markmiðinu þínu' },
          { w: 'upphaf (hk)',           hint: 'þegar eitthvað byrjar' },
          { w: 'skreyta (so)',          hint: 'setja falleg hluti á eitthvað til að það líti vel út' },
          { w: 'eldhúsáhöld (hk.ft)',  hint: 'hlutir sem þú notar til að elda mat, t.d. pottur og panna' },
          { w: 'sari (kk)',             hint: 'hefðbundinn klæðnaður sem konur nota á Indlandi' },
          { w: 'tungl (hk)',            hint: 'hvíti hringurinn á næturhimninum' },
          { w: 'kveikja á ljósum',      hint: 'gera það að ljósin fara af' },
          { w: 'litríkur (lo)',         hint: 'með mörgum fögrum litum' },
        ]
      },
      {
        id: 'juni',
        label: '17. júní',
        emoji: '🇮🇸',
        color: 'blue',
        words: [
          { w: 'þjóðhátíðardagur (kk)', hint: 'sérstakur frídagur þar sem fólk fagnar landi sínu' },
          { w: 'sjálfstæði (hk)',        hint: 'þegar land stjórnar sér sjálft og er óháð öðrum löndum' },
          { w: 'þjóðbúningur (kk)',      hint: 'hefðbundinn klæðnaður sem táknar land eða þjóð' },
          { w: 'fáni (kk)',              hint: 'litað dúkur sem táknar land eða hóp' },
          { w: 'skrúðganga (kvk)',       hint: 'þegar margir ganga saman á götu til að fagna einhverju' },
          { w: 'lúðrasveit (kvk)',       hint: 'hópur tónlistarmanna sem spila á blásturshljóðfæri' },
          { w: 'ræða (kvk)',             hint: 'tal sem einn maður flytur fyrir fleiri' },
          { w: 'forseti (kk)',           hint: 'æðsti leiðtogi lands eða ríkis' },
          { w: 'andlitsmálning (kvk)',   hint: 'þegar þú málar á andlit þitt í skemmtilegar myndir' },
          { w: 'leiktæki (hk.ft)',       hint: 'hlutir sem börn leika sér á, t.d. rennibraut' },
          { w: 'pylsa (kvk)',            hint: 'mat úr kjöti sem er langt og þunnt' },
          { w: 'hljómsveit (kvk)',       hint: 'hópur tónlistarmanna sem spila saman' },
          { w: 'upphlutur (kk)',         hint: 'hluti af þjóðbúningi sem er á efri hluta líkamans' },
          { w: 'berjast (so)',           hint: 'reyna hart að ná einhverju eða standa gegn einhverju' },
        ]
      },
      {
        id: 'sumarvinna',
        label: 'Sumarvinna',
        emoji: '💼',
        color: 'green',
        words: [
          { w: 'sumarvinna (kvk)',     hint: 'vinna sem nemandi fær yfir sumarið' },
          { w: 'atvinnuviðtal (hk)',   hint: 'þegar þú hittir vinnuveitanda til að fá vinnu' },
          { w: 'ferilskrá (kvk)',      hint: 'skjal þar sem þú skrifar um menntun þína og reynslu' },
          { w: 'umsókn (kvk)',         hint: 'þegar þú biður formlega um eitthvað, t.d. vinnu' },
          { w: 'stundvís (lo)',        hint: 'kemur alltaf á réttum tíma, er aldrei of seinn' },
          { w: 'kurteis (lo)',         hint: 'talar við aðra á góðan og heiðvirðan hátt' },
          { w: 'laun (hk.ft)',         hint: 'peningar sem þú færð fyrir vinnu' },
          { w: 'tímaskrá (kvk)',       hint: 'skrá þar sem vinnustundir eru skráðar' },
          { w: 'viðskiptavinur (kk)', hint: 'maður sem kaupir eitthvað í búð' },
          { w: 'kvittun (kvk)',        hint: 'pappír sem sýnir hvað þú borgaðir og hvenær' },
          { w: 'skiptimiði (kk)',      hint: 'miði sem þú færð þegar þú skilar vöru' },
          { w: 'strikamerki (hk)',     hint: 'svart og hvítt mynstur á vöru sem inniheldur upplýsingar' },
          { w: 'skanni (kk)',          hint: 'tæki sem les strikamerki' },
          { w: 'hilla (kvk)',          hint: 'flötur þar sem vörur eru geymdar í búð' },
          { w: 'verðmiði (kk)',        hint: 'lítill miði á vöru sem sýnir hvað hún kostar' },
          { w: 'leiðbeinandi (kk)',    hint: 'maður sem kennir öðrum hvað á að gera á nýrri vinnu' },
          { w: 'yfirmaður (kk)',       hint: 'sá sem er yfir öðru starfsfólki á vinnustað' },
          { w: 'vakt (kvk)',           hint: 'tímabil þar sem þú vinnur, t.d. morgunvakt' },
          { w: 'geymsla (kvk)',        hint: 'herbergi þar sem hlutir eru geymdar' },
          { w: 'auglýsing (kvk)',      hint: 'skilaboð sem segja þér að eitthvað er til sölu eða í boði' },
          { w: 'tilboð (hk)',          hint: 'þegar vara er seld á lægra verði en venjulega' },
        ]
      },
    ];

    const CHAPTER_COLORS = {
      amber: {
        filter: 'bg-amber-50 text-amber-800 border-amber-200 hover:bg-amber-100',
        active: 'bg-amber-500 text-white border-amber-500',
        front: 'border-amber-200',
        badge: 'bg-amber-100 text-amber-700',
      },
      blue: {
        filter: 'bg-blue-50 text-blue-800 border-blue-200 hover:bg-blue-100',
        active: 'bg-blue-600 text-white border-blue-600',
        front: 'border-blue-200',
        badge: 'bg-blue-100 text-blue-700',
      },
      green: {
        filter: 'bg-green-50 text-green-800 border-green-200 hover:bg-green-100',
        active: 'bg-green-600 text-white border-green-600',
        front: 'border-green-200',
        badge: 'bg-green-100 text-green-700',
      },
    };

    async function playAudio(text, onEnd) {
      try {
        const r = await fetch('/.netlify/functions/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text_to_speak: text })
        });
        const data = await r.json();
        if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(); return; }
        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
        audio.onended = () => onEnd && onEnd();
        audio.onerror = () => onEnd && onEnd();
        await audio.play().catch(() => onEnd && onEnd());
        return audio;
      } catch (e) {
        console.error(e);
        onEnd && onEnd();
      }
    }

    const ListenPill = ({ text, label }) => {
      const [speaking, setSpeaking] = useState(false);
      const handle = () => {
        if (speaking) return;
        setSpeaking(true);
        playAudio(text, () => setSpeaking(false));
      };
      return (
        <button onClick={handle}
          className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-xl text-sm border transition-all
            ${speaking ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-100 text-gray-600 border-gray-200 hover:bg-gray-200'}`}>
          <span className="opacity-70">🎧</span>
          <span className="font-light">{label || 'Hlustaðu'}</span>
          <span className={`text-green-600 ${speaking ? 'animate-pulse' : ''}`}>🔊</span>
        </button>
      );
    };

    const FlashcardsApp = () => {
      const [chapterFilter, setChapterFilter] = useState('all');
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [animating, setAnimating] = useState(false);
      const [learned, setLearned] = useState(new Set());
      const [learnedPulse, setLearnedPulse] = useState(false);
      const [done, setDone] = useState(false);

      const allWords = CHAPTERS.flatMap(ch => ch.words.map(w => ({ ...w, chapter: ch.id, color: ch.color, chLabel: ch.label })));
      const deck = chapterFilter === 'all'
        ? allWords
        : allWords.filter(w => w.chapter === chapterFilter);

      const card = deck[idx] || null;
      const colors = card ? CHAPTER_COLORS[card.color] : CHAPTER_COLORS.blue;

      const isLearned = card ? learned.has(card.w) : false;

      useEffect(() => {
        setIdx(0);
        setFlipped(false);
        setDone(false);
      }, [chapterFilter]);

      const flip = useCallback(() => {
        if (animating) return;
        setAnimating(true);
        setTimeout(() => {
          setFlipped(f => !f);
          setAnimating(false);
        }, 175);
      }, [animating]);

      const goNext = useCallback(() => {
        if (animating) return;
        setAnimating(true);
        setTimeout(() => {
          setFlipped(false);
          if (idx >= deck.length - 1) {
            setDone(true);
          } else {
            setIdx(i => i + 1);
          }
          setAnimating(false);
        }, 175);
      }, [animating, idx, deck.length]);

      const goPrev = useCallback(() => {
        if (animating || idx === 0) return;
        setAnimating(true);
        setTimeout(() => {
          setFlipped(false);
          setIdx(i => i - 1);
          setAnimating(false);
        }, 175);
      }, [animating, idx]);

      const toggleLearned = () => {
        if (!card) return;
        setLearnedPulse(true);
        setTimeout(() => setLearnedPulse(false), 300);
        setLearned(prev => {
          const next = new Set(prev);
          next.has(card.w) ? next.delete(card.w) : next.add(card.w);
          return next;
        });
      };

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') goNext();
          else if (e.key === 'ArrowLeft') goPrev();
          else if (e.key === ' ') { e.preventDefault(); flip(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [goNext, goPrev, flip]);

      const restart = () => {
        setIdx(0);
        setFlipped(false);
        setDone(false);
      };

      return (
        <div className="min-h-screen">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🃏 Flash kort – kaflar 7–9</h1>
              <p className="text-gray-500 text-sm font-light">Dívalí · 17. júní · Sumarvinna — {allWords.length} orð</p>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-6 py-8 fade-in">

            {/* Kaflafilter */}
            <div className="flex flex-wrap gap-2 mb-8">
              <button
                onClick={() => setChapterFilter('all')}
                className={`px-4 py-2 rounded-lg border text-sm font-light transition-all
                  ${chapterFilter === 'all' ? 'bg-gray-700 text-white border-gray-700' : 'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'}`}>
                Allt ({allWords.length})
              </button>
              {CHAPTERS.map(ch => {
                const c = CHAPTER_COLORS[ch.color];
                const active = chapterFilter === ch.id;
                return (
                  <button key={ch.id}
                    onClick={() => setChapterFilter(ch.id)}
                    className={`px-4 py-2 rounded-lg border text-sm font-light transition-all
                      ${active ? c.active : c.filter}`}>
                    {ch.emoji} {ch.label} ({ch.words.length})
                  </button>
                );
              })}
            </div>

            {done ? (
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center fade-in">
                <div className="text-5xl mb-4">🎉</div>
                <h2 className="text-xl font-light text-gray-800 mb-2">Búið!</h2>
                <p className="text-gray-500 font-light mb-2">
                  Þú fórst í gegnum {deck.length} orð.
                </p>
                <p className="text-green-600 font-light mb-6">
                  ✅ Lærð: {[...learned].filter(w => deck.some(d => d.w === w)).length} / {deck.length}
                </p>
                <button onClick={restart}
                  className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                  Aftur frá byrjun
                </button>
              </div>
            ) : card ? (
              <>
                {/* Framvindustika */}
                <div className="flex items-center gap-2 mb-6">
                  <div className="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                    <div className="h-full bg-green-500 rounded-full transition-all duration-500"
                      style={{ width: `${((idx + 1) / deck.length) * 100}%` }} />
                  </div>
                  <span className="text-xs text-gray-400 font-light whitespace-nowrap">{idx + 1} / {deck.length}</span>
                </div>

                {/* Kaflamiði */}
                <div className="flex items-center gap-2 mb-4">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-light ${colors.badge}`}>
                    {card.chLabel}
                  </span>
                  {isLearned && (
                    <span className="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-light">✅ Lært</span>
                  )}
                </div>

                {/* Kort */}
                <div className="card-area mb-4">
                  <div
                    onClick={flip}
                    className={`bg-white rounded-xl shadow-sm border-2 ${colors.front} cursor-pointer
                      min-h-52 flex flex-col items-center justify-center p-8 text-center
                      ${animating ? 'flip' : ''} transition-colors hover:shadow-md`}>
                    {!flipped ? (
                      <>
                        <p className="text-2xl font-light text-gray-800 mb-4">{card.w}</p>
                        <ListenPill text={card.w.replace(/\s*\(.*?\)/g, '')} label="Hlustaðu" />
                        <p className="text-xs text-gray-400 font-light mt-6">Smelltu til að sjá skýringu</p>
                      </>
                    ) : (
                      <>
                        <p className="text-base font-light text-gray-600 mb-4 leading-relaxed">{card.hint}</p>
                        <p className="text-sm font-medium text-gray-800">{card.w}</p>
                      </>
                    )}
                  </div>
                </div>

                {/* Takkar */}
                <div className="flex gap-3 justify-between">
                  <button onClick={goPrev} disabled={idx === 0}
                    className="px-5 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                      hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors font-light text-sm">
                    ← Fyrra
                  </button>

                  <button
                    onClick={toggleLearned}
                    className={`px-5 py-2.5 rounded-lg border-2 text-sm font-light transition-all
                      ${learnedPulse ? 'learned-pulse' : ''}
                      ${isLearned
                        ? 'bg-green-50 text-green-700 border-green-300 hover:bg-green-100'
                        : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>
                    {isLearned ? '✅ Lært' : '☐ Merkja sem lært'}
                  </button>

                  <button onClick={goNext}
                    className="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                    {idx === deck.length - 1 ? 'Ljúka →' : 'Næsta →'}
                  </button>
                </div>

                <p className="text-center text-xs text-gray-400 font-light mt-4">← → til að fletta · Bil til að snúa</p>

                {/* Lærð orð */}
                {learned.size > 0 && (
                  <div className="mt-6 bg-green-50 border border-green-200 rounded-lg px-4 py-3 fade-in">
                    <p className="text-xs text-green-700 font-light mb-2">✅ Lærð orð ({learned.size}):</p>
                    <div className="flex flex-wrap gap-1">
                      {[...learned].map(w => (
                        <span key={w} className="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-light">{w}</span>
                      ))}
                    </div>
                  </div>
                )}
              </>
            ) : null}
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<FlashcardsApp />);
  </script>
</body>
</html>
