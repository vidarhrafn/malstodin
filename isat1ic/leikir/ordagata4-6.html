<!DOCTYPE html>
<html lang="is">
<head>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = '../login.html'; return; }
    try {
      const snap = await getDoc(doc(db, 'user_access', user.uid));
      if (!snap.exists()) { window.location.href = '../login.html'; return; }
      const courseData = snap.data()['isat1ic'];
      if (!courseData || !courseData.activated_at) { window.location.href = '../login.html'; return; }
      if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) { window.location.href = '../login.html'; return; }
    } catch { window.location.href = '../login.html'; }
  });
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Orðagáta: Jól, Páskar, Sumardagurinn fyrsti – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .speaking { animation: pulse-green 1s ease infinite; }

    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled  { cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COURSE = 'isat1ic';

  async function writeProgress(exerciseId, status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, exerciseId);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) {
      // Fail silently
    }
  }

  window.writeProgress = writeProgress;
</script>

<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    async function playAudio(src, onEnd) {
      try {
        const audio = new Audio(src);
        audio.onended = () => onEnd?.();
        audio.onerror = () => onEnd?.();
        await audio.play().catch(() => onEnd?.());
        return audio;
      } catch (e) {
        console.error(e);
        onEnd?.();
      }
    }

    const CHAPTERS = [
      {
        id: 'jol',
        label: 'Jól',
        prefix: 'ordagata4-6_jol',
        words: [
          { word: 'hátíð',          hint: 'Stór dagur þar sem fólk kemur saman og fagnar. Jól, páskar og sautjándi júní eru dæmi.' },
          { word: 'að skreyta',     hint: 'Þú gerir þetta þegar þú til dæmis hengir upp ljós eða skraut og gerir fínt heima.' },
          { word: 'jólatré',        hint: 'Þetta er grænt tré sem fólk setur upp og hengir skraut á.' },
          { word: 'kerti',          hint: 'Þetta er gert úr vaxi. Þú kveikir eld á því og það gefur ljós og hlýju.' },
          { word: 'ljósasería',     hint: 'Löng keðja af litlum ljósum sem fólk hengir upp á jólum.' },
          { word: 'jólasveinn',     hint: 'Þetta er gamall maður í rauðum fötum sem kemur með gjafir til barna.' },
          { word: 'gjöf',           hint: 'Þú pakkar þessu inn og gefur einhverjum á hátíð. Börn opna þetta undir jólatrénu.' },
          { word: 'Þorláksmessa',   hint: 'Þetta er dagur fyrir jól, þann tuttugasta og þriðja desember. Sumir borða fisk á þessum degi.' },
          { word: 'aðfangadagur',   hint: 'Þetta er tuttugasti og fjórði desember þegar fjölskyldan hittist og opnar gjafir. Hvað heitir þessi dagur?' },
          { word: 'spariföt',       hint: 'Þetta eru fín föt sem þú ert í á hátíðisdögum eða í veislum. Ekki daglegur fatnaður.' },
          { word: 'friður',         hint: 'Þetta er þegar enginn er að slást og allir hafa það gott saman. Jól eru tími þessa. Andstæðan er orðið stríð.' },
          { word: 'að hlakka til',  hint: 'Þú finnur fyrir þessu þegar þú bíður eftir einhverju skemmtilegu eða spennandi.' },
        ],
      },
      {
        id: 'paskar',
        label: 'Páskar',
        prefix: 'ordagata4-6_paskar',
        words: [
          { word: 'páskaegg',            hint: 'Þetta er stórt súkkulaðiegg sem börn fá á páskum. Inni í því er lítill miði.' },
          { word: 'súkkulaði',           hint: 'Þetta er brúnt og sætt og gert úr kakóbaunum og sykri. Mjög vinsælt í páskaeggjum.' },
          { word: 'málsháttur',          hint: 'Stutt og gömul setning með speki. Til dæmis: Morgunstund gefur gull í mund.' },
          { word: 'föstudagurinn langi', hint: 'Þetta er dagur á páskum þegar Jesús var krossfestur. Margt er lokað. Hvað heitir þessi dagur?' },
          { word: 'að krossfesta',       hint: 'Þegar maður er settur á kross til að refsa honum. Þetta var gert við Jesús.' },
          { word: 'veisla',              hint: 'Þú býður mörgum gestum heim, eldar mikinn mat og allir hafa gaman saman.' },
          { word: 'von',                 hint: 'Þegar þú heldur að eitthvað gott muni gerast. Páskar eru um þetta og nýtt líf.' },
        ],
      },
      {
        id: 'sumar',
        label: 'Sumardagurinn fyrsti',
        prefix: 'ordagata4-6_sumar',
        words: [
          { word: 'hátíðardagur', hint: 'Sérstakur dagur á dagatalinu þegar fólk fagnar einhverju mikilvægu.' },
          { word: 'frídagur',     hint: 'Þetta er dagur þegar skólar eru lokaðir og fólk þarf ekki að vinna.' },
          { word: 'skrúðganga',   hint: 'Þegar margir ganga saman um götur borgarinnar á hátíðardegi. Oft er tónlist og fánar.' },
          { word: 'sumargjöf',    hint: 'Lítil gjöf sem foreldrar gefa börnum sínum á sumardeginum fyrsta.' },
          { word: 'tímatal',      hint: 'Kerfi sem menn nota til að mæla daga, vikur og mánuði. Ísland hafði sitt eigið.' },
          { word: 'að fagna',     hint: 'Þetta gerir þú þegar þú ert glaður yfir einhverju. Þú heldur upp á það.' },
        ],
      },
    ];

    const ALL_WORDS = CHAPTERS.flatMap(ch =>
      ch.words.map((w, i) => ({
        ...w,
        audio: `/isat1ic/media/${ch.prefix}${String(i + 1).padStart(2, '0')}.mp3`,
      }))
    );

    const CHAPTERS_WITH_AUDIO = CHAPTERS.map(ch => ({
      ...ch,
      words: ch.words.map((w, i) => ({
        ...w,
        audio: `/isat1ic/media/${ch.prefix}${String(i + 1).padStart(2, '0')}.mp3`,
      })),
    }));

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getOptions(correct, pool) {
      const others = pool.filter(w => w.word !== correct.word);
      const wrong = shuffle(others).slice(0, 3).map(w => w.word);
      return shuffle([correct.word, ...wrong]);
    }

    const App = () => {
      const [chapterFilter, setChapterFilter] = useState('all');
      const [gameStarted,   setGameStarted]   = useState(false);
      const [queue,         setQueue]         = useState([]);
      const [current,       setCurrent]       = useState(0);
      const [selected,      setSelected]      = useState(null);
      const [revealed,      setRevealed]      = useState(false);
      const [score,         setScore]         = useState({ correct: 0, total: 0 });
      const [speaking,      setSpeaking]      = useState(false);
      const [done,          setDone]          = useState(false);
      const progressWritten = React.useRef(false);
      useEffect(() => {
        window.writeProgress && window.writeProgress('leikir_ordagata4-6', 'opened');
      }, []);
      useEffect(() => {
        if (done && !progressWritten.current) {
          progressWritten.current = true;
          window.writeProgress && window.writeProgress('leikir_ordagata4-6', 'completed');
        }
      }, [done]);
      const audioRef = useRef(null);

      const getPool = useCallback(() => {
        if (chapterFilter === 'all') return ALL_WORDS;
        const ch = CHAPTERS_WITH_AUDIO.find(c => c.id === chapterFilter);
        return ch ? ch.words : ALL_WORDS;
      }, [chapterFilter]);

      const startGame = useCallback(() => {
        const pool = getPool();
        const shuffled = shuffle(pool).map(item => ({
          ...item,
          options: getOptions(item, pool.length >= 4 ? pool : ALL_WORDS),
        }));
        setQueue(shuffled);
        setCurrent(0);
        setSelected(null);
        setRevealed(false);
        setScore({ correct: 0, total: 0 });
        setDone(false);
        setGameStarted(true);
      }, [getPool]);

      const card = queue[current];

      const speak = useCallback(async (src) => {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        setSpeaking(true);
        audioRef.current = await playAudio(src, () => setSpeaking(false));
      }, []);

      useEffect(() => {
        if (gameStarted && card && !revealed) {
          speak(card.audio);
        }
      }, [current, gameStarted]);

      const handleAnswer = (opt) => {
        if (revealed) return;
        setSelected(opt);
        setRevealed(true);
        setScore(prev => ({
          correct: prev.correct + (opt === card.word ? 1 : 0),
          total: prev.total + 1,
        }));
      };

      const next = () => {
        if (current + 1 >= queue.length) {
          setDone(true);
        } else {
          setCurrent(c => c + 1);
          setSelected(null);
          setRevealed(false);
        }
      };

      const pct = queue.length > 0 ? Math.round((current / queue.length) * 100) : 0;

      // ── Forsíða ───────────────────────────────────────────────────────────
      if (!gameStarted) return (
        <>
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
              <p className="text-gray-500 text-sm font-light">Jól · Páskar · Sumardagurinn fyrsti · A1–A2</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4">
            <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
              <p className="text-sm font-light text-green-800">
                <span className="block">🎧 Hlustaðu á lýsinguna</span>
                <span className="block">✏️ Veldu orðið sem passar við lýsinguna</span>
                <span className="block">🔄 Þú getur hlustað aftur á lýsinguna hvenær sem er</span>
              </p>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
              <h2 className="text-base font-medium text-gray-800 mb-4">Veldu kafla</h2>
              <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
                {[
                  { id: 'all',    label: '📚 Allir kaflar',         count: ALL_WORDS.length },
                  { id: 'jol',    label: '🎄 Jól',                  count: CHAPTERS[0].words.length },
                  { id: 'paskar', label: '🐣 Páskar',               count: CHAPTERS[1].words.length },
                  { id: 'sumar',  label: '☀️ Sumardagurinn fyrsti', count: CHAPTERS[2].words.length },
                ].map(opt => (
                  <button key={opt.id} onClick={() => setChapterFilter(opt.id)}
                    className={`p-4 rounded-xl border-2 text-left transition-all
                      ${chapterFilter === opt.id
                        ? 'border-green-500 bg-green-50'
                        : 'border-gray-200 hover:border-green-300 hover:bg-green-50'}`}>
                    <div className="text-sm font-medium text-gray-800">{opt.label}</div>
                    <div className="text-xs text-gray-500 font-light mt-1">{opt.count} orð</div>
                  </button>
                ))}
              </div>
              <button onClick={startGame}
                className="mt-6 w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-base">
                Byrja leikinn 🎮
              </button>
            </div>
          </main>
        </>
      );

      // ── Lokasíða ──────────────────────────────────────────────────────────
      if (done) {
        const pctCorrect = Math.round((score.correct / score.total) * 100);
        return (
          <>
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => setGameStarted(false)}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
                <p className="text-gray-500 text-sm font-light">Niðurstaða</p>
              </div>
            </header>
            <main className="max-w-4xl mx-auto px-6 mt-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center fade-in">
                <div className="text-5xl mb-4">
                  {pctCorrect >= 80 ? '🎉' : pctCorrect >= 50 ? '👍' : '💪'}
                </div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Vel gert!</h2>
                <p className="text-gray-600 font-light mb-1">
                  Þú fékkst <strong>{score.correct}</strong> af <strong>{score.total}</strong> rétt
                </p>
                <p className="text-3xl font-light text-green-600 mb-8">{pctCorrect}%</p>
                <div className="w-full bg-gray-100 rounded-full h-3 mb-8">
                  <div className="bg-green-500 h-3 rounded-full transition-all duration-700"
                    style={{ width: `${pctCorrect}%` }} />
                </div>
                <p className="text-gray-500 font-light text-sm mb-6">
                  {pctCorrect >= 80 ? 'Frábært! Þú þekkir þessi orð mjög vel.'
                    : pctCorrect >= 50 ? 'Góð byrjun! Haltu áfram að æfa.'
                    : 'Haltu áfram – æfing skapar meistar!'}
                </p>
                <div className="flex gap-3 justify-center flex-wrap">
                  <button onClick={startGame}
                    className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                    Reyna aftur 🔄
                  </button>
                  <button onClick={() => setGameStarted(false)}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light">
                    Velja kafla
                  </button>
                </div>
              </div>
            </main>
          </>
        );
      }

      // ── Leikurinn ─────────────────────────────────────────────────────────
      const isCorrect = selected === card.word;

      return (
        <>
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => setGameStarted(false)}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
              <p className="text-gray-500 text-sm font-light">
                Orð {current + 1} af {queue.length} · {score.correct} rétt
              </p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 pb-6 space-y-4">

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <div className="flex items-center gap-3">
                <div className="flex-1 bg-gray-100 rounded-full h-2">
                  <div className="bg-green-500 h-2 rounded-full transition-all duration-500"
                    style={{ width: `${pct}%` }} />
                </div>
                <span className="text-xs text-gray-400 font-light whitespace-nowrap">
                  {current}/{queue.length}
                </span>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in" key={current}>
              <div className="flex flex-col items-center text-center mb-6">
                <button
                  onClick={() => speak(card.audio)}
                  disabled={speaking}
                  className={`w-20 h-20 rounded-full flex items-center justify-center transition-all text-white mb-3
                    ${speaking ? 'bg-green-500 speaking' : 'bg-green-600 hover:bg-green-700'}`}>
                  {speaking
                    ? <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    : <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  }
                </button>
                <p className="text-xs text-gray-400 font-light uppercase tracking-wide">
                  {speaking ? 'Hlustaðu...' : 'Ýttu til að hlusta aftur'}
                </p>
                {revealed && (
                  <div className="mt-4 bg-gray-50 border border-gray-200 rounded-xl px-5 py-3 fade-in">
                    <p className="text-xs text-gray-400 font-light mb-1 uppercase tracking-wide">Lýsingin</p>
                    <p className="text-gray-700 font-light leading-relaxed text-sm">{card.hint}</p>
                  </div>
                )}
              </div>

              <p className="text-sm text-gray-500 font-light mb-3">Hvaða orð er þetta?</p>

              <div className="grid grid-cols-2 gap-3">
                {card.options.map((opt, i) => {
                  const isCorr = opt === card.word;
                  const isSel  = opt === selected;
                  let cls = 'answer-option p-4 rounded-xl text-center font-light text-gray-800';
                  if (revealed) {
                    cls += ' opt-disabled';
                    if (isCorr) cls += ' opt-correct';
                    else if (isSel) cls += ' opt-incorrect';
                  } else if (isSel) {
                    cls += ' opt-selected';
                  }
                  return (
                    <div key={i} className={cls} onClick={() => handleAnswer(opt)}>
                      <div className="flex items-center justify-between gap-2">
                        <span className="text-sm">{opt}</span>
                        {revealed && isCorr && <span className="text-green-600">✓</span>}
                        {revealed && isSel && !isCorr && <span className="text-red-500">✗</span>}
                      </div>
                    </div>
                  );
                })}
              </div>

              {revealed && (
                <div className={`mt-4 p-4 rounded-xl border fade-in flex items-center justify-between gap-4
                  ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                  <p className={`font-medium text-sm ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                    {isCorrect ? '🎉 Rétt!' : `✗ Rangt – rétta svarið er: ${card.word}`}
                  </p>
                  <button onClick={next}
                    className="flex-shrink-0 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                    {current + 1 >= queue.length ? 'Sjá niðurstöður →' : 'Næsta →'}
                  </button>
                </div>
              )}
            </div>

          </main>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
