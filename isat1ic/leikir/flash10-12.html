<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = '../login.html'; return; }
    try {
      const snap = await getDoc(doc(db, 'user_access', user.uid));
      if (!snap.exists()) { window.location.href = '../login.html'; return; }
      const courseData = snap.data()['isat1ic'];
      if (!courseData || !courseData.activated_at) { window.location.href = '../login.html'; return; }
      if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) { window.location.href = '../login.html'; return; }
    } catch { window.location.href = '../login.html'; }
  });
</script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .flashcard { perspective: 1000px; cursor: pointer; }
    .flashcard-inner {
      position: relative; width: 100%; height: 100%; text-align: center;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 2.5rem; box-sizing: border-box;
    }
    .flashcard-front {
      background: #fff; border: 2px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .flashcard-back {
      background: #f0fdf4; border: 2px solid #bbf7d0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      transform: rotateY(180deg);
    }
    .flashcard:hover .flashcard-front,
    .flashcard:hover .flashcard-back { box-shadow: 0 8px 32px rgba(0,0,0,0.13); }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-enter { animation: cardEnter 0.35s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.3); }
      70%  { box-shadow: 0 0 0 8px rgba(22,163,74,0); }
      100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
    }
    .learned-pulse { animation: pulse-green 0.5s ease; }
  </style>
</head>

  <script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COURSE = 'isat1ic';

  async function writeProgress(exerciseId, status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, exerciseId);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) {
      // Fail silently
    }
  }

  window.writeProgress = writeProgress;
</script>

<script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const VOCABULARY = [
      // ── Fallhlífin opnaðist ekki ──
      { is: 'fallhlíf',            pos: 'no', gen: 'kvk', chapter: 'Fallhlífin' },
      { is: 'fallhlífastökk',      pos: 'no', gen: 'hk',  chapter: 'Fallhlífin' },
      { is: 'að stökkva',          pos: 'so', gen: null,  chapter: 'Fallhlífin' },
      { is: 'hermaður',            pos: 'no', gen: 'kk',  chapter: 'Fallhlífin' },
      { is: 'morðtilraun',         pos: 'no', gen: 'kvk', chapter: 'Fallhlífin' },
      { is: 'lífstíðarfangelsi',   pos: 'no', gen: 'hk',  chapter: 'Fallhlífin' },
      { is: 'að rannsaka',         pos: 'so', gen: null,  chapter: 'Fallhlífin' },
      { is: 'að slasast',          pos: 'so', gen: null,  chapter: 'Fallhlífin' },
      { is: 'sjúkrahús',           pos: 'no', gen: 'hk',  chapter: 'Fallhlífin' },
      { is: 'eiginmaður',          pos: 'no', gen: 'kk',  chapter: 'Fallhlífin' },
      { is: 'sekur',               pos: 'lo', gen: null,  chapter: 'Fallhlífin' },
      { is: 'fangelsi',            pos: 'no', gen: 'hk',  chapter: 'Fallhlífin' },

      // ── D.B. Cooper ──
      { is: 'flugvél',             pos: 'no', gen: 'kvk', chapter: 'D.B. Cooper' },
      { is: 'flugstjóri',          pos: 'no', gen: 'kk',  chapter: 'D.B. Cooper' },
      { is: 'farþegi',             pos: 'no', gen: 'kk',  chapter: 'D.B. Cooper' },
      { is: 'sprengja',            pos: 'no', gen: 'kvk', chapter: 'D.B. Cooper' },
      { is: 'seðill',              pos: 'no', gen: 'kk',  chapter: 'D.B. Cooper' },
      { is: 'ráðgáta',             pos: 'no', gen: 'kvk', chapter: 'D.B. Cooper' },
      { is: 'að hóta',             pos: 'so', gen: null,  chapter: 'D.B. Cooper' },
      { is: 'eldsneyti',           pos: 'no', gen: 'hk',  chapter: 'D.B. Cooper' },
      { is: 'vírar',               pos: 'no', gen: 'kk',  chapter: 'D.B. Cooper' },
      { is: 'flugfreyja',          pos: 'no', gen: 'kvk', chapter: 'D.B. Cooper' },

      // ── Mona Lisa ──
      { is: 'málverk',             pos: 'no', gen: 'hk',  chapter: 'Mona Lisa' },
      { is: 'listamaður',          pos: 'no', gen: 'kk',  chapter: 'Mona Lisa' },
      { is: 'listasafn',           pos: 'no', gen: 'hk',  chapter: 'Mona Lisa' },
      { is: 'þjófur',              pos: 'no', gen: 'kk',  chapter: 'Mona Lisa' },
      { is: 'tortrygginn',         pos: 'lo', gen: null,  chapter: 'Mona Lisa' },
      { is: 'að handtaka',         pos: 'so', gen: null,  chapter: 'Mona Lisa' },
      { is: 'bros',                pos: 'no', gen: 'hk',  chapter: 'Mona Lisa' },
      { is: 'fræðimaður',          pos: 'no', gen: 'kk',  chapter: 'Mona Lisa' },
      { is: 'tilfinning',          pos: 'no', gen: 'kvk', chapter: 'Mona Lisa' },
    ];

    const CHAPTERS = ['Allt', 'Fallhlífin', 'D.B. Cooper', 'Mona Lisa'];

    const CHAPTER_COLORS = {
      'Fallhlífin': { bg: 'bg-red-50',    border: 'border-red-200',    badge: 'bg-red-100 text-red-800' },
      'D.B. Cooper':{ bg: 'bg-amber-50',  border: 'border-amber-200',  badge: 'bg-amber-100 text-amber-800' },
      'Mona Lisa':  { bg: 'bg-purple-50', border: 'border-purple-200', badge: 'bg-purple-100 text-purple-800' },
    };

    async function callOpenAI(messages, max_tokens = 60) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model: 'gpt-4o-mini', temperature: 0.2 }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    async function playAudio(text, onEnd) {
      try {
        const r = await fetch('/.netlify/functions/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text_to_speak: text }),
        });
        const data = await r.json();
        if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(); return; }
        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
        audio.onended = () => onEnd && onEnd();
        audio.onerror = () => onEnd && onEnd();
        await audio.play().catch(() => onEnd && onEnd());
        return audio;
      } catch (e) { onEnd && onEnd(); }
    }

    const ListenPill = ({ onClick, speaking }) => (
      <button
        onClick={e => { e.stopPropagation(); onClick(); }}
        className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-xl text-sm border transition-all
          ${speaking ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-100 text-gray-600 border-gray-200 hover:bg-gray-200'}`}>
        <span className="opacity-70">🎧</span>
        <span className="font-light">Hlustaðu</span>
        <span className={`text-green-600 ${speaking ? 'animate-pulse' : ''}`}>🔊</span>
      </button>
    );

    const WordBadge = ({ word }) => {
      const parts = [];
      if (word.pos) parts.push(word.pos);
      if (word.gen) parts.push(word.gen);
      if (!parts.length) return null;
      const chap = CHAPTER_COLORS[word.chapter];
      return (
        <span className={`text-xs px-2 py-0.5 rounded-full font-light ${chap?.badge || 'bg-gray-100 text-gray-500'}`}>
          {parts.join('/')}
        </span>
      );
    };

    const FlashcardsApp = () => {
      const [stage, setStage]               = useState('lang');
      const progressWritten = React.useRef(false);
      useEffect(() => {
        window.writeProgress && window.writeProgress('leikir_flash10-12', 'opened');
      }, []);
      const [langInput, setLangInput]       = useState('');
      const [userLang, setUserLang]         = useState('');
      const [filterChapter, setFilter]      = useState('Allt');
      const [deck, setDeck]                 = useState([]);
      const [idx, setIdx]                   = useState(0);
      const [flipped, setFlipped]           = useState(false);
      const [translation, setTranslation]   = useState('');
      const [loadingTrans, setLoadingTrans] = useState(false);
      const [learned, setLearned]           = useState(new Set());
      const [speaking, setSpeaking]         = useState(false);
      const [learnedPulse, setLearnedPulse] = useState(false);

      const buildDeck = (chapter) => {
        const filtered = chapter === 'Allt'
          ? VOCABULARY
          : VOCABULARY.filter(w => w.chapter === chapter);
        return [...filtered].sort(() => Math.random() - 0.5);
      };

      const startCards = () => {
        if (langInput.trim().length < 2) return;
        setUserLang(langInput.trim());
        const d = buildDeck(filterChapter);
        setDeck(d); setIdx(0); setFlipped(false);
        setTranslation(''); setLearned(new Set()); setStage('cards');
      };

      const getTranslation = async (word, lang) => {
        setLoadingTrans(true); setTranslation('');
        try {
          const t = await callOpenAI([{
            role: 'user',
            content: `Translate the Icelandic word or phrase "${word}" to ${lang}. Reply with ONLY the translation, nothing else. No explanations.`
          }], 40);
          setTranslation(t.trim());
        } catch { setTranslation('(þýðing mistókst)'); }
        finally { setLoadingTrans(false); }
      };

      const handleCardClick = async () => {
        if (!flipped) {
          setFlipped(true);
          if (!translation && deck[idx]) await getTranslation(deck[idx].is, userLang);
        } else {
          setFlipped(false);
        }
      };

      const handleSpeak = () => {
        if (!deck[idx]) return;
        setSpeaking(true);
        playAudio(deck[idx].is, () => setSpeaking(false));
      };

      const goNext = useCallback(() => {
        if (idx < deck.length - 1) {
          setIdx(i => i + 1); setFlipped(false); setTranslation('');
        } else { setStage('done'); }
      }, [idx, deck.length]);

      const goPrev = () => {
        if (idx > 0) { setIdx(i => i - 1); setFlipped(false); setTranslation(''); }
      };

      const toggleLearned = (e) => {
        e.stopPropagation();
        if (!deck[idx]) return;
        const word = deck[idx].is;
        setLearned(prev => {
          const next = new Set(prev);
          next.has(word) ? next.delete(word) : next.add(word);
          return next;
        });
        setLearnedPulse(true);
        setTimeout(() => setLearnedPulse(false), 600);
      };

      useEffect(() => {
        if (stage !== 'cards') return;
        const handler = (e) => {
          if (e.key === 'ArrowRight') goNext();
          if (e.key === 'ArrowLeft')  goPrev();
          if (e.key === ' ') { e.preventDefault(); handleCardClick(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [stage, idx, flipped, deck]);

      const currentWord = deck[idx];
      const isLearned   = currentWord && learned.has(currentWord.is);
      const progress    = deck.length ? ((idx + 1) / deck.length) * 100 : 0;
      const chap        = currentWord ? CHAPTER_COLORS[currentWord.chapter] : null;

      if (stage === 'lang') return (
        <div className="min-h-screen pb-16">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">← Til baka</button>
              <h1 className="text-3xl font-light text-gray-800 mb-1">🃏 Flash kort</h1>
              <p className="text-gray-500 text-sm font-light">Fallhlífin · D.B. Cooper · Mona Lisa · A2–B1</p>
            </div>
          </header>
          <main className="max-w-2xl mx-auto px-6 mt-10 fade-in">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
              <p className="text-sm font-light text-gray-500 mb-3">Veldu kafla:</p>
              <div className="flex flex-wrap gap-2">
                {CHAPTERS.map(ch => (
                  <button key={ch} onClick={() => setFilter(ch)}
                    className={`px-4 py-2 rounded-lg text-sm transition-colors font-light border
                      ${filterChapter === ch ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>
                    {ch === 'Allt' ? `Allt (${VOCABULARY.length} orð)` : `${ch} (${VOCABULARY.filter(w => w.chapter === ch).length} orð)`}
                  </button>
                ))}
              </div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
              <div className="text-5xl mb-4 text-center">🌍</div>
              <h2 className="text-2xl font-light text-gray-800 mb-2 text-center">Hvert er móðurmál þitt?</h2>
              <p className="text-gray-500 font-light mb-6 text-center text-sm">
                Skrifaðu tungumálið þitt (t.d. English, Polski, العربية, Español)
              </p>
              <input type="text" value={langInput}
                onChange={e => setLangInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && startCards()}
                placeholder="Tungumálið þitt..."
                className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light mb-2 text-center"
                autoFocus />
              <div className="flex flex-wrap gap-2 justify-center mb-6 mt-3">
                {['English','Polski','العربية','Español','Português','中文','Français','Deutsch','Tagalog','Română'].map(l => (
                  <button key={l} onClick={() => setLangInput(l)}
                    className="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition-colors font-light">
                    {l}
                  </button>
                ))}
              </div>
              <div className="text-center">
                <button onClick={startCards} disabled={langInput.trim().length < 2}
                  className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-lg">
                  Byrja →
                </button>
              </div>
            </div>
          </main>
        </div>
      );

      if (stage === 'done') return (
        <div className="min-h-screen pb-16">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">← Til baka</button>
              <h1 className="text-3xl font-light text-gray-800 mb-1">🃏 Flash kort</h1>
              <p className="text-gray-500 text-sm font-light">Fallhlífin · D.B. Cooper · Mona Lisa · A2–B1</p>
            </div>
          </header>
          <main className="max-w-2xl mx-auto px-6 mt-10 fade-in">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-10 text-center">
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-2xl font-light text-gray-800 mb-2">Til hamingju!</h2>
              <p className="text-gray-500 font-light mb-6">Þú hefur séð öll {deck.length} orðin!</p>
              <div className="text-4xl font-light text-green-600 mb-8">
                {learned.size} / {deck.length} <span className="text-base text-gray-400">lærð</span>
              </div>
              <div className="flex gap-3 justify-center flex-wrap">
                <button onClick={() => {
                    const d = buildDeck(filterChapter);
                    setDeck(d); setIdx(0); setFlipped(false); setTranslation(''); setLearned(new Set()); setStage('cards');
                  }}
                  className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                  🔄 Byrja aftur
                </button>
                <button onClick={() => { setStage('lang'); setLangInput(''); }}
                  className="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                  🌍 Breyta tungumáli
                </button>
              </div>
            </div>
          </main>
        </div>
      );

      return (
        <div className="min-h-screen pb-16">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">← Til baka</button>
              <div className="flex items-center justify-between mb-3">
                <div>
                  <h1 className="text-2xl font-light text-gray-800">🃏 Flash kort</h1>
                  <p className="text-gray-500 text-xs font-light">🌍 {userLang}</p>
                </div>
                <div className="text-right">
                  <div className="text-xs text-gray-400 font-light">Lærð</div>
                  <div className="text-xl font-light text-green-600">{learned.size} / {deck.length}</div>
                </div>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2 mb-1">
                <div className="h-2 rounded-full bg-blue-500 transition-all duration-500" style={{ width: `${progress}%` }} />
              </div>
              <p className="text-xs text-gray-400 font-light">
                Orð {idx + 1} af {deck.length}
                {filterChapter !== 'Allt' && (
                  <span className={`ml-2 px-2 py-0.5 rounded-full text-xs ${CHAPTER_COLORS[filterChapter]?.badge}`}>
                    {filterChapter}
                  </span>
                )}
              </p>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-6 mt-6">
            <div className="bg-blue-50 border border-blue-100 rounded-lg px-4 py-2 mb-4 text-center">
              <p className="text-blue-700 text-sm font-light">
                💡 Smelltu á spjaldið til að sjá þýðingu · <kbd className="text-xs bg-blue-100 px-1 rounded">Space</kbd> eða <kbd className="text-xs bg-blue-100 px-1 rounded">←→</kbd>
              </p>
            </div>

            <div className={`flashcard card-enter mb-4 ${flipped ? 'flipped' : ''}`}
              onClick={handleCardClick} style={{ height: '320px' }}>
              <div className="flashcard-inner">
                <div className="flashcard-front">
                  {currentWord && (
                    <div className="absolute top-4 left-4">
                      <span className={`text-xs px-2 py-0.5 rounded-full font-light ${chap?.badge}`}>{currentWord.chapter}</span>
                    </div>
                  )}
                  {isLearned && <div className="absolute top-4 right-4 text-2xl">✅</div>}
                  <div className="text-4xl font-light text-gray-800 mb-3 leading-tight text-center">{currentWord?.is}</div>
                  <WordBadge word={currentWord} />
                  <div className="mt-6"><ListenPill onClick={handleSpeak} speaking={speaking} /></div>
                </div>
                <div className={`flashcard-back ${chap ? chap.bg + ' ' + chap.border : ''}`} style={{ border: '2px solid' }}>
                  {isLearned && <div className="absolute top-4 right-4 text-2xl">✅</div>}
                  {currentWord && (
                    <div className="absolute top-4 left-4">
                      <span className={`text-xs px-2 py-0.5 rounded-full font-light ${chap?.badge}`}>{currentWord.is}</span>
                    </div>
                  )}
                  {loadingTrans ? (
                    <div className="flex flex-col items-center gap-2">
                      <div className="text-3xl">⏳</div>
                      <div className="text-gray-500 font-light text-sm">Þýði...</div>
                    </div>
                  ) : (
                    <div className="text-center">
                      <div className="text-4xl font-light text-gray-800 mb-2">{translation}</div>
                      <div className="text-sm text-gray-500 font-light">{userLang}</div>
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="flex gap-3 justify-center mb-4">
              <button onClick={goPrev} disabled={idx === 0}
                className="px-5 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm disabled:opacity-40 disabled:cursor-not-allowed">
                ← Fyrra
              </button>
              <button onClick={toggleLearned}
                className={`px-6 py-2.5 rounded-lg transition-colors font-light text-sm ${learnedPulse ? 'learned-pulse' : ''}
                  ${isLearned ? 'bg-green-50 text-green-700 border-2 border-green-300 hover:bg-green-100' : 'bg-white text-gray-600 border-2 border-gray-200 hover:bg-gray-50'}`}>
                {isLearned ? '✅ Lært' : '☐ Merkja sem lært'}
              </button>
              <button onClick={goNext}
                className="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                {idx === deck.length - 1 ? 'Ljúka →' : 'Næsta →'}
              </button>
            </div>

            {learned.size > 0 && (
              <div className="bg-green-50 border border-green-200 rounded-lg px-4 py-3 fade-in">
                <p className="text-xs text-green-700 font-light mb-1">✅ Lærð orð ({learned.size}):</p>
                <div className="flex flex-wrap gap-1">
                  {[...learned].map(w => (
                    <span key={w} className="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-light">{w}</span>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<FlashcardsApp />);
  </script>
</body>
</html>
