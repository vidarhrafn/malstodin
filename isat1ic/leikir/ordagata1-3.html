<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Orðagáta: Áhugamál, Líkamsrækt, Björgunarsveitir – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .speaking { animation: pulse-green 1s ease infinite; }

    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled  { cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── Hljóðspilun (forupptekin mp3) ───────────────────────────────────────
    async function playAudio(src, onEnd) {
      try {
        const audio = new Audio(src);
        audio.playbackRate = 0.85;
        audio.onended = () => onEnd?.();
        audio.onerror = () => onEnd?.();
        await audio.play().catch(() => onEnd?.());
        return audio;
      } catch (e) {
        console.error(e);
        onEnd?.();
      }
    }

    // ── Orðagögn ─────────────────────────────────────────────────────────────
    const CHAPTERS = [
      {
        id: 'ahugamal',
        label: 'Áhugamál',
        prefix: 'ordagata1-3_ahugamal',
        words: [
          { word: 'sundlaug',     hint: 'Þú ferð hingað til að synda. Vatnið er heitt eða hlýtt.' },
          { word: 'heitur pottur', hint: 'Þetta er eins og lítið bað með mjög heitu vatni. Fólk slappar af hér eftir sund.' },
          { word: 'markvörður',   hint: 'Þessi maður í fótbolta stendur fyrir markinu og má taka boltann með höndum.' },
          { word: 'hljóðfæri',    hint: 'Þú spilar á þetta til að búa til tónlist. Gítar, píanó og fiðla eru dæmi.' },
          { word: 'tónleikar',    hint: 'Þegar tónlistarfólk kemur saman og spilar fyrir annað fólk á einhverjum stað.' },
          { word: 'hljómsveit',   hint: 'Hópur fólks sem spilar tónlist saman. Getur verið 3, 20 eða jafnvel 100 manns.' },
          { word: 'lóð',          hint: 'Þungt stykki úr málmi. Þú lyftar þessu í ræktinni til að verða sterkari.' },
          { word: 'vöðvi',        hint: 'Þetta er inni í líkamanum. Þegar þú lyftir lóðum verður þetta stærra og sterkara.' },
          { word: 'lúðrasveit',   hint: 'Hópur sem spilar á lúðra og önnur blásturshljóðfæri. Þeir spila oft á götum á hátíðardögum.' },
        ],
      },
      {
        id: 'raekt',
        label: 'Líkamsrækt',
        prefix: 'ordagata1-3_raekt',
        words: [
          { word: 'ræktin',        hint: 'Staður þar sem þú getur æft þig. Þar eru margar vélar og lóð. Þú kaupir aðgang til að komast inn.' },
          { word: 'hlaupabretti',  hint: 'Þetta er vél í ræktinni. Þú hleypur á henni en þú ferð ekki neitt. Eins og að hlaupa á sama stað.' },
          { word: 'íþróttataska', hint: 'Þú pakkar niður fötunum þínum, skónum og handklæðinu í þessa tösku áður en þú ferð í ræktina.' },
          { word: 'gufubað',       hint: 'Herbergi sem er heitt í. Þú ferð stundum þangað til að slappa af eftir æfingu.' },
          { word: 'að teygja',     hint: 'Það er mikilvægt að gera þetta eftir æfingu til að vöðvarnir séu í góðu formi.' },
          { word: 'þrek',          hint: 'Þetta þegar þú getur hlaupið lengi eða unnið í langan tíma án þess að verða þreyttur.' },
          { word: 'árskort',       hint: 'Þú borgar einu sinni og getur farið eins oft og þú vilt í ræktina í heilt ár.' },
        ],
      },
      {
        id: 'bjorgun',
        label: 'Björgunarsveitir',
        prefix: 'ordagata1-3_bjorgun',
        words: [
          { word: 'sjálfboðaliði', hint: 'Þetta er maður sem vinnur en fær ekki borgað. Hann vinnur vegna þess að hann vill hjálpa.' },
          { word: 'útkall',        hint: 'Þetta gerist þegar björgunarsveit fær símtal um að einhver sé í hættu og þarf að fara strax.' },
          { word: 'þyrla',         hint: 'Farartæki sem flýgur eins og flugvél en getur lent hvar sem er. Þarf ekki flugvöll.' },
          { word: 'vélsleði',      hint: 'Farartæki sem fer á snjó. Það hefur engin hjól – það rennur á snjónum.' },
          { word: 'búnaður',       hint: 'Allt tækið og fötin sem þú þarft til að gera eitthvað. Björgunarsveitin er með sérstakan búnað.' },
          { word: 'talstöð',       hint: 'Tæki til að tala við aðra í fjarlægð, eins og útvarp. Björgunarsveitarmenn nota þetta í útköllum.' },
          { word: 'skyndihjálp',   hint: 'Þegar einhver slasast þarftu að hjálpa strax. Þetta kallar maður þá hjálp sem hann veitir.' },
          { word: 'samvinna',      hint: 'Þegar margir vinna saman að sama markmiðinu og hjálpa hvert öðru.' },
          { word: 'ferðamaður',    hint: 'Maður eða kona sem er að heimsækja land eða borg sem er ekki heimili hans.' },
        ],
      },
    ];

    // Búa til fullkominn orðalista með mp3-slóðum
    const ALL_WORDS = CHAPTERS.flatMap(ch =>
      ch.words.map((w, i) => ({
        ...w,
        audio: `/isat1ic/media/${ch.prefix}${String(i + 1).padStart(2, '0')}.mp3`,
      }))
    );

    const CHAPTERS_WITH_AUDIO = CHAPTERS.map(ch => ({
      ...ch,
      words: ch.words.map((w, i) => ({
        ...w,
        audio: `/isat1ic/media/${ch.prefix}${String(i + 1).padStart(2, '0')}.mp3`,
      })),
    }));

    // ── Hjálparföll ──────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getOptions(correct, pool) {
      const others = pool.filter(w => w.word !== correct.word);
      const wrong = shuffle(others).slice(0, 3).map(w => w.word);
      return shuffle([correct.word, ...wrong]);
    }

    // ── Aðalíhlutur ──────────────────────────────────────────────────────────
    const App = () => {
      const [chapterFilter, setChapterFilter] = useState('all');
      const [gameStarted,   setGameStarted]   = useState(false);
      const [queue,         setQueue]         = useState([]);
      const [current,       setCurrent]       = useState(0);
      const [selected,      setSelected]      = useState(null);
      const [revealed,      setRevealed]      = useState(false);
      const [score,         setScore]         = useState({ correct: 0, total: 0 });
      const [speaking,      setSpeaking]      = useState(false);
      const [done,          setDone]          = useState(false);
      const audioRef = useRef(null);

      const getPool = useCallback(() => {
        if (chapterFilter === 'all') return ALL_WORDS;
        const ch = CHAPTERS_WITH_AUDIO.find(c => c.id === chapterFilter);
        return ch ? ch.words : ALL_WORDS;
      }, [chapterFilter]);

      const startGame = useCallback(() => {
        const pool = getPool();
        const shuffled = shuffle(pool).map(item => ({
          ...item,
          options: getOptions(item, pool.length >= 4 ? pool : ALL_WORDS),
        }));
        setQueue(shuffled);
        setCurrent(0);
        setSelected(null);
        setRevealed(false);
        setScore({ correct: 0, total: 0 });
        setDone(false);
        setGameStarted(true);
      }, [getPool]);

      const card = queue[current];

      const speak = useCallback(async (src) => {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        setSpeaking(true);
        audioRef.current = await playAudio(src, () => setSpeaking(false));
      }, []);

      useEffect(() => {
        if (gameStarted && card && !revealed) {
          speak(card.audio);
        }
      }, [current, gameStarted]);

      const handleAnswer = (opt) => {
        if (revealed) return;
        setSelected(opt);
        setRevealed(true);
        setScore(prev => ({
          correct: prev.correct + (opt === card.word ? 1 : 0),
          total: prev.total + 1,
        }));
      };

      const next = () => {
        if (current + 1 >= queue.length) {
          setDone(true);
        } else {
          setCurrent(c => c + 1);
          setSelected(null);
          setRevealed(false);
        }
      };

      const pct = queue.length > 0 ? Math.round((current / queue.length) * 100) : 0;

      // ── Forsíða ───────────────────────────────────────────────────────────
      if (!gameStarted) {
        return (
          <>
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => window.history.back()}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
                <p className="text-gray-500 text-sm font-light">Áhugamál · Líkamsrækt · Björgunarsveitir · A1–A2</p>
              </div>
            </header>

            <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4">
              <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
                <p className="text-sm font-light text-green-800">
                  <span className="block">🎧 Hlustaðu á lýsinguna</span>
                  <span className="block">✏️ Veldu orðið sem passar við lýsinguna</span>
                  <span className="block">🔄 Þú getur hlustað aftur á lýsinguna hvenær sem er</span>
                </p>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h2 className="text-base font-medium text-gray-800 mb-4">Veldu kafla</h2>
                <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
                  {[
                    { id: 'all',       label: '📚 Allir kaflar',     count: ALL_WORDS.length },
                    { id: 'ahugamal',  label: '🎵 Áhugamál',         count: CHAPTERS[0].words.length },
                    { id: 'raekt',     label: '💪 Líkamsrækt',       count: CHAPTERS[1].words.length },
                    { id: 'bjorgun',   label: '🚁 Björgunarsveitir', count: CHAPTERS[2].words.length },
                  ].map(opt => (
                    <button key={opt.id} onClick={() => setChapterFilter(opt.id)}
                      className={`p-4 rounded-xl border-2 text-left transition-all
                        ${chapterFilter === opt.id
                          ? 'border-green-500 bg-green-50'
                          : 'border-gray-200 hover:border-green-300 hover:bg-green-50'}`}>
                      <div className="text-sm font-medium text-gray-800">{opt.label}</div>
                      <div className="text-xs text-gray-500 font-light mt-1">{opt.count} orð</div>
                    </button>
                  ))}
                </div>

                <button onClick={startGame}
                  className="mt-6 w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-base">
                  Byrja leikinn 🎮
                </button>
              </div>
            </main>
          </>
        );
      }

      // ── Lokasíða ──────────────────────────────────────────────────────────
      if (done) {
        const pctCorrect = Math.round((score.correct / score.total) * 100);
        return (
          <>
            <header className="bg-white shadow-sm border-b border-gray-200">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <button onClick={() => setGameStarted(false)}
                  className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                  ← Til baka
                </button>
                <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
                <p className="text-gray-500 text-sm font-light">Niðurstaða</p>
              </div>
            </header>
            <main className="max-w-4xl mx-auto px-6 mt-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center fade-in">
                <div className="text-5xl mb-4">
                  {pctCorrect >= 80 ? '🎉' : pctCorrect >= 50 ? '👍' : '💪'}
                </div>
                <h2 className="text-2xl font-light text-gray-800 mb-2">Vel gert!</h2>
                <p className="text-gray-600 font-light mb-1">
                  Þú fékkst <strong>{score.correct}</strong> af <strong>{score.total}</strong> rétt
                </p>
                <p className="text-3xl font-light text-green-600 mb-8">{pctCorrect}%</p>

                <div className="w-full bg-gray-100 rounded-full h-3 mb-8">
                  <div className="bg-green-500 h-3 rounded-full transition-all duration-700"
                    style={{ width: `${pctCorrect}%` }} />
                </div>

                <p className="text-gray-500 font-light text-sm mb-6">
                  {pctCorrect >= 80
                    ? 'Frábært! Þú þekkir þessi orð mjög vel.'
                    : pctCorrect >= 50
                    ? 'Góð byrjun! Haltu áfram að æfa.'
                    : 'Haltu áfram – æfing skapar meistar!'}
                </p>

                <div className="flex gap-3 justify-center flex-wrap">
                  <button onClick={startGame}
                    className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                    Reyna aftur 🔄
                  </button>
                  <button onClick={() => setGameStarted(false)}
                    className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light">
                    Velja kafla
                  </button>
                </div>
              </div>
            </main>
          </>
        );
      }

      // ── Leikurinn ─────────────────────────────────────────────────────────
      const isCorrect = selected === card.word;

      return (
        <>
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => setGameStarted(false)}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Orðagáta</h1>
              <p className="text-gray-500 text-sm font-light">
                Orð {current + 1} af {queue.length} · {score.correct} rétt
              </p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-6 pb-6 space-y-4">

            {/* Framvindulína */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <div className="flex items-center gap-3">
                <div className="flex-1 bg-gray-100 rounded-full h-2">
                  <div className="bg-green-500 h-2 rounded-full transition-all duration-500"
                    style={{ width: `${pct}%` }} />
                </div>
                <span className="text-xs text-gray-400 font-light whitespace-nowrap">
                  {current}/{queue.length}
                </span>
              </div>
            </div>

            {/* Spurninga- og hljóðbox */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in" key={current}>
              <div className="flex flex-col items-center text-center mb-6">
                <button
                  onClick={() => speak(card.audio)}
                  disabled={speaking}
                  className={`w-20 h-20 rounded-full flex items-center justify-center transition-all text-white mb-3
                    ${speaking ? 'bg-green-500 speaking' : 'bg-green-600 hover:bg-green-700'}`}>
                  {speaking
                    ? <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    : <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  }
                </button>
                <p className="text-xs text-gray-400 font-light uppercase tracking-wide">
                  {speaking ? 'Hlustaðu...' : 'Ýttu til að hlusta aftur'}
                </p>
                {revealed && (
                  <div className="mt-4 bg-gray-50 border border-gray-200 rounded-xl px-5 py-3 fade-in">
                    <p className="text-xs text-gray-400 font-light mb-1 uppercase tracking-wide">Lýsingin</p>
                    <p className="text-gray-700 font-light leading-relaxed text-sm">{card.hint}</p>
                  </div>
                )}
              </div>

              <p className="text-sm text-gray-500 font-light mb-3">Hvaða orð er þetta?</p>

              {/* Valmöguleikar */}
              <div className="grid grid-cols-2 gap-3">
                {card.options.map((opt, i) => {
                  const isCorr = opt === card.word;
                  const isSel  = opt === selected;
                  let cls = 'answer-option p-4 rounded-xl text-center font-light text-gray-800';
                  if (revealed) {
                    cls += ' opt-disabled';
                    if (isCorr) cls += ' opt-correct';
                    else if (isSel) cls += ' opt-incorrect';
                  } else if (isSel) {
                    cls += ' opt-selected';
                  }
                  return (
                    <div key={i} className={cls} onClick={() => handleAnswer(opt)}>
                      <div className="flex items-center justify-between gap-2">
                        <span className="text-sm">{opt}</span>
                        {revealed && isCorr && <span className="text-green-600">✓</span>}
                        {revealed && isSel && !isCorr && <span className="text-red-500">✗</span>}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Endurgjöf + næsta */}
              {revealed && (
                <div className={`mt-4 p-4 rounded-xl border fade-in flex items-center justify-between gap-4
                  ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                  <p className={`font-medium text-sm ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                    {isCorrect ? '🎉 Rétt!' : `✗ Rangt – rétta svarið er: ${card.word}`}
                  </p>
                  <button onClick={next}
                    className="flex-shrink-0 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                    {current + 1 >= queue.length ? 'Sjá niðurstöður →' : 'Næsta →'}
                  </button>
                </div>
              )}
            </div>

          </main>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
