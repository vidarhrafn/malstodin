<!DOCTYPE html>
<html lang="is">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍSAN1ÍB – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CHAPTERS = [
  {
    num: 1, title: 'Kafli 1 – Komdu sæll og blessaður',
    exercises: [
      { title: '💬 Hraðstefnumót', desc: 'Hittu 5 manneskjur og æfðu kynningaspjall', href: '/isan1ib/kafli1/hradstefnumot', type: 'spjall' },
    ]
  },
  { num: 2, title: 'Kafli 2', exercises: [] },
  { num: 3, title: 'Kafli 3', exercises: [] },
  {
    num: 4, title: 'Kafli 4 – Ég er kominn heim',
    exercises: [
      { title: 'Orðapróf', desc: '10 spurningar um heimilið', href: '/isan1ib/kafli4/kafli4prof', type: 'ordafordi' },
      { title: 'Teiknileikur', desc: 'Teiknaðu orð fyrir aðra', href: '/isan1ib/kafli4/teiknileikur_kafli4', type: 'spjall' },
      { title: 'Kyn og endingar', desc: 'Æfðu kyn og fallbeygingar', href: '/isan1ib/kafli4/kynogendingar', type: 'malfraedi' },
      { title: 'Spjall 1 – Kynning', desc: 'Samræðuæfing', href: '/isan1ib/kafli4/spjall1_kynning', type: 'spjall' },
    ]
  },
  {
    num: 5, title: 'Kafli 5 – Esjan er falleg',
    exercises: [
      { title: '📍 Staðarforsetningar', desc: 'Æfðu forsetningar með myndum', href: '/isan1ib/kafli5/forsetningar', type: 'malfraedi' },
      { title: '🎧 Hlustaðu og pakkaðu', desc: 'Hlusta á texta og velja rétt orð', href: '/isan1ib/kafli5/hlustun', type: 'hlustun' },
      { title: '❌ Hvað passar ekki saman?', desc: 'Finndu orðið sem passar ekki við hin', href: '/isan1ib/kafli5/1rangtord', type: 'ordafordi' },
      { title: '🎨 Teiknileikur', desc: 'Teiknaðu orð um náttúru og ferðalög', href: '/isan1ib/kafli5/teiknileikur_kafli5', type: 'spjall' },
      { title: '🎨 Lýsingarorð – Litur og hlutur', desc: 'Æfðu lýsingarorðabeygingu', href: '/isan1ib/kafli5/litur_og_hlutur', type: 'malfraedi' },
      { title: '🃏 Flashcards', desc: 'Lærðu orðaforða með sjálfvirkum þýðingum', href: '/isan1ib/kafli5/kafli5_flash', type: 'ordafordi' },
    ]
  },
  { num: 6, title: 'Kafli 6', exercises: [] },
  { num: 7, title: 'Kafli 7', exercises: [] },
];

// Litur eftir tegund æfingar
const TYPE_COLORS = {
  hlustun:    { bg: 'bg-green-100',  text: 'text-green-700',  border: 'border-green-200',  label: 'Hlustun' },
  lestur:     { bg: 'bg-blue-100',   text: 'text-blue-700',   border: 'border-blue-200',   label: 'Lestur' },
  spjall:     { bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-200', label: 'Spjall' },
  ordafordi:  { bg: 'bg-amber-100',  text: 'text-amber-700',  border: 'border-amber-200',  label: 'Orðaforði' },
  malfraeди:  { bg: 'bg-rose-100',   text: 'text-rose-700',   border: 'border-rose-200',   label: 'Málfræði' },
};

const TypeBadge = ({ type }) => {
  const c = TYPE_COLORS[type] || TYPE_COLORS.lestur;
  return (
    <span className={`inline-block px-2 py-0.5 rounded text-xs font-light border ${c.bg} ${c.text} ${c.border}`}>
      {c.label}
    </span>
  );
};

const ComingSoonBadge = () => (
  <span className="inline-block px-2 py-0.5 rounded text-xs font-light border bg-gray-100 text-gray-400 border-gray-200">
    Í vinnslu
  </span>
);

const ChapterGroup = ({ chapter }) => {
  const [open, setOpen] = useState(false);

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      {/* Header – alltaf sýnilegur */}
      <button
        onClick={() => setOpen(o => !o)}
        className="w-full flex items-center justify-between px-6 py-4 hover:bg-gray-50 transition-colors text-left"
      >
        <div className="flex items-center gap-3">
          <span className="w-8 h-8 rounded-full bg-blue-600 text-white text-sm flex items-center justify-center font-medium flex-shrink-0">
            {chapter.num}
          </span>
          <div>
            <span className="font-medium text-gray-800">{chapter.title}</span>
            {chapter.exercises.length === 0 && (
              <span className="ml-3 text-xs text-gray-400 font-light">Í vinnslu</span>
            )}
            {chapter.exercises.length > 0 && (
              <span className="ml-3 text-xs text-gray-400 font-light">
                {chapter.exercises.length} æfing{chapter.exercises.length !== 1 ? 'ar' : ''}
              </span>
            )}
          </div>
        </div>
        <svg
          className={`w-5 h-5 text-gray-400 transition-transform duration-200 flex-shrink-0 ${open ? 'rotate-180' : ''}`}
          fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"
        >
          <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      {/* Innihald – sýnt þegar open */}
      {open && (
        <div className="fade-in border-t border-gray-100 px-6 py-4">
          {chapter.exercises.length === 0 ? (
            <div className="flex flex-col items-center justify-center py-8 text-center">
              <div className="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mb-3">
                <svg className="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <p className="text-gray-400 font-light text-sm">Æfingar fyrir þennan kafla eru í vinnslu.</p>
              <p className="text-gray-300 font-light text-xs mt-1">Kíktu aftur seinna!</p>
            </div>
          ) : (
            <div className="space-y-2">
              {chapter.exercises.map((ex, i) => (
                <a
                  key={i}
                  href={ex.href}
                  className="flex items-center justify-between p-3 rounded-lg border border-gray-100 hover:border-blue-200 hover:bg-blue-50 transition-all group"
                >
                  <div>
                    <span className="font-light text-gray-700 group-hover:text-blue-700 text-sm block">{ex.title}</span>
                    {ex.desc && <span className="text-xs text-gray-400 font-light">{ex.desc}</span>}
                  </div>
                  <div className="flex items-center gap-2 flex-shrink-0 ml-3">
                    <TypeBadge type={ex.type} />
                    <svg className="w-4 h-4 text-gray-300 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/>
                    </svg>
                  </div>
                </a>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const App = () => {
  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <a href="/" className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </a>
          <h1 className="text-3xl font-light text-gray-800 mb-1">ÍSAN1ÍB</h1>
          <p className="text-gray-400 text-xs font-light uppercase tracking-widest mb-1">Jæja 1</p>
          <p className="text-gray-500 text-sm font-light">Æfingar eftir köflum · Í vinnslu</p>
        </div>
      </header>

      {/* Efni */}
      <main className="max-w-4xl mx-auto px-6 py-8">

        {/* Í vinnslu banner */}
        <div className="mb-6 px-5 py-4 rounded-xl bg-amber-50 border border-amber-200 flex items-start gap-3">
          <svg className="w-5 h-5 text-amber-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
          <div>
            <p className="text-amber-800 text-sm font-medium">Þetta námskeið er í vinnslu</p>
            <p className="text-amber-700 text-xs font-light mt-0.5">Æfingar verða bætt við smám saman. Kíktu aftur seinna!</p>
          </div>
        </div>

        {/* Kaflar */}
        <div className="space-y-3">
          {CHAPTERS.map(ch => (
            <ChapterGroup key={ch.num} chapter={ch} />
          ))}
        </div>
      </main>

      {/* Footer */}
      <footer className="text-center py-8 text-gray-400 text-sm font-light">
        <p>© 2025 Málstöðin</p>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
