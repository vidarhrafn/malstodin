    body {

      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    
    .word-card {
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .word-card:hover:not(.selected):not(.correct):not(.wrong) {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
    
    .word-card.selected {
      border-color: #3b82f6;
      background: #dbeafe;
      transform: scale(1.05);
    }
    
    .word-card.correct {
      background: #dcfce7;
      border-color: #22c55e;
      animation: celebrate 0.6s ease-out;
    }
    
    .word-card.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      animation: shake 0.5s;
    }
    
    @keyframes celebrate {
      0% { transform: scale(1); }
      50% { transform: scale(1.1) rotate(5deg); }
      100% { transform: scale(1); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
  </style>

      const [isCorrect, setIsCorrect] = useState(false);

      const [shuffledQuestions, setShuffledQuestions] = useState([]);
      const [shuffledWords, setShuffledWords] = useState([]);

        // Shuffle questions on load

        // Shuffle words for first question
        if (shuffled.length > 0) {
          setShuffledWords([...shuffled[0].words].sort(() => Math.random() - 0.5));
        }
      }, []);

      useEffect(() => {
        // Shuffle words whenever question changes
        if (shuffledQuestions[currentQuestion]) {
          setShuffledWords([...shuffledQuestions[currentQuestion].words].sort(() => Math.random() - 0.5));

      }, [currentQuestion, shuffledQuestions]);

        const item = ALL_ITEMS.find(i => i.id === word);
        return item ? item.emoji : '📦';

        if (showResult) return;
        setSelectedWord(word);

        if (!selectedWord) return;

        setIsCorrect(correct);
        setShowResult(true);
        
        if (correct) {
          setScore(score + 1);
        }

        if (currentQuestion < shuffledQuestions.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedWord(null);
          setShowResult(false);
          setIsCorrect(false);

          setGameFinished(true);

        setIsCorrect(false);

          case 'easy': return 'bg-green-100 text-green-800 border-green-300';

          case 'hard': return 'bg-red-100 text-red-800 border-red-300';
          default: return 'bg-gray-100 text-gray-800 border-gray-300';

          case 'easy': return 'Auðvelt';
          case 'medium': return 'Miðlungs';
          case 'hard': return 'Erfitt';
          default: return '';
        }
      };

          <div className="min-h-screen flex items-center justify-center">
            <div className="text-2xl text-gray-600">Hleð...</div>
          </div>
        );
      }

              </div>
            </header>

                </div>
                <h2 className="text-3xl font-light text-gray-800 mb-4">
                  {percentage >= 80 ? 'Frábært!' : percentage >= 60 ? 'Vel gert!' : 'Góð tilraun!'}
                </h2>
                <p className="text-xl text-gray-600 font-light mb-8">
                  Þú svaraðir {score} rétt af {shuffledQuestions.length} spurningum
                </p>
                <div className="text-5xl font-bold text-blue-600 mb-8">
                  {percentage}%
                </div>
                <button
                  onClick={resetGame}
                  className="bg-blue-600 text-white px-8 py-4 rounded-lg text-lg font-normal hover:bg-blue-700 transition-colors"
                >
                  🔄 Spila aftur
                </button>
              </div>

                    if (word === question.wrongWord) {
                      className = "word-card correct border-4 rounded-2xl p-8 text-center";
                    } else if (selectedWord === word && word !== question.wrongWord) {
                      className = "word-card wrong border-4 rounded-2xl p-8 text-center";
                    } else {
                      className = "word-card bg-gray-50 border-4 border-gray-200 rounded-2xl p-8 text-center opacity-60";
                    }
                  }
                  
                  return (
                    <div
                      key={index}
                      onClick={() => handleWordClick(word)}
                      className={className}
                    >
                      <div className="text-6xl mb-4">{getItemEmoji(word)}</div>
                      <div className="text-2xl font-normal text-gray-800">{word}</div>
                    </div>
                  );
                })}
              </div>

              {/* Result */}
              {showResult && (
                <div className={`${isCorrect ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'} border-2 rounded-lg p-6 mb-6`}>
                  <p className={`${isCorrect ? 'text-green-800' : 'text-red-800'} font-normal text-center text-xl mb-4`}>
                    {isCorrect ? '✓ Rétt svar!' : '✗ Rangt svar'}
                  </p>
                  <p className="text-gray-700 font-light text-center">
                    💡 {question.explanation}
                  </p>
                </div>
              )}

              {/* Buttons */}
              <div className="flex justify-center">
                {!showResult ? (
                  <button
                    onClick={checkAnswer}
                    disabled={!selectedWord}
                    className={`px-8 py-4 rounded-lg text-xl font-normal transition-colors ${
                      selectedWord
                        ? 'bg-green-600 text-white hover:bg-green-700'
                        : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                    }`}
                  >
                    ✓ Athuga svar
                  </button>
                ) : (
                  <button
                    onClick={nextQuestion}
                    className="bg-blue-600 text-white px-8 py-4 rounded-lg text-xl font-normal hover:bg-blue-700 transition-colors"
                  >
                    → Næsta spurning
                  </button>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<OddOneOutGame />);
  </script>
</body>
</html>
