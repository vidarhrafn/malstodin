<!DOCTYPE html>
<html lang="is">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innskráning – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    // Firebase config - fylltu inn þín gildi hér
    const firebaseConfig = {
      apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
      authDomain: "malstodin-90f85.firebaseapp.com",
      projectId: "malstodin-90f85",
      storageBucket: "malstodin-90f85.firebasestorage.app",
      messagingSenderId: "190485777754",
      appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // Gera auth aðgengilegt fyrir React
    window.__firebaseAuth = auth;
    window.__googleProvider = googleProvider;
    window.__firebaseFunctions = {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signInWithPopup,
    };

    // Senda event þegar Firebase er tilbúið
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// Hvaða námskeið er þetta?
const COURSE = 'isan1ib';
const COURSE_NAME = 'ÍSAN1ÍB';
const REDIRECT_URL = '/isan1ib/';

const App = () => {
  const [step, setStep] = useState('code'); // 'code' | 'auth' | 'loading'
  const [code, setCode] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [isNewUser, setIsNewUser] = useState(true);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [firebaseReady, setFirebaseReady] = useState(false);
  const [codeInfo, setCodeInfo] = useState(null);

  useEffect(() => {
    // Bíða eftir Firebase
    const onReady = () => setFirebaseReady(true);
    window.addEventListener('firebase-ready', onReady);
    // Ef þegar tilbúið
    if (window.__firebaseAuth) setFirebaseReady(true);
    return () => window.removeEventListener('firebase-ready', onReady);
  }, []);

  useEffect(() => {
    // Ef notandi er þegar innskráður → athuga aðgang
    if (!firebaseReady) return;
    const auth = window.__firebaseAuth;
    const unsubscribe = auth.onAuthStateChanged(async (user) => {
      if (user) {
        setStep('loading');
        try {
          const idToken = await user.getIdToken();
          const res = await fetch('/.netlify/functions/auth-firebase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken, course: COURSE })
          });
          const data = await res.json();
          if (res.ok && data.valid) {
            window.location.href = REDIRECT_URL;
          } else {
            setStep('code');
          }
        } catch {
          setStep('code');
        }
      }
    });
    return () => unsubscribe();
  }, [firebaseReady]);

  // Skref 1: Staðfesta aðgangskóða
  const handleVerifyCode = async () => {
    if (!code.trim()) return;
    setLoading(true);
    setError('');
    try {
      const res = await fetch('/.netlify/functions/verify-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code.trim() })
      });
      const data = await res.json();
      if (res.ok && data.valid) {
        setCodeInfo(data);
        setStep('auth');
      } else if (data.expired) {
        setError('Þessi kóði er útrunninn. Hafðu samband við kennara.');
      } else {
        setError('Kóðinn er ekki gildur. Athugaðu hvort þú hafir slegið hann inn rétt.');
      }
    } catch {
      setError('Villa kom upp. Reyndu aftur.');
    }
    setLoading(false);
  };

  // Skref 2a: Innskráning / nýskráning með email
  const handleEmailAuth = async () => {
    if (!email || !password) return;
    setLoading(true);
    setError('');
    try {
      const auth = window.__firebaseAuth;
      const { signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.__firebaseFunctions;
      
      let userCredential;
      if (isNewUser) {
        userCredential = await createUserWithEmailAndPassword(auth, email, password);
      } else {
        userCredential = await signInWithEmailAndPassword(auth, email, password);
      }

      await handlePostLogin(userCredential.user);
    } catch (err) {
      if (err.code === 'auth/email-already-in-use') {
        setError('Þetta netfang er þegar skráð. Reyndu að skrá þig inn í staðinn.');
        setIsNewUser(false);
      } else if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        setError('Rangt lykilorð. Reyndu aftur.');
      } else if (err.code === 'auth/weak-password') {
        setError('Lykilorðið þarf að vera að minnsta kosti 6 stafir.');
      } else {
        setError('Villa kom upp. Reyndu aftur.');
      }
    }
    setLoading(false);
  };

  // Skref 2b: Google innskráning
  const handleGoogleAuth = async () => {
    setLoading(true);
    setError('');
    try {
      const auth = window.__firebaseAuth;
      const { signInWithPopup } = window.__firebaseFunctions;
      const userCredential = await signInWithPopup(auth, window.__googleProvider);
      await handlePostLogin(userCredential.user);
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') {
        setError('Villa við Google innskráningu. Reyndu aftur.');
      }
    }
    setLoading(false);
  };

  // Eftir innskráningu: skrá aðgang í Firestore og fara á námskeið
  const handlePostLogin = async (user) => {
    setStep('loading');
    try {
      const idToken = await user.getIdToken();
      // Skrá aðgang með kóðanum
      await fetch('/.netlify/functions/activate-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, code: code.trim(), course: COURSE })
      });
      window.location.href = REDIRECT_URL;
    } catch {
      setStep('auth');
      setError('Villa við að skrá aðgang. Reyndu aftur.');
    }
  };

  if (step === 'loading') {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p className="text-gray-500 font-light">Augnablik...</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-4 py-12">
      <div className="w-full max-w-md fade-in">
        {/* Logo */}
        <div className="text-center mb-8">
          <h1 className="text-4xl font-light text-gray-800 mb-1">Málstöðin</h1>
          <p className="text-gray-500 text-sm font-light">{COURSE_NAME}</p>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8">

          {/* Skref 1: Kóðinn */}
          {step === 'code' && (
            <div>
              <h2 className="text-xl font-light text-gray-800 mb-2">Sláðu inn aðgangskóðann þinn</h2>
              <p className="text-sm text-gray-500 font-light mb-6">Kóðinn er í kennslubókinni þinni.</p>

              <input
                type="text"
                value={code}
                onChange={e => setCode(e.target.value.toUpperCase())}
                onKeyDown={e => e.key === 'Enter' && handleVerifyCode()}
                placeholder="t.d. ISAN-XXXX-XXXX"
                className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light text-center text-lg tracking-widest mb-4"
                disabled={loading}
              />

              {error && (
                <div className="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm font-light">
                  {error}
                </div>
              )}

              <button
                onClick={handleVerifyCode}
                disabled={loading || !code.trim()}
                className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light"
              >
                {loading ? 'Athuga...' : 'Staðfesta kóða →'}
              </button>
            </div>
          )}

          {/* Skref 2: Innskráning */}
          {step === 'auth' && (
            <div>
              <button
                onClick={() => { setStep('code'); setError(''); }}
                className="text-sm text-gray-400 hover:text-gray-600 font-light mb-4 inline-block"
              >
                ← Til baka
              </button>

              <div className="mb-6 p-3 rounded-lg bg-green-50 border border-green-200">
                <p className="text-green-700 text-sm font-light">✓ Kóðinn er gildur! Skráðu þig inn til að halda áfram.</p>
              </div>

              {/* Google */}
              <button
                onClick={handleGoogleAuth}
                disabled={loading}
                className="w-full py-3 border-2 border-gray-200 rounded-lg hover:bg-gray-50 transition-colors font-light flex items-center justify-center gap-3 mb-4"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Halda áfram með Google
              </button>

              <div className="flex items-center gap-3 mb-4">
                <div className="flex-1 h-px bg-gray-200"></div>
                <span className="text-xs text-gray-400 font-light">eða</span>
                <div className="flex-1 h-px bg-gray-200"></div>
              </div>

              {/* Email */}
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                placeholder="Netfang"
                className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light mb-3"
                disabled={loading}
              />
              <input
                type="password"
                value={password}
                onChange={e => setPassword(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleEmailAuth()}
                placeholder="Lykilorð (að minnsta kosti 6 stafir)"
                className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light mb-4"
                disabled={loading}
              />

              {error && (
                <div className="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm font-light">
                  {error}
                </div>
              )}

              <button
                onClick={handleEmailAuth}
                disabled={loading || !email || !password}
                className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light mb-3"
              >
                {loading ? 'Augnablik...' : isNewUser ? 'Búa til aðgang →' : 'Skrá mig inn →'}
              </button>

              <button
                onClick={() => { setIsNewUser(!isNewUser); setError(''); }}
                className="w-full text-sm text-gray-500 hover:text-gray-700 font-light"
              >
                {isNewUser ? 'Er þegar með aðgang? Skrá mig inn' : 'Nýr notandi? Búa til aðgang'}
              </button>
            </div>
          )}
        </div>

        <p className="text-center text-xs text-gray-400 font-light mt-6">© 2025 Málstöðin · Tækniskólinn</p>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
