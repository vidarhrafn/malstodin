<script type="text/babel">
const { useState, useEffect } = React;

/* ══════════════════════════════════════════
   API
══════════════════════════════════════════ */
async function callOpenAI(messages, max_tokens = 300, temperature = 0.3) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'gpt-4o-mini', messages, max_tokens, temperature })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

async function fetchImageAsBase64(url) {
  const r = await fetch(url);
  const blob = await r.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

/* ══════════════════════════════════════════
   GÖGN
══════════════════════════════════════════ */
const MYND_SRC = '../media/01_blokkin_auka.png';

const TEXTI_A = `Í anddyri blokkarinnar eru þrír íbúar. Eldri kona kemur inn með innkaupapoka. Ungur maður stendur við dyrnar og heldur á stórum kassa. Kannski er hann að flytja inn. Ung kona stendur við lyftuna með tösku. Í anddyrinu eru líka póstkassar, stigi, motta og nokkrar plöntur.`;

/* ══════════════════════════════════════════
   HJÁLPARFÖLL
══════════════════════════════════════════ */
function shuffleOnce(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ══════════════════════════════════════════
   SHARED
══════════════════════════════════════════ */
const TabBar = ({ tabs, active, onSelect, done }) => (
  <div className="flex border-b border-gray-200 overflow-x-auto">
    {tabs.map(t => (
      <button key={t.id} onClick={() => onSelect(t.id)}
        className={`flex items-center gap-1.5 px-5 py-3.5 text-sm whitespace-nowrap transition-colors border-b-2
          ${active === t.id
            ? 'border-blue-600 text-blue-700 font-medium bg-blue-50/40'
            : 'border-transparent text-gray-400 hover:text-gray-600 hover:bg-gray-50'}`}>
        {done.has(t.id) && <span className="text-green-500 text-xs">✓</span>}
        {t.label}
      </button>
    ))}
  </div>
);

const CheckBtn = ({ onClick, disabled }) => (
  <button onClick={onClick} disabled={disabled}
    className="mt-6 px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
      disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
    Athuga svör
  </button>
);

const ScoreBadge = ({ score, total }) => {
  const pct = score / total;
  const cls = pct === 1  ? 'bg-green-50 border-green-200 text-green-800'
            : pct >= 0.6 ? 'bg-amber-50 border-amber-200 text-amber-800'
                         : 'bg-red-50 border-red-200 text-red-800';
  const msg = pct === 1  ? 'Frábærlega gert! 🌟'
            : pct >= 0.6 ? 'Gott starf! Skoðaðu leiðréttingarnar.'
                         : 'Prófaðu aftur!';
  return (
    <div className={`mt-4 p-4 rounded-xl border fade-in ${cls}`}>
      <p className="font-medium">{score}/{total} rétt</p>
      <p className="text-sm font-light mt-0.5">{msg}</p>
    </div>
  );
};

/* ══════════════════════════════════════════
   MYNDASTÆKKUN
══════════════════════════════════════════ */
function MyndZoom({ src, onClose }) {
  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);
  return (
    <div className="img-zoom-overlay" onClick={onClose}>
      <img src={src} alt="Stækkuð mynd" onClick={e => e.stopPropagation()} />
      <button onClick={onClose}
        className="absolute top-4 right-4 text-white bg-black/40 rounded-full w-9 h-9
          flex items-center justify-center text-xl hover:bg-black/60 transition-colors">
        ×
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 1 — Textar
══════════════════════════════════════════ */
function TextarTab({ onDone }) {

  const [zoom, setZoom]       = useState(false);

  const handleStig = (val) => { setStig(val); onDone(); };

  return (
    <div className="fade-in space-y-6">

      {/* Mynd */}
      <div className="relative">
        <img
          src={MYND_SRC}
          alt="Anddyri fjölbýlishússins"
          className="w-48 rounded-xl border border-gray-100 shadow-sm object-cover cursor-zoom-in
            hover:shadow-md transition-shadow float-left mr-5 mb-3"
          onClick={() => setZoom(true)}
        />
        <div className="absolute top-2 left-2 bg-black/40 text-white text-xs px-2 py-0.5
          rounded-full font-light pointer-events-none">
          🔍 Smelltu til að stækka
        </div>

        {/* Stigval eða valinn texti */}
        {!stig ? (
          <div className="pt-2">
            <p className="text-sm text-gray-600 font-light mb-3">

                <div className="text-xs text-blue-400 mt-0.5">Auðveldari</div>
              </button>
              <button onClick={() => handleStig('B')}

                <div className="font-medium">Texti B</div>
                <div className="text-xs text-purple-400 mt-0.5">Erfiðari</div>
              </button>
            </div>
          </div>
        ) : (
          <div className="pt-1">
            <div className="flex items-center gap-2 mb-2">

            </div>

              { label: 'Texti B — erfiðari',   texti: TEXTI_B, color: 'purple' }].map(t => (
              <div key={t.label} className={`p-4 rounded-xl border text-sm font-light leading-relaxed

/* ══════════════════════════════════════════
   FLIPI 2 — Klofinnar setningar
══════════════════════════════════════════ */
function KlofinnarTab({ onDone }) {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  const optionsRef = React.useRef(
    KLOFINNAR.reduce((acc, s) => ({
      ...acc,
      [s.id]: shuffleOnce([s.endi, ...s.rangar])
    }), {})
  );

  const score = checked
    ? KLOFINNAR.filter(s => answers[s.id] === s.endi).length
    : null;
  const allAnswered = Object.keys(answers).length === KLOFINNAR.length;

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-5">
        Veldu réttan enda fyrir hverja setningu.
      </p>
      <div className="space-y-4 mb-2">
        {KLOFINNAR.map(s => {
          const ans     = answers[s.id];
          const isRight = checked && ans === s.endi;
          const isWrong = checked && ans && ans !== s.endi;
          return (
            <div key={s.id} className={`p-4 rounded-xl border transition-all
              ${isRight ? 'bg-green-50 border-green-200' :
                isWrong ? 'bg-red-50 border-red-200' :
                'bg-white border-gray-100 shadow-sm'}`}>
              <p className={`text-sm font-medium mb-3
                ${isRight ? 'text-green-800' : isWrong ? 'text-red-800' : 'text-gray-700'}`}>
                {s.upphaf}…
              </p>
              <div className="space-y-2">
                {optionsRef.current[s.id].map((opt, i) => {
                  const isSel     = ans === opt;
                  const isCorrect = opt === s.endi;
                  return (
                    <button key={i}
                      onClick={() => !checked && setAnswers(a => ({ ...a, [s.id]: opt }))}
                      disabled={checked}
                      className={`w-full text-left px-4 py-2.5 rounded-lg border text-sm font-light transition-all
                        ${checked && isCorrect          ? 'bg-green-100 border-green-400 text-green-800' :
                          checked && isSel && !isCorrect ? 'bg-red-100 border-red-400 text-red-800' :
                          isSel                          ? 'bg-blue-100 border-blue-400 text-blue-800' :
                          'bg-gray-50 border-gray-200 hover:bg-blue-50 hover:border-blue-200'}
                        disabled:cursor-default`}>
                      {opt}
                    </button>
                  );
                })}
              </div>
              {isWrong && (
                <p className="text-xs text-gray-500 font-light mt-2 italic">
                  Rétt: „{s.endi}"
                </p>
              )}
            </div>
          );
        })}
      </div>
      {!checked
        ? <CheckBtn onClick={() => { setChecked(true); onDone(); }} disabled={!allAnswered} />
        : <ScoreBadge score={score} total={KLOFINNAR.length} />}
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 3 — Myndlýsing með AI
══════════════════════════════════════════ */
function MyndlýsingTab({ onDone }) {
  const [text, setText]       = useState('');
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [zoom, setZoom]       = useState(false);

  const setningafjoldi = text.trim().split(/[.!?]+/).filter(s => s.trim().length > 3).length;

  const handleCheck = async () => {
    setLoading(true);
    try {
      // Sækja mynd sem base64
      const b64 = await fetchImageAsBase64(MYND_SRC);

      const result = await callOpenAI([
        {
          role: 'user',
          content: [
            {
              type: 'text',
              text: `Þú ert íslenskukennari. Nemandi á A1-A2 stigi í íslensku hefur skrifað lýsingu á þessari mynd.\n\nLýsing nemanda:\n"${text}"\n\nMettu hvort lýsingin er nákvæm og samræmist myndinni. Vertu vingjarnlegur og hvetjandi. Leiðréttu augljægar rangar staðreyndir en vertu sveigjanlegur um málfræði.\n\nSvaraðu EINUNGIS:\nSTIG: [0-5]\nENDURGJÖF: [ein til tvær setningar á íslensku]`
            },
            {
              type: 'image_url',
              image_url: { url: `data:image/png;base64,${b64}` }
            }
          ]
        }
      ], 150, 0.3);

      const stigMatch = result.match(/STIG:\s*(\d)/);
      const endMatch  = result.match(/ENDURGJÖF:\s*(.+)/s);
      const score     = stigMatch ? parseInt(stigMatch[1]) : 0;
      const msg       = endMatch  ? endMatch[1].trim() : result.trim();
      setFeedback({ score, msg });
      onDone();
    } catch (e) {
      setFeedback({ score: 0, msg: 'Villa við mat. Reyndu aftur.' });
    } finally {
      setLoading(false);
    }
  };

  const scoreColor = feedback
    ? feedback.score >= 4 ? 'bg-green-50 border-green-200 text-green-800'
    : feedback.score >= 2 ? 'bg-amber-50 border-amber-200 text-amber-800'
                          : 'bg-red-50 border-red-200 text-red-800'
    : '';

  return (
    <div className="fade-in space-y-5">
      <div>
        <h3 className="text-sm font-medium text-gray-700 mb-1">Lýstu myndinni</h3>
        <p className="text-sm text-gray-400 font-light">
          Skrifaðu <strong className="font-medium text-gray-600">3 setningar</strong> til að lýsa því sem þú sérð á myndinni.
        </p>
      </div>

      {/* Mynd — smellanlegt */}
      <div className="relative inline-block cursor-zoom-in" onClick={() => setZoom(true)}>
        <img
          src={MYND_SRC}
          alt="Anddyri fjölbýlishússins"
          className="w-48 rounded-xl border border-gray-100 shadow-sm object-cover hover:shadow-md transition-shadow"
        />
        <div className="absolute top-2 left-2 bg-black/40 text-white text-xs px-2 py-0.5
          rounded-full font-light pointer-events-none">
          🔍 Stækka
        </div>
      </div>

      {/* Textareitur */}
      <div>
        <textarea
          value={text}
          onChange={e => !feedback && setText(e.target.value)}
          disabled={!!feedback}
          rows={5}
          placeholder="Í anddyrinu eru…&#10;Eldri kona…&#10;Ungur maður…"
          className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl font-light text-sm
            focus:outline-none focus:border-blue-400 resize-none transition-colors
            disabled:bg-gray-50 disabled:cursor-default leading-relaxed"
        />
        <div className="flex items-center justify-between mt-1.5">
          <span className={`text-xs font-light ${
            setningafjoldi >= 3 ? 'text-green-500' : 'text-gray-400'}`}>
            {setningafjoldi < 3
              ? `${setningafjoldi}/3 setningar`
              : `✓ ${setningafjoldi} setningar`}
          </span>
          {!feedback && (
            <span className="text-xs text-gray-300 font-light">
              Lýstu hverjum þriggja einstaklinganna á myndinni
            </span>
          )}
        </div>
      </div>

      {/* Takki eða endurgjöf */}
      {!feedback ? (
        <button onClick={handleCheck}
          disabled={loading || setningafjoldi < 3}
          className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
            disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
          {loading ? 'AI er að meta…' : '🖼️ Fá endurgjöf'}
        </button>
      ) : (
        <div className={`p-5 rounded-xl border fade-in ${scoreColor}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="font-medium text-sm">Stig: {feedback.score}/5</span>
            <span className="text-lg">
              {feedback.score >= 4 ? '🌟' : feedback.score >= 2 ? '👍' : '📖'}
            </span>
          </div>
          <p className="text-sm font-light leading-relaxed">{feedback.msg}</p>
          {feedback.score < 5 && (
            <button onClick={() => { setFeedback(null); setText(''); }}
              className="mt-3 text-xs underline font-light opacity-70 hover:opacity-100">
              Reyna aftur
            </button>
          )}
        </div>
      )}

      {zoom && <MyndZoom src={MYND_SRC} onClose={() => setZoom(false)} />}
    </div>
  );
}

/* ══════════════════════════════════════════

          <div className="flex items-start justify-between gap-4">

              <p className="text-[10px] font-medium text-blue-400 uppercase tracking-widest mb-1">

              <h1 className="text-3xl font-light text-gray-800 mb-1">Blokkin — myndin</h1>
              <p className="text-gray-500 text-sm font-light">Tvíþrepa myndtexti, klofinnar setningar og myndlýsing</p>
            </div>
            <span className="text-4xl">🏢</span>
          </div>
        </div>
        <div className="max-w-4xl mx-auto bg-white">
          <TabBar tabs={TABS} active={activeTab} onSelect={setActiveTab} done={done} />
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-7">
          {activeTab === 'textar'    && <TextarTab    onDone={() => markDone('textar')} />}
          {activeTab === 'klofinnar' && <KlofinnarTab onDone={() => markDone('klofinnar')} />}
          {activeTab === 'mynd'      && <MyndlýsingTab onDone={() => markDone('mynd')} />}
        </div>

        <div className="mt-5 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-1.5">
            {TABS.map(t => (
              <div key={t.id} className={`h-1.5 w-12 rounded-full transition-all duration-500
                ${done.has(t.id) ? 'bg-green-500' : activeTab === t.id ? 'bg-blue-400' : 'bg-gray-200'}`} />
            ))}
            <span className="text-xs text-gray-400 font-light ml-1">{done.size}/{TABS.length}</span>
          </div>
          {allDone && (
            <div className="fade-in flex items-center gap-2 bg-green-50 border border-green-200
              text-green-700 rounded-lg px-4 py-2 text-sm font-light">
              🎉 Aukaæfing lokið!
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
