<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kafli 13 – Aukaæfing | Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }

    .img-zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .img-zoom-overlay img {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

async function callOpenAI(messages, max_tokens = 300, temperature = 0.3, model = 'gpt-4o-mini') {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, messages, max_tokens, temperature })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

async function fetchImageAsBase64(url) {
  const r = await fetch(url);
  const blob = await r.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

const MYND_SRC = '../media/13_isak_emil_auka.png';

const TEXTI_A = `Eftir myndina fara þau þrjú á lítið kaffihús. Þau fá sér heitt kakó og setjast við gluggann. „Hvernig fannst ykkur myndin?“ spyr Embla. „Mér fannst hún mjög góð,“ segir Ísak. „Hún kom mér á óvart. Ég er feginn að ég gaf henni séns.“ „Sjáðu!“ segir Emil og brosir. „Ég vissi að þér myndi líka hún.“ Embla er sammála. „Hún var spennandi. En næst vil ég sjá hryllingsmynd.“ Ísak hlær. „Kannski. En ekki of hræðilega!“ Núna er hann ekki eins feiminn og áður. Þeim líður vel saman.`;

const TEXTI_B = `Eftir myndina ákveða þau að setjast inn á lítið kaffihús, þar sem þau fá sér heitt kakó við gluggann. „Hvernig fannst ykkur myndin?“ spyr Embla, sem hafði séð treilerinn áður. „Mér fannst hún miklu betri en ég bjóst við,“ segir Ísak, „því hún kom mér virkilega á óvart. Ég er feginn að ég gaf henni séns í staðinn fyrir að segja strax nei.“ Emil glottir, því hann hafði alltaf vitað að Ísaki myndi líka hún. Embla er sammála þeim báðum, en bætir við að næst langi hana að sjá hryllingsmynd — eitthvað sem Ísak er ekki alveg viss um. Samt er hann ekki lengur eins feiminn og hann var í byrjun kvöldsins, því stundum þarf maður bara að gefa nýjum hlutum séns.`;

const ORD_ÞYNGD = [
  { auðvelt: "Þau fá sér heitt kakó og setjast við gluggann", erfitt: "ákveða að setjast inn á lítið kaffihús, þar sem þau fá sér heitt kakó" },
  { auðvelt: "spyr Embla", erfitt: "spyr Embla, sem hafði séð treilerinn áður" },
  { auðvelt: "Mér fannst hún mjög góð", erfitt: "Mér fannst hún miklu betri en ég bjóst við" },
  { auðvelt: "Hún kom mér á óvart", erfitt: "því hún kom mér virkilega á óvart" },
  { auðvelt: "Ég vissi að þér myndi líka hún", erfitt: "Emil glottir, því hann hafði alltaf vitað að Ísaki myndi líka hún" },
  { auðvelt: "Núna er hann ekki eins feiminn og áður", erfitt: "því stundum þarf maður bara að gefa nýjum hlutum séns" },
];

const KLOFINNAR = [
  { id: 1, upphaf: "Ísak og Emil leigja saman", endi: "íbúð 5C" },
  { id: 2, upphaf: "Ísak er skotinn", endi: "í Emblu" },
  { id: 3, upphaf: "Ísak ætlaði að gefa", endi: "hasarmyndinni séns" },
  { id: 4, upphaf: "Mateo og Sara höfðu", endi: "aldrei hist" },
  { id: 5, upphaf: "Vera meikar ekki", endi: "að vera hrædd í bíó" },
  { id: 6, upphaf: "Andri og Sara voru fyrst", endi: "ósammála um myndina" },
  { id: 7, upphaf: "Eftir myndina fóru þau þrjú", endi: "á kaffihús" },
  { id: 8, upphaf: "Ísak var ekki lengur", endi: "eins feiminn og áður" },
];

function shuffleOnce(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const TabBar = ({ tabs, active, onSelect, done }) => (
  <div className="flex border-b border-gray-200 overflow-x-auto">
    {tabs.map(t => (
      <button key={t.id} onClick={() => onSelect(t.id)}
        className={`flex items-center gap-1.5 px-5 py-3.5 text-sm whitespace-nowrap transition-colors border-b-2
          ${active === t.id
            ? 'border-blue-600 text-blue-700 font-medium bg-blue-50/40'
            : 'border-transparent text-gray-400 hover:text-gray-600 hover:bg-gray-50'}`}>
        {done.has(t.id) && <span className="text-green-500 text-xs">✓</span>}
        {t.label}
      </button>
    ))}
  </div>
);

const CheckBtn = ({ onClick, disabled }) => (
  <button onClick={onClick} disabled={disabled}
    className="mt-6 px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
      disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
    Athuga svör
  </button>
);

const ScoreBadge = ({ score, total }) => {
  const pct = score / total;
  const cls = pct === 1  ? 'bg-green-50 border-green-200 text-green-800'
            : pct >= 0.6 ? 'bg-amber-50 border-amber-200 text-amber-800'
                         : 'bg-red-50 border-red-200 text-red-800';
  const msg = pct === 1  ? 'Frábærlega gert! 🌟'
            : pct >= 0.6 ? 'Gott starf! Skoðaðu leiðréttingarnar.'
                         : 'Prófaðu aftur!';
  return (
    <div className={`mt-4 p-4 rounded-xl border fade-in ${cls}`}>
      <p className="font-medium">{score}/{total} rétt</p>
      <p className="text-sm font-light mt-0.5">{msg}</p>
    </div>
  );
};

function MyndZoom({ src, onClose }) {
  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);
  return (
    <div className="img-zoom-overlay" onClick={onClose}>
      <img src={src} alt="Stækkuð mynd" onClick={e => e.stopPropagation()} />
      <button onClick={onClose}
        className="absolute top-4 right-4 text-white bg-black/40 rounded-full w-9 h-9
          flex items-center justify-center text-xl hover:bg-black/60 transition-colors">
        ×
      </button>
    </div>
  );
}

function TextarTab({ onDone }) {
  const [zoom, setZoom] = useState(false);
  React.useEffect(() => { onDone(); }, []);

  return (
    <div className="fade-in space-y-6">
      <div className="relative inline-block cursor-zoom-in" onClick={() => setZoom(true)}>
        <img
          src={MYND_SRC}
          alt="Ísak, Emil og Embla á kaffihúsi eftir bíó"
          className="w-48 rounded-xl border border-gray-100 shadow-sm object-cover
            hover:shadow-md transition-shadow float-left mr-5 mb-3"
        />
        <div className="absolute top-2 left-2 bg-black/40 text-white text-xs px-2 py-0.5
          rounded-full font-light pointer-events-none">
          🔍 Stækka
        </div>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {[{ label: 'Texti 1 — Auðveldari (A2)', texti: TEXTI_A, color: 'blue' },
          { label: 'Texti 2 — Erfiðari (B1)',   texti: TEXTI_B, color: 'purple' }].map(t => (
          <div key={t.label} className={`p-4 rounded-xl border text-sm font-light leading-relaxed
            ${t.color === 'blue'
              ? 'bg-blue-50 border-blue-100 text-blue-900'
              : 'bg-purple-50 border-purple-100 text-purple-900'}`}>
            <p className={`text-xs font-medium uppercase tracking-wide mb-2
              ${t.color === 'blue' ? 'text-blue-500' : 'text-purple-500'}`}>
              {t.label}
            </p>
            {t.texti}
          </div>
        ))}
      </div>
      <div className="clear-both" />

      <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="px-4 py-3 bg-gray-50 border-b border-gray-100">
          <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Orð sem voru þyngd</p>
        </div>
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-gray-100">
              <th className="text-left px-4 py-2 text-xs text-gray-400 font-medium">Auðveldara</th>
              <th className="text-left px-4 py-2 text-xs text-gray-400 font-medium">Erfiðara</th>
            </tr>
          </thead>
          <tbody>
            {ORD_ÞYNGD.map((row, i) => (
              <tr key={i} className={`border-b border-gray-50 ${i % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'}`}>
                <td className="px-4 py-2.5 text-gray-600 font-light">{row.auðvelt}</td>
                <td className="px-4 py-2.5 text-gray-800 font-medium">{row.erfitt}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {zoom && <MyndZoom src={MYND_SRC} onClose={() => setZoom(false)} />}
    </div>
  );
}

function KlofinnarTab({ onDone }) {
  const [selUpphaf, setSelUpphaf] = useState(null);
  const [pairs, setPairs]         = useState({});
  const [checked, setChecked]     = useState(false);
  const [endaList]                = useState(() => shuffleOnce(KLOFINNAR.map(s => s.endi)));

  const usedEndar = new Set(Object.values(pairs));
  const score     = checked
    ? KLOFINNAR.filter(s => pairs[s.upphaf] === s.endi).length
    : null;
  const wrongUpphaf = checked
    ? new Set(KLOFINNAR.filter(s => pairs[s.upphaf] !== s.endi).map(s => s.upphaf))
    : new Set();

  const handleUpphaf = (upphaf) => {
    if (checked || pairs[upphaf]) return;
    setSelUpphaf(s => s === upphaf ? null : upphaf);
  };
  const handleEndi = (endi) => {
    if (checked || !selUpphaf || usedEndar.has(endi)) return;
    setPairs(p => ({ ...p, [selUpphaf]: endi }));
    setSelUpphaf(null);
  };

  const allPaired = Object.keys(pairs).length === KLOFINNAR.length;

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-5">
        Smelltu á upphaf setningar til vinstri, svo á réttan enda til hægri.
      </p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div className="space-y-2">
          <p className="text-xs text-gray-400 uppercase tracking-wide mb-2">Upphaf</p>
          {KLOFINNAR.map(s => {
            const isPaired = !!pairs[s.upphaf];
            const isSel    = selUpphaf === s.upphaf;
            const isWrong  = wrongUpphaf.has(s.upphaf);
            const isRight  = checked && isPaired && !isWrong;
            return (
              <button key={s.upphaf} onClick={() => handleUpphaf(s.upphaf)} disabled={checked}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-light transition-all
                  ${isRight  ? 'bg-green-50 border-green-300 text-green-800' :
                    isWrong  ? 'bg-red-50 border-red-300 text-red-800' :
                    isSel    ? 'bg-blue-100 border-blue-400 text-blue-800 ring-2 ring-blue-200' :
                    isPaired ? 'bg-gray-100 border-gray-200 text-gray-400' :
                               'bg-white border-gray-200 hover:border-blue-300 hover:bg-blue-50'}
                  disabled:cursor-default`}>
                <span className="font-medium">{s.upphaf}…</span>
                {isPaired && !checked && <span className="ml-2 text-xs text-gray-300">✓</span>}
              </button>
            );
          })}
        </div>

        <div className="space-y-2">
          <p className="text-xs text-gray-400 uppercase tracking-wide mb-2">Endi</p>
          {endaList.map((endi, i) => {
            const isUsed  = usedEndar.has(endi);
            const matchU  = KLOFINNAR.find(s => s.endi === endi)?.upphaf;
            const isRight = checked && isUsed && !wrongUpphaf.has(matchU);
            const isWrong = checked && isUsed && wrongUpphaf.has(matchU);
            return (
              <button key={i} onClick={() => handleEndi(endi)}
                disabled={checked || (isUsed && !selUpphaf)}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-light leading-snug transition-all
                  ${isRight   ? 'bg-green-50 border-green-300 text-green-800' :
                    isWrong   ? 'bg-red-50 border-red-300 text-red-800' :
                    isUsed    ? 'bg-gray-100 border-gray-200 text-gray-400' :
                    selUpphaf ? 'bg-white border-blue-200 hover:bg-blue-50 cursor-pointer' :
                                'bg-white border-gray-200 text-gray-500'}
                  disabled:cursor-default`}>
                {endi}
              </button>
            );
          })}
        </div>
      </div>

      {checked && wrongUpphaf.size > 0 && (
        <div className="mb-4 space-y-2 fade-in">
          {KLOFINNAR.filter(s => wrongUpphaf.has(s.upphaf)).map(s => (
            <div key={s.upphaf} className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 text-sm">
              <span className="font-medium text-amber-800">{s.upphaf}…</span>
              <span className="text-amber-600 font-light"> → {s.endi}</span>
            </div>
          ))}
        </div>
      )}

      {!checked
        ? <CheckBtn onClick={() => { setChecked(true); onDone(); }} disabled={!allPaired} />
        : <ScoreBadge score={score} total={KLOFINNAR.length} />}
    </div>
  );
}

function MyndlýsingTab({ onDone }) {
  const [lines, setLines]       = useState(['', '', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading]   = useState(false);
  const [zoom, setZoom]         = useState(false);

  const allFilled = lines.every(l => l.trim().length > 0);
  const lysingText = lines.map((l, i) => `${i + 1}. ${l.trim()}`).join('\n');

  const handleCheck = async () => {
    setLoading(true);
    try {
      const b64 = await fetchImageAsBase64(MYND_SRC);
      const result = await callOpenAI([
        {
          role: 'user',
          content: [
            {
              type: 'text',
              text: `Þú ert íslenskukennari. Nemandi á A2–B1 stigi hefur skrifað þrjár setningar til að lýsa þessari mynd.\n\nLýsing nemanda:\n${lysingText}\n\nBerðu hverja setningu nákvæmlega saman við myndina. Athugaðu sérstaklega:\n- Eru persónurnar réttar? (tveir ungir menn og ung kona)\n- Er umhverfið rétt? (lítið kaffihús, sitja við glugga)\n- Er það sem þau gera rétt lýst? (drekka heitt kakó, spjalla eftir bíó)\n\nNefndu bæði hvað er rétt og hvað er rangt — bæði staðreyndir og málfar. Gefðu STIG 5 einungis ef allt er nákvæmt. Rangar staðreyndir lækka stigin þrátt fyrir gott málfar.\n\nSvaraðu EINUNGIS:\nSTIG: [0-5]\nENDURGJÖF: [tvær til þrjár setningar á íslensku]`
            },
            {
              type: 'image_url',
              image_url: { url: `data:image/png;base64,${b64}` }
            }
          ]
        }
      ], 200, 0.2, 'gpt-4o');

      const stigMatch = result.match(/STIG:\s*(\d)/);
      const endMatch  = result.match(/ENDURGJÖF:\s*([\s\S]+)/);
      const score     = stigMatch ? parseInt(stigMatch[1]) : 0;
      const msg       = endMatch  ? endMatch[1].trim() : result.trim();
      setFeedback({ score, msg });
      onDone();
    } catch (e) {
      setFeedback({ score: 0, msg: 'Villa við mat. Reyndu aftur.' });
    } finally {
      setLoading(false);
    }
  };

  const scoreColor = feedback
    ? feedback.score >= 4 ? 'bg-green-50 border-green-200 text-green-800'
    : feedback.score >= 2 ? 'bg-amber-50 border-amber-200 text-amber-800'
                          : 'bg-red-50 border-red-200 text-red-800'
    : '';

  return (
    <div className="fade-in space-y-5">
      <div>
        <h3 className="text-sm font-medium text-gray-700 mb-1">Lýstu myndinni</h3>
        <p className="text-sm text-gray-400 font-light">
          Skrifaðu <strong className="font-medium text-gray-600">þrjár setningar</strong> til að lýsa því sem þú sérð á myndinni — ein setning í hvern reit.
        </p>
      </div>

      <div className="relative inline-block cursor-zoom-in" onClick={() => setZoom(true)}>
        <img
          src={MYND_SRC}
          alt="Ísak, Emil og Embla á kaffihúsi eftir bíó"
          className="w-48 rounded-xl border border-gray-100 shadow-sm object-cover hover:shadow-md transition-shadow"
        />
        <div className="absolute top-2 left-2 bg-black/40 text-white text-xs px-2 py-0.5
          rounded-full font-light pointer-events-none">
          🔍 Stækka
        </div>
      </div>

      <div className="space-y-3">
        {lines.map((val, i) => (
          <div key={i} className="flex items-start gap-3">
            <span className="mt-3 w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs
              font-medium flex items-center justify-center flex-shrink-0">
              {i + 1}
            </span>
            <input
              type="text"
              value={val}
              onChange={e => {
                if (feedback) return;
                const upd = [...lines]; upd[i] = e.target.value; setLines(upd);
              }}
              disabled={!!feedback}
              placeholder={
                i === 0 ? 'fyrsta setning…' :
                i === 1 ? 'önnur setning…' :
                          'þriðja setning…'
              }
              className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg font-light text-sm
                focus:outline-none focus:border-blue-400 transition-colors
                disabled:bg-gray-50 disabled:cursor-default"
            />
          </div>
        ))}
      </div>

      {!feedback ? (
        <button onClick={handleCheck}
          disabled={loading || !allFilled}
          className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
            disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
          {loading ? 'Gervigreind er að meta…' : '🖼️ Fá endurgjöf'}
        </button>
      ) : (
        <div className={`p-5 rounded-xl border fade-in ${scoreColor}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="font-medium text-sm">Stig: {feedback.score}/5</span>
            <span className="text-lg">
              {feedback.score >= 4 ? '🌟' : feedback.score >= 2 ? '👍' : '📖'}
            </span>
          </div>
          <p className="text-sm font-light leading-relaxed whitespace-pre-wrap">{feedback.msg}</p>
          {feedback.score < 5 && (
            <button onClick={() => { setFeedback(null); setLines(['', '', '']); }}
              className="mt-3 text-xs underline font-light opacity-70 hover:opacity-100">
              Reyna aftur
            </button>
          )}
        </div>
      )}

      {zoom && <MyndZoom src={MYND_SRC} onClose={() => setZoom(false)} />}
    </div>
  );
}

const TABS = [
  { id: 'textar',    label: '📖 Textar'         },
  { id: 'klofinnar', label: '🧩 Setningapörun'  },
  { id: 'mynd',      label: '🖼️ Myndlýsing'     },
];

function App() {
  const [activeTab, setActiveTab] = useState('textar');
  const [done, setDone]           = useState(new Set());
  const markDone = id => setDone(prev => new Set([...prev, id]));
  const allDone  = TABS.every(t => done.has(t.id));

  return (
    <div className="min-h-screen">
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-7">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-400 hover:text-gray-600 mb-3 inline-block font-light">
            ← Til baka
          </button>
          <div>
            <p className="text-[10px] font-medium text-blue-400 uppercase tracking-widest mb-1">
              Kafli 13 · Aukaæfing · A2–B1
            </p>
            <h1 className="text-3xl font-light text-gray-800 mb-1">Blokkin — aukaæfing</h1>
            <p className="text-gray-500 text-sm font-light">Myndtexti auðveldur/erfiðari, para setningar og myndlýsing</p>
          </div>
        </div>
        <div className="max-w-4xl mx-auto bg-white">
          <TabBar tabs={TABS} active={activeTab} onSelect={setActiveTab} done={done} />
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-7">
          {activeTab === 'textar'    && <TextarTab    onDone={() => markDone('textar')} />}
          {activeTab === 'klofinnar' && <KlofinnarTab onDone={() => markDone('klofinnar')} />}
          {activeTab === 'mynd'      && <MyndlýsingTab onDone={() => markDone('mynd')} />}
        </div>

        <div className="mt-5 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-1.5">
            {TABS.map(t => (
              <div key={t.id} className={`h-1.5 w-12 rounded-full transition-all duration-500
                ${done.has(t.id) ? 'bg-green-500' : activeTab === t.id ? 'bg-blue-400' : 'bg-gray-200'}`} />
            ))}
            <span className="text-xs text-gray-400 font-light ml-1">{done.size}/{TABS.length}</span>
          </div>
          {allDone && (
            <div className="fade-in flex items-center gap-2 bg-green-50 border border-green-200
              text-green-700 rounded-lg px-4 py-2 text-sm font-light">
              🎉 Aukaæfingu lokið
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
