<script type="text/babel">
const { useState, useRef } = React;

/* ── API helpers ── */
async function playAudio(text, onEnd) {
  try {
    const r = await fetch('/.netlify/functions/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text_to_speak: text })
    });
    const data = await r.json();
    if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(); return; }
    const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
    audio.onended = () => onEnd && onEnd();
    audio.onerror = () => onEnd && onEnd();
    await audio.play().catch(() => onEnd && onEnd());
    return audio;
  } catch(e) { console.error(e); onEnd && onEnd(); }
}

/* ── Textar ── */
const TEXTI_A = `Við Dúfnahóla 10 í Breiðholti stendur fjölbýlishús. Húsið er á fimm hæðum og á hverri hæð eru fjórar íbúðir. Það er lyfta í húsinu og hún kemur sér vel þegar fólk er að flytja inn eða kemur heim með innkaupapoka úr búðinni.

/* ── Shared components ── */

/* ══════════════════════════════════════════
   FLIPI 1 — Lestexti
══════════════════════════════════════════ */
function LestextiTab({ onComplete }) {
  const [stig, setStig] = useState(null); // null = ekki valið, 'A' eða 'B'
  const [speaking, setSpeaking] = useState(false);
  const audioRef = useRef(null);

  const texti = stig === 'A' ? TEXTI_A : stig === 'B' ? TEXTI_B : null;

  const handleListen = () => {
    if (!texti) return;
    if (speaking && audioRef.current) {
      audioRef.current.pause();
      setSpeaking(false);
      return;
    }
    setSpeaking(true);
    playAudio(texti, () => setSpeaking(false)).then(a => { audioRef.current = a; });
  };

  return (
    <div className="fade-in space-y-6">

      {/* Mynd */}
      <div className="rounded-xl overflow-hidden border border-gray-100 shadow-sm bg-gray-50">
        <img
          src="/isat2ib/images/01_blokkin-auka.png"
          alt="Anddyri fjölbýlishússins við Dúfnahóla 10"
          className="w-full object-cover max-h-72"
          onError={e => {
            e.target.style.display = 'none';
            e.target.nextSibling.style.display = 'flex';
          }}
        />
        <div className="hidden items-center justify-center h-40 text-gray-300 text-sm font-light flex-col gap-2">
          <span className="text-4xl">🏢</span>
          <span>Mynd: anddyri fjölbýlishússins</span>
        </div>
        <div className="px-4 py-2 bg-gray-50 border-t border-gray-100">
          <p className="text-xs text-gray-400 font-light italic">Anddyri fjölbýlishússins við Dúfnahóla 10</p>
        </div>
      </div>

      {/* Stigval */}
      {!stig && (
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6 text-center fade-in">
          <p className="text-gray-600 font-light mb-1">Veldu erfiðleikastig</p>
          <p className="text-sm text-gray-400 font-light mb-5">Báðar útgáfur lýsa sömu myndinni</p>
          <div className="flex justify-center gap-3">
            <button onClick={() => { setStig('A'); onComplete(); }}
              className="px-8 py-3 bg-blue-50 border-2 border-blue-200 text-blue-700
                rounded-lg hover:bg-blue-100 transition-colors font-light">
              <div className="font-medium">Stig A</div>
              <div className="text-xs text-blue-500 mt-0.5">Auðveldara</div>
            </button>
            <button onClick={() => { setStig('B'); onComplete(); }}
              className="px-8 py-3 bg-purple-50 border-2 border-purple-200 text-purple-700
                rounded-lg hover:bg-purple-100 transition-colors font-light">
              <div className="font-medium">Stig B</div>
              <div className="text-xs text-purple-500 mt-0.5">Erfiðara</div>
            </button>
          </div>
        </div>
      )}

      {/* Texti */}
      {stig && (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
            <div className="flex items-center gap-2">
              <span className={`text-xs font-medium px-2.5 py-1 rounded-full border
                ${stig === 'A'
                  ? 'bg-blue-50 text-blue-600 border-blue-200'
                  : 'bg-purple-50 text-purple-600 border-purple-200'}`}>
                Stig {stig}
              </span>
              <button onClick={() => { setStig(null); if(audioRef.current) audioRef.current.pause(); setSpeaking(false); }}
                className="text-xs text-gray-400 hover:text-gray-600 font-light underline">
                Skipta um stig
              </button>
            </div>
            <ListenPill onClick={handleListen} speaking={speaking} label="Hlusta á textann" />
          </div>

          <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
            {texti.split('\n\n').map((p, i) => (
              <p key={i} className="text-gray-700 font-light leading-relaxed mb-4 last:mb-0">{p}</p>
            ))}
          </div>

          {/* Orðalisti */}
          <div className="mt-4 bg-amber-50 rounded-xl border border-amber-100 p-4">
            <p className="text-xs font-medium text-amber-700 uppercase tracking-wide mb-2">Lykilorð</p>
            <div className="flex flex-wrap gap-2">
              {['fjölbýlishús','blokk','íbúð','hæð','stigangur','anddyri','lyfta','íbúi',
                'nágranni','kjallari','geymsla','hjólageymsla','þvottahús','garður',
                'húsfélag','garðdagur'].map(w => (
                <span key={w} className="text-xs bg-white border border-amber-200 text-amber-800

/* ══════════════════════════════════════════
   FLIPI 2 — Rétt eða rangt
══════════════════════════════════════════ */
const RR_ITEMS = [
  { id: 1, text: 'Húsið er á fjórum hæðum.',                                          answer: false },
  { id: 2, text: 'Það er lyfta í húsinu.',                                             answer: true  },
  { id: 3, text: 'Anddyrið var nýlega málað.',                                         answer: true  },
  { id: 4, text: 'Íbúarnir skipta um teppi á stigaganginum á hverju ári.',             answer: false },
  { id: 5, text: 'Á garðdeginum er grillað.',                                          answer: true  },
  { id: 6, text: 'Allir íbúarnir þekkja nágranna sína vel.',                           answer: false },
];

function RettRangtTab({ onComplete }) {
  const [answers, setAnswers]   = useState({});
  const [checked, setChecked]   = useState(false);
  const [score, setScore]       = useState(null);

  const handleAnswer = (id, val) => { if (!checked) setAnswers(a => ({ ...a, [id]: val })); };

  const handleCheck = () => {
    const correct = RR_ITEMS.filter(it => answers[it.id] === it.answer).length;
    setChecked(true);
    setScore(correct);
    onComplete();
  };

  const allAnswered = Object.keys(answers).length === RR_ITEMS.length;

  return (
    <div className="fade-in">
      <div className="mb-5">
        <h3 className="text-base font-medium text-gray-700 mb-1">Rétt eða rangt?</h3>
        <p className="text-sm text-gray-400 font-light">Lestu textann og merktu R (rétt) eða X (rangt).</p>
      </div>

      <div className="space-y-3 mb-6">
        {RR_ITEMS.map(item => {
          const ans     = answers[item.id];
          const isRight = checked && ans === item.answer;
          const isWrong = checked && ans !== undefined && ans !== item.answer;
          return (
            <div key={item.id}
              className={`p-4 rounded-xl border transition-all
                ${isRight ? 'bg-green-50 border-green-200' :
                  isWrong ? 'bg-red-50 border-red-200' :
                  'bg-white border-gray-100 shadow-sm'}`}>
              <p className={`text-sm font-light mb-3
                ${isRight ? 'text-green-800' : isWrong ? 'text-red-800' : 'text-gray-700'}`}>
                {item.id}. {item.text}
              </p>
              <div className="flex gap-2 items-center">
                {[true, false].map(val => (
                  <button key={String(val)} onClick={() => handleAnswer(item.id, val)}
                    disabled={checked}
                    className={`px-4 py-1.5 rounded-lg text-sm border transition-all font-light
                      ${ans === val
                        ? checked
                          ? val === item.answer
                            ? 'bg-green-600 text-white border-green-600'
                            : 'bg-red-500 text-white border-red-500'
                          : 'bg-blue-600 text-white border-blue-600'
                        : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}
                      disabled:cursor-not-allowed`}>
                    {val ? 'R Rétt' : 'X Rangt'}
                  </button>
                ))}
                {isWrong && (
                  <span className="text-xs text-gray-500 font-light ml-1">
                    → Rétt: {item.answer ? 'Rétt' : 'Rangt'}
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {!checked ? (
        <button onClick={handleCheck} disabled={!allAnswered}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
            disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
          Athuga svör
        </button>
      ) : (
        <div className={`p-4 rounded-xl border fade-in
          ${score >= 5 ? 'bg-green-50 border-green-200 text-green-800' :
            score >= 3 ? 'bg-amber-50 border-amber-200 text-amber-800' :
            'bg-red-50 border-red-200 text-red-800'}`}>
          <p className="font-medium">{score}/{RR_ITEMS.length} rétt</p>
          <p className="text-sm font-light mt-1">
            {score === RR_ITEMS.length ? 'Frábærlega gert!' :
             score >= 4 ? 'Gott! Endurlestu þær sem voru rangar.' :
             'Prófaðu að lesa textann aftur og reyna þá.'}
          </p>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 3 — Orðaforði (pörun)
══════════════════════════════════════════ */
const ORD_ITEMS = [
  { id: 'stigangur',      skilgr: 'Gangur á milli hæða í fjölbýlishúsi'                          },
  { id: 'anddyri',        skilgr: 'Fyrsta herbergi þegar maður opnar útidyrnar'                   },
  { id: 'þvottahús',      skilgr: 'Rými þar sem hægt er að þvo föt'                              },
  { id: 'hjólageymsla',   skilgr: 'Geymsla þar sem hægt er að geyma reiðhjól'                    },
  { id: 'húsfélag',       skilgr: 'Félag íbúa sem sér um rekstur og viðhald hússins'             },
  { id: 'garðdagur',      skilgr: 'Dagur þegar íbúar vinna saman í garðinum'                      },
];

function OrdafordiTab({ onComplete }) {
  const [selected, setSelected]   = useState(null);   // orð sem er valið
  const [pairs, setPairs]         = useState({});      // { orð: skilgr }
  const [checked, setChecked]     = useState(false);
  const [wrongPairs, setWrong]    = useState(new Set());

  const skilgrList = useRef(shuffle([...ORD_ITEMS.map(o => o.skilgr)]));

  const ordList = ORD_ITEMS.map(o => o.id);

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const handleOrd = (ord) => {
    if (checked || pairs[ord]) return;
    setSelected(s => s === ord ? null : ord);
  };

  const handleSkilgr = (skilgr) => {
    if (checked) return;
    if (!selected) return;
    // Athuga hvort skilgr sé þegar notuð
    if (Object.values(pairs).includes(skilgr)) return;
    setPairs(p => ({ ...p, [selected]: skilgr }));
    setSelected(null);
  };

  const handleCheck = () => {
    const wrong = new Set();
    ORD_ITEMS.forEach(item => {
      if (pairs[item.id] !== item.skilgr) wrong.add(item.id);
    });
    setWrong(wrong);
    setChecked(true);
    onComplete();
  };

  const allPaired = Object.keys(pairs).length === ORD_ITEMS.length;
  const pairedSkilgr = new Set(Object.values(pairs));

  const score = checked ? ORD_ITEMS.filter(o => pairs[o.id] === o.skilgr).length : null;

  return (
    <div className="fade-in">
      <div className="mb-5">
        <h3 className="text-base font-medium text-gray-700 mb-1">Orðaforði — pörun</h3>
        <p className="text-sm text-gray-400 font-light">
          Smelltu fyrst á orðið (vinstri), svo á rétta skilgreininguna (hægri).
        </p>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
        {/* Orð */}
        <div className="space-y-2">
          <p className="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Orð</p>
          {ordList.map(ord => {
            const isPaired = !!pairs[ord];
            const isSelected = selected === ord;
            const isWrong = checked && wrongPairs.has(ord);
            const isRight = checked && !wrongPairs.has(ord) && isPaired;
            return (
              <button key={ord} onClick={() => handleOrd(ord)}
                disabled={checked}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-light
                  transition-all
                  ${isRight    ? 'bg-green-50 border-green-300 text-green-800' :
                    isWrong    ? 'bg-red-50 border-red-300 text-red-800' :
                    isSelected ? 'bg-blue-100 border-blue-400 text-blue-800 shadow-sm' :
                    isPaired   ? 'bg-gray-100 border-gray-200 text-gray-500' :
                                 'bg-white border-gray-200 hover:bg-blue-50 hover:border-blue-200'}
                  disabled:cursor-default`}>
                <span className="font-medium">{ord}</span>
                {isPaired && !checked && (
                  <span className="ml-2 text-xs text-gray-400">✓ parað</span>
                )}
              </button>
            );
          })}
        </div>

        {/* Skilgreiningar */}
        <div className="space-y-2">
          <p className="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Skilgreiningar</p>
          {skilgrList.current.map((skilgr, i) => {
            const isUsed = pairedSkilgr.has(skilgr);
            const matchingOrd = ORD_ITEMS.find(o => o.skilgr === skilgr)?.id;
            const isRight = checked && isUsed && !wrongPairs.has(matchingOrd);
            const isWrong = checked && isUsed && wrongPairs.has(matchingOrd);
            return (
              <button key={i} onClick={() => handleSkilgr(skilgr)}
                disabled={checked || (isUsed && !selected)}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-light
                  transition-all leading-snug
                  ${isRight  ? 'bg-green-50 border-green-300 text-green-800' :
                    isWrong  ? 'bg-red-50 border-red-300 text-red-800' :
                    isUsed   ? 'bg-gray-100 border-gray-200 text-gray-400' :
                    selected ? 'bg-white border-blue-200 hover:bg-blue-50 cursor-pointer' :
                               'bg-white border-gray-200 text-gray-500'}
                  disabled:cursor-default`}>
                {skilgr}
              </button>
            );
          })}
        </div>
      </div>

      {/* Niðurstöður eftir athugun */}
      {checked && (
        <div className="mb-4 space-y-2 fade-in">
          {ORD_ITEMS.filter(o => wrongPairs.has(o.id)).map(o => (
            <div key={o.id} className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 text-sm">
              <span className="font-medium text-amber-800">{o.id}</span>
              <span className="text-amber-600 font-light"> → {o.skilgr}</span>
            </div>
          ))}
        </div>
      )}

      {!checked ? (
        <button onClick={handleCheck} disabled={!allPaired}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
            disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
          Athuga svör
        </button>
      ) : (
        <div className={`p-4 rounded-xl border fade-in
          ${score === ORD_ITEMS.length ? 'bg-green-50 border-green-200 text-green-800' :
            score >= 4 ? 'bg-amber-50 border-amber-200 text-amber-800' :
            'bg-red-50 border-red-200 text-red-800'}`}>
          <p className="font-medium">{score}/{ORD_ITEMS.length} rétt</p>
          <p className="text-sm font-light mt-1">
            {score === ORD_ITEMS.length ? 'Frábærlega gert! Þú þekkir öll orðin.' :
             score >= 4 ? 'Gott! Skoðaðu leiðréttingarnar hér að ofan.' :
             'Farðu aftur í lestextann og leitaðu að orðunum þar.'}
          </p>
        </div>
      )}
    </div>
  );
}

    endi:   'að þrífa sameignina',
    rangar: ['að kaupa pylsur', 'að klippa trén í garðinum', 'að mála stigaganginn']
  },
  {
    id: 5,
    upphaf: 'Eldri kona kemur',
    endi:   'inn með innkaupapoka',
    rangar: ['og heldur á stórum kassa', 'við lyftuna með tösku', 'og bíður við anddyrið']
  },
  {
    id: 6,
    upphaf: 'Ungur maður stendur við',
    endi:   'dyrnar og heldur á stórum kassa',
    rangar: ['lyftuna með tösku yfir öxlina', 'sandkassann í garðinum', 'póstkassana í anddyrinu']
  },
  {
    id: 7,
    upphaf: 'Ung kona stendur',
    endi:   'við lyftuna með tösku',
    rangar: ['í þvottahúsinu með föt', 'við sandkassann með börn', 'í anddyrinu með poka']
  },
];

function shuffleOnce(items) {
  const arr = [...items];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function KlofinnarTab({ onComplete }) {
  const [answers, setAnswers]   = useState({});
  const [checked, setChecked]   = useState(false);
  const [score, setScore]       = useState(null);

  // Búa til options í eitt skipti
  const optionsRef = useRef(
    SETNINGAR.reduce((acc, s) => {
      acc[s.id] = shuffleOnce([s.endi, ...s.rangar]);
      return acc;
    }, {})
  );

  const handleSelect = (id, val) => {
    if (checked) return;
    setAnswers(a => ({ ...a, [id]: val }));
  };

  const handleCheck = () => {
    const correct = SETNINGAR.filter(s => answers[s.id] === s.endi).length;
    setScore(correct);
    setChecked(true);
    onComplete();
  };

  const allAnswered = Object.keys(answers).length === SETNINGAR.length;

  return (
    <div className="fade-in">
      <div className="mb-5">
        <h3 className="text-base font-medium text-gray-700 mb-1">Klofinnar setningar</h3>
        <p className="text-sm text-gray-400 font-light">
          Veldu réttan enda fyrir hverja setningu.
        </p>
      </div>

      <div className="space-y-4 mb-6">
        {SETNINGAR.map(s => {
          const ans     = answers[s.id];
          const isRight = checked && ans === s.endi;
          const isWrong = checked && ans && ans !== s.endi;
          return (
            <div key={s.id}
              className={`p-4 rounded-xl border transition-all
                ${isRight ? 'bg-green-50 border-green-200' :
                  isWrong ? 'bg-red-50 border-red-200' :
                  'bg-white border-gray-100 shadow-sm'}`}>
              <p className={`text-sm font-medium mb-3
                ${isRight ? 'text-green-800' : isWrong ? 'text-red-800' : 'text-gray-700'}`}>
                {s.upphaf}…
              </p>
              <div className="space-y-2">
                {optionsRef.current[s.id].map((opt, i) => {
                  const isSelected = ans === opt;
                  const isCorrectOpt = opt === s.endi;
                  return (
                    <button key={i} onClick={() => handleSelect(s.id, opt)}
                      disabled={checked}
                      className={`w-full text-left px-4 py-2.5 rounded-lg border text-sm
                        font-light transition-all
                        ${checked && isCorrectOpt
                          ? 'bg-green-100 border-green-400 text-green-800'
                          : checked && isSelected && !isCorrectOpt
                          ? 'bg-red-100 border-red-400 text-red-800'
                          : isSelected
                          ? 'bg-blue-100 border-blue-400 text-blue-800'
                          : 'bg-gray-50 border-gray-200 hover:bg-blue-50 hover:border-blue-200'}
                        disabled:cursor-default`}>
                      {opt}
                    </button>
                  );
                })}
              </div>
              {isWrong && (
                <p className="text-xs text-gray-500 font-light mt-2 italic">
                  Rétt: „{s.endi}"
                </p>
              )}
            </div>
          );
        })}
      </div>

      {!checked ? (
        <button onClick={handleCheck} disabled={!allAnswered}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
            disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
          Athuga svör
        </button>
      ) : (
        <div className={`p-4 rounded-xl border fade-in
          ${score >= 6 ? 'bg-green-50 border-green-200 text-green-800' :
            score >= 4 ? 'bg-amber-50 border-amber-200 text-amber-800' :
            'bg-red-50 border-red-200 text-red-800'}`}>
          <p className="font-medium">{score}/{SETNINGAR.length} rétt</p>
          <p className="text-sm font-light mt-1">
            {score === SETNINGAR.length ? '🌟 Allt rétt! Frábærlega gert!' :
             score >= 5 ? 'Gott starf! Skoðaðu leiðréttingarnar.' :
             'Endurlestu textann og prófaðu aftur.'}
          </p>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   AÐALFORRITIÐ
══════════════════════════════════════════ */
const TABS = [
  { id: 'lestur',    label: '📖 Lestexti'          },
  { id: 'rr',        label: '✓✗ Rétt/rangt'        },
  { id: 'ordafordi', label: '📝 Orðaforði'          },
  { id: 'klofinnar', label: '🧩 Klofinnar setningar' },
];

function App() {
  const [activeTab, setActiveTab]     = useState('lestur');
  const [completed, setCompleted]     = useState(new Set());

  const markDone = (tabId) => setCompleted(prev => new Set([...prev, tabId]));

  const allDone = TABS.every(t => completed.has(t.id));

  return (
    <div className="min-height: 100vh">
      {/* Header */}
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <div className="flex items-start justify-between">
            <div>
              <p className="text-xs text-blue-400 font-medium tracking-widest uppercase mb-1">
                Kafli 1 · A1–A2
              </p>
              <h1 className="text-3xl font-light text-gray-800 mb-1">Blokkin</h1>
              <p className="text-gray-500 text-sm font-light">
                Kynning á fjölbýlishúsinu við Dúfnahóla 10
              </p>
            </div>
            <span className="text-3xl mt-1">🏢</span>
          </div>
        </div>

        {/* Nú get ég */}
        <div className="max-w-4xl mx-auto px-6 pb-4">
          <details className="group">
            <summary className="text-xs text-gray-400 hover:text-gray-600 cursor-pointer
              font-light select-none list-none flex items-center gap-1">
              <span className="group-open:rotate-90 transition-transform inline-block">▶</span>
              Nú get ég…
            </summary>
            <ul className="mt-2 space-y-1 pl-4">
              {[
                'lesið texta um fjölbýlishús og skilið orð eins og stigangur, anddyri og þvottahús.',
                'skilið einfaldan texta um það sem íbúar gera saman, t.d. á húsfundi eða garðdegi.',
                'giskað á merkingu samsettra orða eins og hjólageymsla og húsfélag.',
                'sagt nokkrar setningar um húsið mitt — hvar það er og hverjir búa þar.',
              ].map((s, i) => (
                <li key={i} className="text-xs text-gray-500 font-light flex items-start gap-2">
                  <span className="text-green-500 mt-0.5">✓</span>{s}
                </li>
              ))}
            </ul>
          </details>
        </div>
      </header>

      {/* Flipabar */}
      <div className="max-w-4xl mx-auto">
        <TabBar
          tabs={TABS}
          active={activeTab}
          onSelect={setActiveTab}
          completedTabs={completed}
        />
      </div>

      {/* Innihald */}
      <main className="max-w-4xl mx-auto px-6 py-8">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          {activeTab === 'lestur'    && <LestextiTab   onComplete={() => markDone('lestur')} />}
          {activeTab === 'rr'        && <RettRangtTab  onComplete={() => markDone('rr')} />}
          {activeTab === 'ordafordi' && <OrdafordiTab  onComplete={() => markDone('ordafordi')} />}
          {activeTab === 'klofinnar' && <KlofinnarTab  onComplete={() => markDone('klofinnar')} />}
        </div>

        {/* Næsti flipi takki */}
        {!allDone && (() => {
          const currentIdx = TABS.findIndex(t => t.id === activeTab);
          const nextTab = TABS[currentIdx + 1];
          if (!nextTab || completed.has(activeTab)) return null;
          return null; // Takki birtist bara eftir að flipi er kláraður
        })()}

        {/* Framvinda */}
        <div className="mt-6 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-2">
            {TABS.map(t => (
              <div key={t.id}
                className={`h-1.5 w-8 rounded-full transition-all duration-500
                  ${completed.has(t.id) ? 'bg-green-500' :
                    activeTab === t.id  ? 'bg-blue-400' : 'bg-gray-200'}`} />
            ))}
            <span className="text-xs text-gray-400 font-light ml-1">
              {completed.size}/{TABS.length} lokið
            </span>
          </div>
          {allDone && (
            <div className="fade-in flex items-center gap-2 text-green-700 bg-green-50
              border border-green-200 rounded-lg px-4 py-2 text-sm font-light">
              🎉 Kafla 1 lokið!
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
