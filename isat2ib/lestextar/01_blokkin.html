/* ══════════════════════════════════════════
   API
══════════════════════════════════════════ */
async function callOpenAI(messages, max_tokens = 300, temperature = 0.3) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'gpt-4o-mini', messages, max_tokens, temperature })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

const TEXTI = `Við Dúfnahóla 10 í Breiðholti stendur fjölbýlishús. Húsið er á fimm hæðum og á hverri hæð eru fjórar íbúðir. Það er lyfta í húsinu og hún kemur sér vel þegar fólk er að flytja inn eða kemur heim með innkaupapoka úr búðinni.

Það er nýbúið að mála anddyrið í blokkinni. Málningarlyktin er enn í loftinu og íbúarnir eru ánægðir með litinn. Á síðasta húsfundi var ákveðið að skipta líka um teppi á stigaganginum síðar á árinu.

Svo er garðdagurinn framundan. Þá hittast íbúarnir í garðinum og gera hann fínan fyrir sumarið. Það þarf að tína rusl, klippa trén og setja niður sumarblóm í blómakerið. Dagurinn endar með litlu grillboði og húsfélagið býður upp á pylsur fyrir alla sem taka þátt.

Íbúar hússins skiptast á að þrífa sameignina — ryksuga stigaganginn og skúra sameiginlegt þvottahús í kjallara. Hver íbúð á líka geymslu niðri í kjallara og þar er einnig hjólageymsla. Garðurinn er ekki mjög stór en þar eru rólur og sandkassi sem yngstu íbúarnir leika sér í á sumrin. Íbúarnir eru fjölbreyttur hópur — sumir hafa búið í blokkinni í áratugi og þekkja alla nágrannana vel, aðrir eru nýfluttir inn og eru enn að kynnast.`;

/* ══════════════════════════════════════════
   HJÁLPARFÖLL
══════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const norm = s => s.trim().toLowerCase().replace(/[-\s]/g, '');

const TabBar = ({ tabs, active, onSelect, done }) => (
  <div className="flex border-b border-gray-200 overflow-x-auto">
    {tabs.map(t => (
      <button key={t.id} onClick={() => onSelect(t.id)}
        className={`flex items-center gap-1.5 px-4 py-3.5 text-sm whitespace-nowrap transition-colors border-b-2
          ${active === t.id
            ? 'border-blue-600 text-blue-700 font-medium bg-blue-50/40'
            : 'border-transparent text-gray-400 hover:text-gray-600 hover:bg-gray-50'}`}>
        {done.has(t.id) && <span className="text-green-500 text-xs">✓</span>}
        {t.label}
      </button>
    ))}
  </div>
);

const CheckBtn = ({ onClick, disabled, label }) => (
  <button onClick={onClick} disabled={disabled}
    className="mt-6 px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
      disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
    {label || 'Athuga svör'}
  </button>
);

const ScoreBadge = ({ score, total }) => {
  const pct = score / total;
  const cls = pct === 1  ? 'bg-green-50 border-green-200 text-green-800'
            : pct >= 0.6 ? 'bg-amber-50 border-amber-200 text-amber-800'
                         : 'bg-red-50 border-red-200 text-red-800';
  const msg = pct === 1  ? 'Frábærlega gert! 🌟'
            : pct >= 0.6 ? 'Gott starf! Skoðaðu leiðréttingarnar.'
                         : 'Endurlestu textann og prófaðu aftur.';
  return (
    <div className={`mt-4 p-4 rounded-xl border fade-in ${cls}`}>
      <p className="font-medium">{score}/{total} rétt</p>
      <p className="text-sm font-light mt-0.5">{msg}</p>
    </div>
  );
};

/* ══════════════════════════════════════════
   ÞÝÐINGARPOPUP
══════════════════════════════════════════ */
function ThyðingarPopup({ selectedText, position, language, onClose }) {
  const [translation, setTranslation] = useState('');
  const [loading, setLoading]         = useState(false);

  const handleTranslate = async () => {
    setLoading(true);
    try {
      const result = await callOpenAI([
        { role: 'system', content: 'You are a helpful language learning assistant for Icelandic students.' },
        { role: 'user',   content: `A student learning Icelandic has selected this text and needs help understanding it in ${language}.\n\nSELECTED TEXT (Icelandic): "${selectedText}"\n\nProvide:\n1. Translation to ${language}\n2. Brief explanation if needed (in ${language})\n\nKeep it concise. Respond ONLY in ${language}.` }
      ], 300, 0.3);
      setTranslation(result);
    } catch (e) {
      setTranslation('Villa kom upp. Reyndu aftur.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <>
      <div className="fixed inset-0 z-40" onClick={onClose} />
      <div className="popup-anim fixed z-50 bg-white border-2 border-blue-300 rounded-2xl shadow-xl p-5"
        style={{
          left: position.x + 'px',
          top:  position.y + 'px',
          transform: 'translateX(-50%)',
          width: '340px',
          maxWidth: '90vw',
          maxHeight: 'calc(100vh - 32px)',
          overflowY: 'auto',
        }}>
        <div className="flex items-start justify-between mb-3">
          <div className="flex-1">
            <p className="text-xs text-gray-400 mb-1">Valinn texti:</p>
            <p className="text-sm text-gray-700 italic font-light">„{selectedText}"</p>
          </div>
          <button onClick={onClose}
            className="text-gray-300 hover:text-gray-600 text-2xl leading-none ml-3">×</button>
        </div>

        {!translation ? (
          <button onClick={handleTranslate} disabled={loading}
            className="w-full py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700
              disabled:bg-gray-300 transition-colors font-light text-sm">
            {loading
              ? <span className="loading-dots">Þýði</span>
              : `🌐 Þýða á ${language}`}
          </button>
        ) : (
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 fade-in">
            <p className="text-xs text-blue-400 mb-2">🌐 Þýðing:</p>
            <p className="text-sm text-gray-800 font-light whitespace-pre-wrap">{translation}</p>
          </div>
        )}
      </div>
    </>
  );
}

/* ══════════════════════════════════════════
   FLIPI 1 — Lestexti með þýðingu
══════════════════════════════════════════ */
function LestextiTab() {
  const [language, setLanguage]       = useState('');
  const [langInput, setLangInput]     = useState('');
  const [confirmed, setConfirmed]     = useState(false);
  const [popup, setPopup]             = useState(null); // { text, x, y }

  const handleConfirm = () => {
    if (langInput.trim()) { setLanguage(langInput.trim()); setConfirmed(true); }
  };

  const handleSelection = () => {
    if (!confirmed) return;
    setTimeout(() => {
      const sel  = window.getSelection();
      const text = sel.toString().trim();
      if (!text || text.length < 2) return;
      const range = sel.getRangeAt(0);
      const rect  = range.getBoundingClientRect();
      const popupWidth = 340;
      const margin = 16;
      const halfWidth = popupWidth / 2;
      const x = Math.min(
        Math.max(rect.left + rect.width / 2, halfWidth + margin),
        window.innerWidth - halfWidth - margin
      );
      const estimatedPopupHeight = 260;
      const spaceBelow = window.innerHeight - rect.bottom;
      const y = spaceBelow < estimatedPopupHeight
        ? Math.max(margin, rect.top - estimatedPopupHeight - 12)
        : rect.bottom + 12;
      setPopup({ text, x, y });
    }, 80);
  };

  return (
    <div className="fade-in space-y-5">

      {/* Tungumálval */}
      <div className="bg-gray-50 rounded-xl border border-gray-100 p-4">
        {!confirmed ? (
          <div className="flex gap-2 items-center flex-wrap">
            <span className="text-sm text-gray-500 font-light">🌐 Móðurmál:</span>
            <input
              type="text"
              value={langInput}
              onChange={e => setLangInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleConfirm()}
              placeholder="t.d. English, Polski, 中文…"
              className="flex-1 min-w-0 px-3 py-1.5 border border-gray-200 rounded-lg text-sm
                font-light focus:outline-none focus:ring-2 focus:ring-blue-400"
            />
            <button onClick={handleConfirm} disabled={!langInput.trim()}
              className="px-4 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-light
                hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
              Staðfesta
            </button>
          </div>
        ) : (
          <div className="flex items-center justify-between">
            <p className="text-sm text-gray-600 font-light">
              🌐 <span className="font-medium">{language}</span>
              <span className="text-gray-400 ml-2">— Merktu orð í textanum til að þýða</span>
            </p>
            <button onClick={() => { setConfirmed(false); setLangInput(''); setPopup(null); }}
              className="text-xs text-blue-500 hover:text-blue-700 font-light">Breyta</button>
          </div>
        )}
      </div>

      {/* Texti */}
      <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
        <img
          src="../media/01_blokkin.png"
          alt="Anddyri fjölbýlishússins við Dúfnahóla 10"
          className="float-left mr-5 mb-3 w-48 rounded-lg border border-gray-100 shadow-sm object-cover"
        />
        <div
          className={`selectable-text ${!confirmed ? 'opacity-60' : ''}`}
          onMouseUp={handleSelection}
          onTouchEnd={handleSelection}>
          {TEXTI.split('\n\n').map((p, i) => (
            <p key={i} className="text-gray-700 font-light leading-relaxed mb-4 last:mb-0">{p}</p>
          ))}
        </div>
        <div className="clear-both" />
        {!confirmed && (
          <p className="text-xs text-gray-400 font-light mt-3 text-center">
            ⬆️ Skráðu móðurmál þitt til að geta þýtt orð
          </p>
        )}
      </div>

      {/* Lykilorð */}
      <div className="bg-amber-50 rounded-xl border border-amber-100 p-5">
        <p className="text-xs font-medium text-amber-700 uppercase tracking-wide mb-3">Lykilorðaforði</p>
        <div className="flex flex-wrap gap-2">
          {LYKILORD.map(w => (
            <span key={w} className="text-sm bg-white border border-amber-200 text-amber-900
              font-light px-3 py-1 rounded-full">{w}</span>
          ))}
        </div>
      </div>

      {/* Nú get ég */}
      <div className="bg-blue-50 rounded-xl border border-blue-100 p-5">
        <p className="text-xs font-medium text-blue-600 uppercase tracking-wide mb-3">Nú get ég…</p>
        <ul className="space-y-2">
          {NU_GET_EG.map((s, i) => (
            <li key={i} className="flex items-start gap-2 text-sm text-blue-800 font-light">
              <span className="text-blue-400 mt-0.5 flex-shrink-0">✓</span>{s}
            </li>
          ))}
        </ul>
      </div>

      {/* Popup */}
      {popup && confirmed && (
        <ThyðingarPopup
          selectedText={popup.text}
          position={{ x: popup.x, y: popup.y }}
          language={language}
          onClose={() => { setPopup(null); window.getSelection().removeAllRanges(); }}
        />
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 2 — Rétt eða rangt
══════════════════════════════════════════ */
function RettRangtTab({ onDone }) {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const score = checked ? RR_ITEMS.filter(it => answers[it.id] === it.answer).length : null;

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-5">
        Lestu textann og merktu <strong className="font-medium">R</strong> (rétt) eða <strong className="font-medium">X</strong> (rangt).
      </p>
      <div className="space-y-3">
        {RR_ITEMS.map(item => {
          const ans     = answers[item.id];
          const isRight = checked && ans === item.answer;
          const isWrong = checked && ans !== item.answer;
          return (
            <div key={item.id} className={`p-4 rounded-xl border transition-all
              ${isRight ? 'bg-green-50 border-green-200' :
                isWrong ? 'bg-red-50 border-red-200' : 'bg-white border-gray-100 shadow-sm'}`}>
              <p className={`text-sm font-light mb-3
                ${isRight ? 'text-green-800' : isWrong ? 'text-red-800' : 'text-gray-700'}`}>
                {item.id}. {item.text}
              </p>
              <div className="flex gap-2 items-center">
                {[true, false].map(val => (
                  <button key={String(val)}
                    onClick={() => !checked && setAnswers(a => ({ ...a, [item.id]: val }))}
                    disabled={checked}
                    className={`px-4 py-1.5 rounded-lg text-sm border transition-all font-light
                      ${ans === val
                        ? checked
                          ? val === item.answer ? 'bg-green-600 text-white border-green-600'
                                                : 'bg-red-500 text-white border-red-500'
                          : 'bg-blue-600 text-white border-blue-600'
                        : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}
                      disabled:cursor-default`}>
                    {val ? 'R Rétt' : 'X Rangt'}
                  </button>
                ))}
                {isWrong && (
                  <span className="text-xs text-gray-400 font-light ml-1">
                    → {item.answer ? 'Rétt' : 'Rangt'}
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>
      {!checked
        ? <CheckBtn onClick={() => { setChecked(true); onDone(); }}
            disabled={Object.keys(answers).length < RR_ITEMS.length} />
        : <ScoreBadge score={score} total={RR_ITEMS.length} />}
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 3 — Efnisspurningar með AI mati
══════════════════════════════════════════ */
function EfnisspurningarTab({ onDone }) {
  const [answers, setAnswers]   = useState(Array(EFNISSPURNINGAR.length).fill(''));
  const [feedback, setFeedback] = useState(Array(EFNISSPURNINGAR.length).fill(null));
  const [loading, setLoading]   = useState(Array(EFNISSPURNINGAR.length).fill(false));
  const [allDone, setAllDone]   = useState(false);

  const handleCheck = async (i) => {
    const ans = answers[i].trim();
    if (!ans) return;
    const newLoading = [...loading]; newLoading[i] = true; setLoading(newLoading);
    try {
      const result = await callOpenAI([
        { role: 'system', content: 'Þú ert íslenskukennari sem metur svör nemenda í lesskilningsæfingu. Vertu vingjarnlegur og hvetjandi.' },
        { role: 'user',   content: `Texti: "${TEXTI}"\n\nSpurning: "${EFNISSPURNINGAR[i]}"\n\nSvar nemanda: "${ans}"\n\nMetur svarið. Sveigjanlegur um málfræði og stafsetningu — það mikilvæga er að efnið sé rétt.\n\nSvaraðu EINUNGIS:\nSTIG: [0-5]\nENDURGJÖF: [ein stutt vinaleg setning á íslensku]` }
      ], 120, 0.2);
      const stigMatch = result.match(/STIG:\s*(\d)/);
      const endMatch  = result.match(/ENDURGJÖF:\s*(.+)/);
      const score     = stigMatch ? parseInt(stigMatch[1]) : 0;
      const msg       = endMatch  ? endMatch[1].trim() : result.trim();
      const newFb = [...feedback]; newFb[i] = { score, msg }; setFeedback(newFb);
      // Athuga hvort allt sé lokið
      const newDone = newFb.every(f => f !== null);
      if (newDone && !allDone) { setAllDone(true); onDone(); }
    } catch (e) {
      const newFb = [...feedback]; newFb[i] = { score: 0, msg: 'Villa við mat. Reyndu aftur.' }; setFeedback(newFb);
    } finally {
      const newL = [...loading]; newL[i] = false; setLoading(newL);
    }
  };

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-5">
        Svaraðu spurningunum með stuttum setningum. AI kennari metur svörin þín.
      </p>
      <div className="space-y-5">
        {EFNISSPURNINGAR.map((sp, i) => {
          const fb   = feedback[i];
          const done = fb !== null;
          const scoreColor = done
            ? fb.score >= 4 ? 'bg-green-50 border-green-200 text-green-700'
            : fb.score >= 2 ? 'bg-amber-50 border-amber-200 text-amber-700'
                            : 'bg-red-50 border-red-200 text-red-700'
            : '';
          return (
            <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <p className="text-sm font-medium text-gray-700 mb-3">{i + 1}. {sp}</p>
              <textarea
                value={answers[i]}
                onChange={e => {
                  if (done) return;
                  const upd = [...answers]; upd[i] = e.target.value; setAnswers(upd);
                }}
                onKeyDown={e => {
                  if (e.key === 'Enter' && !e.shiftKey && !done) {
                    e.preventDefault(); handleCheck(i);
                  }
                }}
                disabled={done}
                rows={2}
                placeholder="Skrifaðu svar hér…"
                className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                  focus:outline-none focus:border-blue-400 font-light text-sm resize-none
                  disabled:bg-gray-50 disabled:cursor-default transition-colors"
              />
              {!done ? (
                <button onClick={() => handleCheck(i)}
                  disabled={loading[i] || !answers[i].trim()}
                  className="mt-3 px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-light
                    hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                  {loading[i] ? '…' : 'Athuga'}
                </button>
              ) : (
                <div className={`mt-3 p-3 rounded-lg border fade-in ${scoreColor}`}>
                  <p className="text-xs font-medium mb-1">Stig: {fb.score}/5</p>
                  <p className="text-sm font-light">{fb.msg}</p>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 4 — Orðaforði (pörun)
══════════════════════════════════════════ */
function OrdafordiTab({ onDone }) {
  const [selected, setSelected] = useState(null);
  const [pairs, setPairs]       = useState({});
  const [checked, setChecked]   = useState(false);
  const [skilgrList]            = useState(() => shuffle(ORD_PAIRS.map(p => p.skilgr)));

  const usedSkilgr = new Set(Object.values(pairs));
  const score      = checked ? ORD_PAIRS.filter(p => pairs[p.ord] === p.skilgr).length : null;
  const wrongOrds  = checked
    ? new Set(ORD_PAIRS.filter(p => pairs[p.ord] !== p.skilgr).map(p => p.ord))
    : new Set();

  const handleOrd = (ord) => {
    if (checked || pairs[ord]) return;
    setSelected(s => s === ord ? null : ord);
  };
  const handleSkilgr = (sk) => {
    if (checked || !selected || usedSkilgr.has(sk)) return;
    setPairs(p => ({ ...p, [selected]: sk }));
    setSelected(null);
  };

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-5">
        Smelltu á orðið, svo á rétta skilgreininguna.
      </p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-2">
        <div className="space-y-2">
          <p className="text-xs text-gray-400 uppercase tracking-wide mb-2">Orð</p>
          {ORD_PAIRS.map(({ ord }) => {
            const isPaired = !!pairs[ord];
            const isSel    = selected === ord;
            const isWrong  = wrongOrds.has(ord);
            const isRight  = checked && isPaired && !isWrong;
            return (
              <button key={ord} onClick={() => handleOrd(ord)} disabled={checked}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-light transition-all
                  ${isRight  ? 'bg-green-50 border-green-300 text-green-800' :
                    isWrong  ? 'bg-red-50 border-red-300 text-red-800' :
                    isSel    ? 'bg-blue-100 border-blue-400 text-blue-800 ring-2 ring-blue-200' :
                    isPaired ? 'bg-gray-100 border-gray-200 text-gray-400' :
                               'bg-white border-gray-200 hover:border-blue-300 hover:bg-blue-50'}
                  disabled:cursor-default`}>
                <span className="font-medium">{ord}</span>
                {isPaired && !checked && <span className="ml-2 text-xs text-gray-300">✓</span>}
              </button>
            );
          })}
        </div>
        <div className="space-y-2">
          <p className="text-xs text-gray-400 uppercase tracking-wide mb-2">Skilgreining</p>
          {skilgrList.map((sk, i) => {
            const isUsed  = usedSkilgr.has(sk);
            const matchO  = ORD_PAIRS.find(p => p.skilgr === sk)?.ord;
            const isRight = checked && isUsed && !wrongOrds.has(matchO);
            const isWrong = checked && isUsed && wrongOrds.has(matchO);
            return (
              <button key={i} onClick={() => handleSkilgr(sk)}
                disabled={checked || (isUsed && !selected)}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-light leading-snug transition-all
                  ${isRight  ? 'bg-green-50 border-green-300 text-green-800' :
                    isWrong  ? 'bg-red-50 border-red-300 text-red-800' :
                    isUsed   ? 'bg-gray-100 border-gray-200 text-gray-400' :
                    selected ? 'bg-white border-blue-200 hover:bg-blue-50 cursor-pointer' :
                               'bg-white border-gray-200 text-gray-500'}
                  disabled:cursor-default`}>
                {sk}
              </button>
            );
          })}
        </div>
      </div>
      {checked && wrongOrds.size > 0 && (
        <div className="mt-3 space-y-2 fade-in">
          {ORD_PAIRS.filter(p => wrongOrds.has(p.ord)).map(p => (
            <div key={p.ord} className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 text-sm">
              <span className="font-medium text-amber-800">{p.ord}</span>
              <span className="text-amber-600 font-light"> → {p.skilgr}</span>
            </div>
          ))}
        </div>
      )}
      {!checked
        ? <CheckBtn onClick={() => { setChecked(true); onDone(); }}
            disabled={Object.keys(pairs).length < ORD_PAIRS.length} />
        : <ScoreBadge score={score} total={ORD_PAIRS.length} />}
    </div>
  );
}

/* ══════════════════════════════════════════
   FLIPI 5 — Textaröðun
══════════════════════════════════════════ */
function TextaroðunTab({ onDone }) {
  const [items, setItems]       = useState(() => shuffle([...MALSGR_RATT]));
  const [checked, setChecked]   = useState(false);
  const [dragging, setDragging] = useState(null);
  const score = checked ? items.filter((v, i) => v === MALSGR_RATT[i]).length : null;

  const moveItem = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= items.length) return;
    const a = [...items]; [a[i], a[j]] = [a[j], a[i]]; setItems(a);
  };

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-2">Raðaðu málsgreinunum í rétta röð (1–4).</p>
      <p className="text-xs text-gray-400 font-light mb-5">Dragðu til að raða, eða notaðu örvatakkana.</p>
      <div className="space-y-2 mb-6">
        {items.map((txt, i) => {
          const isRight = checked && txt === MALSGR_RATT[i];
          const isWrong = checked && txt !== MALSGR_RATT[i];
          return (
            <div key={txt}
              draggable={!checked}
              onDragStart={() => setDragging(i)}
              onDragOver={e => {
                e.preventDefault();
                if (dragging === null || dragging === i) return;
                const a = [...items]; const [m] = a.splice(dragging, 1); a.splice(i, 0, m);
                setItems(a); setDragging(i);
              }}
              onDragEnd={() => setDragging(null)}
              className={`flex items-center gap-3 p-4 rounded-xl border transition-all select-none
                ${isRight        ? 'bg-green-50 border-green-200' :
                  isWrong        ? 'bg-red-50 border-red-200' :
                  dragging === i ? 'bg-blue-50 border-blue-300 shadow-md' :
                  'bg-white border-gray-100 shadow-sm'}
                ${!checked ? 'cursor-grab active:cursor-grabbing' : ''}`}>
              <span className={`text-sm font-medium w-6 h-6 rounded-full flex items-center
                justify-center flex-shrink-0
                ${isRight ? 'bg-green-500 text-white' :
                  isWrong ? 'bg-red-400 text-white' : 'bg-gray-200 text-gray-600'}`}>
                {i + 1}
              </span>
              <p className="text-sm font-light text-gray-700 flex-1 leading-snug">{txt}</p>
              {!checked && (
                <div className="flex flex-col gap-0.5 flex-shrink-0">
                  <button onClick={() => moveItem(i, -1)} disabled={i === 0}
                    className="text-gray-300 hover:text-gray-600 disabled:opacity-20 text-xs px-1">▲</button>
                  <button onClick={() => moveItem(i, 1)} disabled={i === items.length - 1}
                    className="text-gray-300 hover:text-gray-600 disabled:opacity-20 text-xs px-1">▼</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {checked && score < MALSGR_RATT.length && (
        <div className="mb-4 bg-amber-50 border border-amber-200 rounded-xl p-4 fade-in">
          <p className="text-xs font-medium text-amber-700 uppercase tracking-wide mb-2">Rétt röð</p>
          {MALSGR_RATT.map((t, i) => (
            <p key={i} className="text-sm text-amber-800 font-light">
              <span className="font-medium">{i + 1}.</span> {t}
            </p>
          ))}
        </div>
      )}
      {!checked
        ? <CheckBtn onClick={() => { setChecked(true); onDone(); }} disabled={false} />
        : <ScoreBadge score={score} total={MALSGR_RATT.length} />}
    </div>
  );
}

/* ══════════════════════════════════════════
   AÐALFORRITIÐ
══════════════════════════════════════════ */
const TABS = [
  { id: 'lestur',      label: '📖 Lestexti'        },
  { id: 'rr',          label: '✓✗ Rétt/rangt'      },
  { id: 'efnis',       label: '💬 Efnisspurningar'  },
  { id: 'ordafordi',   label: '📝 Orðaforði'        },
  { id: 'textrarod',   label: '🔢 Textaröðun'       },
];

function App() {
  const [activeTab, setActiveTab] = useState('lestur');
  const [done, setDone]           = useState(new Set(['lestur']));
  const markDone = id => setDone(prev => new Set([...prev, id]));
  const allDone  = TABS.every(t => done.has(t.id));

  return (
    <div className="min-h-screen">
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-7">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-400 hover:text-gray-600 mb-3 inline-block font-light">
            ← Til baka
          </button>
          <div className="flex items-start justify-between gap-4">
            <div>
              <p className="text-[10px] font-medium text-blue-400 uppercase tracking-widest mb-1">Kafli 1 · A2–B1</p>
              <h1 className="text-3xl font-light text-gray-800 mb-1">Blokkin</h1>
              <p className="text-gray-500 text-sm font-light">Kynning á fjölbýlishúsinu við Dúfnahóla 10</p>
            </div>
            <span className="text-4xl">🏢</span>
          </div>
        </div>
        <div className="max-w-4xl mx-auto bg-white">
          <TabBar tabs={TABS} active={activeTab} onSelect={setActiveTab} done={done} />
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-7">
          {activeTab === 'lestur'    && <LestextiTab />}
          {activeTab === 'rr'        && <RettRangtTab       onDone={() => markDone('rr')} />}
          {activeTab === 'efnis'     && <EfnisspurningarTab onDone={() => markDone('efnis')} />}
          {activeTab === 'ordafordi' && <OrdafordiTab       onDone={() => markDone('ordafordi')} />}
          {activeTab === 'textrarod' && <TextaroðunTab      onDone={() => markDone('textrarod')} />}
        </div>

        <div className="mt-5 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-1.5">
            {TABS.map(t => (
              <div key={t.id} className={`h-1.5 w-10 rounded-full transition-all duration-500
                ${done.has(t.id) ? 'bg-green-500' : activeTab === t.id ? 'bg-blue-400' : 'bg-gray-200'}`} />
            ))}
            <span className="text-xs text-gray-400 font-light ml-1">{done.size}/{TABS.length}</span>
          </div>
          {allDone && (
            <div className="fade-in flex items-center gap-2 bg-green-50 border border-green-200
              text-green-700 rounded-lg px-4 py-2 text-sm font-light">
              🎉 Kafla 1 lokið!
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
