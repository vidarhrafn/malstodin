<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNIÐMÁT — Sérverkefni (tímaröð, pörun, persónuval) – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .answer-option.opt-disabled  { cursor: default; }
    select.drop {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.875rem;
      font-weight: 300;
      background: white;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      min-width: 120px;
    }
    select.drop:focus { border-color: #60a5fa; }
    select.drop.drop-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    select.drop.drop-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState } = React;

  /* ══════════════════════════════════════════════════════════════════
     SNIÐMÁTSVIÐBÓT — ÞRÍR ÍHLUTIR FYRIR SÉRVERKEFNI

     Notkun í SNIDMAT-hlustun.html:
     1. Afrita íhlutinn (og shuffle-fallið) inn í sniðmátið.
     2. Bæta gögnum í GÖGN-hlutann og flipa í TABS,
        t.d. { id: 'rod', label: 'Tímaröð', icon: '🔢' }.
     3. Bæta "rod: rodDone" (o.s.frv.) í tabDone-hlutinn.
     Hver íhlutur kallar á onDone() þegar verkefni er athugað —
     tengja það við setState fyrir framvindu.

     Dekkar:
     - Tímaröð      → æfing 2
     - Pörun        → æfingar 4 og 16
     - Persónuval   → æfingar 14 ("Mateo eða Andri?"),
                      23 ("Hver segir hvað?") og 24 ("Hver á að gera hvað?")
  ══════════════════════════════════════════════════════════════════ */

  /* Stokkun — notuð í pörun og tímaröð */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ══════════════════════════════════════════
     GÖGN — BREYTA HÉR (dæmi úr æfingum 2, 4, 14)
  ══════════════════════════════════════════ */

  // TÍMARÖÐ (æfing 2) — atriði í RÉTTRI röð
  const TIMAROD = [
    'Lía vaknaði',
    'Lía fór í sund',
    'Lía bakaði köku',
    'Vera talaði við Líu',
  ];

  // PÖRUN (æfing 4) — vinstri ↔ hægri; hægri hliðin er stokkuð við birtingu
  const PORUN = [
    { left: 'Vera',  right: 'Segir að maturinn sé girnilegur' },
    { left: 'Andri', right: 'Elskar saltfisk' },
    { left: 'Mateo', right: 'Hefur aldrei smakkað saltfisk' },
    { left: 'Lía',   right: 'Er svolítið matvönd' },
  ];

  // PERSÓNUVAL (æfing 14) — fullyrðing + rétt persóna
  // Sama uppbygging virkar fyrir "Hver segir hvað?" (tilvitnanir)
  // og "Hver á að gera hvað?" — bara önnur PERSONUR-fylki og fullyrðingar.
  const PERSONUR_VAL = ['Mateo', 'Andri'];
  const PERSONUVAL = [
    { s: 'Hann snúsar áður en hann stendur upp.',  correct: 'Mateo' },
    { s: 'Hann þarf að vera fyrstur í sturtuna.',  correct: 'Andri' },
    { s: 'Hann gefur dýrinu sínu mat.',            correct: 'Andri' },
    { s: 'Hann smyr nesti fyrir bróður sinn.',     correct: 'Mateo' },
    { s: 'Hann fer í strætó í skólann.',           correct: 'Mateo' },
  ];

  /* ══════════════════════════════════════════
     ÍHLUTUR 1 — TÍMARÖÐ
     props: items (strengir í réttri röð), onDone()
  ══════════════════════════════════════════ */
  const TimarodTask = ({ items, onDone }) => {
    const [shuffled] = useState(() => shuffle(items));
    const [ans, setAns]   = useState(() => shuffled.map(() => ''));
    const [done, setDone] = useState(false);
    const nums = items.map((_, i) => String(i + 1));
    const ready = ans.every(a => a !== '');

    const check = () => { if (ready) { setDone(true); onDone && onDone(); } };
    const reset = () => { setAns(shuffled.map(() => '')); setDone(false); };
    const correctNum = item => String(items.indexOf(item) + 1);

    return (
      <div>
        <h2 className="text-lg font-medium text-gray-800 mb-1">🔢 Tímaröð</h2>
        <p className="text-sm font-light text-gray-500 mb-4">Settu atriðin í rétta röð (1 = fyrst).</p>
        <div className="space-y-3">
          {shuffled.map((item, idx) => {
            const ok = ans[idx] === correctNum(item);
            const cls = done ? `drop ${ok ? 'drop-correct' : 'drop-incorrect'}` : 'drop';
            return (
              <div key={idx} className="border border-gray-100 rounded-xl p-4 flex items-center gap-4">
                <select className={cls} style={{ minWidth: '70px' }} value={ans[idx]} disabled={done}
                  onChange={e => setAns(p => { const n=[...p]; n[idx]=e.target.value; return n; })}>
                  <option value="">–</option>
                  {nums.map(n => <option key={n} value={n}>{n}</option>)}
                </select>
                <span className="text-sm font-light text-gray-800">{item}</span>
                {done && !ok && (
                  <span className="text-xs text-green-700 font-light ml-auto">✓ {correctNum(item)}</span>
                )}
              </div>
            );
          })}
        </div>
        <div className="flex gap-3 mt-5">
          <button onClick={check} disabled={!ready || done}
            className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
            Athuga svör
          </button>
          {done && (
            <button onClick={reset}
              className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                hover:bg-gray-50 transition-colors font-light text-sm">
              Endurstilla
            </button>
          )}
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════
     ÍHLUTUR 2 — PÖRUN
     props: pairs [{left, right}], onDone()
     Hægri hliðin er stokkuð í dropdown-listum.
  ══════════════════════════════════════════ */
  const PorunTask = ({ pairs, onDone }) => {
    const [options] = useState(() => shuffle(pairs.map(p => p.right)));
    const [ans, setAns]   = useState(() => pairs.map(() => ''));
    const [done, setDone] = useState(false);
    const ready = ans.every(a => a !== '');

    const check = () => { if (ready) { setDone(true); onDone && onDone(); } };
    const reset = () => { setAns(pairs.map(() => '')); setDone(false); };

    return (
      <div>
        <h2 className="text-lg font-medium text-gray-800 mb-1">🔗 Pörun</h2>
        <p className="text-sm font-light text-gray-500 mb-4">Paraðu saman.</p>
        <div className="space-y-3">
          {pairs.map((pair, idx) => {
            const ok = ans[idx] === pair.right;
            const cls = done ? `drop ${ok ? 'drop-correct' : 'drop-incorrect'}` : 'drop';
            return (
              <div key={idx} className="border border-gray-100 rounded-xl p-4">
                <div className="flex flex-wrap items-center gap-3">
                  <span className="text-sm font-medium text-gray-800 w-20">{pair.left}</span>
                  <select className={`${cls} flex-1`} value={ans[idx]} disabled={done}
                    onChange={e => setAns(p => { const n=[...p]; n[idx]=e.target.value; return n; })}>
                    <option value="">-- veldu --</option>
                    {options.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                </div>
                {done && !ok && (
                  <div className="text-xs text-green-700 mt-1.5 font-light">✓ {pair.right}</div>
                )}
              </div>
            );
          })}
        </div>
        <div className="flex gap-3 mt-5">
          <button onClick={check} disabled={!ready || done}
            className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
            Athuga svör
          </button>
          {done && (
            <button onClick={reset}
              className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                hover:bg-gray-50 transition-colors font-light text-sm">
              Endurstilla
            </button>
          )}
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════
     ÍHLUTUR 3 — PERSÓNUVAL
     props: title, hint, persons ['Mateo','Andri',…],
            items [{s, correct}], onDone()
     Virkar fyrir "Mateo eða Andri?", "Hver segir hvað?"
     og "Hver á að gera hvað?" — 2–4 persónur.
  ══════════════════════════════════════════ */
  const PersonuvalTask = ({ title, hint, persons, items, onDone }) => {
    const [ans, setAns]   = useState({});
    const [done, setDone] = useState(false);
    const ready = items.every((_, i) => ans[i] !== undefined);

    const check = () => { if (ready) { setDone(true); onDone && onDone(); } };
    const reset = () => { setAns({}); setDone(false); };

    return (
      <div>
        <h2 className="text-lg font-medium text-gray-800 mb-1">👥 {title || 'Hver gerir hvað?'}</h2>
        <p className="text-sm font-light text-gray-500 mb-4">{hint || 'Veldu rétta persónu fyrir hverja fullyrðingu.'}</p>
        <div className="space-y-3">
          {items.map((item, idx) => (
            <div key={idx} className="border border-gray-100 rounded-xl p-4">
              <p className="text-sm font-light text-gray-800 mb-3">{item.s}</p>
              <div className="flex gap-2 flex-wrap">
                {persons.map(person => {
                  const sel = ans[idx] === person;
                  let cls = 'answer-option flex-1 min-w-[100px] py-2 px-3 rounded-lg text-sm font-light';
                  if (!done) { if (sel) cls += ' opt-selected'; }
                  else {
                    cls += ' opt-disabled';
                    if (item.correct === person) cls += ' opt-correct';
                    else if (sel)                cls += ' opt-incorrect';
                  }
                  return (
                    <button key={person} className={cls}
                      onClick={() => { if (!done) setAns(p => ({ ...p, [idx]: person })); }}>
                      {person}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
        <div className="flex gap-3 mt-5">
          <button onClick={check} disabled={!ready || done}
            className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
            Athuga svör
          </button>
          {done && (
            <button onClick={reset}
              className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                hover:bg-gray-50 transition-colors font-light text-sm">
              Endurstilla
            </button>
          )}
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════
     SÝNISSÍÐA — þrír íhlutir í röð
  ══════════════════════════════════════════ */
  const App = () => (
    <div className="max-w-4xl mx-auto px-6 py-10 space-y-6">
      <header>
        <p className="text-[10px] font-medium text-green-500 uppercase tracking-widest mb-1">Sniðmátsviðbót</p>
        <h1 className="text-3xl font-light text-gray-800">Sérverkefni — sýnishorn</h1>
        <p className="text-gray-500 text-sm font-light">
          Tímaröð (æf. 2) · Pörun (æf. 4, 16) · Persónuval (æf. 14, 23, 24). Sjá leiðbeiningar í athugasemdum í kóðanum.
        </p>
      </header>

      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <TimarodTask items={TIMAROD} />
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <PorunTask pairs={PORUN} />
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <PersonuvalTask
          title="Mateo eða Andri?"
          hint="Hlustaðu og veldu rétt nafn."
          persons={PERSONUR_VAL}
          items={PERSONUVAL}
        />
      </div>
    </div>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
