<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Æfing 02: Hvað gerðir þú í gær? – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #d1d5db;
      outline: none;
      cursor: pointer;
    }
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #16a34a;
      cursor: pointer;
    }
    .progress-bar::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #16a34a;
      cursor: pointer;
      border: none;
    }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.tab-active):hover { background: #f3f4f6; }
    .tab-btn.tab-active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.tab-active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .answer-option.opt-disabled  { cursor: default; }
    select.drop {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.875rem;
      font-weight: 300;
      background: white;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      min-width: 170px;
    }
    select.drop:focus { border-color: #60a5fa; }
    select.drop.drop-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    select.drop.drop-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .portrait {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid #e5e7eb;
      transition: border-color 0.2s;
    }
    .portrait.speaking {
      border-color: #16a34a;
      animation: speakingPulse 1.1s ease-in-out infinite;
    }
    @keyframes speakingPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(22,163,74,0.35); }
      50%      { box-shadow: 0 0 0 8px rgba(22,163,74,0.10); }
    }
    .portrait-sm {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;
  /* ── OpenAI ──────────────────────────────────────────────────────── */
  async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }
  /* Stokkun — notuð í tímaröð */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  /* Stokkun sem er ALLTAF frábrugðin upprunalegu röðinni
     (svo tímaröðin lendi aldrei óvart í réttri röð). */
  function shuffleDistinct(arr) {
    if (arr.length < 2) return [...arr];
    let a;
    do { a = shuffle(arr); } while (a.every((x, i) => x === arr[i]));
    return a;
  }
  /* ══════════════════════════════════════════
     GÖGN — ÆFING 2
  ══════════════════════════════════════════ */
  // META
  const AEFING_NR  = "02";
  const TITILL     = "Hvað gerðir þú í gær?";
  const STIG       = "A1–A2";
  const AUDIO_SRC  = "../media/aef02-i-gaer.mp3";
  const MYND_SRC   = "../media/aef02-i-gaer.png";
  const MYND_ALT   = "Lía og Vera á kaffistofunni";
  // Persónur
  const PERSONUR = [
    { id: 'lia',  nafn: 'Lía',  mynd: '../media/lia_haus.jpg',  mynd_alt: 'Lía'  },
    { id: 'vera', nafn: 'Vera', mynd: '../media/vera_haus.jpg', mynd_alt: 'Vera' },
  ];
  // Samtalstexti
  const SAMTALS = [
    { who: 'Vera', text: 'Jæja, hvað gerðir þú í gær, Lía?' },
    { who: 'Lía',  text: 'Ég vaknaði klukkan níu. Svo fór ég í sund með mömmu minni. Það var mjög gott.' },
    { who: 'Vera', text: 'Í hvaða sundlaug fóruð þið?' },
    { who: 'Lía',  text: 'Í Árbæjarlaug. Við fórum líka í pottinn.' },
    { who: 'Vera', text: 'Næs. Gerðir þú eitthvað fleira?' },
    { who: 'Lía',  text: 'Já, eftir sundið bakaði ég köku. Súkkulaðiköku.' },
    { who: 'Vera', text: 'Namm! Ég elska súkkulaðikökur.' },
    { who: 'Lía',  text: 'Ég kem með sneið næst handa þér!' },
    { who: 'Vera', text: 'Já takk, ég þigg það. Ég fór í göngutúr með litla bróður mínum.' },
    { who: 'Lía',  text: 'Hvað heitir hann aftur?' },
    { who: 'Vera', text: 'Hann heitir Emil. Hann er níu ára og mjög orkumikill.' },
    { who: 'Lía',  text: 'Hvernig þá?' },
    { who: 'Vera', text: 'Hann gengur aldrei, hann hleypur bara. Ég var alveg þreytt eftir gönguna.' },
    { who: 'Lía',  text: 'Ég skil þig. Ég var líka þreytt eftir sundið.' },
  ];
  // Persónulitir í samtalstexta
  const WHO = {
    Lía:  { bg: 'bg-blue-50',  tag: 'bg-blue-100 text-blue-700',   mynd: '../media/lia_haus.jpg',  init: 'L' },
    Vera: { bg: 'bg-green-50', tag: 'bg-green-100 text-green-700', mynd: '../media/vera_haus.jpg', init: 'V' },
  };
  // TÍMAKORT — hver talar hvenær (sek). Sjálfvirkt úr aef02-i-gaer.mp3
  // (ffmpeg silencedetect + DP-mátun við línuröð). Handfínstilla stök gildi ef þarf.
  const TIMING = [
    { who: 'Vera', start: 0.0,   end: 1.99 },
    { who: 'Lía',  start: 2.83,  end: 8.21 },
    { who: 'Vera', start: 8.57,  end: 9.85 },
    { who: 'Lía',  start: 10.46, end: 13.28 },
    { who: 'Vera', start: 13.65, end: 15.7 },
    { who: 'Lía',  start: 16.41, end: 19.36 },
    { who: 'Vera', start: 19.87, end: 22.06 },
    { who: 'Lía',  start: 22.42, end: 24.18 },
    { who: 'Vera', start: 24.62, end: 28.35 },
    { who: 'Lía',  start: 29.11, end: 30.93 },
    { who: 'Vera', start: 31.67, end: 35.58 },
    { who: 'Lía',  start: 36.0,  end: 37.51 },
    { who: 'Vera', start: 38.15, end: 44.08 },
    { who: 'Lía',  start: 44.77, end: 47.88 },
  ];
  // 1. RÉTT EÐA RANGT
  const TRUE_FALSE = [
    { s: 'Lía fór í sund í gær.',                        correct: true  },
    { s: 'Vera fór með mömmu sinni í göngutúr.',         correct: false },
    { s: 'Lía bakaði eplaköku.',                         correct: false },
    { s: 'Emil er níu ára.',                             correct: true  },
    { s: 'Vera var þreytt eftir göngutúrinn.',           correct: true  },
    { s: 'Lía fór í sund ein.',                          correct: false },
    { s: 'Þær fóru í Laugardalslaug.',                   correct: false },
    { s: 'Emil er bróðir Veru.',                         correct: true  },
  ];
  // 2. SPURNINGAR
  const SHORT_QS = [
    { q: 'Hvenær vaknaði Lía?',                       key: ['níu', 'klukkan níu', '9', 'kl. 9'] },
    { q: 'Með hverjum fór hún í sund?',               key: ['mömmu', 'móður', 'mömmu sinni', 'mamma'] },
    { q: 'Hvað bakaði Lía?',                          key: ['köku', 'súkkulaðiköku', 'súkkulaði', 'kaka'] },
    { q: 'Hvað gerði Vera með bróður sínum?',         key: ['göngutúr', 'gekk', 'ganga', 'göngu'] },
    { q: 'Hvað heitir bróðir hennar?',                key: ['Emil'] },
    { q: 'Hvernig leið Veru eftir göngutúrinn?',      key: ['þreytt', 'þreytt eftir', 'þreyttur'] },
  ];
  // 3. TÍMARÖÐ — atriði í RÉTTRI röð
  const TIMAROD = [
    'Lía vaknaði',
    'Lía fór í sund',
    'Lía bakaði köku',
    'Vera talaði við Líu',
  ];
  // 4. ÞÝÐINGARVERKEFNI — 'en' er ensk viðmiðunarmerking fyrir AI-matið
  const TRANSLATIONS = [
    { word: 'sneið',           en: 'a slice (e.g. of cake)' },
    { word: 'þreyttur/þreytt', en: 'tired' },
  ];
  // FLIPAR
  const TABS = [
    { id: 'tf',    label: 'Rétt/Rangt', icon: '✅' },
    { id: 'short', label: 'Spurningar', icon: '📝' },
    { id: 'rod',   label: 'Tímaröð',    icon: '🔢' },
    { id: 'trans', label: 'Þýðingar',   icon: '🌍' },
  ];
  /* ══════════════════════════════════════════
     ÍHLUTIR
  ══════════════════════════════════════════ */
  const FeedbackBadge = ({ score, message, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
    const cls = {
      green: 'bg-green-50 border-green-200 text-green-700',
      amber: 'bg-amber-50 border-amber-200 text-amber-700',
      red:   'bg-red-50 border-red-200 text-red-700',
    }[color];
    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {onRetry && (
          <button onClick={onRetry} className="text-xs underline mt-2 opacity-70 block">
            Reyna aftur
          </button>
        )}
      </div>
    );
  };
  /* TÍMARÖÐ — props: items (strengir í réttri röð), onDone() */
  const TimarodTask = ({ items, onDone }) => {
    const [shuffled, setShuffled] = useState(() => shuffleDistinct(items));
    const [ans, setAns]   = useState(() => items.map(() => ''));
    const [done, setDone] = useState(false);
    const nums = items.map((_, i) => String(i + 1));
    const ready = ans.every(a => a !== '');
    const check = () => { if (ready) { setDone(true); onDone && onDone(); } };
    const reset = () => {
      setShuffled(shuffleDistinct(items));
      setAns(items.map(() => ''));
      setDone(false);
    };
    const correctNum = item => String(items.indexOf(item) + 1);
    return (
      <div>
        <h2 className="text-lg font-medium text-gray-800 mb-1">🔢 Tímaröð</h2>
        <p className="text-sm font-light text-gray-500 mb-4">Settu atriðin í rétta röð (1 = fyrst).</p>
        <div className="space-y-3">
          {shuffled.map((item, idx) => {
            const ok = ans[idx] === correctNum(item);
            const cls = done ? `drop ${ok ? 'drop-correct' : 'drop-incorrect'}` : 'drop';
            return (
              <div key={idx} className="border border-gray-100 rounded-xl p-4 flex items-center gap-4">
                <select className={cls} style={{ minWidth: '70px' }} value={ans[idx]} disabled={done}
                  onChange={e => setAns(p => { const n=[...p]; n[idx]=e.target.value; return n; })}>
                  <option value="">–</option>
                  {nums.map(n => <option key={n} value={n}>{n}</option>)}
                </select>
                <span className="text-sm font-light text-gray-800">{item}</span>
                {done && !ok && (
                  <span className="text-xs text-green-700 font-light ml-auto">✓ {correctNum(item)}</span>
                )}
              </div>
            );
          })}
        </div>
        <div className="flex gap-3 mt-5">
          <button onClick={check} disabled={!ready || done}
            className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
            Athuga svör
          </button>
          {done && (
            <button onClick={reset}
              className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                hover:bg-gray-50 transition-colors font-light text-sm">
              Endurstilla
            </button>
          )}
        </div>
      </div>
    );
  };
  /* ══════════════════════════════════════════
     APP
  ══════════════════════════════════════════ */
  const App = () => {
    const audioRef = useRef(null);
    const [isPlaying,    setIsPlaying]    = useState(false);
    const [playbackRate, setPlaybackRate] = useState(1);
    const [currentTime,  setCurrentTime]  = useState(0);
    const [duration,     setDuration]     = useState(0);
    const [activeTab,    setActiveTab]    = useState('tf');
    const [showText,     setShowText]     = useState(false);
    const [activeSpeaker, setActiveSpeaker] = useState(null);
    useEffect(() => {
      if (audioRef.current) audioRef.current.playbackRate = playbackRate;
    }, [playbackRate]);
    const fmt = sec => {
      if (!sec || isNaN(sec)) return '0:00';
      return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`;
    };
    const togglePlay = () => {
      if (!audioRef.current) return;
      isPlaying ? audioRef.current.pause() : audioRef.current.play();
    };
    /* Rétt/Rangt */
    const [tfAns,  setTfAns]  = useState({});
    const [tfDone, setTfDone] = useState(false);
    const tfReady = TRUE_FALSE.every((_, i) => tfAns[i] !== undefined);
    /* Spurningar */
    const [shortAns, setShortAns] = useState(SHORT_QS.map(() => ''));
    const [shortFb,  setShortFb]  = useState(SHORT_QS.map(() => null));
    const [shortLd,  setShortLd]  = useState(SHORT_QS.map(() => false));
    const checkShort = async idx => {
      const ans = shortAns[idx].trim();
      if (!ans) return;
      setShortLd(p => { const n=[...p]; n[idx]=true; return n; });
      try {
        const { q, key } = SHORT_QS[idx];
        const sys = `Þú ert íslenskukennari. Nemandinn svarar A1–A2 stigs hlustunarspurningu.
Spurning: "${q}"
Lykilatriði í réttu svari: ${key.join(', ')}
Gefðu stig 0–5. Hunsa smávægilegar málfræðivillur og stafsetningu.
Svaraðu EINUNGIS:
STIG: [0-5]
ENDURGJÖF: [ein setning á íslensku, vinaleg]`;
        const res = await callOpenAI([{role:'system',content:sys},{role:'user',content:ans}], 80, 0.2);
        const score = parseInt((res.match(/STIG:\s*(\d)/)||[])[1]||0);
        const msg   = (res.match(/ENDURGJÖF:\s*(.+)/)||[])[1]?.trim() || res.trim();
        setShortFb(p => { const n=[...p]; n[idx]={score,msg}; return n; });
      } catch(e) { console.error(e); }
      finally { setShortLd(p => { const n=[...p]; n[idx]=false; return n; }); }
    };
    const resetShort = idx => {
      setShortAns(p => { const n=[...p]; n[idx]=''; return n; });
      setShortFb(p =>  { const n=[...p]; n[idx]=null; return n; });
    };
    /* Tímaröð */
    const [rodDone, setRodDone] = useState(false);
    /* Þýðingar */
    const [transAns, setTransAns] = useState(TRANSLATIONS.map(() => ''));
    const [transFb,  setTransFb]  = useState(TRANSLATIONS.map(() => null));
    const [transLd,  setTransLd]  = useState(TRANSLATIONS.map(() => false));
    const checkTrans = async idx => {
      const ans = transAns[idx].trim();
      if (!ans) return;
      setTransLd(p => { const n=[...p]; n[idx]=true; return n; });
      try {
        const { word, en } = TRANSLATIONS[idx];
        const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda á íslenskum orðum.
Íslenska orðið: "${word}"
Merking á ensku (viðmiðun): "${en}"
Nemandinn þýðir orðið yfir á sitt eigið móðurmál — það getur verið hvaða tungumál sem er (danska, pólska, spænska, tagalog, tælenska o.s.frv.).
Berðu svar nemandans saman við ensku viðmiðunina hér að ofan: ef það hefur sömu merkingu (á hvaða tungumáli sem er) er svarið RÉTT. Ekki gera ráð fyrir tilteknu tungumáli og ekki hafna réttri merkingu þótt hún sé á öðru máli en þú áttir von á.
Svaraðu EINUNGIS:
STIG: [5 ef rétt, 1 ef rangt]
ENDURGJÖF: [ein setning á íslensku, vinaleg — nefndu rétta merkingu ef svarið er rangt]`;
        const res = await callOpenAI([{role:'system',content:sys},{role:'user',content:ans}], 80, 0.2);
        const score = parseInt((res.match(/STIG:\s*(\d)/)||[])[1]||0);
        const msg   = (res.match(/ENDURGJÖF:\s*(.+)/)||[])[1]?.trim() || res.trim();
        setTransFb(p => { const n=[...p]; n[idx]={score,msg}; return n; });
      } catch(e) { console.error(e); }
      finally { setTransLd(p => { const n=[...p]; n[idx]=false; return n; }); }
    };
    const resetTrans = idx => {
      setTransAns(p => { const n=[...p]; n[idx]=''; return n; });
      setTransFb(p =>  { const n=[...p]; n[idx]=null; return n; });
    };
    /* Framvinda */
    const tabDone = {
      tf:    tfDone,
      short: shortFb.every(f => f !== null),
      rod:   rodDone,
      trans: transFb.every(f => f !== null),
    };
    const allDone = TABS.every(t => tabDone[t.id]);
    /* ── RENDER ──────────────────────────────────────────────────── */
    return (
      <div style={{ minHeight: '100vh' }}>
        {/* HEADER */}
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <button onClick={() => window.history.back()}
              className="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block font-light">
              ← Til baka
            </button>
            <div className="flex items-center gap-4">
              {/* Titill + persónumyndir */}
              <div className="flex-1">
                <h1 className="text-3xl font-light text-gray-800">🎧 {TITILL}</h1>
                <p className="text-gray-500 text-sm font-light mb-3">Hlustunarverkefni · {STIG} · Æfing {AEFING_NR}</p>
                <div className="flex items-center gap-5">
                  {PERSONUR.map(p => {
                    const speaking = activeSpeaker === p.nafn;
                    return (
                      <div key={p.id}
                        className={`flex flex-col items-center gap-1.5 transition-opacity duration-300
                          ${activeSpeaker && !speaking ? 'opacity-40' : 'opacity-100'}`}>
                        <img src={p.mynd} alt={p.mynd_alt}
                          className={`portrait ${speaking ? 'speaking' : ''}`}
                          onError={e => { e.target.style.display='none'; }} />
                        <span className={`text-xs ${speaking ? 'text-green-700 font-medium' : 'text-gray-600 font-light'}`}>
                          {p.nafn}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
              {/* Senumynd */}
              <img src={MYND_SRC} alt={MYND_ALT}
                className="rounded-2xl h-auto flex-shrink-0" style={{ width: '15%' }}
                onError={e => { e.target.style.display='none'; }} />
            </div>
          </div>
        </header>
        {/* STICKY PLAYER */}
        <div className="sticky-player">
          <div className="max-w-4xl mx-auto px-6 py-4">
            <div className="flex items-center gap-4">
              <button onClick={togglePlay}
                className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center
                  justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm">
                {isPlaying
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <rect x="6" y="4" width="4" height="16"/>
                      <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                }
              </button>
              <div className="flex-1">
                <p className="text-xs font-light text-gray-500 mb-1.5">
                  Hlustaðu á samtalið – má hlusta margsinnis
                </p>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400 font-light w-8 text-right">{fmt(currentTime)}</span>
                  <input type="range" min="0" max={duration||0} value={currentTime} step="0.1"
                    onChange={e => {
                      const t = parseFloat(e.target.value);
                      if (audioRef.current) { audioRef.current.currentTime = t; setCurrentTime(t); }
                    }}
                    className="progress-bar flex-1" />
                  <span className="text-xs text-gray-400 font-light w-8">{fmt(duration)}</span>
                </div>
                <audio ref={audioRef} src={AUDIO_SRC} preload="metadata"
                  onPlay={() => setIsPlaying(true)}
                  onPause={() => { setIsPlaying(false); setActiveSpeaker(null); }}
                  onEnded={() => { setIsPlaying(false); setActiveSpeaker(null); }}
                  onTimeUpdate={() => {
                    const t = audioRef.current?.currentTime || 0;
                    setCurrentTime(t);
                    let who = null;
                    for (let i = TIMING.length - 1; i >= 0; i--) {
                      if (t >= TIMING[i].start) { who = TIMING[i].who; break; }
                    }
                    setActiveSpeaker(who);
                  }}
                  onLoadedMetadata={() => setDuration(audioRef.current?.duration||0)} />
              </div>
              <div className="flex gap-1.5">
                {[0.75, 1, 1.25].map(r => (
                  <button key={r} onClick={() => setPlaybackRate(r)}
                    className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors
                      ${playbackRate===r ? 'bg-green-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
                    {r}×
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
        {/* MAIN */}
        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-24">
          {/* Leiðbeiningar */}
          <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
            <ul className="space-y-1 text-sm font-light text-green-900">
              <li>🎧 Hlustaðu á samtalið 2–3 sinnum</li>
              <li>✏️ Svaraðu öllum flokkum spurninga</li>
              <li>🔓 Þegar allt er lokið opnast samtalstextinn</li>
            </ul>
          </div>
          {/* Flipasvæði */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="bg-white border-b border-gray-200 sticky top-[73px] z-40"
              style={{ overflowX: 'auto', scrollbarWidth: 'none' }}>
              <div className="flex">
                {TABS.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`tab-btn flex items-center gap-1.5 px-4 py-3.5 text-sm font-light
                      text-gray-500 whitespace-nowrap border-b-2 border-transparent
                      ${activeTab===tab.id ? 'tab-active' : ''}`}>
                    <span>{tab.icon}</span>
                    <span>{tab.label}</span>
                    {tabDone[tab.id] && (
                      <span className="w-4 h-4 rounded-full bg-green-500 text-white text-xs
                        flex items-center justify-center ml-0.5">✓</span>
                    )}
                  </button>
                ))}
              </div>
            </div>
            <div className="p-6 fade-in" key={activeTab}>
              {/* ── RÉTT / RANGT ─────────────────────────────── */}
              {activeTab === 'tf' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-4">✅ Rétt eða rangt?</h2>
                  <div className="space-y-3">
                    {TRUE_FALSE.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-light text-gray-800 mb-3">{item.s}</p>
                        <div className="flex gap-2">
                          {[true, false].map(val => {
                            const sel = tfAns[idx] === val;
                            let cls = 'answer-option flex-1 py-2 rounded-lg text-sm font-light';
                            if (!tfDone) { if (sel) cls += ' opt-selected'; }
                            else {
                              cls += ' opt-disabled';
                              if (item.correct === val) cls += ' opt-correct';
                              else if (sel)             cls += ' opt-incorrect';
                            }
                            return (
                              <button key={String(val)}
                                onClick={() => { if (!tfDone) setTfAns(p => ({...p,[idx]:val})); }}
                                className={cls}>
                                {val ? 'Rétt ✓' : 'Rangt ✗'}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={() => { if (tfReady) setTfDone(true); }}
                      disabled={!tfReady || tfDone}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
                        disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                      Athuga svör
                    </button>
                    {tfDone && (
                      <button onClick={() => { setTfAns({}); setTfDone(false); }}
                        className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                          hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    )}
                  </div>
                </div>
              )}
              {/* ── SPURNINGAR ───────────────────────────────── */}
              {activeTab === 'short' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">📝 Spurningar</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">Svaraðu með einni setningu.</p>
                  <div className="space-y-4">
                    {SHORT_QS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-medium text-gray-800 mb-3">{item.q}</p>
                        <textarea
                          value={shortAns[idx]}
                          onChange={e => { if (!shortFb[idx]) { setShortAns(p => { const n=[...p]; n[idx]=e.target.value; return n; }); }}}
                          onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey && !shortFb[idx]) { e.preventDefault(); checkShort(idx); }}}
                          disabled={shortFb[idx] !== null}
                          placeholder="Skrifaðu svar hér…"
                          rows={2}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                            focus:outline-none focus:border-green-400 font-light text-sm resize-none
                            disabled:bg-gray-50 disabled:cursor-default transition-colors mb-3"
                        />
                        {shortFb[idx] === null && (
                          <button onClick={() => checkShort(idx)}
                            disabled={!shortAns[idx].trim() || shortLd[idx]}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLd[idx] ? '…' : 'Athuga'}
                          </button>
                        )}
                        {shortFb[idx] && (
                          <FeedbackBadge
                            score={shortFb[idx].score}
                            message={shortFb[idx].msg}
                            onRetry={shortFb[idx].score < 4 ? () => resetShort(idx) : null}
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* ── TÍMARÖÐ ──────────────────────────────────── */}
              {activeTab === 'rod' && (
                <TimarodTask items={TIMAROD} onDone={() => setRodDone(true)} />
              )}
              {/* ── ÞÝÐINGAR ─────────────────────────────────── */}
              {activeTab === 'trans' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">🌍 Þýðingar</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">Þýddu orðin á þitt eigið móðurmál.</p>
                  <div className="space-y-4">
                    {TRANSLATIONS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm text-gray-700 mb-3">
                          Þýddu á þitt móðurmál:{' '}
                          <strong className="text-gray-900 font-medium">{item.word}</strong>
                        </p>
                        <textarea
                          value={transAns[idx]}
                          onChange={e => { if (!transFb[idx]) { setTransAns(p => { const n=[...p]; n[idx]=e.target.value; return n; }); }}}
                          disabled={transFb[idx] !== null}
                          placeholder="Skrifaðu þýðinguna hér…"
                          rows={2}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                            focus:outline-none focus:border-green-400 font-light resize-none
                            disabled:bg-gray-50 text-sm mb-3"
                        />
                        {transFb[idx] === null && (
                          <button onClick={() => checkTrans(idx)}
                            disabled={!transAns[idx].trim() || transLd[idx]}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {transLd[idx] ? 'Athuga...' : 'Athuga þýðingu'}
                          </button>
                        )}
                        {transFb[idx] && (
                          <FeedbackBadge
                            score={transFb[idx].score}
                            message={transFb[idx].msg}
                            onRetry={transFb[idx].score < 4 ? () => resetTrans(idx) : null}
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
          {/* Lokakassi — opnast þegar öllu er lokið */}
          {allDone && (
            <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
              <p className="text-green-700 font-light text-sm mb-4">
                Þú hefur lokið öllum verkefnum. Nú getur þú lesið samtalið.
              </p>
              <button onClick={() => setShowText(v => !v)}
                className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                  transition-colors font-light text-sm">
                {showText ? '▲ Fela samtalið' : '📖 Lesa samtalið'}
              </button>
              {showText && (
                <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                  <h3 className="font-light text-gray-500 mb-4 text-sm">💬 Samtalið – {TITILL}</h3>
                  {SAMTALS.map((line, i) => {
                    const c = WHO[line.who] || { bg: 'bg-gray-50', tag: 'bg-gray-100 text-gray-700', mynd: null, init: line.who[0] };
                    return (
                      <div key={i} className="flex gap-3 mb-4">
                        <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center
                          justify-center text-xs font-medium overflow-hidden ${c.tag}`}>
                          {c.mynd
                            ? <img src={c.mynd} alt={line.who} className="portrait-sm" />
                            : c.init
                          }
                        </div>
                        <div className={`max-w-lg px-4 py-3 rounded-xl text-sm font-light ${c.bg} text-gray-800`}>
                          <span className="block text-xs text-gray-400 mb-1">{line.who}</span>
                          {line.text}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </main>
        {/* Framvinduraki — föst taka neðst */}
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                  ${tabDone[tab.id]
                    ? 'bg-green-600 text-white'
                    : activeTab===tab.id
                      ? 'bg-gray-200 text-gray-700'
                      : 'bg-gray-100 text-gray-500'}`}>
                {tabDone[tab.id] ? '✓ ' : ''}{tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
