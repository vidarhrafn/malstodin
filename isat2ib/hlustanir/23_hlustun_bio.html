<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Æfing 23: Bíó – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player { position: sticky; top: 0; z-index: 50; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08); }
    .progress-bar { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: #d1d5db; outline: none; cursor: pointer; }
    .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #16a34a; cursor: pointer; }
    .progress-bar::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #16a34a; cursor: pointer; border: none; }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.tab-active):hover { background: #f3f4f6; }
    .tab-btn.tab-active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.tab-active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: #2563eb; border-radius: 2px 2px 0 0; }
    .answer-option { border: 2px solid #e5e7eb; transition: all 0.2s; cursor: pointer; text-align: center; }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .answer-option.opt-disabled  { cursor: default; }
    .portrait { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; object-position: top center; border: 2px solid #e5e7eb; transition: border-color 0.2s; }
    .portrait.speaking { border-color: #16a34a; animation: speakingPulse 1.1s ease-in-out infinite; }
    @keyframes speakingPulse { 0%, 100% { box-shadow: 0 0 0 3px rgba(22,163,74,0.35); } 50% { box-shadow: 0 0 0 8px rgba(22,163,74,0.10); } }
    .portrait-sm { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; object-position: top center; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;
  async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }
  /* ══════════ GÖGN — ÆFING 23 ══════════ */
  const AEFING_NR = "23";
  const TITILL    = "Bíó";
  const STIG      = "A2–B1";
  const AUDIO_SRC = "../media/aef23-bio.mp3";
  const MYND_SRC  = "../media/aef23-bio.png";
  const MYND_ALT  = "Andri, Vera, Mateo og Sara velja bíómynd";
  const PERSONUR = [
    { id:'andri', nafn:'Andri', mynd:'../media/andri_haus.png', mynd_alt:'Andri' },
    { id:'vera',  nafn:'Vera',  mynd:'../media/vera_haus.jpg',  mynd_alt:'Vera'  },
    { id:'mateo', nafn:'Mateo', mynd:'../media/mateo_haus.png', mynd_alt:'Mateo' },
    { id:'sara',  nafn:'Sara',  mynd:'../media/aef23_sara.png', mynd_alt:'Sara'  },
  ];
  const SAMTALS = [
    { who:'Andri', text:'Allt í lagi, hvað eigum við að sjá? Ég er til í góða hasarmynd.' },
    { who:'Vera',  text:'Bíddu, ég er að skoða. Það eru þrjár myndir sem byrja á réttum tíma. Ný spænsk gamanmynd, hryllingsmynd með Kate Winslet, og ný mynd frá Kóreu.' },
    { who:'Andri', text:'Hryllingsmyndin. Klárlega!' },
    { who:'Sara',  text:'Er það samt? Ég nenni því eiginlega ekki. Ég er bara ekki til í hryllingsmynd. Ég er meira til í eitthvað skemmtilegt.' },
    { who:'Mateo', text:'Já, ég er sammála ... spænska myndin hljómar reyndar mjög vel.' },
    { who:'Andri', text:'Ó já? Spænska myndin. Auðvitað. Kemur á óvart!' },
    { who:'Mateo', text:'Já... spænskar myndir eru alltaf góðar.' },
    { who:'Andri', text:'Já right!' },
    { who:'Vera',  text:'Andri. Hættu.' },
    { who:'Sara',  text:'Hún lítur reyndar ágætlega út. Ég sá auglýsinguna.' },
    { who:'Mateo', text:'Sjáðu! Sara er sammála mér.' },
    { who:'Andri', text:'Ég sé það. Við tókum öll eftir því.' },
    { who:'Sara',  text:'Hvað með kóresku myndina? Ég hef heyrt að hún gæti fengið Óskarsverðlaun.' },
    { who:'Andri', text:'Drama? Ég nenni því bara alls ekki.' },
    { who:'Vera',  text:'Ég meika heldur ekki að vera skíthrædd í tvo tíma!' },
    { who:'Andri', text:'Já ókei. Eru allir á móti mér?' },
    { who:'Vera',  text:'Allt í lagi. Við erum búin að tala um þetta allt of lengi. Spænska gamanmyndin, er einhver á móti?' },
    { who:'Andri', text:'Ég vil frekar hryllingsmyndina, en... ég skal gefa gamanmyndinni séns.' },
    { who:'Vera',  text:'Frábært. Við getum valið þína mynd næst Andri.' },
    { who:'Andri', text:'Ég hef alveg heyrt það áður sko.' },
    { who:'Sara',  text:'Ég er alveg til. Ég er til í eitthvað nýtt.' },
    { who:'Mateo', text:'Já. Mér líst mjög vel á þetta.' },
    { who:'Andri', text:'Já já, við vitum það Mateo.' },
  ];
  const WHO = {
    Andri: { bg:'bg-blue-50',   tag:'bg-blue-100 text-blue-700',     mynd:'../media/andri_haus.png', init:'A' },
    Vera:  { bg:'bg-rose-50',   tag:'bg-rose-100 text-rose-700',     mynd:'../media/vera_haus.jpg',  init:'V' },
    Mateo: { bg:'bg-amber-50',  tag:'bg-amber-100 text-amber-700',   mynd:'../media/mateo_haus.png', init:'M' },
    Sara:  { bg:'bg-purple-50', tag:'bg-purple-100 text-purple-700', mynd:'../media/aef23_sara.png', init:'S' },
  };
  // TÍMAKORT — sjálfvirkt úr aef23-bio.mp3 (ffmpeg silencedetect + DP-mátun við textalengd)
  const TIMING = [
    { who: 'Andri', start: 0.00, end: 3.74 },
    { who: 'Vera', start: 3.79, end: 15.84 },
    { who: 'Andri', start: 15.89, end: 18.09 },
    { who: 'Sara', start: 18.14, end: 27.29 },
    { who: 'Mateo', start: 27.34, end: 31.77 },
    { who: 'Andri', start: 31.82, end: 36.60 },
    { who: 'Mateo', start: 36.65, end: 40.01 },
    { who: 'Andri', start: 40.06, end: 41.50 },
    { who: 'Vera', start: 41.55, end: 43.30 },
    { who: 'Sara', start: 43.35, end: 46.85 },
    { who: 'Mateo', start: 46.90, end: 49.30 },
    { who: 'Andri', start: 49.35, end: 52.18 },
    { who: 'Sara', start: 52.23, end: 57.22 },
    { who: 'Andri', start: 57.27, end: 60.49 },
    { who: 'Vera', start: 60.54, end: 64.57 },
    { who: 'Andri', start: 64.62, end: 67.77 },
    { who: 'Vera', start: 67.82, end: 74.05 },
    { who: 'Andri', start: 74.10, end: 79.37 },
    { who: 'Vera', start: 79.42, end: 83.64 },
    { who: 'Andri', start: 83.69, end: 85.98 },
    { who: 'Sara', start: 86.03, end: 89.19 },
    { who: 'Mateo', start: 89.24, end: 92.12 },
    { who: 'Andri', start: 92.17, end: 94.30 },
  ];
  // 1. RÉTT EÐA RANGT
  const TRUE_FALSE = [
    { s:'Það eru þrjár myndir í boði.',              correct:true  },
    { s:'Andri vill sjá gamanmynd.',                 correct:false },
    { s:'Sara er ekki til í hryllingsmynd.',         correct:true  },
    { s:'Mateo vill sjá spænsku myndina.',           correct:true  },
    { s:'Þau velja kóresku myndina að lokum.',       correct:false },
    { s:'Andri gefur gamanmyndinni séns.',           correct:true  },
  ];
  // 2. HVER SEGIR HVAÐ?
  const NAMES = ['Andri','Vera','Mateo','Sara'];
  const WHO_SAID = [
    { quote:'Hryllingsmyndin. Klárlega!',                        who:'Andri' },
    { quote:'Spænskar myndir eru alltaf góðar.',                 who:'Mateo' },
    { quote:'Ég meika heldur ekki að vera skíthrædd í tvo tíma!',who:'Vera'  },
    { quote:'Hún lítur reyndar ágætlega út. Ég sá auglýsinguna.',who:'Sara'  },
    { quote:'Við getum valið þína mynd næst.',                   who:'Vera'  },
  ];
  // 3. ORÐASAMBÖND — fjölval
  const ORDATAK = [
    { q:'Hvað þýðir „að gefa einhverju séns“?',
      opts:['Að kaupa miða','Að prófa eitthvað þó maður sé ekki viss','Að vera mjög spenntur fyrir einhverju'], correct:1 },
    { q:'Hvað þýðir „kemur á óvart“?',
      opts:['Eitthvað er óvænt eða furðulegt','Eitthvað er mjög gott','Eitthvað er leiðinlegt'], correct:0 },
    { q:'Hvað þýðir „auglýsing“ hérna?',
      opts:['Stutt myndband sem sýnir brot úr bíómynd','Aðalpersónan í myndinni','Sæti fremst í bíósalnum'], correct:0 },
  ];
  // 4. ÞÝÐINGARVERKEFNI — 'en' er ensk viðmiðunarmerking fyrir AI-matið
  const TRANSLATIONS = [
    { word:'gamanmynd', en:'a comedy / a comedy film' },
    { word:'sammála',   en:'in agreement / to agree with someone' },
  ];
  const NU_GET_EG = [
    'skilið þegar vinir ræða hvaða bíómynd þau vilja sjá.',
    'skilið og þekki nöfn á algengum tegundum kvikmynda á íslensku (gamanmynd, hryllingsmynd, drama, hasarmynd).',
    'skilið þegar fólk segir hvað því finnst um mismunandi tegundir af myndum.',
    'skilið þegar einhver er ósammála og útskýrir af hverju.',
    'skilið þegar hópur reynir að komast að sameiginlegri niðurstöðu.',
  ];
  const TABS = [
    { id:'tf',    label:'Rétt/Rangt',       icon:'✅' },
    { id:'who',   label:'Hver segir hvað?', icon:'🗣️' },
    { id:'ordas', label:'Orðasambönd',      icon:'💬' },
    { id:'trans', label:'Þýðingar',         icon:'🌍' },
  ];
  const FeedbackBadge = ({ score, message, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
    const cls = { green:'bg-green-50 border-green-200 text-green-700', amber:'bg-amber-50 border-amber-200 text-amber-700', red:'bg-red-50 border-red-200 text-red-700' }[color];
    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {onRetry && (<button onClick={onRetry} className="text-xs underline mt-2 opacity-70 block">Reyna aftur</button>)}
      </div>
    );
  };
  const App = () => {
    const audioRef = useRef(null);
    const [isPlaying, setIsPlaying] = useState(false);
    const [playbackRate, setPlaybackRate] = useState(1);
    const [currentTime, setCurrentTime] = useState(0);
    const [duration, setDuration] = useState(0);
    const [activeTab, setActiveTab] = useState('tf');
    const [showText, setShowText] = useState(false);
    const [activeSpeaker, setActiveSpeaker] = useState(null);
    useEffect(() => { if (audioRef.current) audioRef.current.playbackRate = playbackRate; }, [playbackRate]);
    const fmt = sec => { if (!sec || isNaN(sec)) return '0:00'; return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`; };
    const togglePlay = () => { if (!audioRef.current) return; isPlaying ? audioRef.current.pause() : audioRef.current.play(); };
    /* Rétt/Rangt */
    const [tfAns, setTfAns] = useState({});
    const [tfDone, setTfDone] = useState(false);
    const tfReady = TRUE_FALSE.every((_, i) => tfAns[i] !== undefined);
    /* Hver segir hvað */
    const [whoAns, setWhoAns] = useState(WHO_SAID.map(() => null));
    const [whoDone, setWhoDone] = useState(false);
    const whoReady = WHO_SAID.every((_, i) => whoAns[i] !== null);
    const setWho = (qi, name) => { if (!whoDone) setWhoAns(p => { const n=[...p]; n[qi]=name; return n; }); };
    /* Orðasambönd */
    const [ordasAns, setOrdasAns] = useState(ORDATAK.map(() => null));
    const [ordasDone, setOrdasDone] = useState(false);
    const ordasReady = ORDATAK.every((_, i) => ordasAns[i] !== null);
    const setOrdas = (qi, oi) => { if (!ordasDone) setOrdasAns(p => { const n=[...p]; n[qi]=oi; return n; }); };
    /* Þýðingar */
    const [transAns, setTransAns] = useState(TRANSLATIONS.map(() => ''));
    const [transFb, setTransFb] = useState(TRANSLATIONS.map(() => null));
    const [transLd, setTransLd] = useState(TRANSLATIONS.map(() => false));
    const matchesRef = (ans, en) => {
      const norm = s => s.toLowerCase().replace(/[.,!?;:"'`()\/]/g,' ').replace(/\b(to|a|an|the|of|be|is|are|being|som|að)\b/g,' ').replace(/\s+/g,' ').trim();
      const a = norm(ans); if (!a) return false;
      return en.split('/').map(norm).some(v => v && (a === v || (a.length >= 4 && (a.includes(v) || v.includes(a)))));
    };
    const checkTrans = async idx => {
      const ans = transAns[idx].trim(); if (!ans) return;
      const { word, en } = TRANSLATIONS[idx];
      if (matchesRef(ans, en)) { setTransFb(p => { const n=[...p]; n[idx]={score:5,msg:'Rétt! Það passar við merkinguna.'}; return n; }); return; }
      setTransLd(p => { const n=[...p]; n[idx]=true; return n; });
      try {
        const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda á íslenskum orðum. Vertu ÖRLÁTUR — markmiðið er að nemandinn skilji orðið, ekki að þýðingin sé fullkomin.
Íslenska orðið: "${word}"
Rétt merking (enska viðmiðun): "${en}"
Nemandinn þýðir orðið yfir á sitt eigið móðurmál — það getur verið HVAÐA tungumál sem er (enska, danska, pólska, spænska, tagalog, tælenska o.s.frv.).
Reglur:
- Ef svarið er á ENSKU og samsvarar ensku viðmiðuninni að ofan (eða hluta hennar) þá er það RÉTT (STIG 5).
- Ef svarið er á öðru tungumáli og hefur sömu merkingu og viðmiðunin þá er það RÉTT (STIG 5).
- Samheiti, óformlegt orðalag og smávægileg frávik teljast RÉTT.
- Aðeins ef merkingin er röng eða óskyld gefðu STIG 1.
Svaraðu EINUNGIS:
STIG: [5 ef rétt, 1 ef rangt]
ENDURGJÖF: [ein setning á íslensku, vinaleg — nefndu rétta merkingu ef svarið er rangt]`;
        const res = await callOpenAI([{role:'system',content:sys},{role:'user',content:ans}], 80, 0.2);
        const score = parseInt((res.match(/STIG:\s*(\d)/)||[])[1]||0);
        const msg   = (res.match(/ENDURGJÖF:\s*(.+)/)||[])[1]?.trim() || res.trim();
        setTransFb(p => { const n=[...p]; n[idx]={score,msg}; return n; });
      } catch(e) { console.error(e); }
      finally { setTransLd(p => { const n=[...p]; n[idx]=false; return n; }); }
    };
    const resetTrans = idx => { setTransAns(p => { const n=[...p]; n[idx]=''; return n; }); setTransFb(p => { const n=[...p]; n[idx]=null; return n; }); };
    /* Framvinda */
    const tabDone = { tf:tfDone, who:whoDone, ordas:ordasDone, trans:transFb.every(f => f !== null) };
    const allDone = TABS.every(t => tabDone[t.id]);
    return (
      <div style={{ minHeight: '100vh' }}>
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block font-light">← Til baka</button>
            <div className="flex items-center gap-4">
              <div className="flex-1">
                <h1 className="text-3xl font-light text-gray-800">🎧 {TITILL}</h1>
                <p className="text-gray-500 text-sm font-light mb-3">Hlustunarverkefni · {STIG} · Æfing {AEFING_NR}</p>
                <div className="flex items-center gap-5">
                  {PERSONUR.map(p => {
                    const speaking = activeSpeaker === p.nafn;
                    return (
                      <div key={p.id} className={`flex flex-col items-center gap-1.5 transition-opacity duration-300 ${activeSpeaker && !speaking ? 'opacity-40' : 'opacity-100'}`}>
                        <img src={p.mynd} alt={p.mynd_alt} className={`portrait ${speaking ? 'speaking' : ''}`} onError={e => { e.target.style.display='none'; }} />
                        <span className={`text-xs ${speaking ? 'text-green-700 font-medium' : 'text-gray-600 font-light'}`}>{p.nafn}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <img src={MYND_SRC} alt={MYND_ALT} className="rounded-2xl h-auto flex-shrink-0" style={{ width: '15%' }} onError={e => { e.target.style.display='none'; }} />
            </div>
          </div>
        </header>
        <div className="sticky-player">
          <div className="max-w-4xl mx-auto px-6 py-4">
            <div className="flex items-center gap-4">
              <button onClick={togglePlay} className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm">
                {isPlaying
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
              </button>
              <div className="flex-1">
                <p className="text-xs font-light text-gray-500 mb-1.5">Hlustaðu á samtalið – má hlusta margsinnis</p>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400 font-light w-8 text-right">{fmt(currentTime)}</span>
                  <input type="range" min="0" max={duration||0} value={currentTime} step="0.1"
                    onChange={e => { const t = parseFloat(e.target.value); if (audioRef.current) { audioRef.current.currentTime = t; setCurrentTime(t); } }}
                    className="progress-bar flex-1" />
                  <span className="text-xs text-gray-400 font-light w-8">{fmt(duration)}</span>
                </div>
                <audio ref={audioRef} src={AUDIO_SRC} preload="metadata"
                  onPlay={() => setIsPlaying(true)}
                  onPause={() => { setIsPlaying(false); setActiveSpeaker(null); }}
                  onEnded={() => { setIsPlaying(false); setActiveSpeaker(null); }}
                  onTimeUpdate={() => {
                    const t = audioRef.current?.currentTime || 0;
                    setCurrentTime(t);
                    let who = null;
                    for (let i = 0; i < TIMING.length; i++) { if (t < TIMING[i].end) { who = TIMING[i].who; break; } }
                    setActiveSpeaker(who);
                  }}
                  onLoadedMetadata={() => setDuration(audioRef.current?.duration||0)} />
              </div>
              <div className="flex gap-1.5">
                {[0.75, 1, 1.25].map(r => (
                  <button key={r} onClick={() => setPlaybackRate(r)} className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors ${playbackRate===r ? 'bg-green-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>{r}×</button>
                ))}
              </div>
            </div>
          </div>
        </div>
        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-24">
          <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
            <ul className="space-y-1 text-sm font-light text-green-900">
              <li>🎧 Hlustaðu á samtalið 2–3 sinnum</li>
              <li>✏️ Svaraðu öllum flokkum spurninga</li>
              <li>🔓 Þegar allt er lokið opnast samtalstextinn</li>
            </ul>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="bg-white border-b border-gray-200 sticky top-[73px] z-40" style={{ overflowX: 'auto', scrollbarWidth: 'none' }}>
              <div className="flex">
                {TABS.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`tab-btn flex items-center gap-1.5 px-4 py-3.5 text-sm font-light text-gray-500 whitespace-nowrap border-b-2 border-transparent ${activeTab===tab.id ? 'tab-active' : ''}`}>
                    <span>{tab.icon}</span><span>{tab.label}</span>
                    {tabDone[tab.id] && (<span className="w-4 h-4 rounded-full bg-green-500 text-white text-xs flex items-center justify-center ml-0.5">✓</span>)}
                  </button>
                ))}
              </div>
            </div>
            <div className="p-6 fade-in" key={activeTab}>
              {/* RÉTT / RANGT */}
              {activeTab === 'tf' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-4">✅ Rétt eða rangt?</h2>
                  <div className="space-y-3">
                    {TRUE_FALSE.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-light text-gray-800 mb-3">{item.s}</p>
                        <div className="flex gap-2">
                          {[true, false].map(val => {
                            const sel = tfAns[idx] === val;
                            let cls = 'answer-option flex-1 py-2 rounded-lg text-sm font-light';
                            if (!tfDone) { if (sel) cls += ' opt-selected'; }
                            else { cls += ' opt-disabled'; if (item.correct === val) cls += ' opt-correct'; else if (sel) cls += ' opt-incorrect'; }
                            return (<button key={String(val)} onClick={() => { if (!tfDone) setTfAns(p => ({...p,[idx]:val})); }} className={cls}>{val ? 'Rétt ✓' : 'Rangt ✗'}</button>);
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={() => { if (tfReady) setTfDone(true); }} disabled={!tfReady || tfDone} className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">Athuga svör</button>
                    {tfDone && (<button onClick={() => { setTfAns({}); setTfDone(false); }} className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">Endurstilla</button>)}
                  </div>
                </div>
              )}
              {/* HVER SEGIR HVAÐ */}
              {activeTab === 'who' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">🗣️ Hver segir hvað?</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">Veldu hver segir setninguna: Andri, Vera, Mateo eða Sara.</p>
                  <div className="space-y-4">
                    {WHO_SAID.map((item, qi) => (
                      <div key={qi} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-medium text-gray-800 mb-3">„{item.quote}“</p>
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                          {NAMES.map(name => {
                            const sel = whoAns[qi] === name;
                            let cls = 'answer-option py-2 rounded-lg text-sm font-light';
                            if (!whoDone) { if (sel) cls += ' opt-selected'; }
                            else { cls += ' opt-disabled'; if (item.who === name) cls += ' opt-correct'; else if (sel) cls += ' opt-incorrect'; }
                            return (<button key={name} onClick={() => setWho(qi, name)} className={cls}>{name}</button>);
                          })}
                        </div>
                        {whoDone && whoAns[qi] !== item.who && (<div className="text-xs text-green-700 mt-2 font-light">✓ Rétt svar: {item.who}</div>)}
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={() => { if (whoReady) setWhoDone(true); }} disabled={!whoReady || whoDone} className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">Athuga svör</button>
                    {whoDone && (<button onClick={() => { setWhoAns(WHO_SAID.map(() => null)); setWhoDone(false); }} className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">Endurstilla</button>)}
                  </div>
                </div>
              )}
              {/* ORÐASAMBÖND */}
              {activeTab === 'ordas' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">💬 Orðasambönd</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">Veldu réttu merkinguna.</p>
                  <div className="space-y-4">
                    {ORDATAK.map((item, qi) => (
                      <div key={qi} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-medium text-gray-800 mb-3">{item.q}</p>
                        <div className="space-y-2">
                          {item.opts.map((opt, oi) => {
                            const sel = ordasAns[qi] === oi;
                            let cls = 'answer-option w-full py-2.5 px-4 rounded-lg text-sm font-light text-left';
                            if (!ordasDone) { if (sel) cls += ' opt-selected'; }
                            else { cls += ' opt-disabled'; if (item.correct === oi) cls += ' opt-correct'; else if (sel) cls += ' opt-incorrect'; }
                            return (<button key={oi} onClick={() => setOrdas(qi, oi)} className={cls}>{opt}</button>);
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={() => { if (ordasReady) setOrdasDone(true); }} disabled={!ordasReady || ordasDone} className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">Athuga svör</button>
                    {ordasDone && (<button onClick={() => { setOrdasAns(ORDATAK.map(() => null)); setOrdasDone(false); }} className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">Endurstilla</button>)}
                  </div>
                </div>
              )}
              {/* ÞÝÐINGAR */}
              {activeTab === 'trans' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">🌍 Þýðingar</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">Þýddu orðin á þitt eigið móðurmál.</p>
                  <div className="space-y-4">
                    {TRANSLATIONS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm text-gray-700 mb-3">Þýddu á þitt móðurmál:{' '}<strong className="text-gray-900 font-medium">{item.word}</strong></p>
                        <textarea value={transAns[idx]}
                          onChange={e => { if (!transFb[idx]) { setTransAns(p => { const n=[...p]; n[idx]=e.target.value; return n; }); }}}
                          disabled={transFb[idx] !== null} placeholder="Skrifaðu þýðinguna hér…" rows={2}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light resize-none disabled:bg-gray-50 text-sm mb-3" />
                        {transFb[idx] === null && (
                          <button onClick={() => checkTrans(idx)} disabled={!transAns[idx].trim() || transLd[idx]} className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">{transLd[idx] ? 'Athuga...' : 'Athuga þýðingu'}</button>
                        )}
                        {transFb[idx] && (<FeedbackBadge score={transFb[idx].score} message={transFb[idx].msg} onRetry={transFb[idx].score < 4 ? () => resetTrans(idx) : null} />)}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
          {allDone && (
            <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
              <p className="text-green-700 font-light text-sm mb-4">Þú hefur lokið öllum verkefnum. Nú getur þú lesið samtalið.</p>
              <button onClick={() => setShowText(v => !v)} className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">{showText ? '▲ Fela samtalið' : '📖 Lesa samtalið'}</button>
              {showText && (
                <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                  <h3 className="font-light text-gray-500 mb-4 text-sm">💬 Samtalið – {TITILL}</h3>
                  {SAMTALS.map((line, i) => {
                    const c = WHO[line.who] || { bg:'bg-gray-50', tag:'bg-gray-100 text-gray-700', mynd:null, init:line.who[0] };
                    return (
                      <div key={i} className="flex gap-3 mb-4">
                        <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium overflow-hidden ${c.tag}`}>
                          {c.mynd ? <img src={c.mynd} alt={line.who} className="portrait-sm" onError={e => { e.target.style.display='none'; }} /> : c.init}
                        </div>
                        <div className={`max-w-lg px-4 py-3 rounded-xl text-sm font-light ${c.bg} text-gray-800`}>
                          <span className="block text-xs text-gray-400 mb-1">{line.who}</span>{line.text}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100">
                <h3 className="font-light text-gray-500 mb-3 text-sm">🌟 Nú get ég…</h3>
                <ul className="space-y-2">
                  {NU_GET_EG.map((g, i) => (<li key={i} className="flex gap-2 text-sm font-light text-gray-700"><span className="text-green-600">✓</span>{g}</li>))}
                </ul>
              </div>
            </div>
          )}
        </main>
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors ${tabDone[tab.id] ? 'bg-green-600 text-white' : activeTab===tab.id ? 'bg-gray-200 text-gray-700' : 'bg-gray-100 text-gray-500'}`}>{tabDone[tab.id] ? '✓ ' : ''}{tab.label}</button>
            ))}
          </div>
        </div>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
