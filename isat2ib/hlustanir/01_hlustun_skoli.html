<!DOCTYPE html>
<html lang="is">
<head>


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Æfing 1: Kynning í skólanum – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    .progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #d1d5db;
      outline: none;
      cursor: pointer;
    }
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #16a34a;
      cursor: pointer;
    }
    .progress-bar::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #16a34a;
      cursor: pointer;
      border: none;
    }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.tab-active):hover { background: #f3f4f6; }
    .tab-btn.tab-active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.tab-active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected  { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .answer-option.opt-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .answer-option.opt-disabled  { cursor: default; }
    select.drop {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.875rem;
      font-weight: 300;
      background: white;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      min-width: 170px;
    }
    select.drop:focus { border-color: #60a5fa; }
    select.drop.drop-correct   { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    select.drop.drop-incorrect { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .portrait {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid #e5e7eb;
    }
    .portrait-sm {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>



<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  /* ── OpenAI ──────────────────────────────────────────────────────── */
  async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }

  /* ── Gögn ────────────────────────────────────────────────────────── */
  const TRUE_FALSE = [
    { s: 'Lía er nítján ára gömul.',                correct: true  },
    { s: 'Mateo býr í Kópavogi.',                   correct: true  },
    { s: 'Lía ætlar að verða sjúkraliði.',          correct: true  },
    { s: 'Mateo spilar fótbolta með Breiðabliki.',  correct: true  },
    { s: 'Lía kom til Íslands fyrir fimm árum.',    correct: false },
    { s: 'Mateo ætlar að verða læknir.',            correct: false },
    { s: 'Mateo býr með pabba sínum.',              correct: false },
    { s: 'Lía elskar að teikna og synda.',          correct: false },
  ];

  const SHORT_QS = [
    { q: 'Hvað heitir stelpan og hversu gömul er hún?',
      key: ['Lía', 'Wang', 'nítján', '19'] },
    { q: 'Hvar býr Lía og með hverjum?',
      key: ['Breiðholti', 'mömmu', 'móður'] },
    { q: 'Hvað ætlar Lía að verða?',
      key: ['sjúkraliði'] },
    { q: 'Hvaðan kemur Mateo og hvenær flutti hann til Íslands?',
      key: ['Kólumbíu', 'Kólumbía', 'ári', 'rúmu ári'] },
    { q: 'Hvað gerir Mateo í frítíma sínum?',
      key: ['fótbolta', 'tónlist', 'reggaetón', 'Breiðabliki'] },
    { q: 'Hvaða áhugamál á Lía?',
      key: ['teikna', 'manga', 'baka', 'kökur'] },
    { q: 'Hvar er Mateo á námi?',
      key: ['Tækniskólanum', 'íslenskubraut'] },
  ];

  const TABLE_ROWS = [
    {
      col: 'Aldur',
      liaCorrect: 'nítján ára',
      mateoCorrect: 'átján ára',
      opts: ['nítján ára', 'átján ára', 'sautján ára', 'tuttugu ára'],
    },
    {
      col: 'Býr í',
      liaCorrect: 'Breiðholti',
      mateoCorrect: 'Kópavogi',
      opts: ['Breiðholti', 'Kópavogi', 'Hafnarfirði', 'Garðabæ'],
    },
    {
      col: 'Ætlar að verða',
      liaCorrect: 'sjúkraliði',
      mateoCorrect: 'vélvirki',
      opts: ['sjúkraliði', 'vélvirki', 'læknir', 'tölvunarfræðingur'],
    },
    {
      col: 'Áhugamál',
      liaCorrect: 'teikna manga og baka',
      mateoCorrect: 'fótbolti og tónlist',
      opts: ['teikna manga og baka', 'fótbolti og tónlist', 'synda og lesa', 'elda og hlusta'],
    },
  ];

  const TRANSLATIONS = [
    { word: 'sjúkraliði' },
    { word: 'vélvirki' },
  ];

  const SAMTALS = [
    { who: 'Kennari', text: 'Jæja, við skulum byrja á einfaldri kynningu. Lía, getur þú byrjað?' },
    { who: 'Lía',     text: 'Já. Ég heiti Lía Wang. Ég er nítján ára gömul. Ég bý í Breiðholti með mömmu minni. Ég er á íslenskubraut í Tækniskólanum. Ég ætla að verða sjúkraliði. Ég kem frá Kína. Ég kom til Íslands fyrir þremur árum. Ég elska að teikna manga og að baka kökur.' },
    { who: 'Kennari', text: 'Takk, Lía. Mateo?' },
    { who: 'Mateo',   text: 'Ég heiti Mateo Ramírez. Ég er átján ára. Ég bý í Kópavogi með mömmu minni og litla bróður mínum. Ég er líka á íslenskubraut. Ég vil verða vélvirki. Ég kem frá Kólumbíu og flutti til Íslands fyrir rúmu ári. Ég spila fótbolta með Breiðabliki og hlusta mikið á tónlist, sérstaklega reggaetón.' },
  ];

  const WHO = {
    Kennari: { bg: 'bg-purple-50', tag: 'bg-purple-100 text-purple-700', init: 'K' },
    Lía:     { bg: 'bg-blue-50',   tag: 'bg-blue-100 text-blue-700',     init: 'L' },
    Mateo:   { bg: 'bg-amber-50',  tag: 'bg-amber-100 text-amber-700',   init: 'M' },
  };

  const TABS = [
    { id: 'tf',    label: 'Rétt/Rangt', icon: '✅' },
    { id: 'short', label: 'Spurningar', icon: '📝' },
    { id: 'table', label: 'Tafla',      icon: '📋' },
    { id: 'trans', label: 'Þýðingar',   icon: '🌍' },
  ];

  /* ── FeedbackBadge ───────────────────────────────────────────────── */
  const FeedbackBadge = ({ score, message, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
    const cls = {
      green: 'bg-green-50 border-green-200 text-green-700',
      amber: 'bg-amber-50 border-amber-200 text-amber-700',
      red:   'bg-red-50 border-red-200 text-red-700',
    }[color];
    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${cls}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {onRetry && (
          <button onClick={onRetry} className="text-xs underline mt-2 opacity-70 block">
            Reyna aftur
          </button>
        )}
      </div>
    );
  };

  /* ── App ─────────────────────────────────────────────────────────── */
  const App = () => {
    const audioRef = useRef(null);
    const [isPlaying,    setIsPlaying]    = useState(false);
    const [playbackRate, setPlaybackRate] = useState(1);
    const [currentTime,  setCurrentTime]  = useState(0);
    const [duration,     setDuration]     = useState(0);
    const [activeTab,    setActiveTab]    = useState('tf');
    const [showText,     setShowText]     = useState(false);

    useEffect(() => {
      if (audioRef.current) audioRef.current.playbackRate = playbackRate;
    }, [playbackRate]);

    useEffect(() => {
      window.writeProgress && window.writeProgress('hlustun_01', 'opened');
    }, []);

    const fmt = sec => {
      if (!sec || isNaN(sec)) return '0:00';
      return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`;
    };

    const togglePlay = () => {
      if (!audioRef.current) return;
      isPlaying ? audioRef.current.pause() : audioRef.current.play();
    };

    /* Rétt/Rangt */
    const [tfAns, setTfAns] = useState({});
    const [tfDone, setTfDone] = useState(false);
    const tfReady = TRUE_FALSE.every((_, i) => tfAns[i] !== undefined);

    /* Spurningar */
    const [shortAns, setShortAns]   = useState(SHORT_QS.map(() => ''));
    const [shortFb,  setShortFb]    = useState(SHORT_QS.map(() => null));
    const [shortLd,  setShortLd]    = useState(SHORT_QS.map(() => false));

    const checkShort = async idx => {
      const ans = shortAns[idx].trim();
      if (!ans) return;
      setShortLd(p => { const n=[...p]; n[idx]=true; return n; });
      try {
        const { q, key } = SHORT_QS[idx];
        const sys = `Þú ert íslenskukennari. Nemandinn svarar A1–A2 stigs hlustunarspurningu.
Spurning: "${q}"
Lykilatriði í réttu svari: ${key.join(', ')}
Gefðu stig 0–5. Hunsa smávægilegar málfræðivillur og stafsetningu.
Svaraðu EINUNGIS:
STIG: [0-5]
ENDURGJÖF: [ein setning á íslensku, vinaleg]`;
        const res = await callOpenAI([{role:'system',content:sys},{role:'user',content:ans}], 80, 0.2);
        const score = parseInt((res.match(/STIG:\s*(\d)/)||[])[1]||0);
        const msg   = (res.match(/ENDURGJÖF:\s*(.+)/)||[])[1]?.trim() || res.trim();
        setShortFb(p => { const n=[...p]; n[idx]={score,msg}; return n; });
      } catch(e) { console.error(e); }
      finally { setShortLd(p => { const n=[...p]; n[idx]=false; return n; }); }
    };

    const resetShort = idx => {
      setShortAns(p => { const n=[...p]; n[idx]=''; return n; });
      setShortFb(p => { const n=[...p]; n[idx]=null; return n; });
    };

    /* Tafla */
    const [tableAns, setTableAns] = useState(TABLE_ROWS.map(() => ({ lia: '', mateo: '' })));
    const [tableDone, setTableDone] = useState(false);
    const tableReady = TABLE_ROWS.every((_, i) => tableAns[i].lia && tableAns[i].mateo);

    const setCell = (ri, who, val) => {
      if (tableDone) return;
      setTableAns(p => { const n=[...p]; n[ri]={...n[ri],[who]:val}; return n; });
    };

    /* Þýðingar */
    const [transAns, setTransAns] = useState(TRANSLATIONS.map(() => ''));
    const [transFb,  setTransFb]  = useState(TRANSLATIONS.map(() => null));
    const [transLd,  setTransLd]  = useState(TRANSLATIONS.map(() => false));

    const checkTrans = async idx => {
      const ans = transAns[idx].trim();
      if (!ans) return;
      setTransLd(p => { const n=[...p]; n[idx]=true; return n; });
      try {
        const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.
Íslenska orðið: "${TRANSLATIONS[idx].word}"
Svar nemanda: "${ans}"
Athugaðu hvort þýðingin sé rétt á hvaða tungumáli sem er.
Svaraðu EINUNGIS:
STIG: [5 ef rétt, 1 ef rangt]
ENDURGJÖF: [ein setning á íslensku, vinaleg]`;
        const res = await callOpenAI([{role:'system',content:sys},{role:'user',content:ans}], 80, 0.2);
        const score = parseInt((res.match(/STIG:\s*(\d)/)||[])[1]||0);
        const msg   = (res.match(/ENDURGJÖF:\s*(.+)/)||[])[1]?.trim() || res.trim();
        setTransFb(p => { const n=[...p]; n[idx]={score,msg}; return n; });
      } catch(e) { console.error(e); }
      finally { setTransLd(p => { const n=[...p]; n[idx]=false; return n; }); }
    };

    const resetTrans = idx => {
      setTransAns(p => { const n=[...p]; n[idx]=''; return n; });
      setTransFb(p => { const n=[...p]; n[idx]=null; return n; });
    };

    /* Framvinda */
    const tabDone = {
      tf:    tfDone,
      short: shortFb.every(f => f !== null),
      table: tableDone,
      trans: transFb.every(f => f !== null),
    };
    const allDone = Object.values(tabDone).every(Boolean);
    const progressWritten = useRef(false);
    useEffect(() => {
      if (allDone && !progressWritten.current) {
        progressWritten.current = true;
        window.writeProgress && window.writeProgress('hlustun_01', 'completed');
      }
    }, [allDone]);

    /* ── RENDER ──────────────────────────────────────────────────── */
    return (
      <div style={{ minHeight: '100vh' }}>

        {/* HEADER */}
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <button onClick={() => window.history.back()}
              className="text-sm text-gray-500 hover:text-gray-700 mb-3 inline-block font-light">
              ← Til baka
            </button>
            <div className="flex items-center justify-between gap-4 flex-wrap">
              <div>
                <h1 className="text-3xl font-light text-gray-800">🎧 Kynning í skólanum</h1>
                <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2 · Æfing 1</p>
              </div>
            </div>

            {/* Senumynd */}
            <div className="mb-2">
              <img src="../media/01_hlustun_mynd.png" alt="Lía kynnir sig í skólanum"
                className="rounded-2xl h-auto" style={{ width: '30%' }} />
            </div>

            {/* Persónumyndir */}
            <div className="flex items-center gap-5 mt-3">
              <div className="flex flex-col items-center gap-1.5">
                <img src="../media/lia_haus.jpg" alt="Lía" className="portrait" />
                <span className="text-xs font-light text-gray-600">Lía</span>
              </div>
              <div className="flex flex-col items-center gap-1.5">
                <img src="../media/mateo_haus.png" alt="Mateo" className="portrait" />
                <span className="text-xs font-light text-gray-600">Mateo</span>
              </div>
            </div>
          </div>
        </header>

        {/* STICKY PLAYER */}
        <div className="sticky-player">
          <div className="max-w-4xl mx-auto px-6 py-4">
            <div className="flex items-center gap-4">
              <button onClick={togglePlay}
                className="bg-green-600 text-white w-11 h-11 rounded-full flex items-center
                  justify-center hover:bg-green-700 transition-colors flex-shrink-0 shadow-sm">
                {isPlaying
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <rect x="6" y="4" width="4" height="16"/>
                      <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                }
              </button>
              <div className="flex-1">
                <p className="text-xs font-light text-gray-500 mb-1.5">
                  Hlustaðu á samtalið – má hlusta margsinnis
                </p>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400 font-light w-8 text-right">{fmt(currentTime)}</span>
                  <input type="range" min="0" max={duration||0} value={currentTime} step="0.1"
                    onChange={e => {
                      const t = parseFloat(e.target.value);
                      if (audioRef.current) { audioRef.current.currentTime = t; setCurrentTime(t); }
                    }}
                    className="progress-bar flex-1" />
                  <span className="text-xs text-gray-400 font-light w-8">{fmt(duration)}</span>
                </div>
                <audio ref={audioRef} src="../media/01_hlustun_skoli.mp3" preload="metadata"
                  onPlay={() => setIsPlaying(true)}
                  onPause={() => setIsPlaying(false)}
                  onEnded={() => setIsPlaying(false)}
                  onTimeUpdate={() => setCurrentTime(audioRef.current?.currentTime||0)}
                  onLoadedMetadata={() => setDuration(audioRef.current?.duration||0)} />
              </div>
              <div className="flex gap-1.5">
                {[0.75, 1, 1.25].map(r => (
                  <button key={r} onClick={() => setPlaybackRate(r)}
                    className={`px-2.5 py-1 rounded-md text-xs font-light transition-colors
                      ${playbackRate===r ? 'bg-green-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
                    {r}×
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* MAIN */}
        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-24">

          {/* Leiðbeiningar */}
          <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
            <ul className="space-y-1 text-sm font-light text-green-900">
              <li>🎧 Hlustaðu á samtalið 2–3 sinnum</li>
              <li>✏️ Svaraðu öllum flokkum spurninga</li>
              <li>🔓 Þegar allt er lokið opnast textinn</li>
            </ul>
          </div>

          {/* Flipasvæði */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

            {/* Tab bar */}
            <div className="bg-white border-b border-gray-200 sticky top-[73px] z-40"
              style={{ overflowX: 'auto', scrollbarWidth: 'none' }}>
              <div className="flex">
                {TABS.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`tab-btn flex items-center gap-1.5 px-4 py-3.5 text-sm font-light
                      text-gray-500 whitespace-nowrap border-b-2 border-transparent
                      ${activeTab===tab.id ? 'tab-active' : ''}`}>
                    <span>{tab.icon}</span>
                    <span>{tab.label}</span>
                    {tabDone[tab.id] && (
                      <span className="w-4 h-4 rounded-full bg-green-500 text-white text-xs
                        flex items-center justify-center ml-0.5">✓</span>
                    )}
                  </button>
                ))}
              </div>
            </div>

            <div className="p-6 fade-in" key={activeTab}>

              {/* ── RÉTT / RANGT ─────────────────────────────── */}
              {activeTab === 'tf' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-4">✅ Rétt eða rangt?</h2>
                  <div className="space-y-3">
                    {TRUE_FALSE.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-light text-gray-800 mb-3">{item.s}</p>
                        <div className="flex gap-2">
                          {[true, false].map(val => {
                            const sel = tfAns[idx] === val;
                            let cls = 'answer-option flex-1 py-2 rounded-lg text-sm font-light';
                            if (!tfDone) { if (sel) cls += ' opt-selected'; }
                            else {
                              cls += ' opt-disabled';
                              if (item.correct === val) cls += ' opt-correct';
                              else if (sel) cls += ' opt-incorrect';
                            }
                            return (
                              <button key={String(val)}
                                onClick={() => { if (!tfDone) setTfAns(p => ({...p,[idx]:val})); }}
                                className={cls}>
                                {val ? 'Rétt ✓' : 'Rangt ✗'}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={() => { if (tfReady) setTfDone(true); }}
                      disabled={!tfReady || tfDone}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
                        disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                      Athuga svör
                    </button>
                    {tfDone && (
                      <button onClick={() => { setTfAns({}); setTfDone(false); }}
                        className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                          hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* ── SPURNINGAR ───────────────────────────────── */}
              {activeTab === 'short' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">📝 Spurningar</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">Svaraðu með einni setningu.</p>
                  <div className="space-y-4">
                    {SHORT_QS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-medium text-gray-800 mb-3">{item.q}</p>
                        <textarea
                          value={shortAns[idx]}
                          onChange={e => setShortAns(p => { const n=[...p]; n[idx]=e.target.value; return n; })}
                          disabled={shortFb[idx] !== null}
                          placeholder="Skrifaðu svarið þitt hér..."
                          rows={2}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                            focus:outline-none focus:border-green-400 font-light resize-none
                            disabled:bg-gray-50 text-sm mb-3" />
                        {shortFb[idx] === null && (
                          <button onClick={() => checkShort(idx)}
                            disabled={!shortAns[idx].trim() || shortLd[idx]}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLd[idx] ? 'Athuga...' : 'Athuga svar'}
                          </button>
                        )}
                        {shortFb[idx] && (
                          <FeedbackBadge
                            score={shortFb[idx].score}
                            message={shortFb[idx].msg}
                            onRetry={shortFb[idx].score < 4 ? () => resetShort(idx) : null}
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── TAFLA ────────────────────────────────────── */}
              {activeTab === 'table' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">📋 Fylltu í töfluna</h2>
                  <p className="text-sm font-light text-gray-500 mb-5">
                    Veldu rétt svar fyrir Líu og Mateo í hverri röð.
                  </p>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm border-collapse">
                      <thead>
                        <tr className="border-b-2 border-gray-200">
                          <th className="text-left font-light text-gray-500 py-3 pr-6 w-36"></th>
                          <th className="py-3 px-4 text-center">
                            <div className="flex flex-col items-center gap-2">
                              <img src="../media/lia_haus.jpg" alt="Lía"
                                className="w-12 h-12 rounded-full object-cover object-top border border-gray-200" />
                              <span className="font-medium text-gray-700">Lía</span>
                            </div>
                          </th>
                          <th className="py-3 px-4 text-center">
                            <div className="flex flex-col items-center gap-2">
                              <img src="../media/mateo_haus.png" alt="Mateo"
                                className="w-12 h-12 rounded-full object-cover object-top border border-gray-200" />
                              <span className="font-medium text-gray-700">Mateo</span>
                            </div>
                          </th>
                        </tr>
                      </thead>
                      <tbody>
                        {TABLE_ROWS.map((row, ri) => {
                          const liaVal   = tableAns[ri].lia;
                          const mateoVal = tableAns[ri].mateo;
                          const liaOk    = liaVal   === row.liaCorrect;
                          const mateoOk  = mateoVal === row.mateoCorrect;
                          const dropCls = (ok) => tableDone
                            ? `drop ${ok ? 'drop-correct' : 'drop-incorrect'}`
                            : 'drop';
                          return (
                            <tr key={ri} className="border-b border-gray-100">
                              <td className="py-4 pr-6 font-light text-gray-600 whitespace-nowrap">
                                {row.col}
                              </td>
                              <td className="py-4 px-4 text-center">
                                <select
                                  className={dropCls(liaOk)}
                                  value={liaVal}
                                  disabled={tableDone}
                                  onChange={e => setCell(ri, 'lia', e.target.value)}>
                                  <option value="">-- veldu --</option>
                                  {row.opts.map(o => <option key={o} value={o}>{o}</option>)}
                                </select>
                                {tableDone && !liaOk && (
                                  <div className="text-xs text-green-700 mt-1.5 font-light">✓ {row.liaCorrect}</div>
                                )}
                              </td>
                              <td className="py-4 px-4 text-center">
                                <select
                                  className={dropCls(mateoOk)}
                                  value={mateoVal}
                                  disabled={tableDone}
                                  onChange={e => setCell(ri, 'mateo', e.target.value)}>
                                  <option value="">-- veldu --</option>
                                  {row.opts.map(o => <option key={o} value={o}>{o}</option>)}
                                </select>
                                {tableDone && !mateoOk && (
                                  <div className="text-xs text-green-700 mt-1.5 font-light">✓ {row.mateoCorrect}</div>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button onClick={() => { if (tableReady) setTableDone(true); }}
                      disabled={!tableReady || tableDone}
                      className="px-6 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700
                        disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                      Athuga svör
                    </button>
                    {tableDone && (
                      <button onClick={() => {
                        setTableAns(TABLE_ROWS.map(() => ({ lia: '', mateo: '' })));
                        setTableDone(false);
                      }}
                        className="px-6 py-2.5 border-2 border-gray-200 text-gray-600 rounded-lg
                          hover:bg-gray-50 transition-colors font-light text-sm">
                        Endurstilla
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* ── ÞÝÐINGAR ─────────────────────────────────── */}
              {activeTab === 'trans' && (
                <div>
                  <h2 className="text-lg font-medium text-gray-800 mb-1">🌍 Þýðingar</h2>
                  <p className="text-sm font-light text-gray-500 mb-4">
                    Þýddu orðin á þitt eigið móðurmál.
                  </p>
                  <div className="space-y-4">
                    {TRANSLATIONS.map((item, idx) => (
                      <div key={idx} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm text-gray-700 mb-3">
                          Þýddu á þitt móðurmál:{' '}
                          <strong className="text-gray-900 font-medium">{item.word}</strong>
                        </p>
                        <textarea
                          value={transAns[idx]}
                          onChange={e => setTransAns(p => { const n=[...p]; n[idx]=e.target.value; return n; })}
                          disabled={transFb[idx] !== null}
                          placeholder="Skrifaðu þýðinguna hér..."
                          rows={2}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg
                            focus:outline-none focus:border-green-400 font-light resize-none
                            disabled:bg-gray-50 text-sm mb-3" />
                        {transFb[idx] === null && (
                          <button onClick={() => checkTrans(idx)}
                            disabled={!transAns[idx].trim() || transLd[idx]}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                              disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {transLd[idx] ? 'Athuga...' : 'Athuga þýðingu'}
                          </button>
                        )}
                        {transFb[idx] && (
                          <FeedbackBadge
                            score={transFb[idx].score}
                            message={transFb[idx].msg}
                            onRetry={transFb[idx].score < 4 ? () => resetTrans(idx) : null}
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

            </div>
          </div>

          {/* Lokakassi */}
          {allDone && (
            <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
              <p className="text-green-700 font-light text-sm mb-4">
                Þú hefur lokið öllum verkefnum. Nú getur þú lesið samtalið.
              </p>
              <button onClick={() => setShowText(v => !v)}
                className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700
                  transition-colors font-light text-sm">
                {showText ? '▲ Fela samtalið' : '📖 Lesa samtalið'}
              </button>

              {showText && (
                <div className="mt-5 text-left bg-white rounded-xl p-5 border border-green-100 fade-in">
                  <h3 className="font-light text-gray-500 mb-4 text-sm">💬 Samtalið – Kynning í skólanum</h3>
                  {SAMTALS.map((line, i) => {
                    const c = WHO[line.who];
                    return (
                      <div key={i} className="flex gap-3 mb-4">
                        <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center
                          justify-center text-xs font-medium overflow-hidden ${c.tag}`}>
                          {line.who === 'Lía'
                            ? <img src="../media/lia_haus.jpg" alt="Lía" className="portrait-sm" />
                            : line.who === 'Mateo'
                              ? <img src="../media/mateo_haus.png" alt="Mateo" className="portrait-sm" />
                              : c.init
                          }
                        </div>
                        <div className={`max-w-lg px-4 py-3 rounded-xl text-sm font-light ${c.bg} text-gray-800`}>
                          <span className="block text-xs text-gray-400 mb-1">{line.who}</span>
                          {line.text}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

        </main>

        {/* Framvinduraki – neðst */}
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                  ${tabDone[tab.id]
                    ? 'bg-green-600 text-white'
                    : activeTab===tab.id
                      ? 'bg-gray-200 text-gray-700'
                      : 'bg-gray-100 text-gray-500'}`}>
                {tabDone[tab.id] ? '✓ ' : ''}{tab.label}
              </button>
            ))}
          </div>
        </div>

      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
