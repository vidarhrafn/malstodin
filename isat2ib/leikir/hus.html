/* ===========================================================================
   API — OpenAI þýðing (Málstöðvar-staðall).
   /.netlify/functions/openai virkar aðeins á Netlify-uppsetningu Viðars.
   Í forskoðun bregst kallið; þá fellur B-skjár á íslenska textann.
=========================================================================== */
async function callOpenAI(messages, max_tokens = 200, model = 'gpt-4o-mini', temperature = 0.2) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens, model, temperature })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

// Þýðir íslenskan texta yfir á valið móðurmál. enHint = ensk merking (disambiguation, valfrjáls).
async function translateTo(islenska, malName, enHint) {
  try {
    const hintLine = enHint
      ? `Til að taka af allan vafa um merkingu: á ensku er þetta "${enHint}". Notaðu þá merkingu ef íslenskan er tvíræð.\n`
      : '';
    const messages = [
      { role: 'system', content:
        `Þú þýðir texta fyrir tungumálanemanda. Þýddu eftirfarandi íslenska texta nákvæmlega yfir á ${malName}. ` +
        `Haltu tölum og áttum (vinstri/hægri) óbreyttum að merkingu. ${hintLine}Ekki bæta við skýringum. Skilaðu EINUNGIS þýðingunni.` },
      { role: 'user', content: islenska }
    ];
    const out = await callOpenAI(messages, 200, 'gpt-4o-mini', 0.2);
    return (out || '').trim() || islenska;
  } catch (e) {
    return islenska; // fallback í forskoðun
  }
}

/* ===========================================================================
   HLUTI 2 — GOGN: KORTID (ibudin sed ofan fra)
   # veggur · . gangur · S inngangur · annad = herbergislykill
=========================================================================== */
const W = '#', H = '.', S = 'S';
const MAP = [
  [ W, W,              W, 'eldhus', W, W,             W ],
  [ W, W,              W, H,        W, W,             W ],
  [ W, 'svefnherbergi', H, H,        H, 'badherbergi', W ],
  [ W, W,              W, H,        W, W,             W ],
  [ W, 'stofa',        H, H,        H, 'bordstofa',   W ],
  [ W, W,              W, H,        W, W,             W ],
  [ W, W,              W, H,        W, W,             W ],
  [ W, W,              W, S,        W, W,             W ],
];
const ROWS = MAP.length, COLS = MAP[0].length;

function cellAt(c, r) { if (r<0||r>=ROWS||c<0||c>=COLS) return W; return MAP[r][c]; }
function isWall(c, r) { return cellAt(c, r) === W; }
function isWalkable(c, r) { return !isWall(c, r); }
function roomKeyAt(c, r) { const v = cellAt(c, r); return (v!==W && v!==H && v!==S) ? v : null; }
function findStart() { for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (MAP[r][c]===S) return {col:c,row:r}; return {col:3,row:7}; }
function findRoomCell(key) { for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (MAP[r][c]===key) return {col:c,row:r}; return null; }

/* ===========================================================================
   HLUTI 3 — VEL: LEIDARUTREIKNINGUR + AFSTAED FYRIRMAELI
=========================================================================== */
const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
const VEC2DIR = { '0,-1':'up', '0,1':'down', '-1,0':'left', '1,0':'right' };

function bfsPath(from, to) {
  const key = p => `${p.col},${p.row}`;
  const q = [from];
  const prev = { [key(from)]: null };
  while (q.length) {
    const cur = q.shift();
    if (cur.col === to.col && cur.row === to.row) break;
    for (const d in DIRS) {
      const nc = cur.col + DIRS[d][0], nr = cur.row + DIRS[d][1];
      if (isWalkable(nc, nr) && !(key({col:nc,row:nr}) in prev)) { prev[key({col:nc,row:nr})] = cur; q.push({col:nc,row:nr}); }
    }
  }
  if (!(key(to) in prev)) return null;
  const path = []; let cur = to;
  while (cur) { path.unshift(cur); cur = prev[key(cur)]; }
  return path;
}

const NUM = ['núll','eitt','tvö','þrjú','fjögur','fimm','sex','sjö','átta'];
const TURN = {
  up:    { left:'left',  right:'right' },
  down:  { left:'right', right:'left'  },
  left:  { left:'down',  right:'up'    },
  right: { left:'up',    right:'down'  },
};
function relativeTurn(facing, target) {
  if (facing === target) return 'beint áfram';
  if (TURN[facing].left === target) return 'til vinstri';
  if (TURN[facing].right === target) return 'til hægri';
  return 'við';
}
function pathToInstructions(path, startFacing) {
  const dirs = [];
  for (let i=1;i<path.length;i++){ const dc=path[i].col-path[i-1].col, dr=path[i].row-path[i-1].row; dirs.push(VEC2DIR[`${dc},${dr}`]); }
  if (dirs.length === 0) return ['Þú ert kominn!'];
  const segs = []; let cur = dirs[0], count = 1;
  for (let i=1;i<dirs.length;i++){ if (dirs[i]===cur) count++; else { segs.push({dir:cur,n:count}); cur=dirs[i]; count=1; } }
  segs.push({dir:cur,n:count});
  const out = []; let facing = startFacing;
  segs.forEach((seg, idx) => {
    const turn = relativeTurn(facing, seg.dir);
    const steps = `${NUM[seg.n]} skref`;
    if (idx === 0 && turn === 'beint áfram') out.push(`farðu ${steps} áfram`);
    else if (turn === 'beint áfram') out.push(`haltu áfram ${steps}`);
    else if (turn === 'við') out.push(`snúðu við og farðu ${steps}`);
    else out.push(`beygðu ${turn} og farðu ${steps}`);
    facing = seg.dir;
  });
  return out;
}

/* ===========================================================================
   HLUTI 4 — VEL: NORMUN OG SVAR-MAT
=========================================================================== */
function normalize(s) {
  return (s || '').toLowerCase().replace(/[.,!?;:„""'`]/g, '').replace(/\s+/g, ' ').trim();
}
function greenForms(x) { return /^græn[nt]?i?$/.test(x); }
function isCorrect(input, answers) {
  const n = normalize(input);
  if (!n) return false;
  for (const a of answers) {
    const na = normalize(a);
    if (n === na) return true;
    if (greenForms(na) && greenForms(n)) return true;
  }
  return false;
}

/* ===========================================================================
   HLUTI 5 — VEL: LEIKJARODB (slembin, 6 heimsoknir, eitt herbergi tvisvar)
=========================================================================== */
function shuffle(arr) { const a = [...arr]; for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function buildPlan() {
  const keys = Object.keys(ROOMS);
  const order = shuffle(keys);
  const extra = order[Math.floor(Math.random() * order.length)];
  const visits = [...order, extra];
  const usedQ = {};
  return visits.map(key => {
    const qs = ROOMS[key].questions;
    const avail = qs.map((_, i) => i).filter(i => !(usedQ[key] || []).includes(i));
    const qIdx = avail[Math.floor(Math.random() * avail.length)];
    usedQ[key] = [...(usedQ[key] || []), qIdx];
    return { roomKey: key, qIdx };
  });
}

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center px-6 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-xl border border-gray-100 max-w-md w-full p-6 pop-in" onClick={e => e.stopPropagation()}>
        <RoomImage room={room} />
        <div className="font-medium text-gray-800 text-lg mb-1">{room.name}</div>
        {room.correct ? (
          <p className="text-gray-400 font-light text-xs mb-4">Skoðaðu myndina. B spyr þig spurningu — svaraðu upphátt.</p>
        ) : (
          <p className="text-amber-600 font-light text-xs mb-4">Lýstu fyrir B hvað þú sérð. Passar þetta við spurninguna hjá B? Ef ekki, finnið rétta herbergið saman.</p>
        )}
        <button onClick={onClose} className="w-full px-4 py-2 rounded-xl border border-gray-200 text-gray-500 font-light text-sm hover:bg-gray-50">Loka og halda áfram</button>
      </div>
    </div>
  );
}

function ScreenA({ plan, onBack }) {
  const [pos, setPos] = useState(findStart());
  const [facing, setFacing] = useState('up');
  const [stepIdx, setStepIdx] = useState(0);
  const [popupRoom, setPopupRoom] = useState(null);
  const [bump, setBump] = useState(false);
  const [visitedCells, setVisitedCells] = useState({});

  const done = stepIdx >= plan.length;
  const targetKey = done ? null : plan[stepIdx].roomKey;

  const move = useCallback((dir) => {
    if (popupRoom || done) return;
    setFacing(dir);
    setPos(prev => {
      const nc = prev.col + DIRS[dir][0], nr = prev.row + DIRS[dir][1];
      if (!isWalkable(nc, nr)) { setBump(true); setTimeout(() => setBump(false), 220); return prev; }
      const rk = roomKeyAt(nc, nr);
      // Mynd birtist í HVAÐA herbergi sem er — A getur ráfað inn í rangt herbergi.
      // `correct` ræður hvort skrefið telst klárað þegar popup lokast.
      if (rk) { setPopupRoom({ ...ROOMS[rk], correct: rk === targetKey }); setVisitedCells(v => ({ ...v, [`${nc},${nr}`]: true })); }
      return { col: nc, row: nr };
    });
  }, [popupRoom, done, targetKey]);

  useEffect(() => {
    const onKey = e => { const m = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' }[e.key]; if (m) { e.preventDefault(); move(m); } };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [move]);

  const arrow = { up:'▲', down:'▼', left:'◀', right:'▶' }[facing];

  if (done) {
    return (
      <div>
        <Header title="🏠 Skjár A — í íbúðinni" subtitle="Herbergjaleikur · Dúfnahólar 10" onBack={onBack} />
        <div className="max-w-2xl mx-auto px-6 py-16 text-center fade-in">
          <div className="text-5xl mb-4">🎉</div>
          <h2 className="text-2xl font-medium text-gray-800 mb-2">Þið kláruðuð öll herbergin!</h2>
          <p className="text-gray-500 font-light">Vel gert — þið rötuðuð um alla íbúðina saman.</p>
        </div>
      </div>
    );
  }

  return (
    <div>
      <Header title="🏠 Skjár A — í íbúðinni" subtitle="Herbergjaleikur · Dúfnahólar 10" onBack={onBack} />
      <div className="max-w-2xl mx-auto px-6 py-6 fade-in">
        <div className="flex items-center justify-between mb-4">
          <ProgressDots current={stepIdx} total={plan.length} />
          <span className="text-xs text-gray-400 font-light">Herbergi {stepIdx + 1} af {plan.length}</span>
        </div>

        <div className={`bg-white rounded-xl shadow-sm border p-3 transition ${bump ? 'border-red-300' : 'border-gray-100'}`}>
          <div className="grid gap-1 mx-auto" style={{ gridTemplateColumns:`repeat(${COLS}, minmax(0,1fr))`, maxWidth: 360 }}>
            {Array.from({ length: ROWS }).map((_, r) =>
              Array.from({ length: COLS }).map((_, c) => {
                const here = pos.col === c && pos.row === r;
                const rk = roomKeyAt(c, r);
                const isV = visitedCells[`${c},${r}`];
                let cls = 'aspect-square rounded-md flex items-center justify-center text-sm transition ';
                if (isWall(c, r)) cls += 'bg-transparent';
                else if (rk) cls += isV ? 'bg-violet-200 border border-violet-300' : 'bg-amber-100 border border-amber-200';
                else cls += 'bg-gray-100 border border-gray-200';
                return (
                  <div key={`${c},${r}`} className={cls}>
                    {here ? <div className="w-7 h-7 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs shadow">{arrow}</div>
                      : rk ? <span className="text-xs opacity-50">{isV ? '🖼️' : '🚪'}</span>
                      : cellAt(c, r) === S ? <span className="text-[10px] text-gray-400 font-light">inn</span> : null}
                  </div>
                );
              })
            )}
          </div>
        </div>

        <div className="mt-5 flex flex-col items-center gap-2">
          <button onClick={() => move('up')} className="w-16 h-12 rounded-xl bg-white border border-gray-200 shadow-sm text-gray-600 text-lg hover:bg-gray-50 active:scale-95 transition">↑</button>
          <div className="flex gap-2">
            <button onClick={() => move('left')} className="w-16 h-12 rounded-xl bg-white border border-gray-200 shadow-sm text-gray-600 text-lg hover:bg-gray-50 active:scale-95 transition">←</button>
            <button onClick={() => move('down')} className="w-16 h-12 rounded-xl bg-white border border-gray-200 shadow-sm text-gray-600 text-lg hover:bg-gray-50 active:scale-95 transition">↓</button>
            <button onClick={() => move('right')} className="w-16 h-12 rounded-xl bg-white border border-gray-200 shadow-sm text-gray-600 text-lg hover:bg-gray-50 active:scale-95 transition">→</button>
          </div>
        </div>
        <p className="text-center text-gray-400 font-light text-xs mt-5">Fylgdu leiðsögn B. Bláa örin sýnir hvert þú snýrð.</p>
      </div>
      {popupRoom && <RoomPopup room={popupRoom} onClose={() => { const wasCorrect = popupRoom.correct; setPopupRoom(null); if (wasCorrect) setStepIdx(i => i + 1); }} />}
    </div>
  );
}

const RTL_HINT = ['arabíska','arabic','العربية','farsi','persian','فارسی','hebrew','עברית','urdu','اردو'];
function looksRTL(name) { return RTL_HINT.some(h => (name||'').toLowerCase().includes(h)); }

/* Móðurmálsskráning — frjáls textareitur (kerfið ræður við hvaða mál sem er) */
function LanguagePick({ onPick }) {
  const [val, setVal] = useState('');
  const submit = () => { if (val.trim()) onPick({ name: val.trim() }); };
  return (
    <div className="max-w-2xl mx-auto px-6 py-10 fade-in">
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 className="font-medium text-gray-800 mb-1">🌐 Skráðu móðurmál þitt</h2>
        <p className="text-gray-500 font-light text-sm mb-5">Allar leiðbeiningar og spurningar birtast á því máli sem þú skráir.</p>
        <div className="flex gap-2 items-center flex-wrap">
          <input type="text" value={val} onChange={e => setVal(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }}
            placeholder="t.d. English, Polski, 中文, العربية…"
            className="flex-1 min-w-0 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-light focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <button onClick={submit} disabled={!val.trim()}
            className="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-light hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition">
            Staðfesta
          </button>
        </div>
      </div>
    </div>
  );
}

function ScreenB({ plan, onBack }) {
  const [mal, setMal] = useState(null); // { code, name } — móðurmál B
  const [stepIdx, setStepIdx] = useState(0);
  const [input, setInput] = useState('');
  const [fb, setFb] = useState(null);
  const [aPos, setAPos] = useState(findStart());
  const [facing, setFacing] = useState('up');
  const [tInstr, setTInstr] = useState('');   // þýdd leiðsögn
  const [tQ, setTQ] = useState('');           // þýdd spurning
  const [loading, setLoading] = useState(false);

  const done = stepIdx >= plan.length;
  const step = done ? null : plan[stepIdx];
  const room = step ? ROOMS[step.roomKey] : null;
  const q = step ? room.questions[step.qIdx] : null;

  // íslensk leiðsögn (reiknuð) — grunnur sem er þýddur
  const instrIs = (() => {
    if (done) return '';
    const target = findRoomCell(plan[stepIdx].roomKey);
    const path = bfsPath(aPos, target);
    if (!path) return '(engin leið fannst)';
    return pathToInstructions(path, facing).join(', ') + '.';
  })();

  // Þýða leiðsögn + spurningu í rauntíma þegar skref eða mál breytist
  useEffect(() => {
    if (!mal || done || !q) return;
    let cancelled = false;
    const isIcelandic = /íslensk|islensk|icelandic/i.test(mal.name);
    if (isIcelandic) { setTInstr(instrIs); setTQ(q.is); return; }
    setLoading(true);
    Promise.all([ translateTo(instrIs, mal.name), translateTo(q.is, mal.name, q.en || (q.ml && q.ml.en)) ])
      .then(([ti, tq]) => { if (!cancelled) { setTInstr(ti); setTQ(tq); } })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [mal, stepIdx, done]); // q og instrIs leiðast af stepIdx

  const check = () => {
    if (!q) return;
    if (isCorrect(input, q.svar)) {
      setFb({ kind:'green', text:'✓ Rétt! A er kominn í herbergið. Næsta leiðsögn opnast.' });
      const target = findRoomCell(step.roomKey);
      const path = bfsPath(aPos, target);
      if (path && path.length > 1) {
        const last = path[path.length-1], prev = path[path.length-2];
        const dc = last.col - prev.col, dr = last.row - prev.row;
        setFacing(VEC2DIR[`${dc},${dr}`] || facing);
      }
      setTimeout(() => { if (target) setAPos(target); setStepIdx(i => i + 1); setInput(''); setFb(null); }, 1100);
    } else {
      setFb({ kind:'red', text:'Ekki alveg rétt. Spurðu A aftur og athugaðu svarið.' });
    }
  };

  if (done) {
    return (
      <div>
        <Header title="🗺️ Skjár B — leiðbeinandinn" subtitle="Herbergjaleikur · Dúfnahólar 10" onBack={onBack} />
        <div className="max-w-2xl mx-auto px-6 py-16 text-center fade-in">
          <div className="text-5xl mb-4">🎉</div>
          <h2 className="text-2xl font-medium text-gray-800 mb-2">Leiknum er lokið!</h2>
          <p className="text-gray-500 font-light">Þið heimsóttuð öll herbergin saman. Frábær samvinna.</p>
        </div>
      </div>
    );
  }

  if (!mal) {
    return (
      <div>
        <Header title="🗺️ Skjár B — leiðbeinandinn" subtitle="Herbergjaleikur · Dúfnahólar 10" onBack={onBack} />
        <LanguagePick onPick={setMal} />
      </div>
    );
  }

  const dir = looksRTL(mal.name) ? 'rtl' : 'ltr';

  return (
    <div>
      <Header title="🗺️ Skjár B — leiðbeinandinn" subtitle="Herbergjaleikur · Dúfnahólar 10" onBack={onBack} />
      <div className="max-w-2xl mx-auto px-6 py-6 fade-in">
        <div className="flex items-center justify-between mb-4">
          <ProgressDots current={stepIdx} total={plan.length} />
          <button onClick={() => setMal(null)} className="text-xs text-gray-400 font-light hover:text-gray-600">{mal.name} ⌄</button>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
          <div className="text-xs uppercase tracking-wide text-blue-600 font-medium mb-2">1 · Segðu A leiðina</div>
          {loading ? <p className="text-gray-300 font-light">…</p>
            : <p className="text-gray-800 font-light leading-relaxed" dir={dir}>{tInstr}</p>}
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <div className="text-xs uppercase tracking-wide text-purple-600 font-medium mb-2">2 · Spurðu A um myndina</div>
          {loading ? <p className="text-gray-300 font-light mb-4">…</p>
            : <p className="text-gray-800 font-light leading-relaxed mb-4" dir={dir}>{tQ}</p>}
          <div className="flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') check(); }} placeholder="Svar A…" className="flex-1 px-4 py-2 rounded-xl border border-gray-200 font-light focus:outline-none focus:border-blue-400" />
            <button onClick={check} className="px-5 py-2 rounded-xl bg-blue-600 text-white font-light text-sm hover:bg-blue-700 transition">Athuga</button>
          </div>
          {fb && <FeedbackBadge kind={fb.kind}>{fb.text}</FeedbackBadge>}
        </div>
        <p className="text-center text-gray-400 font-light text-xs mt-6">A skoðar myndina og svarar upphátt. Þú slærð svarið inn.</p>
      </div>
    </div>
  );
}

function RoleSelect({ onPick }) {
  return (
    <div className="min-h-screen flex items-center justify-center px-6">
      <div className="max-w-2xl w-full fade-in">
        <div className="text-center mb-10">
          <div className="text-4xl mb-3">🏠</div>
          <h1 className="text-3xl font-medium text-gray-800 mb-2">Herbergjaleikur</h1>
          <p className="text-gray-500 font-light">Dúfnahólar 10 · paraæfing fyrir tvo nemendur</p>
          <p className="text-gray-400 font-light text-sm mt-3 max-w-md mx-auto">Opnið á sitt hvoru tækinu. Þið talið saman á íslensku — það er eina tengingin milli ykkar.</p>
        </div>
        <div className="grid sm:grid-cols-2 gap-4">
          <button onClick={() => onPick('A')} className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 text-left hover:shadow-md hover:border-blue-200 transition">
            <div className="text-2xl mb-2">🧭</div><div className="font-medium text-gray-800 mb-1">Ég er A</div>
            <div className="text-sm text-gray-500 font-light">Þú stýrir á kortinu. Þú ratar, ferð inn í herbergin og skoðar myndirnar.</div>
          </button>
          <button onClick={() => onPick('B')} className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 text-left hover:shadow-md hover:border-purple-200 transition">
            <div className="text-2xl mb-2">🗺️</div><div className="font-medium text-gray-800 mb-1">Ég er B</div>
            <div className="text-sm text-gray-500 font-light">Þú leiðbeinir A um íbúðina og spyrð spurninga um myndirnar.</div>
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [role, setRole] = useState(null);
  const planRef = useRef(null);
  if (!planRef.current) planRef.current = buildPlan();
  if (!role) return <RoleSelect onPick={setRole} />;
  if (role === 'A') return <ScreenA plan={planRef.current} onBack={() => setRole(null)} />;
  return <ScreenB plan={planRef.current} onBack={() => setRole(null)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
