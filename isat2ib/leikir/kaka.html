/* ---------------------------------------------------------------------------
   API-föll — Málstöðvar-staðall.
   /.netlify/functions/* virka aðeins á Netlify-uppsetningu Viðars.
   Í forskoðun bregðast þau; þá fellur UI á textann (sjá fallback í TalandiHnappur).
--------------------------------------------------------------------------- */
async function playAudio(text, onEnd) {
  try {
    const r = await fetch('/.netlify/functions/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text_to_speak: text })
    });
    const data = await r.json();
    if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(false); return; }
    const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
    audio.onended = () => onEnd && onEnd(true);
    audio.onerror = () => onEnd && onEnd(false);
    await audio.play().catch(() => onEnd && onEnd(false));
    return audio;
  } catch (e) { console.error(e); onEnd && onEnd(false); }
}

/* ---------------------------------------------------------------------------
   Normun á lykilorði — engin AI-þýðing, bara einföld hreinsun.
   Lágstafa, fjarlægja greinarmerki, þjappa bilum.
--------------------------------------------------------------------------- */
function normalize(s) {
  return (s || '')
    .toLowerCase()
    .replace(/[.,!?;:„""'`]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

/* ---------------------------------------------------------------------------
   Talandi hnappur — spilar TTS. Textinn sést EKKI nema:
   (a) fallback þegar hljóð bregst (forskoðun), eða
   (b) nemandi á A1-stigi smellir á "Sýna texta".
--------------------------------------------------------------------------- */
function TalandiHnappur({ text, label }) {
  const [state, setState] = useState('idle'); // idle | playing
  const [forceText, setForceText] = useState(false);
  const [showText, setShowText] = useState(false);

  const play = () => {
    setState('playing');
    playAudio(text, (ok) => {
      setState('idle');
      if (!ok) setForceText(true); // hljóð virkaði ekki → sýna texta svo hægt sé að prófa
    });
  };

  const textVisible = forceText || showText;

  return (
    <div>
      <div className="flex flex-wrap gap-2 items-center">
        <button onClick={play} disabled={state === 'playing'}
          className={`px-4 py-2 rounded-xl text-white font-light text-sm transition ${state === 'playing' ? 'bg-green-400 pulsing' : 'bg-green-600 hover:bg-green-700'}`}>
          🔊 {state === 'playing' ? 'Spila…' : label}
        </button>
        <button onClick={play}
          className="px-3 py-2 rounded-xl border border-gray-200 text-gray-500 font-light text-sm hover:bg-gray-50">
          ↻ Endurtaka
        </button>
        <button onClick={() => setShowText(v => !v)}
          className="px-3 py-2 rounded-xl border border-gray-200 text-gray-400 font-light text-xs hover:bg-gray-50">
          👁 {showText ? 'Fela texta' : 'Sýna texta (A1)'}
        </button>
      </div>
      {textVisible && (
        <div className="mt-3 px-4 py-3 rounded-xl bg-gray-50 border border-gray-100 text-gray-700 font-light italic fade-in">
          „{text}"
          {forceText && !showText && (
            <div className="text-xs text-gray-400 not-italic mt-1">(Hljóð ekki tiltækt í forskoðun — textinn birtur í staðinn.)</div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------------
   Reitakort fyrir A — blindur A (sér EKKI hvar markmiðið er).
   6 dyr á hæð: 3 vinstra megin, 3 hægra megin, lyfta í miðju.
--------------------------------------------------------------------------- */
function Kort({ currentFloor, setCurrentFloor, step, onKnockCorrect }) {
  const [msg, setMsg] = useState(null);

  const knock = (side, index) => {
    const onThisFloor = step.floor === currentFloor;
    const right = onThisFloor && step.door.side === side && step.door.index === index;
    if (right) {
      setMsg(null);
      onKnockCorrect();
    } else {
      setMsg('🚪 Enginn heima á þessum dyrum. Spurðu B hvert þú átt að fara.');
      setTimeout(() => setMsg(null), 2600);
    }
  };

  const Door = ({ side, index }) => (
    <button onClick={() => knock(side, index)}
      className="w-full aspect-[3/4] rounded-lg bg-amber-100 border border-amber-200 hover:bg-amber-200 transition flex items-center justify-center text-amber-700 text-xs font-light">
      🚪
    </button>
  );

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <span className="text-sm font-medium text-gray-700">Hæð {currentFloor}</span>
        <span className="text-xs text-gray-400 font-light">Þú sérð ekki hvar markmiðið er — fylgdu leiðsögn B</span>
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <div className="grid grid-cols-7 gap-2 items-center">
          {/* vinstri dyr */}
          <div className="col-span-3 grid grid-cols-3 gap-2">
            {[0,1,2].map(i => <Door key={'v'+i} side="vinstri" index={i} />)}
          </div>
          {/* lyfta / gangur */}
          <div className="col-span-1 flex flex-col items-center">
            <div className="text-[10px] text-gray-400 font-light mb-1">gangur</div>
            <div className="w-full aspect-[3/4] rounded-lg bg-gray-200 border border-gray-300 flex items-center justify-center text-gray-500 text-lg">🛗</div>
          </div>
          {/* hægri dyr */}
          <div className="col-span-3 grid grid-cols-3 gap-2">
            {[0,1,2].map(i => <Door key={'h'+i} side="haegri" index={i} />)}
          </div>
        </div>
        <div className="grid grid-cols-7 gap-2 mt-1">
          <div className="col-span-3 text-center text-[10px] text-gray-400 font-light">vinstri</div>
          <div className="col-span-1" />
          <div className="col-span-3 text-center text-[10px] text-gray-400 font-light">hægri</div>
        </div>
      </div>

      {msg && <FeedbackBadge kind="amber">{msg}</FeedbackBadge>}

      {/* Lyfta */}
      <div className="mt-4 bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <div className="text-sm font-medium text-gray-700 mb-2">🛗 Lyfta — veldu hæð</div>
        <div className="flex gap-2">
          {FLOORS.map(f => (
            <button key={f} onClick={() => { setCurrentFloor(f); setMsg(null); }}
              className={`flex-1 py-2 rounded-lg font-light text-sm transition ${f === currentFloor ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {f}. hæð

  );
}

function ScreenB({ onBack }) {

  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);

  const step = done ? null : STEPS[stepIdx];

  const check = () => {
    if (!step) return;
    if (normalize(input) === normalize(step.key)) {
      setFeedback({ kind: 'green', text: '✓ Rétt! Næsta vísbending opnast.' });
      setTimeout(() => {
        setStepIdx(i => i + 1);
        setInput('');
        setFeedback(null);
      }, 1100);
    } else {
      setFeedback({ kind: 'red', text: 'Ekki alveg rétt. Hlustaðu aftur með A og reyndu á ný.' });
    }
  };

  if (done) {
    return (
      <div>
        <Header title="🗺️ Skjár B — leiðbeinandinn" subtitle="Lyklaleitin · Dúfnahólar 10" onBack={onBack} />
        <div className="max-w-2xl mx-auto px-6 py-16 text-center fade-in">
          <div className="text-5xl mb-4">🎉</div>
          <h2 className="text-2xl font-medium text-gray-800 mb-2">Leiknum er lokið!</h2>
          <p className="text-gray-500 font-light">Þið funduð öll hráefnin saman. Frábær samvinna.</p>
        </div>
      </div>
    );
  }

  const instruction = (TRANSLATIONS[step.id] && TRANSLATIONS[step.id][lang]) || step.bInstruction;

  return (
    <div>
      <Header title="🗺️ Skjár B — leiðbeinandinn" subtitle="Lyklaleitin · Dúfnahólar 10" onBack={onBack} />
      <div className="max-w-2xl mx-auto px-6 py-6 fade-in">
        <div className="mb-5"><ProgressDots current={stepIdx} total={STEPS.length} /></div>

        <div className="flex justify-end mb-4">
          <select value={lang} onChange={e => setLang(e.target.value)}
            className="px-3 py-2 rounded-xl border border-gray-200 text-sm font-light text-gray-600 bg-white">
            {LANGUAGES.map(l => <option key={l.code} value={l.code}>{l.name}</option>)}
          </select>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
          <div className="text-xs uppercase tracking-wide text-purple-600 font-medium mb-2">Vísbending {step.id} af {STEPS.length}</div>
          <p className="text-gray-800 font-light leading-relaxed" dir={lang === 'ar' ? 'rtl' : 'ltr'}>{instruction}</p>
          <div className="mt-3 pt-3 border-t border-gray-100 text-sm text-gray-400 font-light">
            🇮🇸 {step.bHint}
          </div>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <label className="block text-sm font-medium text-gray-700 mb-2">Sláðu inn lykilorðið sem A las fyrir þig</label>
          <div className="flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') check(); }}
              placeholder="t.d. tvö orð…"
              className="flex-1 px-4 py-2 rounded-xl border border-gray-200 font-light focus:outline-none focus:border-blue-400" />
            <button onClick={check}
              className="px-5 py-2 rounded-xl bg-blue-600 text-white font-light text-sm hover:bg-blue-700 transition">
              Athuga
            </button>
          </div>
          {feedback && <FeedbackBadge kind={feedback.kind}>{feedback.text}</FeedbackBadge>}
        </div>

        <p className="text-center text-gray-400 font-light text-xs mt-6">
          Segðu A á hvaða hæð og hvaða dyr. A heyrir svarið — þú slærð það inn.
        </p>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------------
   App
--------------------------------------------------------------------------- */
function App() {
  const [role, setRole] = useState(null);
  if (!role) return <RoleSelect onPick={setRole} />;
  if (role === 'A') return <ScreenA onBack={() => setRole(null)} />;
  return <ScreenB onBack={() => setRole(null)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
