<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 Spjall 10: Uppáhaldsfag – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%); min-height: 100vh;}
    .recording { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const COURSE = 'isat1ia';
  const LOGIN = '../login.html';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = LOGIN; return; }
    try {
      const snap = await getDoc(doc(db, 'user_access', user.uid));
      if (!snap.exists()) { window.location.href = LOGIN; return; }
      const courseData = snap.data()[COURSE];
      if (!courseData || !courseData.activated_at) { window.location.href = LOGIN; return; }
      if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) {
        window.location.href = LOGIN; return;
      }
    } catch {
      window.location.href = LOGIN; return;
    }
    // Access confirmed – show the page
    document.getElementById('auth-loading').style.display = 'none';
    const root = document.getElementById('root');
    if (root) root.style.display = 'block';
  });
</script>

<div id="auth-loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <p style="color:#9ca3af;font-weight:300;font-family:system-ui,sans-serif;">Hleður...</p>
</div>

  <div id="root" style="display:none"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o-mini', temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    async function playAudio(text, setSpeakingCallback) {
      setSpeakingCallback(true);
      try {
        const r = await fetch('/.netlify/functions/speak', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text_to_speak: text })
        });
        const data = await r.json();
        if (!r.ok || data.error || !data.audio_base64) { console.error('Villa í hljóðkalli:', data?.error); setSpeakingCallback(false); return; }
        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
        audio.onended = () => setSpeakingCallback(false);
        audio.onerror = () => setSpeakingCallback(false);
        await audio.play().catch(() => setSpeakingCallback(false));
      } catch (e) { console.error('Tenging mistókst:', e); setSpeakingCallback(false); }
    }

    const MicIcon = ({ isRecording }) => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill={isRecording ? "currentColor" : "none"}
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        className={`w-5 h-5 ${isRecording ? 'recording text-red-500' : ''}`}
      >
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    );

    const ListenPill = ({ onClick, speaking }) => (
      <button onClick={onClick} className={`inline-flex items-center gap-2 px-3 py-1 rounded-xl text-sm border ${speaking ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-100 text-gray-700 border-gray-200'}`}>
        <span className="opacity-70">🎧</span>
        <span className="font-light">Hlustaðu:</span>
        <span className={`text-green-600 ${speaking ? 'animate-pulse' : ''}`}>🔊</span>
      </button>
    );

    const SpjallUppahaldsfag = () => {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [isRecording, setIsRecording] = useState(false);
      const [recognition, setRecognition] = useState(null);
      const [speakingIndex, setSpeakingIndex] = useState(null);
      const [finished, setFinished] = useState(false);
      const messagesEndRef = useRef(null);

      const FIRST_Q = 'Hæ! Hvert er þitt uppáhaldsfag í grunnskólanum?';

      const ASSISTANT_SYSTEM_PROMPT = `Þú ert íslenskukennari á A1–A2 stigi sem talar við nemanda um uppáhaldsfag hans í skóla.

SAMTALSLEIÐIR (í þessari röð):
1. KYNNING: "Hæ! Hvert er þitt uppáhaldsfag í grunnskólanum?"

2. STAÐFESTING + ÁSTÆÐA: Ef nemandi nefnir fag, staðfestu það:
   - "Ah, [fag]! Hvers vegna finnst þér gaman í því?"

3. FLEIRI FÖG: "Eru önnur fög sem þér finnst gaman í?"

4. ERFITT FAG: "Hvaða fag finnst þér erfiðast?"

5. KENNARI: "Hver er uppáhalds kennarinn þinn?"

6. UM KENNARANN: "Hvað kennir hann/hún? Hvers vegna finnst þér gaman að vera í tímum hjá honum/henni?"

7. FRAMTÍÐ - NÁM: "Vilt þú halda áfram að læra [uppáhaldsfag]?"

8. FRAMTÍÐ - VINNA: "Getur [uppáhaldsfag] hjálpað þér að fá einhverja vinnu í framtíðinni?"

MIKILVÆGAR REGLUR:
- ALLTAF enda svariðið þitt með spurningu - aldrei bara hrós eitt og sér
- Ef nemandi svarar aðeins 1-2 orðum (t.d. bara "stærðfræði"), biðstu hann um meira:
  * "Gott! Geturðu sagt meira? Til dæmis: 'Uppáhaldsfag mitt er stærðfræði'"
  * Síðan spyrðu næstu spurningar úr samtalsleiðinni
- Ef nemandi svarar 3+ orðum eða heilri setningu, haltu bara áfram með næstu spurningu
- Eftir hvert svar: hrósaðu MJÖG stutt (t.d. "Gott!" eða "Áhugavert!") og spyrðu ALLTAF spurningar
- Haltu þig við spurningaleiðina í réttri röð
- Notaðu EINFÖLD íslensk orð
- Ef nemandi nefnir fag sem þú þekkir, staðfestu það vinalega
- Ef nemandi nefnir kennara, notaðu rétt fornafn (hann/hún) í næstu spurningum

DÆMI UM GÓÐ SVÖR:
Nemandi: "stærðfræði"
Þú: "Gott! Geturðu sagt meira? Til dæmis: 'Uppáhaldsfag mitt er stærðfræði'. Hvers vegna finnst þér gaman í stærðfræði?"

Nemandi: "Mér finnst gaman í íþróttum"
Þú: "Frábært! Hvaða íþrótt finnst þér skemmtilegust?"

SKILAÐU ALLTAF aðeins EINNI stuttri spurningu (eða hrós + spurning) á íslensku.`;

      const FEEDBACK_SYSTEM_PROMPT = `Þú ert íslenskukennari sem gefur MJÖG MILDA málfarsendurgjöf á A1–A2 stigi.

Nemandinn er að æfa sig að tala íslensku og er að lýsa uppáhaldsfagi sínu og kennurum.

MIKILVÆGT: Vera mjög VARKÁR með leiðréttingar! Leiðrétta AÐEINS ef:
1. Nemandi skrifar á öðru tungumáli (t.d. "mathematics" í stað "stærðfræði")
2. Augljósar málfræðivillur (t.d. "ég er í best" í stað "ég er bestur")
3. Ritháttar­villur á íslenskum orðum

Gefðu STUTTA endurgjöf (1-2 setningar):
- Byrjaðu með hrós: "Frábært!" eða "Gott!"
- EF villa: Leiðréttu vinalega: "Á íslensku segjum við X í stað Y"
- Lokaðu jákvætt: "Annars mjög gott!"

DÆMI:
- Nemandi: "My favorite subject is math" → "Ég sé að þú skrifaðir á ensku! Á íslensku: 'uppáhaldsfag mitt er stærðfræði'. Annars flott!"
- Nemandi: "Mér finnst gaman í stærðfræði" → "Frábært! Þetta er alveg rétt."
- Nemandi: "Kennari minn er mjög góður" → "Vel gert! Þetta er fullkomlega rétt."

ALDREI leiðrétta ef svarið er skiljanlegt og næstum rétt!`;

      const SUMMARY_PROMPT = `Búðu til STUTTA (3-4 setningar) og HVETJANDI samantekt á íslensku um uppáhaldsfag nemandans.

Samantektin ætti að innihalda:
1. Nafn uppáhaldsfags og ástæðu
2. Uppáhaldskennara ef það kom fram
3. Framtíðarhugmyndir (áframhaldandi nám eða vinna)
4. Hrós til nemanda

Dæmi: "Þitt uppáhaldsfag er stærðfræði! Þér finnst gaman að reikna og leysa dæmi. Þú vilt halda áfram að læra stærðfræði og kannski verða verkfræðingur í framtíðinni. Mjög áhugavert! Vel gert að tala um skólann þinn! 🎉"

SKILAÐU aðeins samantektinni á íslensku, ekkert annað.`;

      useEffect(() => {
        if ('webkitSpeechRecognition' in window) {
          const recog = new webkitSpeechRecognition();
          recog.lang = 'is-IS'; recog.continuous = true; recog.interimResults = true;
          recog.onresult = (e) => {
            const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
            setInput(transcript);
          };
          recog.onend = () => setIsRecording(false);
          recog.onerror = () => setIsRecording(false);
          setRecognition(recog);
        }
      }, []);

      useEffect(() => { if (messages.length > 0) {
          messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        } }, [messages, loading]);

      const playAssistantAt = async (idx) => {
        const msg = messages[idx];
        if (!msg || msg.role !== 'assistant') return;
        setSpeakingIndex(idx);
        await playAudio(msg.content, () => setSpeakingIndex(null));
      };

      const handleListenClick = async () => {
        let idx = messages.findIndex(m => m.role === 'assistant');
        if (idx === -1) {
          setMessages(prev => [...prev, { role: 'assistant', content: FIRST_Q }]);
          await playAudio(FIRST_Q, () => setSpeakingIndex(null));
          return;
        }
        const lastIdx = messages.map((m,i)=>({m,i})).filter(o=>o.m.role==='assistant').slice(-1)[0]?.i;
        if (lastIdx != null) await playAssistantAt(lastIdx);
      };

      const toggleRecording = () => {
        if (!recognition) { alert('Vafrinn þinn styður ekki talgreiningu. Notaðu Chrome eða Edge.'); return; }
        if (isRecording) { recognition.stop(); setIsRecording(false); } else { recognition.start(); setIsRecording(true); }
      };

      const sendMessage = async () => {
        if (!input.trim() || loading) return;
        const userMessage = input.trim();
        setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
        setInput(''); setLoading(true);
        try {
          // 1) Málfarsendurgjöf
          try {
            const feedback = await callOpenAI([
              { role: 'system', content: FEEDBACK_SYSTEM_PROMPT },
              { role: 'user', content: userMessage }
            ], 80, 'gpt-4o-mini', 0.2);
            if (feedback && feedback.length > 10) {
              setMessages(prev => [...prev, { role: 'feedback', content: feedback }]);
            }
          } catch (e) { console.warn('Feedback misheppnað:', e); }

          // 2) Næsta spurning
          const chatHistory = messages.map(m => ({ 
            role: m.role === 'feedback' ? 'assistant' : m.role, 
            content: m.content 
          }));
          const aiMessages = [ 
            { role: 'system', content: ASSISTANT_SYSTEM_PROMPT }, 
            ...chatHistory, 
            { role: 'user', content: userMessage } 
          ];
          const nextQuestion = await callOpenAI(aiMessages, 200, 'gpt-4o-mini', 0.3);
          if (nextQuestion) {
            setMessages(prev => [...prev, { role: 'assistant', content: nextQuestion }]);
            await playAudio(nextQuestion, () => setSpeakingIndex(null));
          }
        } catch (e) { console.error('Villa í samtali:', e); }
        finally { setLoading(false); }
      };

      const finishConversation = async () => {
        setFinished(true); setLoading(true);
        try {
          const allUserText = messages.filter(m => m.role === 'user').map(m => m.content).join('\n');
          const summary = await callOpenAI([ 
            { role: 'system', content: SUMMARY_PROMPT }, 
            { role: 'user', content: allUserText } 
          ], 400, 'gpt-4o-mini', 0.3);
          setMessages(prev => [...prev, { role: 'summary', content: summary }]);
          await playAudio(summary, () => setSpeakingIndex(null));
        } catch (e) { console.error('Villa í samantekt:', e); }
        finally { setLoading(false); }
      };

      return (
        <div className="min-h-screen pb-12">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">← Til baka</button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">💬 Spjall 10: Uppáhaldsfag</h1>
              <p className="text-gray-500 text-sm font-light">Tölum saman</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">
            <div className="rounded-lg overflow-hidden shadow-lg mb-6 mx-auto" style={{maxWidth:'500px'}}>
              <img src="../media/spjall10_fog.png" alt="Nemendur læra mismunandi fög í skóla" className="w-full h-auto" />
            </div>

            <section className="bg-white rounded-lg shadow-xl overflow-hidden flex flex-col" style={{minHeight:'400px'}}>
              <div className="px-6 py-3 border-b bg-gray-50"></div>

              <div className="flex-1 overflow-y-auto p-6 space-y-4">
                <div className="flex justify-start mb-2">
                  <ListenPill onClick={handleListenClick} speaking={speakingIndex!==null} />
                </div>
                {messages.filter(msg => msg.role !== 'assistant').map((msg, i) => (
                  <div key={i} className={`flex ${msg.role==='user'?'justify-end': msg.role==='summary' ? 'justify-center' : 'justify-start'}`}>
                    <div className={`max-w-lg px-4 py-2 rounded-xl font-light ${
                      msg.role==='user' ? 'bg-blue-600 text-white' : 
                      msg.role==='summary' ? 'bg-green-50 text-green-900 border border-green-300' : 
                      msg.role==='feedback' ? 'bg-red-50 text-red-700 border border-red-200 text-sm italic' : 
                      'bg-gray-100 text-gray-800'
                    }`}>
                      {msg.role === 'feedback' && (
                        <span className="font-normal text-red-800">📚 Málfar: </span>
                      )}

                      <p className="whitespace-pre-wrap">{msg.content}</p>
                    </div>
                  </div>
                ))}
                {loading && <p className="text-gray-400 italic">AI hugsar…</p>}
                <div ref={messagesEndRef} />
              </div>

              {!finished && (
                <div className="border-t p-4 bg-white">
                  <div className="flex gap-2 mb-2">
                    <button
                      onClick={toggleRecording}
                      className={`px-4 py-3 rounded-lg font-normal flex items-center gap-2 transition-colors ${
                        isRecording
                          ?'bg-red-600 text-white hover:bg-red-700'
                          :'bg-gray-200 text-gray-700 hover:bg-gray-300'
                      }`}
                      disabled={loading}
                    >
                      <MicIcon isRecording={isRecording} />
                      <span>{isRecording ? '⏹️ Hætta upptöku' : '🎤 Haltu til að tala'}</span>
                    </button>
                    <button onClick={finishConversation} className="px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-normal transition-colors">
                      ✅ Klára samtal
                    </button>
                  </div>
                  <div className="flex gap-2">
                    <input type="text" value={input} onChange={(e)=>setInput(e.target.value)} onKeyDown={(e)=>e.key==='Enter'&&sendMessage()} placeholder="Skrifa eða laga tal…" className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light" />
                    <button onClick={sendMessage} disabled={!input.trim()} className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed font-normal transition-colors">
                      Senda
                    </button>
                  </div>
                </div>
              )}
            </section>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<SpjallUppahaldsfag />);
  </script>
</body>
</html>
