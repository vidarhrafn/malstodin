<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 Spjall 2: Matur frá þínu landi – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%); min-height: 100vh;}
    .recording { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SpeakerIcon = ({ isSpeaking }) => (
      <svg 
        xmlns="http://www.w3.org/2000/svg" 
        viewBox="0 0 24 24" 
        fill="none" 
        stroke="currentColor" 
        strokeWidth="2" 
        strokeLinecap="round" 
        strokeLinejoin="round" 
        className={`w-5 h-5 transition-colors ${
          isSpeaking ? 'text-red-500 animate-pulse' : 'text-green-600'
        }`}
      >
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
    );

    const MicIcon = ({ isRecording }) => (
      <svg 
        xmlns="http://www.w3.org/2000/svg" 
        viewBox="0 0 24 24" 
        fill={isRecording ? "currentColor" : "none"}
        stroke="currentColor" 
        strokeWidth="2" 
        strokeLinecap="round" 
        strokeLinejoin="round" 
        className={`w-5 h-5 ${isRecording ? 'recording text-red-500' : ''}`}
      >
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    );

    async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o-mini', temperature = 0.3) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens, model, temperature })
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    async function playAudio(text, setSpeakingCallback) {
      setSpeakingCallback(true);
      try {
        const r = await fetch('/.netlify/functions/speak', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text_to_speak: text })
        });
        const data = await r.json();
        if (!r.ok || data.error || !data.audio_base64) { 
          console.error('Villa í hljóðkalli:', data?.error); 
          setSpeakingCallback(false); 
          return; 
        }
        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
        audio.onended = () => setSpeakingCallback(false);
        audio.onerror = () => setSpeakingCallback(false);
        await audio.play().catch(() => setSpeakingCallback(false));
      } catch (e) { 
        console.error('Tenging mistókst:', e); 
        setSpeakingCallback(false); 
      }
    }

    const ListenPill = ({ onClick, speaking }) => (
      <button onClick={onClick} className={`inline-flex items-center gap-2 px-3 py-1 rounded-xl text-sm border ${speaking ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-100 text-gray-700 border-gray-200'}`}>
        <span className="opacity-70">🎧</span>
        <span className="font-light">Hlustaðu:</span>
        <span className={`text-green-600 ${speaking ? 'animate-pulse' : ''}`}>🔊</span>
      </button>
    );


    const SpjallMatur = () => {
      const FIRST_Q = 'Hæ! Getur þú sagt mér frá matarrétti frá þínu landi?';

      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [isRecording, setIsRecording] = useState(false);
      const [recognition, setRecognition] = useState(null);
      const [speakingIndex, setSpeakingIndex] = useState(null);
      const [finished, setFinished] = useState(false);
      const [userResponseCount, setUserResponseCount] = useState(0);
      const messagesEndRef = useRef(null);

      const SYSTEM_PROMPT = `Þú ert íslenskukennari á A1-A2 stigi. Nemandi á að tala um matarrétt frá sínu landi.

MIKILVÆGT: Þú ert að spyrja spurninga um matarréttinn.

SPURNINGAR Í RÖÐ (7 spurningar):
1. "Getur þú sagt mér frá matarrétti frá þínu landi?"
2. STAÐFESTA réttinn með stutt lýsingu: "Ah, [nafn]! Það er [stutt lýsing], er það rétt?"
   Dæmi: "Ah, pierogi! Það eru deighnúðar með fyllingu frá Póllandi, er það rétt?"
   Dæmi: "Hamborgari! Amerískur réttur með kjöti í brauði, já?"
3. "Hvað er í þessum rétti? Hvaða hráefni þarftu?"
4. "Og hvað borðar þú með honum? Eru einhver meðlæti?"
5. "Hvernig eldar þú þennan rétt?"
6. "Hvernig bragðast þetta? Er þetta heitt, kryddað, sætt...?"
7. "Hefur þú sjálf/ur eldað þennan rétt? Hvenær borðar þú hann?"

MIKILVÆGT fyrir spurningu 2 - Notaðu EINFÖLD, SKÝR íslensk orð:
- "deighnúðar með fyllingu" (ekki "bolludúlkar")
- "kjötréttur með kartöflum"
- "hrísgrjónaréttur með sjávarmat"
- "steiktur fiskur"
- "bakaður réttur með osti"
- Gefðu STUTTA (5-10 orð) lýsingu
- Nefndu land ef þú veist það
- Vertu viss og jákvæð!

SAMÞYKKJA öll afbrigði á:
- Hráefni: grænmeti, kjöt, fiskur, ávextir, krydd, ostur, mjólk, tómatar, laukur, hvítlaukur, kartöflur, hrísgrjón...
- Meðlæti: kartöflur, hrísgrjón, salat, grænmeti, brauð, sósa...
- Eldaaðgerðir: að sjóða, að steikja, að baka, að hræra, að skera, að dreifa, að setja í ofn...
- Bragð: heitt, kryddað, sætt, súrt, salt, gott, ljúffengt, sterkt, millt...
- Tími: á hátíðum, á jólum, um helgar, oft, sjaldan, alltaf, stundum...

SKILAÐU aðeins EINNI stuttri spurningu á íslensku.
Eftir svar: hrósaðu mjög stutt (t.d. "Frábært!" eða "Áhugavert!" eða "Gott!") og spurðu NÝJA spurningu.

SAMÞYKKJA öll afbrigði og vera hvetjandi!`;

      const FEEDBACK_SYSTEM = `Þú ert íslenskukennari sem gefur MJÖG MILDA málfarsendurgjöf á A1-A2 stigi.

Nemandinn er að tala um matarrétt frá sínu landi og er að æfa sig að tala íslensku.

MIKILVÆGT: Vera mjög VARKÁR með leiðréttingar! Leiðrétta AÐEINS ef:
1. Nemandi skrifar á öðru tungumáli (t.d. "tomato" í stað "tómatar")
2. Augljósar málfræðivillur (t.d. "ég steikja" í stað "ég steiki")
3. Ritháttarvillur á íslenskum orðum

Gefðu STUTTA endurgjöf (1-2 setningar):
- Byrjaðu með hrós: "Frábært!" eða "Gott!"
- EF villa: Leiðréttu vinalega: "Á íslensku segjum við X í stað Y"
- Lokaðu jákvætt: "Annars mjög gott!"

DÆMI:
- Nemandi: "Jeg trenger tomat" → "Ég sé að þú skrifaðir á norsku! Á íslensku: tómatar. Annars flott!"
- Nemandi: "Ég steikja kjötið" → "Næstum rétt! 'Ég steiki' eða 'ég er að steikja'. Vel gert!"
- Nemandi: "Ég set tómata í pottinn" → "Frábært! Þetta er alveg rétt."

ALDREI leiðrétta ef svarið er skiljanlegt og næstum rétt!`;

      const SUMMARY_SYSTEM = `Þú ert íslenskukennari. Nemandi hefur lýst matarrétti frá sínu landi.

Búðu til STUTTA (3-4 setningar) og HVETJANDI súmmeru á íslensku sem:
1. Nefnir nafn réttar og land
2. Nefnir nokkur hráefni og meðlæti
3. Nefnir hvernig hann er eldaður
4. Hrósar nemanda

Dæmi: "Þú lýsir [rétti] frá [landi] mjög vel! Í honum er [hráefni] og hann er borðaður með [meðlæti]. Hann er [eldaður]. Mjög áhugavert! Vel gert að tala um matarrétt frá þínu landi! 🎉"

SKILAÐU aðeins súmmeruna á íslensku, ekkert annað.`;

      useEffect(() => {
        if ('webkitSpeechRecognition' in window) {
          const recog = new webkitSpeechRecognition();
          recog.lang = 'is-IS'; 
          recog.continuous = true; 
          recog.interimResults = true;
          recog.onresult = (e) => {
            const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
            setInput(transcript);
          };
          recog.onend = () => setIsRecording(false);
          recog.onerror = () => setIsRecording(false);
          setRecognition(recog);
        }
      }, []);

      useEffect(() => {
        if (messages.length > 0) {
          messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages, loading]);

      const handleListenClick = async () => {
        if (messages.length === 0) {
          setMessages([{ role: 'assistant', content: FIRST_Q }]);
          await playAudio(FIRST_Q, () => setSpeakingIndex(null));
        } else {
          const lastIdx = messages.map((m, i) => ({ m, i })).filter(o => o.m.role === 'assistant').slice(-1)[0]?.i;
          if (lastIdx != null) await playAssistantAt(lastIdx);
        }
      };

      const playAssistantAt = async (idx) => {
        const msg = messages[idx];
        if (!msg || msg.role !== 'assistant') return;
        setSpeakingIndex(idx);
        await playAudio(msg.content, (speaking) => {
          if (!speaking) setSpeakingIndex(null);
        });
      };

      const toggleRecording = () => {
        if (!recognition) { 
          alert('Vafrinn þinn styður ekki talgreiningu. Notaðu Chrome eða Edge.'); 
          return; 
        }
        if (isRecording) {
          recognition.stop();
          setIsRecording(false);
        } else {
          setInput('');
          recognition.start();
          setIsRecording(true);
        }
      };

      const sendMessage = async () => {
        if (!input.trim() || loading) return;
        
        const userMessage = input.trim();
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
        setLoading(true);

        const newCount = userResponseCount + 1;
        setUserResponseCount(newCount);

        try {
          // Feedback
          try {
            const feedback = await callOpenAI([
              { role: 'system', content: FEEDBACK_SYSTEM },
              { role: 'user', content: userMessage }
            ], 100, 'gpt-4o-mini', 0.2);
            if (feedback) setMessages(prev => [...prev, { role: 'feedback', content: feedback }]);
          } catch (e) { 
            console.warn('Feedback misheppnað:', e); 
          }

          // Athuga hvort búið sé að svara öllum 7 spurningunum
          if (newCount >= 7) {
            // Búa til súmmeru
            const userAnswers = messages
              .filter(m => m.role === 'user')
              .map(m => m.content)
              .join(' · ');
            
            const summaryPrompt = `Nemandinn svaraði spurningunum með: "${userAnswers}". Búðu til stutta súmmeru um matarréttinn.`;
            
            const summary = await callOpenAI([
              { role: 'system', content: SUMMARY_SYSTEM },
              { role: 'user', content: summaryPrompt }
            ], 150, 'gpt-4o-mini', 0.3);
            
            if (summary) {
              setMessages(prev => [...prev, { role: 'assistant', content: summary }]);
              await playAudio(summary, (speaking) => {
                if (!speaking) setSpeakingIndex(null);
              });
            }
            
            setFinished(true);
          } else {
            // Næsta spurning
            const chatHistory = messages.map(m => ({ 
              role: m.role === 'feedback' ? 'assistant' : m.role, 
              content: m.content 
            }));
            
            const aiMessages = [
              { role: 'system', content: SYSTEM_PROMPT },
              ...chatHistory,
              { role: 'user', content: userMessage }
            ];
            
            const nextQuestion = await callOpenAI(aiMessages, 200, 'gpt-4o-mini', 0.3);
            if (nextQuestion) {
              setMessages(prev => [...prev, { role: 'assistant', content: nextQuestion }]);
            }
          }
        } catch (e) { 
          console.error('Villa í samtali:', e); 
        } finally { 
          setLoading(false); 
        }
      };

      return (
        <div className="min-h-screen pb-12">
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">← Til baka</button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">💬 Spjall 2: Matur frá þínu landi</h1>
              <p className="text-gray-500 text-sm font-light">Tölum saman</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">
            <div className="rounded-lg overflow-hidden shadow-lg mb-6 mx-auto" style={{maxWidth:'500px'}}>
              <img
                src="../media/spjall2_matur.png"
                alt="Matur frá ýmsum löndum"
                className="w-full h-auto"
              />
            </div>

            <section className="bg-white rounded-lg shadow-xl overflow-hidden flex flex-col" style={{minHeight:'400px'}}>
              <div className="px-6 py-3 border-b bg-gray-50"></div>

              <div className="flex-1 overflow-y-auto p-6 space-y-4">
                {/* Listen button and progress */}
                <div className="flex justify-between items-center mb-2">
                  <ListenPill onClick={handleListenClick} speaking={speakingIndex !== null} />
                  <span className="text-xs text-gray-400">
                    📍 Spurning {Math.min(userResponseCount + 1, 7)} af 7
                  </span>
                </div>

                {messages.filter(msg => msg.role !== 'assistant').map((msg, i) => (
                  <div key={i} className={`flex ${msg.role==='user'?'justify-end': 'justify-start'}`}>
                    <div className={`max-w-lg px-4 py-2 rounded-xl font-light ${
                      msg.role==='user'
                        ?'bg-blue-600 text-white'
                        : msg.role==='feedback' 
                        ? 'bg-red-50 text-red-700 border border-red-200 text-sm italic' 
                        : 'bg-gray-100 text-gray-800'
                    } shadow-sm relative`}>
                      {msg.role === 'feedback' && (
                        <span className="font-normal text-red-800">📚 Málfar: </span>
                      )}
                      
                      {msg.role !== 'assistant' && (
                        <p className="whitespace-pre-wrap">{msg.content}</p>
                      )}
                      
                      {msg.role === 'assistant' && (
                        <button
                          onClick={() => playAssistantAt(i)}
                          className="flex items-center gap-2 px-4 py-2 bg-blue-100 hover:bg-blue-200 rounded-md transition-colors"
                        >
                          <SpeakerIcon isSpeaking={speakingIndex === i} />
                          <span className="text-blue-800 font-normal">🎧 Hlustaðu</span>
                        </button>
                      )}
                    </div>
                  </div>
                ))}
                {loading && <p className="text-gray-400 italic">AI hugsar…</p>}
                <div ref={messagesEndRef} />
              </div>

              {!finished && (
                <div className="border-t p-4 bg-white">
                  <div className="flex gap-2 mb-2">
                    <button 
                      onClick={toggleRecording} 
                      className={`px-4 py-3 rounded-lg font-normal flex items-center gap-2 transition-colors ${
                        isRecording
                          ?'bg-red-600 text-white hover:bg-red-700'
                          :'bg-gray-200 text-gray-700 hover:bg-gray-300'
                      }`}
                      disabled={loading}
                    >
                      <MicIcon isRecording={isRecording} />
                      <span>{isRecording ? '⏹️ Hætta upptöku' : '🎤 Haltu til að tala'}</span>
                    </button>
                  </div>
                  <div className="flex gap-2">
                    <input 
                      type="text" 
                      value={input} 
                      onChange={(e)=>setInput(e.target.value)} 
                      onKeyDown={(e)=>e.key==='Enter'&&sendMessage()} 
                      placeholder="Skrifa eða laga tal…" 
                      className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light" 
                    />
                    <button 
                      onClick={sendMessage} 
                      disabled={!input.trim()} 
                      className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed font-normal"
                    >
                      Senda
                    </button>
                  </div>
                </div>
              )}

              {finished && (
                <div className="border-t p-6 bg-green-50 text-center">
                  <div className="text-4xl mb-3">🎉</div>
                  <h3 className="text-xl font-normal text-gray-800 mb-2">Vel gert!</h3>
                  <p className="text-gray-600 font-light">Þú hefur klárað spjallið um matarrétt frá þínu landi!</p>
                </div>
              )}
            </section>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<SpjallMatur />);
  </script>
</body>
</html>
