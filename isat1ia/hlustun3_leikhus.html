<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Hlustun 3: Í leikhús – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #6ee7b7; background: #f0fdf4; }
    .answer-option.opt-selected   { border-color: #16a34a; background: #f0fdf4; }
    .answer-option.opt-correct    { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect  { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled   { cursor: default; }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .tab-btn.active { background: white; color: #16a34a; font-weight: 500; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #16a34a;
      border-radius: 2px 2px 0 0;
    }
    .sticky-player {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    async function callOpenAI(messages, maxTokens = 120, temperature = 0.2) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens: maxTokens, model: 'gpt-4o-mini', temperature }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    // ── GÖGN ──────────────────────────────────────────────────────────────────

    const AUDIO_SRC = 'media/hlustun3_leikhus.mp3';

    const LISTENING_TEXT = `Sigurður og Anna ákveða að fara með börnin, Bjarka og Lilju, í leikhús á laugardaginn. Þetta er barnasýning í Borgarleikhúsinu sem heitir Litla ljónið. Lilja er mjög spennt því hún elskar söng og danssýningar. Fjölskyldan kaupir miða á netinu og prentar þá út. Þau fá líka afslátt því Anna vinnur á bókasafninu. Þegar þau koma í leikhúsið kaupa þau leikskrá til að sjá hverjir leika í sýningunni. Bjarki spyr: "Mamma, hvað er aðalleikari?" Anna útskýrir að það sé sá sem hefur stærsta hlutverkið í leikritinu. Þau sitja á fremsta bekk og sjá vel á sviðið. Lilja hvíslar: "Vá, leikararnir eru svo flottir!" Þegar tónlistin byrjar klappar hún taktinn og brosir allan tímann. Eftir sýninguna segja bæði börnin: "Þetta var frábært! Við viljum fara aftur í leikhús!" Sigurður brosir og segir: "Já, kannski förum við næst á annan söngleik."`;

    const VOCAB = [
      { w: 'leikhús', kyn: 'hk.', hint: 'hús þar sem leikarar sýna leikrit' },
      { w: 'leikrit', kyn: 'hk.', hint: 'saga sem er sýnd á sviði' },
      { w: 'leikari / leikkona', kyn: '', hint: 'manneskja sem leikur hlutverk' },
      { w: 'barnasýning', kyn: 'kvk.', hint: 'sýning fyrir börn og fjölskyldur' },
      { w: 'söngleikur', kyn: 'kk.', hint: 'leikrit með söng og tónlist' },
      { w: 'aðalleikari', kyn: 'kk.', hint: 'hefur stærsta hlutverkið í leikriti' },
      { w: 'leikskrá', kyn: 'kvk.', hint: 'bæklingur með upplýsingum um sýningu og leikara' },
      { w: 'svið', kyn: 'hk.', hint: 'staðurinn í leikhúsinu þar sem er leikið' },
      { w: 'miði', kyn: 'kk.', hint: 'leyfi til að fara inn á viðburð' },
      { w: 'afsláttur', kyn: 'kk.', hint: 'þegar eitthvað kostar minna en venjulega' },
    ];

    // Þýðingarorð (fyrsti flipi)
    const TRANSLATION_WORD = 'leikhús (hk)';

    // Rétt/Rangt
    const TRUE_FALSE_RAW = [
      { statement: 'Fjölskyldan fór í Borgarleikhúsið.', correct: true },
      { statement: 'Lilja var ekki hrifin af sýningunni.', correct: false },
      { statement: 'Fjölskyldan fékk afslátt á miðana.', correct: true },
      { statement: 'Aðalleikari er sá sem hefur stærsta hlutverkið.', correct: true },
      { statement: 'Þau sáu illa á sviðið vegna sæta sinna.', correct: false },
      { statement: 'Bjarki spyr hvað aðalleikari er.', correct: true },
    ];

    // Krossaspurningar
    const MC_RAW = [
      { question: 'Í hvaða leikhús fór fjölskyldan?', options: ['Þjóðleikhúsið', 'Borgarleikhúsið', 'Tjarnarbíó', 'Gaflaraleikhúsið'], correct: 1 },
      { question: 'Hvað heitir sýningin?', options: ['Litla ljónið', 'Ljónið og músin', 'Ljónið syngur hátt', 'Stóra ljónið'], correct: 0 },
      { question: 'Hvað keyptu þau þegar þau komu í leikhúsið?', options: ['Leikskrá', 'Popp og kók', 'Bækur', 'Blóm'], correct: 0 },
      { question: 'Hvar sátu þau í salnum?', options: ['Á fremsta bekk', 'Í miðjunni', 'Aftast', 'Á svölum'], correct: 0 },
    ];

    // Stuttar spurningar
    const SHORT_QUESTIONS = [
      'Hvers vegna fékk fjölskyldan afslátt á miðana?',
      'Hvað útskýrir Anna fyrir Bjarka?',
      'Hvað gerði Lilja þegar tónlistin byrjaði?',
    ];

    // Pörun
    const MATCHING_RAW = [
      { left: 'Anna', right: 'Útskýrir hvað aðalleikari er' },
      { left: 'Bjarki', right: 'Spyr um merkingu orðs' },
      { left: 'Lilja', right: 'Klappar taktinn og brosir' },
      { left: 'Leikskrá', right: 'Segir hverjir leika í sýningunni' },
      { left: 'Sigurður', right: 'Leggur til að fara á söngleik næst' },
    ];

    // ── HJÁLPARFÖLL ───────────────────────────────────────────────────────────

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const FeedbackBadge = ({ score, message, onRetry }) => {
      const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
      const colors = {
        green: 'bg-green-50 border-green-200 text-green-700',
        amber: 'bg-amber-50 border-amber-200 text-amber-700',
        red:   'bg-red-50 border-red-200 text-red-700',
      };
      return (
        <div className={`mt-3 p-3 rounded-lg border fade-in ${colors[color]}`}>
          <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
          <p className="text-sm font-light">{message}</p>
          {onRetry && <button onClick={onRetry} className="text-xs underline mt-2 opacity-70">Reyna aftur</button>}
        </div>
      );
    };

    // ── AÐALÍHLUTUR ───────────────────────────────────────────────────────────

    const App = () => {
      // Hljóðspilari
      const audioRef = useRef(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [playbackRate, setPlaybackRate] = useState(1);

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate]);

      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) { audioRef.current.pause(); } else { audioRef.current.play(); }
        setIsPlaying(!isPlaying);
      };

      // Flipar
      const [activeTab, setActiveTab] = useState(0);
      const [tabs, setTabs] = useState([
        { label: 'Rétt/Rangt', done: false },
        { label: 'Krossaspurningar', done: false },
        { label: 'Stuttar spurningar', done: false },
        { label: 'Pörun', done: false },
        { label: 'Þýðingar', done: false },
      ]);
      const [showText, setShowText] = useState(false);
      const allDone = tabs.every(t => t.done);

      const markDone = (i) => setTabs(prev => prev.map((t, idx) => idx === i ? { ...t, done: true } : t));

      // ── Flipi 0: Þýðingar ─────────────────────────────────────────────────
      const [vocabOpen, setVocabOpen] = useState(true);
      const [transAnswer, setTransAnswer] = useState('');
      const [transFeedback, setTransFeedback] = useState(null);
      const [transLoading, setTransLoading] = useState(false);

      const checkTranslation = async () => {
        if (!transAnswer.trim()) {
          alert('Vinsamlegast skrifaðu þýðingu.');
          return;
        }
        setTransLoading(true);
        try {
          const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${TRANSLATION_WORD}"
SVAR NEMANDA: "${transAnswer}"

Greindu tungumálið sjálfkrafa og svaraðu á því tungumáli.

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "detected_language": "nafn tungumálsins (t.d. enska, pólska, spænska)",
  "feedback_is": "Endurgjöf á íslensku",
  "feedback_native": "Endurgjöf á greinda tungumálinu",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}`;
          const r = await callOpenAI(
            [{ role: 'system', content: sys }, { role: 'user', content: 'Meta þýðingu.' }],
            200, 0.2
          );
          const clean = r.replace(/```json
?/g, '').replace(/```
?/g, '').trim();
          const data = JSON.parse(clean);
          setTransFeedback(data);
          markDone(4);
        } catch(e) {
          alert('Villa. Reyndu aftur.');
        } finally {
          setTransLoading(false);
        }
      };

      // ── Flipi 1: Rétt/Rangt ───────────────────────────────────────────────
      const [tfAnswers, setTfAnswers] = useState(Array(TRUE_FALSE_RAW.length).fill(null));
      const [tfSubmitted, setTfSubmitted] = useState(false);

      const checkTf = () => {
        if (tfAnswers.some(a => a === null)) { alert('Vinsamlegast svaraðu öllum!'); return; }
        setTfSubmitted(true);
        markDone(0);
      };

      // ── Flipi 2: Krossaspurningar ─────────────────────────────────────────
      const shuffledMC = useMemo(() => MC_RAW.map(q => {
        const opts = shuffle(q.options.map((o, i) => ({ text: o, isCorrect: i === q.correct })));
        return { question: q.question, options: opts };
      }), []);

      const [mcAnswers, setMcAnswers] = useState(Array(MC_RAW.length).fill(null));
      const [mcSubmitted, setMcSubmitted] = useState(false);

      const checkMc = () => {
        if (mcAnswers.some(a => a === null)) { alert('Vinsamlegast svaraðu öllum!'); return; }
        setMcSubmitted(true);
        markDone(1);
      };

      // ── Flipi 3: Stuttar spurningar ───────────────────────────────────────
      const [shortAnswers, setShortAnswers] = useState(Array(SHORT_QUESTIONS.length).fill(''));
      const [shortFeedback, setShortFeedback] = useState(Array(SHORT_QUESTIONS.length).fill(null));
      const [shortLoading, setShortLoading] = useState(Array(SHORT_QUESTIONS.length).fill(false));

      const getShortFeedback = async (i) => {
        const ans = shortAnswers[i].trim();
        if (!ans) return;
        setShortLoading(prev => { const a = [...prev]; a[i] = true; return a; });
        try {
          const result = await callOpenAI([
            { role: 'system', content: `Þú ert íslenskukennari sem metur stutt svör (A1–A2).
Textinn: "${LISTENING_TEXT}"
Spurning: "${SHORT_QUESTIONS[i]}"
Svar nemanda: "${ans}"
Svaraðu EINUNGIS á þessu formi:
STIG: [tala 0-5]
ENDURGJÖF: [ein setning, vinaleg og hvetjandi á íslensku]` },
            { role: 'user', content: 'Mettu svarið.' }
          ], 100, 0.2);
          const stigMatch = result.match(/STIG:\s*(\d)/);
          const endMatch = result.match(/ENDURGJÖF:\s*(.+)/);
          const score = stigMatch ? parseInt(stigMatch[1]) : 0;
          const msg = endMatch ? endMatch[1].trim() : result.trim();
          setShortFeedback(prev => { const a = [...prev]; a[i] = { score, msg }; return a; });
        } catch(e) {
          alert('Villa. Reyndu aftur.');
        } finally {
          setShortLoading(prev => { const a = [...prev]; a[i] = false; return a; });
        }
      };

      useEffect(() => {
        if (shortFeedback.every(f => f !== null)) markDone(2);
      }, [shortFeedback]);

      // ── Flipi 4: Pörun ────────────────────────────────────────────────────
      const rightOptions = useMemo(() => shuffle(MATCHING_RAW.map(m => m.right)), []);
      const [matchAnswers, setMatchAnswers] = useState(Array(MATCHING_RAW.length).fill(''));
      const [matchSubmitted, setMatchSubmitted] = useState(false);

      const checkMatch = () => {
        if (matchAnswers.some(a => !a)) { alert('Vinsamlegast svaraðu öllum!'); return; }
        setMatchSubmitted(true);
        markDone(3);
      };

      // ── RENDER ────────────────────────────────────────────────────────────

      return (
        <div className="min-h-screen pb-24">

          {/* Header */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()}
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">🎧 Hlustun 3: Í leikhús</h1>
              <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
            </div>
          </header>

          {/* Sticky hljóðspilari */}
          <div className="sticky-player">
            <div className="max-w-4xl mx-auto px-6 py-3">
              <div className="bg-green-50 border border-green-200 rounded-xl p-3 flex items-center gap-3">
                <button onClick={togglePlay}
                  className="w-10 h-10 rounded-full bg-green-600 text-white flex items-center justify-center hover:bg-green-700 transition-colors flex-shrink-0">
                  {isPlaying
                    ? <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    : <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  }
                </button>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-light text-green-800">🎧 Hlusta á samtalið</span>
                    <span className="text-xs text-green-700 font-mono">
                      {Math.floor(currentTime/60)}:{String(Math.floor(currentTime%60)).padStart(2,'0')} / {Math.floor(duration/60)}:{String(Math.floor(duration%60)).padStart(2,'0')}
                    </span>
                  </div>
                  <div className="w-full h-1.5 bg-green-200 rounded-full cursor-pointer"
                    onClick={e => {
                      if (!audioRef.current) return;
                      const rect = e.currentTarget.getBoundingClientRect();
                      audioRef.current.currentTime = ((e.clientX - rect.left) / rect.width) * duration;
                    }}>
                    <div className="h-full bg-green-600 rounded-full transition-all"
                      style={{ width: `${duration ? (currentTime/duration)*100 : 0}%` }} />
                  </div>
                </div>
                <div className="flex gap-1 flex-shrink-0">
                  {[0.75, 1, 1.25].map(r => (
                    <button key={r} onClick={() => setPlaybackRate(r)}
                      className={`px-2 py-1 rounded text-xs font-light transition-colors
                        ${playbackRate === r ? 'bg-green-600 text-white' : 'bg-white text-green-700 hover:bg-green-100'}`}>
                      {r}×
                    </button>
                  ))}
                </div>
                <audio ref={audioRef} src={AUDIO_SRC} preload="metadata"
                  onEnded={() => setIsPlaying(false)}
                  onPlay={() => setIsPlaying(true)}
                  onPause={() => setIsPlaying(false)}
                  onTimeUpdate={() => setCurrentTime(audioRef.current?.currentTime || 0)}
                  onLoadedMetadata={() => setDuration(audioRef.current?.duration || 0)} />
              </div>
            </div>
          </div>

          <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">

            {/* Leiðbeiningabox */}
            <div className="bg-green-50 border border-green-200 border-l-4 border-l-green-500 rounded-lg p-4">
              <p className="text-sm font-light text-green-800">📘 Lestu lykilorðin hér að neðan fyrst</p>
              <p className="text-sm font-light text-green-800">🎧 Hlustaðu á samtalið 2–3 sinnum</p>
              <p className="text-sm font-light text-green-800">✏️ Svaraðu öllum flokkum spurninga</p>
              <p className="text-sm font-light text-green-800">🔓 Þegar allt er lokið opnast textinn</p>
            </div>

            {/* Lykilorð */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <button onClick={() => setVocabOpen(v => !v)}
                className="w-full px-6 py-4 flex items-center justify-between text-left hover:bg-gray-50 transition-colors">
                <span className="font-medium text-gray-800 text-sm">📘 Lykilorð</span>
                <span className="text-gray-400 text-sm">{vocabOpen ? '▲ Fela' : '▼ Sýna'}</span>
              </button>
              {vocabOpen && (
                <div className="px-6 pb-5 grid sm:grid-cols-2 gap-3 fade-in">
                  {VOCAB.map((item, i) => (
                    <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                      <div className="font-medium text-sm">{item.w} <span className="text-gray-500 font-light">({item.kyn})</span></div>
                      <div className="text-xs text-gray-600 font-light">{item.hint}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Flipar */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="flex border-b border-gray-200 bg-gray-50 overflow-x-auto">
                {tabs.map((tab, i) => (
                  <button key={i} onClick={() => setActiveTab(i)}
                    className={`tab-btn flex-1 px-3 py-3 text-xs font-light text-gray-600 whitespace-nowrap ${activeTab === i ? 'active' : ''}`}>
                    {tab.done ? `✓ ${tab.label}` : tab.label}
                  </button>
                ))}
              </div>

              <div className="p-6 fade-in" key={activeTab}>

                {/* ── Flipi 4: Þýðingar (aftast) ── */}
                {activeTab === 4 && (
                  <div className="space-y-4">
                    <p className="text-sm font-light text-gray-600">Þýddu orðið á þitt móðurmál.</p>
                    <div className="border border-gray-100 rounded-xl p-5">
                      <p className="font-medium text-gray-800 mb-4 text-sm">
                        Hvað þýðir <strong>„{TRANSLATION_WORD}"</strong> á þínu móðurmáli?
                      </p>

                      <textarea
                        value={transAnswer}
                        onChange={e => setTransAnswer(e.target.value)}
                        disabled={!!transFeedback}
                        rows={2}
                        placeholder="Skrifaðu þýðinguna hér..."
                        className="w-full px-4 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light text-sm resize-none disabled:bg-gray-50 mb-3"
                      />
                      {!transFeedback ? (
                        <button onClick={checkTranslation} disabled={transLoading}
                          className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 transition-colors font-light text-sm">
                          {transLoading ? 'Bíð...' : 'Athuga þýðingu'}
                        </button>
                      ) : (
                        <div className={`p-4 rounded-xl border fade-in ${transFeedback.correct ? 'bg-green-50 border-green-200' : 'bg-amber-50 border-amber-200'}`}>
                          <p className={`text-sm font-light mb-1 ${transFeedback.correct ? 'text-green-800' : 'text-amber-800'}`}>
                            {transFeedback.correct ? '✓' : '💡'} {transFeedback.feedback_is}
                          </p>
                          <p className={`text-xs font-light ${transFeedback.correct ? 'text-green-700' : 'text-amber-700'}`}>
                            {transFeedback.feedback_native}
                          </p>
                          {transFeedback.correct_translation && (
                            <p className="text-xs text-gray-500 mt-2 font-light">Dæmi: {transFeedback.correct_translation}</p>
                          )}
                        </div>
                      )}
                    </div>
                    {transFeedback && (
                      <div className="text-center fade-in">
                        <button onClick={() => setActiveTab(1)}
                          className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                          Áfram í krossaspurningar →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ── Flipi 0: Rétt/Rangt ── */}
                {activeTab === 0 && (
                  <div className="space-y-4">
                    {TRUE_FALSE_RAW.map((item, i) => (
                      <div key={i} className="border border-gray-100 rounded-xl p-4">
                        <p className="text-sm font-light text-gray-800 mb-3">{i+1}. {item.statement}</p>
                        <div className="flex gap-3">
                          {[true, false].map(ans => {
                            const isSelected = tfAnswers[i] === ans;
                            const isCorrect = ans === item.correct;
                            const showCorrect = tfSubmitted && isCorrect;
                            const showIncorrect = tfSubmitted && isSelected && !isCorrect;
                            return (
                              <div key={String(ans)}
                                onClick={() => { if (!tfSubmitted) { setTfAnswers(prev => { const a=[...prev]; a[i]=ans; return a; }); } }}
                                className={`answer-option flex-1 py-2 rounded-lg text-center text-sm font-light
                                  ${isSelected && !tfSubmitted ? 'opt-selected' : ''}
                                  ${showCorrect ? 'opt-correct' : ''}
                                  ${showIncorrect ? 'opt-incorrect' : ''}
                                  ${tfSubmitted ? 'opt-disabled' : ''}`}>
                                {ans ? 'Rétt ✓' : 'Rangt ✗'}
                                {showCorrect && <span className="ml-1 text-green-600">✓</span>}
                                {showIncorrect && <span className="ml-1 text-red-600">✗</span>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                    {!tfSubmitted ? (
                      <button onClick={checkTf}
                        className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                        Athuga svör
                      </button>
                    ) : (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-4 fade-in text-center">
                        <p className="text-green-800 font-light text-sm mb-3">
                          Þú fékkst {tfAnswers.filter((a,i) => a === TRUE_FALSE_RAW[i].correct).length} af {TRUE_FALSE_RAW.length} rétt.
                        </p>
                        <button onClick={() => setActiveTab(2)}
                          className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                          Áfram í stuttar spurningar →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ── Flipi 2: Krossaspurningar ── */}
                {activeTab === 1 && (
                  <div className="space-y-5">
                    {shuffledMC.map((q, qi) => (
                      <div key={qi} className="border border-gray-100 rounded-xl p-5">
                        <p className="font-medium text-gray-800 mb-3 text-sm">{qi+1}. {q.question}</p>
                        <div className="space-y-2">
                          {q.options.map((opt, oi) => {
                            const isSelected = mcAnswers[qi] === oi;
                            const showCorrect = mcSubmitted && opt.isCorrect;
                            const showIncorrect = mcSubmitted && isSelected && !opt.isCorrect;
                            return (
                              <div key={oi}
                                onClick={() => { if (!mcSubmitted) setMcAnswers(prev => { const a=[...prev]; a[qi]=oi; return a; }); }}
                                className={`answer-option p-3 rounded-lg
                                  ${isSelected && !mcSubmitted ? 'opt-selected' : ''}
                                  ${showCorrect ? 'opt-correct' : ''}
                                  ${showIncorrect ? 'opt-incorrect' : ''}
                                  ${mcSubmitted ? 'opt-disabled' : ''}`}>
                                <div className="flex items-center gap-3">
                                  <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0
                                    ${isSelected && !mcSubmitted ? 'border-green-600 bg-green-600' :
                                      showCorrect ? 'border-green-500 bg-green-500' :
                                      showIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                    {(isSelected || showCorrect) && <div className="w-1.5 h-1.5 bg-white rounded-full"/>}
                                  </div>
                                  <span className="font-light text-sm flex-1">{opt.text}</span>
                                  {showCorrect && <span className="text-green-600 text-sm">✓</span>}
                                  {showIncorrect && <span className="text-red-600 text-sm">✗</span>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                    {!mcSubmitted ? (
                      <button onClick={checkMc}
                        className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                        Athuga svör
                      </button>
                    ) : (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-4 fade-in text-center">
                        <p className="text-green-800 font-light text-sm mb-3">
                          {shuffledMC.every((q,qi) => q.options[mcAnswers[qi]]?.isCorrect)
                            ? '🎉 Frábært! Öll svörin eru rétt!'
                            : `Þú fékkst ${shuffledMC.filter((q,qi) => q.options[mcAnswers[qi]]?.isCorrect).length} af ${MC_RAW.length} rétt.`}
                        </p>
                        <button onClick={() => setActiveTab(3)}
                          className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                          Áfram í pörun →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ── Flipi 3: Stuttar spurningar ── */}
                {activeTab === 2 && (
                  <div className="space-y-5">
                    {SHORT_QUESTIONS.map((q, i) => (
                      <div key={i} className="border border-gray-100 rounded-xl p-5">
                        <p className="font-medium text-gray-800 mb-3 text-sm">{i+1}. {q}</p>
                        <textarea
                          value={shortAnswers[i]}
                          onChange={e => setShortAnswers(prev => { const a=[...prev]; a[i]=e.target.value; return a; })}
                          disabled={shortFeedback[i] !== null}
                          className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-400 font-light resize-none disabled:bg-gray-50 text-sm mb-3"
                          rows={2}
                          placeholder="Skrifaðu svarið þitt hér..."
                        />
                        {!shortFeedback[i] ? (
                          <button onClick={() => getShortFeedback(i)}
                            disabled={shortLoading[i] || shortAnswers[i].trim().length < 2}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                            {shortLoading[i] ? 'Bíð...' : 'Fá endurgjöf'}
                          </button>
                        ) : (
                          <FeedbackBadge score={shortFeedback[i].score} message={shortFeedback[i].msg}
                            onRetry={() => setShortFeedback(prev => { const a=[...prev]; a[i]=null; return a; })} />
                        )}
                      </div>
                    ))}
                    {shortFeedback.every(f => f !== null) && (
                      <div className="text-center fade-in">
                        <button onClick={() => setActiveTab(4)}
                          className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                          Áfram í þýðingarverkefni →
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* ── Flipi 4: Pörun ── */}
                {activeTab === 3 && (
                  <div className="space-y-4">
                    {MATCHING_RAW.map((item, i) => (
                      <div key={i} className="border border-gray-100 rounded-xl p-4">
                        <div className="flex items-center gap-3">
                          <span className="font-medium text-sm text-gray-800 w-24 flex-shrink-0">{item.left}</span>
                          <span className="text-gray-400 text-sm">→</span>
                          <select
                            value={matchAnswers[i]}
                            onChange={e => setMatchAnswers(prev => { const a=[...prev]; a[i]=e.target.value; return a; })}
                            disabled={matchSubmitted}
                            className={`flex-1 px-3 py-2 border-2 rounded-lg focus:outline-none font-light text-sm
                              ${matchSubmitted
                                ? matchAnswers[i] === item.right
                                  ? 'border-green-500 bg-green-50'
                                  : 'border-red-400 bg-red-50'
                                : 'border-gray-200 focus:border-green-400'}`}>
                            <option value="">Veldu...</option>
                            {rightOptions.map((opt, j) => (
                              <option key={j} value={opt}>{opt}</option>
                            ))}
                          </select>
                          {matchSubmitted && (
                            <span className={`text-sm flex-shrink-0 ${matchAnswers[i] === item.right ? 'text-green-600' : 'text-red-600'}`}>
                              {matchAnswers[i] === item.right ? '✓' : '✗'}
                            </span>
                          )}
                        </div>
                        {matchSubmitted && matchAnswers[i] !== item.right && (
                          <p className="text-xs text-red-600 mt-2 ml-1 font-light">Rétt: {item.right}</p>
                        )}
                      </div>
                    ))}
                    {!matchSubmitted ? (
                      <button onClick={checkMatch}
                        className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light">
                        Athuga svör
                      </button>
                    ) : (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-4 fade-in text-center">
                        <p className="text-green-800 font-light text-sm">
                          Þú fékkst {matchAnswers.filter((a,i) => a === MATCHING_RAW[i].right).length} af {MATCHING_RAW.length} rétt.
                        </p>
                      </div>
                    )}
                  </div>
                )}

              </div>
            </div>

            {/* Lokakassi */}
            {allDone && (
              <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center fade-in">
                <div className="text-4xl mb-3">🎉</div>
                <h3 className="text-xl font-light text-green-800 mb-2">Vel gert!</h3>
                <p className="text-green-700 font-light text-sm mb-4">Þú hefur lokið öllum verkefnum.</p>
                <button onClick={() => setShowText(v => !v)}
                  className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                  {showText ? '▲ Fela samtalið' : '▼ Sýna samtalið'}
                </button>
                {showText && (
                  <div className="mt-4 text-left bg-white rounded-xl p-5 border border-green-200 fade-in">
                    <p className="text-gray-700 font-light text-sm leading-relaxed whitespace-pre-line">{LISTENING_TEXT}</p>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* Framvinduraking */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
            <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
              {tabs.map((tab, i) => (
                <button key={i} onClick={() => setActiveTab(i)}
                  className={`flex-1 py-2 rounded-lg text-xs font-light transition-colors
                    ${tab.done ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                  {tab.done ? `✓ ${tab.label}` : tab.label}
                </button>
              ))}
            </div>
          </div>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
