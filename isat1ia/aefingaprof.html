<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Æfingapróf – Fólkið í hverfinu</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
    .drag-item { cursor: grab; user-select: none; }
    .drag-item:active { cursor: grabbing; }
    .drop-zone { min-height: 44px; transition: background 0.15s; }
    .drop-zone.over { background: #eff6ff; border-color: #3b82f6 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef } = React;

// ── Helpers ───────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function callOpenAI(messages) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens: 150, model: 'gpt-4o-mini', temperature: 0.2 })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

function parseAI(text) {
  const s = text.match(/STIG:\s*(\d)/);
  const e = text.match(/ENDURGJÖF:\s*(.+)/);
  return { score: s ? parseInt(s[1]) : 0, msg: e ? e[1].trim() : text.trim() };
}

// ── Shared components ─────────────────────────────────────────────────────

const ProgressBar = ({ current, total }) => (
  <div className="flex items-center gap-2 mb-6">
    {Array.from({ length: total }).map((_, i) => (
      <div key={i} className={`h-1.5 flex-1 rounded-full transition-all duration-500
        ${i < current ? 'bg-green-500' : i === current ? 'bg-blue-400' : 'bg-gray-200'}`} />
    ))}
    <span className="text-xs text-gray-400 font-light whitespace-nowrap">{current}/{total}</span>
  </div>
);

const SectionHeader = ({ number, title, subtitle, points }) => (
  <div className="mb-5">
    <div className="flex items-center gap-3 mb-1">
      <span className="w-7 h-7 rounded-full bg-blue-600 text-white text-sm flex items-center justify-center font-medium">{number}</span>
      <h2 className="text-lg font-medium text-gray-800">{title}</h2>
      <span className="ml-auto text-sm text-gray-400 font-light">{points} stig</span>
    </div>
    {subtitle && <p className="text-sm text-gray-500 font-light ml-10">{subtitle}</p>}
  </div>
);

const FeedbackBadge = ({ score, maxScore, msg }) => {
  const pct = score / maxScore;
  const c = pct >= 0.8 ? 'green' : pct >= 0.5 ? 'amber' : 'red';
  const cls = { green: 'bg-green-50 border-green-200 text-green-800', amber: 'bg-amber-50 border-amber-200 text-amber-800', red: 'bg-red-50 border-red-200 text-red-800' }[c];
  return (
    <div className={`mt-3 p-3 rounded-lg border ${cls} fade-in`}>
      <div className="font-medium text-sm mb-0.5">{score}/{maxScore} stig</div>
      <p className="text-sm font-light">{msg}</p>
    </div>
  );
};

const NextBtn = ({ onClick, label }) => (
  <button onClick={onClick}
    className="mt-6 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light fade-in">
    {label || 'Næsti liður →'}
  </button>
);

// ─────────────────────────────────────────────────────────────────────────
// 1 – Myndir (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const IMAGES = [
  { emoji: '🎃', word: 'grasker' },
  { emoji: '🧄', word: 'hvítlaukur' },
  { emoji: '🥦', word: 'blómkál' },
  { emoji: '🫘', word: 'kjúklingabaunir' },
];

function Section1({ onComplete }) {
  const [answers, setAnswers] = useState(['', '', '', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setLoading(true);
    try {
      const results = await Promise.all(IMAGES.map((img, i) =>
        callOpenAI([{ role: 'user', content:
          `Nemandi á að skrifa íslenska orðið fyrir þessa mynd: ${img.emoji} (rétt svar: "${img.word}"). Nemandi skrifaði: "${answers[i]}". Smá stafsetningarvilla er í lagi.\nSTIG: [0 eða 1]\nENDURGJÖF: [ein stuttur setning á íslensku]` }])
      ));
      const parsed = results.map(parseAI);
      const total = parsed.reduce((s, p) => s + Math.min(p.score, 1) * 2, 0);
      setFeedback({ items: parsed, total });
      setDone(true);
      onComplete(total);
    } catch(e) { setFeedback({ error: true }); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <SectionHeader number="1" title="Hvað er þetta? Skrifaðu rétt orð" subtitle="Skrifaðu íslenska heitið undir hverja mynd." points="8" />
      <div className="grid grid-cols-2 gap-4 mb-5">
        {IMAGES.map((img, i) => (
          <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex flex-col items-center gap-3">
            <span className="text-5xl">{img.emoji}</span>
            <input value={answers[i]}
              onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
              disabled={done} placeholder="Orðið…"
              className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light text-center disabled:bg-gray-50" />
            {feedback && (
              <div className={`text-xs font-light px-2 py-1 rounded ${feedback.items[i].score > 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                {feedback.items[i].score > 0 ? '✓ Rétt' : `✗ Rétt: ${img.word}`} – {feedback.items[i].msg}
              </div>
            )}
          </div>
        ))}
      </div>
      {!done && (
        <button onClick={submit} disabled={loading || answers.some(a => !a.trim())}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'Bíð…' : 'Athuga svör'}
        </button>
      )}
      {feedback && !feedback.error && (
        <FeedbackBadge score={feedback.total} maxScore={8} msg={feedback.total >= 6 ? 'Frábært! Þú þekkir þennan orðaforða vel.' : 'Haltu áfram að æfa þennan orðaforða.'} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// 2 – Paraðu orð og skýringar (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const PAIRS_DATA = [
  { word: 'kósíkvöld',    def: 'kvöld þar sem fólk slappar af saman, horfir á mynd og borðar nammi' },
  { word: 'meðlæti',      def: 'hlutir sem koma með aðalréttinn, t.d. hrísgrjón eða salat' },
  { word: 'uppskrift',    def: 'listi af hráefnum og leiðbeiningar um hvernig á að elda rétt' },
  { word: 'iðngrein',     def: 'verk sem krefst sérstakrar handanlegrar þjálfunar, t.d. múrari eða pípari' },
];

function Section2({ onComplete }) {
  const [selected, setSelected] = useState(null);
  const [matches, setMatches] = useState({});
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(null);
  const shuffledDefs = useRef(shuffle(PAIRS_DATA));

  const handleWord = (i) => { if (done || matches[i] !== undefined) return; setSelected(i); };
  const handleDef = (j) => {
    if (done || selected === null) return;
    const newM = { ...matches, [selected]: j };
    setMatches(newM);
    setSelected(null);
    if (Object.keys(newM).length === PAIRS_DATA.length) {
      let c = 0;
      Object.entries(newM).forEach(([wi, di]) => { if (shuffledDefs.current[di].word === PAIRS_DATA[wi].word) c++; });
      const s = c * 2;
      setScore(s); setDone(true); onComplete(s);
    }
  };
  const isDefMatched = (j) => Object.values(matches).includes(j);
  const defCorrect = (wi, di) => di !== undefined && shuffledDefs.current[di]?.word === PAIRS_DATA[wi].word;

  return (
    <div className="fade-in">
      <SectionHeader number="2" title="Paraðu saman orð og skýringar" subtitle="Smelltu á orð og síðan á rétta skýringu." points="8" />
      <div className="grid grid-cols-2 gap-4">
        <div className="flex flex-col gap-2">
          {PAIRS_DATA.map((p, i) => (
            <button key={i} onClick={() => handleWord(i)}
              className={`px-4 py-3 rounded-lg border-2 text-left font-light text-sm transition-all
                ${done ? defCorrect(i, matches[i]) ? 'bg-green-50 border-green-300 text-green-800' : 'bg-red-50 border-red-300 text-red-800'
                  : matches[i] !== undefined ? 'bg-blue-50 border-blue-300 text-blue-800'
                  : selected === i ? 'bg-blue-100 border-blue-500 text-blue-900'
                  : 'bg-white border-gray-200 hover:border-blue-300 text-gray-700'}`}>
              {p.word}
              {done && !defCorrect(i, matches[i]) && <span className="block text-xs mt-1 text-red-600">→ {p.def.substring(0,38)}…</span>}
            </button>
          ))}
        </div>
        <div className="flex flex-col gap-2">
          {shuffledDefs.current.map((d, j) => (
            <button key={j} onClick={() => handleDef(j)}
              className={`px-4 py-3 rounded-lg border-2 text-left font-light text-xs transition-all
                ${done ? 'bg-gray-50 border-gray-200 text-gray-600 cursor-default'
                  : isDefMatched(j) ? 'bg-blue-50 border-blue-300 text-blue-800 cursor-default'
                  : selected !== null ? 'bg-white border-amber-300 hover:bg-amber-50 text-gray-700 cursor-pointer'
                  : 'bg-white border-gray-200 text-gray-500 cursor-default'}`}>
              {d.def}
            </button>
          ))}
        </div>
      </div>
      {done && <FeedbackBadge score={score} maxScore={8} msg={score >= 6 ? 'Vel gert – þú þekkir þennan orðaforða!' : 'Skoðaðu skýringarnar aftur og æfðu þig.'} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// 3 – Flokkaðu orðin (6 stig)
// ─────────────────────────────────────────────────────────────────────────

const CLASSIFY_RAW = [
  { word: 'kókosmjólk',      correct: 0 },
  { word: 'gulrætur',         correct: 0 },
  { word: 'hrekkjavaka',      correct: 1 },
  { word: 'búningur',         correct: 1 },
  { word: 'sjúkraliði',       correct: 2 },
  { word: 'hárgreiðslukona',  correct: 2 },
];
const CATS = ['🥦 Matvæli', '🎭 Hátíðir', '🔧 Starfsheiti'];

function Section3({ onComplete }) {
  const words = useRef(shuffle(CLASSIFY_RAW.map((w, i) => ({ ...w, origIdx: i }))));
  const [placements, setPlacements] = useState({});
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(null);

  const placed = (ci) => words.current.map((w, i) => ({ ...w, i })).filter(w => placements[w.i] === ci);
  const unplaced = words.current.map((w, i) => ({ ...w, i })).filter(w => placements[w.i] === undefined);

  const handleWordTap = (i) => {
    if (done || placements[i] !== undefined) return;
    setSelectedIdx(prev => prev === i ? null : i);
  };

  const handleCatTap = (ci) => {
    if (done || selectedIdx === null) return;
    const newP = { ...placements, [selectedIdx]: ci };
    setPlacements(newP);
    setSelectedIdx(null);
    if (Object.keys(newP).length === words.current.length) {
      let c = 0;
      Object.entries(newP).forEach(([i, ci]) => { if (words.current[i].correct === Number(ci)) c++; });
      setScore(c); setDone(true); onComplete(c);
    }
  };

  const wordCls = (i) => {
    if (!done) return placements[i] !== undefined ? 'bg-blue-50 border-blue-200 text-blue-800' : 'bg-white border-gray-200 text-gray-700';
    return words.current[i].correct === placements[i] ? 'bg-green-50 border-green-300 text-green-800' : 'bg-red-50 border-red-300 text-red-800';
  };

  return (
    <div className="fade-in">
      <SectionHeader number="3" title="Flokkaðu orðin" subtitle="Smelltu á orð og síðan á réttan flokk." points="6" />

      {/* Word bank */}
      {unplaced.length > 0 && (
        <div className="flex flex-wrap gap-2 mb-4 p-3 bg-amber-50 rounded-xl border border-amber-100">
          {unplaced.map(({ word, i }) => (
            <button key={i} onClick={() => handleWordTap(i)}
              className={`px-3 py-2 rounded-lg border-2 text-sm font-light transition-all
                ${selectedIdx === i
                  ? 'bg-blue-100 border-blue-500 text-blue-900 shadow-md scale-105'
                  : 'bg-white border-gray-200 hover:border-blue-300 text-gray-700 active:scale-95'}`}>
              {word}
            </button>
          ))}
        </div>
      )}

      {/* Category columns — tappable when a word is selected */}
      <div className="grid grid-cols-3 gap-3">
        {CATS.map((cat, ci) => (
          <div key={ci} onClick={() => handleCatTap(ci)}
            className={`rounded-xl border-2 p-3 min-h-24 transition-all
              ${done ? 'border-gray-200 cursor-default'
                : selectedIdx !== null ? 'border-blue-300 bg-blue-50 cursor-pointer hover:bg-blue-100 active:scale-95'
                : 'border-dashed border-gray-200'}`}>
            <div className="text-xs font-medium text-gray-500 mb-2">{cat}</div>
            <div className="flex flex-col gap-1.5">
              {placed(ci).map(({ word, i }) => (
                <span key={i} className={`px-2 py-1 rounded-lg border text-xs font-light ${wordCls(i)}`}>
                  {word}
                  {done && words.current[i].correct !== placements[i] && (
                    <span className="ml-1 text-red-500">→ {CATS[words.current[i].correct].split(' ')[1]}</span>
                  )}
                </span>
              ))}
            </div>
            {selectedIdx !== null && !done && (
              <div className="text-xs text-blue-400 font-light mt-1 text-center">Smelltu hér</div>
            )}
          </div>
        ))}
      </div>

      {selectedIdx !== null && (
        <p className="text-xs text-blue-600 font-light mt-2 text-center fade-in">
          „{words.current[selectedIdx].word}" valið – smelltu á réttan flokk
        </p>
      )}

      {done && <FeedbackBadge score={score} maxScore={6} msg={score === 6 ? 'Fullkomið! Öll orðin í réttum flokki.' : `${score} af 6 rétt – skoðaðu rauðu orðin.`} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// 4 – Tengdu persónu við lýsingu (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const PERSONAS = [
  { name: 'Harpa',      def: 'Hún er grænmetisæta og er í Tækniskólanum.' },
  { name: 'Ingibjörg',  def: 'Hún er móðir Hörpu og á íbúð í Vesturbæ.' },
  { name: 'Árni',       def: 'Hann lærði viðskiptafræði í Háskólanum í Reykjavík.' },
  { name: 'Eiríkur',    def: 'Hann er sonur Ingibjargar og kærasti Hörpu.' },
];

function Section4({ onComplete }) {
  const [selected, setSelected] = useState(null);
  const [matches, setMatches] = useState({});
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(null);
  const shuffledDefs = useRef(shuffle(PERSONAS));

  const handleName = (i) => { if (done || matches[i] !== undefined) return; setSelected(i); };
  const handleDef = (j) => {
    if (done || selected === null) return;
    const newM = { ...matches, [selected]: j };
    setMatches(newM);
    setSelected(null);
    if (Object.keys(newM).length === PERSONAS.length) {
      let c = 0;
      Object.entries(newM).forEach(([pi, di]) => { if (shuffledDefs.current[di].name === PERSONAS[pi].name) c++; });
      const s = c * 2;
      setScore(s); setDone(true); onComplete(s);
    }
  };
  const isDefMatched = (j) => Object.values(matches).includes(j);
  const defCorrect = (pi, di) => di !== undefined && shuffledDefs.current[di]?.name === PERSONAS[pi].name;

  return (
    <div className="fade-in">
      <SectionHeader number="4" title="Tengdu persónu við lýsingu" subtitle="Smelltu á nafn og síðan á rétta lýsingu." points="8" />
      <div className="grid grid-cols-2 gap-4">
        <div className="flex flex-col gap-2">
          {PERSONAS.map((p, i) => (
            <button key={i} onClick={() => handleName(i)}
              className={`px-4 py-3 rounded-lg border-2 text-left font-medium text-sm transition-all
                ${done ? defCorrect(i, matches[i]) ? 'bg-green-50 border-green-300 text-green-800' : 'bg-red-50 border-red-300 text-red-800'
                  : matches[i] !== undefined ? 'bg-blue-50 border-blue-300 text-blue-800'
                  : selected === i ? 'bg-blue-100 border-blue-500 text-blue-900'
                  : 'bg-white border-gray-200 hover:border-blue-300 text-gray-700'}`}>
              {p.name}
            </button>
          ))}
        </div>
        <div className="flex flex-col gap-2">
          {shuffledDefs.current.map((d, j) => (
            <button key={j} onClick={() => handleDef(j)}
              className={`px-4 py-3 rounded-lg border-2 text-left font-light text-xs transition-all
                ${done ? 'bg-gray-50 border-gray-200 text-gray-600 cursor-default'
                  : isDefMatched(j) ? 'bg-blue-50 border-blue-300 text-blue-800 cursor-default'
                  : selected !== null ? 'bg-white border-amber-300 hover:bg-amber-50 text-gray-700 cursor-pointer'
                  : 'bg-white border-gray-200 text-gray-500 cursor-default'}`}>
              {d.def}
            </button>
          ))}
        </div>
      </div>
      {done && <FeedbackBadge score={score} maxScore={8} msg={score >= 6 ? 'Vel gert – þú þekkir persónurnar!' : 'Lestu um persónurnar aftur og prófaðu.'} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// 5 – Eyðufylling með orðabanka (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const FILL_DATA = [
  { before: 'Hulda og Halima nota teppi og stóla til að búa til', blank: 'hús', after: 'í stofunni.' },
  { before: 'Á hrekkjavöku fara margir krakkar í', blank: 'búning', after: 'og ganga í hús.' },
  { before: 'Árni er', blank: 'verslunarstjóri', after: 'í Nettó.' },
  { before: 'Elsa vinnur stundum á', blank: 'kvöldin', after: 'og nóttunni á sjúkrahúsinu.' },
];
const WORD_BANK = shuffle(['hús', 'búning', 'verslunarstjóri', 'kvöldin', 'salur', 'ferilskrá']);

function Section5({ onComplete }) {
  const [answers, setAnswers] = useState(['', '', '', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setLoading(true);
    try {
      const results = await Promise.all(FILL_DATA.map((s, i) =>
        callOpenAI([{ role: 'user', content:
          `Setning: "${s.before} ___ ${s.after}"\nRétt orð: "${s.blank}"\nNemandi skrifaði/valdi: "${answers[i]}"\nMetur hvort svarið sé rétt (smá stafsetningarvilla er í lagi).\nSTIG: [0 eða 1]\nENDURGJÖF: [ein setning á íslensku]` }])
      ));
      const parsed = results.map(parseAI);
      const total = parsed.reduce((s, p) => s + Math.min(p.score, 1) * 2, 0);
      setFeedback({ items: parsed, total });
      setDone(true);
      onComplete(total);
    } catch(e) { setFeedback({ error: true }); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <SectionHeader number="5" title="Settu rétt orð inn í eyðurnar" subtitle="Veldu orð úr orðabankanum." points="8" />
      <div className="flex flex-wrap gap-2 mb-4 p-3 bg-amber-50 rounded-xl border border-amber-100">
        <span className="text-xs font-medium text-amber-700 w-full mb-1">Orðabanki:</span>
        {WORD_BANK.map((w, i) => (
          <span key={i} className="px-3 py-1 rounded-lg bg-white border border-amber-200 text-sm font-light text-gray-700">{w}</span>
        ))}
      </div>
      <div className="flex flex-col gap-3 mb-5">
        {FILL_DATA.map((s, i) => (
          <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <p className="text-sm text-gray-600 font-light mb-2">
              {s.before} <span className="font-medium text-blue-600">___</span> {s.after}
            </p>
            <input value={answers[i]}
              onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
              disabled={done} placeholder="Veldu eða skrifaðu orðið…"
              className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light text-sm disabled:bg-gray-50" />
            {feedback && (
              <div className={`mt-2 text-xs font-light px-2 py-1.5 rounded ${feedback.items[i].score > 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                {feedback.items[i].score > 0 ? '✓' : `✗ Rétt: ${s.blank}`} – {feedback.items[i].msg}
              </div>
            )}
          </div>
        ))}
      </div>
      {!done && (
        <button onClick={submit} disabled={loading || answers.some(a => !a.trim())}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'Bíð…' : 'Athuga svör'}
        </button>
      )}
      {feedback && !feedback.error && (
        <FeedbackBadge score={feedback.total} maxScore={8} msg={feedback.total >= 6 ? 'Glæsilegt! Þú notar orðaforðann rétt.' : 'Góð tilraun – skoðaðu orðabankann aftur.'} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// 6 – Rétt eða rangt (6 stig)
// ─────────────────────────────────────────────────────────────────────────

const RR_DATA = [
  { text: 'Hulda er yngri en Harpa.', correct: true },
  { text: 'Ingibjörg er gift.', correct: false },
  { text: 'Harpa er grænmetisæta.', correct: true },
  { text: 'Eiríkur langar að verða læknir.', correct: false },
  { text: 'Halima er palestínsk.', correct: true },
  { text: 'Árni vinnur á Landspítalanum.', correct: false },
];

function Section6({ onComplete }) {
  const items = useRef(shuffle(RR_DATA));
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(null);

  const pick = (i, val) => {
    if (done) return;
    const newA = { ...answers, [i]: val };
    setAnswers(newA);
    if (Object.keys(newA).length === items.current.length) {
      let c = 0;
      Object.entries(newA).forEach(([i, v]) => { if (v === items.current[i].correct) c++; });
      setScore(c); setDone(true); onComplete(c);
    }
  };

  return (
    <div className="fade-in">
      <SectionHeader number="6" title="Rétt eða rangt?" subtitle="Smelltu á Rétt eða Rangt fyrir hverja fullyrðingu." points="6" />
      <div className="flex flex-col gap-3">
        {items.current.map((item, i) => (
          <div key={i} className={`bg-white rounded-xl border shadow-sm p-4 transition-all
            ${done ? item.correct === answers[i] ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50' : 'border-gray-100'}`}>
            <p className="text-sm text-gray-700 font-light mb-3">{item.text}</p>
            <div className="flex gap-2">
              {[true, false].map(val => (
                <button key={String(val)} onClick={() => pick(i, val)}
                  className={`flex-1 py-2 rounded-lg border-2 text-sm font-light transition-all
                    ${done
                      ? answers[i] === val
                        ? val === item.correct ? 'bg-green-100 border-green-400 text-green-800' : 'bg-red-100 border-red-400 text-red-800'
                        : val === item.correct ? 'bg-green-50 border-green-300 text-green-700' : 'bg-gray-50 border-gray-200 text-gray-400'
                      : answers[i] === val ? 'bg-blue-100 border-blue-400 text-blue-800' : 'bg-white border-gray-200 hover:border-blue-300 text-gray-600'}`}>
                  {val ? 'Rétt' : 'Rangt'}
                </button>
              ))}
            </div>
            {done && answers[i] !== item.correct && (
              <p className="text-xs text-red-600 font-light mt-2">✗ Rétt svar: {item.correct ? 'Rétt' : 'Rangt'}</p>
            )}
          </div>
        ))}
      </div>
      {done && <FeedbackBadge score={score} maxScore={6} msg={score === 6 ? 'Fullkomið! Allar fullyrðingar réttar.' : `${score} af 6 rétt.`} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// 7 – Lestu og svaraðu (10 stig)
// ─────────────────────────────────────────────────────────────────────────

const TEXT7 = `Hulda og Halima eru góðar vinkonur og leika sér oft saman. Í dag er rigning úti og þær ákváðu að leika heima hjá Huldu í stofunni, en ekki í herberginu hennar Huldu því þar er mikið drasl – hún hafði ekki tekið til eins og pabbi hennar bað hana um. Þær búa til hús úr teppum og setja þau yfir stóla og borð. Þær þurfa að passa sig á að rekast ekki í neitt því það er margt brothætt í stofunni. Allt í einu finna þær góða lykt. Mamma Huldu var að baka í eldhúsinu og bauð þeim upp á sjónvarpsköku. Þær borða kökuna með bestu lyst og halda svo áfram að leika.`;

const QS7 = [
  'Hvers vegna leika Hulda og Halima í stofunni en ekki í herberginu?',
  'Hvernig búa þær til hús í stofunni?',
];

function Section7({ onComplete }) {
  const [answers, setAnswers] = useState(['', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setLoading(true);
    try {
      const results = await Promise.all(QS7.map((q, i) =>
        callOpenAI([{ role: 'user', content:
          `Texti: "${TEXT7}"\n\nSpurning: "${q}"\nNemandi svaraði: "${answers[i]}"\n\nMetur svar nemanda. Þarf ekki að vera fullkomið – meginmerking þarf að koma fram. Vera hvetjandi.\nSTIG: [0-5]\nENDURGJÖF: [ein setning á íslensku]` }])
      ));
      const parsed = results.map(parseAI);
      const total = parsed.reduce((s, p) => s + p.score, 0);
      setFeedback({ items: parsed, total });
      setDone(true);
      onComplete(total);
    } catch(e) { setFeedback({ error: true }); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <SectionHeader number="7" title="Lestu og svaraðu" subtitle="Lestu textann og svaraðu spurningunum með eigin orðum." points="10" />
      <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-5">
        <p className="text-sm text-gray-700 font-light leading-relaxed">{TEXT7}</p>
      </div>
      <div className="flex flex-col gap-4 mb-5">
        {QS7.map((q, i) => (
          <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <p className="text-sm font-medium text-gray-800 mb-2">{i + 1}. {q}</p>
            <textarea value={answers[i]}
              onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
              disabled={done} rows={3} placeholder="Skrifaðu svar hér…"
              className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50" />
            {feedback && <FeedbackBadge score={feedback.items[i].score} maxScore={5} msg={feedback.items[i].msg} />}
          </div>
        ))}
      </div>
      {!done && (
        <button onClick={submit} disabled={loading || answers.some(a => a.trim().length < 3)}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'AI er að meta…' : 'Senda svör'}
        </button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// NIÐURSTÖÐUR
// ─────────────────────────────────────────────────────────────────────────

function Results({ scores }) {
  const sections = [
    { title: 'Myndir', max: 8 },
    { title: 'Paraðu orð og skýringar', max: 8 },
    { title: 'Flokkaðu orðin', max: 6 },
    { title: 'Tengdu persónu', max: 8 },
    { title: 'Eyðufylling', max: 8 },
    { title: 'Rétt eða rangt', max: 6 },
    { title: 'Lestu og svaraðu', max: 10 },
  ];
  const total = scores.reduce((s, x) => s + x, 0);
  const maxTotal = 54;
  const pct = Math.round((total / maxTotal) * 100);
  const color = pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';
  const colorMap = { green: 'text-green-600', amber: 'text-amber-600', red: 'text-red-600' };

  return (
    <div className="fade-in">
      <div className="text-center mb-8">
        <div className={`text-6xl font-light mb-1 ${colorMap[color]}`}>
          {total}<span className="text-2xl text-gray-400">/{maxTotal}</span>
        </div>
        <div className="text-gray-500 font-light mb-2">{pct}%</div>
        <div className={`text-lg font-medium ${colorMap[color]}`}>
          {pct >= 80 ? '🌟 Framúrskarandi!' : pct >= 50 ? '👍 Gott starf – haltu áfram!' : '📚 Þarft að æfa meira'}
        </div>
      </div>
      <div className="flex flex-col gap-3 mb-8">
        {sections.map((s, i) => {
          const p = Math.round((scores[i] / s.max) * 100);
          return (
            <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3">
              <div className="flex justify-between items-center mb-1.5">
                <span className="text-sm font-light text-gray-700">{i + 1}. {s.title}</span>
                <span className="text-sm font-medium text-gray-600">{scores[i]}/{s.max}</span>
              </div>
              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div className={`h-full rounded-full transition-all duration-700 ${p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-amber-400' : 'bg-red-400'}`}
                  style={{ width: `${p}%` }} />
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={() => window.location.reload()}
        className="w-full px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
        🔄 Byrja aftur
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────

const SECTIONS = [Section1, Section2, Section3, Section4, Section5, Section6, Section7];
const TOTAL = SECTIONS.length;

function App() {
  const [section, setSection] = useState(0);
  const [scores, setScores] = useState(Array(TOTAL).fill(0));
  const [sectionDone, setSectionDone] = useState(false);

  const handleComplete = (score) => {
    setScores(prev => { const s = [...prev]; s[section] = score; return s; });
    setSectionDone(true);
  };

  const next = () => {
    setSection(s => s + 1);
    setSectionDone(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const isDone = section >= TOTAL;
  const isLast = section === TOTAL - 1;
  const Current = !isDone ? SECTIONS[section] : null;

  return (
    <div>
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-2xl mx-auto px-6 py-6">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-2xl font-light text-gray-800 mb-1">Æfingapróf – Fólkið í hverfinu</h1>
          <p className="text-gray-500 text-sm font-light">Sýnishorn · ÍSAT1ÍA · malstodin.org</p>
        </div>
      </header>
      <main className="max-w-2xl mx-auto px-6 py-8">
        {!isDone && <ProgressBar current={section} total={TOTAL} />}
        {isDone ? (
          <Results scores={scores} />
        ) : (
          <>
            <Current onComplete={handleComplete} />
            {sectionDone && (
              <NextBtn onClick={next} label={isLast ? 'Sjá niðurstöður →' : 'Næsti liður →'} />
            )}
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
