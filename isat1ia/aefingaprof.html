<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Æfingapróf – Fólkið í hverfinu</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
    .drag-item {
      cursor: grab;
      user-select: none;
    }
    .drag-item:active { cursor: grabbing; }
    .drop-zone {
      min-height: 44px;
      transition: background 0.15s;
    }
    .drop-zone.over { background: #eff6ff; border-color: #3b82f6 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useCallback } = React;

// ── Helpers ──────────────────────────────────────────────────────────────

async function callOpenAI(messages) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens: 150, model: 'gpt-4o-mini', temperature: 0.2 })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

function parseAI(text) {
  const s = text.match(/STIG:\s*(\d)/);
  const e = text.match(/ENDURGJÖF:\s*(.+)/);
  return {
    score: s ? parseInt(s[1]) : 0,
    msg: e ? e[1].trim() : text.trim()
  };
}

// ── Shared components ──────────────────────────────────────────────────

const ProgressBar = ({ current, total }) => (
  <div className="flex items-center gap-2 mb-6">
    {Array.from({ length: total }).map((_, i) => (
      <div key={i} className={`h-1.5 flex-1 rounded-full transition-all duration-500
        ${i < current ? 'bg-green-500' : i === current ? 'bg-blue-400' : 'bg-gray-200'}`} />
    ))}
    <span className="text-xs text-gray-400 font-light whitespace-nowrap">{current}/{total}</span>
  </div>
);

const SectionHeader = ({ number, title, subtitle, points }) => (
  <div className="mb-5">
    <div className="flex items-center gap-3 mb-1">
      <span className="w-7 h-7 rounded-full bg-blue-600 text-white text-sm flex items-center justify-center font-medium">{number}</span>
      <h2 className="text-lg font-medium text-gray-800">{title}</h2>
      <span className="ml-auto text-sm text-gray-400 font-light">{points} stig</span>
    </div>
    {subtitle && <p className="text-sm text-gray-500 font-light ml-10">{subtitle}</p>}
  </div>
);

const FeedbackBadge = ({ score, maxScore, msg, color }) => {
  const c = color || (score >= maxScore * 0.8 ? 'green' : score >= maxScore * 0.5 ? 'amber' : 'red');
  const cls = {
    green: 'bg-green-50 border-green-200 text-green-800',
    amber: 'bg-amber-50 border-amber-200 text-amber-800',
    red: 'bg-red-50 border-red-200 text-red-800',
  }[c];
  return (
    <div className={`mt-3 p-3 rounded-lg border ${cls} fade-in`}>
      <div className="font-medium text-sm mb-0.5">{score}/{maxScore} stig</div>
      <p className="text-sm font-light">{msg}</p>
    </div>
  );
};

const NextBtn = ({ onClick, label }) => (
  <button onClick={onClick}
    className="mt-6 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light fade-in">
    {label || 'Næsti liður →'}
  </button>
);

// ─────────────────────────────────────────────────────────────────────────
// LIÐUR 1 – Myndir (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const IMAGES = [
  { emoji: '🎃', word: 'grasker',         hint: 'Þetta er appelsínugult grænmeti/ávöxtur sem fólk skreytir á hrekkjavöku.' },
  { emoji: '🧄', word: 'hvítlaukur',       hint: 'Þetta er kryddgrænmeti með sterka lykt, notað í eldamennsku.' },
  { emoji: '🥦', word: 'blómkál',          hint: 'Þetta er grænt grænmeti sem lítur út eins og tré.' },
  { emoji: '🫘', word: 'kjúklingabaunir',  hint: 'Þetta eru litlar, kringlóttar, brúnar/hvítar baunir.' },
];

function Section1({ onComplete }) {
  const [answers, setAnswers] = useState(['', '', '', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setLoading(true);
    try {
      const results = await Promise.all(IMAGES.map((img, i) =>
        callOpenAI([{ role: 'user', content:
          `Nemandi á að skrifa íslenska orðið fyrir þessa mynd: ${img.emoji} (rétt svar: "${img.word}"). Nemandi skrifaði: "${answers[i]}".
Svaraðu EINUNGIS á þessu formi:\nSTIG: [0 eða 1]\nENDURGJÖF: [ein stuttur setning á íslensku]` }])
      ));
      const parsed = results.map(parseAI);
      const total = parsed.reduce((s, p) => s + Math.min(p.score, 1) * 2, 0);
      setFeedback({ items: parsed, total });
      setDone(true);
      onComplete(total);
    } catch(e) {
      setFeedback({ error: true });
    }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <SectionHeader number="1" title="Hvað er þetta? Skrifaðu rétt orð" subtitle="Skrifaðu íslenska heitið undir hverja mynd." points="8" />
      <div className="grid grid-cols-2 gap-4 mb-5">
        {IMAGES.map((img, i) => (
          <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex flex-col items-center gap-3">
            <span className="text-5xl">{img.emoji}</span>
            <input
              value={answers[i]}
              onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
              disabled={done}
              placeholder="Orðið…"
              className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light text-center disabled:bg-gray-50"
            />
            {feedback && (
              <div className={`text-xs font-light px-2 py-1 rounded ${feedback.items[i].score > 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                {feedback.items[i].score > 0 ? '✓ Rétt' : `✗ Rétt: ${IMAGES[i].word}`} – {feedback.items[i].msg}
              </div>
            )}
          </div>
        ))}
      </div>
      {!done && (
        <button onClick={submit} disabled={loading || answers.some(a => !a.trim())}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'Bíð…' : 'Athuga svör'}
        </button>
      )}
      {feedback && !feedback.error && (
        <FeedbackBadge score={feedback.total} maxScore={8} msg={feedback.total >= 6 ? 'Frábært! Þú þekkir þennan orðaforða vel.' : 'Haltu áfram að æfa þennan orðaforða.'} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// LIÐUR 2 – Paraðu saman (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const PAIRS = [
  { word: 'kósíkvöld',    def: 'kvöld þar sem fólk slappir af saman, horfir á mynd og borðar gos og nammi' },
  { word: 'meðlæti',      def: 'hlutir sem koma með aðalréttinn, t.d. hrísgrjón eða salat' },
  { word: 'uppskrift',    def: 'listi af hráefnum og leiðbeiningar um hvernig á að elda rétt' },
  { word: 'iðngrein',     def: 'verk sem krefst sérstakrar handanlegrar þjálfunar, t.d. múrari eða pípari' },
];

function Section2({ onComplete }) {
  const [selected, setSelected] = useState(null);
  const [matches, setMatches] = useState({});
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(null);

  const shuffledDefs = useRef([...PAIRS].sort(() => Math.random() - 0.5));

  const handleWord = (i) => {
    if (done || matches[i] !== undefined) return;
    setSelected({ type: 'word', i });
  };

  const handleDef = (j) => {
    if (done) return;
    if (selected?.type === 'word') {
      const newMatches = { ...matches, [selected.i]: j };
      setMatches(newMatches);
      setSelected(null);
      if (Object.keys(newMatches).length === PAIRS.length) {
        let correct = 0;
        Object.entries(newMatches).forEach(([wi, di]) => {
          if (shuffledDefs.current[di].word === PAIRS[wi].word) correct++;
        });
        const s = correct * 2;
        setScore(s);
        setDone(true);
        onComplete(s);
      }
    }
  };

  const getDefIdx = (wordIdx) => matches[wordIdx];
  const isWordMatched = (i) => matches[i] !== undefined;
  const isDefMatched = (j) => Object.values(matches).includes(j);

  const defCorrect = (wi, di) => shuffledDefs.current[di].word === PAIRS[wi].word;

  return (
    <div className="fade-in">
      <SectionHeader number="2" title="Paraðu saman orð og skýringar" subtitle="Smelltu á orð og síðan á rétta skýringu." points="8" />
      <div className="grid grid-cols-2 gap-4">
        <div className="flex flex-col gap-2">
          {PAIRS.map((p, i) => (
            <button key={i} onClick={() => handleWord(i)}
              className={`px-4 py-3 rounded-lg border-2 text-left font-light text-sm transition-all
                ${done
                  ? defCorrect(i, getDefIdx(i))
                    ? 'bg-green-50 border-green-300 text-green-800'
                    : 'bg-red-50 border-red-300 text-red-800'
                  : isWordMatched(i)
                    ? 'bg-blue-50 border-blue-300 text-blue-800'
                    : selected?.type === 'word' && selected.i === i
                      ? 'bg-blue-100 border-blue-500 text-blue-900'
                      : 'bg-white border-gray-200 hover:border-blue-300 text-gray-700'
                }`}>
              {p.word}
              {done && !defCorrect(i, getDefIdx(i)) && <span className="block text-xs mt-1 text-red-600">→ {PAIRS[i].def.substring(0,40)}…</span>}
            </button>
          ))}
        </div>
        <div className="flex flex-col gap-2">
          {shuffledDefs.current.map((d, j) => (
            <button key={j} onClick={() => handleDef(j)}
              className={`px-4 py-3 rounded-lg border-2 text-left font-light text-xs transition-all
                ${done
                  ? 'bg-gray-50 border-gray-200 text-gray-600 cursor-default'
                  : isDefMatched(j)
                    ? 'bg-blue-50 border-blue-300 text-blue-800 cursor-default'
                    : selected?.type === 'word'
                      ? 'bg-white border-amber-300 hover:bg-amber-50 text-gray-700 cursor-pointer'
                      : 'bg-white border-gray-200 text-gray-500 cursor-default'
                }`}>
              {d.def}
            </button>
          ))}
        </div>
      </div>
      {done && (
        <FeedbackBadge score={score} maxScore={8}
          msg={score >= 6 ? 'Vel gert – þú þekkir þennan orðaforða!' : 'Skoðaðu skýringarnar aftur og æfðu þig.'} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// LIÐUR 3 – Flokkaðu orðin (6 stig)
// ─────────────────────────────────────────────────────────────────────────

const CLASSIFY_WORDS = [
  { word: 'laukur',          correct: 0 },
  { word: 'paprika',         correct: 0 },
  { word: 'hrekkjavaka',     correct: 1 },
  { word: 'búningur',        correct: 1 },
  { word: 'múrari',          correct: 2 },
  { word: 'hárgreiðslukona', correct: 2 },
];
const CATS = ['🥦 Matvæli', '🎭 Hátíðir', '🔧 Starfsheiti'];

function Section3({ onComplete }) {
  const [placements, setPlacements] = useState({});
  const [dragWord, setDragWord] = useState(null);
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(null);

  const unplaced = CLASSIFY_WORDS.filter((_, i) => placements[i] === undefined);
  const placed = (catIdx) => CLASSIFY_WORDS.filter((_, i) => placements[i] === catIdx);

  const handleDrop = (catIdx) => {
    if (dragWord === null || done) return;
    const newP = { ...placements, [dragWord]: catIdx };
    setPlacements(newP);
    setDragWord(null);
    if (Object.keys(newP).length === CLASSIFY_WORDS.length) {
      let correct = 0;
      Object.entries(newP).forEach(([wi, ci]) => {
        if (CLASSIFY_WORDS[wi].correct === ci) correct++;
      });
      setScore(correct);
      setDone(true);
      onComplete(correct);
    }
  };

  const handleDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('over'); };
  const handleDragLeave = (e) => { e.currentTarget.classList.remove('over'); };
  const handleDropEvt = (e, catIdx) => { e.currentTarget.classList.remove('over'); handleDrop(catIdx); };

  const wordBg = (wi) => {
    if (!done) return 'bg-white border-gray-200 hover:border-blue-300 text-gray-700';
    return CLASSIFY_WORDS[wi].correct === placements[wi]
      ? 'bg-green-50 border-green-300 text-green-800'
      : 'bg-red-50 border-red-300 text-red-800';
  };

  return (
    <div className="fade-in">
      <SectionHeader number="3" title="Flokkaðu orðin" subtitle="Dragðu hvert orð í réttan flokk." points="6" />

      {unplaced.length > 0 && (
        <div className="flex flex-wrap gap-2 mb-4 p-3 bg-amber-50 rounded-xl border border-amber-100">
          {CLASSIFY_WORDS.map((w, i) => placements[i] === undefined && (
            <span key={i}
              draggable
              onDragStart={() => setDragWord(i)}
              className={`drag-item px-3 py-1.5 rounded-lg border-2 text-sm font-light cursor-grab bg-white border-gray-200 hover:border-blue-300 text-gray-700`}>
              {w.word}
            </span>
          ))}
        </div>
      )}

      <div className="grid grid-cols-3 gap-3">
        {CATS.map((cat, ci) => (
          <div key={ci}
            onDragOver={handleDragOver}
            onDragLeave={handleDragLeave}
            onDrop={e => handleDropEvt(e, ci)}
            className="drop-zone rounded-xl border-2 border-dashed border-gray-200 p-3 min-h-24">
            <div className="text-xs font-medium text-gray-500 mb-2">{cat}</div>
            <div className="flex flex-col gap-1.5">
              {placed(ci).map((w, j) => {
                const wi = CLASSIFY_WORDS.indexOf(w);
                return (
                  <span key={j} className={`px-3 py-1.5 rounded-lg border-2 text-sm font-light ${wordBg(wi)}`}>
                    {w.word}
                    {done && w.correct !== ci && <span className="ml-1 text-xs">→ {CATS[w.correct].split(' ')[1]}</span>}
                  </span>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {done && (
        <FeedbackBadge score={score} maxScore={6}
          msg={score === 6 ? 'Fullkomið! Öll orðin í réttum flokki.' : `${score} af 6 rétt. Skoðaðu orðin sem eru rauð.`} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// LIÐUR 4 – Eyðufylling (8 stig)
// ─────────────────────────────────────────────────────────────────────────

const FILL_SENTENCES = [
  { before: 'Harpa og Eiríkur eiga oft', blank: 'kósíkvöld', after: 'á föstudögum og horfa á bíómynd.' },
  { before: 'Þegar Eiríkur sækir um vinnu þarf hann að búa til góða', blank: 'ferilskrá', after: '.' },
  { before: 'Í', blank: 'heimilisfræði', after: 'læra nemendur að baka brauð og þvo hendur áður en þeir byrja.' },
  { before: 'Hrísgrjón, salat og sósa er', blank: 'meðlæti', after: 'með kjúklingnum.' },
];

function Section4({ onComplete }) {
  const [answers, setAnswers] = useState(['', '', '', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setLoading(true);
    try {
      const results = await Promise.all(FILL_SENTENCES.map((s, i) =>
        callOpenAI([{ role: 'user', content:
          `Setning: "${s.before} ___ ${s.after}"\nRétt orð: "${s.blank}"\nNemandi skrifaði: "${answers[i]}"\nMetur hvort merking og mynd orðsins sé rétt (smá stafsetningarvilla er í lagi).\nSTIG: [0 eða 1]\nENDURGJÖF: [ein setning á íslensku]` }])
      ));
      const parsed = results.map(parseAI);
      const total = parsed.reduce((s, p) => s + Math.min(p.score, 1) * 2, 0);
      setFeedback({ items: parsed, total });
      setDone(true);
      onComplete(total);
    } catch(e) { setFeedback({ error: true }); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <SectionHeader number="4" title="Settu rétt orð inn í eyðurnar" subtitle="Skrifaðu orðið sem vantar í hverja setningu." points="8" />
      <div className="flex flex-col gap-4 mb-5">
        {FILL_SENTENCES.map((s, i) => (
          <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <p className="text-sm text-gray-700 font-light mb-2">
              {s.before} <span className="font-medium text-blue-600">___</span> {s.after}
            </p>
            <input
              value={answers[i]}
              onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
              disabled={done}
              placeholder="Orðið…"
              className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light text-sm disabled:bg-gray-50"
            />
            {feedback && (
              <div className={`mt-2 text-xs font-light px-2 py-1.5 rounded ${feedback.items[i].score > 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                {feedback.items[i].score > 0 ? '✓' : `✗ Rétt: ${FILL_SENTENCES[i].blank}`} – {feedback.items[i].msg}
              </div>
            )}
          </div>
        ))}
      </div>
      {!done && (
        <button onClick={submit} disabled={loading || answers.some(a => !a.trim())}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'Bíð…' : 'Athuga svör'}
        </button>
      )}
      {feedback && !feedback.error && (
        <FeedbackBadge score={feedback.total} maxScore={8}
          msg={feedback.total >= 6 ? 'Glæsilegt! Þú notar þennan orðaforða rétt.' : 'Góð tilraun – lestu setningarnar aftur og prófaðu þig.'} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// LIÐUR 5 – Lestu og svaraðu (10 stig)
// ─────────────────────────────────────────────────────────────────────────

const TEXT5 = `Harpa og Eiríkur ætluðu að koma Ingibjörgu á óvart. Ingibjörg eldar yfirleitt kvöldmatinn en í kvöld ætluðu Harpa og Eiríkur að elda uppáhalds mat hennar. Þetta er kjúklingur í ofni. Harpa er grænmetisæta og þess vegna gerðu þau líka kjúklingabaunarétt með grænmeti. Meðlætið var hrísgrjón, sósa og salat. Þau fóru í Bónus og keyptu heilan kjúkling, papriku, lauk og kókosmjólk. Þegar þau voru að fara úr búðinni fáttu þau að þau höfðu gleymt kjúklingabaunum. Harpa fór aftur inn og Eiríkur setti vörurnar í poka. Þegar Ingibjörg kom heim var hún hissa og mjög ánægð.`;

const QS5 = [
  'Hvers vegna gerðu Harpa og Eiríkur tvo rétti í kvöld?',
  'Hvað gerðist þegar þau voru að fara úr Bónus?',
];

function Section5({ onComplete }) {
  const [answers, setAnswers] = useState(['', '']);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setLoading(true);
    try {
      const results = await Promise.all(QS5.map((q, i) =>
        callOpenAI([{ role: 'user', content:
          `Texti: "${TEXT5}"\n\nSpurning: "${q}"\nNemandi svaraði: "${answers[i]}"\n\nMetur svar nemanda. Þarf ekki að vera fullkomið – meginmerkingu þarf að koma fram. Vera hvetjandi.\nSTIG: [0-5]\nENDURGJÖF: [ein setning á íslensku]` }])
      ));
      const parsed = results.map(parseAI);
      const total = parsed.reduce((s, p) => s + p.score, 0);
      setFeedback({ items: parsed, total });
      setDone(true);
      onComplete(total);
    } catch(e) { setFeedback({ error: true }); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <SectionHeader number="5" title="Lestu og svaraðu" subtitle="Lestu textann og svaraðu spurningunum." points="10" />
      <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-5">
        <p className="text-sm text-gray-700 font-light leading-relaxed">{TEXT5}</p>
      </div>
      <div className="flex flex-col gap-4 mb-5">
        {QS5.map((q, i) => (
          <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <p className="text-sm font-medium text-gray-800 mb-2">{i + 1}. {q}</p>
            <textarea
              value={answers[i]}
              onChange={e => { const a = [...answers]; a[i] = e.target.value; setAnswers(a); }}
              disabled={done}
              rows={3}
              placeholder="Skrifaðu svar hér…"
              className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light text-sm resize-none disabled:bg-gray-50"
            />
            {feedback && (
              <FeedbackBadge score={feedback.items[i].score} maxScore={5} msg={feedback.items[i].msg} />
            )}
          </div>
        ))}
      </div>
      {!done && (
        <button onClick={submit} disabled={loading || answers.some(a => a.trim().length < 3)}
          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'AI er að meta…' : 'Senda svör'}
        </button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// NIÐURSTÖÐUR
// ─────────────────────────────────────────────────────────────────────────

function Results({ scores }) {
  const sections = [
    { title: 'Myndir', max: 8 },
    { title: 'Paraðu saman', max: 8 },
    { title: 'Flokkaðu orðin', max: 6 },
    { title: 'Eyðufylling', max: 8 },
    { title: 'Lestu og svaraðu', max: 10 },
  ];
  const total = scores.reduce((s, x) => s + x, 0);
  const maxTotal = 40;
  const pct = Math.round((total / maxTotal) * 100);
  const color = pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';
  const colorMap = { green: 'text-green-600', amber: 'text-amber-600', red: 'text-red-600' };
  const bgMap = { green: 'bg-green-500', amber: 'bg-amber-500', red: 'bg-red-400' };

  return (
    <div className="fade-in">
      <div className="text-center mb-8">
        <div className={`text-6xl font-light mb-1 ${colorMap[color]}`}>{total}<span className="text-2xl text-gray-400">/{maxTotal}</span></div>
        <div className="text-gray-500 font-light">{pct}%</div>
        <div className={`text-lg font-medium mt-2 ${colorMap[color]}`}>
          {pct >= 80 ? '🌟 Framúrskarandi!' : pct >= 50 ? '👍 Gott starf – haltu áfram!' : '📚 Þarft að æfa meira'}
        </div>
      </div>

      <div className="flex flex-col gap-3 mb-8">
        {sections.map((s, i) => {
          const p = Math.round((scores[i] / s.max) * 100);
          return (
            <div key={i} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3">
              <div className="flex justify-between items-center mb-1.5">
                <span className="text-sm font-light text-gray-700">{i + 1}. {s.title}</span>
                <span className="text-sm font-medium text-gray-600">{scores[i]}/{s.max}</span>
              </div>
              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div className={`h-full rounded-full transition-all duration-700 ${p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-amber-400' : 'bg-red-400'}`}
                  style={{ width: `${p}%` }} />
              </div>
            </div>
          );
        })}
      </div>

      <button onClick={() => window.location.reload()}
        className="w-full px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
        🔄 Byrja aftur
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// AÐALFORRITIÐ
// ─────────────────────────────────────────────────────────────────────────

function App() {
  const [section, setSection] = useState(0);
  const [scores, setScores] = useState([0, 0, 0, 0, 0]);
  const [sectionDone, setSectionDone] = useState(false);

  const TOTAL = 5;

  const handleComplete = (score) => {
    const s = [...scores];
    s[section] = score;
    setScores(s);
    setSectionDone(true);
  };

  const next = () => {
    setSection(s => s + 1);
    setSectionDone(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const isLast = section === TOTAL - 1;
  const isDone = section >= TOTAL;

  return (
    <div>
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-2xl mx-auto px-6 py-6">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-2xl font-light text-gray-800 mb-1">Æfingapróf – Fólkið í hverfinu</h1>
          <p className="text-gray-500 text-sm font-light">Sýnishorn · ÍSAT1ÍA · malstodin.org</p>
        </div>
      </header>

      <main className="max-w-2xl mx-auto px-6 py-8">
        {!isDone && <ProgressBar current={section} total={TOTAL} />}

        {isDone ? (
          <Results scores={scores} />
        ) : (
          <>
            {section === 0 && <Section1 onComplete={handleComplete} />}
            {section === 1 && <Section2 onComplete={handleComplete} />}
            {section === 2 && <Section3 onComplete={handleComplete} />}
            {section === 3 && <Section4 onComplete={handleComplete} />}
            {section === 4 && <Section5 onComplete={handleComplete} />}

            {sectionDone && (
              <NextBtn onClick={next} label={isLast ? 'Sjá niðurstöður →' : 'Næsti liður →'} />
            )}
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
