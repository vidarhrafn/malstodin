<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innskráning – Málstöðin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4">

  <div id="loading" class="text-center">
    <div class="text-4xl mb-4">🎓</div>
    <p class="text-gray-500 font-light">Hleður...</p>
  </div>

  <div id="app" style="display:none" class="w-full max-w-sm fade-in"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth, onAuthStateChanged,
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signInWithPopup, GoogleAuthProvider, signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
      authDomain: "malstodin-90f85.firebaseapp.com",
      projectId: "malstodin-90f85",
      storageBucket: "malstodin-90f85.firebasestorage.app",
      messagingSenderId: "190485777754",
      appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
    };

    const COURSE = 'isat1ia';
    const REDIRECT = '/isat1ia/';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── Hjálparföll ──────────────────────────────────────────────

    async function hasAccess(uid) {
      try {
        const snap = await getDoc(doc(db, 'user_access', uid));
        if (!snap.exists()) return false;
        const courseData = snap.data()[COURSE];
        if (!courseData || !courseData.activated_at) return false;
        if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) return false;
        return true;
      } catch { return false; }
    }

    async function redeemCode(code, user) {
      const uid = user.uid;
      // Sækja kóðann úr access_codes (document ID = kóðinn sjálfur)
      const codeRef = doc(db, 'access_codes', code.trim().toUpperCase());
      const codeSnap = await getDoc(codeRef);

      if (!codeSnap.exists()) throw new Error('Kóðinn er ekki til.');
      const codeData = codeSnap.data();
      if (codeData.activated) throw new Error('Þessi kóði hefur þegar verið notaður.');
      if (codeData.course !== COURSE) throw new Error('Þessi kóði gildir ekki fyrir þetta námskeið.');
      if (codeData.expires_at && codeData.expires_at.toDate() < new Date()) throw new Error('Þessi kóði er útrunninn.');

      // Merkja kóðann sem notaðan
      await updateDoc(codeRef, { activated: true });

      // Bæta aðgangi við notanda (nested map)
      const userRef = doc(db, 'user_access', uid);
      const userSnap = await getDoc(userRef);
      const existing = userSnap.exists() ? userSnap.data() : {};

      await setDoc(userRef, {
        ...existing,
        email: user.email,
        [COURSE]: {
          activated_at: serverTimestamp(),
          code_used: code.trim().toUpperCase(),
          expires_at: codeData.expires_at || null,
          class: codeData.class || null,
          semester: codeData.semester || null
        }
      });
    }

    // ── Birting ──────────────────────────────────────────────────

    function show(html) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('app');
      el.style.display = 'block';
      el.innerHTML = html;
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }

    // ── Viðmót: Innskráning ───────────────────────────────────────

    function renderLogin(errorMsg = '') {
      show(`
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 fade-in">
          <div class="text-center mb-8">
            <div class="text-5xl mb-3">🎓</div>
            <h1 class="text-2xl font-light text-gray-800">Málstöðin</h1>
            <p class="text-gray-500 text-sm font-light mt-1">Íslenska · A1–A2</p>
          </div>

          <div id="err" class="mb-4 text-red-600 text-sm font-light text-center">${errorMsg}</div>

          <!-- Google -->
          <button id="btn-google"
            class="w-full flex items-center justify-center gap-3 px-4 py-3 border-2 border-gray-200
                   rounded-lg hover:bg-gray-50 transition-colors font-light text-gray-700 mb-4">
            <svg class="w-5 h-5" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.4-4z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36 24 36c-5.3 0-9.5-2.9-11.3-7.1l-6.6 4.9C9.7 39.7 16.3 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.3 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
            </svg>
            Skrá inn með Google
          </button>

          <div class="relative mb-4">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
            <div class="relative flex justify-center">
              <span class="bg-white px-3 text-xs text-gray-400 font-light">eða með tölvupósti</span>
            </div>
          </div>

          <input id="email" type="email" placeholder="Tölvupóstfang"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none
                   focus:ring-2 focus:ring-blue-500 font-light mb-3 text-sm" />
          <input id="pw" type="password" placeholder="Lykilorð"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none
                   focus:ring-2 focus:ring-blue-500 font-light mb-4 text-sm" />

          <button id="btn-login"
            class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                   transition-colors font-light mb-2">
            Skrá inn
          </button>
          <button id="btn-register"
            class="w-full px-4 py-3 border-2 border-gray-200 text-gray-600 rounded-lg
                   hover:bg-gray-50 transition-colors font-light text-sm">
            Búa til nýjan reikning
          </button>
        </div>
      `);

      document.getElementById('btn-google').onclick = async () => {
        showError('err', '');
        try {
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider);
        } catch (e) { showError('err', 'Villa við Google-innskráningu.'); }
      };

      document.getElementById('btn-login').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const pw    = document.getElementById('pw').value;
        showError('err', '');
        if (!email || !pw) { showError('err', 'Fylltu inn tölvupóst og lykilorð.'); return; }
        try {
          await signInWithEmailAndPassword(auth, email, pw);
        } catch { showError('err', 'Rangt tölvupóstfang eða lykilorð.'); }
      };

      document.getElementById('btn-register').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const pw    = document.getElementById('pw').value;
        showError('err', '');
        if (!email || !pw) { showError('err', 'Fylltu inn tölvupóst og lykilorð.'); return; }
        if (pw.length < 6) { showError('err', 'Lykilorð verður að vera að minnsta kosti 6 stafir.'); return; }
        try {
          await createUserWithEmailAndPassword(auth, email, pw);
        } catch (e) {
          if (e.code === 'auth/email-already-in-use') showError('err', 'Þetta tölvupóstfang er þegar í notkun.');
          else showError('err', 'Villa við að búa til reikning.');
        }
      };
    }

    // ── Viðmót: Kóðainnlausn ─────────────────────────────────────

    function renderRedeem(user) {
      show(`
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 fade-in">
          <div class="text-center mb-6">
            <div class="text-5xl mb-3">🔑</div>
            <h1 class="text-xl font-light text-gray-800">Aðgangskóði</h1>
            <p class="text-gray-500 text-sm font-light mt-2">
              Sláðu inn kóðann úr bókinni þinni til að fá aðgang að námskeiðinu.
            </p>
          </div>

          <div class="bg-gray-50 rounded-lg px-4 py-2 mb-5 text-center">
            <p class="text-xs text-gray-400 font-light">Innskráð/ur sem</p>
            <p class="text-sm text-gray-700 font-light">${user.email}</p>
          </div>

          <div id="err" class="mb-3 text-red-600 text-sm font-light text-center"></div>

          <input id="code" type="text" placeholder="T.d. ISAT-TEST-2025"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none
                   focus:ring-2 focus:ring-blue-500 font-light mb-4 text-center text-lg tracking-wider uppercase" />

          <button id="btn-redeem"
            class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                   transition-colors font-light mb-3">
            Nota kóða
          </button>
          <button id="btn-logout"
            class="w-full text-center text-sm text-gray-400 hover:text-gray-600 font-light transition-colors">
            Skrá út
          </button>
        </div>
      `);

      document.getElementById('code').oninput = e => {
        e.target.value = e.target.value.toUpperCase();
      };

      document.getElementById('btn-redeem').onclick = async () => {
        const code = document.getElementById('code').value.trim();
        showError('err', '');
        if (!code) { showError('err', 'Sláðu inn kóða.'); return; }

        const btn = document.getElementById('btn-redeem');
        btn.textContent = 'Athuga kóða...';
        btn.disabled = true;

        try {
          await redeemCode(code, user);
          renderSuccess();
        } catch (e) {
          showError('err', e.message);
          btn.textContent = 'Nota kóða';
          btn.disabled = false;
        }
      };

      document.getElementById('btn-logout').onclick = () => signOut(auth);
    }

    // ── Viðmót: Árangur ───────────────────────────────────────────

    function renderSuccess() {
      show(`
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center fade-in">
          <div class="text-5xl mb-4">🎉</div>
          <h1 class="text-xl font-light text-gray-800 mb-2">Velkomin/n!</h1>
          <p class="text-gray-500 text-sm font-light mb-6">
            Aðgangur virkjaður. Þú ert tilbúin/n að byrja.
          </p>
          <button onclick="window.location.href='${REDIRECT}'"
            class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700
                   transition-colors font-light">
            Fara á námskeiðið →
          </button>
        </div>
      `);
      setTimeout(() => { window.location.href = REDIRECT; }, 2500);
    }

    // ── Auth ástand ────────────────────────────────────────────────

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        renderLogin();
        return;
      }
      const access = await hasAccess(user.uid);
      if (access) {
        window.location.href = REDIRECT;
      } else {
        renderRedeem(user);
      }
    });
  </script>
</body>
</html>
