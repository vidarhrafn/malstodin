  const COURSE = 'isat1ic';
  const LOGIN = '../login.html';
  const EXERCISE_ID = 'sjalfsprof1';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let authReady = false;
  const authReadyPromise = new Promise(resolve => {
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = LOGIN; return; }
      try {
        const snap = await getDoc(doc(db, 'user_access', user.uid));
        if (!snap.exists()) { window.location.href = LOGIN; return; }
        const courseData = snap.data()[COURSE];
        if (!courseData || !courseData.activated_at) { window.location.href = LOGIN; return; }
        if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) {
          window.location.href = LOGIN; return;
        }
      } catch { window.location.href = LOGIN; return; }
      authReady = true;
      resolve(user);
      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('root').style.display = 'block';
    });
  });

  async function writeProgress(status) {
    try {
      await authReadyPromise;
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, COURSE, EXERCISE_ID);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch(e) { console.error('Progress write failed:', e); }
  }
  window.writeProgress = writeProgress;

  authReadyPromise.then(() => writeProgress('opened'));
</script>

// ── Helpers ──────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function callOpenAI(messages, max_tokens = 300, model = 'gpt-4o-mini', temperature = 0.3) {
  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, max_tokens, model, temperature })
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

async function playAudio(text, onEnd) {
  try {
    const r = await fetch('/.netlify/functions/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text_to_speak: text })
    });
    const data = await r.json();
    if (!r.ok || data.error || !data.audio_base64) { onEnd && onEnd(); return; }
    const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
    audio.onended = () => onEnd && onEnd();
    audio.onerror = () => onEnd && onEnd();
    await audio.play().catch(() => onEnd && onEnd());
    return audio;
  } catch(e) { console.error(e); onEnd && onEnd(); }
}

// ── Tab 1: Þýðingar ───────────────────────────────────────────────────────
const ThyddingaTab = ({ nativeLang, onDone, onScore }) => {
  const words5 = useMemo(() => shuffle(ALL_WORDS).slice(0, 5), []);

  const [idx, setIdx]           = useState(0);
  const [input, setInput]       = useState('');
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading]   = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [scores, setScores]     = useState([]);
  const [done, setDone]         = useState(false);

  const current = words5[idx];

  const speak = () => {
    if (speaking) return;
    setSpeaking(true);
    playAudio(current.word, () => setSpeaking(false));
  };

  const check = async () => {
    if (!input.trim() || loading) return;
    setLoading(true);
    try {
      const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.
Íslenska orðið: "${current.word}"
Svar nemanda: "${input.trim()}"
Móðurmál nemanda: ${nativeLang}

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "score": number (0-5),
  "feedback_is": "Endurgjöf á íslensku (ein setning)",
  "feedback_native": "Endurgjöf á ${nativeLang} (ein setning)",
  "correct_translation": "Rétt þýðing ef rangt, annars null"
}`;
      const raw = await callOpenAI([{ role: 'system', content: sys }], 200, 'gpt-4o', 0.2);
      const clean = raw.replace(/```json\s*/g, '').replace(/```/g, '').trim();
      const parsed = JSON.parse(clean);
      setFeedback(parsed);
      const sc = parsed.score ?? (parsed.correct ? 5 : 0);
      setScores(prev => [...prev, sc]);
    } catch(e) {
      setFeedback({ correct: false, score: 0, feedback_native: 'Villa kom upp. Reyndu aftur.', feedback_is: '' });
      setScores(prev => [...prev, 0]);
    }
    setLoading(false);
  };

  const next = () => {
    if (idx + 1 >= words5.length) {
      const total = [...scores, feedback?.score ?? 0].reduce((a, b) => a + b, 0);
      onScore(total, words5.length * 5);
      onDone();
      setDone(true);
    } else {
      setIdx(idx + 1);
      setInput('');
      setFeedback(null);
    }
  };

  if (done) return (
    <div className="text-center py-12 fade-in">
      <div className="text-4xl mb-3">✅</div>
      <p className="text-gray-600 font-light">Þýðingum lokið!</p>
    </div>
  );

  return (
    <div className="fade-in">
      <div className="flex items-center gap-2 mb-6">
        {words5.map((_, i) => (
          <div key={i} className={`h-1.5 flex-1 rounded-full transition-all duration-500
            ${i < idx ? 'bg-green-500' : i === idx ? 'bg-blue-400' : 'bg-gray-200'}`} />
        ))}
        <span className="text-xs text-gray-400 font-light whitespace-nowrap">{idx+1}/{words5.length}</span>
      </div>

      <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-4 text-center">
        <p className="text-sm text-gray-400 font-light mb-2">{current.kyn}</p>
        <p className="text-3xl font-light text-gray-800 mb-4">{current.word}</p>
        <ListenPill onClick={speak} speaking={speaking} label="Hlustaðu á orðið" />
      </div>

      <p className="text-sm text-gray-500 font-light mb-2">
        Þýddu orðið á <span className="font-medium">{nativeLang}</span>:
      </p>
      <input
        className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light disabled:bg-gray-50 mb-3"
        value={input}
        onChange={e => setInput(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && !feedback && check()}
        placeholder="Þýðingin þín..."
        disabled={!!feedback || loading}
      />

      {!feedback && (
        <button
          onClick={check}
          disabled={!input.trim() || loading}
          className="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light">
          {loading ? 'Metið...' : 'Athuga ✓'}
        </button>
      )}

      {feedback && (
        <div className={`mt-4 p-4 rounded-xl border fade-in ${feedback.correct ? 'bg-green-50 border-green-200' : 'bg-amber-50 border-amber-200'}`}>
          <p className={`text-sm font-medium mb-1 ${feedback.correct ? 'text-green-700' : 'text-amber-700'}`}>
            {feedback.correct ? '✓ Rétt!' : '~ Ekki alveg'}
          </p>
          <p className={`text-sm font-light ${feedback.correct ? 'text-green-700' : 'text-amber-700'}`}>
            {feedback.feedback_native}
          </p>
          {feedback.correct_translation && (
            <p className="text-xs text-gray-500 font-light mt-1">Rétt þýðing: <span className="font-medium">{feedback.correct_translation}</span></p>
          )}
          <button onClick={next}
            className="mt-3 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
            {idx + 1 >= words5.length ? 'Loka flipa →' : 'Næsta orð →'}

        </div>
      )}

};

// ── Tab 2: Matching ────────────────────────────────────────────────────────
const MatchingTab = ({ onDone, onScore }) => {
  const rightShuffled = useMemo(() => shuffle(MATCH_PAIRS.map(p => p.right)), []);
  const [selLeft, setSelLeft] = useState(null);
  const [matched, setMatched] = useState({});
  const [done, setDone]       = useState(false);

  const handleLeft = (i) => {
    if (matched[i] !== undefined) return;
    setSelLeft(selLeft === i ? null : i);
  };

  const handleRight = (right) => {
    if (Object.values(matched).some(m => m.right === right)) return;
    if (selLeft === null) return;
    const correct = MATCH_PAIRS[selLeft].right === right;
    setMatched(prev => ({ ...prev, [selLeft]: { right, correct } }));
    setSelLeft(null);
  };

  useEffect(() => {
    if (Object.keys(matched).length === MATCH_PAIRS.length && !done) {
      const sc = Object.values(matched).filter(m => m.correct).length;
      onScore(sc * 5, MATCH_PAIRS.length * 5);
      setTimeout(() => { onDone(); setDone(true); }, 800);
    }
  }, [matched]);

  const usedRights = Object.values(matched).map(m => m.right);

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-4">
        Smelltu á fyrri hluta setningar og síðan á seinni hlutann sem passar.
      </p>
      <div className="grid grid-cols-2 gap-3">
        <div className="space-y-2">
          {MATCH_PAIRS.map((pair, i) => {
            const m = matched[i];
            let cls = 'match-btn';
            if (m !== undefined) cls += m.correct ? ' correct' : ' incorrect';
            else if (selLeft === i) cls += ' selected-left';
            return (
              <button key={i} onClick={() => handleLeft(i)}
                className={`${cls} w-full text-left px-4 py-3 rounded-lg border-2 border-gray-200 text-sm font-light`}>
                {pair.left}
                {m && <span className="ml-1">{m.correct ? ' ✓' : ' ✗'}</span>}
              </button>
            );
          })}
        </div>
        <div className="space-y-2">
          {rightShuffled.map((right, i) => {
            const isUsed = usedRights.includes(right);
            const matchEntry = Object.values(matched).find(m => m.right === right);
            let cls = 'match-btn';
            if (matchEntry) cls += matchEntry.correct ? ' correct disabled' : ' incorrect disabled';
            else if (selLeft !== null && !isUsed) cls += ' selected-right';
            else if (isUsed) cls += ' disabled';
            return (
              <button key={i} onClick={() => !isUsed && handleRight(right)}
                className={`${cls} w-full text-left px-4 py-3 rounded-lg border-2 border-gray-200 text-sm font-light`}>
                {right}
              </button>
            );
          })}
        </div>
      </div>
      {done && (
        <div className="mt-4 text-center fade-in">
          <p className="text-green-700 font-light text-sm">✓ Pörun lokið!</p>
        </div>
      )}
    </div>
  );
};

// ── Tab 3: Fill in the blank ───────────────────────────────────────────────
const FillTab = ({ onDone, onScore }) => {
  const [selected, setSelected]   = useState(null);
  const [blanks, setBlanks]       = useState(Array(5).fill(null));
  const [submitted, setSubmitted] = useState(false);

  const selectChip = (w) => {
    if (blanks.includes(w)) return;
    setSelected(selected === w ? null : w);
  };

  const fillBlank = (i) => {
    if (submitted) return;
    if (blanks[i]) {
      setSelected(blanks[i]);
      setBlanks(prev => { const n = [...prev]; n[i] = null; return n; });
      return;
    }
    if (!selected) return;
    setBlanks(prev => { const n = [...prev]; n[i] = selected; return n; });
    setSelected(null);
  };

  const submit = () => {
    setSubmitted(true);
    const sc = blanks.filter((b, i) => b === FILL_ANSWERS[i]).length;
    onScore(sc * 5, 5 * 5);
    setTimeout(() => onDone(), 1000);
  };

  const allFilled = blanks.every(b => b !== null);

  return (
    <div className="fade-in">
      <p className="text-sm text-gray-500 font-light mb-4">
        Smelltu á orð í rammanum og síðan á eyðuna þar sem það á heima. Smelltu á fyllta eyðu til að fjarlægja.
      </p>

      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 flex flex-wrap gap-2">
        {FILL_WORDS.map(w => {
          const used = blanks.includes(w);
          let cls = 'word-chip';
          if (used) cls += ' used-chip';
          else if (selected === w) cls += ' selected-chip';
          return (
            <span key={w} className={cls} onClick={() => !used && selectChip(w)}>
              {w}
            </span>
          );
        })}
      </div>

      <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6 text-base font-light leading-loose text-gray-800">
        {FILL_PARTS.map((part, i) => (
          <React.Fragment key={i}>
            {part}
            {i < 5 && (
              <span
                onClick={() => fillBlank(i)}
                className={`fill-blank
                  ${!blanks[i] ? '' : submitted
                    ? blanks[i] === FILL_ANSWERS[i] ? 'correct-fill' : 'wrong-fill'
                    : 'filled'}`}>
                {blanks[i] || '________'}
              </span>
            )}
          </React.Fragment>
        ))}
      </div>

      {submitted && (
        <div className="mt-4 p-4 rounded-xl bg-green-50 border border-green-200 fade-in text-center">
          <p className="text-green-700 font-light text-sm">
            ✓ {blanks.filter((b, i) => b === FILL_ANSWERS[i]).length} / 5 rétt
          </p>
        </div>
      )}

      {!submitted && allFilled && (
        <button onClick={submit}
          className="mt-4 w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
          Athuga svör ✓
        </button>
      )}
    </div>
  );
};

// ── Tab 4: Lesskilningur ──────────────────────────────────────────────────
const LesskilTab = ({ onDone, onScore }) => {
  const shuffledOpts = useMemo(() =>
    RC_QUESTIONS.map(q => ({ ...q, shuffled: shuffle(q.opts.map((o, i) => ({ o, i }))) })), []);

  const [answers, setAnswers]     = useState(Array(RC_QUESTIONS.length).fill(null));
  const [submitted, setSubmitted] = useState(false);

  const select = (qi, oi) => {
    if (submitted) return;
    setAnswers(prev => { const n = [...prev]; n[qi] = oi; return n; });
  };

  const submit = () => {
    setSubmitted(true);
    const sc = answers.filter((a, i) => a === RC_QUESTIONS[i].correct).length;
    onScore(sc * 5, RC_QUESTIONS.length * 5);
    setTimeout(() => onDone(), 1000);
  };

  return (
    <div className="fade-in">
      <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-6">
        <h3 className="font-medium text-gray-800 mb-3">Æfingarnir Söru</h3>
        <p className="text-sm font-light text-gray-700 leading-relaxed">{RC_TEXT}</p>
      </div>

      <div className="space-y-6">
        {shuffledOpts.map((q, qi) => (
          <div key={qi} className="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
            <p className="font-light text-gray-800 mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">
              {q.shuffled.map(({ o, i }) => {
                const isSelected = answers[qi] === i;
                const isCorrect  = i === q.correct;
                let cls = 'ans-opt px-4 py-2 w-full text-left text-sm font-light';
                if (submitted) {
                  if (isCorrect)       cls += ' opt-correct opt-disabled';
                  else if (isSelected) cls += ' opt-incorrect opt-disabled';
                  else                 cls += ' opt-disabled';
                } else {
                  if (isSelected) cls += ' opt-selected';
                }
                return (
                  <button key={i} onClick={() => select(qi, i)} className={cls}>
                    {submitted && isCorrect && '✓ '}
                    {submitted && isSelected && !isCorrect && '✗ '}
                    {o}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {!submitted && answers.every(a => a !== null) && (
        <button onClick={submit}
          className="mt-6 w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
          Athuga svör ✓
        </button>
      )}
      {submitted && (
        <div className="mt-4 p-4 rounded-xl bg-green-50 border border-green-200 fade-in text-center">
          <p className="text-green-700 font-light text-sm">
            ✓ {answers.filter((a, i) => a === RC_QUESTIONS[i].correct).length} / {RC_QUESTIONS.length} rétt
          </p>
        </div>
      )}
    </div>
  );
};
