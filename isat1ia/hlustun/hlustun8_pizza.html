<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Hlustun 8: Anna og Bjarki baka pizzu – ÍSAT1ÍA</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);

    }
    .sticky-player {
      position: sticky;
      top: 0;

      background: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .answer-option {
      border: 2px solid #e0e0e0;
      transition: all 0.2s;

    .answer-option:hover:not(.disabled) {
      border-color: #2196f3;

    }

    .modal-content { 
      background: white;

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // --- OpenAI gateway ---
    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }
    function extractFirstJSON(text){
      const s = text.indexOf('{'); const e = text.lastIndexOf('}');
      if (s < 0 || e < 0 || e <= s) throw new Error('No JSON found');
      return JSON.parse(text.slice(s, e+1));
    }

    // --- Grunnstillingar ---
    const LISTENING_TEXT = `Anna, Bjarki og Lilja eru að baka pizzu. Anna kallar í Sigurð "Ertu ekki orðinn svangur?"

Jú Sigurður segist vera mjög svangur og hlakkar til að borða.

Lilja stráir svolitlu hveiti á borðið og fletur svo deigið með kökukefli.

„Núna þurfum við sósuna," segir Bjarki. Hann opnar pizzusósuna og dreifir henni jafnt yfir pizzabotninn.

Anna tekur rifna ostinn og setur hann á báðar pizzurnar. Svo tekur hún sveppina og sker þá í litla bita.

„Þessi pizza verður með pepperóní og sveppum," segir Bjarki og bendir á fyrstu pizzuna.

„Og sú seinni er með skinku, sveppum og ólífum," segir Anna og setur áleggið á aðra pizzuna.

„Gleymum ekki að setja óreganó!" segir Lilja og setur kryddið á pizzurnar.

Þau setja pizzurnar í ofninn. Þær þurfa að vera þar í um 12 mínútur.

„Vá! Þetta lyktar frábærlega!" segir Sigurður.

„Smakkið!" segir Bjarki stoltur.

Allir hafa góða lyst á pizzunum.

„Þið sáuð um að elda, ég skal ganga frá, vaska upp og þurrka af" segir Sigurður.`;

    const VOCAB = [
      { w: "deig (hk)", hint: "blanda af hveiti og vatni til að baka eða gera pizzu" },
      { w: "hveiti (hk)", hint: "hvítt duft til að baka" },
      { w: "að hlakka til", hint: "að vera spennt/ur fyrir einhverju" },
      { w: "að fletja", hint: "að þrýsta deigi út með höndunum eða kökukefli" },
      { w: "kökukefli (hk)", hint: "tól til að fletja deig" },
      { w: "pizzabotn (kk)", hint: "flatbrauð fyrir pizzu" },
      { w: "að stráir", hint: "að setja þunnt lag af einhverju" },
      { w: "að dreifa", hint: "að setja jafnt yfir" },
      { w: "að skera/sker", hint: "að skera í bita" },
      { w: "álegg (hk)", hint: "matur sem fer ofan á pizzu eða brauð" },
      { w: "að lykta", hint: "að hafa gott lykt" },
      { w: "að vaska upp", hint: "að þvo disk eftir matinn" }
    ];

    // --- Þýðingarspurningar ---
    const TRANSLATION_WORDS = [
      { word: "hveiti", hint: "hvítt duft til að baka" },
      { word: "að hlakka til", hint: "að vera spennt/ur fyrir einhverju" }
    ];

    // --- Krossaspurningar ---
    const MULTIPLE_CHOICE = [
      {
        question: 'Hvað eru þau að baka?',
        options: ['Brauð', 'Pizzu', 'Köku', 'Smákökur'],
        correct: 1
      },
      {
        question: 'Hver fletur deigið?',
        options: ['Anna', 'Bjarki', 'Lilja', 'Sigurður'],
        correct: 2
      },
      {
        question: 'Hverjum þykir lyktin góð?',
        options: ['Önnu', 'Bjarka', 'Lilju', 'Sigurði'],
        correct: 3
      },
      {
        question: 'Hversu lengi eru pizzurnar í ofninum?',
        options: ['10 mínútur', '12 mínútur', '15 mínútur', '20 mínútur'],
        correct: 1
      },
      {
        question: 'Hver ætlar að vaska upp?',
        options: ['Anna', 'Bjarki', 'Lilja', 'Sigurður'],
        correct: 3
      }
    ];

    // --- Opnar spurningar ---
    const OPEN_QUESTIONS = [
      { 
        question: 'Hvað setur Lilja á borðið áður en hún fletur deigið?',
        expectedContent: ['hveiti']
      },
      { 
        question: 'Hvaða tvær pizzur eru þau að gera?',
        expectedContent: ['pepperóní', 'sveppir', 'sveppum', 'skinku', 'skinka', 'ólífur', 'ólífum']
      },
      { 
        question: 'Hvað gerir Anna við sveppina?',
        expectedContent: ['sker', 'skera', 'bita', 'litla']
      },
      { 
        question: 'Hvaða krydd vantar?',
        expectedContent: ['óreganó']
      }
    ];

    // --- Rétt/Rangt ---
    const TRUE_FALSE = [
      { statement: 'Sigurður er svangur.', correct: true },
      { statement: 'Anna fletur deigið með kökukefli.', correct: false },
      { statement: 'Þau gera þrjár pizzur.', correct: false },
      { statement: 'Pizzurnar eru í ofninum í 12 mínútur.', correct: true },
      { statement: 'Bjarki ætlar að vaska upp.', correct: false }
    ];

    // --- Pörun ---
    const MATCHING = [
      { left: 'Lilja', right: 'Stráir hveiti og fletur deigið' },
      { left: 'Bjarki', right: 'Dreifir sósunni á pizzuna' },
      { left: 'Anna', right: 'Sker sveppina í bita' },
      { left: 'Sigurður', right: 'Vaskar upp og gengur frá' }
    ];

    const HlustunPizzan = () => {
      const [playbackRate, setPlaybackRate] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const audioRef = useRef(null);
      const [currentTime, setCurrentTime] = useState(0);  
      const [duration, setDuration] = useState(0);        
      const [showTextModal, setShowTextModal] = useState(false);

      // Þýðingar
      const [translationAnswers, setTranslationAnswers] = useState(['', '']);
      const [translationFeedback, setTranslationFeedback] = useState([null, null]);
      const [translationLoading, setTranslationLoading] = useState([false, false]);

      // Krossaspurningar
      const [mcAnswers, setMcAnswers] = useState([]);
      const [mcChecked, setMcChecked] = useState(false);

      // Opnar
      const [openAnswers, setOpenAnswers] = useState(Array(OPEN_QUESTIONS.length).fill(''));
      const [openFeedback, setOpenFeedback] = useState(Array(OPEN_QUESTIONS.length).fill(null));
      const [openLoading, setOpenLoading] = useState(Array(OPEN_QUESTIONS.length).fill(false));

      // Rétt/Rangt
      const [tfAnswers, setTfAnswers] = useState([]);
      const [tfChecked, setTfChecked] = useState(false);

      // Para
      const [matchingAnswers, setMatchingAnswers] = useState(Array(MATCHING.length).fill(''));
      const [matchingChecked, setMatchingChecked] = useState(false);
      const rightOptions = useMemo(
        () => MATCHING.map(m => m.right).sort(() => Math.random() - 0.5),
        []
      );

      // Endurstilla föll
      const resetTranslations = () => {
        setTranslationAnswers(['', '']);
        setTranslationFeedback([null, null]);
        setTranslationLoading([false, false]);
      };
      const resetMC = () => { setMcAnswers([]); setMcChecked(false); };
      const resetOpen = () => {
        setOpenAnswers(Array(OPEN_QUESTIONS.length).fill(''));
        setOpenFeedback(Array(OPEN_QUESTIONS.length).fill(null));
        setOpenLoading(Array(OPEN_QUESTIONS.length).fill(false));
      };
      const resetTF = () => { setTfAnswers([]); setTfChecked(false); };
      const resetMatching = () => { setMatchingAnswers(Array(MATCHING.length).fill('')); setMatchingChecked(false); };

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate]);

      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) audioRef.current.pause(); else audioRef.current.play();
        setIsPlaying(!isPlaying);
      };

      // Þýðing
      const checkTranslation = async (index) => {
        const answer = translationAnswers[index].trim();
        if (answer.length < 2) { alert('Vinsamlegast skrifaðu þýðingu!'); return; }
        
        const newLoading = [...translationLoading];
        newLoading[index] = true;
        setTranslationLoading(newLoading);

        try {
          const word = TRANSLATION_WORDS[index].word;
          const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${word}"
SVAR NEMANDA: "${answer}"

VERKEFNI:
1. Greina sjálfkrafa hvaða tungumál nemandinn notaði
2. Meta hvort þýðingin sé rétt
3. Skila stuttri, jákvæðri endurgjöf

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "detected_language": "nafn tungumálsins (t.d. enska, pólska, spænska)",
  "feedback_is": "Endurgjöf á íslensku",
  "feedback_native": "Endurgjöf á greinda tungumálinu",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}`;
          const response = await callOpenAI({
            model: 'gpt-4o',
            temperature: 0.3,
            max_tokens: 300,
            messages: [{ role: 'system', content: sys }, { role: 'user', content: 'Meta þýðingu' }]
          });
          const data = extractFirstJSON(response);
          const newFeedback = [...translationFeedback];
          newFeedback[index] = data;
          setTranslationFeedback(newFeedback);
        } catch (e) {
          console.error(e);
          alert('Villa við að meta þýðingu. Reyndu aftur.');
        } finally {
          const newLoading2 = [...translationLoading];
          newLoading2[index] = false;
          setTranslationLoading(newLoading2);
        }
      };

      // Krossar
      const handleMcAnswer = (qIndex, optIndex) => {
        if (mcChecked) return;
        const newAnswers = [...mcAnswers]; newAnswers[qIndex] = optIndex; setMcAnswers(newAnswers);
      };
      const checkMcAnswers = () => {
        const allAnswered = MULTIPLE_CHOICE.every((_, i) => Number.isInteger(mcAnswers[i]));
        if (!allAnswered) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setMcChecked(true);
      };

      // Opnar
      const handleOpenAnswer = (index, value) => {
        const newAnswers = [...openAnswers]; newAnswers[index] = value; setOpenAnswers(newAnswers);
      };
      const checkOpenAnswer = async (index) => {
        if (openAnswers[index].trim().length < 3) { alert('Vinsamlegast skrifaðu svar!'); return; }
        const newLoading = [...openLoading]; newLoading[index] = true; setOpenLoading(newLoading);
        try {
          const question = OPEN_QUESTIONS[index];
          const userAnswer = openAnswers[index];
          const sys = `Þú ert íslenskukennari sem metur svör nemenda við opnum spurningum.

SPURNINGIN:
"${question.question}"

SVAR NEMANDA:
"${userAnswer}"

LYKILATRIÐI SEM EIGA AÐ KOMA FRAM:
${question.expectedContent.join(', ')}

VERKEFNI:
Meta hvort svarið er rétt miðað við INNIHALD (hunsa smávægilegar villur). Skila stuttri hvetjandi endurgjöf.

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "feedback": "Stutt og hvetjandi endurgjöf á íslensku"
}`;
          const response = await callOpenAI({
            model: 'gpt-4o',
            temperature: 0.3,
            max_tokens: 200,
            messages: [{ role: 'system', content: sys }, { role: 'user', content: 'Meta svar' }]
          });
          const data = extractFirstJSON(response);
          const newFeedback = [...openFeedback]; newFeedback[index] = data; setOpenFeedback(newFeedback);
        } catch (e) {
          console.error(e);
          alert('Villa við að meta svar. Reyndu aftur.');
        } finally {
          const newLoading2 = [...openLoading]; newLoading2[index] = false; setOpenLoading(newLoading2);
        }
      };

      // Rétt/Rangt
      const handleTfAnswer = (index, answer) => {
        if (tfChecked) return;
        const newAnswers = [...tfAnswers]; newAnswers[index] = answer; setTfAnswers(newAnswers);
      };
      const checkTfAnswers = () => {
        const allAnswered = TRUE_FALSE.every((_, i) => typeof tfAnswers[i] === 'boolean');
        if (!allAnswered) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setTfChecked(true);
      };

      // Para
      const handleMatchingAnswer = (index, value) => {
        if (matchingChecked) return;
        const newAnswers = [...matchingAnswers]; newAnswers[index] = value; setMatchingAnswers(newAnswers);
      };
      const checkMatching = () => {
        const allAnswered = matchingAnswers.every(v => !!v);
        if (!allAnswered) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
        setMatchingChecked(true);
      };

      return (
        <div className="min-h-screen pb-12">
          {/* Haus */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <div className="flex items-center gap-6">
                <div className="flex-1">
                  <h1 className="text-3xl font-light text-gray-800 mb-2">Hlustun 8: Anna og Bjarki baka pizzu</h1>
                  <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1–A2</p>
                </div>
              </div>
            </div>
          </header>

{/* Sticky Audio Player */}
<div className="sticky-player">
  <div className="max-w-4xl mx-auto px-6 py-4">
    <div className="bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg p-4 border-2 border-blue-200">
      <div className="flex items-center gap-4 mb-3">
        <button
          onClick={togglePlay}
          className="bg-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors flex-shrink-0"
          aria-label={isPlaying ? 'Pása' : 'Spila'}
        >
          {isPlaying ? (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></svg>
          ) : (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3" /></svg>
          )}
        </button>

        <button
          onClick={() => { if (audioRef.current) audioRef.current.currentTime -= 10; }}
          className="bg-white text-gray-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-sm"
          aria-label="10 sekúndur til baka"
        >
          ⏮️
        </button>

        <div className="flex-1">
          <div className="flex items-center justify-between mb-1">
            <p className="text-sm font-normal text-gray-800">🎧 Hlusta á textann</p>
            <span className="text-xs text-gray-600 font-mono">
              {Math.floor(currentTime / 60)}:{String(Math.floor(currentTime % 60)).padStart(2, '0')} / {Math.floor(duration / 60)}:{String(Math.floor(duration % 60)).padStart(2, '0')}
            </span>
          </div>
          
          {/* Progress bar */}
          <div 
            className="w-full h-2 bg-white/50 rounded-full cursor-pointer relative overflow-hidden"
            onClick={(e) => {
              if (!audioRef.current) return;
              const rect = e.currentTarget.getBoundingClientRect();
              const percent = (e.clientX - rect.left) / rect.width;
              audioRef.current.currentTime = percent * duration;
            }}
          >
            <div 
              className="absolute top-0 left-0 h-full bg-blue-500 transition-all"
              style={{ width: `${(currentTime / duration) * 100}%` }}
            />
          </div>

          <audio
            ref={audioRef}
            src="../media/hlustun8_pizzan.mp3"
            preload="metadata"
            onEnded={() => setIsPlaying(false)}
            onPlay={() => setIsPlaying(true)}
            onPause={() => setIsPlaying(false)}
            onTimeUpdate={() => setCurrentTime(audioRef.current?.currentTime || 0)}
            onLoadedMetadata={() => setDuration(audioRef.current?.duration || 0)}
          />
        </div>

        <button
          onClick={() => { if (audioRef.current) audioRef.current.currentTime += 10; }}
          className="bg-white text-gray-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-sm"
          aria-label="10 sekúndur áfram"
        >
          ⏭️
        </button>

        <div className="flex gap-2">
          <button onClick={() => setPlaybackRate(0.75)} className={`px-3 py-1 rounded-md text-sm font-light transition-colors ${playbackRate === 0.75 ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>0.75×</button>
          <button onClick={() => setPlaybackRate(1)} className={`px-3 py-1 rounded-md text-sm font-light transition-colors ${playbackRate === 1 ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>1×</button>
          <button onClick={() => setPlaybackRate(1.25)} className={`px-3 py-1 rounded-md text-sm font-light transition-colors ${playbackRate === 1.25 ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>1.25×</button>
        </div>
      </div>
    </div>
  </div>
</div>

          <main className="max-w-4xl mx-auto px-6 mt-8 space-y-8">
            {/* Leiðbeiningar */}
            <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-6">
              <h2 className="text-xl font-normal text-gray-800 mb-3">📝 Leiðbeiningar</h2>
              <ul className="space-y-2 text-gray-700 font-light">
                <li>• Lestu lykilorðin hér að neðan fyrst</li>
                <li>• Hlustaðu á textann 2–3 sinnum</li>
                <li>• Þú getur hægt eða hraðað á hljóðinu</li>
                <li>• Svaraðu öllum spurningunum</li>
                <li>• Þegar þú hefur lokið öllum spurningum geturðu lesið textann</li>
              </ul>
            </div>

            {/* Lykilorð */}
            <section className="bg-yellow-50 border-2 border-yellow-200 rounded-lg p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-4">📘 Lykilorð</h2>
              <p className="text-gray-700 font-light mb-4">Lestu yfir orðin áður en þú hlustar.</p>
              <div className="grid md:grid-cols-2 gap-3">
                {VOCAB.map((it, i) => (
                  <div key={i} className="rounded-lg border-2 border-yellow-200 bg-white/70 p-3">
                    <div className="font-normal text-gray-900">{it.w}</div>
                    <div className="text-sm text-gray-600 font-light">{it.hint}</div>
                  </div>
                ))}
              </div>
            </section>

            {/* 1. Þýðing */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">1️⃣ Þýðing</h2>
              {TRANSLATION_WORDS.map((item, idx) => (
                <div key={idx} className="border-2 border-gray-100 rounded-lg p-4 mb-4">
                  <p className="font-normal text-gray-800 mb-4">Hvað þýðir <strong>„{item.word}"</strong> á þínu móðurmáli?</p>
                  <textarea 
                    value={translationAnswers[idx]} 
                    onChange={(e) => {
                      const newAnswers = [...translationAnswers];
                      newAnswers[idx] = e.target.value;
                      setTranslationAnswers(newAnswers);
                    }}
                    disabled={translationFeedback[idx] !== null} 
                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light"
                    rows="3" 
                    placeholder="Skrifaðu þýðinguna hér...">
                  </textarea>
                  {!translationFeedback[idx] ? (
                    <div className="flex gap-3 mt-3">
                      <button 
                        onClick={() => checkTranslation(idx)} 
                        disabled={translationLoading[idx]}
                        className="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 disabled:bg-gray-300 transition-colors font-light text-sm">
                        {translationLoading[idx] ? 'Athuga...' : 'Athuga þýðingu'}
                      </button>
                      <button 
                        onClick={() => {
                          const newAnswers = [...translationAnswers];
                          newAnswers[idx] = '';
                          setTranslationAnswers(newAnswers);
                          const newFeedback = [...translationFeedback];
                          newFeedback[idx] = null;
                          setTranslationFeedback(newFeedback);
                        }}
                        className="px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                        Endurstilla
                      </button>
                    </div>
                  ) : (
                    <div className={`mt-3 p-4 rounded-lg ${translationFeedback[idx].correct ? 'bg-green-50 border-2 border-green-200' : 'bg-yellow-50 border-2 border-yellow-200'}`}>
                      <p className={`font-light mb-2 ${translationFeedback[idx].correct ? 'text-green-800' : 'text-yellow-800'}`}>
                        {translationFeedback[idx].correct ? '✓' : '💡'} {translationFeedback[idx].feedback_is}
                      </p>
                      <p className={`text-sm font-light ${translationFeedback[idx].correct ? 'text-green-700' : 'text-yellow-700'}`}>{translationFeedback[idx].feedback_native}</p>
                      {translationFeedback[idx].correct_translation && (
                        <p className="text-sm text-gray-600 mt-2 font-light"><strong>Dæmi um góða þýðingu:</strong> {translationFeedback[idx].correct_translation}</p>
                      )}
                      <button 
                        onClick={() => {
                          const newAnswers = [...translationAnswers];
                          newAnswers[idx] = '';
                          setTranslationAnswers(newAnswers);
                          const newFeedback = [...translationFeedback];
                          newFeedback[idx] = null;
                          setTranslationFeedback(newFeedback);
                        }}
                        className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                        Reyna aftur
                      </button>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={resetTranslations} className="mt-4 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                Endurstilla allar þýðingar
              </button>
            </section>

            {/* 2. Krossaspurningar */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">2️⃣ Krossaspurningar</h2>
              <div className="space-y-6">
                {MULTIPLE_CHOICE.map((q, qIndex) => (
                  <div key={qIndex} className="border-2 border-gray-100 rounded-lg p-4">
                    <p className="font-normal text-gray-800 mb-4">{q.question}</p>
                    <div className="space-y-2">
                      {q.options.map((option, oIndex) => {
                        const isSelected = mcAnswers[qIndex] === oIndex;
                        const isCorrect = oIndex === q.correct;
                        const showAsCorrect = mcChecked && isCorrect;
                        const showAsIncorrect = mcChecked && isSelected && !isCorrect;
                        return (
                          <div
                            key={oIndex}
                            onClick={() => handleMcAnswer(qIndex, oIndex)}
                            className={`answer-option p-3 rounded-lg ${isSelected && !mcChecked ? 'selected' : ''} ${showAsCorrect ? 'correct' : ''} ${showAsIncorrect ? 'incorrect' : ''} ${mcChecked ? 'disabled' : ''}`}
                          >
                            <div className="flex items-center gap-3">
                              <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${
                                isSelected && !mcChecked ? 'border-blue-500 bg-blue-500' :
                                showAsCorrect ? 'border-green-500 bg-green-500' :
                                showAsIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                {(isSelected || showAsCorrect) && (<div className="w-1.5 h-1.5 bg-white rounded-full"></div>)}
                              </div>
                              <span className="font-light flex-1">{option}</span>
                              {showAsCorrect && <span className="text-green-600">✓</span>}
                              {showAsIncorrect && <span className="text-red-600">✗</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
              {!mcChecked ? (
                <div className="mt-6 flex gap-3">
                  <button onClick={checkMcAnswers}
                    className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                    Athuga svör
                  </button>
                  <button onClick={resetMC}
                    className="px-6 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light">
                    Endurstilla
                  </button>
                </div>
              ) : (
                <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4">
                  <p className="text-green-800 font-light">
                    ✓ Þú fékkst {mcAnswers.filter((a, i) => a === MULTIPLE_CHOICE[i].correct).length} af {MULTIPLE_CHOICE.length} rétt!
                  </p>
                  <button onClick={resetMC} className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                    Reyna aftur
                  </button>
                </div>
              )}
            </section>

            {/* 3. Opnar spurningar */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">3️⃣ Opnar spurningar</h2>
              <p className="text-gray-600 font-light mb-6">Svaraðu spurningunum með þínum eigin orðum.</p>
              <div className="space-y-6">
                {OPEN_QUESTIONS.map((q, index) => (
                  <div key={index} className="border-2 border-gray-100 rounded-lg p-4">
                    <p className="font-normal text-gray-800 mb-3">{index + 1}. {q.question}</p>
                    <textarea value={openAnswers[index]} onChange={(e) => handleOpenAnswer(index, e.target.value)}
                      disabled={openFeedback[index] !== null}
                      className="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light"
                      rows="3" placeholder="Skrifaðu svarið þitt hér..."></textarea>
                    {!openFeedback[index] ? (
                      <div className="flex gap-3 mt-3">
                        <button onClick={() => checkOpenAnswer(index)} disabled={openLoading[index]}
                          className="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 disabled:bg-gray-300 transition-colors font-light text-sm">
                          {openLoading[index] ? 'Athuga...' : 'Athuga svar'}
                        </button>
                        <button onClick={()=>{ const na=[...openAnswers]; na[index]=''; setOpenAnswers(na); }}
                          className="px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                          Hreinsa
                        </button>
                      </div>
                    ) : (
                      <div className={`mt-3 p-3 rounded-lg ${openFeedback[index].correct ? 'bg-green-50 border-2 border-green-200' : 'bg-yellow-50 border-2 border-yellow-200'}`}>
                        <p className={`text-sm font-light ${openFeedback[index].correct ? 'text-green-800' : 'text-yellow-800'}`}>
                          {openFeedback[index].correct ? '✓' : '💡'} {openFeedback[index].feedback}
                        </p>
                        <button onClick={()=>{ const nf=[...openFeedback]; nf[index]=null; setOpenFeedback(nf); const na=[...openAnswers]; na[index]=''; setOpenAnswers(na); }}
                          className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                          Reyna aftur
                        </button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <div className="mt-4">
                <button onClick={resetOpen} className="px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                  Endurstilla allar opnar spurningar
                </button>
              </div>
            </section>

            {/* 4. Rétt eða rangt */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">4️⃣ Rétt eða rangt?</h2>
              <div className="space-y-4">
                {TRUE_FALSE.map((item, index) => (
                  <div key={index} className="border-2 border-gray-100 rounded-lg p-4">
                    <p className="font-light text-gray-800 mb-3">{item.statement}</p>
                    <div className="flex gap-4">
                      {[true, false].map((answer) => {
                        const isSelected = tfAnswers[index] === answer;
                        const isCorrect = answer === item.correct;
                        const showAsCorrect = tfChecked && isCorrect;
                        const showAsIncorrect = tfChecked && isSelected && !isCorrect;
                        return (
                          <div
                            key={answer ? 'true' : 'false'}
                            onClick={() => handleTfAnswer(index, answer)}
                            className={`answer-option flex-1 p-3 rounded-lg ${isSelected && !tfChecked ? 'selected' : ''} ${showAsCorrect ? 'correct' : ''} ${showAsIncorrect ? 'incorrect' : ''} ${tfChecked ? 'disabled' : ''}`}
                          >
                            <div className="flex items-center justify-center gap-2">
                              <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${
                                isSelected && !tfChecked ? 'border-blue-500 bg-blue-500' :
                                showAsCorrect ? 'border-green-500 bg-green-500' :
                                showAsIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                {(isSelected || showAsCorrect) && (<div className="w-1.5 h-1.5 bg-white rounded-full"></div>)}
                              </div>
                              <span className="font-light text-sm">{answer ? 'Rétt' : 'Rangt'}</span>
                              {showAsCorrect && <span className="text-green-600">✓</span>}
                              {showAsIncorrect && <span className="text-red-600">✗</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
              {!tfChecked ? (
                <div className="mt-6 flex gap-3">
                  <button onClick={checkTfAnswers}
                    className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                    Athuga svör
                  </button>
                  <button onClick={resetTF} className="px-6 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light">
                    Endurstilla
                  </button>
                </div>
              ) : (
                <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4">
                  <p className="text-green-800 font-light">✓ Þú fékkst {tfAnswers.filter((a, i) => a === TRUE_FALSE[i].correct).length} af {TRUE_FALSE.length} rétt!</p>
                  <button onClick={resetTF} className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                    Reyna aftur
                  </button>
                </div>
              )}
            </section>

            {/* 5. Paraðu saman */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">5️⃣ Paraðu saman</h2>
              <div className="space-y-4">
                {MATCHING.map((item, index) => (
                  <div key={index} className="border-2 border-gray-100 rounded-lg p-4">
                    <div className="flex items-center gap-4">
                      <div className="flex-1"><span className="font-normal text-gray-800">{item.left}</span></div>
                      <div className="text-gray-400">→</div>
                      <div className="flex-1">
                        <select value={matchingAnswers[index]} onChange={(e) => handleMatchingAnswer(index, e.target.value)} disabled={matchingChecked}
                          className={`w-full p-2 border-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light ${
                            matchingChecked ? (matchingAnswers[index]===item.right ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50') : 'border-gray-300'}`}>
                          <option value="">Veldu...</option>
                          {rightOptions.map((opt, i) => (<option key={i} value={opt}>{opt}</option>))}
                        </select>
                      </div>
                      {matchingChecked && (<div className="w-8">{matchingAnswers[index]===item.right ? <span className="text-green-600 text-xl">✓</span> : <span className="text-red-600 text-xl">✗</span>}</div>)}
                    </div>
                    {matchingChecked && matchingAnswers[index]!==item.right && (
                      <p className="text-sm text-red-600 mt-2">✗ Rétt svar: {item.right}</p>
                    )}
                  </div>
                ))}
              </div>
              {!matchingChecked ? (
                <div className="mt-6 flex gap-3">
                  <button onClick={checkMatching}
                    className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                    Athuga svör
                  </button>
                  <button onClick={resetMatching} className="px-6 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light">
                    Endurstilla
                  </button>
                </div>
              ) : (
                <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4">
                  <p className="text-green-800 font-light">✓ Þú fékkst {matchingAnswers.filter((v,i)=>v===MATCHING[i].right).length} af {MATCHING.length} rétt!</p>
                  <button onClick={resetMatching} className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                    Reyna aftur
                  </button>
                </div>
              )}
            </section>

            {/* Lok + hnappur til að lesa textann */}
            <div className="bg-gradient-to-r from-green-50 to-green-100 border-2 border-green-200 rounded-lg p-8 text-center">
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-2xl font-light text-gray-800 mb-3">Vel gert!</h2>
              <p className="text-gray-600 font-light mb-6">Þú hefur klárað hlustunarverkefnið um pizzuna. Hlustaðu endilega aftur til að æfa!</p>
              
              {(mcChecked && tfChecked && matchingChecked && openFeedback.every(f => f !== null) && translationFeedback.every(f => f !== null)) && (
                <button 
                  onClick={() => setShowTextModal(true)}
                  className="bg-blue-500 text-white px-8 py-3 rounded-lg hover:bg-blue-600 transition-colors font-light text-lg shadow-lg">
                  📖 Lesa textann
                </button>
              )}
            </div>
          </main>

          {/* Modal gluggi með textanum */}
          {showTextModal && (
            <div className="modal-overlay" onClick={() => setShowTextModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="sticky top-0 bg-white border-b-2 border-gray-200 p-6 flex items-center justify-between">
                  <h2 className="text-2xl font-light text-gray-800">📖 Hlustunartextinn</h2>
                  <button 
                    onClick={() => setShowTextModal(false)}
                    className="text-gray-500 hover:text-gray-700 text-3xl leading-none"
                    aria-label="Loka">
                    ×
                  </button>
                </div>
                <div className="p-8">
                  <div className="prose prose-lg max-w-none">
                    {LISTENING_TEXT.split('\n\n').map((paragraph, i) => (
                      <p key={i} className="mb-4 text-gray-700 font-light leading-relaxed">
                        {paragraph}
                      </p>
                    ))}
                  </div>
                  <div className="mt-8 text-center">
                    <button 
                      onClick={() => setShowTextModal(false)}
                      className="bg-gray-500 text-white px-6 py-2 rounded-md hover:bg-gray-600 transition-colors font-light">
                      Loka
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HlustunPizzan />);
  </script>
</body>
</html>
