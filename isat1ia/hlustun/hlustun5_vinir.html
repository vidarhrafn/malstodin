<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎧 Hlustun 5: Vinir – A1</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .sticky-player { position: sticky; top: 0; z-index: 50; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .answer-option { border: 2px solid #e0e0e0; transition: all 0.2s; cursor: pointer; }
    .answer-option:hover:not(.disabled) { border-color:#2196f3; background:#e3f2fd; }
    .answer-option.selected { border-color:#2196f3; background:#e3f2fd; }
    .answer-option.correct { border-color:#4caf50; background:#e8f5e9; }
    .answer-option.incorrect { border-color:#f44336; background:#ffebee; }
    .answer-option.disabled { cursor: default; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal-content { background: white; border-radius: 1rem; max-width: 48rem; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    const ORIGINAL_TEXT_1 = "vandræðalegur";
    const ORIGINAL_TEXT_2 = "að hvísla";

    // Textinn sem nemendur geta lesið eftir að hafa lokið öllum spurningum
    const LISTENING_TEXT = `Það er seinnipartur á sunnudegi í Hafnarfirði.

Bjarki situr í sófanum með símann í höndunum og brosir út í loftið. Hann skrifar skilaboð, bíður í smá stund og brosir aftur þegar svarið kemur.

Lilja gengur inn í stofuna og segir:
"Ertu alltaf í símanum? Þú æfir þig aldrei lengur á gítar!"

Bjarki horfir vandræðalegur á hana.
"Ég var bara að senda skilaboð," segir hann og reynir að vera rólegur.

"Já, já," segir Lilja og brosir. "Við sjáum hvernig þú brosir, Bjarki!"

Anna kemur inn í stofuna með þvott.
"Hver er það sem lætur þig brosa svona mikið?" spyr hún hlæjandi.

Bjarki roðnar.
"Enginn sérstakur. Bara vinur... eða svona... stelpa."

"Stelpa?" segir Lilja hátt og hlær.
"Ég vissi það!"

Bjarki stoppar í smá stund og segir svo hátt feiminn:
"Hún heitir Tinna. Hún er úr öðrum skóla. Ég kynntist henni á Instagram."

Anna brosir hlýlega.
"Það er fínt að kynnast nýju fólki," segir hún.

"En mundu bara að vera kurteis og tala við fólk í alvöru líka – ekki bara í símanum. Og farðu varlega!"

Lilja flissar og hvíslar:
"Bjarki er ástfanginn!"

Bjarki kastar púða í hana og segir:
"Lilja! Þegiðu!"

Sigurður kallar úr eldhúsinu:
"Hvað er að gerast þarna inni?"

Anna hlær.
"Bara Bjarki að æfa sig ... í að tala við stelpur!"

Lilja hlær svo mikið að hún þarf að halda um magann.

Bjarki tekur aftur upp símann og hvíslar:
"Lilja asni... og brosir"`;

    const VOCAB = [
      { w: "skilaboð", hint: "texti sem þú sendir í síma eða á netinu" },
      { w: "að kynnast", hint: "þegar þú hittir eða talar við einhvern í fyrsta sinn" },
      { w: "kurteis", hint: "manneskja sem talar fallega og hegðar sér vel við aðra" },
      { w: "feiminn", hint: "manneskja sem er smá hrædd eða stressað við að tala" },
      { w: "roðna", hint: "þegar andlitið verður rautt, oft af feimni" },
      { w: "vandræðalegur", hint: "þegar þér líður pínu illa eða óþægilega" },
      { w: "ástfanginn", hint: "þegar manneskja elskar eða líkar mjög vel við einhvern" },
      { w: "forvitinn", hint: "þegar þú vilt vita meira um eitthvað eða einhvern" },
      { w: "að hvísla", hint: "að tala mjög lágt, næstum í leyni" }
    ];

    const TRUE_FALSE = [
      { statement: 'Bjarki spilar á gítar í byrjun sögunnar.', correct: false },
      { statement: 'Lilja segir að Bjarki sé alltaf í símanum.', correct: true },
      { statement: 'Anna kemur inn í stofuna með þvott í fanginu.', correct: true },
      { statement: 'Stelpan sem Bjarki talar við heitir Tinna.', correct: true },
      { statement: 'Bjarki segir að hann hafi hitt Tinnu í skólanum.', correct: false }
    ];

    const MULTIPLE_CHOICE = [
      {
        question: 'Af hverju segir Lilja að Bjarki sé ekki lengur á gítar?',
        options: [
          'Hann er alltaf að spila tölvuleiki.',
          'Hann er alltaf í símanum.',
          'Hann er alltaf í skólanum.',
          'Hann er alltaf sofandi.'
        ],
        correct: 1
      },
      {
        question: 'Hvernig brást Bjarki við þegar Anna spyr um stelpuna?',
        options: [
          'Hann verður feiminn og roðnar.',
          'Hann hlær hátt.',
          'Hann hleypur út.',
          'Hann segir strax allt satt.'
        ],
        correct: 0
      },
      {
        question: 'Hvar kynntist Bjarki Tinnu samkvæmt textanum?',
        options: [
          'Í skólanum.',
          'Í bónus.',
          'Á Instagram.',
          'Í leikhúsinu.'
        ],
        correct: 2
      }
    ];

    const OPEN_QUESTIONS = [
      { 
        question: 'Hvað gerir Bjarki í byrjun sögunnar?', 
        expectedContent: ['síma', 'skilaboð', 'brosir', 'texta'] 
      },
      { 
        question: 'Hvað segir Anna að sé mikilvægt þegar maður kynnist fólki á netinu?', 
        expectedContent: ['kurteis', 'tala', 'alvöru', 'varlega', 'ekki bara í símanum'] 
      },
      { 
        question: 'Hvernig brást Lilja við þegar hún heyrir um Tinnu?', 
        expectedContent: ['hlær', 'flissar', 'hvíslar', 'ástfanginn'] 
      },
      { 
        question: 'Hver kallar úr eldhúsinu í lokin?', 
        expectedContent: ['Sigurður'] 
      }
    ];

    const MATCHING = [
      { left: 'Bjarki', right: 'Spjallar á netinu' },
      { left: 'Lilja', right: 'Segir að Bjarki sé ástfanginn' },
      { left: 'Anna', right: 'Segir að það sé gott að kynnast nýju fólki' },
      { left: 'Tinna', right: 'Stelpa sem Bjarki kynntist á Instagram' }
    ];

    const HlustunVinir = () => {
      const [playbackRate, setPlaybackRate] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);  // ← BÆTA VIÐ
      const [duration, setDuration] = useState(0);        // ← BÆTA VIÐ
      const audioRef = useRef(null);
      const [showTextModal, setShowTextModal] = useState(false);

      // Translation 1
      const [translation1Answer, setTranslation1Answer] = useState('');
      const [translation1Language, setTranslation1Language] = useState('');
      const [translation1Feedback, setTranslation1Feedback] = useState(null);
      const [translation1Loading, setTranslation1Loading] = useState(false);

      // Translation 2
      const [translation2Answer, setTranslation2Answer] = useState('');
      const [translation2Language, setTranslation2Language] = useState('');
      const [translation2Feedback, setTranslation2Feedback] = useState(null);
      const [translation2Loading, setTranslation2Loading] = useState(false);

      // Rétt/Rangt
      const [tfAnswers, setTfAnswers] = useState([]);
      const [tfChecked, setTfChecked] = useState(false);

      // Krossaspurningar
      const [mcAnswers, setMcAnswers] = useState([]);
      const [mcChecked, setMcChecked] = useState(false);

      // Opnar
      const [openAnswers, setOpenAnswers] = useState(Array(OPEN_QUESTIONS.length).fill(''));
      const [openFeedback, setOpenFeedback] = useState(Array(OPEN_QUESTIONS.length).fill(null));
      const [openLoading, setOpenLoading] = useState(Array(OPEN_QUESTIONS.length).fill(false));

      // Para
      const [matchingAnswers, setMatchingAnswers] = useState(Array(MATCHING.length).fill(''));
      const [matchingChecked, setMatchingChecked] = useState(false);

      // Athuga hvort allar spurningar séu svaraðar
      const allQuestionsAnswered = translation1Feedback && translation2Feedback && tfChecked && mcChecked &&
        openFeedback.every(f => f !== null) && matchingChecked;

      // Endurstilla föll
      const resetTF = () => { setTfAnswers([]); setTfChecked(false); };
      const resetMC = () => { setMcAnswers([]); setMcChecked(false); };
      const resetOpen = () => {
        setOpenAnswers(Array(OPEN_QUESTIONS.length).fill(''));
        setOpenFeedback(Array(OPEN_QUESTIONS.length).fill(null));
      };
      const resetMatching = () => { 
        setMatchingAnswers(Array(MATCHING.length).fill('')); 
        setMatchingChecked(false); 
      };

      // Translation 1 - vandræðalegur
      const checkTranslation1 = async () => {
        if (translation1Answer.trim().length < 2) {
          alert('Vinsamlegast skrifaðu þýðingu!');
          return;
        }
        if (!translation1Language.trim()) {
          alert('Vinsamlegast skrifaðu hvaða tungumál þú notaðir!');
          return;
        }

        setTranslation1Loading(true);

        try {
          const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${ORIGINAL_TEXT_1}"
NEMANDI ÞÝDDI Á ${translation1Language}: "${translation1Answer}"

VERKEFNI:
Meta hvort þýðingin er rétt. Samþykkja þýðingar sem þýða "embarrassed" eða "awkward" á réttu tungumáli.

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "feedback_is": "Endurgjöf á íslensku",
  "feedback_native": "Endurgjöf á ${translation1Language}",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}

Vertu hvetjandi og jákvæður!`;

          const response = await callOpenAI({
            model: 'gpt-4o',
            temperature: 0.3,
            max_tokens: 300,
            messages: [
              { role: 'system', content: sys },
              { role: 'user', content: 'Meta þýðingu' }
            ]
          });

          let cleanResponse = response
            .replace(/```json\n?/g, '')
            .replace(/```\n?/g, '')
            .replace(/^[^{]*/g, '')
            .replace(/[^}]*$/g, '')
            .trim();

          const data = JSON.parse(cleanResponse);
          setTranslation1Feedback(data);

        } catch (e) {
          console.error('Error checking translation:', e);
          alert('Villa við að meta þýðingu. Reyndu aftur.');
        } finally {
          setTranslation1Loading(false);
        }
      };

      // Translation 2 - að hvísla
      const checkTranslation2 = async () => {
        if (translation2Answer.trim().length < 2) {
          alert('Vinsamlegast skrifaðu þýðingu!');
          return;
        }
        if (!translation2Language.trim()) {
          alert('Vinsamlegast skrifaðu hvaða tungumál þú notaðir!');
          return;
        }

        setTranslation2Loading(true);

        try {
          const sys = `Þú ert íslenskukennari sem metur þýðingar nemenda.

ÍSLENSKA ORÐIÐ: "${ORIGINAL_TEXT_2}"
NEMANDI ÞÝDDI Á ${translation2Language}: "${translation2Answer}"

VERKEFNI:
Meta hvort þýðingin er rétt. Samþykkja þýðingar sem þýða "to whisper" á réttu tungumáli.

SKILAÐU JSON (BARA JSON, EKKERT ANNAÐ):
{
  "correct": boolean,
  "feedback_is": "Endurgjöf á íslensku",
  "feedback_native": "Endurgjöf á ${translation2Language}",
  "correct_translation": "Góð þýðing ef rangt, annars null"
}

Vertu hvetjandi og jákvæður!`;

          const response = await callOpenAI({
            model: 'gpt-4o',
            temperature: 0.3,
            max_tokens: 300,
            messages: [
              { role: 'system', content: sys },
              { role: 'user', content: 'Meta þýðingu' }
            ]
          });

          let cleanResponse = response
            .replace(/```json\n?/g, '')
            .replace(/```\n?/g, '')
            .replace(/^[^{]*/g, '')
            .replace(/[^}]*$/g, '')
            .trim();

          const data = JSON.parse(cleanResponse);
          setTranslation2Feedback(data);

        } catch (e) {
          console.error('Error checking translation:', e);
          alert('Villa við að meta þýðingu. Reyndu aftur.');
        } finally {
          setTranslation2Loading(false);
        }
      };

      // Hljóðspilari
      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play();
      };
      
      const changePlaybackRate = (rate) => {
        setPlaybackRate(rate);
        if (audioRef.current) audioRef.current.playbackRate = rate;
      };
      
      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.playbackRate = playbackRate;
        }
      }, [playbackRate]);

      // Rétt/Rangt
      const handleTfAnswer = (index, value) => {
        if (tfChecked) return;
        const newAnswers = [...tfAnswers];
        newAnswers[index] = value;
        setTfAnswers(newAnswers);
      };
      const checkTfAnswers = () => setTfChecked(true);

      // Krossaspurningar
      const handleMcAnswer = (qIndex, optIndex) => {
        if (mcChecked) return;
        const newAnswers = [...mcAnswers];
        newAnswers[qIndex] = optIndex;
        setMcAnswers(newAnswers);
      };
      const checkMcAnswers = () => setMcChecked(true);

      // Opnar spurningar (án AI - einfalt check)
      const handleOpenAnswer = (index, value) => {
        const newAnswers = [...openAnswers];
        newAnswers[index] = value;
        setOpenAnswers(newAnswers);
      };
      
      const checkOpenAnswer = (index) => {
        const userAnswer = openAnswers[index].trim().toLowerCase();
        if (!userAnswer) {
          alert('Vinsamlegast skrifaðu eitthvað áður en þú athugar.');
          return;
        }
        
        const question = OPEN_QUESTIONS[index];
        const foundKeywords = question.expectedContent.filter(keyword => 
          userAnswer.includes(keyword.toLowerCase())
        );
        
        const newFeedback = [...openFeedback];
        if (foundKeywords.length >= Math.ceil(question.expectedContent.length / 2)) {
          newFeedback[index] = {
            correct: true,
            feedback: `Mjög gott! Þú nefndir: ${foundKeywords.join(', ')}`
          };
        } else if (foundKeywords.length > 0) {
          newFeedback[index] = {
            correct: true,
            feedback: `Gott byrjað! Þú gætir líka nefnt: ${question.expectedContent.filter(k => !foundKeywords.includes(k)).join(', ')}`
          };
        } else {
          newFeedback[index] = {
            correct: false,
            feedback: `Reyndu aftur! Hugsaðu um: ${question.expectedContent.slice(0, 2).join(', ')}`
          };
        }
        setOpenFeedback(newFeedback);
      };

      // Para
      const handleMatchingAnswer = (index, value) => {
        if (matchingChecked) return;
        const newAnswers = [...matchingAnswers];
        newAnswers[index] = value;
        setMatchingAnswers(newAnswers);
      };
      const checkMatching = () => setMatchingChecked(true);

      return (
        <div className="min-h-screen pb-12">
          {/* Haus */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button onClick={() => window.history.back()} className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
                ← Til baka
              </button>
              <div className="flex items-center gap-6">
                <div className="flex-1">
                  <h1 className="text-3xl font-light text-gray-800 mb-2">Hlustun 5: Vinir</h1>
                  <p className="text-gray-500 text-sm font-light">Hlustunarverkefni · A1</p>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8 space-y-8">
            {/* Leiðbeiningar */}
            <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-6">
              <h2 className="text-xl font-normal text-gray-800 mb-3">📝 Leiðbeiningar</h2>
              <ul className="space-y-2 text-gray-700 font-light">
                <li>• Lestu lykilorðin hér að neðan fyrst</li>
                <li>• Hlustaðu á textann 2–3 sinnum</li>
                <li>• Þú getur hægt eða hraðað á hljóðinu</li>
                <li>• Svaraðu öllum spurningunum</li>
                <li>• Þegar þú hefur lokið öllum spurningum geturðu lesið textann</li>
              </ul>
            </div>

            {/* Lykilorð (orðaforðakassi) - EFST */}
            <section className="bg-yellow-50 border-2 border-yellow-200 rounded-lg p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-4">📘 Lykilorð</h2>
              <p className="text-gray-700 font-light mb-4">Lestu yfir orðin áður en þú hlustar.</p>
              <div className="grid md:grid-cols-2 gap-3">
                {VOCAB.map((it, i) => (
                  <div key={i} className="rounded-lg border-2 border-yellow-200 bg-white/70 p-3">
                    <div className="font-normal text-gray-900">{it.w}</div>
                    <div className="text-sm text-gray-600 font-light">{it.hint}</div>
                  </div>
                ))}
              </div>
            </section>

            {/* 1a. Translation - vandræðalegur */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">1️⃣a Þýðing: vandræðalegur</h2>
              <div className="border-2 border-gray-100 rounded-lg p-4">
                <p className="font-normal text-gray-800 mb-4">
                  Hvað þýðir orðið <strong>"vandræðalegur"</strong> á þínu móðurmáli?
                </p>

                <input
                  type="text"
                  value={translation1Language}
                  onChange={(e) => setTranslation1Language(e.target.value)}
                  disabled={translation1Feedback !== null}
                  placeholder="Hvaða tungumál? (t.d. enska, pólska, spænska...)"
                  className="w-full p-3 mb-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light"
                />

                <textarea
                  value={translation1Answer}
                  onChange={(e) => setTranslation1Answer(e.target.value)}
                  disabled={translation1Feedback !== null}
                  className="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light"
                  rows="3"
                  placeholder="Skrifaðu þýðinguna hér..."
                />

                {!translation1Feedback && (
                  <button
                    onClick={checkTranslation1}
                    disabled={translation1Loading}
                    className="mt-3 bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 disabled:bg-gray-300 transition-colors font-light text-sm"
                  >
                    {translation1Loading ? 'Athuga...' : 'Athuga þýðingu'}
                  </button>
                )}

                {translation1Feedback && (
                  <div className={`mt-3 p-4 rounded-lg ${
                    translation1Feedback.correct
                      ? 'bg-green-50 border-2 border-green-200'
                      : 'bg-yellow-50 border-2 border-yellow-200'
                  }`}>
                    <p className={`font-light mb-2 ${
                      translation1Feedback.correct ? 'text-green-800' : 'text-yellow-800'
                    }`}>
                      {translation1Feedback.correct ? '✓' : '💡'} {translation1Feedback.feedback_is}
                    </p>
                    <p className={`text-sm font-light ${
                      translation1Feedback.correct ? 'text-green-700' : 'text-yellow-700'
                    }`}>
                      {translation1Feedback.feedback_native}
                    </p>
                    {translation1Feedback.correct_translation && (
                      <p className="text-sm text-gray-600 mt-2 font-light">
                        <strong>Dæmi um góða þýðingu:</strong> {translation1Feedback.correct_translation}
                      </p>
                    )}
                  </div>
                )}
              </div>
            </section>

            {/* 1b. Translation - að hvísla */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">1️⃣b Þýðing: að hvísla</h2>
              <div className="border-2 border-gray-100 rounded-lg p-4">
                <p className="font-normal text-gray-800 mb-4">
                  Hvað þýðir orðið <strong>"að hvísla"</strong> á þínu móðurmáli?
                </p>

                <input
                  type="text"
                  value={translation2Language}
                  onChange={(e) => setTranslation2Language(e.target.value)}
                  disabled={translation2Feedback !== null}
                  placeholder="Hvaða tungumál? (t.d. enska, pólska, spænska...)"
                  className="w-full p-3 mb-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light"
                />

                <textarea
                  value={translation2Answer}
                  onChange={(e) => setTranslation2Answer(e.target.value)}
                  disabled={translation2Feedback !== null}
                  className="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light"
                  rows="3"
                  placeholder="Skrifaðu þýðinguna hér..."
                />

                {!translation2Feedback && (
                  <button
                    onClick={checkTranslation2}
                    disabled={translation2Loading}
                    className="mt-3 bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 disabled:bg-gray-300 transition-colors font-light text-sm"
                  >
                    {translation2Loading ? 'Athuga...' : 'Athuga þýðingu'}
                  </button>
                )}

                {translation2Feedback && (
                  <div className={`mt-3 p-4 rounded-lg ${
                    translation2Feedback.correct
                      ? 'bg-green-50 border-2 border-green-200'
                      : 'bg-yellow-50 border-2 border-yellow-200'
                  }`}>
                    <p className={`font-light mb-2 ${
                      translation2Feedback.correct ? 'text-green-800' : 'text-yellow-800'
                    }`}>
                      {translation2Feedback.correct ? '✓' : '💡'} {translation2Feedback.feedback_is}
                    </p>
                    <p className={`text-sm font-light ${
                      translation2Feedback.correct ? 'text-green-700' : 'text-yellow-700'
                    }`}>
                      {translation2Feedback.feedback_native}
                    </p>
                    {translation2Feedback.correct_translation && (
                      <p className="text-sm text-gray-600 mt-2 font-light">
                        <strong>Dæmi um góða þýðingu:</strong> {translation2Feedback.correct_translation}
                      </p>
                    )}
                  </div>
                )}
              </div>
            </section>

            {/* 3. Fjölvalsspurningar */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">2️⃣ Krossaspurningar</h2>
              <p className="text-gray-600 font-light mb-6">Merktu við eitt svar (A–D).</p>
              <div className="space-y-6">
                {MULTIPLE_CHOICE.map((q, qIndex) => (
                  <div key={qIndex} className="border-2 border-gray-100 rounded-lg p-6">
                    <p className="font-normal text-gray-800 mb-4">{qIndex + 1}. {q.question}</p>
                    <div className="space-y-2">
                      {q.options.map((opt, optIndex) => {
                        const isSelected = mcAnswers[qIndex] === optIndex;
                        const isCorrect = optIndex === q.correct;
                        const showAsCorrect = mcChecked && isCorrect;
                        const showAsIncorrect = mcChecked && isSelected && !isCorrect;
                        return (
                          <div key={optIndex} onClick={() => handleMcAnswer(qIndex, optIndex)}
                            className={`answer-option p-4 rounded-lg ${isSelected && !mcChecked ? 'selected' : ''} ${showAsCorrect ? 'correct' : ''} ${showAsIncorrect ? 'incorrect' : ''} ${mcChecked ? 'disabled' : ''}`}>
                            <div className="flex items-center gap-3">
                              <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                                isSelected && !mcChecked ? 'border-blue-500 bg-blue-500' :
                                showAsCorrect ? 'border-green-500 bg-green-500' :
                                showAsIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                {(isSelected || showAsCorrect) && (<div className="w-2 h-2 bg-white rounded-full"></div>)}
                              </div>
                              <span className="font-light">{String.fromCharCode(65 + optIndex)}. {opt}</span>
                              {showAsCorrect && <span className="ml-auto text-green-600">✓</span>}
                              {showAsIncorrect && <span className="ml-auto text-red-600">✗</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
              {!mcChecked ? (
                <div className="mt-6 flex gap-3">
                  <button onClick={checkMcAnswers}
                    className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                    Athuga svör
                  </button>
                  <button onClick={resetMC} className="px-6 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light">
                    Endurstilla
                  </button>
                </div>
              ) : (
                <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4">
                  <p className="text-green-800 font-light">✓ Þú fékkst {mcAnswers.filter((a, i) => a === MULTIPLE_CHOICE[i].correct).length} af {MULTIPLE_CHOICE.length} rétt!</p>
                  <button onClick={resetMC} className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                    Reyna aftur
                  </button>
                </div>
              )}
            </section>

            {/* 4. Stuttar spurningar */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">3️⃣ Opnar spurningar</h2>
              <p className="text-gray-600 font-light mb-6">Svaraðu með þínum eigin orðum (1–2 setningar).</p>
              <div className="space-y-6">
                {OPEN_QUESTIONS.map((q, index) => (
                  <div key={index} className="border-2 border-gray-100 rounded-lg p-6">
                    <p className="font-normal text-gray-800 mb-3">{index + 1}. {q.question}</p>
                    {!openFeedback[index] ? (
                      <div className="space-y-3">
                        <textarea value={openAnswers[index]} onChange={(e) => handleOpenAnswer(index, e.target.value)}
                          rows="3" placeholder="Skrifaðu svarið þitt hér..."
                          className="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light resize-none" />
                        <button onClick={() => checkOpenAnswer(index)}
                          className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                          Athuga svar
                        </button>
                      </div>
                    ) : (
                      <div className={`border-2 rounded-lg p-4 ${openFeedback[index].correct ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>
                        <p className={`text-sm font-light ${openFeedback[index].correct ? 'text-green-800' : 'text-yellow-800'}`}>
                          {openFeedback[index].correct ? '✓' : '💡'} {openFeedback[index].feedback}
                        </p>
                        <button onClick={()=>{ const nf=[...openFeedback]; nf[index]=null; setOpenFeedback(nf); const na=[...openAnswers]; na[index]=''; setOpenAnswers(na); }}
                          className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                          Reyna aftur
                        </button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <div className="mt-4">
                <button onClick={resetOpen} className="px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                  Endurstilla allar spurningar
                </button>
              </div>
            </section>

            {/* 2. Rétt eða rangt */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">4️⃣ Rétt eða rangt?</h2>
              <div className="space-y-4">
                {TRUE_FALSE.map((item, index) => (
                  <div key={index} className="border-2 border-gray-100 rounded-lg p-4">
                    <p className="font-light text-gray-800 mb-3">{item.statement}</p>
                    <div className="flex gap-4">
                      {[true, false].map((answer) => {
                        const isSelected = tfAnswers[index] === answer;
                        const isCorrect = answer === item.correct;
                        const showAsCorrect = tfChecked && isCorrect;
                        const showAsIncorrect = tfChecked && isSelected && !isCorrect;
                        return (
                          <div
                            key={answer ? 'true' : 'false'}
                            onClick={() => handleTfAnswer(index, answer)}
                            className={`answer-option flex-1 p-3 rounded-lg ${isSelected && !tfChecked ? 'selected' : ''} ${showAsCorrect ? 'correct' : ''} ${showAsIncorrect ? 'incorrect' : ''} ${tfChecked ? 'disabled' : ''}`}
                          >
                            <div className="flex items-center justify-center gap-2">
                              <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${
                                isSelected && !tfChecked ? 'border-blue-500 bg-blue-500' :
                                showAsCorrect ? 'border-green-500 bg-green-500' :
                                showAsIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                {(isSelected || showAsCorrect) && (<div className="w-1.5 h-1.5 bg-white rounded-full"></div>)}
                              </div>
                              <span className="font-light text-sm">{answer ? 'Rétt' : 'Rangt'}</span>
                              {showAsCorrect && <span className="text-green-600">✓</span>}
                              {showAsIncorrect && <span className="text-red-600">✗</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
              {!tfChecked ? (
                <div className="mt-6 flex gap-3">
                  <button onClick={checkTfAnswers}
                    className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                    Athuga svör
                  </button>
                  <button onClick={resetTF} className="px-6 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light">
                    Endurstilla
                  </button>
                </div>
              ) : (
                <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4">
                  <p className="text-green-800 font-light">✓ Þú fékkst {tfAnswers.filter((a, i) => a === TRUE_FALSE[i].correct).length} af {TRUE_FALSE.length} rétt!</p>
                  <button onClick={resetTF} className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                    Reyna aftur
                  </button>
                </div>
              )}
            </section>

            {/* 5. Paraðu saman */}
            <section className="bg-white rounded-lg shadow-sm p-8">
              <h2 className="text-2xl font-light text-gray-800 mb-6">5️⃣ Paraðu saman</h2>
              <div className="space-y-4">
                {MATCHING.map((item, index) => (
                  <div key={index} className="border-2 border-gray-100 rounded-lg p-4">
                    <div className="flex items-center gap-4">
                      <div className="flex-1"><span className="font-normal text-gray-800">{item.left}</span></div>
                      <div className="text-gray-400">→</div>
                      <div className="flex-1">
                        <select value={matchingAnswers[index]} onChange={(e) => handleMatchingAnswer(index, e.target.value)} disabled={matchingChecked}
                          className={`w-full p-2 border-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-light ${
                            matchingChecked ? (matchingAnswers[index]===item.right ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50') : 'border-gray-300'}`}>
                          <option value="">Veldu...</option>
                          {MATCHING.map((opt, i) => (<option key={i} value={opt.right}>{opt.right}</option>))}
                        </select>
                      </div>
                      {matchingChecked && (<div className="w-8">{matchingAnswers[index]===item.right ? <span className="text-green-600 text-xl">✓</span> : <span className="text-red-600 text-xl">✗</span>}</div>)}
                    </div>
                    {matchingChecked && matchingAnswers[index]!==item.right && (
                      <p className="text-sm text-red-600 mt-2">✗ Rétt svar: {item.right}</p>
                    )}
                  </div>
                ))}
              </div>
              {!matchingChecked ? (
                <div className="mt-6 flex gap-3">
                  <button onClick={checkMatching}
                    className="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors font-light">
                    Athuga svör
                  </button>
                  <button onClick={resetMatching} className="px-6 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light">
                    Endurstilla
                  </button>
                </div>
              ) : (
                <div className="mt-6 bg-green-50 border-2 border-green-200 rounded-lg p-4">
                  <p className="text-green-800 font-light">✓ Þú fékkst {matchingAnswers.filter((v,i)=>v===MATCHING[i].right).length} af {MATCHING.length} rétt!</p>
                  <button onClick={resetMatching} className="mt-3 px-4 py-2 rounded-md border-2 border-gray-200 hover:bg-gray-50 font-light text-sm">
                    Reyna aftur
                  </button>
                </div>
              )}
            </section>

            {/* Sticky Audio Player */}
<div className="sticky-player">
  <div className="max-w-4xl mx-auto px-6 py-4">
    <div className="bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg p-4 border-2 border-blue-200">
      <div className="flex items-center gap-4 mb-3">
        <button
          onClick={togglePlay}
          className="bg-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors flex-shrink-0"
          aria-label={isPlaying ? 'Pása' : 'Spila'}
        >
          {isPlaying ? (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></svg>
          ) : (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3" /></svg>
          )}
        </button>

        <button
          onClick={() => { if (audioRef.current) audioRef.current.currentTime -= 10; }}
          className="bg-white text-gray-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-sm"
          aria-label="10 sekúndur til baka"
        >
          ⏮️
        </button>

        <div className="flex-1">
          <div className="flex items-center justify-between mb-1">
            <p className="text-sm font-normal text-gray-800">🎧 Hlusta á textann</p>
            <span className="text-xs text-gray-600 font-mono">
              {Math.floor(currentTime / 60)}:{String(Math.floor(currentTime % 60)).padStart(2, '0')} / {Math.floor(duration / 60)}:{String(Math.floor(duration % 60)).padStart(2, '0')}
            </span>
          </div>
          
          {/* Progress bar */}
          <div 
            className="w-full h-2 bg-white/50 rounded-full cursor-pointer relative overflow-hidden"
            onClick={(e) => {
              if (!audioRef.current) return;
              const rect = e.currentTarget.getBoundingClientRect();
              const percent = (e.clientX - rect.left) / rect.width;
              audioRef.current.currentTime = percent * duration;
            }}
          >
            <div 
              className="absolute top-0 left-0 h-full bg-blue-500 transition-all"
              style={{ width: `${(currentTime / duration) * 100}%` }}
            />
          </div>

          <audio
            ref={audioRef}
            src="../media/hlustun5_vinir.mp3"
            preload="metadata"
            onEnded={() => setIsPlaying(false)}
            onPlay={() => setIsPlaying(true)}
            onPause={() => setIsPlaying(false)}
            onTimeUpdate={() => setCurrentTime(audioRef.current?.currentTime || 0)}
            onLoadedMetadata={() => setDuration(audioRef.current?.duration || 0)}
          />
        </div>

        <button
          onClick={() => { if (audioRef.current) audioRef.current.currentTime += 10; }}
          className="bg-white text-gray-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-sm"
          aria-label="10 sekúndur áfram"
        >
          ⏭️
        </button>

        <div className="flex gap-2">
          <button onClick={() => setPlaybackRate(0.75)} className={`px-3 py-1 rounded-md text-sm font-light transition-colors ${playbackRate === 0.75 ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>0.75×</button>
          <button onClick={() => setPlaybackRate(1)} className={`px-3 py-1 rounded-md text-sm font-light transition-colors ${playbackRate === 1 ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>1×</button>
          <button onClick={() => setPlaybackRate(1.25)} className={`px-3 py-1 rounded-md text-sm font-light transition-colors ${playbackRate === 1.25 ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>1.25×</button>
        </div>
      </div>
    </div>
  </div>
</div>







            {/* Lok + hnappur til að lesa textann */}
            <div className="bg-gradient-to-r from-green-50 to-green-100 border-2 border-green-200 rounded-lg p-8 text-center">
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-2xl font-light text-gray-800 mb-3">Vel gert!</h2>
              <p className="text-gray-600 font-light mb-6">Þú hefur klárað hlustunarverkefnið um vini. Hlustaðu endilega aftur til að æfa!</p>
              
              {allQuestionsAnswered && (
                <button 
                  onClick={() => setShowTextModal(true)}
                  className="bg-blue-500 text-white px-8 py-3 rounded-lg hover:bg-blue-600 transition-colors font-light text-lg shadow-lg">
                  📖 Lesa textann
                </button>
              )}
            </div>
          </main>

          {/* Modal gluggi með textanum */}
          {showTextModal && (
            <div className="modal-overlay" onClick={() => setShowTextModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="sticky top-0 bg-white border-b-2 border-gray-200 p-6 flex items-center justify-between">
                  <h2 className="text-2xl font-light text-gray-800">📖 Hlustunartextinn</h2>
                  <button 
                    onClick={() => setShowTextModal(false)}
                    className="text-gray-500 hover:text-gray-700 text-3xl leading-none"
                    aria-label="Loka">
                    ×
                  </button>
                </div>
                <div className="p-8">
                  <div className="prose prose-lg max-w-none">
                    {LISTENING_TEXT.split('\n\n').map((paragraph, i) => (
                      <p key={i} className="mb-4 text-gray-700 font-light leading-relaxed">
                        {paragraph}
                      </p>
                    ))}
                  </div>
                  <div className="mt-8 text-center">
                    <button 
                      onClick={() => setShowTextModal(false)}
                      className="bg-gray-500 text-white px-6 py-2 rounded-md hover:bg-gray-600 transition-colors font-light">
                      Loka
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HlustunVinir />);
  </script>
</body>
</html>
