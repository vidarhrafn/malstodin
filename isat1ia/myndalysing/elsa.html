<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const COURSE = 'isat1ia';
  const LOGIN = '../login.html';
  const EXERCISE_ID = 'lestextar_01';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  async function writeProgress(status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, 'isat1ia', EXERCISE_ID);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch (e) {
      console.error('Progress write failed:', e);
    }
  }
  window.writeProgress = writeProgress;

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = LOGIN;
      return;
    }

    try {
      const snap = await getDoc(doc(db, 'user_access', user.uid));
      if (!snap.exists()) {
        window.location.href = LOGIN;
        return;
      }
      const courseData = snap.data()[COURSE];
      if (!courseData || !courseData.activated_at) {
        window.location.href = LOGIN;
        return;
      }
      if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) {
        window.location.href = LOGIN;
        return;
      }
    } catch {
      window.location.href = LOGIN;
      return;
    }

    writeProgress('opened');
    document.getElementById('auth-loading').style.display = 'none';
    const root = document.getElementById('root');
    if (root) root.style.display = 'block';
  });
</script>

<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  async function callOpenAI(messages, maxTokens = 140, temperature = 0.2) {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages,
        max_tokens: maxTokens,
        model: 'gpt-4o-mini',
        temperature,
      }),
    });

    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }

  const READING_TEXT = `Árni og Elsa eru gift. Þau búa í Hlíðunum í Reykjavík. Elsa vinnur á sjúkrahúsi og stundum vinnur hún á kvöldin og nóttunni. Árni vinnur í búð og vinnan hans er frá 9 á morgnana til 17 á daginn. Dóttir Árna er 17 ára og býr hjá Árna og Elsu. Hún heitir Harpa og er í Tækniskólanum. Harpa er ekki dóttir Elsu. Elsa og Árni eiga eina yngri dóttur saman sem heitir Hulda. Hún er 12 ára og er í Austurbæjarskóla. Ef Elsa og Árni eru að vinna, sækir Harpa litlu systur sína í skólann og fer með hana heim. Stundum fara þær á kaffihús eða á bókasafn. Harpa hjálpar líka heima við að elda mat. Einn dag í viku elda Harpa og Hulda saman kvöldmatinn.`;

  const MULTIPLE_CHOICE_RAW = [
    {

      options: [

        'Þau búa í Hafnarfirði.',
        'Þau búa í Kópavogi.',
        'Þau búa í Garðabæ.'
      ],
      correct: 0
    },
    {
      question: 'Hver er eldri, Harpa eða Hulda?',
      options: [
        'Harpa er eldri.',
        'Hulda er eldri.',
        'Þær eru tvíburar.',
        'Það kemur ekki fram í textanum.'
      ],
      correct: 0
    },
    {
      question: 'Hver er mamma Hörpu?',
      options: [
        'Elsa.',
        'Hulda.',
        'Það stendur ekki í textanum.'
      ],
      correct: 2
    }
  ];

  const SHORT_QUESTIONS = [
    'Hver vinnur á sjúkrahúsi?',
    'Hver er í Tækniskólanum?',
    'Hvert fara Hulda og Harpa stundum saman?'
  ];

  const DISCUSSION_QUESTIONS = [
    'Hvernig er það að vera systkini? Hvernig er það að vera eldri/yngri systkini? Hvernig er það að vera eina barnið?',
    'Hvernig er það að vera í fjölskyldu þar sem báðir foreldrarnir vinna? Hvernig eru venjurnar í þinni fjölskyldu?',
    'Hvað finnst þér um að hjálpa heima við húsverk? Hvaða húsverk hjálpar þú við?'
  ];

  const WRITING_EXERCISES = [
    {
      type: 'twoPart',
      imageUrl: '/isat1ia/media/elsa.png',
      question: 'Hvar vinnur Elsa?',
      subject: 'Elsa',
      connector: 'á',
      placeholder1: '...',
      placeholder2: '...',
      teacherNote: `
Rétt merking er að Elsa vinnur á sjúkrahúsi.

Nemandi þarf að sýna:
1) að Elsa vinni / sé að vinna
2) að hún vinni á sjúkrahúsi / spítala / Landspítala

Samþykkja má umburðarlynt:
- Elsa vinnur á sjúkrahúsi.
- Elsa er að vinna á sjúkrahúsi.
- Elsa vinnur á spítala.
- Elsa vinnur á Landspítalanum.
- Elsa er að vinna á Landsspítalanum.
- Elsa vinnur á spítalanum.

Ekki samþykkja:
- Þetta er Elsa.
- Elsa er kona.
- Elsa er á sjúkrahúsi.
- Elsa vinnur.
- Elsa er hjúkrunarfræðingur.
`
    },
    {
      type: 'twoPart',
      imageUrl: '/isat1ia/media/arni.png',
      question: 'Hvar vinnur Árni?',
      subject: 'Árni',
      connector: 'í',
      placeholder1: '...',
      placeholder2: '...',
      teacherNote: `
Rétt merking er að Árni vinnur í búð.

Nemandi þarf að sýna:
1) að Árni vinni / sé að vinna
2) að hann vinni í búð / verslun / matvöruverslun / Nettó

Samþykkja má umburðarlynt:
- Árni vinnur í búð.
- Árni er að vinna í búð.
- Árni vinnur í verslun.
- Árni vinnur í matvöruverslun.
- Árni vinnur í Nettó.

Ekki samþykkja:
- Þetta er Árni.
- Árni er í búð.
- Árni vinnur.
- Árni er starfsmaður.
`
    },
    {
      type: 'onePart',
      imageUrl: '/isat1ia/media/harpa.png',
      question: 'Hvar er Harpa?',
      prefix: 'Harpa er í',
      placeholder1: '...',
      teacherNote: `
Rétt merking er að Harpa sé í eða við Tækniskólann.

Samþykkja má umburðarlynt:
- Harpa er í Tækniskólanum.
- Harpa er í skólanum.
- Harpa er fyrir framan Tækniskólann.
- Harpa er við Tækniskólann.

Ekki samþykkja:

    },
    {
      type: 'freeText',
      imageUrl: '/isat1ia/media/saekir.png',
      question: 'Hvað gerir Harpa?',
      placeholderText: 'Skrifaðu eina setningu sem passar við myndina...',
      teacherNote: `

- Harpa tekur á móti Huldu eftir skóla.
- Harpa sækir systur sína eftir skóla.
- Harpa hittir Huldu þegar hún kemur út úr skólanum.

Ekki samþykkja:

`
    },
    {
      type: 'freeText',
      imageUrl: '/isat1ia/media/elda.png',
      question: 'Hvað gera Harpa og Hulda?',
      placeholderText: 'Skrifaðu eina setningu sem passar við myndina...',
      teacherNote: `
Rétt merking er að Harpa og Hulda eldi kvöldmat saman.

Samþykkja má umburðarlynt:
- Harpa og Hulda elda kvöldmat saman.
- Þær elda saman.
- Harpa og Hulda eru að elda.
- Þær eru að elda kvöldmat.
- Harpa og Hulda hjálpast að í eldhúsinu.
- Þær elda mat saman.

Ekki samþykkja:
- Þær eru heima.
- Þær standa saman.
- Þær eru glöðar.
- Harpa er í eldhúsinu.
því þá vantar skýrt hvað þær gera.
`
    }
  ];

  function shuffle(arr) {
    const a = [...arr.map((o, i) => ({ ...o, origIndex: i }))];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const FeedbackBadge = ({ score, message, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';

    const colors = {
      green: 'bg-green-50 border-green-200 text-green-700',
      amber: 'bg-amber-50 border-amber-200 text-amber-700',
      red: 'bg-red-50 border-red-200 text-red-700',
    };

    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${colors[color]}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {onRetry && (
          <button onClick={onRetry} className="text-xs underline mt-2 opacity-70">
            Reyna aftur
          </button>
        )}
      </div>
    );
  };

  const App = () => {
    const [activeTab, setActiveTab] = useState(0);
    const [tabs, setTabs] = useState([
      { label: 'Krossaspurningar', done: false },
      { label: 'Stuttar spurningar', done: false },
      { label: 'Umræðuspurningar', done: false },
      { label: 'Ritun', done: false },
    ]);

    const markDone = (i) => {
      setTabs(prev =>
        prev.map((t, idx) => idx === i ? { ...t, done: true } : t)
      );
    };

    useEffect(() => {
      if (tabs.length > 0 && tabs.every(t => t.done)) {
        window.writeProgress && window.writeProgress('completed');
      }
    }, [tabs]);

    // --- Flipi 0: Krossaspurningar ---
    const shuffledMC = useMemo(() => MULTIPLE_CHOICE_RAW.map(q => {
      const shuffled = shuffle(q.options.map((o, i) => ({ text: o, isCorrect: i === q.correct })));
      return { question: q.question, options: shuffled };
    }), []);

    const [mcAnswers, setMcAnswers] = useState(Array(MULTIPLE_CHOICE_RAW.length).fill(null));
    const [mcSubmitted, setMcSubmitted] = useState(false);

    const handleMcAnswer = (qi, oi) => {
      if (mcSubmitted) return;
      setMcAnswers(prev => {
        const a = [...prev];
        a[qi] = oi;
        return a;
      });
    };

    const checkMc = () => {
      if (mcAnswers.some(a => a === null)) {
        alert('Vinsamlegast svaraðu öllum spurningum!');
        return;
      }
      setMcSubmitted(true);
      const allCorrect = shuffledMC.every((q, qi) => q.options[mcAnswers[qi]]?.isCorrect);
      if (allCorrect) markDone(0);
    };

    // --- Flipi 1: Stuttar spurningar ---
    const [shortAnswers, setShortAnswers] = useState(Array(SHORT_QUESTIONS.length).fill(''));
    const [shortFeedback, setShortFeedback] = useState(Array(SHORT_QUESTIONS.length).fill(null));
    const [shortLoading, setShortLoading] = useState(Array(SHORT_QUESTIONS.length).fill(false));

    const getShortFeedback = async (i) => {
      const ans = shortAnswers[i].trim();
      if (!ans) return;

      setShortLoading(prev => {
        const a = [...prev];
        a[i] = true;
        return a;
      });

      try {
        const result = await callOpenAI([
          {
            role: 'system',
            content: `Þú ert íslenskukennari sem metur stutt svör (A1–A2).
Textinn: "${READING_TEXT}"
Spurning: "${SHORT_QUESTIONS[i]}"
Svar nemanda: "${ans}"

Svaraðu EINUNGIS á þessu formi:
STIG: [0-5]
ENDURGJOF: [ein stutt, hlý setning á íslensku]`
          },
          { role: 'user', content: 'Mettu svarið.' }
        ], 100, 0.2);

        const stigMatch = result.match(/STIG:\s*(\d)/i);
        const endMatch = result.match(/ENDURGJOF:\s*(.+)/i);

        const score = stigMatch ? parseInt(stigMatch[1], 10) : 0;
        const msg = endMatch ? endMatch[1].trim() : result.trim();

        setShortFeedback(prev => {
          const a = [...prev];
          a[i] = { score, msg };
          return a;
        });
      } catch (e) {
        alert('Villa. Reyndu aftur.');
      } finally {
        setShortLoading(prev => {
          const a = [...prev];
          a[i] = false;
          return a;
        });
      }
    };

    useEffect(() => {
      if (shortFeedback.every(f => f !== null)) {
        markDone(1);
      }
    }, [shortFeedback]);

    // --- Flipi 2: Umræðuspurningar ---
    const [convs, setConvs] = useState(Array(DISCUSSION_QUESTIONS.length).fill(null).map(() => []));
    const [inputs, setInputs] = useState(Array(DISCUSSION_QUESTIONS.length).fill(''));
    const [chatLoading, setChatLoading] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));
    const [turnCount, setTurnCount] = useState(Array(DISCUSSION_QUESTIONS.length).fill(0));
    const [awaitingChoice, setAwaitingChoice] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));
    const [closed, setClosed] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));
    const chatRefs = useRef(DISCUSSION_QUESTIONS.map(() => React.createRef()));

    const scrollChat = (i) => {
      setTimeout(() => {
        const el = chatRefs.current[i]?.current;
        if (el) el.scrollTop = el.scrollHeight;
      }, 100);
    };

    const stopChat = (i) => {
      setClosed(prev => {
        const a = [...prev];
        a[i] = true;
        return a;
      });
      setAwaitingChoice(prev => {
        const a = [...prev];
        a[i] = false;
        return a;
      });
    };

    useEffect(() => {
      if (closed.every(Boolean)) {
        markDone(2);
      }
    }, [closed]);

    const continueChat = (i) => {
      setAwaitingChoice(prev => {
        const a = [...prev];
        a[i] = false;
        return a;
      });
    };

    const sendMessage = async (i) => {
      const msg = inputs[i].trim();
      if (!msg || closed[i] || awaitingChoice[i]) return;

      const newTurn = turnCount[i] + 1;
      const isPromptStop = newTurn === 4;
      const newConv = [...convs[i], { role: 'user', content: msg }];

      setConvs(prev => {
        const a = [...prev];
        a[i] = newConv;
        return a;
      });
      setInputs(prev => {
        const a = [...prev];
        a[i] = '';
        return a;
      });
      setChatLoading(prev => {
        const a = [...prev];
        a[i] = true;
        return a;
      });
      setTurnCount(prev => {
        const a = [...prev];
        a[i] = newTurn;
        return a;
      });

      scrollChat(i);

      try {
        const convHistory = newConv
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .map(m => ({ role: m.role, content: m.content }));

        const mainSys = isPromptStop
          ? `Þú ert vingjarnlegur íslenskukennari.
Svaraðu hlýlega og stuttlega (1-2 setningar) við því sem nemandinn sagði.
Ljúktu síðan á þennan hátt: "Þetta var frábært hjá þér! Viltu stoppa núna eða halda áfram að spjalla? 😊"
Á íslensku.`
          : `Þú ert vingjarnlegur íslenskukennari sem ræðir við A1–A2 nemanda.
Svaraðu stuttlega (1-2 setningar) við því sem nemandinn sagði og settu fram eina náttúrulega eftirspurningu.
Vertu hlýr og áhugasamur. Einföld íslenska.`;

        const grammarSys = `Þú ert íslenskukennari sem gefur MJÖG stuttar og hlýjar málfarsábendingar til nemenda á A1-A2 stigi.
Skoðaðu setninguna og athugaðu hvort það sé ein augljós villa (stafsetning, kyn orða, eintölu/fleirtölu eða beygingu).
Ef það er villa: Svaraðu með einni stuttri setningu sem byrjar á "Mundu að..." og lagar villuna hlýlega.
Ef engin villa eða of flókið: Svaraðu EINUNGIS með "ENGIN".
Aldrei nefna fleiri en eina villu.`;

        const [result, grammarResult] = await Promise.all([
          callOpenAI([{ role: 'system', content: mainSys }, ...convHistory], 150, 0.5),
          callOpenAI([{ role: 'system', content: grammarSys }, { role: 'user', content: msg }], 80, 0.2)
        ]);

        let updated = [...newConv];
        const grammarClean = grammarResult.trim();

        if (grammarClean && !grammarClean.toUpperCase().startsWith('ENGIN')) {
          updated = [...updated, { role: 'grammar', content: grammarClean }];
          setConvs(prev => {
            const a = [...prev];
            a[i] = updated;
            return a;
          });
          scrollChat(i);
          await new Promise(r => setTimeout(r, 300));
        }

        updated = [...updated, { role: 'assistant', content: result }];
        setConvs(prev => {
          const a = [...prev];
          a[i] = updated;
          return a;
        });
        scrollChat(i);

        if (isPromptStop) {
          setAwaitingChoice(prev => {
            const a = [...prev];
            a[i] = true;
            return a;
          });
        }
      } catch (e) {
        alert('Villa. Reyndu aftur.');
        setConvs(prev => {
          const a = [...prev];
          a[i] = convs[i];
          return a;
        });
        setTurnCount(prev => {
          const a = [...prev];
          a[i] = newTurn - 1;
          return a;
        });
      } finally {
        setChatLoading(prev => {
          const a = [...prev];
          a[i] = false;
          return a;
        });
      }
    };

    const handleKey = (e, i) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(i);
      }
    };

    // --- Flipi 3: Ritun ---
    const [writingIndex, setWritingIndex] = useState(0);
    const [writingAnswers, setWritingAnswers] = useState(
      WRITING_EXERCISES.map(() => ({
        part1: '',
        part2: '',
        freeText: '',
        feedback: null,
        loading: false,
        approved: false
      }))
    );

    const currentWriting = WRITING_EXERCISES[writingIndex];
    const currentWritingAnswer = writingAnswers[writingIndex];

    const updateWritingAnswer = (index, field, value) => {
      setWritingAnswers(prev => {
        const arr = [...prev];
        arr[index] = { ...arr[index], [field]: value };
        return arr;
      });
    };

    const buildWritingAnswer = (exercise, answerState) => {
      if (exercise.type === 'twoPart') {
        return `${exercise.subject} ${answerState.part1.trim()} ${exercise.connector} ${answerState.part2.trim()}.`;
      }

      if (exercise.type === 'onePart') {
        return `${exercise.prefix} ${answerState.part1.trim()}.`;
      }

      return answerState.freeText.trim();
    };

    const isWritingFilled = (exercise, answerState) => {
      if (exercise.type === 'twoPart') {
        return answerState.part1.trim() && answerState.part2.trim();
      }
      if (exercise.type === 'onePart') {
        return answerState.part1.trim();
      }
      return answerState.freeText.trim();
    };

    const evaluateWritingAnswer = async () => {
      const ex = WRITING_EXERCISES[writingIndex];
      const ans = writingAnswers[writingIndex];

      if (!isWritingFilled(ex, ans)) {
        alert('Vinsamlegast fylltu út svarið.');
        return;
      }

      const fullAnswer = buildWritingAnswer(ex, ans);

      setWritingAnswers(prev => {
        const arr = [...prev];
        arr[writingIndex] = { ...arr[writingIndex], loading: true };
        return arr;
      });

      try {
        const result = await callOpenAI([
          {
            role: 'system',
            content: `Þú ert íslenskukennari sem metur mjög stutta ritun hjá A1–A2 nemanda.

Nemandi sér mynd og svarar spurningunni:
"${ex.question}"

Leiðbeiningar til mats:
${ex.teacherNote}

Mikilvægt:
- Vertu MJÖG umburðarlynd/ur gagnvart stafsetningarvillum og smávægilegum beygingarvillum.
- Meta skal fyrst merkingu, svo málfar.
- Samþykktu svarið ef merkingin er skýr og svarar spurningunni.
- Nemandinn þarf ekki fullkomna málfræði.
- Endurgjöfin á að vera stutt, hlý og einföld.
- Ef svarið er næstum rétt, segðu það á uppbyggilegan hátt.

Svar nemanda:
"${fullAnswer}"

Svaraðu EINUNGIS á þessu formi:
STIG: [0-5]
SAMTHYKKT: [JA eða NEI]
ENDURGJOF: [ein eða tvær stuttar setningar á einfaldri íslensku]`
          },
          { role: 'user', content: 'Mettu svarið.' }
        ], 140, 0.2);

        const stigMatch = result.match(/STIG:\s*(\d)/i);
        const samþykktMatch = result.match(/SAMTHYKKT:\s*(JA|NEI)/i);
        const endurgjofMatch = result.match(/ENDURGJOF:\s*(.+)/i);

        const score = stigMatch ? parseInt(stigMatch[1], 10) : 0;
        const approved = samþykktMatch ? samþykktMatch[1].toUpperCase() === 'JA' : false;
        const msg = endurgjofMatch ? endurgjofMatch[1].trim() : 'Takk fyrir svarið.';

        setWritingAnswers(prev => {
          const arr = [...prev];
          arr[writingIndex] = {
            ...arr[writingIndex],
            feedback: { score, msg },
            approved,
            loading: false
          };
          return arr;
        });
      } catch (e) {
        setWritingAnswers(prev => {
          const arr = [...prev];
          arr[writingIndex] = {
            ...arr[writingIndex],
            loading: false
          };
          return arr;
        });
        alert('Villa kom upp. Reyndu aftur.');
      }
    };

    const retryWriting = () => {
      setWritingAnswers(prev => {
        const arr = [...prev];
        arr[writingIndex] = {
          ...arr[writingIndex],
          feedback: null,
          approved: false,
          loading: false
        };
        return arr;
      });
    };

    const goToNextWriting = () => {
      if (writingIndex < WRITING_EXERCISES.length - 1) {
        setWritingIndex(prev => prev + 1);
      }
    };

    const goToPrevWriting = () => {
      if (writingIndex > 0) {
        setWritingIndex(prev => prev - 1);
      }
    };

    useEffect(() => {
      if (writingAnswers.every(item => item.approved)) {
        markDone(3);
      }
    }, [writingAnswers]);

    const renderWritingInput = () => {
      if (currentWriting.type === 'twoPart') {
        return (
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-base text-gray-800 font-medium">
                {currentWriting.subject}
              </span>

              <input
                type="text"
                value={currentWritingAnswer.part1}
                onChange={(e) => updateWritingAnswer(writingIndex, 'part1', e.target.value)}
                disabled={currentWritingAnswer.feedback !== null}
                placeholder={currentWriting.placeholder1}
                className="min-w-[110px] flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50"
              />

              <span className="text-base text-gray-800 font-medium">
                {currentWriting.connector}
              </span>

              <input
                type="text"
                value={currentWritingAnswer.part2}
                onChange={(e) => updateWritingAnswer(writingIndex, 'part2', e.target.value)}
                disabled={currentWritingAnswer.feedback !== null}
                placeholder={currentWriting.placeholder2}
                className="min-w-[130px] flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50"
              />

              <span className="text-base text-gray-800 font-medium">.</span>
            </div>
          </div>
        );
      }

      if (currentWriting.type === 'onePart') {
        return (
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-base text-gray-800 font-medium">
                {currentWriting.prefix}
              </span>

              <input
                type="text"
                value={currentWritingAnswer.part1}
                onChange={(e) => updateWritingAnswer(writingIndex, 'part1', e.target.value)}
                disabled={currentWritingAnswer.feedback !== null}
                placeholder={currentWriting.placeholder1}
                className="min-w-[180px] flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50"
              />

              <span className="text-base text-gray-800 font-medium">.</span>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
          <textarea
            value={currentWritingAnswer.freeText}
            onChange={(e) => updateWritingAnswer(writingIndex, 'freeText', e.target.value)}
            disabled={currentWritingAnswer.feedback !== null}
            className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm"
            rows={3}
            placeholder={currentWriting.placeholderText}
          />
        </div>
      );
    };

    return (
      <div className="min-h-screen pb-24">
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <button
              onClick={() => window.history.back()}
              className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light"
            >
              ← Til baka
            </button>
            <h1 className="text-3xl font-light text-gray-800 mb-2">📖 Lestexti 1: Árni, Elsa, Harpa og Hulda</h1>
            <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
          </div>
        </header>

        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">
          <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-6">
            <p className="text-sm font-light text-blue-800">📖 Lestu textann hægt og rólega</p>
            <p className="text-sm font-light text-blue-800">✏️ Svaraðu krossaspurningunum</p>
            <p className="text-sm font-light text-blue-800">📝 Svaraðu stuttum spurningum með heilum setningum</p>
            <p className="text-sm font-light text-blue-800">💬 Ræddu spurningarnar með AI</p>
            <p className="text-sm font-light text-blue-800">✍️ Skrifaðu út frá 5 myndum</p>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in">
            <p className="text-gray-700 leading-relaxed font-light">{READING_TEXT}</p>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="flex border-b border-gray-200 bg-gray-50">
              {tabs.map((tab, i) => (
                <button
                  key={i}
                  onClick={() => setActiveTab(i)}
                  className={`tab-btn flex-1 px-4 py-3 text-sm font-light text-gray-600 ${activeTab === i ? 'active' : ''}`}
                >
                  {tab.done ? `✓ ${tab.label}` : tab.label}
                </button>
              ))}
            </div>

            <div className="p-6 fade-in" key={activeTab}>

              {activeTab === 0 && (
                <div className="space-y-6">
                  {shuffledMC.map((q, qi) => (
                    <div key={qi} className="border border-gray-100 rounded-xl p-5">
                      <p className="font-medium text-gray-800 mb-3 text-sm">{qi + 1}. {q.question}</p>
                      <div className="space-y-2">
                        {q.options.map((opt, oi) => {
                          const isSelected = mcAnswers[qi] === oi;
                          const isCorrect = opt.isCorrect;
                          const showCorrect = mcSubmitted && isCorrect;
                          const showIncorrect = mcSubmitted && isSelected && !isCorrect;
                          return (
                            <div
                              key={oi}
                              onClick={() => handleMcAnswer(qi, oi)}
                              className={`answer-option p-3 rounded-lg
                                ${isSelected && !mcSubmitted ? 'opt-selected' : ''}
                                ${showCorrect ? 'opt-correct' : ''}
                                ${showIncorrect ? 'opt-incorrect' : ''}
                                ${mcSubmitted ? 'opt-disabled' : ''}`}
                            >
                              <div className="flex items-center gap-3">
                                <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0
                                  ${isSelected && !mcSubmitted ? 'border-blue-500 bg-blue-500' :
                                    showCorrect ? 'border-green-500 bg-green-500' :
                                    showIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                  {(isSelected || showCorrect) && <div className="w-1.5 h-1.5 bg-white rounded-full"></div>}
                                </div>
                                <span className="font-light text-sm flex-1">{opt.text}</span>
                                {showCorrect && <span className="text-green-600 text-sm">✓</span>}
                                {showIncorrect && <span className="text-red-600 text-sm">✗</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  {!mcSubmitted ? (
                    <button
                      onClick={checkMc}
                      className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light"
                    >
                      Athuga svör
                    </button>
                  ) : (
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 fade-in text-center">
                      <p className="text-blue-800 font-light text-sm mb-3">
                        {shuffledMC.every((q, qi) => q.options[mcAnswers[qi]]?.isCorrect)
                          ? '🎉 Frábært! Öll svörin eru rétt!'
                          : `Þú fékkst ${shuffledMC.filter((q, qi) => q.options[mcAnswers[qi]]?.isCorrect).length} af ${MULTIPLE_CHOICE_RAW.length} rétt.`}
                      </p>
                      <button
                        onClick={() => setActiveTab(1)}
                        className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm"
                      >
                        Áfram í stuttar spurningar →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 1 && (
                <div className="space-y-6">
                  {SHORT_QUESTIONS.map((q, i) => (
                    <div key={i} className="border border-gray-100 rounded-xl p-5">
                      <p className="font-medium text-gray-800 mb-3 text-sm">{i + 1}. {q}</p>
                      <textarea
                        value={shortAnswers[i]}
                        onChange={e => setShortAnswers(prev => {
                          const a = [...prev];
                          a[i] = e.target.value;
                          return a;
                        })}
                        disabled={shortFeedback[i] !== null}
                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm mb-3"
                        rows={2}
                        placeholder="Skrifaðu svarið þitt hér..."
                      />
                      {!shortFeedback[i] ? (
                        <button
                          onClick={() => getShortFeedback(i)}
                          disabled={shortLoading[i] || shortAnswers[i].trim().length < 2}
                          className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm"
                        >
                          {shortLoading[i] ? 'Bíð...' : 'Fá endurgjöf'}
                        </button>
                      ) : (
                        <FeedbackBadge
                          score={shortFeedback[i].score}
                          message={shortFeedback[i].msg}
                          onRetry={() => setShortFeedback(prev => {
                            const a = [...prev];
                            a[i] = null;
                            return a;
                          })}
                        />
                      )}
                    </div>
                  ))}

                  {shortFeedback.every(f => f !== null) && (
                    <div className="text-center fade-in">
                      <button
                        onClick={() => setActiveTab(2)}
                        className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm"
                      >
                        Áfram í umræðuspurningar →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 2 && (
                <div className="space-y-6">
                  {DISCUSSION_QUESTIONS.map((q, i) => (
                    <div key={i} className="border border-gray-100 rounded-xl p-5">
                      <div className="flex items-center justify-between mb-3">
                        <p className="font-medium text-gray-800 text-sm">{i + 1}. {q}</p>
                        {closed[i] && (
                          <span className="text-xs text-green-600 font-light flex items-center gap-1 flex-shrink-0 ml-2">
                            <span>✔</span> Lokið
                          </span>
                        )}
                      </div>

                      <div
                        ref={chatRefs.current[i]}
                        style={{ minHeight: 80, maxHeight: 320, overflowY: 'auto' }}
                        className="space-y-2 mb-3"
                      >
                        {convs[i].map((msg, mi) => (
                          <div
                            key={mi}
                            className={`flex ${msg.role === 'user' ? 'justify-end' : msg.role === 'grammar' ? 'justify-center' : 'justify-start'}`}
                          >
                            {msg.role === 'grammar' ? (
                              <div className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 max-w-[90%] flex items-start gap-2">
                                <span className="text-amber-500 text-xs mt-0.5 flex-shrink-0">📌</span>
                                <p className="text-amber-800 font-light text-xs">{msg.content}</p>
                              </div>
                            ) : (
                              <div className={`max-w-xs px-4 py-2 rounded-xl text-sm font-light
                                ${msg.role === 'user' ? 'bg-blue-100 text-blue-900' : 'bg-gray-100 text-gray-800'}`}>
                                {msg.content}
                              </div>
                            )}
                          </div>
                        ))}
                        {chatLoading[i] && (
                          <div className="flex justify-start">
                            <div className="bg-gray-100 rounded-xl px-4 py-2 text-sm text-gray-400 font-light">Bíð...</div>
                          </div>
                        )}
                      </div>

                      {awaitingChoice[i] && (
                        <div className="flex gap-3 justify-center mt-2 mb-3 fade-in">
                          <button
                            onClick={() => stopChat(i)}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm"
                          >
                            ✓ Já, ég er búinn/búin
                          </button>
                          <button
                            onClick={() => continueChat(i)}
                            className="px-5 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm"
                          >
                            Halda áfram →
                          </button>
                        </div>
                      )}

                      {!closed[i] && !awaitingChoice[i] && (
                        <div className="flex gap-2">
                          <textarea
                            value={inputs[i]}
                            onChange={e => setInputs(prev => {
                              const a = [...prev];
                              a[i] = e.target.value;
                              return a;
                            })}
                            onKeyDown={e => handleKey(e, i)}
                            disabled={chatLoading[i]}
                            className="flex-1 px-4 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm"
                            rows={2}
                            placeholder={convs[i].length === 0 ? 'Skrifaðu svarið þitt hér...' : 'Haltu áfram...'}
                          />
                          <button
                            onClick={() => sendMessage(i)}
                            disabled={chatLoading[i] || !inputs[i].trim()}
                            className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end"
                          >
                            Senda
                          </button>
                        </div>
                      )}
                    </div>
                  ))}

                  {closed.every(Boolean) && (
                    <div className="bg-green-50 border border-green-200 rounded-xl p-5 text-center fade-in">
                      <p className="text-green-700 font-light text-sm">🎉 Frábært! Þú kláraðir öll þrjú samtölin.</p>
                      <button
                        onClick={() => setActiveTab(3)}
                        className="mt-3 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm"
                      >
                        Áfram í ritun →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 3 && (
                <div className="space-y-6">
                  <div className="border border-gray-100 rounded-xl p-5">
                    <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
                      <div>
                        <h2 className="text-xl font-medium text-gray-800 mb-1">Ritun</h2>
                        <p className="text-sm text-gray-500 font-light">
                          Verkefnið verður aðeins frjálsara eftir því sem líður á.
                        </p>
                      </div>

                      <div className="text-right">
                        <p className="text-sm font-medium text-gray-700">
                          Mynd {writingIndex + 1} af {WRITING_EXERCISES.length}
                        </p>
                        <div className="flex gap-2 justify-end mt-2">
                          {WRITING_EXERCISES.map((_, i) => (
                            <div
                              key={i}
                              className={`w-3 h-3 rounded-full ${
                                writingAnswers[i].approved
                                  ? 'bg-green-500'
                                  : i === writingIndex
                                  ? 'bg-blue-500'
                                  : 'bg-gray-300'
                              }`}
                            />
                          ))}
                        </div>
                      </div>
                    </div>

                    <img
                      src={currentWriting.imageUrl}
                      alt={currentWriting.question}
                      className="block w-full h-auto max-w-2xl mx-auto rounded-xl shadow-sm border border-gray-200 mb-5"
                    />

                    <p className="font-medium text-gray-800 text-base mb-4">
                      {currentWriting.question}
                    </p>

                    {renderWritingInput()}

                    {!currentWritingAnswer.feedback ? (
                      <button
                        onClick={evaluateWritingAnswer}
                        disabled={currentWritingAnswer.loading || !isWritingFilled(currentWriting, currentWritingAnswer)}
                        className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm"
                      >
                        {currentWritingAnswer.loading ? 'Bíð...' : 'Fá mat frá AI'}
                      </button>
                    ) : (
                      <div className="space-y-4">
                        <FeedbackBadge
                          score={currentWritingAnswer.feedback.score}
                          message={currentWritingAnswer.feedback.msg}
                          onRetry={retryWriting}
                        />

                        <div className="flex flex-wrap gap-3">
                          {writingIndex > 0 && (
                            <button
                              onClick={goToPrevWriting}
                              className="px-5 py-2 border-2 border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm"
                            >
                              ← Fyrri mynd
                            </button>
                          )}

                          {currentWritingAnswer.approved && writingIndex < WRITING_EXERCISES.length - 1 && (
                            <button
                              onClick={goToNextWriting}
                              className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm"
                            >
                              Næsta mynd →
                            </button>
                          )}
                        </div>

                        {currentWritingAnswer.approved && writingIndex === WRITING_EXERCISES.length - 1 && (
                          <div className="bg-green-50 border border-green-200 rounded-xl p-4 text-green-700 text-sm font-light">
                            🎉 Frábært! Þú kláraðir ritunarverkefnið.
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              )}

            </div>
          </div>
        </main>

        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {tabs.map((tab, i) => (
              <button
                key={i}
                onClick={() => setActiveTab(i)}
                className={`flex-1 py-2 rounded-lg text-sm font-light transition-colors
                  ${tab.done ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}
              >
                {tab.done ? `✓ ${tab.label}` : tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
