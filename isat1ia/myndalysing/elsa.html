<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Lestexti 1: Árni, Elsa, Harpa og Hulda – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .answer-option {
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
      cursor: pointer;
    }
    .answer-option:hover:not(.opt-disabled) { border-color: #93c5fd; background: #eff6ff; }
    .answer-option.opt-selected   { border-color: #3b82f6; background: #eff6ff; }
    .answer-option.opt-correct    { border-color: #22c55e; background: #f0fdf4; }
    .answer-option.opt-incorrect  { border-color: #ef4444; background: #fef2f2; }
    .answer-option.opt-disabled   { cursor: default; }
    .tab-btn { transition: all 0.2s; position: relative; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .tab-btn.active { background: white; color: #2563eb; font-weight: 500; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
  </style>
</head>
<body>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDhmWC3YG-eJqTQgTj3otO7tLdo1Zjzh-4",
    authDomain: "malstodin-90f85.firebaseapp.com",
    projectId: "malstodin-90f85",
    storageBucket: "malstodin-90f85.firebasestorage.app",
    messagingSenderId: "190485777754",
    appId: "1:190485777754:web:070d4a35eaa9d65e8b3763"
  };

  const COURSE = 'isat1ia';
  const LOGIN = '../login.html';
  const EXERCISE_ID = 'lestextar_01';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  async function writeProgress(status) {
    try {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'progress', user.uid, 'isat1ia', EXERCISE_ID);
      const data = { status, updated_at: serverTimestamp() };
      if (status === 'opened') data.opened_at = serverTimestamp();
      if (status === 'completed') data.completed_at = serverTimestamp();
      await setDoc(ref, data, { merge: true });
    } catch (e) {
      console.error('Progress write failed:', e);
    }
  }
  window.writeProgress = writeProgress;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = LOGIN; return; }
    try {
      const snap = await getDoc(doc(db, 'user_access', user.uid));
      if (!snap.exists()) { window.location.href = LOGIN; return; }
      const courseData = snap.data()[COURSE];
      if (!courseData || !courseData.activated_at) { window.location.href = LOGIN; return; }
      if (courseData.expires_at && courseData.expires_at.toDate() < new Date()) { window.location.href = LOGIN; return; }
    } catch { window.location.href = LOGIN; return; }

    writeProgress('opened');
    document.getElementById('auth-loading').style.display = 'none';
    const root = document.getElementById('root');
    if (root) root.style.display = 'block';
  });
</script>

<div id="auth-loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <p style="color:#9ca3af;font-weight:300;font-family:system-ui,sans-serif;">Hleður...</p>
</div>

<div id="root" style="display:none"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  // --- API ---
  async function callOpenAI(messages, max_tokens = 140, model = 'gpt-4o-mini', temperature = 0.2) {
    const r = await fetch('/.netlify/functions/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, max_tokens, model, temperature }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
    return data.content;
  }

  // --- Gögn ---
  const READING_TEXT = `Árni og Elsa eru gift. Þau búa í Hlíðunum í Reykjavík. Elsa vinnur á sjúkrahúsi og stundum vinnur hún á kvöldin og nóttunni. Árni vinnur í búð og vinnan hans er frá 9 á morgnana til 17 á daginn. Dóttir Árna er 17 ára og býr hjá Árna og Elsu. Hún heitir Harpa og er í Tækniskólanum. Harpa er ekki dóttir Elsu. Elsa og Árni eiga eina yngri dóttur saman sem heitir Hulda. Hún er 12 ára og er í Austurbæjarskóla. Ef Elsa og Árni eru að vinna, sækir Harpa litlu systur sína í skólann og fer með hana heim. Stundum fara þær á kaffihús eða á bókasafn. Harpa hjálpar líka heima við að elda mat. Einn dag í viku elda Harpa og Hulda saman kvöldmatinn.`;

  const MULTIPLE_CHOICE_RAW = [
    {
      question: 'Hvar búa Árni og Elsa?',
      options: ['Þau búa í Hlíðunum í Reykjavík.', 'Þau búa í Hafnarfirði.', 'Þau búa í Kópavogi.', 'Þau búa í Garðabæ.'],
      correct: 0
    },
    {
      question: 'Hver er eldri, Harpa eða Hulda?',
      options: ['Harpa er eldri.', 'Hulda er eldri.', 'Þær eru tvíburar.', 'Það kemur ekki fram í textanum.'],
      correct: 0
    },
    {
      question: 'Hver er mamma Hörpu?',
      options: ['Elsa.', 'Hulda.', 'Það stendur ekki í textanum.'],
      correct: 2
    }
  ];

  const SHORT_QUESTIONS = [
    'Hver vinnur á sjúkrahúsi?',
    'Hver er í Tækniskólanum?',
    'Hvert fara Hulda og Harpa stundum saman?'
  ];

  const DISCUSSION_QUESTIONS = [
    'Hvernig er það að vera systkini? Hvernig er það að vera eldri/yngri systkini? Hvernig er það að vera eina barnið?',
    'Hvernig er það að vera í fjölskyldu þar sem báðir foreldrarnir vinna? Hvernig eru venjurnar í þinni fjölskyldu?',
    'Hvað finnst þér um að hjálpa heima við húsverk? Hvaða húsverk hjálpar þú við?'
  ];

  // Ritunarverkefni – accepted eru fyrirfram gefin svör (client-side check)
  // Ef svar passar ekki við accepted → vision-mat með gpt-4o
  const WRITING_EXERCISES = [
    {
      type: 'twoPart',
      imageUrl: '/isat1ia/media/elsa.png',
      question: 'Hvar vinnur Elsa?',
      subject: 'Elsa',
      connector: 'á',
      placeholder1: 'vinnur / er að vinna',
      placeholder2: 'sjúkrahúsi / spítala...',
      accepted: [
        'elsa vinnur á sjúkrahúsi',
        'elsa er að vinna á sjúkrahúsi',
        'elsa vinnur á spítala',
        'elsa vinnur á landspítalanum',
        'elsa er að vinna á landspítalanum',
        'elsa vinnur á spítalanum',
      ],
    },
    {
      type: 'twoPart',
      imageUrl: '/isat1ia/media/arni.png',
      question: 'Hvar vinnur Árni?',
      subject: 'Árni',
      connector: 'í',
      placeholder1: 'vinnur / er að vinna',
      placeholder2: 'búð / verslun...',
      accepted: [
        'árni vinnur í búð',
        'árni er að vinna í búð',
        'árni vinnur í verslun',
        'árni vinnur í matvöruverslun',
        'árni vinnur í nettó',
        'árni er að vinna í verslun',
      ],
    },
    {
      type: 'onePart',
      imageUrl: '/isat1ia/media/harpa.png',
      question: 'Hvar er Harpa?',
      prefix: 'Harpa er í',
      placeholder1: 'Tækniskólanum...',
      accepted: [
        'harpa er í tækniskólanum',
        'harpa er í skólanum',
        'harpa er við tækniskólann',
        'harpa er fyrir framan tækniskólann',
        'harpa er fyrir utan skólann',
      ],
    },
    {
      type: 'freeText',
      imageUrl: '/isat1ia/media/saekir.png',
      question: 'Hvað gerir Harpa?',
      placeholderText: 'Skrifaðu eina setningu sem passar við myndina...',
      accepted: [
        'harpa sækir huldu í skólann',
        'harpa er að sækja huldu í skólann',
        'harpa sækir litlu systur sína í skólann',
        'harpa tekur á móti huldu eftir skóla',
        'harpa sækir systur sína eftir skóla',
      ],
    },
    {
      type: 'freeText',
      imageUrl: '/isat1ia/media/elda.png',
      question: 'Hvað gera Harpa og Hulda?',
      placeholderText: 'Skrifaðu eina setningu sem passar við myndina...',
      accepted: [
        'harpa og hulda elda kvöldmat saman',
        'þær elda saman',
        'harpa og hulda eru að elda',
        'þær eru að elda kvöldmat',
        'harpa og hulda hjálpast að í eldhúsinu',
        'þær elda mat saman',
        'harpa og hulda elda mat',
      ],
    }
  ];

  // --- Hjálparföll ---
  function normalize(s) {
    return s.toLowerCase().trim()
      .replace(/[.,!?]/g, '')
      .replace(/\s+/g, ' ');
  }

  function quickCheck(exercise, fullAnswer) {
    const n = normalize(fullAnswer);
    return exercise.accepted.some(a => normalize(a) === n);
  }

  function shuffle(arr) {
    const a = [...arr.map((o, i) => ({ ...o, origIndex: i }))];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // --- FeedbackBadge ---
  const FeedbackBadge = ({ score, message, onRetry }) => {
    const color = score >= 4 ? 'green' : score >= 2 ? 'amber' : 'red';
    const colors = {
      green: 'bg-green-50 border-green-200 text-green-700',
      amber: 'bg-amber-50 border-amber-200 text-amber-700',
      red: 'bg-red-50 border-red-200 text-red-700',
    };
    return (
      <div className={`mt-3 p-3 rounded-lg border fade-in ${colors[color]}`}>
        <div className="font-medium text-sm mb-1">Stig: {score}/5</div>
        <p className="text-sm font-light">{message}</p>
        {onRetry && (
          <button onClick={onRetry} className="text-xs underline mt-2 opacity-70">Reyna aftur</button>
        )}
      </div>
    );
  };

  // --- Aðalforrit ---
  const App = () => {
    const [activeTab, setActiveTab] = useState(0);
    const [tabs, setTabs] = useState([
      { label: 'Krossaspurningar', done: false },
      { label: 'Stuttar spurningar', done: false },
      { label: 'Umræðuspurningar', done: false },
      { label: 'Ritun', done: false },
    ]);

    const markDone = (i) => setTabs(prev => prev.map((t, idx) => idx === i ? { ...t, done: true } : t));

    useEffect(() => {
      if (tabs.every(t => t.done)) {
        window.writeProgress && window.writeProgress('completed');
      }
    }, [tabs]);

    // === FLIPI 0: Krossaspurningar ===
    const shuffledMC = useMemo(() => MULTIPLE_CHOICE_RAW.map(q => {
      const shuffled = shuffle(q.options.map((o, i) => ({ text: o, isCorrect: i === q.correct })));
      return { question: q.question, options: shuffled };
    }), []);

    const [mcAnswers, setMcAnswers] = useState(Array(MULTIPLE_CHOICE_RAW.length).fill(null));
    const [mcSubmitted, setMcSubmitted] = useState(false);

    const handleMcAnswer = (qi, oi) => {
      if (mcSubmitted) return;
      setMcAnswers(prev => { const a = [...prev]; a[qi] = oi; return a; });
    };

    const checkMc = () => {
      if (mcAnswers.some(a => a === null)) { alert('Vinsamlegast svaraðu öllum spurningum!'); return; }
      setMcSubmitted(true);
      if (shuffledMC.every((q, qi) => q.options[mcAnswers[qi]]?.isCorrect)) markDone(0);
      else markDone(0); // markDone alltaf þegar búið
    };

    // === FLIPI 1: Stuttar spurningar ===
    const [shortAnswers, setShortAnswers] = useState(Array(SHORT_QUESTIONS.length).fill(''));
    const [shortFeedback, setShortFeedback] = useState(Array(SHORT_QUESTIONS.length).fill(null));
    const [shortLoading, setShortLoading] = useState(Array(SHORT_QUESTIONS.length).fill(false));

    const getShortFeedback = async (i) => {
      const ans = shortAnswers[i].trim();
      if (!ans) return;
      setShortLoading(prev => { const a = [...prev]; a[i] = true; return a; });
      try {
        const result = await callOpenAI([
          {
            role: 'system',
            content: `Þú ert íslenskukennari sem metur stutt svör (A1–A2).
Textinn: "${READING_TEXT}"
Spurning: "${SHORT_QUESTIONS[i]}"
Svar nemanda: "${ans}"

Svaraðu EINUNGIS á þessu formi:
STIG: [0-5]
ENDURGJOF: [ein stutt, hlý setning á íslensku]`
          },
          { role: 'user', content: 'Mettu svarið.' }
        ], 100, 'gpt-4o-mini', 0.2);

        const stigMatch = result.match(/STIG:\s*(\d)/i);
        const endMatch = result.match(/ENDURGJOF:\s*(.+)/i);
        const score = stigMatch ? parseInt(stigMatch[1], 10) : 0;
        const msg = endMatch ? endMatch[1].trim() : result.trim();
        setShortFeedback(prev => { const a = [...prev]; a[i] = { score, msg }; return a; });
      } catch { alert('Villa. Reyndu aftur.'); }
      finally { setShortLoading(prev => { const a = [...prev]; a[i] = false; return a; }); }
    };

    useEffect(() => {
      if (shortFeedback.every(f => f !== null)) markDone(1);
    }, [shortFeedback]);

    // === FLIPI 2: Umræðuspurningar ===
    const [convs, setConvs] = useState(DISCUSSION_QUESTIONS.map(() => []));
    const [inputs, setInputs] = useState(Array(DISCUSSION_QUESTIONS.length).fill(''));
    const [chatLoading, setChatLoading] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));
    const [turnCount, setTurnCount] = useState(Array(DISCUSSION_QUESTIONS.length).fill(0));
    const [awaitingChoice, setAwaitingChoice] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));
    const [closed, setClosed] = useState(Array(DISCUSSION_QUESTIONS.length).fill(false));
    const chatRefs = useRef(DISCUSSION_QUESTIONS.map(() => React.createRef()));

    const scrollChat = (i) => {
      setTimeout(() => {
        const el = chatRefs.current[i]?.current;
        if (el) el.scrollTop = el.scrollHeight;
      }, 100);
    };

    const stopChat = (i) => {
      setClosed(prev => { const a = [...prev]; a[i] = true; return a; });
      setAwaitingChoice(prev => { const a = [...prev]; a[i] = false; return a; });
    };

    const continueChat = (i) => {
      setAwaitingChoice(prev => { const a = [...prev]; a[i] = false; return a; });
    };

    useEffect(() => {
      if (closed.every(Boolean)) markDone(2);
    }, [closed]);

    const sendMessage = async (i) => {
      const msg = inputs[i].trim();
      if (!msg || closed[i] || awaitingChoice[i]) return;

      const newTurn = turnCount[i] + 1;
      const isPromptStop = newTurn === 4;
      const newConv = [...convs[i], { role: 'user', content: msg }];

      setConvs(prev => { const a = [...prev]; a[i] = newConv; return a; });
      setInputs(prev => { const a = [...prev]; a[i] = ''; return a; });
      setChatLoading(prev => { const a = [...prev]; a[i] = true; return a; });
      setTurnCount(prev => { const a = [...prev]; a[i] = newTurn; return a; });
      scrollChat(i);

      try {
        const convHistory = newConv
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .map(m => ({ role: m.role, content: m.content }));

        const mainSys = isPromptStop
          ? `Þú ert vingjarnlegur íslenskukennari. Svaraðu hlýlega og stuttlega (1-2 setningar) við því sem nemandinn sagði. Ljúktu síðan á þennan hátt: "Þetta var frábært hjá þér! Viltu stoppa núna eða halda áfram að spjalla? 😊" Á íslensku.`
          : `Þú ert vingjarnlegur íslenskukennari sem ræðir við A1–A2 nemanda. Svaraðu stuttlega (1-2 setningar) við því sem nemandinn sagði og settu fram eina náttúrulega eftirspurningu. Vertu hlýr og áhugasamur. Einföld íslenska.`;

        const grammarSys = `Þú ert íslenskukennari sem gefur MJÖG stuttar og hlýjar málfarsábendingar til nemenda á A1-A2 stigi. Skoðaðu setninguna og athugaðu hvort það sé ein augljós villa (stafsetning, kyn orða, eintölu/fleirtölu eða beygingu). Ef það er villa: Svaraðu með einni stuttri setningu sem byrjar á "Mundu að..." og lagar villuna hlýlega. Ef engin villa eða of flókið: Svaraðu EINUNGIS með "ENGIN". Aldrei nefna fleiri en eina villu.`;

        const [result, grammarResult] = await Promise.all([
          callOpenAI([{ role: 'system', content: mainSys }, ...convHistory], 150, 'gpt-4o-mini', 0.5),
          callOpenAI([{ role: 'system', content: grammarSys }, { role: 'user', content: msg }], 80, 'gpt-4o-mini', 0.2)
        ]);

        let updated = [...newConv];
        const grammarClean = grammarResult.trim();

        if (grammarClean && !grammarClean.toUpperCase().startsWith('ENGIN')) {
          updated = [...updated, { role: 'grammar', content: grammarClean }];
          setConvs(prev => { const a = [...prev]; a[i] = updated; return a; });
          scrollChat(i);
          await new Promise(r => setTimeout(r, 300));
        }

        updated = [...updated, { role: 'assistant', content: result }];
        setConvs(prev => { const a = [...prev]; a[i] = updated; return a; });
        scrollChat(i);

        if (isPromptStop) {
          setAwaitingChoice(prev => { const a = [...prev]; a[i] = true; return a; });
        }
      } catch {
        alert('Villa. Reyndu aftur.');
        setConvs(prev => { const a = [...prev]; a[i] = convs[i]; return a; });
        setTurnCount(prev => { const a = [...prev]; a[i] = turnCount[i]; return a; });
      } finally {
        setChatLoading(prev => { const a = [...prev]; a[i] = false; return a; });
      }
    };

    const handleKey = (e, i) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(i); }
    };

    // === FLIPI 3: Ritun ===
    const [writingIndex, setWritingIndex] = useState(0);
    const [writingAnswers, setWritingAnswers] = useState(
      WRITING_EXERCISES.map(() => ({
        part1: '', part2: '', freeText: '',
        feedback: null, loading: false, done: false
      }))
    );

    const currentEx = WRITING_EXERCISES[writingIndex];
    const currentAns = writingAnswers[writingIndex];

    const updateField = (field, value) => {
      setWritingAnswers(prev => {
        const arr = [...prev];
        arr[writingIndex] = { ...arr[writingIndex], [field]: value };
        return arr;
      });
    };

    const buildAnswer = (ex, ans) => {
      if (ex.type === 'twoPart') return `${ex.subject} ${ans.part1.trim()} ${ex.connector} ${ans.part2.trim()}`;
      if (ex.type === 'onePart') return `${ex.prefix} ${ans.part1.trim()}`;
      return ans.freeText.trim();
    };

    const isFilled = (ex, ans) => {
      if (ex.type === 'twoPart') return ans.part1.trim() && ans.part2.trim();
      if (ex.type === 'onePart') return ans.part1.trim();
      return ans.freeText.trim();
    };

    const evaluateWriting = async () => {
      const ex = WRITING_EXERCISES[writingIndex];
      const ans = writingAnswers[writingIndex];
      if (!isFilled(ex, ans)) { alert('Vinsamlegast fylltu út svarið.'); return; }

      const fullAnswer = buildAnswer(ex, ans);

      // Lag 1: client-side strengjasamanburður
      if (quickCheck(ex, fullAnswer)) {
        setWritingAnswers(prev => {
          const arr = [...prev];
          arr[writingIndex] = {
            ...arr[writingIndex],
            feedback: { score: 5, msg: 'Frábært! Svarið er rétt.' },
            done: true
          };
          return arr;
        });
        return;
      }

      // Lag 2: vision-mat með gpt-4o
      setWritingAnswers(prev => {
        const arr = [...prev];
        arr[writingIndex] = { ...arr[writingIndex], loading: true };
        return arr;
      });

      try {
        const imageAbsUrl = new URL(ex.imageUrl, window.location.origin).href;

        const result = await callOpenAI([
          {
            role: 'system',
            content: `Þú ert íslenskukennari sem metur ritun hjá A1–A2 nemanda.
Skoðaðu myndina og mettu hvort svar nemandans passi við það sem sést á henni.
Spurning: "${ex.question}"
Vertu umburðarlynd/ur gagnvart samheitum, nálægri merkingu og smávægilegum málfræðivillum.
Ef svarið er merkingarlega skynsamlegt miðað við myndina, samþykktu það.

Svaraðu EINUNGIS á þessu formi:
STIG: [0-5]
SAMTHYKKT: [JA eða NEI]
ENDURGJOF: [ein eða tvær stuttar setningar á einfaldri íslensku]`
          },
          {
            role: 'user',
            content: [
              {
                type: 'image_url',
                image_url: { url: imageAbsUrl }
              },
              {
                type: 'text',
                text: `Svar nemanda: "${fullAnswer}"`
              }
            ]
          }
        ], 160, 'gpt-4o-mini', 0.2);

        const stigMatch = result.match(/STIG:\s*(\d)/i);
        const samþykktMatch = result.match(/SAMTHYKKT:\s*(JA|NEI)/i);
        const endMatch = result.match(/ENDURGJOF:\s*(.+)/i);

        const score = stigMatch ? parseInt(stigMatch[1], 10) : 0;
        const approved = samþykktMatch ? samþykktMatch[1].toUpperCase() === 'JA' : false;
        const msg = endMatch ? endMatch[1].trim() : 'Takk fyrir svarið.';

        setWritingAnswers(prev => {
          const arr = [...prev];
          arr[writingIndex] = {
            ...arr[writingIndex],
            feedback: { score, msg },
            done: approved,
            loading: false
          };
          return arr;
        });
      } catch {
        setWritingAnswers(prev => {
          const arr = [...prev];
          arr[writingIndex] = { ...arr[writingIndex], loading: false };
          return arr;
        });
        alert('Villa kom upp. Reyndu aftur.');
      }
    };

    const retryWriting = () => {
      setWritingAnswers(prev => {
        const arr = [...prev];
        arr[writingIndex] = { ...arr[writingIndex], feedback: null, done: false };
        return arr;
      });
    };

    useEffect(() => {
      if (writingAnswers.every(w => w.done)) markDone(3);
    }, [writingAnswers]);

    const renderWritingInput = () => {
      if (currentEx.type === 'twoPart') {
        return (
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-base text-gray-800 font-medium">{currentEx.subject}</span>
              <input
                type="text"
                value={currentAns.part1}
                onChange={e => updateField('part1', e.target.value)}
                disabled={currentAns.feedback !== null}
                placeholder={currentEx.placeholder1}
                className="min-w-[130px] flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50 text-sm"
              />
              <span className="text-base text-gray-800 font-medium">{currentEx.connector}</span>
              <input
                type="text"
                value={currentAns.part2}
                onChange={e => updateField('part2', e.target.value)}
                disabled={currentAns.feedback !== null}
                placeholder={currentEx.placeholder2}
                className="min-w-[140px] flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50 text-sm"
              />
              <span className="text-base text-gray-800 font-medium">.</span>
            </div>
          </div>
        );
      }

      if (currentEx.type === 'onePart') {
        return (
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-base text-gray-800 font-medium">{currentEx.prefix}</span>
              <input
                type="text"
                value={currentAns.part1}
                onChange={e => updateField('part1', e.target.value)}
                disabled={currentAns.feedback !== null}
                placeholder={currentEx.placeholder1}
                className="min-w-[200px] flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light disabled:bg-gray-50 text-sm"
              />
              <span className="text-base text-gray-800 font-medium">.</span>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
          <textarea
            value={currentAns.freeText}
            onChange={e => updateField('freeText', e.target.value)}
            disabled={currentAns.feedback !== null}
            className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm"
            rows={3}
            placeholder={currentEx.placeholderText}
          />
        </div>
      );
    };

    // === RENDER ===
    return (
      <div className="min-h-screen pb-24">
        <header className="bg-white shadow-sm border-b border-gray-200">
          <div className="max-w-4xl mx-auto px-6 py-8">
            <button onClick={() => window.history.back()}
              className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
              ← Til baka
            </button>
            <h1 className="text-3xl font-light text-gray-800 mb-2">📖 Lestexti 1: Árni, Elsa, Harpa og Hulda</h1>
            <p className="text-gray-500 text-sm font-light">Lesskilningur · A1–A2</p>
          </div>
        </header>

        <main className="max-w-4xl mx-auto px-6 mt-6 space-y-4 pb-20">
          <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-6">
            <p className="text-sm font-light text-blue-800">📖 Lestu textann hægt og rólega</p>
            <p className="text-sm font-light text-blue-800">✏️ Svaraðu krossaspurningunum</p>
            <p className="text-sm font-light text-blue-800">📝 Svaraðu stuttum spurningum með heilum setningum</p>
            <p className="text-sm font-light text-blue-800">💬 Ræddu spurningarnar með AI</p>
            <p className="text-sm font-light text-blue-800">✍️ Skrifaðu út frá 5 myndum</p>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in">
            <p className="text-gray-700 leading-relaxed font-light">{READING_TEXT}</p>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="flex border-b border-gray-200 bg-gray-50">
              {tabs.map((tab, i) => (
                <button key={i} onClick={() => setActiveTab(i)}
                  className={`tab-btn flex-1 px-4 py-3 text-sm font-light text-gray-600 ${activeTab === i ? 'active' : ''}`}>
                  {tab.done ? `✓ ${tab.label}` : tab.label}
                </button>
              ))}
            </div>

            <div className="p-6 fade-in" key={activeTab}>

              {/* === FLIPI 0: Krossaspurningar === */}
              {activeTab === 0 && (
                <div className="space-y-6">
                  {shuffledMC.map((q, qi) => (
                    <div key={qi} className="border border-gray-100 rounded-xl p-5">
                      <p className="font-medium text-gray-800 mb-3 text-sm">{qi + 1}. {q.question}</p>
                      <div className="space-y-2">
                        {q.options.map((opt, oi) => {
                          const isSelected = mcAnswers[qi] === oi;
                          const showCorrect = mcSubmitted && opt.isCorrect;
                          const showIncorrect = mcSubmitted && isSelected && !opt.isCorrect;
                          return (
                            <div key={oi} onClick={() => handleMcAnswer(qi, oi)}
                              className={`answer-option p-3 rounded-lg
                                ${isSelected && !mcSubmitted ? 'opt-selected' : ''}
                                ${showCorrect ? 'opt-correct' : ''}
                                ${showIncorrect ? 'opt-incorrect' : ''}
                                ${mcSubmitted ? 'opt-disabled' : ''}`}>
                              <div className="flex items-center gap-3">
                                <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0
                                  ${isSelected && !mcSubmitted ? 'border-blue-500 bg-blue-500' :
                                    showCorrect ? 'border-green-500 bg-green-500' :
                                    showIncorrect ? 'border-red-500 bg-red-500' : 'border-gray-300'}`}>
                                  {(isSelected || showCorrect) && <div className="w-1.5 h-1.5 bg-white rounded-full" />}
                                </div>
                                <span className="font-light text-sm flex-1">{opt.text}</span>
                                {showCorrect && <span className="text-green-600 text-sm">✓</span>}
                                {showIncorrect && <span className="text-red-600 text-sm">✗</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  {!mcSubmitted ? (
                    <button onClick={checkMc}
                      className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light">
                      Athuga svör
                    </button>
                  ) : (
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 fade-in text-center">
                      <p className="text-blue-800 font-light text-sm mb-3">
                        {shuffledMC.every((q, qi) => q.options[mcAnswers[qi]]?.isCorrect)
                          ? '🎉 Frábært! Öll svörin eru rétt!'
                          : `Þú fékkst ${shuffledMC.filter((q, qi) => q.options[mcAnswers[qi]]?.isCorrect).length} af ${MULTIPLE_CHOICE_RAW.length} rétt.`}
                      </p>
                      <button onClick={() => setActiveTab(1)}
                        className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                        Áfram í stuttar spurningar →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* === FLIPI 1: Stuttar spurningar === */}
              {activeTab === 1 && (
                <div className="space-y-6">
                  {SHORT_QUESTIONS.map((q, i) => (
                    <div key={i} className="border border-gray-100 rounded-xl p-5">
                      <p className="font-medium text-gray-800 mb-3 text-sm">{i + 1}. {q}</p>
                      <textarea
                        value={shortAnswers[i]}
                        onChange={e => setShortAnswers(prev => { const a = [...prev]; a[i] = e.target.value; return a; })}
                        disabled={shortFeedback[i] !== null}
                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm mb-3"
                        rows={2}
                        placeholder="Skrifaðu svarið þitt hér..."
                      />
                      {!shortFeedback[i] ? (
                        <button onClick={() => getShortFeedback(i)}
                          disabled={shortLoading[i] || shortAnswers[i].trim().length < 2}
                          className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                          {shortLoading[i] ? 'Bíð...' : 'Fá endurgjöf'}
                        </button>
                      ) : (
                        <FeedbackBadge
                          score={shortFeedback[i].score}
                          message={shortFeedback[i].msg}
                          onRetry={() => setShortFeedback(prev => { const a = [...prev]; a[i] = null; return a; })}
                        />
                      )}
                    </div>
                  ))}
                  {shortFeedback.every(f => f !== null) && (
                    <div className="text-center fade-in">
                      <button onClick={() => setActiveTab(2)}
                        className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                        Áfram í umræðuspurningar →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* === FLIPI 2: Umræðuspurningar === */}
              {activeTab === 2 && (
                <div className="space-y-6">
                  {DISCUSSION_QUESTIONS.map((q, i) => (
                    <div key={i} className="border border-gray-100 rounded-xl p-5">
                      <div className="flex items-center justify-between mb-3">
                        <p className="font-medium text-gray-800 text-sm">{i + 1}. {q}</p>
                        {closed[i] && (
                          <span className="text-xs text-green-600 font-light flex items-center gap-1 flex-shrink-0 ml-2">
                            <span>✔</span> Lokið
                          </span>
                        )}
                      </div>

                      <div ref={chatRefs.current[i]}
                        style={{ minHeight: 80, maxHeight: 320, overflowY: 'auto' }}
                        className="space-y-2 mb-3">
                        {convs[i].map((msg, mi) => (
                          <div key={mi} className={`flex ${msg.role === 'user' ? 'justify-end' : msg.role === 'grammar' ? 'justify-center' : 'justify-start'}`}>
                            {msg.role === 'grammar' ? (
                              <div className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 max-w-[90%] flex items-start gap-2">
                                <span className="text-amber-500 text-xs mt-0.5 flex-shrink-0">📌</span>
                                <p className="text-amber-800 font-light text-xs">{msg.content}</p>
                              </div>
                            ) : (
                              <div className={`max-w-xs px-4 py-2 rounded-xl text-sm font-light
                                ${msg.role === 'user' ? 'bg-blue-100 text-blue-900' : 'bg-gray-100 text-gray-800'}`}>
                                {msg.content}
                              </div>
                            )}
                          </div>
                        ))}
                        {chatLoading[i] && (
                          <div className="flex justify-start">
                            <div className="bg-gray-100 rounded-xl px-4 py-2 text-sm text-gray-400 font-light">Bíð...</div>
                          </div>
                        )}
                      </div>

                      {awaitingChoice[i] && (
                        <div className="flex gap-3 justify-center mt-2 mb-3 fade-in">
                          <button onClick={() => stopChat(i)}
                            className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light text-sm">
                            ✓ Já, ég er búinn/búin
                          </button>
                          <button onClick={() => continueChat(i)}
                            className="px-5 py-2 border-2 border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                            Halda áfram →
                          </button>
                        </div>
                      )}

                      {!closed[i] && !awaitingChoice[i] && (
                        <div className="flex gap-2">
                          <textarea
                            value={inputs[i]}
                            onChange={e => setInputs(prev => { const a = [...prev]; a[i] = e.target.value; return a; })}
                            onKeyDown={e => handleKey(e, i)}
                            disabled={chatLoading[i]}
                            className="flex-1 px-4 py-2 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 font-light resize-none disabled:bg-gray-50 text-sm"
                            rows={2}
                            placeholder={convs[i].length === 0 ? 'Skrifaðu svarið þitt hér...' : 'Haltu áfram...'}
                          />
                          <button onClick={() => sendMessage(i)}
                            disabled={chatLoading[i] || !inputs[i].trim()}
                            className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm self-end">
                            Senda
                          </button>
                        </div>
                      )}
                    </div>
                  ))}

                  {closed.every(Boolean) && (
                    <div className="bg-green-50 border border-green-200 rounded-xl p-5 text-center fade-in">
                      <p className="text-green-700 font-light text-sm">🎉 Frábært! Þú kláraðir öll þrjú samtölin.</p>
                      <button onClick={() => setActiveTab(3)}
                        className="mt-3 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-light text-sm">
                        Áfram í ritun →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* === FLIPI 3: Ritun === */}
              {activeTab === 3 && (
                <div className="space-y-6">
                  <div className="border border-gray-100 rounded-xl p-5">
                    <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
                      <div>
                        <h2 className="text-xl font-medium text-gray-800 mb-1">Ritun</h2>
                        <p className="text-sm text-gray-500 font-light">Skoðaðu myndina og svaraðu spurningunni.</p>
                      </div>
                      <div className="text-right">
                        <p className="text-sm font-medium text-gray-700">Mynd {writingIndex + 1} af {WRITING_EXERCISES.length}</p>
                        <div className="flex gap-2 justify-end mt-2">
                          {WRITING_EXERCISES.map((_, i) => (
                            <div key={i} className={`w-3 h-3 rounded-full transition-colors ${
                              writingAnswers[i].done ? 'bg-green-500' :
                              i === writingIndex ? 'bg-blue-500' : 'bg-gray-300'}`} />
                          ))}
                        </div>
                      </div>
                    </div>

                    <img
                      src={currentEx.imageUrl}
                      alt={currentEx.question}
                      className="block w-full h-auto max-w-2xl mx-auto rounded-xl shadow-sm border border-gray-200 mb-5"
                    />

                    <p className="font-medium text-gray-800 text-base mb-4">{currentEx.question}</p>

                    {renderWritingInput()}

                    {!currentAns.feedback ? (
                      <button onClick={evaluateWriting}
                        disabled={currentAns.loading || !isFilled(currentEx, currentAns)}
                        className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                        {currentAns.loading ? 'Bíð...' : 'Fá mat'}
                      </button>
                    ) : (
                      <div className="space-y-4">
                        <FeedbackBadge
                          score={currentAns.feedback.score}
                          message={currentAns.feedback.msg}
                          onRetry={!currentAns.done ? retryWriting : undefined}
                        />

                        <div className="flex flex-wrap gap-3">
                          {writingIndex > 0 && (
                            <button onClick={() => setWritingIndex(i => i - 1)}
                              className="px-5 py-2 border-2 border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                              ← Fyrri mynd
                            </button>
                          )}
                          {writingIndex < WRITING_EXERCISES.length - 1 && (
                            <button onClick={() => setWritingIndex(i => i + 1)}
                              disabled={!currentAns.done}
                              className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm">
                              Næsta mynd →
                            </button>
                          )}
                          {!currentAns.done && writingIndex < WRITING_EXERCISES.length - 1 && (
                            <button onClick={() => {
                              setWritingAnswers(prev => {
                                const arr = [...prev];
                                arr[writingIndex] = { ...arr[writingIndex], done: true };
                                return arr;
                              });
                              setWritingIndex(i => i + 1);
                            }}
                              className="px-5 py-2 border-2 border-gray-200 text-gray-400 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                              Sleppa →
                            </button>
                          )}
                          {!currentAns.done && writingIndex === WRITING_EXERCISES.length - 1 && (
                            <button onClick={() => {
                              setWritingAnswers(prev => {
                                const arr = [...prev];
                                arr[writingIndex] = { ...arr[writingIndex], done: true };
                                return arr;
                              });
                            }}
                              className="px-5 py-2 border-2 border-gray-200 text-gray-400 rounded-lg hover:bg-gray-50 transition-colors font-light text-sm">
                              Sleppa →
                            </button>
                          )}
                        </div>

                        {currentAns.done && writingIndex === WRITING_EXERCISES.length - 1 && (
                          <div className="bg-green-50 border border-green-200 rounded-xl p-4 text-green-700 text-sm font-light fade-in">
                            🎉 Frábært! Þú kláraðir ritunarverkefnið.
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              )}

            </div>
          </div>
        </main>

        {/* Framvindusika */}
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
          <div className="max-w-4xl mx-auto px-6 py-3 flex gap-2">
            {tabs.map((tab, i) => (
              <button key={i} onClick={() => setActiveTab(i)}
                className={`flex-1 py-2 rounded-lg text-sm font-light transition-colors
                  ${tab.done ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                {tab.done ? `✓ ${tab.label}` : tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
