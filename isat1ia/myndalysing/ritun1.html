const IMAGE_URL = `data:image/png;base64,${IMAGE_B64}`;
const NUM_SENTENCES = 5;

async function checkSentence(sentence, allSentences, sentenceIndex, previousErrors) {
  const prevErrorText = previousErrors.length > 0
    ? `Villur sem hafa komið upp áður: ${previousErrors.join(', ')}.`
    : '';

  const messages = [
    {
      role: 'user',
      content: [
        {
          type: 'image_url',
          image_url: { url: `data:image/png;base64,${IMAGE_B64}` }
        },
        {
          type: 'text',
          text: `Þú ert vingjarnlegur íslenskukennari sem kennir fullorðnum nemendum á A1-A2 stigi.
Nemandinn er að lýsa myndinni hér að ofan á íslensku.

Setning ${sentenceIndex + 1}: "${sentence}"

${prevErrorText}

Mettu setninguna með þessum hætti:
1. Athugaðu hvort lýsingin passi við myndina (vera rúmsæl – ef það er líklegt að það sé á myndinni, samþykktu það)
2. Athugaðu málfar – einungis ein leiðrétting ef þarf, og aðeins augljægar villur
3. Ef sama villa hefur komið upp áður (sjá að ofan), bentu á það með hlýlægni
4. Vertu alltaf hvetjandi og vingjarnleg – byrjaðu alltaf á hrósi

Svaraðu EINUNGIS á þessu formi:
HRÓS: [ein til tvær setningar með hrósi]
LEIÐRÉTTING: [ein mild leiðrétting EF þarf, annars skrifarðu "Engin"]
VILLA: [orðið eða setningarhlutinn sem var rangur, annars "engin"]`
        }
      ]
    }
  ];

  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages,
      max_tokens: 150,
      model: 'gpt-4o',
      temperature: 0.2,
    }),
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

async function getFinalFeedback(sentences, allErrors) {
  const sentenceList = sentences
    .map((s, i) => `Setning ${i+1}: "${s}"`)
    .join('\n');

  const errorSummary = allErrors.filter(e => e !== 'engin').join(', ');

  const messages = [
    {
      role: 'user',
      content: [
        {
          type: 'image_url',
          image_url: { url: `data:image/png;base64,${IMAGE_B64}` }
        },
        {
          type: 'text',
          text: `Þú ert vingjarnlegur íslenskukennari. Nemandinn hefur skrifað þessar setningar um myndina:

${sentenceList}

${errorSummary ? `Villur sem komu upp: ${errorSummary}` : 'Engar villur komu upp.'}

Gefðu stuttar og hlýlægar lokaathugasemdir (2-3 setningar):
- Fagnaðu því sem gekk vel
- Ef sama villa kom upp oftar en einu sinni, nefndu það einu sinni með hlýlægni
- Leggðu til eitt orð eða setningu sem nemandinn gæti notað næst
Á íslensku.`
        }
      ]
    }
  ];

  const r = await fetch('/.netlify/functions/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages,
      max_tokens: 200,
      model: 'gpt-4o',
      temperature: 0.3,
    }),
  });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
  return data.content;
}

const SentenceRow = ({ index, value, onChange, onCheck, feedback, loading, done }) => {
  const parseResponse = (text) => {
    const hros = text.match(/HRÓS:\s*(.+?)(?=LEIÐRÉTTING:|$)/s)?.[1]?.trim() || '';
    const leid = text.match(/LEIÐRÉTTING:\s*(.+?)(?=VILLA:|$)/s)?.[1]?.trim() || '';
    return { hros, leid };
  };

  const parsed = feedback ? parseResponse(feedback) : null;
  const hasCorrection = parsed && parsed.leid && parsed.leid.toLowerCase() !== 'engin';

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-3">
      <div className="flex items-center gap-2 mb-2">
        <span className="w-7 h-7 rounded-full bg-blue-600 text-white text-sm flex items-center justify-center font-medium flex-shrink-0">
          {index + 1}
        </span>
        <span className="text-sm text-gray-500 font-light">Setning {index + 1}</span>
        {done && <span className="ml-auto text-green-600 text-sm">✓</span>}
      </div>

      <div className="flex gap-2">
        <input
          type="text"
          value={value}
          onChange={e => onChange(e.target.value)}
          disabled={done || loading}
          placeholder="Skrifaðu setningu á íslensku..."
          className="flex-1 px-4 py-2.5 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-light disabled:bg-gray-50 text-sm"
        />
        <button
          onClick={onCheck}
          disabled={done || loading || !value.trim()}
          className="px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light text-sm flex items-center gap-2"
        >
          {loading ? <span className="spinner" /> : '✓'}
          {loading ? 'Athuga...' : 'Athuga'}
        </button>
      </div>

      {parsed && (
        <div className="mt-3 fade-in space-y-2">
          <div className="bg-green-50 border border-green-200 rounded-lg px-3 py-2">
            <p className="text-green-800 text-sm font-light">👍 {parsed.hros}</p>
          </div>
          {hasCorrection && (
            <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
              <p className="text-amber-800 text-sm font-light">📌 {parsed.leid}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const App = () => {
  const [sentences, setSentences]     = useState(Array(NUM_SENTENCES).fill(''));
  const [feedbacks, setFeedbacks]     = useState(Array(NUM_SENTENCES).fill(null));
  const [loadings, setLoadings]       = useState(Array(NUM_SENTENCES).fill(false));
  const [done, setDone]               = useState(Array(NUM_SENTENCES).fill(false));
  const [errors, setErrors]           = useState([]);
  const [finalFeedback, setFinalFeedback] = useState(null);
  const [loadingFinal, setLoadingFinal]   = useState(false);
  const [submitted, setSubmitted]         = useState(false);

  const updateSentence = (i, val) => {
    const s = [...sentences]; s[i] = val; setSentences(s);
  };

  const checkSentenceAt = async (i) => {
    if (!sentences[i].trim()) return;
    const l = [...loadings]; l[i] = true; setLoadings(l);
    try {
      const result = await checkSentence(sentences[i], sentences, i, errors);
      const f = [...feedbacks]; f[i] = result; setFeedbacks(f);
      const d = [...done]; d[i] = true; setDone(d);

      // Extract error
      const villaMatch = result.match(/VILLA:\s*(.+)/i);
      const villa = villaMatch?.[1]?.trim().toLowerCase() || 'engin';
      if (villa && villa !== 'engin') {
        setErrors(prev => [...prev, villa]);
      }
    } catch(e) {
      const f = [...feedbacks]; f[i] = 'HRÓS: Reyndu aftur.
LEIÐRÉTTING: Engin
VILLA: engin'; setFeedbacks(f);
    } finally {
      const l = [...loadings]; l[i] = false; setLoadings(l);
    }
  };

  const allDone = done.every(Boolean);

  const handleSubmitAll = async () => {
    setLoadingFinal(true);
    setSubmitted(true);
    try {
      const result = await getFinalFeedback(sentences, errors);
      setFinalFeedback(result);
    } catch(e) {
      setFinalFeedback('Eitthvað fór úrskeiðis. Reyndu aftur.');
    } finally {
      setLoadingFinal(false);
    }
  };

  return (
    <div className="min-h-screen pb-16">
      <header className="bg-white shadow-sm border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-8">
          <button onClick={() => window.history.back()}
            className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light">
            ← Til baka
          </button>
          <h1 className="text-3xl font-light text-gray-800 mb-2">✍️ Ritunaræfing</h1>
          <p className="text-gray-500 text-sm font-light">Lýstu myndinni · A1–A2</p>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-6 mt-6">

        <div className="bg-blue-50 border border-blue-200 border-l-4 border-l-blue-500 rounded-lg p-4 mb-6">
          <p className="text-blue-800 text-sm font-light">
            🖼️ Skoðaðu myndina og skrifaðu <strong>5 setningar</strong> á íslensku um það sem þú sérð.
            Smelltu á <strong>Athuga</strong> eftir hverja setningu til að fá endurgjöf.
          </p>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          {/* Mynd */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
            <img
              src={IMAGE_URL}
              alt="Harpa og Hulda elda"
              className="w-full rounded-lg object-cover"
            />
            <p className="text-xs text-gray-400 font-light mt-2 text-center">Harpa og Hulda elda</p>
          </div>

          {/* Setningar */}
          <div>
            {sentences.map((s, i) => (
              <SentenceRow
                key={i}
                index={i}
                value={s}
                onChange={val => updateSentence(i, val)}
                onCheck={() => checkSentenceAt(i)}
                feedback={feedbacks[i]}
                loading={loadings[i]}
                done={done[i]}
              />
            ))}

            {allDone && !submitted && (
              <div className="fade-in">
                <button
                  onClick={handleSubmitAll}
                  className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-light flex items-center justify-center gap-2"
                >
                  {loadingFinal ? <><span className="spinner" /> Vel gert! Bíð eftir lokaeinkunn...</> : '🎉 Senda allt og fá lokaeinkunn'}
                </button>
              </div>
            )}
          </div>
        </div>

        {finalFeedback && (
          <div className="bg-green-50 border border-green-200 rounded-xl p-6 mb-6 fade-in">
            <div className="text-3xl mb-3 text-center">🎉</div>
            <h3 className="text-lg font-light text-green-800 mb-2 text-center">Vel gert!</h3>
            <p className="text-green-700 font-light text-sm text-center">{finalFeedback}</p>
          </div>
        )}

      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
