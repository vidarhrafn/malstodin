<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👗 Fatabúðin – Málstöðin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ================= Icons ================= */
    const SendIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    );

    /* ================ Helpers ================ */
    function parseActionFromAssistant(text) {
      const lines = text.trim().split('\n');
      const last = lines[lines.length - 1].trim();
      const clean = last.replace(/```json\s*/g, '').replace(/```/g, '').trim();
      try {
        return JSON.parse(clean)?.action || 'none';
      } catch {
        return 'none';
      }
    }

    async function callOpenAI(payload) {
      const r = await fetch('/.netlify/functions/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      return data.content;
    }

    /* ================== App ================== */
    const Fatabudin = () => {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [stage, setStage] = useState('shopping');
      const [orderNumber, setOrderNumber] = useState(null);
      const endRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        setMessages([{ role: 'assistant', content: 'Hæ og velkomin/nn í fatabúðina! 👋 Hverju ertu að leita að í dag? Hvernig get ég aðstoðað?' }]);
      }, []);

      useEffect(() => { 
        endRef.current?.scrollIntoView({ behavior: 'smooth' }); 
        if (stage === 'shopping' && inputRef.current) {
          inputRef.current.focus();
        }
      }, [messages, loading, stage]);

      async function sendMessage() {
        const trimmed = input.trim();
        if (!trimmed || loading) return;

        const userMsg = { role: 'user', content: trimmed };
        setMessages(prev => [...prev, userMsg]);
        setInput('');
        setLoading(true);

        // Málfarsendurgjöf
        try {
          const feedbackMessages = [
            { role: 'system', content: `
Þú ert íslenskukennari sem vinnur með gervigreindarbottum í samtölum.
Gefðu örstutta, hlýja og hvetjandi endurgjöf á íslensku (A2–B1).
Samhengi: Nemandi er að æfa sig í fatabúð (sala og aðstoð við val á fötum).
REGLUR:
- 1–2 stuttar setningar, aldrei lengra.
- Leiðréttu aðeins þegar þú ert >80% viss.
- Ef setning er eðlileg í samhengi, hrósaðu frekar.
- Ekki nota ensku eða bókstaflegt kennslumál.`.trim() },
            { role: 'user', content: `Nemandi sagði: "${trimmed}". Gefðu aðeins stutta endurgjöfarlínu, ekkert annað.` }
          ];
          const feedback = await callOpenAI({ model: 'gpt-4o-mini', temperature: 0.2, max_tokens: 60, messages: feedbackMessages });
          if (feedback) {
            setMessages(prev => [...prev, { role: 'feedback', content: feedback }]);
            await new Promise(r => setTimeout(r, 300));
          }
        } catch (e) { console.warn('feedback error', e); }

        // Aðal-svar
        try {
          const sys = `
Þú ert vingjarnleg/ur starfsmaður í íslenskri fatabúð og aðstoðar viðskiptavin á einföldu, náttúrulegu íslensku.

VERKEFNI:
1. Spyrja nytsamlegra eftirfylgnispurninga (stærðir, litir, snið, tilefni, verðbil).
2. Stinga upp á 1–2 skýrum valkostum í senn (ekki langar upptalningar).
3. Bjóða að máta eða leggja til hliðar/í poka; ef viðskiptavinur er tilbúinn, bjóða kassa.
4. **Síðasta lína** á að vera JSON á einni línu: {"action":"none"} eða {"action":"checkout"}.

STÍLL:
- Stuttar, eðlilegar setningar; sparlega emoji.
- Ekki nota „kennslumál" eða punktalista nema beðið sé um það.
- Gættu að fallbeygingu og samræmi (kyn, tala, fall). Dæmi: „fallegar buxur (kvk.ft.)", „svarta jakka (þf. kk.et.)".

DÆMI ÚTTÁKS:
„Við eigum bæði svartar jogger-buxur og gallabuxur. Viltu frekar þröngt eða laust snið og hvaða stærð ertu yfirleitt í?
{"action":"none"}"`.trim();

          const history = messages
            .filter(m => m.role === 'assistant' || m.role === 'user')
            .map(m => ({ role: m.role, content: m.content }));

          const reply = await callOpenAI({
            model: 'gpt-4o-mini',
            temperature: 0.3,
            max_tokens: 200,
            messages: [ { role: 'system', content: sys }, ...history, userMsg ]
          });

          if (reply) {
            setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
            const action = parseActionFromAssistant(reply);
            if (action === 'checkout') setTimeout(() => setStage('checkout'), 500);
          }
        } catch (e) {
          console.error('assistant error', e);
          setMessages(prev => [...prev, { role: 'assistant', content: 'Úps, eitthvað fór úrskeiðis. Prófum aftur á eftir.' }]);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen pb-12">
          {/* Header með Málstöðin útliti */}
          <header className="bg-white shadow-sm border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <button 
                onClick={() => window.history.back()} 
                className="text-sm text-gray-500 hover:text-gray-700 mb-2 inline-block font-light"
              >
                ← Til baka
              </button>
              <h1 className="text-3xl font-light text-gray-800 mb-2">Fatabúðin</h1>
              <p className="text-gray-500 text-sm font-light">Samtalsæfing · A2-B1</p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 mt-8">
            {/* Spjall + afgreiðsla */}
            <section className="bg-white rounded-lg shadow-sm overflow-hidden flex flex-col h-[600px]">
              {stage === 'shopping' && (
                <>
                  <div className="flex-1 overflow-y-auto p-6 space-y-4">
                    {messages.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : msg.role === 'feedback' ? 'justify-center' : 'justify-start'}`}>
                        <div className={`max-w-lg px-4 py-2 rounded-lg font-light ${msg.role === 'user' ? 'bg-gray-800 text-white' : msg.role === 'feedback' ? 'bg-blue-50 text-blue-800 border border-blue-200 text-sm italic' : 'bg-gray-100 text-gray-800'}`}>
                          {msg.role === 'feedback' && <span className="font-normal">📚 Málfar: </span>}
                          {msg.content}
                        </div>
                      </div>
                    ))}

                    {loading && (
                      <div className="flex justify-start">
                        <div className="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg">
                          <div className="flex space-x-2">
                            <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                            <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay:'0.1s'}}></div>
                            <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay:'0.2s'}}></div>
                          </div>
                        </div>
                      </div>
                    )}
                    <div ref={endRef} />
                  </div>

                  <div className="border-t p-4">
                    <div className="flex gap-2">
                      <input
                        type="text"
                        ref={inputRef}
                        value={input}
                        onChange={(e) => setInput(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && sendMessage()}
                        placeholder="Hverju ertu að leita að? (t.d. svörtum buxum í M)"
                        className="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-400 font-light"
                        disabled={loading}
                      />
                      <button
                        onClick={sendMessage}
                        disabled={loading || !input.trim()}
                        className="bg-gray-800 text-white px-6 py-2 rounded-md hover:bg-gray-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-light"
                        aria-label="Senda skilaboð"
                        title="Senda"
                      >
                        <SendIcon />
                      </button>
                    </div>
                  </div>
                </>
              )}

              {stage === 'checkout' && (
                <div className="flex-1 flex items-center justify-center p-6">
                  <div className="text-center">
                    <h2 className="text-3xl font-light text-gray-800 mb-4">Kassi</h2>
                    <p className="text-gray-600 font-light">Staðfesta kaup?
                      <br/><span className="text-sm">( Hægt er að færa sig aftur og spyrja meira ef þarf )</span>
                    </p>
                    <button
                      onClick={() => { const n = Math.floor(Math.random()*900)+100; setOrderNumber(n); setStage('done'); }}
                      className="mt-6 bg-gray-800 text-white px-8 py-3 rounded-md text-lg font-light hover:bg-gray-700 transition-colors shadow-sm"
                    >
                      Staðfesta kaup
                    </button>
                    <div className="mt-4">
                      <button onClick={() => setStage('shopping')} className="text-gray-600 hover:text-gray-800 underline text-sm font-light">Til baka</button>
                    </div>
                  </div>
                </div>
              )}

              {stage === 'done' && (
                <div className="flex-1 flex items-center justify-center p-6">
                  <div className="text-center">
                    <div className="text-6xl mb-4">🛍️</div>
                    <h2 className="text-3xl font-light text-gray-800 mb-4">Takk fyrir komuna!</h2>
                    <div className="bg-gray-50 rounded-lg p-6 mb-6 border border-gray-200">
                      <p className="text-gray-600 mb-2 font-light">Pöntunarnúmer:</p>
                      <p className="text-5xl font-light text-gray-800">#{orderNumber}</p>
                    </div>
                    <p className="text-xl text-gray-600 mb-8 font-light">Við látum þig vita þegar varan er klár til afhendingar 👗</p>
                    <button
                      onClick={() => { setStage('shopping'); setMessages([{ role: 'assistant', content: 'Hæ aftur! Hvað má ég aðstoða þig með núna? 😊' }]); setOrderNumber(null); }}
                      className="bg-gray-800 text-white px-6 py-3 rounded-md hover:bg-gray-700 transition-colors font-light"
                    >
                      Ný fyrirspurn
                    </button>
                  </div>
                </div>
              )}
            </section>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Fatabudin />);
  </script>
</body>
</html>
