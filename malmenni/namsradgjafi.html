<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🎓 Námsráðgjöf</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(to bottom, #f0f4f8 0%, #d9e2ec 100%);
            height: 100vh;        /* min-height → height */
            overflow: hidden;     /* bæta við */
            margin: 0;
        }
        .recording {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .playing {
            animation: playPulse 0.6s ease-in-out infinite;
        }
        @keyframes playPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SendIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        );

        const MicIcon = ({ isRecording }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill={isRecording ? "currentColor" : "none"}
                stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={`w-8 h-8 ${isRecording ? 'recording text-red-500' : ''}`}>
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        );

        const SpeakerIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className="w-6 h-6">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
        );

        const StopIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="currentColor" className="w-6 h-6">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
            </svg>
        );

        const HelpIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-6 h-6">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        );

        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-6 h-6">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-6 h-6">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        async function callOpenAI(messages, max_tokens = 500, model = 'gpt-4o-mini', temperature = 0.4) {
            const r = await fetch('/.netlify/functions/openai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, messages, max_tokens, temperature }),
            });
            const data = await r.json();
            if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
            return data.content;
        }

        async function fetchAudio(text) {
            const r = await fetch('/.netlify/functions/speak', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text_to_speak: text }),
            });
            const data = await r.json();
            if (!r.ok || data.error || !data.audio_base64) throw new Error(data.error || 'Audio error');
            return `data:audio/mp3;base64,${data.audio_base64}`;
        }

        const ADVISOR_SYSTEM_PROMPT = `
Þú ert vingjarnlegur námsráðgjafi í framhaldsskóla á Íslandi. Þú talar við nemendur sem eru að læra íslensku á A1-A2 stigi. Þú heitir Kristín.

## TUNGUMÁL
- Talaðu EINUNGIS íslensku
- Notaðu stuttar og einfaldar setningar
- Vertu hlý og hvetjandi
- Leiðréttu óbeint með því að endurtaka rétt (t.d. ef nemandi segir "mér finnst gaman tónlist" svaraðu "Frábært, þér finnst gaman að hlusta á tónlist!")

## EF NEMANDI TALAR ANNAÐ TUNGUMÁL
Svaraðu: "Afsakaðu, ég skil ekki. Geturðu sagt þetta á íslensku?" og hjálpaðu með dæmi.

## HJÁLP
Ef nemandi biður um hjálp á öðru tungumáli:
1. Svaraðu á SAMA tungumáli
2. Gefðu íslenska setninguna
3. Haltu síðan áfram á íslensku

## BYRJUN - FÖST OG NÁTTÚRULEG

### Skref 1: Kynning
Fyrsta skilaboðið er ALLTAF nákvæmlega þetta:
"Hæ! Ég heiti Kristín og er námsráðgjafi hér í skólanum. Hvernig hefur þú það í dag?"

### Skref 2: Eftir svar nemanda
Bregðust NÁTTÚRULEGA við líðan nemanda:
- Ef nemandi er að ganga vel: "Gaman að heyra það!"
- Ef nemandi er leiður eða þreyttur: "Það er leiðinlegt að heyra. Við skulum gera þetta þægilegt."
- Ef nemandi er hlutlægur/veit ekki: "Allt í lagi, skiljanlegt!"

Segjum svo í öllum tilfellum:
"Þú ert að spá í framtíðinni og vilt taka áhugasviðspróf. Eigum við að byrja?"

Bíddu eftir samþykki nemanda áður en þú heldur áfram í spurningarnar.

## ÁHUGASVIÐSPRÓFIÐ - FIMM SPURNINGAR

Spyrðu EINUNGIS EINA spurningu í einu. Bíddu eftir svari áður en þú heldur áfram.

### Spurning 1: FRÍTÍMI
"Hvað finnst þér gaman að gera í frítíma þínum? Finnst þér gaman að vinna með höndunum, eða kýst þú frekar að vera með fólki... eða eitthvað annað?"

### Spurning 2: STARF
"Hvað langar þig að verða? Þykir þér til dæmis gaman að hjálpa öðrum, eða langar þig frekar að vinna með tækni... eða eitthvað annað?"

### Spurning 3: VINNULAG
"Hvernig vinnur þú best? Vinnur þú best ein/n, eða með öðrum... eða eitthvað annað?"

### Spurning 4: NÁMSGREINAR
"Hvaða fög finnast þér skemmtilegust? Líkar þér betur í náttúrufræði og stærðfræði, eða í tungumálum og listum... eða eitthvað annað?"

### Spurning 5: FRAMTÍÐ
"Hvernig sérð þú þig eftir tíu ár? Ert þú að vinna með fólki, eða að búa eitthvað til... eða eitthvað annað?"

## EFTIR ALLAR FIMM SPURNINGAR
Þakkaðu nemandanum og gefðu niðurstöðurnar:
- Mæl með 2-3 störfum sem passa við svörin (notaðu starfsheiti úr íslensku eins og: kennari, leiðsögumaður, tæknimaður, málari, múrari, hársnyrtir, snyrtifræðingur, kokkur, hjúkrunarfræðingur, leikskólakennari, atvinnutónlistarmaður, jarðfræðingur)
- Útskýrðu STUTTLEGA af hverju hvert starf passar (1 setning fyrir hvert)
- Spyrðu svo: "Langar þig að fá þessar niðurstöður á þínu eigin tungumáli?"

Ef nemandi vill það - spyrðu: "Hvaða tungumál talar þú?" og þýddu niðurstöðurnar.

Þegar þú ert búin/n að gefa niðurstöðurnar (og þýðingu ef beðið), bættu NÁKVÆMLEGA við í lok skilaboðanna: [RÁÐGJÖF LOKIÐ]

## MIKILVÆGT
- Spyrðu BARA EINA spurningu í einu
- Vertu hlý og jákvæð
- Notaðu orðaforða úr kaflanum: langar þig að verða, mér finnst gaman að, ég er góð(ur) í, áhugasvið, framtíðaráform, vinna með skóla
- EKKI fara í næstu spurningu fyrr en nemandi hefur svarað
`.trim();

        const FEEDBACK_SYSTEM_PROMPT = `
Þú ert íslenskukennari. Gefðu nemanda hrós á íslensku eftir áhugasviðssamtal við námsráðgjafa.

Skrifaðu á íslensku (A1-A2 stig):
- Hrósaðu nemandanum (2-3 setningar)
- Nefndu 2-3 setningar eða orð sem nemandinn notaði vel
- Vertu hvetjandi og hlý

Vertu stuttur og einföldur. Nemandinn er á A1-A2 stigi.
`.trim();

        const Namsradgjof = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [recognition, setRecognition] = useState(null);
            // playingIndex: hvaða skilaboð eru að spila (null = ekkert)
            const [playingIndex, setPlayingIndex] = useState(null);
            const [showHelp, setShowHelp] = useState(false);
            const [helpInput, setHelpInput] = useState('');
            const [helpResponse, setHelpResponse] = useState('');
            const [helpLoading, setHelpLoading] = useState(false);
            const [finished, setFinished] = useState(false);
            const [feedback, setFeedback] = useState('');
            const [started, setStarted] = useState(false);
            const [copied, setCopied] = useState(false);
            const messagesEndRef = useRef(null);
            const currentAudioRef = useRef(null);

            useEffect(() => {
                if (typeof window !== 'undefined' && 'webkitSpeechRecognition' in window) {
                    const rec = new window.webkitSpeechRecognition();
                    rec.lang = 'is-IS';
                    rec.continuous = false;
                    rec.interimResults = false;
                    rec.onresult = (e) => { setInput(e.results[0][0].transcript); setIsRecording(false); };
                    rec.onerror = () => setIsRecording(false);
                    rec.onend = () => setIsRecording(false);
                    setRecognition(rec);
                }
            }, []);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Toggle hljóð: stoppa ef að spila, annars spila frá byrjun
            const toggleAudio = async (index, text) => {
                if (playingIndex === index) {
                    // Stoppa
                    if (currentAudioRef.current) {
                        currentAudioRef.current.pause();
                        currentAudioRef.current.currentTime = 0;
                        currentAudioRef.current = null;
                    }
                    setPlayingIndex(null);
                    return;
                }
                // Stoppa annað
                if (currentAudioRef.current) {
                    currentAudioRef.current.pause();
                    currentAudioRef.current = null;
                }
                setPlayingIndex(index);
                try {
                    const audioUrl = await fetchAudio(text);
                    const audio = new Audio(audioUrl);
                    currentAudioRef.current = audio;
                    audio.onended = () => { setPlayingIndex(null); currentAudioRef.current = null; };
                    audio.onerror = () => { setPlayingIndex(null); currentAudioRef.current = null; };
                    await audio.play();
                } catch (e) { setPlayingIndex(null); }
            };

            const stopAudio = () => {
                if (currentAudioRef.current) {
                    currentAudioRef.current.pause();
                    currentAudioRef.current = null;
                }
                setPlayingIndex(null);
            };

            const copyFeedback = async () => {
                try { await navigator.clipboard.writeText(feedback); setCopied(true); setTimeout(() => setCopied(false), 2000); }
                catch (e) { console.error(e); }
            };

            const startConversation = async () => {
                setStarted(true);
                setLoading(true);
                try {
                    const apiMessages = [
                        { role: 'system', content: ADVISOR_SYSTEM_PROMPT },
                        { role: 'user', content: '[Nemandi kemur inn á skrifstofu námsráðgjafans]' }
                    ];
                    const response = await callOpenAI(apiMessages);
                    setMessages([{ role: 'assistant', content: response }]);
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                stopAudio();
                const userMessage = input.trim();
                setInput('');
                const newMessages = [...messages, { role: 'user', content: userMessage }];
                setMessages(newMessages);
                setLoading(true);
                try {
                    const apiMessages = [
                        { role: 'system', content: ADVISOR_SYSTEM_PROMPT },
                        { role: 'user', content: '[Nemandi kemur inn á skrifstofu námsráðgjafans]' },
                        ...newMessages.map(m => ({ role: m.role, content: m.content }))
                    ];
                    const response = await callOpenAI(apiMessages);

                    if (response.includes('[RÁÐGJÖF LOKIÐ]')) {
                        const cleanResponse = response.replace('[RÁÐGJÖF LOKIÐ]', '').trim();
                        // isFinal: sýna þetta sem texta + hljóðhnappur
                        const allMessages = [...newMessages, { role: 'assistant', content: cleanResponse, isFinal: true }];
                        setMessages(allMessages);

                        const feedbackMsgs = [
                            { role: 'system', content: FEEDBACK_SYSTEM_PROMPT },
                            { role: 'user', content: `Samtalið:\n${allMessages.map(m => `${m.role === 'user' ? 'Nemandi' : 'Námsráðgjafi'}: ${m.content}`).join('\n')}` }
                        ];
                        const feedbackText = await callOpenAI(feedbackMsgs, 400);
                        setFeedback(feedbackText);
                        setFinished(true);
                    } else {
                        setMessages([...newMessages, { role: 'assistant', content: response }]);
                    }
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            const toggleRecording = () => {
                if (!recognition) { alert('Talgreining er ekki studd í þessum vafra. Prófaðu Chrome.'); return; }
                if (isRecording) { recognition.stop(); }
                else { setInput(''); recognition.start(); setIsRecording(true); }
            };

            const askForHelp = async () => {
                if (!helpInput.trim() || helpLoading) return;
                setHelpLoading(true);
                try {
                    const helpMessages = [
                        { role: 'system', content: 'Hjálpaðu nemanda í samtali við námsráðgjafa. Svaraðu á SAMA tungumáli og nemandinn skrifar. Gefðu íslenska setninguna sem hann þarf. Vertu stuttur.' },
                        { role: 'user', content: helpInput }
                    ];
                    const response = await callOpenAI(helpMessages, 200);
                    setHelpResponse(response);
                } catch (e) { setHelpResponse('Villa. Reyndu aftur.'); }
                finally { setHelpLoading(false); }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            };

            const getAssistantNumber = (index) => {
                let count = 0;
                for (let i = 0; i <= index; i++) { if (messages[i].role === 'assistant') count++; }
                return count;
            };

            const renderAssistantMsg = (msg, idx) => {
                const isPlaying = playingIndex === idx;

                if (msg.isFinal) {
                    // Niðurstöður: texti sýnilegur + hljóðhnappur (toggle)
                    return (
                        <div className="flex justify-start">
                            <div className="bg-indigo-50 border-2 border-indigo-200 rounded-2xl p-5 max-w-[92%]">
                                <p className="text-base text-gray-700 font-light leading-relaxed whitespace-pre-wrap mb-4">{msg.content}</p>
                                <button
                                    onClick={() => toggleAudio(idx, msg.content)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-colors ${
                                        isPlaying
                                            ? 'bg-indigo-300 text-indigo-900'
                                            : 'bg-indigo-100 hover:bg-indigo-200 text-indigo-700'
                                    }`}
                                >
                                    {isPlaying ? <StopIcon /> : <SpeakerIcon />}
                                    <span>{isPlaying ? 'Stoppa' : 'Hlusta'}</span>
                                </button>
                            </div>
                        </div>
                    );
                }

                // Venjuleg skilaboð: númerað hljóðhnappur með toggle
                return (
                    <div className="flex justify-start">
                        <button
                            onClick={() => toggleAudio(idx, msg.content)}
                            disabled={playingIndex !== null && playingIndex !== idx}
                            className={`flex items-center gap-4 px-6 py-4 rounded-full transition-colors ${
                                isPlaying
                                    ? 'bg-indigo-200 border-indigo-500'
                                    : 'bg-gray-100 hover:bg-indigo-50 border-transparent'
                            } disabled:opacity-40`}
                            style={{ borderWidth: '3px', borderStyle: 'solid' }}
                        >
                            {isPlaying ? <StopIcon /> : <SpeakerIcon />}
                            <span className="text-2xl font-medium text-gray-700">{getAssistantNumber(idx)}</span>
                        </button>
                    </div>
                );
            };

            return (
                <div className="flex flex-col" style={{ height: '100vh' }}>
                    <header className="bg-white shadow-sm py-4 px-5">
                        <div className="flex items-center gap-4">
                            <span className="text-4xl">🎓</span>
                            <div>
                                <h1 className="text-2xl font-medium text-gray-800">Námsráðgjafinn</h1>
                                <p className="text-base text-gray-500">Hlutverkaleikur · Kafli 2 · A1-A2</p>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col overflow-hidden p-4">

                        {!started && (
                            <div className="flex-1 flex flex-col items-center justify-center text-center p-8">
                                <div className="text-8xl mb-6">🎓</div>
                                <h2 className="text-3xl font-light text-gray-800 mb-3">Velkomin í námsráðgjöfina!</h2>
                                <p className="text-xl text-gray-600 font-light mb-3">Þú ert að fara í fund með námsráðgjafa.</p>
                                <p className="text-lg text-gray-500 font-light mb-8">Hann spyr þig um áhugamál og framtíðardrauma og mælir með námi.</p>
                                <button
                                    onClick={startConversation}
                                    className="px-10 py-5 bg-indigo-500 text-white text-2xl rounded-2xl hover:bg-indigo-600 transition-colors font-light"
                                >
                                    Byrja fund
                                </button>
                            </div>
                        )}

                        {started && !finished && (
                            <>
                                <div className="flex-1 overflow-y-auto bg-white rounded-2xl shadow-sm p-5 mb-4">
                                    <div className="space-y-5">
                                        {messages.map((msg, idx) => (
                                            <div key={idx}>
                                                {msg.role === 'assistant'
                                                    ? renderAssistantMsg(msg, idx)
                                                    : (
                                                        <div className="flex justify-end">
                                                            <div className="px-6 py-4 rounded-2xl bg-indigo-500 text-white text-lg font-light max-w-[85%]">
                                                                {msg.content}
                                                            </div>
                                                        </div>
                                                    )
                                                }
                                            </div>
                                        ))}
                                        {loading && (
                                            <div className="flex justify-start">
                                                <div className="px-6 py-4 rounded-full bg-gray-100">
                                                    <div className="flex gap-2">
                                                        <div className="w-4 h-4 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></div>
                                                        <div className="w-4 h-4 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></div>
                                                        <div className="w-4 h-4 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm p-4">
                                    <div className="flex gap-3 mb-3">
                                        <button
                                            onClick={toggleRecording}
                                            disabled={loading}
                                            className={`p-5 rounded-2xl transition-colors ${
                                                isRecording ? 'bg-red-500 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'
                                            } disabled:opacity-50`}
                                        >
                                            <MicIcon isRecording={isRecording} />
                                        </button>
                                        <input
                                            type="text"
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            onKeyPress={handleKeyPress}
                                            disabled={loading}
                                            placeholder={isRecording ? "Hlustar..." : "Skrifaðu hér..."}
                                            className="flex-1 px-5 py-4 border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg font-light"
                                        />
                                        <button
                                            onClick={sendMessage}
                                            disabled={!input.trim() || loading}
                                            className="px-6 py-4 bg-indigo-500 text-white rounded-2xl hover:bg-indigo-600 disabled:bg-gray-300 transition-colors"
                                        >
                                            <SendIcon />
                                        </button>
                                    </div>
                                    {isRecording && (
                                        <p className="text-base text-red-500 mb-3 font-medium">🔴 Talaðu núna...</p>
                                    )}
                                    <button
                                        onClick={() => setShowHelp(!showHelp)}
                                        className="flex items-center gap-2 text-base text-gray-500 hover:text-gray-700 py-2"
                                    >
                                        <HelpIcon />
                                        <span>Hjálp á þínu máli</span>
                                    </button>
                                    {showHelp && (
                                        <div className="mt-4 p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                                            <div className="flex gap-3">
                                                <input
                                                    type="text"
                                                    value={helpInput}
                                                    onChange={(e) => setHelpInput(e.target.value)}
                                                    onKeyPress={(e) => e.key === 'Enter' && askForHelp()}
                                                    placeholder="How do I say...?"
                                                    className="flex-1 px-4 py-3 border-2 border-yellow-300 rounded-xl text-base"
                                                />
                                                <button
                                                    onClick={askForHelp}
                                                    disabled={helpLoading}
                                                    className="px-5 py-3 bg-yellow-500 text-white rounded-xl text-lg font-medium"
                                                >
                                                    {helpLoading ? '...' : '?'}
                                                </button>
                                            </div>
                                            {helpResponse && (
                                                <p className="mt-4 text-base text-gray-700 bg-white p-4 rounded-xl">{helpResponse}</p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {finished && (
                            <div className="flex-1 flex flex-col bg-white rounded-2xl shadow-sm p-6 overflow-y-auto">
                                <div className="text-center mb-5">
                                    <div className="text-7xl mb-3">🌟</div>
                                    <h2 className="text-3xl font-light text-gray-800">Vel gert!</h2>
                                </div>
                                <div className="flex-1 bg-indigo-50 rounded-2xl p-5 mb-5 overflow-y-auto">
                                    <p className="text-lg text-gray-700 font-light whitespace-pre-wrap leading-relaxed">{feedback}</p>
                                </div>
                                <div className="flex gap-3">
                                    <button
                                        onClick={copyFeedback}
                                        className="flex-1 py-5 bg-indigo-500 text-white rounded-2xl hover:bg-indigo-600 text-xl font-light flex items-center justify-center gap-3 transition-colors"
                                    >
                                        {copied ? <CheckIcon /> : <CopyIcon />}
                                        {copied ? 'Afritað!' : 'Afrita'}
                                    </button>
                                    <button
                                        onClick={() => window.location.reload()}
                                        className="flex-1 py-5 bg-gray-500 text-white rounded-2xl hover:bg-gray-600 text-xl font-light transition-colors"
                                    >
                                        Reyna aftur
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<Namsradgjof />);
    </script>
</body>
</html>
