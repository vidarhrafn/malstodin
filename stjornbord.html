<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Stjórnborð – Málstöðin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .cell { width: 32px; height: 32px; border-radius: 6px; display: inline-block; }
    .cell-none      { background: #e5e7eb; }
    .cell-opened    { background: #fbbf24; }
    .cell-completed { background: #22c55e; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #2563eb; color: white; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .main-tab-btn { transition: all 0.2s; border-bottom: 3px solid transparent; }
    .main-tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 500; }

    /* ── Prentun ─────────────────────────────────────────── */
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      #print-preview { display: block !important; }
      .print-page {
        box-shadow: none !important;
        margin: 0 !important;
        page-break-after: always;
      }
    }
    @media screen {
      #print-preview { display: none; }
    }

    /* ── Prentblöð ───────────────────────────────────────── */
    .print-page {
      width: 210mm;
      min-height: 297mm;
      background: white;
      margin: 20px auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }
    .print-card {
      height: calc(297mm / 5);
      border-bottom: 2px dashed #d1d5db;
      display: flex;
      align-items: center;
      padding: 10mm 14mm;
      gap: 12mm;
    }
    .print-card:last-child { border-bottom: none; }
    .qr-wrap { flex-shrink: 0; width: 44mm; height: 44mm; }
    .qr-wrap canvas, .qr-wrap img { width: 44mm !important; height: 44mm !important; }
    .card-divider { width: 1px; height: 44mm; background: #e5e7eb; flex-shrink: 0; }
    .card-info { flex: 1; }
    .card-course-tag { font-size: 9pt; color: #6b7280; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4mm; }
    .card-student-name { font-size: 15pt; font-weight: 300; color: #1f2937; margin-bottom: 5mm; line-height: 1.2; }
    .card-code-label { font-size: 8pt; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2mm; }
    .card-code { font-size: 14pt; font-weight: 500; color: #2563eb; letter-spacing: 0.12em; font-family: 'Courier New', monospace; }
    .card-url { margin-top: 4mm; font-size: 8pt; color: #9ca3af; }
  </style>
</head>
<body>

  <div id="loading" class="min-h-screen flex items-center justify-center">

      <div class="relative mb-4">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center">
          <span class="bg-white px-3 text-xs text-gray-400 font-light">eða með tölvupósti</span>
        </div>
      </div>
      <input id="login-email" type="email" placeholder="Tölvupóstfang"

               transition-colors font-light">

  <div id="app" style="display:none" class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto">

      <!-- Header -->

            <div>

            <p class="text-gray-400 font-light text-center py-8">Sæki kóða...</p>

          <h3 class="text-sm font-light text-gray-500 mb-4">Forskoðun – <span id="cards-preview-count"></span></h3>
          <div id="cards-preview-list" class="overflow-x-auto"></div>
        </div>
      </div>

    </div>

    // ── Hjálparföll ───────────────────────────────────────────────

    function randomSuffix() {
      const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
      let s = '';
      for (let i = 0; i < 3; i++) s += chars[Math.floor(Math.random() * chars.length)];
      return s;
    }

    function generateCodeId(course) {
      return COURSE_PREFIX[course] + '-' + randomSuffix();

    function showLogin() {
      document.getElementById('loading').style.display = 'none';

      document.getElementById('btn-google').onclick = async () => {
        document.getElementById('login-err').textContent = '';
        try { await signInWithPopup(auth, new GoogleAuthProvider()); }
        catch { document.getElementById('login-err').textContent = 'Villa við Google-innskráningu.'; }
      };
      document.getElementById('btn-email-login').onclick = async () => {
        const email = document.getElementById('login-email').value.trim();
        const pw    = document.getElementById('login-pw').value;
        document.getElementById('login-err').textContent = '';
        if (!email || !pw) { document.getElementById('login-err').textContent = 'Fylltu inn tölvupóst og lykilorð.'; return; }
        try { await signInWithEmailAndPassword(auth, email, pw); }
        catch { document.getElementById('login-err').textContent = 'Rangt tölvupóstfang eða lykilorð.'; }
      };
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) { showLogin(); return; }
      if (!ADMIN_UIDS.includes(user.uid)) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('login').style.display = 'flex';
        document.getElementById('login-err').textContent = 'Þú hefur ekki aðgang að stjórnborðinu.';

      setupCreateCodes();
      setupCards();

    // ── Sjálfgefinn gildistími ────────────────────────────────────

    function setDefaultExpiry() {
      const today = new Date();
      // 1. september sama ár ef fyrir september, annars næsta ár
      const year = today.getMonth() < 8 ? today.getFullYear() : today.getFullYear() + 1;
      const d = new Date(year, 8, 1); // September = 8
      document.getElementById('new-expires').value = d.toISOString().split('T')[0];
    }

    // ── Gögn ─────────────────────────────────────────────────────

    function startListening() {
      onSnapshot(collection(db, 'user_access'), (snap) => {
        allUserData = [];
        window._rawUserData = [];
        const newUids = new Set();
        snap.forEach(d => {
          const data = d.data();
          window._rawUserData.push({ uid: d.id, data });
          const courses = {};
          Object.keys(COURSES).forEach(c => {
            if (data[c] && data[c].activated_at) {
              courses[c] = { class: data[c].class || null, semester: data[c].semester || null };
            }
          });
          if (Object.keys(courses).length > 0) {
            allUserData.push({ uid: d.id, email: data.email || d.id, courses });
            newUids.add(d.id);
          }
        });
        newUids.forEach(uid => {
          Object.keys(COURSES).forEach(course => {
            const key = uid + '_' + course;
            if (progressUnsubscribers[key]) return;
            if (!allProgress[uid]) allProgress[uid] = {};
            progressUnsubscribers[key] = onSnapshot(
              collection(db, 'progress', uid, course),
              (progSnap) => {
                if (!allProgress[uid]) allProgress[uid] = {};
                allProgress[uid][course] = {};
                progSnap.forEach(d => { allProgress[uid][course][d.id] = d.data().status || 'opened'; });
                renderTable();
              }
            );
          });
        });
        renderTable();
        if (activeMainTab === 'codes') renderCodesTable();
      });

      onSnapshot(collection(db, 'access_codes'), (snap) => {
        allCodes = [];
        snap.forEach(d => { allCodes.push({ id: d.id, ...d.data() }); });
        if (activeMainTab === 'codes') renderCodesTable();
      });
    }

    // ── Búa til kóða ─────────────────────────────────────────────

    function setupCreateCodes() {
      document.getElementById('btn-create-codes').onclick = createCodes;
      document.getElementById('btn-download-new').onclick = downloadNewCodes;
      document.getElementById('btn-download-csv').onclick = downloadFilteredCsv;
    }

    async function createCodes() {
      const course   = document.getElementById('new-course').value;
      const cls      = document.getElementById('new-class').value.trim();
      const count    = parseInt(document.getElementById('new-count').value);
      const semester = document.getElementById('new-semester').value.trim();
      const expVal   = document.getElementById('new-expires').value;

      document.getElementById('create-err').textContent = '';
      document.getElementById('create-ok').textContent = '';

      if (!cls)        { document.getElementById('create-err').textContent = 'Sláðu inn hóp.'; return; }
      if (!count || count < 1 || count > 50) { document.getElementById('create-err').textContent = 'Fjöldi verður að vera 1–50.'; return; }
      if (!expVal)     { document.getElementById('create-err').textContent = 'Veldu gildistíma.'; return; }

      const expiresAt = Timestamp.fromDate(new Date(expVal + 'T23:59:59'));

      const btn = document.getElementById('btn-create-codes');
      btn.textContent = 'Bý til...';
      btn.disabled = true;

      try {
        // Sækja til að fá lista af kóðum sem eru þegar til til að forðast árekstur
        const existingIds = new Set(allCodes.map(c => c.id));
        lastCreatedCodes = [];

        for (let i = 0; i < count; i++) {
          let codeId;
          let attempts = 0;
          do {
            codeId = generateCodeId(course);
            attempts++;
            if (attempts > 100) throw new Error('Gat ekki búið til einstakan kóða.');
          } while (existingIds.has(codeId));
          existingIds.add(codeId);

          await setDoc(doc(db, 'access_codes', codeId), {
            course,
            class: cls,
            semester: semester || '',
            expires_at: expiresAt,
            activated: false,
            activated_at: null,
            activated_by: null
          });

          lastCreatedCodes.push(codeId);
        }

        document.getElementById('create-ok').textContent = `✓ ${count} kóðar búnir til!`;
        document.getElementById('btn-download-new').style.display = 'inline-block';

        // Sýna forskoðun
        const preview = document.getElementById('new-codes-preview');
        const list    = document.getElementById('new-codes-list');
        preview.style.display = 'block';
        list.innerHTML = lastCreatedCodes.map(c =>
          `<div class="font-mono text-xs bg-gray-50 rounded px-3 py-2 text-blue-700 border border-gray-100">${c}</div>`
        ).join('');

      } catch (e) {
        document.getElementById('create-err').textContent = 'Villa: ' + e.message;
      }

      btn.textContent = 'Búa til kóða';
      btn.disabled = false;
    }

    function downloadNewCodes() {
      if (!lastCreatedCodes.length) return;
      const course   = document.getElementById('new-course').value;
      const cls      = document.getElementById('new-class').value.trim();
      const semester = document.getElementById('new-semester').value.trim();
      const rows = [['Kóði','Námskeið','Hópur','Önn']];
      lastCreatedCodes.forEach(c => rows.push([c, course, cls, semester]));
      downloadCsv(rows, `kodar-${course}-${cls}-${Date.now()}.csv`);
    }

    function downloadFilteredCsv() {
      const courseFilter = document.getElementById('codes-filter-course').value;
      const statusFilter = document.getElementById('codes-filter-status').value;
      let codes = allCodes.filter(c => c.course === courseFilter);
      if (statusFilter === 'used')   codes = codes.filter(c => c.activated);
      if (statusFilter === 'unused') codes = codes.filter(c => !c.activated);

      const userByCode = buildUserByCode();
      const rows = [['Kóði','Námskeið','Hópur','Önn','Staða','Notandi','Virkjað']];
      codes.sort((a,b) => a.id.localeCompare(b.id)).forEach(code => {
        const user = userByCode[code.id];
        let dateStr = '';
        if (user && user.activated_at && user.activated_at.toDate) {
          dateStr = user.activated_at.toDate().toLocaleDateString('is-IS');
        }
        rows.push([
          code.id, code.course || '', code.class || '', code.semester || '',
          code.activated ? 'Notaður' : 'Ónotaður',
          user ? user.email : '',
          dateStr
        ]);
      });
      downloadCsv(rows, `kodar-${courseFilter}-${Date.now()}.csv`);
    }

    function downloadCsv(rows, filename) {
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    // ── Kóðatafla ────────────────────────────────────────────────

    function buildUserByCode() {
      const userByCode = {};
      if (window._rawUserData) {
        window._rawUserData.forEach(u => {
          Object.keys(COURSES).forEach(c => {
            if (u.data[c] && u.data[c].code_used) {
              userByCode[u.data[c].code_used] = {
                email: u.data.email || u.uid,
                activated_at: u.data[c].activated_at
              };
            }
          });
        });
      }
      return userByCode;
    }

    window.renderCodesTable = () => {
      const courseFilter = document.getElementById('codes-filter-course').value;
      const statusFilter = document.getElementById('codes-filter-status').value;
      let codes = allCodes.filter(c => c.course === courseFilter);
      if (statusFilter === 'used')   codes = codes.filter(c => c.activated);
      if (statusFilter === 'unused') codes = codes.filter(c => !c.activated);

      const userByCode = buildUserByCode();
      const countEl = document.getElementById('codes-count');
      if (countEl) countEl.textContent = codes.length + ' kóðar';

      const container = document.getElementById('codes-container');
      if (codes.length === 0) {
        container.innerHTML = '<p class="text-gray-400 font-light text-center py-8">Engir kóðar fundust.</p>';
        return;
      }

      let html = '<table class="w-full text-sm">';
      html += '<thead><tr class="border-b border-gray-100">';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500">Kóði</th>';
      html += '<th class="text-left py-3 pr-4 font-light text-gray-500">Hópur</th>';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500">Staða</th>';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500">Notandi</th>';
      html += '<th class="text-left py-3 font-light text-gray-500">Virkjað</th>';
      html += '</tr></thead><tbody>';

      codes.sort((a,b) => a.id.localeCompare(b.id)).forEach(code => {
        const user = userByCode[code.id];
        const status = code.activated
          ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-light">Notaður</span>'
          : '<span class="px-2 py-1 bg-gray-100 text-gray-500 rounded-full text-xs font-light">Ónotaður</span>';
        const email   = user ? user.email : '–';
        let dateStr = '–';
        if (user && user.activated_at && user.activated_at.toDate) {
          dateStr = user.activated_at.toDate().toLocaleDateString('is-IS', { year:'numeric', month:'short', day:'numeric' });
        }
        html += '<tr class="border-b border-gray-50 hover:bg-gray-50">';
        html += `<td class="py-3 pr-6 font-mono text-gray-800 text-sm">${code.id}</td>`;
        html += `<td class="py-3 pr-4 font-light text-gray-500 text-xs">${code.class || '–'}</td>`;
        html += `<td class="py-3 pr-6">${status}</td>`;
        html += `<td class="py-3 pr-6 font-light text-gray-600">${email}</td>`;
        html += `<td class="py-3 font-light text-gray-400 text-sm">${dateStr}</td>`;
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    };

    // ── Aðgangskort ──────────────────────────────────────────────

    function setupCards() {
      document.getElementById('btn-preview-cards').onclick = previewCards;
      document.getElementById('btn-print-cards').onclick   = printCards;
    }

    async function previewCards() {
      const course  = document.getElementById('cards-course').value;
      const cls     = document.getElementById('cards-class').value.trim();
      const namesRaw = document.getElementById('cards-names').value;
      const names   = namesRaw.split('\n').map(n => n.trim()).filter(Boolean);

      document.getElementById('cards-err').textContent = '';
      document.getElementById('cards-info').textContent = '';

      if (names.length === 0) {
        document.getElementById('cards-err').textContent = 'Settu inn nafnalista.';
        return;
      }

      // Finna lausar kóðar fyrir þetta námskeið + hóp
      let available = allCodes.filter(c =>
        c.course === course &&
        !c.activated &&
        (cls === '' || c.class === cls)
      );

      if (available.length < names.length) {
        document.getElementById('cards-err').textContent =
          `Ekki nóg af lausum kóðum! Þú þarft ${names.length} en ${available.length} eru til.`;
        return;
      }

      // Para saman nöfn og kóða
      previewStudents = names.map((name, i) => ({
        name,
        code: available[i].id
      }));

      document.getElementById('cards-info').textContent =
        `✓ ${names.length} nemendur paraðir við kóða`;

      // Sýna forskoðunartöflu á skjá
      const tableDiv = document.getElementById('cards-preview-table');
      const listDiv  = document.getElementById('cards-preview-list');
      document.getElementById('cards-preview-count').textContent = names.length + ' nemendur';

      let html = '<table class="w-full text-sm"><thead><tr class="border-b border-gray-100">';
      html += '<th class="text-left py-2 pr-6 font-light text-gray-500">Nafn</th>';
      html += '<th class="text-left py-2 font-light text-gray-500">Kóði</th>';
      html += '</tr></thead><tbody>';
      previewStudents.forEach(s => {
        html += `<tr class="border-b border-gray-50">
          <td class="py-2 pr-6 font-light text-gray-700">${s.name}</td>
          <td class="py-2 font-mono text-blue-700 text-xs">${s.code}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      listDiv.innerHTML = html;
      tableDiv.style.display = 'block';

      document.getElementById('btn-print-cards').style.display = 'inline-block';
    }

    function printCards() {
      if (!previewStudents.length) return;

      const course = document.getElementById('cards-course').value;
      const school = document.getElementById('cards-school').value.trim() || 'Tækniskólinn';
      const loginBase = LOGIN_URL[course];
      const courseLabel = COURSE_LABEL[course];

      const printDiv = document.getElementById('print-preview');
      printDiv.innerHTML = '';

      // Búa til síður (5 nemendur per síða)
      for (let i = 0; i < previewStudents.length; i += 5) {
        const chunk = previewStudents.slice(i, i + 5);
        const page = document.createElement('div');
        page.className = 'print-page';

        chunk.forEach(student => {
          const card = document.createElement('div');
          card.className = 'print-card';

          const qrWrap = document.createElement('div');
          qrWrap.className = 'qr-wrap';

          const divider = document.createElement('div');
          divider.className = 'card-divider';

          const info = document.createElement('div');
          info.className = 'card-info';
          info.innerHTML = `
            <div class="card-course-tag">${courseLabel} · ${school}</div>
            <div class="card-student-name">${student.name}</div>
            <div class="card-code-label">Aðgangskóði</div>
            <div class="card-code">${student.code}</div>
            <div class="card-url">malstodin.org</div>
          `;

          card.appendChild(qrWrap);
          card.appendChild(divider);
          card.appendChild(info);
          page.appendChild(card);

          // QR kóði með kóðanum í URL
          new QRCode(qrWrap, {
            text: `${loginBase}?code=${student.code}`,
            width: 166,
            height: 166,
            colorDark: '#1f2937',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        });

        printDiv.appendChild(page);
      }

      // Prenta
      window.print();
    }

    // ── Framvindutafla ───────────────────────────────────────────

    window.setCourseFilter = (val) => {
      activeCourse = val;
      activeGroup  = COURSES[val].groups[0].id;
      filterClass  = 'all';
      filterSemester = 'all';
      document.getElementById('filter-class').value = 'all';
      document.getElementById('filter-semester').value = 'all';
      updateClassDropdown();
      renderTabs();
      renderTable();
    };
    window.setClassFilter    = (val) => { filterClass    = val; renderTable(); };
    window.setSemesterFilter = (val) => { filterSemester = val; renderTable(); };

    function updateClassDropdown() {
      const sel = document.getElementById('filter-class');
      sel.innerHTML = '';
      COURSES[activeCourse].classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.value; opt.textContent = c.label;
        sel.appendChild(opt);
      });
    }

    function filteredStudents() {
      return allUserData.filter(u => {
        const cd = u.courses[activeCourse];
        if (!cd) return false;
        if (filterSemester !== 'all' && cd.semester !== filterSemester) return false;
        if (filterClass    !== 'all' && cd.class    !== filterClass)    return false;
        return true;
      });
    }

    function renderTabs() {
      const container = document.getElementById('tabs');
      container.innerHTML = '';
      COURSES[activeCourse].groups.forEach(group => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn px-4 py-2 rounded-lg text-sm font-light border border-gray-200 ' +
          (group.id === activeGroup ? 'active' : '');
        btn.textContent = group.label;
        btn.onclick = () => { activeGroup = group.id; renderTabs(); renderTable(); };
        container.appendChild(btn);
      });
    }

    function renderTable() {
      const groups  = COURSES[activeCourse].groups;
      const group   = groups.find(g => g.id === activeGroup) || groups[0];
      const container = document.getElementById('table-container');
      const students  = filteredStudents();
      const countEl   = document.getElementById('student-count');
      if (countEl) countEl.textContent = students.length + ' nemendur';

      if (students.length === 0) {
        container.innerHTML = '<p class="text-gray-400 font-light text-center py-8">Engir nemendur passa við síurnar.</p>';
        return;
      }

      let html = '<table class="w-full text-sm">';
      html += '<thead><tr class="border-b border-gray-100">';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500 whitespace-nowrap">Nemandi</th>';
      html += '<th class="py-3 pr-4 font-light text-gray-400 text-xs text-left whitespace-nowrap">Hópur</th>';
      group.exercises.forEach(ex => {
        html += `<th class="py-3 px-1 font-light text-gray-400 text-xs text-center">${ex.label}</th>`;
      });
      html += '<th class="py-3 pl-4 font-light text-gray-400 text-xs text-center">Lokið</th>';
      html += '</tr></thead><tbody>';

      students.sort((a,b) => {
        const ca = a.courses[activeCourse], cb = b.courses[activeCourse];
        const classA = ca ? ca.class || '' : '';
        const classB = cb ? cb.class || '' : '';
        if (classA !== classB) return classA.localeCompare(classB);
        return (a.email || '').localeCompare(b.email || '');
      }).forEach(student => {
        const courseProgress = (allProgress[student.uid] || {})[activeCourse] || {};
        const studentClass   = (student.courses[activeCourse] || {}).class || '–';
        let completedCount = 0;
        html += '<tr class="border-b border-gray-50 hover:bg-gray-50">';
        html += `<td class="py-3 pr-6 font-light text-gray-700 whitespace-nowrap">${student.email}</td>`;
        html += `<td class="py-3 pr-4 font-light text-gray-400 text-xs whitespace-nowrap">${studentClass}</td>`;
        group.exercises.forEach(ex => {
          const status = courseProgress[ex.id];
          let cls = 'cell-none', title = 'Ekki byrjað';
          if (status === 'opened')    { cls = 'cell-opened';    title = 'Opnað'; }
          if (status === 'completed') { cls = 'cell-completed'; title = 'Lokið'; completedCount++; }
          html += `<td class="py-3 px-1 text-center"><span class="cell ${cls}" title="${title}"></span></td>`;
        });
        const total = group.exercises.length;
        const pct   = Math.round(completedCount / total * 100);
        const color = pct === 100 ? 'text-green-600' : pct > 0 ? 'text-amber-600' : 'text-gray-400';
        html += `<td class="py-3 pl-4 text-center font-light ${color}">${completedCount}/${total}</td>`;
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

  </script>
</body>
</html>
