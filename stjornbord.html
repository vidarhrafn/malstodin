<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Stjórnborð – Málstöðin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #f8f7f4 0%, #e8e6e1 100%);
      min-height: 100vh;
    }
    .cell { width: 32px; height: 32px; border-radius: 6px; display: inline-block; }
    .cell-none      { background: #e5e7eb; }
    .cell-opened    { background: #fbbf24; }
    .cell-completed { background: #22c55e; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #2563eb; color: white; }
    .tab-btn:not(.active):hover { background: #f3f4f6; }
    .main-tab-btn { transition: all 0.2s; border-bottom: 3px solid transparent; }
    .main-tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 500; }
  </style>
</head>
<body>

  <div id="loading" class="min-h-screen flex items-center justify-center">
    <p class="text-gray-400 font-light">Hleður...</p>
  </div>

      </div>
      <div id="login-err" class="mb-4 text-red-600 text-sm font-light text-center"></div>

        </svg>
        Skrá inn með Google

          <span class="bg-white px-3 text-xs text-gray-400 font-light">eða með tölvupósti</span>

            🔑 Kóðar

        </div>
      </div>

      <!-- Framvinda hluti -->
      <div id="section-progress">
        <!-- Síur -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-wrap gap-4 items-center">
          <div class="flex items-center gap-2">
            <span class="text-sm font-light text-gray-500">Áfangi:</span>
            <select id="filter-course" onchange="setCourseFilter(this.value)"
              class="text-sm font-light border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="isat1ic">ÍSAT1ÍC</option>

              class="text-sm font-light border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">

        <!-- Tafla -->

            <span class="text-sm font-light text-gray-500">Sýna:</span>

              class="text-sm font-light border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="all">Allir kóðar</option>
              <option value="used">Notaðir</option>
              <option value="unused">Ónotaðir</option>
            </select>
          </div>
          <span id="codes-count" class="text-sm font-light text-gray-400 ml-auto"></span>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div id="codes-container" class="overflow-x-auto p-6">
            <p class="text-gray-400 font-light text-center py-8">Sæki kóða...</p>
          </div>
        </div>

  </div>

            { id: 'hljodritun_k11', label: 'R11' }, { id: 'hljodritun_k12', label: 'R12' },
            { id: 'hljodritun_k13', label: 'R13' },
          ]},
          { id: 'leikir', label: '🎮 Leikir', exercises: [
            { id: 'leikir_teiknileikur1', label: 'T1' }, { id: 'leikir_teiknileikur2', label: 'T2' },
            { id: 'leikir_teiknileikur3', label: 'T3' }, { id: 'leikir_teiknileikur4', label: 'T4' },
            { id: 'leikir_visbendingaleikur1', label: 'V1' }, { id: 'leikir_visbendingaleikur2', label: 'V2' },
          ]},
        ]
      }
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allProgress = {};
    let allUserData = [];
    let allCodes = [];
    let activeCourse = 'isat1ic';
    let activeGroup  = 'lestextar';
    let activeMainTab = 'progress';
    let filterClass    = 'all';
    let filterSemester = 'all';
    let progressUnsubscribers = {};

    // ── Aðalflipor ────────────────────────────────────────────────

    window.setMainTab = (tab) => {
      activeMainTab = tab;
      document.getElementById('section-progress').style.display = tab === 'progress' ? 'block' : 'none';
      document.getElementById('section-codes').style.display    = tab === 'codes'    ? 'block' : 'none';
      document.getElementById('main-tab-progress').classList.toggle('active', tab === 'progress');
      document.getElementById('main-tab-codes').classList.toggle('active', tab === 'codes');
      if (tab === 'codes') renderCodesTable();
    };

    // ── Login ──────────────────────────────────────────────────────

    function showLogin() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('login').style.display = 'flex';
      document.getElementById('btn-google').onclick = async () => {
        document.getElementById('login-err').textContent = '';
        try { await signInWithPopup(auth, new GoogleAuthProvider()); }
        catch { document.getElementById('login-err').textContent = 'Villa við Google-innskráningu.'; }
      };
      document.getElementById('btn-email-login').onclick = async () => {
        const email = document.getElementById('login-email').value.trim();
        const pw    = document.getElementById('login-pw').value;
        document.getElementById('login-err').textContent = '';
        if (!email || !pw) { document.getElementById('login-err').textContent = 'Fylltu inn tölvupóst og lykilorð.'; return; }
        try { await signInWithEmailAndPassword(auth, email, pw); }
        catch { document.getElementById('login-err').textContent = 'Rangt tölvupóstfang eða lykilorð.'; }
      };
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) { showLogin(); return; }
      if (!ADMIN_UIDS.includes(user.uid)) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('login').style.display = 'flex';
        document.getElementById('login-err').textContent = 'Þú hefur ekki aðgang að stjórnborðinu.';
        return;
      }
      document.getElementById('loading').style.display = 'none';
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('btn-logout').onclick = () => signOut(auth);
      updateClassDropdown();
      renderTabs();
      startListening();
    });

    // ── Gögn ──────────────────────────────────────────────────────

    function startListening() {
      // Hlusta á user_access
      onSnapshot(collection(db, 'user_access'), (snap) => {
        allUserData = [];
        window._rawUserData = [];
        const newUids = new Set();
        snap.forEach(d => {
          const data = d.data();
          window._rawUserData.push({ uid: d.id, data });
          const courses = {};
          Object.keys(COURSES).forEach(c => {
            if (data[c] && data[c].activated_at) {
              courses[c] = { class: data[c].class || null, semester: data[c].semester || null };
            }
          });
          if (Object.keys(courses).length > 0) {
            allUserData.push({ uid: d.id, email: data.email || d.id, courses });
            newUids.add(d.id);
          }
        });
        newUids.forEach(uid => {
          Object.keys(COURSES).forEach(course => {
            const key = uid + '_' + course;
            if (progressUnsubscribers[key]) return;
            if (!allProgress[uid]) allProgress[uid] = {};
            progressUnsubscribers[key] = onSnapshot(
              collection(db, 'progress', uid, course),
              (progSnap) => {
                if (!allProgress[uid]) allProgress[uid] = {};
                allProgress[uid][course] = {};
                progSnap.forEach(d => { allProgress[uid][course][d.id] = d.data().status || 'opened'; });
                renderTable();
              }
            );
          });
        });
        renderTable();
        if (activeMainTab === 'codes') renderCodesTable();
      });

      // Hlusta á access_codes
      onSnapshot(collection(db, 'access_codes'), (snap) => {
        allCodes = [];
        snap.forEach(d => {
          allCodes.push({ id: d.id, ...d.data() });
        });
        if (activeMainTab === 'codes') renderCodesTable();
      });
    }

    // ── Kóðatafla ────────────────────────────────────────────────

    window.renderCodesTable = () => {
      const courseFilter = document.getElementById('codes-filter-course').value;
      const statusFilter = document.getElementById('codes-filter-status').value;

      // Búa til map: code_used → email
      const codeToEmail = {};
      allUserData.forEach(u => {
        Object.keys(u.courses).forEach(c => {
          const cd = u.courses[c];
          // Finna kóðann í user_access (við þurfum að sækja þetta úr raw data)
        });
      });

      // Sía kóða
      let codes = allCodes.filter(c => c.course === courseFilter);
      if (statusFilter === 'used')   codes = codes.filter(c => c.activated);
      if (statusFilter === 'unused') codes = codes.filter(c => !c.activated);

      // Búa til notenda map úr allUserData með code_used
      const userByCode = {};
      // Við þurfum raw user data - hlustum á það í startListening
      // Notum allRawUserData sem við vistar hér að neðan
      if (window._rawUserData) {
        window._rawUserData.forEach(u => {
          Object.keys(COURSES).forEach(c => {
            if (u.data[c] && u.data[c].code_used) {
              userByCode[u.data[c].code_used] = {
                email: u.data.email || u.uid,
                activated_at: u.data[c].activated_at
              };
            }
          });
        });
      }

      const countEl = document.getElementById('codes-count');
      if (countEl) countEl.textContent = codes.length + ' kóðar';

      const container = document.getElementById('codes-container');
      if (codes.length === 0) {
        container.innerHTML = '<p class="text-gray-400 font-light text-center py-8">Engir kóðar fundust.</p>';
        return;
      }

      let html = '<table class="w-full text-sm">';
      html += '<thead><tr class="border-b border-gray-100">';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500">Kóði</th>';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500">Staða</th>';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500">Notandi</th>';
      html += '<th class="text-left py-3 font-light text-gray-500">Virkjað</th>';
      html += '</tr></thead><tbody>';

      codes.sort((a, b) => a.id.localeCompare(b.id)).forEach(code => {
        const user = userByCode[code.id];
        const status = code.activated
          ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-light">Notaður</span>'
          : '<span class="px-2 py-1 bg-gray-100 text-gray-500 rounded-full text-xs font-light">Ónotaður</span>';
        const email = user ? user.email : '–';
        let dateStr = '–';
        if (user && user.activated_at && user.activated_at.toDate) {
          dateStr = user.activated_at.toDate().toLocaleDateString('is-IS', { year: 'numeric', month: 'short', day: 'numeric' });
        }
        html += '<tr class="border-b border-gray-50 hover:bg-gray-50">';
        html += '<td class="py-3 pr-6 font-mono text-gray-800 text-sm">' + code.id + '</td>';
        html += '<td class="py-3 pr-6">' + status + '</td>';
        html += '<td class="py-3 pr-6 font-light text-gray-600">' + email + '</td>';
        html += '<td class="py-3 font-light text-gray-400 text-sm">' + dateStr + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    };

    // ── Framvindutafla ───────────────────────────────────────────

    window.setCourseFilter = (val) => {
      activeCourse = val;
      activeGroup = COURSES[val].groups[0].id;
      filterClass = 'all';
      filterSemester = 'all';
      document.getElementById('filter-class').value = 'all';
      document.getElementById('filter-semester').value = 'all';
      updateClassDropdown();
      renderTabs();
      renderTable();
    };
    window.setClassFilter    = (val) => { filterClass    = val; renderTable(); };
    window.setSemesterFilter = (val) => { filterSemester = val; renderTable(); };

    function updateClassDropdown() {
      const sel = document.getElementById('filter-class');
      sel.innerHTML = '';
      COURSES[activeCourse].classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.value; opt.textContent = c.label;
        sel.appendChild(opt);
      });
    }

    function filteredStudents() {
      return allUserData.filter(u => {
        const cd = u.courses[activeCourse];
        if (!cd) return false;
        if (filterSemester !== 'all' && cd.semester !== filterSemester) return false;
        if (filterClass    !== 'all' && cd.class    !== filterClass)    return false;
        return true;
      });
    }

    function renderTabs() {
      const container = document.getElementById('tabs');
      container.innerHTML = '';
      COURSES[activeCourse].groups.forEach(group => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn px-4 py-2 rounded-lg text-sm font-light border border-gray-200 ' + (group.id === activeGroup ? 'active' : '');
        btn.textContent = group.label;
        btn.onclick = () => { activeGroup = group.id; renderTabs(); renderTable(); };
        container.appendChild(btn);
      });
    }

    function renderTable() {
      const groups = COURSES[activeCourse].groups;
      const group = groups.find(g => g.id === activeGroup) || groups[0];
      const container = document.getElementById('table-container');
      const students = filteredStudents();
      const countEl = document.getElementById('student-count');
      if (countEl) countEl.textContent = students.length + ' nemendur';

      if (students.length === 0) {
        container.innerHTML = '<p class="text-gray-400 font-light text-center py-8">Engir nemendur passa við síurnar.</p>';
        return;
      }

      let html = '<table class="w-full text-sm">';
      html += '<thead><tr class="border-b border-gray-100">';
      html += '<th class="text-left py-3 pr-6 font-light text-gray-500 whitespace-nowrap">Nemandi</th>';
      html += '<th class="py-3 pr-4 font-light text-gray-400 text-xs text-left whitespace-nowrap">Hópur</th>';
      group.exercises.forEach(ex => {
        html += '<th class="py-3 px-1 font-light text-gray-400 text-xs text-center">' + ex.label + '</th>';
      });
      html += '<th class="py-3 pl-4 font-light text-gray-400 text-xs text-center">Lokið</th>';
      html += '</tr></thead><tbody>';

      students.sort((a, b) => {
        const ca = a.courses[activeCourse], cb = b.courses[activeCourse];
        const classA = ca ? ca.class || '' : '';
        const classB = cb ? cb.class || '' : '';
        if (classA !== classB) return classA.localeCompare(classB);
        return (a.email || '').localeCompare(b.email || '');
      }).forEach(student => {
        const courseProgress = (allProgress[student.uid] || {})[activeCourse] || {};
        const studentClass = (student.courses[activeCourse] || {}).class || '–';
        let completedCount = 0;
        html += '<tr class="border-b border-gray-50 hover:bg-gray-50">';
        html += '<td class="py-3 pr-6 font-light text-gray-700 whitespace-nowrap">' + student.email + '</td>';
        html += '<td class="py-3 pr-4 font-light text-gray-400 text-xs whitespace-nowrap">' + studentClass + '</td>';
        group.exercises.forEach(ex => {
          const status = courseProgress[ex.id];
          let cls = 'cell-none', title = 'Ekki byrjað';
          if (status === 'opened')    { cls = 'cell-opened';    title = 'Opnað'; }
          if (status === 'completed') { cls = 'cell-completed'; title = 'Lokið'; completedCount++; }
          html += '<td class="py-3 px-1 text-center"><span class="cell ' + cls + '" title="' + title + '"></span></td>';
        });
        const total = group.exercises.length;
        const pct = Math.round(completedCount / total * 100);
        const color = pct === 100 ? 'text-green-600' : pct > 0 ? 'text-amber-600' : 'text-gray-400';
        html += '<td class="py-3 pl-4 text-center font-light ' + color + '">' + completedCount + '/' + total + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

  </script>
</body>
</html>
